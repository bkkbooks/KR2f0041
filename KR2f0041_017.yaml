  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_017-1a, image: WYG0445/WYG0445-0224a.png}
body:
  text: 請遵祖訓以光聖德疏正德十年楊廷和臣聞之禮莫重于視朝禁莫嚴于宫衛自古帝王之治天下必謹視朝之節以觀示臣民嚴宫衛之防以消弭禍變我朝列聖尤致謹于斯伏覩皇明祖訓所載有曰朕以乾清宫為正寢晚朝畢而入清晨星存而出除有疾外平康之時不敢怠惰此所以畏天人而國家所由興蓋言視朝之當謹也又曰凡帝王居安常懷警備日夜時刻不敢怠慢雖親如骨肉朝夕相見猶當警備于心蓋言宫衛之當謹也此皆憂深思逺為聖子神孫之家法者也恭惟皇上聰明天授政令之施動遵祖訓乃近年以來朝會慶賀或至遲暮其初蓋因一時起居違和而然積以為常傳之外朝將謂縱欲晏安觀聼之間不無惶惑去嵗以來揀選人馬親自校閲其事蓋因一時邉戎犯順而然意在禦侮實非有他傳之天下皆謂邊兵非宿衛之人禁禦非操練之所疑似之間未免驚駭臣職居輔導出入禁闥雖隨事納規時有陳請緣議論不足以發明事體誠意不足以孚契聖心尸素有年愧悚無地伏望皇上鑒皇祖之訓典察微臣之愚忠自今以後夙興視朝躬親祀事乘平旦之氣以裁決萬幾竭獻享之誠以昭格九廟仍選用方直以為侍從信任老成以為腹心軍士操練必于演武之所朝夕督厲付之將領之官推恩左右體恤勤勞啓處以時庶不有勞于聖體關防既謹亦可盡釋于羣疑將見聖德日新天心豫悅神人胥慶和氣致祥宗社萬萬年無疆之休端在此矣疏入帝不納勸止臨幸疏正德十年梁儲臣竊聞聖駕自西安門出外經宿而回不知臨幸何所臣初聞未敢遽信既而道路相傳衆口藉藉使臣心志憂惶神魂飛越展轉思惟莫知所處竊惟天子出入必備法駕必傳警蹕衛士環列百官扈從所以嚴至尊之分而防意外之虞也且如南郊大祀不過一宿虎賁之旅鷹揚之將周旋左右而直廬拱衛官軍萬餘警柝之聲夜以逹旦至于皇城各門又令勳戚重臣把守祖宗之法至為詳備今聖駕之出不知環衛者何人居守者何官文武羣臣茫不預聞無故輕身而出率意而往擾擾塵埃中萬一車馬驚蹶之虞姧盜竊發之變出于意料之所不及未知何以備之雖以天神協相決無是事而臣私憂過計實切寒心夫千金之子尚不肯垂堂而坐陛下一身乃宗廟社稷之主縱不為身惜獨不為宗廟社稷計乎仰惟聖性髙明天資英邁洞燭天下之事機已非一日必不輕易舉動竊恐左右羣小貢諛希寵之徒倡引事端蠱惑聰明陛下偶未深思而遽從之上纍聖德下駭人心凡此導引之人其罪殆不容誅但事在祕密非臣所知不敢妄有指議伏望陛下念祖宗付託之重體臣民瞻戴之情自今以後端拱穆清以保威重節宣勞逸以頤天和嚴內外出入之防正堂陛尊卑之分戒非時之宴遊屏無益之玩好仍乞查究導引之人置之于法以彰剛斷之德以解臣民之疑祖宗幸甚天下幸甚疏入帝不納大舉入境乞兵救援疏正德十年王瓊臣謹奏看得巡關御史張鼇山奏稱朵顔三衛和坦與實喇博囉譎詐驍勇彼欲增貢則增彼欲襲職則襲我既墮其計中彼遂決為大舉今之畫計者有三日增貢決不可從曰守亦不可也曰攻則忠臣義士之憤未可為非要調宣大遼東邊軍旬日之內速赴地方分布防守出其不意以攻之豫為必戰以禦之等因臣等竊觀自古制禦邊庭之道固不可貪功以啓釁亦不可怯懦以求和况朵顔三衛世受國恩進貢效順近日窺我邊備廢弛乃敢挾詐要求觀勢強弱以為從違既殺害將官又擁衆侵犯興兵征討未為無名大義所關誠不可已御史張鼇山所論理直氣壯詞嚴義正合準所言速議施行查得先該本部議擬題奉欽依著桂勇將團營西官廳前營官軍操練待報啓行續該本部奏調遊擊將軍劉寶原領河間官軍一千名前去薊州駐劄聼調中間出軍等項事宜現該本部議處具奏但行兵之法謀算豫定庶功可成倉卒調發未免疏漏合無本部將調兵一應事宜逐一議處停當上請定奪疏入得旨是這調兵一應事宜便議處停當來説亟易鎮巡官以保重地疏正德十年王瓊臣謹奏看得御史汪賜奏稱馬蘭峪地方被敵搶虜人畜殺死參將陳乾皆是太監王欣遂安伯陳鏸都御史王倬平日調度無方紀律不嚴所致若不亟為取回仍令其恬然在任不免外冦覘我強弱將來之患誠不可測一節緣外冦犯邊殺死參將委的事重若不將陳鏸等取回問罪不惟各邊將官聞風怠玩無所忌憚抑恐以後薊州一帶邊關官軍不知有法愈加放肆不肯用命效力而陳鏸之罪益加深重難以自解今日不取各官固非朝廷之福亦非陳鏸等之利也伏望皇上軫念防邊事重俯察公論當從早賜宸斷將陳鏸等取回究問則綱紀振肅號令更新邊敵和坦等易于征勦陳鏸等心亦得安矣疏入得旨已有旨了請究失事邊臣疏正德十年王瓊臣謹奏看得兵科等科都給事中安金等廣東等道監察御史髙公韶等各劾奏鎮守薊州等處總兵官遂安伯陳鏸巡撫御史王倬鎮守太監王欣等守備太監蔣廷玉兵備副使王玹等各員委任地方失事要將陳鏸拿解來京治以重罪王倬罷遣王欣蔣廷玉取回間住王玹降調别用急選賢能官員前去更替又要將提督侍郎陳玉切責等因查得各官失事先該本部題奉欽依行巡按御史查了來説並將王欣陳鏸王倬降敕切責外今六科十三道官交章劾奏前因臣等竊惟有功必賞有罪必罰此治天下之紀綱不可一日而廢者也科道之官又所以振舉紀綱以扶持公道者也陳鏸等既是各官交章論奏公論不容合無本部並吏部作急會推堪任總兵官巡撫兵備官員並司禮監奏請差內臣二員各前去更替陳鏸王倬王欣蔣廷玉等接管行事將陳鏸提解來京送都察院問罪奏請發落王欣蔣廷玉取回間住王倬等罷黜以正朝廷之法以紓邊人之憤仍請敕切責侍郎陳玉俾用心提督現在官軍勉圖後效其餘失事官員與陳亡官軍應否優恤緣由再行巡按御史一併查勘明白具奏定奪抑復將今科道官劾奏陳鏸等情罪再行巡按御史通候查參至日奏請定奪伏乞聖裁再照兵科等科都給事中安金等奏要本部速為議處務使全定安攘之䇿大興聲討之師復我邊疆三軍常勝之威保我國家萬世全盛之業一節與巡關御史張鼇山奏要發兵攻勦事理相同現該本部題奉欽依著桂勇操練團營西官廳前營官軍待報啓行合無本部將出軍一應事宜另行計處奏請定奪疏入得旨是這地方失誤事情重大陳鏸著回京王倬王欣蔣廷玉王玹著戴罪禦敵待巡按御史查參至日來説陳玉已有旨了其餘事宜陸續奏來處置堪充總兵官的便會推兩員來看豫防邊患疏正德十年王瓊臣謹議宣大二鎮共有官軍一十四萬延寧二鎮又設有官軍七萬嵗費糧儲數百萬計専為防禦邊敵近年各鎮守臣因循怠忽不肯豫先料度邊情運謀設䇿調度軍馬相機戰守以致邊敵深入得利而去大肆搶掠無所畏憚及至朝廷命將出師彼軍已去留兵在邊等候為因邊地廣闊彼軍出沒不常不得恰好相遇一戰以此勞費雖多不能成功即今若不將本邊將士戒飭豫為隄備邊敵過河必來侵犯倉卒計處必蹈往轍緩不及事貽患非輕臣等愚見乞敕宣府大同鎮守太監總兵官巡撫都御史會同計議今年河凍邊敵過河駐牧作何設法隄備可保無虞訪取熟知邊情地理之人密切審問先年邊敵進境搶掠出入道路應該調撥何城堡軍馬在何地方駐劄可以正當敵衝截殺取勝于何地方按伏可以邀其歸路追勦得功本鎮軍馬雖各𣪚處城堡必須量數挑選精鋭官軍記名聼候有警調取會合勦殺務在料敵先知算無遺䇿不可互相推諉因循茍安及似常分調按伏不當敵衝虛應故事以致邊敵深入搶掠出入自由定照葉椿薑彬髙友機等事例拏問取回降黜必不輕貸各將計議過隄備邊敵事宜明白具奏不許含糊遲誤疏入得旨是這豫防邊患事宜恁部裏行移彼處鎮巡等官知會禦敵安邊疏正德十年王瓊臣謹奏看得給事中任忠所奏大意謂朝廷命將出師固是禦敵之䇿但敵人聞出師而暫退見班師而復來徒費糧草不得成功莫如以守禦為本明賞罰久任人邊備既修邊敵自畏臣等竊念近年以來為因守臣數易賞濫罰輕以致封守不固敵人內侵黎元受禍給事中任忠所言切中時弊但今邊務廢弛已久邊敵強盛大舉入攻勢甚危急所以本部建議命將出師蓋欲宣布國威振作邊方士氣如前代細栁棘門霸上之舉實非得已惟苦議論不定朝更夕改機會一失必又勞費無功伏望聖明再敕張忠陳天祥張洪料度敵情務期必中敵在陜西則為陜西之備敵過宣大則為宣大之謀閫外之事悉以付之不必遙制務使敵勢頓挫不敢深入內郡獲安不致擾害毋或失誤機會以致師老無功若敵衆離逺駐牧不來侵犯即便具奏班師以省坐費其各邊守禦事宜聼各鎮巡官照舊施行不許推稱節制失機誤事本部仍行紀功御史從公紀驗以行賞及行給事中御史從公按核以行罰除提督軍務都御史係暫差外其各邊巡撫都御史賢能可任者乞敕該部查照成化年以前寧夏巡撫都御史賈俊等事例須亦六年以上方許升轉並總兵等官聼本部從公推舉亦須久任無故不必更調如此公行賞罰久任責成本邊將士皆可禦敵京營軍馬不必逺出省費息民培固邦本當今急務莫先于此疏入得旨是禦敵安邊各項事宜都依擬行劾朱寧疏正德十年方良永臣待罪承宣自慚無補中有所激不忍緘默固知事涉權貴言出禍隨然竊計脂韋之罪重于強聒而一身之患害輕于百姓之荼毒故敢昧死為陛下言之臣惟民者邦之本財者民之命國家財賦盡出東南浙居其半故愛國必愛民愛民必惜財而浙民之財尤當愛惜也陛下聰明天縱豈不知此意謂我有大臣可付託也我有親臣可倚任也臣則以為陛下有大臣而不能用有親臣而不肯為用雖謂之無臣可也陛下環視左右最親且信與國同休戚者誰耶臣以為莫朱寧若矣寧也出自賤氓陛下一旦假以義子之寵躋諸公侯之列勢傾中外富擬封君其親之也至矣為寧者粉身碎骨以圖報稱尚難酬萬分之一乃忍攫取陛下之民財戕賊陛下之邦本以自速其不臣之罪乎臣于正德九年十月初十日到任即聞朱寧鬻鈔害人心甚惡之無何舊鎮守太監劉璟語臣及三司曰寧堂鈔價意欲倍增何如臣茫無以對細詢之璟言前發十一府鈔每一塊易銀二兩傳報朱寧心怪其輕故欲增至四兩次日復語如初臣堅持不可璟離席誓曰我受朝廷厚恩豈不知此事貽害百姓顧勢不得不為耳我即不為他人必為百姓依然受害而我之禍立至矣言與淚俱至悒悒不能自禁又次日復語如初竟增至三兩臣退而思之有官守者不得其職則去心雖憤激力不能救亦失職也乃自劾求去繼聞新有禁例勢豪鬻鈔害人者必罪臣竊喜此事徐當中止故遲遲不去以待其變今既數月矣例格不行而有司徴價急如星火或緣為姧利倍而又倍椎膚剝髓民不堪命天門萬里相與赴訴于監司監司欲言而未果發民亦吞聲而不敢言輸價之吏絡繹于途矣新鎮守太監王堂知民怨且作亦蹙然不安乃出巽辭謂寧堂好人初不知鬻鈔之難如豫知之必不為也今業已為之可以已完二萬四千兩截解少慰其意前太監既為之斂我不得不為之解二臣所稱寧堂蓋指朱寧也其勢焰之薰灼可知矣方今四方羣盜甫息瘡痍未起邊塞多虞饋餉或不時繼浙東西諸郡自冬徂春雨雹為災蠶麥不利待哺之民嗷嗷千里此何時也大司徒不能為陛下畫萬年長䇿以去京師之冗食乃遣官四出坐索數十年之逋稅是豈得已哉冗食不可去而竒禍隨之矣臣故曰陛下有大臣而不能用也且劉璟王堂皆陛下腹心之臣其在浙也皆有愛民之譽于此無名橫斂宜可于談笑間却之耳而二臣者徒能涕泣蹙額付之無可奈何一則曰不得不為一則曰不得不解是亦豈得已哉橫斂不可却而隱禍中之矣事勢若此茍猶隱忍不為陛下言之則已斂之財必入朱寧之手而民心傷矣心傷則本傷本傷則枝幹雕瘁根柢蹶拔陛下其能晏然于上乎夫義子亦親臣也今人有一飯之恩心必圖報陛下之待朱寧豈一飯比哉不圖報則亦已矣反取陛下之邦本而動搖之略不顧惜此臣之所未喻也故迹其所為在子為不孝在臣為不忠在法所必誅而無赦者臣故曰陛下有親臣而不為用也伏乞陛下割偏私之愛奮獨斷之勇廷詰朱寧以鬻鈔害民之故茍或愚不解事誤聼人言而請罪祈恩之不暇則消奪官爵薄示懲戒根究主使之人坐以重罪可也如其飾非獲短不肯服辜是敢于欺罔也陛下又何取于寧而必欲子之乎宜下之詔獄明正典刑以為臣子悖逆之戒斯二者惟陛下明察而果行之仍祈急敕都察院行浙江鎮巡三司等官將已斂鈔價盡數還民未斂之數速即停止并查究姧吏影射侵尅之弊悉置諸法則民怨未甚猶可慰解邦本末搖猶可培植陛下誠如是行之臣死且甘心其他利害固不遑恤也陛下如以臣言為不然置之不問日復一日尾大不掉將必肆無厭之求有出于尋常所不料者矣臣不勝激切之至疏入寧欲中以危法或説曰害之適成其名乃密召還所遣使者而以鈔直還之民訟胡世寧疏正德十年程啓充臣聞江西按察司副使胡世寧因言地方弭盜事宜旁及寧府軍民弊政兵部題奏施行嗣因寧王奏稱胡世寧妖言誹謗離間親親奉旨提解來京臣于此仰窺陛下之心矣始者胡世寧有所建白陛下不以為迂狂而俯賜施行蓋以副使人臣也耳目重其司行其言所以體其心既乃寧王掇拾為言陛下以為嫌疑而即加提解蓋以親王宗室也好惡同其情從其言因以泄其怒一舉而二者交盡也夫以陛下之厚遇寧王重違廷論有護衛土田之錫璽書褒美之頻其隆重之極孚信之深有耳目者所共知也胡世寧豈獨無所聞見哉彼殆有所激而云然所謂忠而過者抑亦知聖明之虛懷聼納寧王之聞過則喜也不意狂瞽之微乃罹羅織之厄夫陛下始則可世寧之奏正欲隆親親之恩繼因宗室之言乃令御史提解又以寧王上在逃之章于是乃有官校之命陛下于此亦近乎投抒矣臣竊思此事大有可疑蓋稽遲之不久則世寧之罪不深文致之不重則報復之心未厭君臣父子無所逃于天地之間世寧將遁之何所哉其間道自投蓋與其死于溝洫而人莫之知寧得見天日而甘心受戮也臣願陛下詳察之哀矜之臣聞寧王之事先江西給事中徐文溥論其威勢日甚暴形大彰王府長史司啓稱由郡王將軍擾害民間動指本府名目被害者不知根由傳聞者以為真的王亦曰詞非泛言事有指實自乞譴罰以示宗藩是知人言沓至民怨流行王之心至是亦不安矣臣按胡世寧之奏所謂盜賊踐蹂乾旱流災官民失業賑貸無備王府之債負遍及閭閻莊田之逼迫民無安息三司官員多被鈐束問刑長吏舉奉成案買辦漸及于外府騷擾遍及于窮鄉合觀徐文溥之奏長史司之啓寧王之自言事迹禍蹤內外同辭但寧王指為郡王將軍而世寧則以為臣僚輔導之非法官司奉承之太過此固所謂被害者不知根由傳聞者以為真的也向非二臣之言則不聞長史司之啓隱伏之私流毒之苦誰其攻之是世寧在陛下則為忠在寧王則為義俾宗藩因其言而自戢朝廷用其言而防微則為達權具三善而獲罪臣愚之所未解也仰惟皇祖有離間親王之刑蓋懼小人之震搖朝廷用其言而防微世寧欲乞溫詔戒諭寧王益崇謙德仰遵祖訓其非離間也彰彰明甚荷蒙俞允明頒渙號戒諭維殷親愛彌篤陛下何嘗因其言而少存嫌二哉至謂禮樂政令漸不出自朝廷詞氣之間固為抑楊太過然區區之忱思以防微杜漸尊主庇民消尾大脛腫之憂植強幹弱枝之計耳使果妖言誹謗天日之鑒安所逃罪又何能曲荷欽依戒諭諄切乎寧王若能因言自省則于仁賢有加謙光無損朝廷隆重之恩君臣孚契之情與天地相悠久矣而顧為是言意者王之左右懼發摘其私而禍且逮已故假危言以激王之怒耶夫按察副使祖宗所建外臺也言雖過激亦當引咎優容豈至指摘排擊引而置諸危法也哉果從王言則上損國威下招物議張難犯之勢杜將來之口一舉而四失焉臣愚之所尤未解也聖如陛下而狂直且不能容誠恐人懷自危中外解體卑逺之臣不足惜如朝廷紀綱何積薪之火漸炎敢言之氣頓銷壅蔽之患既成猜嫌之隙必至日復一日職為厲階矣伏望皇上曲垂赦宥矜此孤愚甄用奏內應行之事追究沈匿旨意之由務使官守其職民安其業朝廷登天潢之誼藩府篤朝宗之心則本支百世永享無窮之福矣疏入世寧得旨謫戍請罷遣中官疏正德十一年梁儲臣梁儲謹題為傳奉事先該兵部手本開稱司禮監太監溫祥傳奉聖旨司設監太監劉允著他前去四川等處公幹寫敕與他該衙門知道欽此欽遵臣等看得內外官員奉敕內必得備由開載無憑撰寫太監劉允前去四川未知幹理何事不見開載無憑撰寫已經具題未蒙明示近該禮部手本開稱司禮監太監秦文傳奉聖旨司設監太監劉允照永樂宣德年差鄧成侯顯事例去烏思藏地方齎送畨供等物寫敕與他該衙門知道欽此欽遵奉到部開具手本赴翰林院請寫敕書等因續於户部覆本內看得太監劉允奏要帶太監等官劉宗等八員錦衣等衛官舍指揮同知韋祿等一百三十三員名應付廩給口糧馬匹車輛馬快船隻該用過畨物件欲令四川鎮巡三司聽其便宜措置及選差驍勇官二員量帶官軍計程支備糧料直抵彼處往回護送又稱撫犒各夷須食茶金帛絹布等物無從措辦乞將長蘆運司見鹽一萬引兩淮運司見在正課鹽六萬引給與變賣應用等事情乞賜敕內開載等因荷蒙俞允臣等愚昧心有未安不敢不言竊西番本異端之國浸淫己久未能遽革永樂宣德年間雖嘗有遣使之舉我祖宗之意以天下初定特藉之以開導愚迷鎮服戎狄非真信其教而崇奉之也承平之後纍朝列聖止是因其年例遣人朝賀厚加賞賚答其勤劬未嘗輕辱命使逺涉其境陛下今遣內臣近臣前去齎送畨供朝野聞之相顧駭愕以為堯舜在上不應有此輕去而太監劉允奏討鹽引數萬動撥馬快船至于百隻又欲聽其便冝處置錢物差撥官軍護送等項于法例俱不相應蓋關中鹽引本為供邉今外患未寧三邉糧草缺乏帑藏空虛緩急接濟者惟此一策且各運司該年鹽課關中盡絶若許其帶鹽不過收買私鹽發賣射利乘機夾帶之弊不知幾何鹽法為之大壞邉方何以仰給况京儲嵗運與營建大木併在裏河議者猶恐不能疏通若又添此等鹽船往來其間挾勢騷擾不止地方受害而糧運大木二事必被阻滯妨礙及四川地方大盜初息民困未蘇所奏便冝措置錢物在官無以應之未免科派軍民民窮盜起將來事變殆不可測且自天全招討司出境涉厯數萬里之程動經數年方得到烏思藏地方今帶去官軍人役數多沿途俱是化外非有驛傳供給人馬芻糧俱要駁載而行所費巨萬難以逆料途間倘有不給不知何以為處又聞畨地族類不一部落相鄰時出剽掠為患使臣所至萬一被其突出有所傷害虧中國之體納外夷之侮此事理所有不可不慮夫以無益之事而妨至要之事且貽意外之虞舉朝皆以其不可此臣之不能巳於言也緣劉允受命逺出畨境利害切身亦非得已臣等深見事勢之難前項敕書委實不敢撰寫伏望皇上慎重國體恤憫人窮收回成命不必差官畨供等物止照節年事例令彼處朝貢使臣齎回則禮意不失事體無礙物議不興外患不作而聖德益茂治功無纍矣臣等備員輔導此等事情心知不可若隱默不言他日陛下追悔前事之失責臣等不能匡正其罪莫逃謹昧死言之伏惟留神省覽臣民幸甚天下幸甚臣等不勝待罪俟命之至請罷中官奏討鹽引等疏正德十一年梁儲臣竊見天下賦稅嵗入有常而國用日增無有限制雖年榖豐登尚難支持一遇荒歉尤為可慮况今冦患未寧軍需糧草在在缺乏太倉每嵗解去各邉銀兩常不足以供一嵗官軍之費所賴以接濟者惟有鹽課一事可以備飛芻挽粟之用然數年以來鹽法大壞猝有邉警召募客商多不上納蓋因公差人員奏封引目數多一時就要盡數支賣本等客商皆守支艱難日漸貧困以至如此夫以太倉有限銀兩既不足以給各邉軍馬之需而鹽課成法又日益廢壞無以接濟急用萬一復報有重大聲息勢須多用糧草不知朝廷將何以處之近該太監劉允差往烏思藏齎送畨供等物奏討長蘆運司現鹽一萬引兩淮運司現鹽六萬引跟隨人役類多挾勢謀利或至各支一萬引乃夾帶至八九萬引以此載鹽船隻填滿河道南北官民商旅舟楫一切阻塞不容往來其所用拽船人夫二三千名威勢逼迫役及婦人所過之處怨聲載道非惟有壞鹽法抑恐積成他變臣實切憂之再照陜西延綏甘肅等處連年災傷米穀薄收人多飢饉加以去年敵冦更入搶掠又有回賊纍次作耗瘡痍之民尚未蘇息地方十分艱苦錢糧十分窘乏彼處官司計無所出現行奏乞賑濟方患無以應之今該司禮監傳奉聖旨差御馬監太監張玉前去彼處造辦應貢各樣土宜物件其合用錢糧茶品等項欲令陜西鎮巡三司等官及甘肅地方官員計處交與張玉置辦凡百大小事情悉聽張玉便宜處治所在大小衙門毋得違阻令以此意撰寫敕書臣躊躇惶懼未敢仰承聖意緣前項地方既值兵荒貧窘民不聊生前項措辦錢糧欲取之于官則庫藏匱乏欲取之于民則閭里空虛其太監以下人員至彼之日所費又復不資為彼處官員者若欲撫恤軍民則恐以違詔致罪若欲奉行詔旨則恐嚴刑峻法之下民窮盜起别生意外之患此固為人臣子者皆宜為國深慮者也而况忝居內閣義同休戚如臣者乎又况甘肅切近土魯番諸地設若內地盜起彼必乘機入為邉患地方安危關繫非小至于兵宜處治惟統兵官員臨機濟務得以行之尋常公幹豈可援以為例伏望皇上俯垂天聽亟將劉允取回今後凡有奏討引鹽者一概不與重念陜西嵗荒民貧錢糧無處出辦仍將張玊停止不差前項敇書免令撰擬地方生靈不勝幸甚疏入帝不納審大計以重本兵疏正德十一年王瓊臣謹奏看得工科給事中翟瓚所言添設提督以振軍旅等四事俱係京營要務合就查議明白開立前件伏乞聖裁一添提督以振軍旅查得正統十四年因邉人犯順欽命太子少保本部尚書于謙不妨部事總督軍務景泰三年該于謙會同武清伯石亨等議得邉人額森背逆天道聚衆近疆若不豫為設法選練設使遣將調兵兵不識將意將不識軍情恐號令不一致誤事機合無于五軍三千神機營揀選精鋭馬步官軍一十五萬分為十二營揀選亷能驍勇之人管領操練俱聽臣等往來提督等因奉景皇帝聖旨是欽此天順年間邊方寧靖十二營罷立總督官亦不復設成化三年為整飭兵備事該司禮監太監懷恩等奏該本部議擬復立十二營團聚操練會推大臣一員提督本年四月二十日具題節該奉憲宗皇帝聖旨太子少保白圭兼兵部尚書不妨部事提督十二營操練欽此成化十一年白圭病故該太監懷恩傳奉憲宗皇帝聖旨太子少保左都御史王越不妨院事著提督十二營操練人馬欽此以後本部尚書馬文升劉大夏許進閻仲宇劉宇曹元王敞何鑑陸完並今臣瓊俱不妨部事奉敕提督十二團營今給事中翟瓚奏要查照景泰天順成化等年事例添設或尚書侍郎都御史一員為總提督常川在營會同操練不妨以他務不奪以他官無非欲委任専一整飭軍旅之意不為無見但查前項節年事例于謙等俱以本部尚書不妨部事提督王越以左都御史不妨院事提督今要添設一員専管提督係干事體重大臣等擅難定擬伏乞聖裁二慎選舉以備將材查得先為選將領以實武備事該司禮監太監蕭敬題稱閲視京營坐營侯伯都督等官比較馬步弓箭詢其韜略大意次及大小號頭把總官員一體比較試驗馬步弓箭分别等第量加罰治中間若有年力不堪官員亦就罷黜若仍以每年春秋二次閲視不無太密若用五年一次又恐太疏合無斟酌疏密以後每遇三年之期兵部奏請照例舉行等因正德八年九月二十三日具題節該奉聖旨是欽此通行欽遵外正德十一年九月扣該三年閲視之期今給事中翟瓚奏稱把總以上等官闒茸不材者十常八九要行本部尚書會同內外提督大臣嚴加考選把總號頭等官貪墨太甚者盡行汰黜謀勇素著曽中武舉者盡行收用遇有分守守備官缺以次推用所言誠為有理但查今年正該閲視之期合無至期本部尚書公同欽差司禮監太監等官依其所擬照例考選閲視從公進退務令得人遇有員缺照例推用及查坐營坐司侯伯都督等官舊例俱該本部會同各營提督武臣推舉上請簡用原無會同內外提督考選事例合無亦候閲視之時公同考驗果有馬步弓箭不能􅈺熟戰陳韜略不知大意素無謀勇應該罷黜者亦就開具奏請定奪三重伍兵以謹團練照得近年各營操練委的徒事虛文全不精鋭一遇有警皆不堪用追勦流賊則隨處敗走出征宣大則浪費邊儲給事中翟瓚所言深切時弊臣等近日痛懲宿弊大懼誤國會同計議推左都督劉暉等豫行選練振揚軍威正欲兵將相識有警得用伏乞聖明天語丁寧戒諭劉暉等務要用心揀選嚴加訓練中間合行事宜遵照欽奉敕內事理著實奉行不許因循顧忌致誤大事四禁占役以實營伍查得先為整飭兵備事成化十九年十一月初六日該司禮監太監懷恩題本部查得京營提督內臣軍伴一百名掌營內臣總兵官各六十名坐營官十五名把總官六名俱于五軍等三大營取撥又查得成化三年五月二十八日節該欽奉憲宗皇帝聖旨練兵講武是國家最重的事但承平日久中間私弊多端有名無實近來將五軍三千神機三大營官軍揀選頭等精壯的分為十二營専操次等的仍留三大營操練慮恐日後人不知警私弊復生恁兵部便出榜禁約自今坐營把總以下官但役占五名以下者降一級五名以上者降二級甚者罷級充軍仍發邊逺守禦如或容情故縱不舉奏者事發一體治罪不饒欽此欽遵外今照前因合再為申明役占六名即為五名以上役占一名二名三名四名俱為五名以下俱照前例降級一名二名以上積至六名者各通諭從重併數減降數至十名以上此其甚者或罷職或充軍論罪之日取自聖裁其提督總兵及點軍等官明知前弊容情故縱不即舉奏者事發一體參究題奉憲宗皇帝聖旨是恁部裏便將今定事例出榜去營內張挂曉諭欽此已經出榜于各營張挂曉諭欽遵外今給事中翟瓚奏要查照前例出榜曉諭以慿改正遵守合無本部再行申明行移各營內外提督等官一體欽遵仍要嚴督各坐營把總等官但有役占者通行改正遵守舊例若有仍蹈前轍者聽點軍科道官訪出指實參究疏入得旨提督官不必添設其餘準議邊情疏正德十一年王瓊臣近奉聖旨這進馬事情還著巡撫都御史隨宜查審驗放欽此臣等仰窺聖意蓋以聖人不治邊庭懷柔逺人故令巡撫都御史隨宜查審驗放以示含宏但近該巡撫都御史李瓚奏來巴爾斯已差實實台等將進馬徹爾等呌回只在三四日內要來作歹誠恐都御史李瓚因見奉有欽依惟知幸免目前無事不與鎮守總兵官公同計議查審明白徑自任意將巴爾斯所差人容令進馬遂使朝廷節次降到旨意明文皆為虛詞以後邊人再不信服合無本部行文都御史李瓚會同鎮守總兵官計議除進馬邊人已回外若仍現在關外務要遵照明旨查審明白果係都督和坦等差來進馬以禮犒勞驗放入關若係巴爾斯獨自差人進馬相機行事設法擒勦不可自示怯弱致生侵侮亦不可機謀疏漏誤墮賊計其各關口防禦事宜比常嚴加整飭以備不虞疏入得旨是鎮巡官所奏邉情前後不一還行與他每照依恁部裏節次議擬查審明白相機行事仍要加謹防禦毋得止圖自便不顧國體因而廢弛邉備責有所歸御選明臣奏議卷十四
