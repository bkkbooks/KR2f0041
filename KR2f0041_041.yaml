body:
  text: 劾魏忠賢疏天啓四年魏大中臣謹奏從古君側之姦非遂能禍人國也有忠臣不惜其身以告之君而其君不悟乃至于不可救今忠賢擅威福結黨與首殺王安以樹威于內繼逐劉一燝周嘉謨王紀以樹威于外近且斃三戚畹家人以樹威于三宫深結保姆客氏伺陛下起居廣布傅應星陳居恭傅繼教輩通朝中聲息人怨于下天怒于上故楊漣不惜粉身碎首為陛下力陳今忠賢種種罪狀陛下悉引為親裁代之任咎恐忠賢所以得溫旨即出忠賢手而漣之疏陛下且未及省覽也陛下貴為天子致三宫列嬪盡寄性命于忠賢客氏能不寒心陛下謂宫禁嚴密外廷安知枚乘有言欲人弗知莫若弗為未有為其事而他人不知者又左右屏而聖躬將孤立夫陛下一身大小臣工所擁衛何藉于忠賢若忠賢客氏一日不去恐禁廷左右悉忠賢客氏之人非陛下之人陛下真孤立于上耳疏入忠賢大怒矯旨切讓次年以汪文言獄羅織下詔獄許顯純酷刑拷訊獄卒受指與楊漣左光斗同夕斃之極言捕務不修疏天啓四年髙推臣聞天下之至微易忽以為不足畏其中實有不可測之憂狃者視為故常識微君子每早計而豫防之若夫四郊多壘鼠張虎視之輩蜂蠆四起糾衆橫劫茍不急圖式遏亂略之策欲成久安長治之業其道無由矣臣自丁未通籍中外無故桴鼓不鳴即有一二鼠竊狗偷夫亦畏首畏尾躡迹潛蹤未有通衢大都之中青天白日之下肆行剽劫旁若無人如今日者惟是東西交訌加派頻仍海內動搖大盜蜂起以畿南則有沙河劫鞘之盜矣河南南陽縣又以劫殺守備張承茂告矣外而窮鄉下邑萑苻探丸陸梁肆害弱肉強食者不知凡幾也以近郊則撫按之家眷截矣出使之少卿又截矣下而弱植孤蹤巨商大賈流劫殺掠道路以目者不知凡幾矣以都門則順天府庫劫銀二千矣真武廟胡同許國熙被賊殺死六命矣若宦遊京邸明劫暗偷吞聲忍氣隱匿不以上聞者不知凡幾也臣甫任京營職司捕務昕夕冰兢食不下咽每私憂過計慮如漢季之赤眉黃巾我朝之劉六劉七往事之白蓮妖寇一夫大呼千百響應揭竿斬木弄兵潢池此其毒有不可勝言者又最可慮者近聞強敵欲從喜峰口進邊逺征既無兵革之足恃近攻亦無捍衛之可慿此其禍又有不忍盡言者臣每念及此肝膽俱裂是可不為豫防哉防之則在守土矣守土賢則捕緝維勤消弭有道大盜無橫行之期守土不賢則玩愒成風禁戢無策小民亦無安枕之日是以渤海之盜以龔遂治之而自平廣陵之盜以張綱治之而自解關中之盜以王溫舒治之而自息若夫今日盜賊之縱橫其弊有二目前弭盜之急者其法有四弊何在盜之生也責不獨在盜也責在捕盜者貓鼠同眠豺狼莫問親識也而故匿之以養交得贓也而故逸之以使縱甚有窺伺上官之意旨密為曲蔽之通同捕盜即為盜之人防賊乃匿賊之輩民何懼而不盜乎然盜之肆也咎又不專在捕役也咎在守土者捕獲計拙塗飾計工盜大也而飾之以為小盜有也而蔽之以為無甚且人贓俱獲而故縱之以示寬上下相蒙茍且了事則捕役何憚而肯拏盜又何憚而不肆乎法何在一曰防微漸蓋小盜大盜之積也為虺弗翦為蛇奈何若夫草澤初起制服猶易胠篋可除則除之探囊可撲則撲之萌芽拆而斧柯矣可令滋蔓難圖乎一曰芟窩主蓋大盜小盜之藪也源之不塞流將何底若夫大憝巨惡亷得主名主竊則坐之以竊主強則坐之以強大羣渙而小羣亦空矣可令盤根據結乎一曰勤捕捉蓋某日失事即令某日嚴拏盜尚未逺贓迹猶存一成鐵案則百喙莫解如驟雨當前令人欲避而無可逃是迅雷難掩之訣也一曰嚴三尺蓋鞫盜慿贓若贓罪既明應流配者即流配應梟戮者即梟戮律例昭然毫髮不貸如烈火在望令人畏之而不敢近是拔去病根之劑也夫令長弭盜之官也若保定若東安若文安不能禦寇而反為寇所劫則平日之疏玩可知已至都城內外容臣與巡視科臣嚴督捕役晝夜緝拏以清輦轂伏祈明旨亟敇各處撫按道府諸臣加意督屬各該有司軍衛遇有強竊即從實申報如半年之內盡數拏獲者即紀録優敘倘有隱匿縱容朦朧不報坐視不拏即拏有不及分數者輕則降級重則三禠庶法令明而人知警人心警而捕緝嚴捕緝嚴而盜無容足地矣此芻蕘狂瞽事期可成如但曰言之而已乎實義之所不敢出也臣不勝激切待命之至疏入得旨盜賊縱橫剽掠皆因地方官巡緝不嚴以致滋蔓這所奏著便行與撫按官嚴行督捕不時申報有違玩的重行處治該部知道請斥魏忠賢疏天啓四年宋禎漢臣竊惟宦豎之惡譬猶人腹心肘腋之疾未露當嚴為防禦既露當亟為殄除絶其本根勿致滋蔓故免于當斷不斷之亂臣不敢逺引即如正德時劉瑾朋比習非初經科道交章論列處分稍濡而瑾遂夤緣復用幾成不軌逆謀雖卒正典刑乃國體所傷實多矣萬歷時馮保欺罔專擅隨被臺臣糾劾神廟遂赫然震怒將保等正罪籍産嗣後近侍斂戢四十餘年間無復敢竊弄威福者矣是在處置姦豎之法遲迅只爭頃刻利害輒判千尋兩朝之已事可鑒也臣前有爵廕不宜輕畀一疏特為太監魏忠賢逞勢弄權已見其端竊思恩寵太過必將怙寵益驕因驕益恣貽禍且有不可言者故以裁溢恩請皇上者實以嚴防馭望皇上也詎意下忱渺薄未足仰回天鑒乃忠賢之恣肆果且日甚一日頃臣堂官楊漣目擊憤發揭其諸大不法狀臚列入告中外臣民莫不傳誦稱快而不意竟蒙嚴旨臣從邸報中捧讀至是欲屏逐左右使朕孤立于上之語臣不覺悚然自念曰皇上而不慮及孤立也則已誠慮及孤立也則忠賢者尚可一日留之在傍哉夫今掖庭之內非媚忠賢而爭求為容則畏忠賢而惟恐獲戾是皇上之前後左右無一非忠賢所植為私人者也章奏之間稍觸忠賢之所忌則必寢閣偶傷忠賢之所愛則必折抑是舉朝之正士忠言無一非忠賢所得而壅蔽者也故忠賢留而主勢適成其孤忠賢去而主威適因以振皇上何可不熟思之也憲臣疏中有謂積重之所移人人秖知有忠賢不知有皇上是正恐黨與漸成而皇上將不免于孤立也故請亟除忠賢庶幾可挽孤立之漸是正體先皇顧命之惓惓而盡忠于皇上之苦心也皇上何可不熟思之也矧忠賢在今日不惟有不容不去之辜亦有不容不去之勢蓋人之姦惟未至發露猶或徘徊蔽飾可望有省改求全之日一至摘發而仍得幸免必益無復顧忌奚啻心驚于騎虎直敢氣揚于張鴟勢固然耳今忠賢姦狀業已昭揭倘不及早處分勢且日益肆志將如縱轡之馬決隄之水馳驟潰裂至于不可收拾羣下所兢兢過計有不止主勢孤立已者弊一至此即寸誅忠賢寧足贖哉皇上又何可不熟思之也且皇上所以未忍遽問罪于忠賢者特以其效勞自先朝耳夫馮保非亦事神祖于先朝為穆廟付託之內臣乎神祖一聞其惡遂立斷而嚴譴之以今皇上躬堯舜之資懋法祖之德豈以神廟能納臺諫之言斷之于保者而皇上顧憖置憲臣之言靳其斷于忠賢乎竊知清燕熟思之下必且奮然振挈乾綱無俟臣詞之畢矣臣昨草疏已就適聞同官具有公疏因即列名共籲冀合詞易以動天聽乃兹尚未奉有霆斷輒敢不避贅瀆干冒宸嚴伏乞聖明念權璫之去留實關肘腋喫緊而乾斷之遲速尤為利害攸分即將忠賢亟賜處治庶收盈廷忠益以俾君側肅清則伏戎不復在旁斯黼座無虞孤立矣臣無任悚栗激切待命之至疏入得旨屢旨已明不得又來瀆奏該部知道極言濫舉縱貪疏天啓四年宋禎漢臣惟外吏三年一入覲受計典至巨矣而屈指今距計事尚無浹月期云屆矣邇者皇上勵精獨斷自柄銓總憲以暨掌科掌道考功諸臣悉廑宸衷慎擇特簡一時大小臣工無不欽仰聖明適當大計羣吏之時丕示人政一新之象甚盛際已臣願效區區冀裨察典萬一者竊以為激濁之用宜莫先于道府而州縣之課當先嚴于甲科蓋臣起家外吏矣嘗見道府錚錚表著者固十居七八然間或有一二不肖者其播惡必倍甚于州縣蓋彼恆自恃為莫敢問也即有問者亦必待于積久不可掩護之餘則其貪壑已盈矣况且有未必問者乎又嘗見甲科中亭亭循卓者固亦十居七八然間或有一二不肖者其狼狽必倍甚于鄉貢蓋彼恆自視為不至敗也即有敗者亦必待于潰濫不可收拾之際且雖寒灰可燃矣况真有不必敗者乎吏弊人情一至于此倘不著實綜核及早摘發則此膏枯髓竭之氓復能堪鴟張虎噬之官哉至于卓異之有舉以風良也乃見舊時在外所擬方面必屬省會道府有司必屬俸深甲科詎知舉異何等關繫使惟省會之是拘則是人因地重又思惟俸深而後預則是挨年取貢耳甚有煩言已嘖于衆口而該省顧惜情面猶欲以混充亦有官評共見為平常而入京締藉奧援徑得以濫竽似斯弊習又何貴干斯舉為也夫卓異者非常之謂須真才通八面而後可謂異人之才須真守嚴一介而後可謂異人之守非常之名必有非常之實方足以當之又必有非常之寵方足以酬之茍既標為異品而考核生平曾無異于儔伍作用則盛名難副或既褒為異等而比及遷擢仍無異于尋常資格則殊典轉輕臣竊謂今次此舉寧刻無徇寧少無多多宜不過數人而止而此數人者尤必採諸本省之報牘質諸舉朝之公論有實見其某地某狀可據為異才實見其某時某事可據為卓守者而後錫以宴奬之榮隨即優以不次之擢是非常之寵與非常之實相副勵世磨鈍道無踰此者倘一時偶難其選則寧闕其典以示慎重勿濫其人以充數也其于風良庶有實效乎贓吏之拏問以懲貪也乃見彈章所臚列贓私每以千百計而究竟莫追其二三即前次大察提問亦十餘人矣詰其贓果能徹底窮究盡數追完以入公帑而佐餉需乎恐未必其然也且如陶朗先六十萬之贓已經科臣勘結千真萬確屢奉明旨嚴追者而猶輾轉支吾廣營開脫矧夫付諸該省之提問者撫按不過下之司道司道又轉下之府廳供贓滿紙追時多成子虛銷繳無期限比祇應故事有懲之名無懲之實吏更何憚而不貪也臣竊謂今次有應拏問諸人其在朝者即付法司訊究至追完日亟行分别配遣以正其罪其在任者移文各該撫按務要勒限問結勒限追完如過限未完即將問官一併參處則犯者足為殷鑒而人不敢效尤問者重于自顧而法不至曲骩其于懲貪庶有實警乎夫兹時司計諸臣皆仰荷皇上特達之知倚任以振久弛之紀綱而滌積刓之治道者則各矢虛公共圖整頓諒諸臣有同心焉而臣尤欲以舉行實政四字為當事者殷殷望之庶幾協方新之人焕維新之政計典因以有光而吏治民生均有賴矣伏乞聖明省覽臣言如有可採亟敇各衙門申飭施行疏入得旨近來吏治日隳甚至濫舉卓異縱貪官該部著實綜核舉行陶朗先如數追贓還作速具奏修政恤民疏天啓四年宋禎漢臣聞天災流行何代蔑有故自古聖帝明王不恃天之不降災獨自恃有轉災為祥之一法從克謹天戒以克享天心無不立效者恭惟我皇上躬天縱聖明之資敷敬天勤民之政謂宜天休滋至而雨暘時若也詎意年來災異疊見入春方有風霾地震之警徂夏而亢旱且日甚一日中外人情莫不皇皇然懼人窮之已極何天怒之未艾耶臣愚竊以為惟君與天精祲相蕩善敗相因故災異之來天所以仁愛人君也遇災思懼君所以善承其仁愛也考昔苦旱之甚者莫如商湯之世而致雨之捷者亦莫如商湯之世觀其禱于桑林以六事自責言未已而雨方數千里矣是惟君乃能格天也明甚載觀其首舉以自責者曰政不節歟民失職歟是格天當先圖其政與民也又明甚兹誠欲轉災為祥轉旱魃為甘澍即羣臣深憂私懼無益也惟在穆清之上于政與民之間實加之意而已夫政最關繫者莫大于詔旨之傳宣臣伏覩冬春以來言有稍觸忌諱輒多留中即忠藎補牘而竟靳吁俞今之恆暘而不雨得無應是歟近且有甫奉明綸旋聞反汗令臣下惶惑而莫知適從今每欲雨而復暘得無應是歟以至讜直之優恤屢經籲請猶未得焉而恩詔幾莫彰夫大信中旨之親裁間出票擬所弗及焉而輔臣苦莫效其贊襄是皆關于政體之大者而已有不節之虞漸成否塞之象又安得不為亢旱之徵也乃民之失職尤莫今日為甚矣比年徵調頻仍而戰死者逃死者不知塗炭幾許生靈邪教蜂起而從妖者敵妖者不知芟除幾許民命此其厲氣原足以干天和而況弊政又足以離衆志自加派之令日繁閭閻之脂膏血髓已遍吸遍乾焦枯而無起色自考成之法日峻有司之追呼敲撲每如焚如灼悉索而無了期即使天行無水旱之災而比屋空虛到處蠢動識者已切把憂更奚堪夫災祲之稠疊耶臣憶去嵗給假家居時適值臣鄉纍月苦旱米價踊騰人情洶洶在福州則古田閩清在建寧則松溪浦城在漳州則詔安山谷間遂有聚衆千百揭竿肆掠者不旬日而亂萌踵至闔省震驚賴一時在事諸臣協力幹旋幸不及于大亂者幾希耳乃今以臣所聞旱魃不獨在京畿也外而河之南北山之左右楚蜀關陜之東西皆非無事之國也而皆有赤地之災無麥秋之望飢饉方且洊臻盜賊安得止息是民已思亂而天復若以旱挑之亂焉言念及此誰不寒心尚可泄泄焉不為此孑遺計哉今之時加派雖未易卒省然如科臣所言陶朗先何棟如等確有實迹之贓共有數十餘萬尚無一文之納查皆久經奏題奉旨抵餉矣獨不可上緊勒限盡數嚴追或亦可寬加派之銖兩乎考成誠不得不嚴然如餉臣所言舊額遼餉三年內計共該一百四十餘萬未經給發不審貯解何地業已奉旨查覆矣獨不可立刻清出給濟夏餉或亦可緩考成之須臾乎他如徵收火耗一節非不屢奉嚴旨禁革炳如日星無奈有司奉行猶然褎如充耳祗見餉額有加則耗羡輒隨之加倍故加派者小民無窮之害而不肖有司之利也有察吏之責者獨不可加意詳訪不時特糾數人正法追贓懲一警百或亦可令陋規之漸洗民生不至重傷乎蓋方今之民害已如火之燎原不可撲滅但得寬一分則民即稍寬一分之生機緩一刻則民即稍緩一刻之死路故求莫求寧者能就未易猝省中曲求其省就不得不嚴中曲解其嚴猶庶幾于失職之民補救萬分之一即于惠民之天挽回萬分之一耳至于州縣俸未及期者議暫免覲俾各地方得免署官之騷擾而復得賴正官之撫綏各有司得省道里交際之浩費而且得免因公科斂之汚名誠為救時良策業經科臣尹同臯與臣同官李應升劉之待先後具疏蒙允下部計當事者軫念民艱必與覆行然覆之此其時矣倘更遲時日則越在遐方者恐已俶裝于途借以派索者恐已染指于鼎又何如速覆之利民更普也凡臣所言或諸臣所已言而未見諸行或諸臣所欲言而未竟其説竊念就政與民之間以求格天之實端不越此輒敢不避瑣聒懇乞皇上仰念譴告之藴隆俯軫孑遺之湯火慎傳宣于出政之地速敕所司布寬恤之條則側身思過既逺同乎商湯而露禱致誠更近法乎神祖如是而天心猶不昭格天澤猶不旁流者臣請受妄言之罪伏望聖明採納施行臣無任悚栗待命之至疏入得旨旱災修省當條行實政何得動議詔旨且軍餉緊急欲以追贓抵充加派遼餉方查舊額便欲停緩考成此等條陳緩急何賴宋禎漢不諳事體姑不究該部知道矢心入告嚴杜請託疏天啓五年范景文臣行能淺薄一壑自甘久已無志世用猥蒙聖恩不棄起之田間俾以典劇自揣病軀綿力重任難勝兩次具呈堂官求為代題而嚴旨赫然立催受事臣即沈疴委頓何敢再為偃蹇且當聖明勵精求治臣亦妄思澄清銓序有以上禆聖治萬一則臣區區私願也今天下圖職業之念不勝其圖榮進之念愛名節之心不勝其愛富貴之心舉國若狂嗜進如鶩每怪古今同此人也何遂茅靡瀾翻至此毋亦衡鑒之地先自不清巧營者一嵗數遷拙守者幾年不調天下亦中人多耳此實教之使競而欲其恬漠寡營詎可得乎臣即不肖不願使奔競之風自臣而開伏念除者有嵗格其久近不得而私也遷者有資勞其深淺不得而私也特擢者有績望其髙下不得而私也一人欲私不可得即欲私一人亦不可得斯不亦明白畫一與天下可共循乎若不論三者更于何論其由别徑不問可知將何顔以對天下且年來舞文玩法吏弊叢生幾不可問矣今欲直窮到底一清穴窟而自已先有拖帶打疊不淨官長作事最難欺者左右對此輩又何以為顔臣今與需次諸臣約一行請託臣不能為之諱臣又與同事諸臣約一聽請託亦願諸臣勿為臣等諱選人如林鱗集都下臣不能以一人障其目而箝其口也明矣且臣非故為矯飾不情也誰無交知誰無情面臣亦豈與人異惟是自反生平不慣俯仰一意報國先在不私寧忘交知破情面而必不敢負君父以負此心耳天下人材為天下惜之朝廷名器為朝廷守之天下萬世是非公論與天下萬世共之人還其人我無失我此臣心之可自信者而四方之人恐未必信臣之素夤緣熟徑入人膏盲不有以力砥之而競逐無已亷恥風微其為世道安所終也臣故豫揭癡腸苦心道破無非欲天下各圖其職業各愛其名節恬漠寡營共偕于大道豈曰小補之哉自成成人之道似無先此除銓政大端稟臣堂官次第上請而夙昔盟心首以入告伏祈天語丁寧庶無隕越臣無任激切待命之至疏入得旨這本説的是以後升除推用一循資望可挽競風務著實行如有故違請託的指名參奏該部知道簡兵屯守疏天啓五年朱燮元臣謹題為備陳協戰之難亟議固圉之策伏祈聖明治臣不效之罪立賜禠放敕部速議良圖以無誤封疆事臣行能淺劣濫荷重任適黔禍震鄰奉旨協援屢接黔省督臣蔡復一手札移會春初舉事臣因各兵調集一面檄各將本年正月二十六日誓師二月十一日會兵大方一面移咨黔督去後至二十七日遵義監軍僉事盧安世呈報到臣云黔省大兵已檄正月十五日渡河奉黔督令二十七日會兵水西城適該省參將許成名于二十日到府隨于二十二日會兵進發等因臣遂飛檄永寧一路鎮道毋泥前期俱于正月三十日點發過河至二月初二日據盧僉事塘報副總林兆鼎率同侯良柱陳一龍等併黔中副將許成名會兵先發板山營胡斯化等攻破樂蒙沙溪巖孔一帶併力前進至二十三日于白蠟坎與賊對敵賊勢猖狂我兵出竒分三路包截將賊殺敗斬級三百六十三顆二十四日至八里水西賊追趕陸廣官兵甚急我兵接抵護出趙僉事并滇毛兵七八千等因又據大將李維新道臣謝渭許士竒劉可訓塘報副將秦衍祚同鄧懋官潘應奎孔全斌等前進赤水一路初五日至層臺有馬兵殺手至海子大路來截各兵奮勇對敵斬級二十顆生擒五名俘獲男女一十五名口器械牛馬不計坐營劉宗良張洪烈郭起柱張令等前進龍場一路行至養馬司賊猶擂鼓渡河張令衝鋒右手重傷一箭追賊大敗共斬級三十餘顆溺水死者無算自是兩路賊俱深避不出捉獲黔省潰兵王佐等始知黔兵已退各將疑阻未敢遽進等因臣當檄各兵撤至赤水衛馬鈴堡兩處屯劄一面差人至黔省移問進止知該省路苗蜂起未能再進臣思嚴兵待敵已匝一月賊雖逺避必有狡謀該省業已暫停偏師未可深入隨于三月十二日檄道將退還永寧減汰新調且耕且守聊固吾圉獨是仰奉成命經營嵗餘不能建尺寸之效以慰皇上西顧之憂纓髮徒懸逍遙貽咎臣之罪于是無可贖矣顧臣碌碌所處實難敢誦言而無諱可乎夫奢崇明父子雖未正藁街之戮然黨羽擒斬財用罄乏獸奔鳥徙仰人鼻息所恨者安酋未受戎索甘為逋匿耳臣稔知安酋原非徑敵去嵗犯黔普定三戰而三大敗今嵗犯遵義亦大敗夷之最驍雄無如魯仲賢羅竒前嵗犯古藺一戰而擒斬厥後傾巢犯永寧又一戰而宵奔官兵非畏之也秪是一入其界百徑千岐既佯退以誘我又扼險以邀我髙山密箐倚木皆巢深洞峭崖無處非窟重以陰雨晦蒙罕覩天日雖有智勇未免張皇夫人能搏出山之虎而難逐鋌險之鹿者形不利勢不便也今日用兵全為三逆即殺賊數千百人而不得元凶何濟于事此一難也兵既深入夫運必不能前採野無獲伏莾難防無論利鈍難知即戰而勝黔滇不牽其前賊併力邀截必犯惰歸之忌此二難也據黔督移約令蜀兵東出遵義西進畢節而黔專進陸廣是蜀環賊之三面而黔獨處一又以水西城為信地計黔省至陸廣為程二日由陸廣至水西城亦程二日蜀自瀘州至永寧為程四日自永寧至水西城為程九日由遵義而進無官程可稽然大約須六七日多寡逺近之數迥然懸絶此又難之難也夫蜀民之困極矣馬已竭而猶求鴻欲集而無所吸髓既空揭竿欲起外則建昌松潘羣夷在在跳梁內則屯戍各兵嗷嗷待哺畫地之餅難啖無惠之法難振如臣庸暗實所不支昔馬援平交廣狄青取崑崙皆越二三年而始得賊首當時未聞鄰酋有如安酋之肆逆亦未聞官兵直窮其所匿也今日即不言戰而言守遵義逼近酋穴酋豈忘情永寧赤水原非蜀衛奈地當全蜀之衝羣苗咸伺新附未馴勢不得不守是蜀且新增二邊稍有疏虞難遮竊發臣所為日夜倣徨寢食靡寧者也顧臣不獨為蜀憂且為黔憂蜀尚有民而黔已無民蜀尚能耕而黔久不耕無民誰則為兵無耕何由得食招募土司徒滋騷擾之害逺候轉運更多劫掠之虞計日而戰數米而炊前跋後疐其苦更倍幸督臣蔡復一按臣傅宗龍皆赤膽徑骨肆應有餘西南半壁自當廓清但願皇上寬以嵗月大發糧餉勿玩小醜而急撻伐之功勿惜小費而掣任事之肘務令完固根本翦除支蔓足兵足食一舉而殱厥元凶即蜀局且不勞而結此不兩待之勢也臣方草疏據僉事盧安世揭報督臣蔡復一將移鎮遵義此扼賊項背最得地宜伏乞敇下户兵二部速議便宜推廣餉額專委任而責成功戰勝固已在廟堂矣臣庸碌病軀不稱厥職自審甚明不敢逃罪仰望聖明立議削黜俾存殘喘髙厚洪恩銜戴其有極哉除留兵需餉另疏陳乞外為此具本謹題請旨疏入帝從之御選明臣奏議卷三十八
