  text: 欽定四庫全書御選明臣奏議巻十一
  hash: sha256:901daf342ca98dd5f55d6dc6aaa87fee21b72aad11fa70f218139f297fbaa4e3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_014-1a, image: WYG0445/WYG0445-0180a.png}
body:
  text: 議行武舉疏𢎞治十七年劉大夏臣惟武舉之設將以攬延英雄廣儲將帥招徕韜晦之士収拾跅弛之才葢以古今治天下之具惟文武二道天之生才以供世用惟文武二藝凡國家求相于文求將于武亦惟文武二科我朝設文舉足以備一代之彞典而其網羅之周自閥閲以及草澤均得人以備任使其用武臣也甄别軍功之大小以為陞擢之階級内㦯陟督府之崇班外或膺邉方之重寄世享簮纓家足餼廪奬勵武臣作興士氣意甚善矣但求止于武弁一途凡授鉞推轂非出于貴寵之子弟即拔自行伍之粗材近嵗有保舉將材之例又但據其現有官職之人其間往往徇名而不責實挽強引重者視為勇敢談説縦横者目為謀略及委以重兵臨以大敵僨事者多而成功者少葢因求將之意雖勞而選將之路太狭也宋臣范仲淹有言議者不知取將之無術但云當今之無將今日之弊殆亦坐此且天之賦人以才絀于文者或優于武不以逺而嗇不以賤而限如穰苴生于寒微呉起困于羇旅樂毅出于疎賤黥布雜于輿臺若當時非有知識之人為之汲引豈能自致通顯建功于世而垂稱于後耶夫武以用將為先亦猶文以求相為先孫武曰將者人之司命國家安危之主也司馬曰將不能設無以應卒昔唐之求將之為重視進士科而増置武舉遂得郭子儀卒成再造之功宋知求將之為重視制科而詳定武舉卒能科元昊之背叛破智髙之猖獗葢異人傑士咸奮興以赴功名之㑹此前代故事有足徴也宋臣蘇洵言于仁宗曰文有制科武有武舉陛下欲得將相于此乎取之十人之中豈無一二此名儒格言為足徵也兹者適當武舉再開之時法制未備禮義未隆上未足以恊旁求之心下不足以副登進之望宋臣富弼請置武舉嘗曰法度粗率未能致特起之士臣竊與之異世而同懷也葢事既當重則品式宜加詳備恩禮宜從優厚今欲依倣唐宋故事參酌㑹殿二試事例少加損益每遇文舉鄉試之年亦將武舉豫期行移兩京各省令其轉行曉諭如有究極韜畧精通武藝者或隠于山林或育于學校或羈于戎卒或係于士籍許赴所在官司投報果可取者禮送兵部㑹萃數目請于次年開科初較騎射二較步射三試䇿論優者列職論官以示崇異其非全材黜之以俟後舉此制酌定庶法式昭宣足以備彛憲禮遇崇重足以激人心凡海内智勇之士莫不仗劒而起各售其術期以効用于世是驅天下之英雄而入于吾之彀中陛下合羣策而用之何愾之不可敵何侮之不可禦伸威萬里將無不如吾意者又何必思借才于異代也哉疏入帝從之覆金洪陳邊務疏議𢎞治十七年劉大夏臣等看得陜西巡按金洪所奏後開十事俱係邉方要務本官親歴其地奉敕閲實聞見必眞擬合逐一對款議擬伏乞聖明裁處一嚴燒荒以安邉也查得每年秋深草水枯乾之時本部請敕各鎮守臣并獨守一方内外官員先行差人哨無敵情然後行令副參等官各照地方出境燒荒巳有常行定例但將官實心奉行者少欲于燒荒畢日重復出境查驗勢恐難行今詳本官所奏之意則是套内敵情有無可以驗燒荒虚實合無通行各邊今後每年燒荒官軍回日巡撫務要盤檢有無牲口帶來日後如有外夷在套或近邉住牧就遣夜不收哨探在何地方離邉逺近查與原報燒過里數若干就將原日領軍出燒荒將官指實參奏拏問之本處查有入邉失事緣由依擬降謪一修城堡以固邉也查得近該延綏守臣奏稱本鎮寧夏至定邉營一帶地方衝要應行修築邉牆等因巳經題行總制衙門公同守臣勘議具奏外今本官又奏前因大意在于選用巡山官員修理各該險阻事在彼處難以遥制合無備行總制秦紘公同二鎮守臣一并查勘備由且奏一揀將才以鎮邉也看得本官閲視地方開奏各官賢否應當參酌所言處置但延寧一帶為事將官近該本部奏稱敵衆過河要人隄備已經奉有欽依姑令記罪前去領兵隄備候敵情寧日照舊問結所舉王㦸魏鎮藍海案候聽用外所具開奏馬隆姜漢亦各稱有將官器度宜當俟其後效傅釗張翼既稱其怯敵圖利無才貪殘合無行令總制幷各該巡撫再加詢訪的確候各官問結之日另行具奏定套一放土軍以信邉也查得先為急募土兵以禦敵人事招募過延寧二鎮土軍共二萬一千三百七十六名編成隊伍闗與軍器各隨衞所營堡食糧就令原招人員管習武藝情願常操者補作游兵之數其餘分作兩班每年十月起至開年三月止每班備禦三箇月該管官員敢有科擾及擅勾非時公私役使者參奏究治等因題奉聖旨是欽此欽遵通行去後續該彼處守臣奏稱各軍情願留操及將沿邉増設衞分就將各軍編發補伍行令勘處間今金洪親歴其地據告真情稱比先招募之濫近日拘留之苦供貼之難甚至願將原賞銀兩送官疎放中間難保其無揑作願留及科擾役使之弊合無將金洪所言備行總制秦紘候邉情寧日選委二司能幹著實官員各赴二鎮將原招軍士逐一清審明白乃查照欽依事理除著實甘心願留補作游兵其餘俱責令里老及該管人員保領照例冬春輪班操備夏秋放免歸農遇有重大敵情一靣移行巡撫巡按㑹同拘集一靣奏聞拘操之日照例支糧中間查有死亡相告明白即與開除願補者聽詭名揑報逃走者就拘原報之人正身及父兄子弟頂當仍將審過實數并處置過緣由咨部知㑹若查有科擾等弊應挐問者拏問應參奏者指實參奏一教騎射以禦邉也看得操練官軍騎射係是將官本等職業今金洪親歴其地比驗軍士如此不堪該管將官所幹何事巡撫因何扶同不言况事在人行兵敬中制合無不必本部立法差官止將金洪所言通行各邉總兵今後務要嚴督副參管官用心設法教習騎射巡撫不時比驗將把總管隊等官量行罰賞若將官果有中間不肯嚴督操練虚應故事即便俱實奏聞御史按歴去處比驗軍士若果驗射不熟及詢訪將官止知掊剋私役者指實具奏本部將巡撫總兵一并參奏取自上裁一節工役以逸邉也查得先該寧夏守臣各奏稱勘議過本邉原有古渠三道東渠中渠現通水利可遏敵路惟山邉一渠内地方似為敵境欲將舊渠挑成河塹以限戎馬多得地利以資邉儲本部議得工程浩大難便輕舉仍行各官㑹同巡按再行計議迄今三年未據奏報今本官奏稱所開之渠地髙于水不能灌溉山口多石功亦難成並據寧夏久疲未蘇之人何以堪此合無備行總制秦紘移文該鎮守臣從長計議如果此渠難以施工徒勞無益即便停止咨部知㑹一用精鋭以助邉也查得各邉遇有敵中走回人口審有的確鄉貫者送發寧家完聚免其雜差係現行事例今本官奏要將前項在敵年久走回之人俱令就彼便所收入隊伍槩與糧賞是亦選用精鋭用防邉鄙之意但此輩被擄日久自意骨枯草野不復與父母妻子見面幸而脱死生還情難一槩强留合無行移彼處鎮巡官員今後被擄走回審有鄉貫之人若果精鋭情願在邉殺敵者量給賞勞與邉軍一體收伍食糧不願者仍照舊例施行一分地方以理邉也看得二司官員巡守必須地方便利方可責成今闗西河西二道既地里逺近懸絶難于遍巡則一方庶務何以督理而貪官汚吏安知警懼金洪所奏亦為有見合無仍行陜西巡撫再行參酌奏内事理如果前項所定地方均停從宜更改行令二司官遵守施行一慰死事以勸邉也查得孔壩溝死事官軍近該總制秦紘具奏本部議擬具題節該奉聖旨是朱鼎妙齡武臣許慶湯璽各贈官二級仍查他子孫照例襲陞其餘陣亡官軍便著查明來説定奪欽此欽遵通行去後及又查得本部題准事例凡夜不收公差人役被敵殺者死賞銀五兩擄去者亦賞銀二兩以恤其家今本官又奏前因緣各查有前項題行事理難再别議合咨都察院轉行本官將前項奏行陣亡官軍事情作急勘報及今後有公差夜不收被敵殺擄者照例具奏施行一分賠補以恤邉也查得官軍騎操馬匹除追敵燒荒等項公差倒死免追其餘槽下倒死告相明白官軍朋合出銀馬主出備椿頭官為通融買補此係奏行事例其朋合之例每年終止令六個月按月每月都指揮出銀一錢千百戸鎮撫出銀七分旗軍出銀五分椿頭之例倒死馬主都指揮出銀三兩指揮出銀二兩五錢走失者鎮撫出銀二兩旗軍出銀一兩五錢走失者各加銀五錢今金洪因各邉見騎操馬匹追補不均要得查究倒死縁由分别免追一節最為有見既查有前例相應通行遵守合無本部移咨各該巡撫及咨都察院轉行本官各仰所屬衞所官軍務要各將騎操馬匹用心愛惜餵飬臕壯以聽調用内有因公追敵等項致死者免其賠補官給馬匹醫治不效者即係槽下倒死之數照例追徴椿頭銀兩貼補朋合銀兩買補其有為因私事走死及諸般作踐倒死者查勘的實即追好馬一匹還官或追銀十兩在官買馬各邉一體通行不許偏執致有彼此不同則馬政不致廢弛矣議奏得旨准議請立記注史官疏𢎞治十七年儲巏臣伏見陛下即立以來屢垂清問召見大臣至于今歳舉行尤數或究典禮或詢治道或綜核庶職或制御四方邇者又親御午門讞審大獄盛徳偉績垂耀無窮非臣之愚所能殫述臣聞尭舜之徳文武之政所以布天下傳後世者賴有典謨方䇿之存使非史官當時紀載則後代君臣何所誦法故古者設立史官左史記言右史記動職綦重也臣備員班行每覩陛下宣召羣臣奏對多係帷幄之語造膝之言近臣不得聽聞史臣何由紀錄臣竊惜之夫前代史官追述往昔尚且網羅散失摭拾傳聞以成不刊之典豈及今日宸衷睿想之所形聖謨神斷之所著明並日月炳若丹青顯然可書足以傳信乎且儒學里塾之士門生弟子更相問難猶有實錄年譜以備遺亡陛下傳精一之學臨埏紘之衆勵精圖治益大有為自此延訪日廣政事日新葢有不可勝書者顧乃無所纂記以貽來世非缺典歟失今不圖誠恐歳月緜逺耆舊彫謝或遺失莫存或傳聞各異事蹟無以究其始末日月無以攷其先後雖悔之亦無及已竊攷本朝史職似與前代稍異臣愚欲乞陛下特敕在廷臣僚先後曽蒙召問者備錄聖旨奏對之詞具本進覽宣付史舘如事涉機密不宜宣露者御覽訖仍乞封識付之謹密之臣藏諸深嚴之地所謂金匱石室者以俟將來庶聖君言動舉止無所遺羣臣論説亦以附見洪武年間嘗有起居注陛下儻採臣言而行之遵祖宗之典貽萬世之謀臣不勝至願疏入帝從之豫處邉儲以備兵餉疏𢎞治十八年楊一清臣竊惟圖事于平時者易應變于倉卒者難先年陜西因不曽先事儲蓄及至敵人入套動調馬軍奏開課鹽若干萬引運送官銀若干萬兩舉行納銀冠帶等項事例敵尋出套師旅既罷倉庫一空徒為乘時射利者之地而民遭餽運轉輸之苦逮今比屋蕭然生理未復向使敵人不退兵連禍結内變將作何以為計言之可為寒心邉報稍息上下相安遂謂無事儲蓄之䇿廢而不講頃者敵復入套烽火絡繹計所儲在在不足相顧駭愕仰給朝廷幸而敵人悔禍逺遁設或潛伏河套經年不出來秋大舉長驅深入縱然不惜府庫之財以充供軍之費而地方所出有限倉卒亦難辦給此皆失于先事儲蓄之過也且如每草一束平時價不過二三分遇急收買費至七八分一錢而無措每糧一石平價時不過五六錢遇急轉輸費至二三兩而不足此理甚明人豈不知其因仍玩愒良亦有故今之士大夫任耳不任目惡聞人善而樂談人之過失寧倉卒而勞費人無非議平時招糴増糧増草則羣而譁之以為多事甚則疑其因以為利用是凡厥有位卑者茍且自保幸免罪責尊者因循悠忽坐待陞還有能實心為公家任事者寡矣臣竊恐議者因見延寧小㨗地方稍靖遂置邉儲于度外萬一有警又將貽後時之悔深慮郤顧不得不極言之皇上伏望俯念陜西闗中重地邉儲缺乏太甚所宜急為豫處乞敕部于陜西闗中兩淮等運司常股存積等課鹽百餘萬引及今招啇于夏秋收成之後糴買糧料草束查撥固靖蘭州環慶各該邉堡屯駐軍馬缺乏去處上納仍要斟酌敵情緩急如果敵人在套盡收本色量寛斗頭使人樂趨不許嫌避誤事若非𦂳急敵情又當酌量年歳豐歉年豐有收則廣為招糴不厭其多如歳歉收薄則量收一半本色以防目前之急仍存一半銀兩以為來歳之圖免以不貲之財坐為營利者所得其他充實邉儲事宜擇其有益地方無損治體者為之大要使邉倉各有二三年之儲則遇警不致于告乏布政司常有數十萬兩之積則臨期尚可以有為此在巡撫督同布政司官通融處置次第舉行居常勿習于玩臨事勿傷于急則事集而人不及知不必取旦夕之盈為張駭之舉重費其力以資勢利此愚臣為兵事謀為民事謀為治體謀之惓惓也疏入得旨是著各官上𦂳趨時整理務要處置停當邉儲充實無致臨期缺乏經要理害邉防疏正徳元年楊一清臣竊見陜西各邉延綏城堡據險寜夏甘肅河南阻隔敵人侵犯止在本境為患猶淺惟寧夏花馬池至寧州一帶地里寛漫城稀堡疎兵力單弱一或失守敵衆拆牆而入其利害不在寧夏而在腹裏必將犯我環慶侵我固原深入我平鳯臨鞏等府州縣倘兵連禍結内變或因之而作根本動摇誠非細故成化初年敵人在套彼時未有邉牆恣肆出入後因巡撫寜夏都御史徐廷章等奏修邉牆二百餘里開濬溝塹于延綏又廵撫延綏都御史余子俊修濬完固敵人知不能犯不復入套者二十餘年世平人玩邉備稍疎牆既日薄溝又日淺𢎞治十四年敵人由花馬池入犯内郡戕敗我士卒魚肉我生民敵人得志殆蔑我邉牆為不足畏連年擁衆拆入我軍動輒失利先是寧夏鎮巡等官太監張僴總兵官郭鍧都御史王珣等節經議奏請將舊邉牆幫築髙厚邉塹挑濬深濶又該提督軍務都御史史琳等建言請于花馬池韋州設立營衞摘撥腹裏官軍防守兵部奏行總制尚書秦紘勘處本官泥于所見止添修四五小堡及𢎞治十七十八年冬敵復大舉自花馬池清水營城堡攻陷花馬池官軍殘害上厪宵旰之憂特命愚臣整飭經理臣雖闇劣厯官陜西邉事頗常究心但腹裏頻年旱荒倉廩空虚饋餉不繼敵人動號數萬倐聚忽散出沒不常未至而廣徴士馬則徒費芻糧既至而調兵應援則緩不及事緃使大兵既集務速則彼或不來持久則我師先老恐終無以代其深入之謀阻其方張之勢臣歴延綏一帶邉牆城堡墩臺逐一閲視及將原勘議事情㑹同陜西鎮巡諸臣廣集衆思兼收羣䇿參酌損益其大要有四修増牆塹以固邉防増設衞所以壯邉兵經理寧夏以安内附整飭韋州以遏外侵當務之急莫先于此但修邉一節地方財匱民勞興此大役必多異議然利害有重輕闗繫有大小土木之害較之搶殺為小動摇之患比之勞費為大大事可成則小費不足計逺效可圖則近怨不足恤且今河套即古朔方地唐張仁愿攝御史大夫代朔方總管築三受降城置烽堠千八百所自是突厥不敢踰山牧馬歳減鎮兵數萬夫古之舉大事者未嘗不一勞而永佚受䧏據三靣之險當千里之敵國初舍受䧏而衞東勝已失一靣之險後又撤東勝以就延綏則以一靣之地遮千餘里之衝遂使河套沃壤棄為敵巢深山大川勢顧在彼而寧夏外險反在河南此陜西之患所以相尋而莫之解也兹欲復守東勝因何為固東接大同西接寕夏使河套方千里之地歸我耕牧開屯田數百萬用省内郡轉輸斯為上策及今將延綏寧夏一帶邉防設法整飭蒐選守軍策勵將士修車馬備器械儲糗糧明斥堠今冬敵人若復侵犯仰仗神武之威謹當督率諸將㳟行天罰雪恥除殘臣之志也臣何敢幸一時之安而委患于他人哉疏入帝從之豫處兵機疏正徳元年楊一清臣愚以為敵人自𢎞治十三年延綏大同官軍失利之後横行無忌𢎞治十四年深入陜西腹裏殘害生靈動以萬計𢎞治十八年宣大遊兵全軍覆沒又河凍之後連年窺伺陜西既未遭挫必無懲戒今冬踏氷入套之舉難保必無既入河套必不安静臣方部署將士振揚威武已將沿邉直抵腹裏分為四路布置主客官軍相機邀截但兵少敵多未免一以當十出竒制變事不得已愚臣以今冬深河凍敵果入套宜徴調宣大二鎮遊竒官兵于延綏中東二路住劄並聽張安節制若止在套住牧未嘗擁衆内侵則嚴兵自守決不輕敵自起邊釁如仍前深入固慶等處搶掠行令延綏鎮巡官選人分投出境哨探敵營逺近衆少㑹合主客官兵豫先分布逼近敵營城堡如在一二百里之間有機可乘致原擬沿邊中路邀截之兵依舊不動以延綏東路參將時源所領本鎮三路軍馬與臣近日挑選先鋒竒兵官軍三千名以為馬戰總兵官張安領本鎮選定頭撥等官軍三千名次之以為中軍大同遊竒兵馬左右二哨及宣府遊竒兵又次之以為外援太監劉保都御史文貴領本鎮兵馬並本隊官軍于牆外二三十里列車為陣分布得宜晝伏夜行各相去二三十里擇形勢利便之地為營以待務使聲勢連絡前後相望我兵既近敵壘奮勇疾進衝其腹心敵既潰亂舎其羸老而戮其壯徤奪其鎧馬而縱其牛羊大同之兵堅整嚴備不許貪利輕動前鋒勝負未決恐無聲援必待其既回以為羽翼布置較之先年出境分布疎逺孤兵無繼訖難成功者不同敵人千里趨利日久疲弊聞我傾其巢穴必自遁歸我腹裏之兵躡之中路之兵劫之沿邊之兵又夾而邀之敵戀巢之心既勝欲戰之志不堅必然潰敗安邉制敵之計莫快于此疏入得旨是閫外之寄卿等所專出竒制勝事難遥度務要計出萬全以除邉患無致疎虞陳政令十失疏𢎞治元年李東陽臣伏念陛下嗣位之初臣等輔導啓沃多見施行少伸報稱近數月來往往旨從中出畧不預聞有所擬議率多改易詔書不信政令失中姑以其重者言之啇人譚景清等附託皇親奏討殘鹽既不肯奉詔還官又不肯領回原價挾制朝廷摇撼官府沮陛下之羙政累母后之盛徳諭其情罪死有餘辜且皇親之家既以辭退家人引自此啇人者已不相干而乃曲為庇䕶寜使帑藏空虚邉餉匱乏而不知顧此政令之失一也大同隨征所開衝鋒破敵三次當先二項揆之舊制俱不當擢況紀功官原開按狀不係對陣侍郎等官看得功無顯迹又無明證名字不對多寡不一而乃循近年弊政欲遷數百宂員以官法為人情視爵祿如糞土此政令之失二也内府宂員奉旨裁節僉書守門及分守守備等官減革者百無一二而南海子淨身人又選八十餘名非惟傷財害民抑且敗壞風俗至于蠎龍玉帶濫賞無算大壊名器尤不可言此政令之失三也御用監書篆缺人吏部奉旨攷選乃令革退人役通送本監攷校優劣是不信銓衡之任而信寵倖之臣況該部查出革退之人俱係夤緣傳奉詔下裁革者曽不幾時遽開此例則匠官術士倣傚成風以邪路為當行視詔書為故紙此政令之失四也他如皇壯田土已令巡撫查數官又復差官踏勘取者未回差者繼出帶領人役騷擾地方京畿小民何以堪之此政令之失五也駕帖出外收人累經各衙門論奏恐生詐偽近因皇親家人奏愬畿民侵佔田土輒為給帖提解來京鎮撫司訊問情節俱與原奏不同未免仍解本處官司問理牽連負累冤苦無伸此政令之失六也韋興等人蠱惑先朝盜空庫府一則夤緣分守累効不退一則奏請追究止令取回遷延至今未能典刑此政令之失七也各營執事官軍及内府軍匠俱經奏准查付團營及各衙門乞留仍復照舊廢營伍之藉供私門之用此政令之失八也内承運庫銀兩支銷累數百萬内府支用不給印票該庫内官日請查算竟爾不行司鑰庫銅錢該部累奏支用展轉推延至今未發此政令之失九也饒州瓷器奉詔蠲免二年又令起運來用此政令之失十也似此之類未易悉舉臣等或𫝊聞坐視無可奈何或封還執奏不能終止其為失職實所難辭退思先帝寄託之言仰念陛下委任之意若涓埃之力少有所禆犬馬有知猶當報徳豈忍于主少國疑四方多事之時潔身去位自求便安但忠不足以格君才不足以濟世向者所陳奉有聖諭云朕便處治至今未見施行又奉聖諭云待斟酌施行是必言無可采乃使之照舊輔導亦不過仍前失職而已乞特賜罷歸亟選非常之才俾任難為之事庶可以上回天變下慰人心承先帝付託之隆保祖宗基業之重矣臣不勝懇廹激切之至疏入得旨所言事件著各衙門查奏定奪卿等盡心職務以副倚任該衙門知道御選明臣奏議巻十一
