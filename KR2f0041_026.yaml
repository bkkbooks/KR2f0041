body:
  text: 議處浥爛倉糧疏嘉靖十四年韓廷竒臣謹題為議處年久浥爛倉糧以濟時艱事據宣府前衛申據本衛豫備倉委官現監鎮撫劉鎮等各呈告自嘉靖二年起至嘉靖十三年四月終止除放支外現在倉粗細糧五萬五千三百八十三石有零在厫盛放年久節次查盤踏屣虧折坐問侵盜經收人員晝夜憂慮性命猶輕錢糧為重地氣濕浥米粒日漸蟲餐經年看守有損無增愈加致纍不得聊生等情具申定奪等因到臣行間續據宣府左衛申開豫備倉委官現監千戶楊欽現任千戶竺雄等名下現在粗細糧一萬八千五百二十九石有零宣府右衛申開豫備倉委官現監千戶尹鸞現任千戶李政等名下現在粗細糧八千四百八十二石有零興和守禦千戶所申開豫備倉委官百戶李雄等名下現在粗細糧三千五十石七斗有零亦各稱年久日有壞爛無支放之期又據千戶王鎮開稱在城時估每絲銀一兩糴粟米八斗又據軍人郭驢兒等亦稟稱米價甚貴正當青黃不接之期折色糴米養贍不足乞要放支本色等情通據得此臣會同總理糧儲戶部郎中議照前項倉糧委因年久浥爛經收人員問罪追賠往往至于家破身亡其現在倉糧臣等取而視之委將浥爛目下青黃不接時值委為太髙軍士糧價月止六錢五分糴糧不過五斗委于養贍有所不足又召商糴買銀一兩三四錢方可得糧一石而米價愈至于騰踴若不因時議處何以克濟時艱合無將前項倉糧借支給于本城軍士作為月糧候秋成之時將萬億庫所貯軍儲銀兩糴買抵斗還倉如此則一轉移之間有五便焉以陳朽而得新好國儲不至于有虧一便也軍士得受其實惠而不至于怨咨二便也富商不得専大利而時估可平三便也所費錢少而得米多四便也經收人員不至銜冤負枉破家而亡身五便也再照倉糧之浥爛米價之髙貴軍士之缺食不特鎮城一處為然在各邊亦多如此而米價之貴又有甚于鎮城者亦合通行從宜酌處倘如䝉敕下該部再加議處如果臣等所言可采乞俯賜施行則臣等幸甚地方幸甚疏入帝從之諫討安南疏嘉靖十五年唐胄臣竊惟今日若欲安南修貢而已兵不必用官亦無容遣若欲討之則有不可者七請一一陳之古帝王不以中國之治治蠻夷故安南不征著在祖訓一也太宗滅黎季犛求陳氏後不得始郡縣之後兵連不解仁廟每以為恨章皇帝成先志兼而不守今當率循二也外夷分爭中國之福安南自五代至元更曲劉紹吳丁黎李陳八姓迭興迭廢嶺南外警遂稀今紛更正不當問奈何殃赤子以威小醜無益有害三也若謂中國近境宜乘亂取之臣考馬援南征深歷浪泊士死幾半所立銅柱為漢極界乃近在今思明府耳先朝雖嘗平之然屢服屢叛中國士馬物故數十萬計竭二十餘年財力僅得數十群縣之虛名況又有征之不克如宋太宗神宗元憲宗世祖故事乎此可為殷鑒四也外邦入貢乃彼之利一則奉正朔以威其鄰一則通貿易以足其國故今雖兵亂尚纍纍奉表箋具方物款關求入守臣以姓名不符郤之是彼欲貢不得非抗不貢也以此責之詞不順五也興師則需餉今四川有採木之役貴州有凱口之師而兩廣積貯數十萬率耗于田州岑猛之役又大工頻興所在軍儲悉輸將作興師數十萬何以給之六也然臣所憂又不止此唐之衰也自明皇南詔之役始宋之衰也自神宗伐遼之役始今北冦日強據我河套邊卒屢叛毁我藩籬北方顧殷更啓南征之役脫有不測誰任其咎七也錦衣武人暗于大體倘稍枉是非之實致彼不服反足損威即令按問得情伐之不可不伐不可進退無據何以為謀且今嚴兵待發之詔初下而征求騷擾之害已形是憂不在外夷而在邦域中矣請停遣勘官罷一切征調天下幸甚疏下兵部請從其議帝不納益兵據險以防敵患疏嘉靖十六年韓廷竒謹奏照得山西三關一帶沿邊地方寧武以東隘口及山岡平漫之處雖敵騎可通然有隘可據得人以守敵終不能長驅而入寧武以西與敵切近為鄰則漫然平曠敵騎可以長驅無阻而原設兵將比之他邊甚少城堡亦甚稀疏然前此敵人顧少侵犯者何也以大同重兵為之屏蔽也且由老營堡至八角所等處土曠人稀無所虜掠必深入至鎮西衛地方人畜堡寨始繁縱有所得及其返也又有大同平朔等處之兵截于前老營偏頭等處之兵乘其後往返必須數日則大同鎮城重兵亦皆㑹集據險邀擊往往失利而去彼雖驍勇深入然亦有所畏憚不敢輕入故三關之地兵雖寡弱老營堡等處雖極臨邊境地方平曠而敵之侵犯比之他邊為少也臣等又查得山西汾州潞州平陽等衛所官軍撥去大同防禦者七千餘名官軍月糧仍在山西支給夫以山西官軍戍守大同山西糧儲供給大同者正以其屏蔽山西也且敵之侵犯三關必由大同邊境而入今者大同之境時被侵犯切于自顧勢難他及而世平時久事失其初大同三關又各自分彼此如此則三關之地已為大邊極塞而老營堡一路平曠若此兵馬之寡弱若此將官城堡之稀少若此敵騎擁衆南下其何能支哉兵法曰勿恃其不來恃吾有以待之今待之者無其具也惟恃其不來耳此在我者如此也臣等載觀近日敵之入寇奸謀詭計與昔不同向也無甲胄今則明盔明甲勢甚剽疾矣向也短于下馬不敢攻挖城堡今則整備鍬钁攻穵城堡矣向也不知我之虛實夷險雖或深入不敢久留今則從容久操按轡而歸矣向也羣聚而入羣聚而出忽若飄風今則大舉決于一處分掠各邊使不睱應援矣向也兵無紀律烏合而來星散而去今則部伍嚴整旗幟號令分明矣向也不焚廬舍今則放火焚燒矣其故何哉有中國之人為之謀畫有中國之人為之嚮導有中國之人為之奸細有中國之人遺與之以鐡器況事變之時投入敵中者又皆慣戰有勇之人也此在敵者如此也度我度彼勝負從可知矣臣等聞之萌芽不剪滋蔓必長履霜不戒堅氷斯至今大同之兵既不能為三關屏蔽而三關之兵馬不增將官不選城堡不加規畫臣等惟恐今年深入明年深入今年得利而回明年得利而回漸不可長大起于細邊人塗炭不足言也數年之後敵且生心矣臣等竊見各處大邊如宣府延綏等處敵皆不得肆然而入何也一則兵力强盛一則關山險隘一則百戰之餘豪傑彚生皆未有如老營堡之空虛為可乘者也敵若狃于常勝妄興異謀圖入中國惟此途為甚便臣等嘗察中外之界自大河以西由石隰岢嵐靜樂寧武至雁門厯紫荆居庸直抵山海關一帶界山崇岡峻坂固天所以限中外而保障生民者也中古以來類皆守于險外以為重險之固紫荆居庸之外則有宣府一鎮鎮城既設重兵復設五路參將大小城堡各設守備操守把總等官原額旗軍一十二萬雁門之外則有大同一鎮鎮城既有重兵復設三路參將九州縣大小城堡各設守備等官原額旗軍八萬餘名其城之堅必不可攻也其池之深必不可越也馭戎設險之道誠莫有加焉寧武以西其險則在興嵐石隰等處古人皆以此地建節國家亦守于險外置偏頭老營諸城堡然止設一副總兵一遊擊并近日巡撫奏設止有四守備騎兵惟九千餘名而興嵐等處則又棄而不守其城數日之間可攻而破也其池頃刻之際可負土而平也且宣大既有巨鎮重兵而內猶守居庸紫荆雁門之險今偏頭等處既已兵孤將寡而興嵐等處乃又棄而不守敵騎長驅而下更何所恃以為藩屏哉我國家設險禦戎自遼東以至甘肅經理周密獨偏頭等處乃一大空缺故臣等以為敵若妄生他志圖入國中必由此地而入也夫善動者因其時先機者通其變當今之時變而宜通之時也以臣計之岢嵐州實中外之界有險可據宜設一參將益兵三千神池堡要害之地宜拓一城設一守備益兵五百八角之東寧武之西八角之西偏頭之東適中之地亦各為一堡各設一守備或于五塞前後設立據險以便截殺亦各益兵五百所益之兵聽臣等召募或于民壯中戶大者僉取副總兵宜升為總兵推選謀勇都督領之駐劄寧武其偏關仍一守備益兵八百可也提督都御史不必兼理巡撫山西一省止巡撫沿邊一帶地方欣代保嵐石五州所屬及雁門石隰二兵備并都司布政司管糧官按察司管屯官并守巡冀寧道及參遊守備俱聽節制其餘山西布按二司府州縣官員賢否軍民詞訟嵗辦差役俱不必管理庶得専意經略邊事老營堡宜設一所以管常備新軍夫不一勞者不久逸不暫費者不永寧是不過給馬七千匹發銀十萬兩工程可計日而待也其山西汾州等衛所防禦大同官軍仍掣回山西三關防守遇有警急與大同互相應援如此則不惟三關之兵威可振而大同之勢亦遙為之壯矣如䝉敕下該部再加議處仍行總督宣大偏關等處地方軍務都察院右都御史博訪羣議覆題如果臣之所言少切時務伏惟聖明俯賜采擇焉臣等不勝隕越待罪之至疏入帝從之昭典禮疏嘉靖十六年唐胄臣惟自古帝王之興天必生一代佐命之臣以為之輔故君當大統既成之後必隆褒臣之典非但以報其功亦所以尊崇吾之德業以昭示萬方也太祖髙皇帝南京功臣廟之建此開國之一大典禮今百六十九年矣天下至今無敢改者近日武定侯郭勛無故將始祖郭英奏欲添祀以致該部乞請各官㑹議不敢遽抑之者以稱伊祖與元祀徐達等功同一時但達等物故各當廟建之時而英獨以後死不預此可欺以方之言惑之也臣惟皇祖當開基洪武之二年命立功臣廟于雞鳴山論功列祀凡二十一人塑死者之像虛生者之位蓋是時胡大海馮國用趙得勝耿再成丁德興俞通海張德勝茅成皆巳死先棲神于卞壺蔣子文等廟後復祀此所謂塑像者此也而徐達常遇春李文忠鄧愈湯和沐英曹良臣康荗才吳復孫興祖等俱現在所謂虛位者此也是當論祀之時巳合死生者之功而定之矣勛何據而為此言哉及細讀勛奏稱英于洪武十七年論功開國受封至永樂改元始卒非功有優劣實死有先後然後知勛乃不學少知之誤也蓋洪武十六年雲南既平次年論功以大將頴川侯𫝊友德進封頴國公而于副將巳侯之藍玉仇成王弼許爵其世論及偏裨謂陳桓胡海郭英張翼等兵興以來屢經勤苦今勳績尤著桓封普定侯海東川侯英武定侯翼鶴慶侯子孫世襲食祿各二千五百石蓋廟之定祀至是已十六年矣而英始侯其所論者乃雲南之功而勛誤以為開國也且大明一統志天下郡縣例書人物故鳯陽志英蓋各以其地言尹直楊亷所著皇明名臣録俱不載英惟黃金開國功臣録五百九十三人凡建功于國初者不論大小皆録而英亦預蓋各以人言皇明祖訓首章議親條下開列三公二侯五家而英以皇妃王妃駙馬之貴其家亦預蓋専以親言俱與廟祀無干而勛皆泛引以為證又惑也又太廟配享當廖永安未除之先凡有一十三人其已死廖永安俞通海張德勝桑世傑耿再成胡大海趙德勝七人于洪武二年正月丁未太廟之享已躋在配至九年始加封號贈諡而徐達常遇春李文忠鄧愈湯和沐英等六王則各隨其卒之年進侑皆皇祖親定即古廟爾祖從享祭于大蒸之義比之廟祀其典尤重英于廟且不祀而又欲望其配享豈不尤惑也哉前代帝王之舉此者當龍虎風雲之㑹篤山河帶礪之盟如西漢元功十八之位次東漢雲臺三十二及唐凌烟二十四之圖畫至今昭垂青史然皆託褒揚于位貌而我聖祖之享祀則以血食寓褒揚其酬報尤重故品别尤精位次參差之間尚不可輕以移易況無有之額敢得而增損乎使勛而知此縱英侯功先于開國亦當俯首斂避況後以南征而敢啓口也哉伏願皇上于英之配享廟祀且寢其議則勛知孝而不知學之誤亦可洗雪以終全臣節而我國朝之一大典禮足為史籍之光矣疏入帝不納諌征安南疏嘉靖十六年張嶽臣伏覩皇子誕生渙頒詔命華夷內外莫不覃敷惟安南以久不入貢詔使臨遣為之停止下外廷集議咸謂罪當討毋赦升下不欲遽動甲兵特詔使者馳入其國究問緣由臣竊聞安南自正德十一年國王黎晭為逆臣陳皓所弒國人立晭弟黎譓主國事以兵逐陳皓父子奔據其國諒山府黎譓立七年又為權臣莫登庸所逼出居其國升華府登庸立譓弟黎懬相之既又弒懬而自立國內分裂日尋干戈其久爽貢期大抵由此非敢阻兵據險抗上國之命而不貢者也自古夷狄惟猾夏則誅逆命則誅若其國不能通貢似不足以勞敝中國今用兵之聲先已𫝊布使者行勘未復誠恐生事樂禍之臣不能仰窺陛下所以遣使行勘之本意謀動兵戈臣不睱逺引請以目前義理事勢反覆詰之夫欲興兵必以黎氏為辭為之討其亂賊然為夷狄勞師萬里之外討其賊而定之位非中國長䇿其不可一也不定黎氏而因以取之是乘人危難而利其所有五霸稍知義者不屑為也而謂聖明為之乎其不可二也萬一夷人操長技毒弩乘髙截險以邀我師如古人所謂厮輿之卒一有不備而歸者禍敗孰當之乎其不可三也今兩廣困敝猺獞狑獠所在屯結官軍僅足備守所恃以調發者狼兵耳然諸州土官及湖廣弓刀手連年疲于征調內懷讎怨若復驅以逺征深入數千里之險進有難必之敵退無旋返之期狼顧兩端莫堅鬬志南方暑濕易生疾疫萬一師老財匱猺獞狑獠乘虛而起安南事未可必兩廣破敗可以立見其不可四也近日為大工役府州縣但係于官無礙及軍需吏農等項銀兩盡起發赴部梧州軍餉亦因鹽法壅滯課額虧損每年敷給諸軍剩積無多兵興十萬日費千金永樂中用八十萬人入交今就折半言之亦當有四十萬人屯食兩廣飛芻挽粟約以二石致一石何處措備其不可五也天下承平久矣人不知兵兵不習戰將帥皆膏梁子弟少經行陳而搢紳之喜談兵者類皆趙括房琯之流平居為大言爾蓋深于兵者必不談兵其掇拾古人糟粕以談者多妄也欲舉大事而使膏梁主兵躁妄之士得成其謀不待兩兵相交而不勝之機先見矣其不可六也此六不可者臣特粗舉其端爾至于天下大勢其財用盈虛兵馬強弱民情休戚蓋有非臣職事所及而不敢究言者臣愚以為安南縱有可誅之罪猶當重為民命愛惜審酌輕重于當用兵之中求可不必用者以全民生以飬元氣伏惟陛下聖學精深洞見千古制作盛備逺暨殊俗舞干羽以格苗修文德而來逺稍遲俄頃理宜響應去年十月六日皇子生之日近畿地震數次聖德純熙天眷方隆安得有此異天之垂戒其殆為開邊乎天下大器也安之甚難無故而動搖之臣中夜以思不寒自栗伏望陛下上承上天仁愛之心逺思皇祖不祥之訓待行勘使者復命乞下廷臣將安南事勢反覆詳議如黎氏尚存力能入貢則許之入貢如果內難未定則且申敕邊臣謹固疆埸禁戢奸宄毋得妄生事端待安南亂定奏請定奪此于國家事體初未有損而生靈得免于兵革之禍所全活者多矣臣邊吏也義當擐甲執戈率先所部以死效命顧不度分量輕肆瞽言干撓廷議罪當萬死然臣非敢愛死也恐死而無益是以冒昧為陛下陳之伏冀陛下哀矜曲垂裁察天下幸甚疏入帝從之請順人心以隆治道奏嘉靖二十年楊爵臣惟人主一身萬化本原履至尊之位膺艱大之責用人行政是非得失方在幾微而關于民心之向背天命之去留者即甚可畏也是以聖帝明王深察乎此制治必于未亂保邦必于未危事無微而不謹時無暫而不懼幾無隱而不飭為大于其細而圖難于其易然後天人交與而可以延國祚于永久矣方今天下大勢如人衰疾之極內而腹心外而百骸莫不受病即欲拯之無措手之地以臣觀之其危亂之形將成目前之憂甚大也大抵因仍茍且兵戎廢弛奢侈妄費公私困竭奔競成俗賄賂通行遇災變而不憂非祥瑞而稱賀讒諂面諛公肆欺罔士風民俗于此大壞而國之所恃以為國者掃地盡矣撥危亂而反之治安此在陛下所以轉移率勵之者何如耳況當朝覲大比之期百司多士濟濟來趨延頸思化人人切仰極重不可反幾失則難濟伏願陛下汲汲于此時留心焉以為善後之圖也臣以病居林下者八九年誤蒙聖恩賜之起用擢以耳目之官任以糾劾之責受命以來蚤夜耿耿每思國事日非而臣于國恩有未報至于痛心流涕者有之臣請略舉目前所見其大要足以失人心而致危亂以貽聖心之憂者為陛下告誠不忍默默保位以上負陛下之洪恩下負生乎之所學也伏願聖明垂聽焉臣竊惟天下之患莫大于以危為安以災為利實則可憂而以為大可樂法家拂士日益逺而快意肆情之事無敢有齟齬于其間積蔽而至于蠱則不可得而救矣此實天下之大患也往年夏末入秋恆𤾉不雨畿輔千里巳無秋禾既又立冬無雪暖氣如春元旦僅雪即止民失所望洶洶無聊憂旱之切逺近所同此正陛下徹樂減膳率臣下以祈惠寧之時也而在廷之臣如大學士夏言數人者乃以為靈瑞而稱頌之其欺天罔人不亦甚乎其不幾于安危利菑而以大可憂者為樂耶孔子告顔淵為邦在逺佞人若是而謂之佞人者非耶大臣之職引君當道志于仁而先天下以為憂者也無忠君體國之心而居人臣之極位所謂小人而乘君子之器也欲天下之治安可得耶又如翊國公郭勛者中外皆知其為天下之大惡朝廷之大蠧也勛之舉動踪跡豈能逃于聖鑒雖陛下盛德優容不忍即罪深謀逺慮自有所處臣愚以為姧不可近惡不可長若止之于微遏之于漸則朝廷優禮人臣之體貌未失而勳戚之餘裔亦得以保全而善終也或使稔惡肆毒潛干政柄則羣狡趨赴善類退處其為天下國家之禍日益深矣治道去其太甚者此其為害治之人之甚所當急去而不可緩也凡此任用匪人足以失人心而致危亂者一也天生斯民立之司牧君人者奉天以安民而使之各得其所也民不得所則其心不能無怨民心怨則天意可知矣古者民勤于食則百作廢今民勤食不可得而至于離散離散無所歸而至于死亡臣近巡視南城兩月中凍餒死者八十人此特南城一郭耳共計五城未知有幾目所不及見而在于千萬里之逺者又未知其有幾孰非陛下之赤子也而顛連無告委命溝壑蓋望一豆羮簞食以延須臾之生而不可得也今正陛下愛民惜財與天下休息之時也而土木之功十年于此矣而尚未止工部屬官添設者至數十員又差部官逺修雷壇以一方士之故朘民膏血而不知恤則民何以得其所哉民惟邦本本固邦寧窮民之力盡民之財是自蹶其本根也而國何以為國乎昔漢文帝惜百金之費不營一臺故海內富庶願陛下以為法則宇內生靈之慶也況今外難未靖內冦竊發警報日聞加以頻年災沴上下一空百計取之愈為不足而興作未已以結怨于天下此其足以失人心而致危亂者二也唐虞三代之世君臣每以勤敬之道交相警戒其見于經𫝊者如堯舜兢兢業業無怠無荒禹惜寸隂湯坐以待旦文王日不睱食武王以敬而勝怠故能夀躋耋期治隆熙泰是數聖人所以崇功益夀善政和民之道不外乎敬與勤而巳矣周公召公之相成王也周公則以逸而戒之召公則以敬而勉之蓋敬逸之間身之修否政之理亂所由分此固周召忠君懇惻之心也陛下即位之初勵精有為不遑寧處嘗以敬一針頒示天下其于堯舜三王之道蓋巳心得之矣近年以來因聖體違和朝儀間闕經筵未講大小臣庶朝參辭謝未得一覩聖容敷奏陳請未得一聆天語若是者今巳久矣夫大位者艱難之器非逸樂之具也陛下一身天地百神賴以享六軍萬民賴以安一日二日有萬幾之繁近聞聖躬調順大獲福履中外臣民罔不歡慶況春氣漸和人思新化庶官入覲雍雍肅肅一來自萬里之逺者孰不欲鞠躬垂委北面舞蹈望龍顔以慰快覩之心乎易曰聖人作而萬物覩正今日之事也若未得瞻于咫尺天顔之下以伸有孚顒若之敬臣恐人心日益怠惰中外日益涣散非隆古君臣同寅協恭以臻太平之氣象也此其足以失人心而致危亂者三也執左道以惑衆聖王所必誅而不宥者也今異言異服列于庭苑金紫赤􅌧賞及于方外之士臣不意陛下睿哲先物明見萬里而所為一至于此夫保傅之職坐而論道古人謂官不必備惟其人故非道隆德盛極天下之選者不足以任此責今舉而畀諸迂怪之徒輕之若流品之末則名器之濫至此極矣且陛下以天縱之聖資為上天之元子若逺宗帝王之道近守祖宗之法細旃廣厦之下與公卿賢士講論治道則心正身修與天地合其德與日月合其明和氣致祥罔有天災而山川鬼神莫不寧矣安用假此妖誕邪妄之術列諸法禁之地而藉之以為聖躬之福耶甚非聖天子所以崇正逺邪平平蕩蕩奉三無私以化天下之道也臣恐風聲所及人起異議豪傑之士聞而解體貽四方之笑取百世之譏于聖德國政所損不細此其足以失人心而致危亂者四也古人有言君聖則臣直陛下臨御之初延訪忠謀虛懷納諫其于狂直敢言之士往往矜宥故一時臣工恃陛下之能容敢以直言冒干天聽言過激切而獲罪亦多有之自此以來臣下懷危慮禍未聞敢有犯顔直諫而為匡救逆心之論者昔人論求言之益以為勉强以聽不若悅而從之悅而從之不若道之使言蓋人臣持祿保位者多而忘身以徇國者少雖識見有明暗言論有得失在陛下明目達聰鑒别取舍于黜陟賞罰付之公論則可矣若震之以天威加之以危禍如往年太僕卿楊最者言出而身即死近日翰林院左贊善兼修撰羅洪先等皆以言罷斥此于國體治道所損甚多伏願聖明少致思焉成湯大聖人也仲虺稱其改過不吝從諫弗咈高宗有商之令主也傅說告以木從繩則正后從諌則聖此二君作聖之功為萬世人主之龜鑑也臣非區區為一楊最等惜也但歷觀古今以來有天下國家者未有不以任諫而興以拒諫而亡者也今而後雖有素懷忠義之心者非灰心仕進甘退邱園亦必深自晦藏為保身計矣孰敢發口以論天下之事哉臣恐忠藎杜口則讒諛交進上德不能下達下情不能上通安危休戚無由以見而堂陛之近即逺于萬里矣此其足以失人心而致危亂者五也凡此數者關于天下之治亂國勢之安危貽聖心之憂誠未巳也伏望皇上念祖宗創業之艱難思今日守成為不易察臣忠悃覽臣所陳賜之施行戒飭夏言務篤忠貞之道以報國家眷顧禮遇之恩于郭勛則豫有以裁抑而保全之止土木之功開諫諍之路屏邪妄之術陛下仍以慎獨養天德以天德達天道以慰人心以祈天佑則莊敬日强而彌夀永于千億虛靈照物而忠邪莫可遁逃其為宗廟社稷萬萬年無疆之福聖子神孫萬萬年無疆之規者端在此矣臣不勝戰栗懇切之至奏入帝震怒下詔獄搒掠幾斃劾嚴嵩疏嘉靖二十一年張永明臣竊惟人臣事君之道猶事天也矢心對越精一無二內無私慮外無私交曰惟恪恭以勤乃職猶恐智能淺劣無所裨補以仰答恩造若復懷姧肆欺互相朋比以崇長其隂私豈惟臣道之缺實上乖天常下亂人紀罪莫大焉者也兹者郭勛滔天之惡逾于四凶仰賴聖明昭鑒窮治其罪歡呼之聲遐邇傾動莫不舉手加額慶明威之震曜加雷霆也天下幸甚然武人獷悍凶悖由來久矣若夫搢紳之臣習服聖賢之訓而猶不聞君臣之義顧有陽效恭順隂肆矯誣為私黨之附此尤非臣所敢知也竊照禮部尚書嚴嵩受皇上殊眷崇階峻秩恩寵逾涯茍圖報稱雖捐軀恐不逮也乃與郭勛隂相交納大肆奸欺密請造以為歡締聲勢以為固至如互分邊帥之金而相悅以利偏剋軍士之資而相䝉以私大蠧兵政以生戎心無日不造勛第情好尤密縱妻赴飲其家路人所知嵩之附勛誠表表彰灼者也臣聞之見無禮于君者若鷹鸇之逐鳥雀也無禮如勛者不能逐之巳為罪矣況親昵之乎又聞人臣之義無私交茍非公義泛有所交且不可況悖逆之臣而可與之交納乎在小臣且不敢況受恩深重如嵩者而可二三其心乎再照嚴嵩近又具疏自劾是不惟假此以掩罪而又援此以賣直肺肝如見其將誰欺夫嚴嵩與勛其居甚密其跡甚親縱不軌之謀隱祕難知若其咆哮恣橫驁逆貪叨其誰不切齒且亦嘗經論列矣然嵩不言于虐焰方熾之時而顧言之于蹤跡既敗之後附其勢以為利又尾其敗而因以為功此尤見其險詐隂賊反覆無恆之甚也易曰開國承家小人勿用蓋自有載籍以來未聞小人而能成功者也宋臣司馬光有言德勝才謂之君子才勝德謂之小人然從古小人易售其欺而君子弗究于用何哉蓋憸險之夫習為欺罔多便利快順之可喜而端方重厚之臣上下隂有賴焉者多以其悃愊無華而忽之耳才德之辨君子小人之進退惟皇上深留睿察天下幸甚臣再惟嵩與勛比附之故有二焉一則其嗜利蔑義之臭味相同一則其竊位固寵之聲勢相倚夫嗜利之心重則效忠之念輕徇私之黨衆則奉公之臣孤二者之勢若持衡然亟反之以歸于正其機甚微而世道登降之由于此焉決今聖君當極正臣子殫心翼戴之昌遇嵩乃敢怙終罔悛隂相朋比以自厚其私圖是豈所以報主恩明臣節哉大臣如此小臣何式文臣如此武臣何忌風之漸靡臣不知將何底止也乞將嚴嵩速賜罷黜為人臣忘公徇私者之戒庶有以破私邪之黨明臣子之義國法大彰士風聿變而太平之治可拭目覩矣臣待罪南科巳歷數月每憤諸臣深負上恩無以贊成睿志今元凶幸已伏辜而邪黨猶得隱匿其奸以溷聖明若畏避權貴不敢指斥為循默保身之計則不忠不直臣罪不容于死矣又何諸臣之憤為哉仰恃聖明敷瀝冒陳臣無任惶懼戰越之至疏入帝不納御選明臣奏議卷二十三
