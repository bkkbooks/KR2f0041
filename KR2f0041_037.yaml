  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_037-1a, image: WYG0445/WYG0445-0565a.png}
body:
  text: 議開泇河疏萬厯三十一年李化龍臣看得河入中原以湍流抉淺土潰溢四出所至則靡從古以為患矣迄於今日施治尤難蓋南虞陵北虞運水性無常勢不能必出中道人力角之互有勝負堵塞挑濬嵗以為常所謂勞費無已數逢其害者也臣自蒞事以來于沿河上下方數千里逐一周視下淮徐觀兩瀆之合流上鳳泗望二陵之佳氣乘舟而遊市城之中逆流而溯決口以上出蕭碭經蘭儀過東長入曹單因之稽隄工脈水勢詢之故老咨之土人乃始知河勢之大凡而得施工之次第也兹謹會同鳳陽撫臣李三才按臣髙攀枝鹽臣蔣以化山東撫臣黃克纘按臣嚴一鵬議得河自開歸而下合運入海其路有三由蘭陽道考城至李吉口過堅城集入六座樓出茶城而向徐邳是名濁河為中路由曹單經豐沛出飛雲橋泛昭陽湖入龍塘出秦溝而向徐邳是名銀河為北路由潘家口過司家道口至何家隄經符離道睢寧入宿遷出小河口入運是為符離河為南路此三路者近代以來河所遞行之道也較而言之南路雖近陵然有隋隄障其上有九岡十八窪隔其中有歸仁隄護其下於陵無害也第其北扼於山南近於淮倘下流淤塞不逆流而上則潰隄而南是皆能亂淮亂淮則久之而淮亦淤淮淤而沮洳之患上及陵園矣且全河下宿遷徐邳運道不免告涸則南路者利不勝害者也北路雖近運然太行隄足障驚濤徐吕洪足束亂流且汶泗有接漕艘之利也第其下流往往潰隄隄潰而魚沛之間城郭夷縴路壞非直殃民亦且梗運則北路者利害正等者也惟中路則不南不北既逺於陵亦濟於運有利無害稱全善焉前督臣排羣議而斷之獨合三省以興兹役亦謂得算假令不惜大費必竟全功一勞永逸豈不休哉乃以資用乏工程減以故狂瀾已回下流復益陵麓雖云亢爽運道尚在梗塞蓋所得已多直全利未收耳然則為今日計守行隄開泇河事所必出無容再計矣惟是泇河之議向來數議竟成畫餅談者恐以為疑乃臣則以為其善有六而其不必疑有二今之稱治河難者謂往代止避其害今且兼資其利故河由宿遷入運則徐邳涸而無以載舟是以無水難也河由豐沛入運則曹隄壞而無以過縴是以有水難也泇河開而運不借河有水無水第任之耳疏瀹排決皆無庸矣善一黃河者運河之賊也用之一里則有一里之害避之一里則有一里之利以二百六十里之泇河避三百三十里之黃河二洪自險鎮口自淤不相關也善二河之當治固不問其濟運與否而皆不容已者也顧運借河則河為政河為政則河得以困我當不憚勞費而治之運不借河則我為政我為政則我得以相河當熟察機宜而治之夫熟察機宜之與不憚勞費也其利害較然覩已善三先年估全工以三百九十萬估半工以二百六十萬即前督朱衡開新河百四十里費亦以四十萬也今直以二十萬開二百六十里比之全工則二十之一比之半工則十之一比之新河亦事半而功倍者也善四江之北山之東患水極矣老弱轉乎溝壑壯者散而之四方矣召募行而富民不苦於賠窮民且得以養春荒而役興麥熟而人散以仲淹之隄湖代汲黯之發倉此即國計無所禆計猶且為之也善五糧艘過洪約在春盡蓋畏河漲之為害也運入泇河而安流逆浪早暮無妨過洪之禁可弛參罰之纍可免即運軍不至以趕幫失事所全多矣善六運不借河則河防遂疏恐遂恣橫流而沼鳳泗也奈何夫開封歸德上下千里未聞濟運未聞不治河也彼直為民禦災而若此矣何況乎為陵捍患其何防之敢疏無疑者一徐州天下咽喉處也奈何一日而令其索莫荒涼安所稱重地乎夫太王遷岐盤庚遷亳第審利害安問重輕且徐沼於河直須時耳徐民安土重遷聞泇河之役且刺心隱痛曰奪其利也此如蛾赴火蠅趨餳大利在前害不暇顧一日而洪水暴至城沼民魚悔之晚矣泇河開而徐城之貿遷化居者必且移之泇口必且移之沿河上下即土著者利所不在必且擇髙土而居之即使水能破城必且為魚者少此為曲突徙薪於徐而出之罟獲陷阱者也無疑者二故泇河之開無俟再計而知其可行者也至其分工則自李家巷至劉昌莊全挑新河八里建閘一座該夏鎮郎中梅守相淮徐道副使劉大文督率徐屬河防運同許一城徐州知州張執管理劉昌莊至萬家莊計長八十一里內除韓莊等處二十里六分舊渠免挑外該全挑新河一十六里濬舊河四十四里四分建閘一座滾水灞一座築隄二十七里該夏鎮郎中梅守相濟寧道副使傅良諫督率兗州府運河同知汪兆龍清軍同知劉師朱滕縣知縣張鵬翼嶧縣知縣凌志魁管理萬家莊至黃林莊計長四十里內濬舊河三十八里三分全挑新河一里一分建閘三座又分直河工內王市東全挑新河三十里該南旺主事沈孚先帶管兖東分巡道副使陳簡督率兖州府管張秋河通判許仲譽沂州知州王許費縣知縣董三邉剡城縣知縣陳黌生管理黃林莊至直河出口計長一百三十一里內除梁城紀家田家集共七十里舊河深濶免挑並王市東新河三十里派山東助挑外實濬舊河四里五分全挑新河二十六里建閘三座減水閘一座滚水壩五座該中河郎中劉不息淮徐道副使劉大文督率邳宿河防同知許從坤揚州府管河通判趙性粹邳州知州周世臣管理其單縣幫修大行隄北面土工長六十九里南面護掃長二十四里該兗西道參政來三聘濟寧道副使傅良諫督率兗州府帶管黃河通判許重譽曹縣知縣成伯龍單縣知縣屈允髙管理以上五工總責成曹河道按察使汪可受會同司道提調往來稽核其合行事宜則據司道府縣會議共十三欵臣當以次徑行無容瑣瀆大抵河之所來蕩析沈浸為害非常河之所去膏腴肥美為利亦非常年來拮據無已北移之南南移之北河之害一治河之害十河之害有補治河之害無補河之害止在河沿兩岸方數百里治河之害且漫衍直省方數千里不止矣總之先年止恐傷運使河不得北近且又恐傷陵使河不得南南北迫狹幾無藏身之所蓋微獨民苦即河亦苦之矣泇河既成運已不借河河復不近陵臣以為自此以後但北守太行隄南守隋隄中間蕭碭豐沛城郭所在各髙起隄防以自救任河遊衍容與于其中每年相度水行何方但蠲其租入而賑以銀榖計費且不及治河之一二而他所省且復不資此為不治而得其大者也惟是河近北隄終有齧隄梗運之虞則請以俟來嵗倘其時和年豐而民可使耶則無難大挑濁河以開中路不憚一勞足收長利倘其天災人害而民難用耶則不妨死守行隄以救目前雖乏逺略亦弭近憂至於司道所稱泇河下流由嵎頭集經落馬湖北岸至宿遷盡避黃河諸險事亦可行當為後圖倘異日財力有餘再舉此役則運道所經黃河者不過入海二百里之安流耳彼其強弩之末力何能為斯亦國家之上事已除將應開應濬河道地里繪圖貼説明白另封進呈聖覽外緣係決河驟挽非易運道艱阻可虞懇乞聖明俯從末議亟開泇河酌濬故道以濟新運以拯災民事理未敢擅便為此具本謹題疏入得旨該部知道遵旨備陳河工疏萬厯三十二年李化龍臣看得河自去年決蘇家莊入昭陽湖穿夏鎮以南之漕渠壞南陽以下之運隄而魚濟一帶且震於鄰此其不可不治也明矣故臣議開泇不已復議保隄保隄不已仍議分黃蓋謂併力於隄則隄一決而全河北勢恐至於穿漕兼以分黃則隄縱決而水已分自不至於害運蓋臣之分黃袪民災也亦以保運道也比新河放水旬日之間衝刷倍於原挑分水已及五分臣計河勢已成因而塞之使全河南行則不值南陽之漕隄可治即李家口之運道可清一了百了矣蓋臣之塞決袪民災也亦以保運道也當其時使臣得力督於上諸臣皆併力於下夫料如雲畚鍤如雨掃急逼水水急刷河半借水力半借人力時月之間築壩塞決茍幸竣事申嚴北岸三隄之守使其遊衍於蕭碭百里之間何全河之不容何全害之不可去哉不意臣以家難不能督工諸臣以臣不在工各有懈志遂至以衆為政百不如法物力不齊工程不速挑淤不淨守隄不堅始以張采莊之淺終以單縣隄之決水落河淤塞終難就工遂為不了之工局又為不結之局矣當其分水自七月之終以至九月之初白浪滔滔分流南下即決隄以後水猶匯湖而下上灌無多魚臺城池南陽運道居然無恙而環豐城以達於沛境巳得平土而居之自非漲有所分何以害僅止此則分黃之於保運固未為無補未為非䇿也惟是河行隄北終非久計再淤再徙害且叵測臣不得不為漸不可長時不可失之請而陛下且有經畫料理以待新臣之命矣臣荒迷草土何宜復預河事而時已入冬不敢不移檄責成以俟後來今據諸臣會議若謂塞決之工雖及強半而全河之淤已減初形且時入冬水已落矣無復衝刷之勢矣不挑而塞則有逆行之患即小挑而塞亦有别決之虞且議河者最難畫一防河者最易推諉若開河不大將來數百里之間一隄失守且借口自解矣故不得不議大挑也議錢糧則以四十萬議人夫則以二十萬初議請之內帑又以為不得已之計蓋知左藏之儲非可以幸得也再議復河夫之額倣助夫之例又以為民窮財盡非所忍言蓋知災疲之民非可以重困也於是不得已而較量於行運之難易更以治泇為緊著若將以緩急分先後者夫今黃河起溜回空糧船及官民船隻又皆由泇以行然皆由連汪湖出口耳明春黃更溜湖且涸則無泇真是無漕矣故直河改挑支渠也王市添砌石闌也大泛口之治溜彭家口之治淺也真急工之不可緩者臣已檄行司道劉不息梅守相汪可受卜汝梁等分工併作矣不寧惟是即南陽連隄臣亦檄行司道李之藻傅良諫等勘估修整矣倘諸臣各暨厥心力年內外竣事則明年運事尚不至於無漕總之所難仍在黃河之工耳蓋黃河者臣難之新臣亦難之何以言臣之難也夫錢糧至四十萬人夫至二十萬亦謂非常之原矣臣即經畫料理千百其方終不能離喪次而之河濵也今尚未有措處然縱使有處何以興工夫目不親為閲視倘一有錯誤則四十萬金皆為虛費矣身不親為彈壓倘一有譟呼則二十萬衆皆仇讐矣興工至此害豈但河故曰臣之難也何以言新臣之難也夫治河者荒度于野集議於衆移咨于逺請事於朝冬初而作春盡而罷乃為及時乃不廢事今臣已不能出門一步矣時已入冬行且及春新臣此時猶未點用何時視事何時閲河何時議工何時請錢糧何時集夫役蓋冬前不至則大挑已無及春前不至即分水亦不能故曰新臣之難也夫不獨黃河之難也即運河之工業已紛紛制作矣而總河之臣不一經目不一措足羣情何以鼓舞人心得毋怠玩倘至誤事便是無漕故運河之難也與黃河一也總之以臣尸居其間而新臣不至耳故臣不得不為經畫不為料理以仰副九重之命臣又不得不備述其難急為之請以免墮誤兩河之工倘新臣以此時用以年內至亟為相度早行陳請或夫料湊手急大挑以回狂瀾于既倒也則一勞永逸尚可以收平成之效于目前或時日無及姑分黃以俟水勢之自定也則休養生息亦可以需子來之勸于後日不然耽延日久玩愒愈深豈惟黃河無底定之期即運河亦難保無稽遲之患矣為此據實上請伏乞皇上亟點新臣早來視事並乞敕下工部復請將目前現做工程責成該管司道上緊趲做如致誤事責各有歸則河事幸甚臣幸甚疏入得旨工部知道時政疏萬厯三十四年沈鯉臣屢疏乞休未蒙俞允柴然一軀病伏牀榻感時觸事不勝憂國之念將終緼而不言則恐一旦長畢目且不瞑故昧死一言然猶囁嚅纍日而後敢出諸口也何以故臣老臣也事在可緩必不敢輕易進言以自取周章之議又帷幄親密之臣也言在可已尤不敢激昻立論以輕擾君父之心惟臣今所處之地乃關係民生休戚國家理亂而又適際中流急渡之時夫是以寧逆人主之顔而不敢緘默取容為燕雀處堂之安也請敬陳之臣聞治天下者貴審勢今天下時勢何如哉天變於上人離於下駸駸乎有亂之形矣不及今尚可為之時而主臣一意百倍勵精將朝廷號令政事力加整頓何由易危而為安轉亂而為治譬諸醫之治病而遇十分虛損之人非以十全大補之劑能有起死回生之效也乃今猶泄泄然視之而徐徐焉圖之者豈以天下本無事而臣言不足信乎臣老悖誠不足與慮天下事其言誠無足采取也而在朝則文武諸官亦盡懷把人漆室之憂不但臣也在國則農工商賈與庠序學校之士出議於巷入議於室者又不止朝臣也即在採𣙜中使亦尚有五六老成不忍見民間疾苦者兹所謂左右近臣不比於外廷疏遠也在勳貴戚畹與國同休其憂國視常人更切也在藩服則又有天潢之派以山河帶礪之盟而欲傳百千萬世與天壤無極者兹所謂同姓一家又不比於勳戚異姓也皇上試以其兼聽並觀之心而倣古設鐸建鞀之意或顯詔以求直言或密察以觀輿論詎不皆憂臣之憂道臣之辭乎即口語不能皆一直婉或有不同其孰敢保天下終無事乎夫內外臣民人人皆有憂亂之心而備亂猶可不亟乎猶可不申嚴號令以振作積玩之人心猶可持諸司章奏留中不發發而不以常期乎猶可使諸司當事之臣日有補牘之繁人有掣肘之苦而不得自舉其職乎猶可使中外衙門無處不有缺官無官不是權管而因以慢令致期誤民誤事乎猶可使海內賢才一一皆老死林下而見謂無仁賢之國乎猶可不照常行取補足臺諫以自廣大其聰明乎猶可使天地不交股肱失職如日行隂霧中而不見陽光如常處嚴冬時而不行春令乎蓋自古憂國之臣未亂而言無其形也常苦于言之不聽既亂而言形已成矣又苦於聽之無及夫與其聽之無及也則寧備而不用乎昔唐德宗時海內殷富天下宴然過今遠甚一朝變起遂至乘輿播遷幾不保其宗社此建中四年十月幸奉天事及廣德元年十月幸陜州事也一展卷可知矣唐以前宋以後覆轍相尋有甚於此者臣不敢歷歷言之矣夫天下皆知其將亂而至尊居九重之上不見不聞臣實有不忍者故輒敢盡言之語云賜不幸言而中臣惟願所言之不中不願其多言而偶中也蓋臣既不能借青蒲一膝之地以吐其一腔忠赤又不能剖心自明而所憑惟紙上陳言倘天鑒終不可回臣終亦無目可瞑矣臣不勝戰栗恐懼之至疏入帝不納請召還言事諸臣疏萬厯三十四年薑士昌臣竊見大學士沈一貫沈鯉相繼去國輿論無不快一貫而惜鯉夫一貫招權罔利大壞士風吏道恐天下林居貞士與已齟齬一切阻遏以杜將來即得罪張居正諸臣皇上素知其忠義注意拔擢者皆擯不復用甚則借他事處之其直道左遷諸人久經遷轉在告者一貫亦擯不復用在廷守正不阿魁磊老成之彥小有同異亦巧計罷之且空部院以便於擇所欲用空言路以便於恣所欲為空天下諸曹與部院言路等使人不疑至于已所欲為所欲用者又無不可置力而得志所不欲者輒流涕語人曰吾力不能得之皇上善則歸已過則歸君人人知其不忠夫鯉不肥身家不擇利便惟以衆賢效之君較一貫忠邪逺甚一貫既歸貨財如山金玉堆積鯉家徒壁立貧無餘資較一貫貪亷逺甚一貫患鯉邪正相形借妖書事傾害非皇上聖明幾至大誤臣以為輔臣若一貫憸邪異常直合古今姦臣盧杞章惇而三矣然竟無一人以鯉一貫之賢姦為皇上正言别白者臣竊痛之且一貫之用由王錫爵所推轂今一貫去以錫爵代首揆是一貫未嘗去也錫爵素有重名非一貫比然器量褊狹嫉善如讐髙桂趙南星薛敷教張納陛于孔兼髙攀龍孫繼有安希范談一召顧憲成章嘉禎等一黜不復頃聞錫爵有疏請録遺佚謂宜如其所請召還諸臣然後敦趣就道不然恐錫爵無復出理也至論劾一貫諸臣如劉元珍龐時雍陳嘉訓朱吾弼亦亟宜召復以為盡忠發姦者之勸至于他臣以觸忤被中傷異同致罷去者請皆以次拂拭用之説者謂皇上於諸臣雖三下明詔意若向用實未欲用者臣獨以為不然皇上初嘗罷傅應禎余懋學鄒元標艾穆陳思孝吳中行趙用賢朱鴻謨孟一脈趙世卿郭惟賢王用汲等後又嘗謫魏允貞李三才黃道瞻談希思周𢎞禴江東之李植曾乾亨馮景隆馬應圖王德新顧憲成李懋檜董基陳鳴岡饒申郭實諸夀賢顧允成彭遵古薛敷教吳正志王之棟等旋皆擢用頃年改調銓曹鄒觀光劉學曾李復陽羅朝國趙邦桂洪文衡等于南京亦俱漸還清秩而鄒元標起自戍所纍蒙遷擢其後未有一言忤主而謂皇上忽復怒之而調之南而錮不復用豈不厚誣皇上也哉蓋皇上本無不用諸臣之心而輔臣實決不用諸臣之䇿也説者謂俗流世壞宜用潔清之臣表率之然古今廉相獨推楊綰杜黃裳以其能推賢薦士耳王安石亦有清名乃用其學術驅斥諸賢竟以禍宋為輔臣者可不鑒於此哉疏入帝怒鐫士昌秩乞休第二疏萬厯三十六年葉向髙臣謹奏竊惟臣求去之意誠以受事數月莫展一籌政本何地輔弼何官而可汶汶容容茍且度日反覆思維不能安處下情未伸愈增鬱結憂愁困苦生意稿然即欲扶病入直而幾務方殷萬難展布銓臣問臣曰庶官曠矣職何以修計臣問臣曰邉軍譟矣餉何以處臺臣問臣曰憲署空矣要緊各差急何以應諸如此類臣皆不能置對身居此地當任此責即臣自忖自思亦不能自恕而敢望天下之恕臣乎人情有所冀而不得必有後言矧合天下如焦如焚之心舉天下至急至危之事盡責之臣等而臣等實無以副疑端一啓則猜度滋多悠悠之談何所不至今同官既巳堅臥而欲使臣以孑然之身當四海九州之望顧影無侣呼天無門臣誠莫知其死所矣功名富貴臣已灰心報主酬知臣待來世惟望皇上哀臣憐臣亟賜臣歸臣即身先朝露敢忘聖恩不勝激切祈懇之至疏入得旨方今國家時事多艱正賴卿協贊匡濟豈可恝然求去宜即出入閣辨事不允所辭吏部知道乞振朝綱疏萬厯三十六年周起元臣仰惟皇上臨御以來英明果毅一號一令悉稟裁奪自以為無太阿倒持魁綱失馭之病矣近以靜攝日久百凡庶政有漸流於下移而莫覺者夫蔽明之姦行于下而不韙之名歸吾君甚可痛也臣不敢瀆引謹以二三時事諸臣所焦舌而陳者申之近者賢令李嗣善蒙釋人人加額至若滿朝薦等救萬人之命功在嗣善上而梁永等戕萬人之命罪又浮於馮進朝乃嗣善獲宥而朝薦長囚則以進朝而波及嗣善也罪閹不付廷理是以恩綸垂渙而中寢也則朝薦等之不獲宥蓋皇上之左右幽縶之也然而禁良令之名則皇上受之矣舊制駙馬體統甚隆今駙馬冉興讓以被辱逃已蒙顯罰顧婦寺負辜未聞重創公主不能以保其夫天子不能以庇其女煬竈售姦其何疑焉是興讓之覆寃莫照蓋皇上之左右壅抑之也然而辱戚臣之名則皇上受之矣今以四海之蓄加以礦稅之括入三殿箭樓久乖龍見之期纍年不得報竣何也良由大工未竣墨胥家于是貪璫家于是稅使又幾幸以免掣而家于是乃别立一種忌諱邪説以默聳而逗遛是工役之不得早就輪奐也皇上之左右因此以為利也然而廢朝常之名則皇上受之矣放棄諸臣批鱗者不罪觸權者永錮竊窺皇上原無成心第廢臣鯁直之性多為姦璫所恨在廷一二宵小圖報效於權門者又從而媒糵焉是以有偽學之牘有説事之單大察有林下黨人之款又慮臺省中為之發憤而明其不然則先設依傍之名目以震懾之甚且造為蜚語曰考選時某人推轂某欲科即科欲道即道不惟布之道路且明告君父使人憂讒畏譏不敢昌言昭雪而護持正人者日益寡一任披擢殘蹂躪莫敢誰何而後愈快又廣為之挑怨一切不得于輿評者皆歸其禍始于草野曰是某林下所搆害也如湯賓尹者其迹已見諸如此類難以枚舉是以怨毒益騰而忌且怒之者日益衆護持既寡忌怒又衆即大小臣工虛心旁觀者漸至熒聽且咎諸賢之不隱鱗戢羽而為此孤憤也是以正勢漸孤又有姦人隂通於禁中安排謗訕而中止之是廢臣之不獲賜環也蓋皇上之左右挫遏而沈淪之也然而錮忠良之名則皇上受之矣此數者皆叔季茍且之紕政非熙朝所宜見也皇上清夜思維必不願被此名今皆冒而行之昭之臣庶垂之史册天下後世以皇上為何如主然實非皇上之本情由左右近習為搆鬬或于酣樂之餘為有心之蒙蔽或以間暇之際為無心之簸弄嵗月浸淫落其術中而不覺久之且習為故然矣伏乞皇上收攬乾綱釋滿朝薦等於囹圄加楊應吉等以刑治大役立限報竣淹滯盡賜振拔此不過頃刻一轉念而叔季紕政變而為熙朝盛事天下後世稱英君誼辟必歸皇上矣臣一念朴忠忘其忌諱補牘陳言仰垂清覽臣不勝惶悚待命之至疏入帝不納宫僚徑去揭萬歷三十七年葉向髙臣伏見左春坊庶子馮有經以被言求去二十九疏未蒙批發遂于昨日申時具本親詣文華門叩辭將坊印送至閣中臣不敢受有經留印而去臣不得不為奏聞竊念臣子進退當候君命近者挂冠徑去者已多雖明旨森嚴加以重罰終不能禁此在諸臣之罪信無所逃矣但杜門經嵗哀請頻煩九閽茫然終無一報固從來未有之事也進既不可退又不能拘繫縶維無所倥訴亦從來未有之苦也古稱人君之德曰使臣以禮曰體羣臣今日諸臣望皇上之體之者切矣皇上以為處分使得以禮進退是諸臣之幸也不然彼窮迫無聊自甘愆罪臣子不足惜而其如國家之體何哉夫功名爵祿人情所甚愛潔身勇退人情所甚難今使人棄其所甚愛而就其所甚難則亦足以觀世道矣伏望省覽至於馮有經之送印辭官併望聖裁非臣所敢擬也奏入帝不納請革解紬白糧積弊疏萬厯三十九年徐必達臣于十月十四日接到巡按浙江監察御史張惟任揭為江南重役未蘇上方玉食難緩懇乞特申功令以恤民艱以便趲運事內言東南小民解納白糧之苦詳且悉矣臣詳讀而細分析之內有屬於起運之弊者則漕臣得而禁之如大户派兑有宦户之拖賴搧揚驗包有官役之需索雇覓船隻有舟人之攬騙告領水腳有吏書之扣尅及押運官之索騙渡江過淮之遲延皆漕運御史所能查禁者即張惟任所謂處置調停立法革蠧無敢煩廟議者也又有屬於收米之弊臣寺得而禁之如廠倉之堆垜倉役之勒索搬運之狼籍使費之侵耗則臣寺管倉之卿丞皆能查禁者亦無敢煩廟議者也至於軍先民後之故套皇店皇木及黃馬水殿官座等船之挾詐淮安通州盤驗之阻滯索土宜索常例講鋪墊講耗增攫金盜木之陋習則漕臣難以施其禁臣等不得預其事不得不仰懇天威而嚴為禁革何也軍先民後朝廷原無此令原因軍糧船九千餘隻其勢盛其人衆白糧船不過數百其人少其勢弱以衆欺寡以強欺弱勢所必致且軍官武猛多縱容軍卒以圖索騙遂成故套不知白糧乃玉食之供各宫之膳其視軍儲之糧尊卑輕重蓋天淵矣安可以軍糧船而先于白糧船乎皇店皇木黃馬水殿官座等船雖皆屬于朝廷而所載貨物不甚多原與白糧船重載不同且河路狹窄止此一線之水彼駕船運木皆驕夫悍卒藉屬朝廷駕言上用不容白糧船先行必需索重賄方許其行一近其船即稱磕損勒要賠補小民唯唯不敢申訴此挾詐之所由興也淮安通州皆關隘之所恐有夾帶向許盤驗但官不自驗委之下吏巡攔之夫明知其無夾帶必需索足願方放過關此阻滯之所由病也至于索土宜索常例講鋪墊講耗增加二加三聞各倉屬于此門者有之而非臣寺諸倉之弊此四等之弊皆漕運御史之所不及禁臣寺之所不能知惟仰天威赫然嚴示白糧船乃上供玉食宜先於軍糧船不許軍糧船壓之在後仍行漕運御史製成憲牌上刻奉旨白糧船在前軍糧船在後不許攙越違者重治數字無論軍民船隻各立牌一面則各船官軍方知畏懼而不敢仍稱軍先民後之故習矣皇店之貨皇木之牌皆非重載速行之差不許阻當白糧船如有阻當許漕運御史及地方撫按官拏究則挾詐之弊可塞淮安通州二關驗得白糧船無夾帶即便放行不許耽遲時刻仍嚴行户部轉行各關部臣禁戢下役毋得指稱查驗刁詐留難或以白糧船既載糧米難以夾帶亦可免其盤驗則阻滯之患可免至於北門收米人役如有索常例講鋪墊等弊許運糧人等訴告于巡視衙門參提重治則騙害之端可息此皆仰仗皇上之威靈獨斷而非臣等所能為力者也又照得軍運之船必待舊運船回方能兌新運之米若民運之船則在在皆有人人可雇不必借于舊船而吏書作姦通同經紀埠頭受人囑託豫指某人之船受其雇值利為已有及至見米船尚未到即欲追退其值而託辭趕船掉臂逃走矣一幫之內一船未到别船俱不得行一府之中一縣未完别縣俱不得發此起運之所以遲而軍船或得以爭先也近見張惟任牌行有白糧府縣以雇覓船隻俱要見船立約交銀裝載勿許吏書積棍把持作姦指虛舟而延夙害違定限以誤運期如有仍前積蠧該縣不時揭報以憑拏治吏書坐贓究革等因誠得革弊之源速運之要以後郡縣永永遵守一應白糧船俱限於十二月內發運則軍糧船俱在後不得與之相爭自無阻滯之患張惟任所謂橫舟黃流望洋無䇿覆溺虞危沍寒守凍買車推挽搬運狼籍之弊無自而有矣其巡漕御史尤當先一年內八月間即領敕出城料理運事斯來嵗不患乎倉猝而難措此則先時而執其機不惟民運可早而軍運亦可早而過淮不出三四月之外矣此又在於都察院之早題請而皇上之早俞允也蓋一速而萬事俱速者也又查得軍運船回空其遲速責在押運把總與各衛指揮千百户今則收糧一完繳有薦疏各官即輕騎先歸而回空之船任其優遊於天津淮德之間賣桅篙以充朝夕而聽其船之沈於泥沙且並其板而賣之船既不回糧何由兑須嚴責運糧官押令空船俱到方許回家換班不則仍行參究庶乎空船得以早回而新運不敢誤事縱之惟漕運御史早出國門則軍民之糧均得早兌此又探本之論先事之要䇿也疏入得旨户部知道乞裁藩邸求請疏萬厯四十年周起元臣接邸報見福王一本為比例懇乞賜給鹽井茶銀奉聖旨著查照潞王例行該部知道欽此臣竊嘆福藩之拙于自謀陛下之薄于愛子也陛下以天下為家未有不保其民而保其子者福藩之所為邀恩寵而算錙銖者亦既不遺餘力而攘利矣猶覬及四川之鹽井乎試思今日四川如何景象乎播土征魂尚作春閨之夢建昌戍血復染瘴草之煙水西伏戎時露跋扈之形衆豕入苙每懷走壙之想蜀固羸國也天未厭禍又剝利以佐災無乃不可乎頃者皇太后遺詔蒙陛下推廣孝思加惠四海維二三老臣曾蒞蜀者力陳鹽課之纍是以恩詔鹽井有課無井者著撫按官議豁蜀人方引領望澤而可頓壅德意乎夫陵谷尚遷徙無常鹽水歷幾時而盈竭異又歷幾時而鹹淡異非永永濬於不涸之源也井敗課存竈户之賠納不堪相率棄業逃亡矣賦額且不能取盈往往派賠州郡以足京邊之需彼土之官自撫按而下莫不計露於捉襟而籌窮於借筋矣潞府之例舊稱難支福藩之富無容再益前者求開鹽厰今者復求鹽課長此不已意欲何極將扣之額徴之內乎抑增之額徵之外乎扣之則軍國餽餉之需嵗有常數不可虧縮也增之則巴蜀罷敝之餘倍算加緡又必不能輸應也況陛下聖子神孫振振方興今日引潞藩以為例他日必有引福藩以為例者陛下又將同之以概為賜乎抑異之而靳其豫乎異之則等屬天潢之派未可厚薄視也同之則盡括惟正之供又未必足為宗室贍也臣竊謂福藩之規規此請也于殖貨則利于德義則愆陛下之沾沾此愛也于私情則牽于法制則違夫素約之家常有餘饒兼并之室日懼不給何者奢儉之致異也計福藩所入不為不厚矣以好善為樂則保有令名以節嗇為實則永不乏匱陛下何不裁之以義教之以儉俾知國家有一定之賦分封無濫乞之規事必師古法以制情不以反汗為嫌收回成命則福藩沐皇上之慈愛更倍于錫豫之恩其為子孫黎民之利不亦溥乎臣又有請焉一人作法天下之則也涼貪之弊其應不爽陛下年來務鳩聚而廣誅求藩王象之又何責焉願皇上下明制遵太朴愛人力惜國用為散財發粟之仁捐貨利之私行見風聲一倡臣庶景從天子不言有無而諸侯王敢於言多寡者未之有也此躬行之效身教之説陛下誠能俯採臣言翻然更始則薄海內外咸仰聖明育德於青宫者將習睹節用之規而消欲賄之萌況屏翰于列藩者其敢聽宵小之謀而恣無厭之請哉臣區區上陳不勝屏息待罪之至疏入帝不納劾稅監髙寀疏萬厯四十一年周起元臣謹奏福建稅監髙寀素行貪殘甚于别璫歷年海商一切貴重美麗竒巧之珍百入于寀與參隨未必一貢于朝廷臣生長其地耳而目之久矣溪壑既盈虐聲久著不意益肆鴟張大開狼噬尅削閭閻殫膏竭髓皇上取用各項物料即一草一木莫不按數豫值而寀剡刳樓船連舸接舳揭百尺之桅穡窮雕飾之極麗所取物料槩欲白沒彼市鬻貿易之夫挾資幾何令一旦盡付烏有誰能甘之相率控取自無足怪何乃簡梟雄以作威陳利兵而相向揮刀戮二十餘人又放火延燒二十餘家越日披堅執鋭統率驍騎乘守衛之偶撤徑弄兵于轅門撫臣袁一驥節制一方寀不能遂其竭澤之貪夙懷忿憤按劒要挾副使李思誠僉事吕純如將虎鬚以解厄寀復留而要盟皇上試思從來稅監最貪最狼最毒如髙淮梁永陳奉孫朝楊榮輩曾有殺人放火節鉞要留方靣如寀之大逆不道者乎臣讀撫按疏揭參以鄉人見聞不覺髮指而繼之以痛哭也近者邢洪持兵器于禁地盧受假虎威于票擬皆漫不處分今寀又見告矣所當亟行兩觀之誅用雪萬民之忿非僅撤回械鎖可以了事者臣聞省會人情洶洶莫不欲得寀而甘心焉賴巡方與在事諸臣安輯撫綏幸未告變臣恐防川不決決必滔天宿火不發發必燎原萬一戈矛起於肘腋海濱因而搖動倭夷乘以生心寀粉骨不足惜皇上豈善為社稷計乎寀之言曰多進孝順便可保全首領寀以纍年之括搜挾百萬蓋藏出其珍玩綺縠歌舞角抵享用作樂之剩資可以結左右之歡而及于寬政倘一遂其姦是皇上不惜太阿之重而僅易此阿堵也示之臣庶昭之史册虧纍令名豈淺鮮哉疏入帝不納劾三黨疏萬厯四十一年李朴臣惟朝廷設言官假之權勢本責以紏正諸司舉刺非法非欲其結黨逞威挾制百僚排斥端人正士也今乃深結戚畹近侍威制大僚日事請寄廣納賂遺褻衣小車遨遊市肆狎比娼優或就飲商賈之家流連山人之室身則鬼蜮反誣他人此蓋明欺至尊不覽章奏大臣柔弱無為故猖狂恣肆至於此極臣謂此輩皆可斬也孫瑋湯兆京李邦華孫居相周起元各爭職掌則羣攻之今或去或罰惟存一居相猶謂之黨夫居相一人耳何能為彼浙江則姚宗文劉廷元輩湖廣則官應震吳亮嗣黃彥士輩山東則亓詩教周永春輩四川則田一甲輩百人合為一心以擠排善類而趙興邦輩附麗之陛下試思居相一人敵宗文輩百人孰為有黨耶乃攻東林者今日指為亂政明日目為擅權不知東林居何官操何柄在朝列言路者反謂無權而林下投間杜門樂道者反謂有權此不可欺三尺豎子而乃以欺陛下哉至若黃克纘贓私巨萬已敗猶見留顧憲成清風百代已死猶被論而封疆坐死如陳用賓科場作姦如韓敬趨時鬻爵如趙煥猶為之營護為之稱寃國典安在哉望俯察臣言立賜威斷先斬臣以謝諸姦然後斬諸姦以謝天下宗社幸甚疏入帝心善之會葉向髙方從哲謂朴言過當乃下部院議罰御選明臣奏議卷三十四
