  text: 欽定四庫全書御選明臣奏議卷七
  hash: sha256:848a2d3019a7eef0343bf90314cd036f356f07c4fc7fc8689577dd11696573e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_010-1a, image: WYG0445/WYG0445-0116a.png}
body:
  text: 論內外不可異法奏𢎞治三年王恕臣竊聞古人有言國無賞罰雖堯舜不能為治臣聞賞罰不當與無賞罰同何以勸善懲惡服天下心天下不心服則萬事瓦解雖有智者不能善其後矣諸葛武侯有見于此故告後主有曰宫中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使內外異法也斯言也實公天下之格言服人心之要道也雖為後主告實所以為萬世人主告也臣伏覩昨者發落南京御史薑綰等聖旨似與武侯之言不同大駭物聽誠恐天下聞之謂今聖明之時內外異法豈不有傷陛下平明之治乎臣實不忍敢不昧死言之且薑綰等與太監蔣琮交相訐奏互有虛實薑綰等既降調其職侍郎黃孔昭等被其連纍亦各罰俸三箇月豈宜獨宥蔣琮之罪而不為之處置乎夫為此一人遂廢天下之公論壞國家之政體豈陛下之本心蓋未之思耳臣荷聖恩起于既退之餘加此一品之職非徒富貴之也蓋欲朝夕納誨匡輔至治臣知此事未宜而不言是不忠也倘異日陛下自覺其非豈不以不忠責臣乎縱使陛下終不覺悟臣亦安忍坐視乎昔子思言于衛侯曰君之國事將日非矣君出言自以為是而卿大夫莫敢矯其非卿大夫出言自以為是而士庶人莫敢矯其非君臣既自賢矣而羣下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生由是言之是君不可以不聽言臣不可以不進言也臣伏願陛下追還前旨另行裁處務合公論使彼此心服天下無得而議將見盛德大業可以與天地相為悠久矣疏入得旨這事已發落了罷再論內外不可異法奏𢎞治三年王恕臣昨伏覩發落太監蔣琮及南京御史薑綰等聖旨昧死上言欲望陛下追還前旨另為裁處以昭公道以服人心且免天下後世內外異法之議是臣惓惓為國之心非敢循情妄言以惑聖聽自取誅殛之罪伏奉聖旨以為事已發落了訖臣惟此事雖小關繫治體甚大設未得其當雖再易之不為過要于其當而後己若謂已發落即不可易古之所謂從諫如流者所從者豈皆未發落事乎漢文帝欲重犯蹕之罪張釋之曰當罰金欲族盜高廟器者張釋之曰當棄市文帝雖發怒終從其言未嘗以不合已意而不從也伏願陛下昭日月之明察芻蕘之言廓天地之量赦狂瞽之罪乞將前事再加櫽括别作處置使內外無分彼此而人心服則治體不致虧損而朝廷尊矣疏入得旨朕意以蔣琮守備不宜輕動如何又這等來説不準再不許來奏擾該衙門知道恤民弭災再奏疏𢎞治三年馬文升臣聞天命人君居大寶之位享天下之奉所以為民也人君簡賢任能分布庶位亦所以為民也蓋民為邦本本固邦寧民人之向背天命之去留宗社之安危繫焉故臯陶告舜曰在安民孟子之美文王曰視民如傷易曰節以制度孔子曰節用而愛人蓋侈用則傷財傷財必至于害民故愛民者必先于節用也仰惟皇上聰明睿知文武聖神于帝王傳心之法得之己深而帝王致治之要行之己效然而近年以來各處水旱蟲蝗晝晦地震是皆災變之大者非皇上仁民之心有未至蓋天心仁愛示此災異欲皇上側身修行戒謹恐懼節儉愛民以隆祖宗莫大之洪業于億萬斯年而不替焉耳皇上亦當仰答天意思繼祖宗克勤克儉而愛乎民焉臣謹以民之困苦言之且如河南山東南北直𨽻府州縣每年該備用馬二萬匹每馬一匹用銀一十五兩共該銀三十萬兩惜薪司砍柴擡柴等項人夫一年共用銀三十萬兩京班皂𨽻六千七百餘名該柴薪價銀八萬餘兩通共該銀六十八萬兩及各王府郡王將軍郡主郡君等位生者蓋造府第薨者修理墳園及祭祀等項又該銀數萬兩而買辦採辦秋夏稅糧水馬驛站又該數百萬兩且天下之生財有限不在官則在民以有限之財應無窮之徴年年如是欲民之不困財之不竭豈可得乎民財既竭一遇水旱災傷流移死亡餓殍盈途所不忍言加以官吏之貪酷惟知催科之緊迫小民困苦無所控訴嗟怨之聲上徹于天災異之召實由于此况近來內府各衙門坐派諸色物料供應牲口等項較之永樂宣德正統年間十增其三四該部依數派去有司徴收急于星火北方之民别無恆産止是種田既要完納糧草又要備辦料徴收成甫畢十室九空啼飢號寒比比皆是即今河南山東陜西山西及南直𨽻揚州等府俱被旱災又多蝗蝻生發加以官府追徴遞年拖欠錢糧及買辦等項小民變賣田産已盡計無所出逃亡數多倘來春青黃不接所在倉廩空虛無所賑濟其勢必至人自相食而意外之虞遂起賑救之儲不可不豫伏望皇上上思天命之眷顧宗祖之付託下念小民之艱難凡百用度務從儉約無益之費量為減省敕內府各衙門今後凡派出合用營造物料務要會同該部計算各庫會有會無合用若干方奏行該部斟酌合該司府地方有無災傷分派前去依數送納不許似前多派一概具奏若有故違雖奉有欽依該部亦要明白覆奏減去亦不許依奏分派纍民仍乞敕該部將前項果被災地方一應拖欠錢糧並買辦採辦等項物料暫且停止果係內府緊關合用之物許借支官銀買辦應用其在京各衙門大小官員皂𨽻係補助俸糧不及難以停止亦暫派江南王府頗少並無南京各衙門皂𨽻去處十分之三不必令人前來止照例總解柴薪價值自𢎞治四年為始候豐收之年照舊分派原僉去處應當十分災傷去處户部仍豫先差官前去整理賑濟錢糧若臨時前去人民逃亡緩不及事其該追虧欠倒失馬匹亦暫免追補備用之數災重去處暫減三分明年收成後仍前補解再乞敕各該巡撫都御史將所屬州縣一應科差當停止者徑自斟酌停止當具奏定奪者明白具奏凡可以蘇民困者聽其便宜處置所屬官吏果有恣肆貪酷的為民害者就便黜罷勤于撫字深得民心者量加旌異又督令布按二司分巡分管官員務照都察院湊準事例常川在各管地方禁革姦弊訪察民隱區畫倉糧撫恤流移凡有不急之務不許擅自興造一應公移債負不許擅自逼追一夫不許擅役一毫不許擅科大小詞訟不許濫受以致監禁人民分巡分管官敢有故違事例不時回司延住坐視民患者許巡按御史指實參奏究治仍行在京大小衙門官員各要敦尚節儉不許過為奢侈庶民困少蘇天意可回而災異可弭矣伏望皇上俯賜施行天下幸甚斯民幸甚疏上得旨該衙門看了來説清理刑獄疏𢎞治四年馬文升臣伏覩宣德三年三月初四日欽奉宣宗皇帝敕諭內載聖人制刑罰用昭天討以弼治化刑罰當則天道和平人心悅服國家天下並受其福否則感傷和氣災沴百出是以古者帝王必慎簡刑官我國家稽古為治建三法司自祖宗以來慎重人命務在恤刑欽此及讀大明律保辜限期內一條手足以及他物毆傷人者限二十日以刃及湯火傷人者限三十日折跌肢體及破骨墮胎者無問手足他物皆限五十日莊誦再三不能無疑夫鬭毆成傷既立辜限則辜外身死當依本條今律云辜內因傷死者以鬭毆殺人論該載己明其在辜限外及雖在辜限內傷已平復官司文案明白别因他故死者又若各從本毆傷法該載亦明今問刑衙門未審據何所見遇有毆傷辜外死者不分原傷有無平復輒依毆殺之條坐以絞罪恐非律文之意曰辜外因傷死者不合償命則死者何辜誠如所云則辜限一條可以刪去矣何用保辜哉况本條又云若折傷以上辜內醫治平復者各減二等辜內雖平復而成殘廢篤疾及辜限滿日不平復者各依律全科竊詳立限之意惟以限滿為期若傷未平復辜限一日不滿雖笞杖之輕未敢便決蓋恐被傷者死必令償命則杖刑難贖若辜限已滿傷未平復雖徒流之重就便斷決隨即發遣且限滿不平復毆傷必重有死之理若該償命豈肯遽以毆傷全科其罪乎假有毆人至篤疾該杖一百流三千里仍將犯人財産一半斷付篤疾之人養贍設使被毆之人限滿不平復既將犯人坐以全流又斷以財産若斷後被毆之人因傷身死復坐以死則非惟立法有無紀極而前之已流斷付財産又何所處乎今笞杖徒流悉依此斷獨辜外死者不依此條何其不考律意而矛盾若是也及覩墮人胎條內注云墮胎者謂辜內子死者乃坐其雖因毆若辜外子死者各從本毆傷法不坐墮胎之罪以此推之則辜外因傷死者不坐以死明矣謹按太祖高皇帝制律之時屢詔大臣更定新律至五六而弗倦者凡欲生斯民也後又敕刑部尚書劉惟謙重會衆律以協厥中每一篇輒繕成書上奏揭于西廡之壁親御翰墨為之裁定雖笞杖徒之輕尚厯歷明著其罪若辜外因傷死者律該處死必明定其罪如何又云各從本毆傷法乎昔待制馬宗元之父馬麟毆人致死雖在辜限四刻之外尚不抵死蓋以刑主欽恤法無久近我祖宗立法初意正在于此故名例律云凡稱日者以百刻又曰八十以上十嵗以下犯反逆殺人應死者議擬奏聞取自上裁九十以上七嵗以下雖有死罪不加刑夫五刑之條莫重于反逆殺人矜其老幼猶不加刑况鬭毆不過一時忿怒彼此交爭初無殺意比之謀殺故殺不同所以特立辜限若辜外因傷死者一概坐以絞罪是與辜內因傷死者之罪無異矣豈祖宗欽恤之意乎伏乞斷自宸衷或敕都察院會議奏請通行內外問刑衙門今後問擬鬭毆辜外因傷死者罪名合無照依辜限條內該載擬罪難復仍依鬭毆殺人律條科斷務求至當永為定規毋曰行之已久難以更改如此庶欽恤稱情人心悅服而辜限一條不致虛設矣查得先該本院奏為講明律意以重民命事近年以來兩京法司官員或由進士初除寺正寺副主事評事或由知州行人就升員外郎郎中而御史亦多知縣所除到任之後未經問刑就便斷獄公差所以于律條多不熟讀律意亦不講明所問囚人不過移人就律將就發落笞杖徒流縱有所枉為害未大至于人命一有所寃關繫非輕有將強盜窩主未曽造意同謀官吏因公毆人致死本無挾私故勘而俱擬斬罪者本係故殺郤擬鬭毆殺人絞罪者其他以是為非以重作輕且以法司尚然則其餘府州縣衛所囚犯枉抑而死者又不知其幾何此皆原問官員律學未講律意未明之故也乞敇兩京法司堂上官督令所屬天下都布二司督令斷事理問及浙江等按察司官並各府推官各要將大明律條熟讀講解深明其意不許似前忽略置而不講其問囚之際參錯訊鞫務在得其真情方才取招議罪之時尤須原情定擬不許輕易致死有冤抑獄成之後難以分辨明白等因具題奉聖旨是欽此己經通行欽遵去後今評事魯永清奏稱前因臣會同刑部尚書何大理寺卿馮等計議竊惟條律之設肇自往古我朝斟酌最為適中且互相鬭毆若于虛怯致命去處被傷即時身死者律有明條固不暇論其餘致傷有輕重所以辜限有逺近保辜者毆人成傷保其犯人之罪責令醫治被傷之人恐其致死使彼此各全其生也律曰辜限內皆須因傷死者以鬭毆殺人論律條甚明固無别議又曰其在辜限外及雖在辜限內傷己平復官司文卷明白别因他故死者各從本毆傷法且其者變于先意及者事情連後是言若在辜限內傷已平復不因毆傷别因他病死者止擬毆傷本罪不坐毆殺之條曰别因他故死者從本傷法則限外因傷死者雖不明開以鬭毆殺人論而其意亦甚明矣不然何以折傷以上又曰辜限滿日不平復者依律全科且折跌人肢體致成殘廢篤疾尚流三千里又將犯人財産一半斷付被傷篤疾之人養贍若因毆人頭傷風從頭瘡而入限外死者既不坐死又不斷付財産而止擬毆傷流罪則是于死者反輕于生者反重不惟死者含寃于地下而彼孝子慈孫亦抱恨于生前矣再考祥刑要覽載待制馬宗元之父麟毆人被繫守辜而傷者死將抵法宗元推所毆時在限外四刻因訴于郡得原父死者蓋唐律文云保辜限內死者依殺人論限外死者依本毆傷法無别因他故字樣于我朝大明律保辜條內文意自不同也但人多不肯講明往往引宗元為説而致疑耳且人命至重律文之意况限外因傷而死者擬以鬭毆殺人絞罪自國初至今己踰百年若有所疑前人豈不具奏合無今後凡鬭毆傷人如前折跌人肢體毁敗人陰陽破人骨墮人胎斷人舌等傷官司責其保辜限內不能平復纒綿至于限外而死情真事實者仍擬鬭毆殺人絞罪原問衙門臨時備由奏請定奪其辜限內傷已平復官司文案明白别因他故死者務與推究真情力為辨明不許拘于限內畏懼原告刁潑將被告之人一概問擬死罪致有寃抑有傷和氣庶于律意不違而刑罰罔濫事體歸一而法司有據矣疏入帝不納諫寧府用琉璃瓦疏𢎞治五年林俊臣竊見寧殿下纍乞琉璃瓦重荷聖諭于引錢內支二萬兩給換仰見陛下聖仁廣大惇敘九族盛心然觀鎮巡議奏欲俟年豐定奪是巽言不當與也工部覆奏謂規制雖相應事體實可止又恐重纍地方作例各府是正言不當與也逮寧王又奏工部又執奏是申言決不當與也陛下先可部議是明示不當與也後從其半是婉示不欲與也士夫及耆壯公論謂寧府多此一舉是中外人心皆謂不當與也寧王讀書明禮聰察識事斷不為此以損賢名偶未之思耳夫事有可為有不可為有可已有不可已江西公私匱竭人民滋困盜賊未息此何時也意者引錢無預于民不知存積僅二萬七千餘兩益府宫殿蟻蠧益殿下現移東寢萬分驚虞修蓋之費約三萬餘兩此不可已者也淮府造墳順昌王崇安王鎮國將軍起第己支五千三百餘兩後來未計此不可已者也所存儒學文廟傾頽問其故謂科例嚴所司顧忌不修之致此不可己者也各處豫備倉穀數少問其故謂罰贖解部所司計無自出此不可已者也官軍俸糧通融節縮嵗支尚少四萬四千餘石此不可已者也臣嘗見楚府殿燬久未蓋荆府多敝漏淮府同一江西頽垣朽柱東拄西撑飄瓦斷椽脫落大半居然廢址在民庶尚不堪惟寧府完美堅緻金碧燦煌夫于義不可已有可為割財內帑為之未過也有可已無可為又何必為此等事哉古者采椽不斫茆茨不翦土階贊堯卑宫贊禹儒服紀河間樂善紀東平湘州之約儉鎮西之輕財聖帝明王所以揚盛休垂後美者端亦在是寧府移封之初親至親也已不用琉璃再造之會國至富也又不用琉璃豈亦慕采椽茆茨之盛規崇古尚質示朴以垂憲如此哉今厯百年傳數世一旦無故而遽改之孝子順孫所以順祖考者義不當如是夫前之失後人尚諱之前之善後人忍改之耶改則盡沒之矣沒之非孝子沒之非順孫謂賢王肯為之耶臣所謂偶未之思者也况性習難靜易動難儉易奢操之猶懼或放縱之何往不流賢王春秋方盛德業方始求之身心自有專務而規規循常文具之間以毁前人法則臣未知其可臣數侍賢王言論多師法古人又誤被禮愛獨至臣深感切若無益于賢王罪死罪死臣往年疏府第之制以不用琉璃美寧先王義不當以用琉璃諛今王且小人先合後忤君子和而不同臣欲愛德市義完賢名不欲貢諛順旨虧至孝孟軻曰齊人莫如我敬王臣拘儒不識通變但知報王道當如此竭忠盡愚事陛下道當如此寧王靜思幡悟必有創于臣言者伏望聖明篤懿親斷大義垂善道使賢王德如純璧名若完甌毋涉吳王几杖之賜叔段京鄙之求正大明白恩不掩義為世世頌美幸甚臣無任隕越俟罪之至疏入帝不納請振紀綱疏𢎞治五年蔡清臣伏見近日彗星之異天道高逺其果為人間何事而見固未可必知然以目前之事計之或者外敵之勢方張而吾所以禦之之具無一可恃天之意其為此耶臣謂此病症也非病源也數十年來上下玩安忽危紀綱日以廢弛紀綱日廢則士風日弊士風日弊則民力日屈民力日屈則國勢危矣嵗復一嵗如種在地萌動有期雖使無邊場之警亦將有境內之憂故今日急務在朝廷之紀綱而其次在邊境紀綱既振朝廷既正疆場自固要荒自服矣何謂紀綱不振臣姑以耳目所及者言之前嵗皇上諭令羣臣陳時務得失于是兩京科道官請以皇上所得李廣受朝士賄賂簿籍按行黜罰此亦修省之大節目也而中外臣僚徇情為已曲相彌縫竟使皆得無恙縱以人衆為疑亦當去其太甚奈何明明指曰某為姦之首某為佞之魁而乃晏然朝端其所貶逐以應天變者僅言事御史胡獻一人耳既此一事皇上所親見而切齒者臣下猶能巧計彌縫如此况其他可以遊詞浪説眩惑于君門萬里之外者哉紀綱之廢弛一至于此士大夫風俗安得而不壞乎故一波動萬波隨謂罪皆可以計免何用惴惴懷刑謂功皆可以權得何必孜孜從事茍可以利其身赤子之填委溝壑不暇恤也茍可以利其家朝廷之大事所繫不暇顧也士風如此民力之屈尚忍言哉今民之貧者無立錐之地而宦官厮養宅舍擬于公侯金銀動以萬計此皆萬民膏血所萃也朝廷錙銖而取于民以為士馬之資者乃多充牣于庸將之家轉運于權幸之門于是兵弱不能衛民敵騎一至而邊氓之身家蕩然一空臣虞今日國中之虛實外敵亦當知之過半矣蓋士風弊則人才乏民力屈則兵力弱今日天下大勢皆然故謂備禦之具無一可恃也其可不及是時而振吾紀綱以救藥之乎夫賢者必用不肖者必去有功必賞有罪必罰此紲綱之大要而朝廷之所以為朝廷者也方今堂堂天朝幅員萬餘里尊無二上足兵足食綽綽有餘裕者惟紀綱朝振則國勢夕張矣不然地大不足恃久安更可危也周世宗高平之戰才一按誅敗將何暉樊愛能等而兵勢遽赫然改觀于俄頃之間自後百戰百勝率如破竹之勢則紀綱為國之命脈舉四肢貫百骸至重而不輕也明矣若夫紀綱之根本則又在于人主之一心故心正而後事可理理明而後心可正講學而後理可明學必正學毋循于文藝之末而後有明理之功其要不外乎真氏大學衍義一書所言矣此一書者真聖學之綱領也人主不但于經筵日講凡深宫燕居之際終食造次之頃皆當時時誦服不少遺忘務使其言浸漬融化于一心而時出迭見于應物之間然後為有得而天下事皆可無俟多言矣不然安得事事而爭之日日而正之也哉此雖書生之常談其實不易之至理蓋不患外患之不弭而患朝廷之不治不患萬事之不理而患君心之不明今日兵備廢弛邊境為尤甚其當救為尤急蓋朝廷養兵本以制敵而今多役于權要之門朝廷給財本以養兵而今多落于權要之手氣勢不振于未戰之先威令不行于方戰之際功罪不明于既戰之後我之虛實既素為敵之所窺敵之虛聲益足為我之所畏今欲救之糧賞宜遣朝官以頒給不必悉關白于將領私役宜專委官以訪察無事則蓄養其才力非親得雋于矢石之間者不得冒功宜從兵部報效試中者乃遣之一或敗事于旗鼓之下者不得逃罪宜委方正官員紀功者并察之然其要在于將帥之人品不凡人品不凡則無事于防察以妨其權其機在于朝廷之紀綱振舉紀綱振舉則自將帥以下無不用命昔儂智高屢敗官軍矣一用狄青為總帥而南方遂平于旬月之內唐憲宗討淮西不用宦官監軍而用裴度臨督一舉而事定蓋同此將領同此士卒同此器械糧賞亦在乎所以用之者何如耳此非經世之大本似亦救時之急務也疏入帝從之覆張九功正祀典疏議𢎞治六年倪嶽臣等謹詳古制天子祭天地祭宗廟祭社稷祭天下名山大川祭五祀凡載于祭典者皆有功德垂世如祭法所謂法施于民以死勤事以勞定國能禦大災能捍大患則祀之非此族髏不在祀典故孔子曰非其鬼而祭之諂也又曰淫祀無福先儒亦曰帝王無妄祭無徼福又曰明于天地之性不可惑以神怪知萬物之情不可罔以非類皆謂此也自秦以降乃多淫祠厯漢至元有因有革逮至國朝太祖高皇帝即位之三年首詔天下有曰夫禮所以明神人正名分不可以僭差今命依古定制凡嶽鎮海瀆並去前代所封之號止以山水本名稱其神郡縣城隍神號一體改正厯代忠臣烈士亦依當時初封以為實號後世溢美之稱皆與革去用稱朕以禮事神之意其天下神祠無功于民不應祀典者有司毋得致祭欽此欽遵及大明律內一欵凡私家告天拜斗焚燒夜香燃點天燈褻瀆神明者杖八十若僧道修齋設醮而拜奏青詞表文及祈禳火災者同罪還俗又一欵凡師巫假降邪神書符咒水扶鸞禱聖自號端公太保師婆及妄稱彌勒佛白蓮社明尊教白雲宗等會一切左道亂正之術或隱藏圖像燒香集衆夜聚曉散佯修善事煽惑人民為首者絞為從者各杖一百流三千里欽此欽遵其所以拯弊俗于千古垂至戒于萬世至深切矣列聖相承恪遵成憲間有因所感應之事而增益祠祭或以萬壽千秋等節而修建齋醮一時行之不察後遂襲以為例因循莫改增置益繁異端之徒轉相鼓煽怪誕相乘矯誣殊甚夫非禮之祭非類之禱近代帝王固不能無然絶地天之通嚴幽明之分在帝舜以為當務之急蓋非聖明之君卓然有見必不能深禁而痛絶之此給事中張九功之言所以深有望于今日者也伏乞聖明敬事天地孝事宗廟嚴事山川百神捨此之外凡有一應齋醮禱祠之類通行革罷不惟屛斥異端之姦亦可節省無益之費該部仍通行天下除應祀神祇照舊致祭外其餘非有功德利澤及民及不經奏勘不合祀典者即係淫祠俱各查考盡行革去僧道修齋設醮師巫假降邪神左道亂正者嚴加禁約敢有故違依律問罪其在京各宫觀寺廟神祇出處不載于正經功澤莫稽其顯迹但係非時遣祭者並皆停免中間有經纍朝崇建難于輟廢亦宜釐正其名號減殺其禮儀庶幾朝廷之上允合乎聖祖以禮事神之心至于祀典之存亦足致乎帝舜至諴感神之妙和氣協應國祚綿長人心以明風俗以正其于治道誠非小補今將查到在京各項祭祀除太倉之神漢壽亭侯關羽宋丞相文天祥俱祀典應祭外其餘各寺宫觀神祇應否致祭緣由逐一議擬開坐伏乞聖明裁處疏入帝從之請豫教太子疏𢎞治六年馬文升臣惟太子國之儲二社稷之安危繫焉所當豫教者也大易有養蒙之卦禮記載教世子之篇古帝王憂深思逺未嘗不以此為先務也皇上嗣登寶位敬天勤民法祖圖治至仁洽于四海大孝隆于兩宫皇天眷顧祖宗垂佑誕生皇子實出宫中姿表異常質性聰睿茲已能言能行矣不可不早為教養也蓋童蒙之時良知良能未有所誘天真渾然不早教之一有放失習與性成他日雖有良師傅教之亦難入矣為今之計必選醇謹老成頗知書史宫人如衛聖夫人楊氏者保抱扶持言語必教之以真正之音行步必教之以端莊之舉內庭之宴鐘鼓司承應不使之觀元宵之節鼇山之戲不使之見逮夫稍長嚴敇東宫老成內臣如太監覃吉者先教之誦習孝經使知孝弟之道出于天性仁敬之心本于自然至八嵗教之誦詩讀書凡尊尊親親之等仁民愛物之則無不啓知端其趨嚮及其漸長建立宫僚之時仍乞敇內閣大臣會同各部都察院等衙門堂上官慎選名實相符才德老成學問醇博端良重望之臣以充其任回邪詭祕者不使之預自此日出春宫講論經書涵養德性使知窮理正心修已治人之道凡世事委曲在所當知人物賢否在所當辨與夫上天之所當敬祖宗之所當法百姓之所當恤財物之所當惜如此則內外輔導得人而又教之于豫皇太子德不至于堯舜文武之域者臣未之信也臣以菲材荷蒙列聖厚恩叨任六卿之重又蒙皇上加臣太子少保正係東宫輔導之官臣受任以來夙夜惶懼思無以報惟在豫教皇儲以成至德今日之學與不學係他日之治亂是臣一得之愚惓惓忠愛之意也伏望聖明留意天下幸甚宗社幸甚臣不勝戰栗隕越之至疏入得旨是該衙門知道議疏黃河築決口狀𢎞治六年劉大夏臣等議得河南山東兩直𨽻地方西南高阜東北低下黃河大勢日漸東注究其下流俱妨運道雖該上源分殺終是勢力浩大較之漕渠數十餘倍縱有隄防豈能容受若不早圖恐難善後其河南所決孫家口楊家口等處勢若建瓴皆無築塞之理欲于下流修治緣水勢已逼尤難為力惟看得山東河南與直𨽻交界地方黃陵岡南北古隄十存七八賈魯舊河尚可泄水必須修整前項隄防築塞東注河口盡將河流疏導南去使下徐沛由淮入海經水州縣俱令隨處整理庶幾漕河可保無虞仍于潮神廟南北各造滚水石壩一條俱長三四十丈中砌石塊一條長十四五里以圖經久若此處隄防委任得人可以長逺仍照舊疏導汶水接濟運河萬一河流東決壩可以泄河流之漲隄可以禦河流之衝倘或夏秋水漲之時南邊石壩逼近上流河口船隻不便往來則于賈魯河或雙河口徑逹張秋北上以免濟寧一帶閘河尤為利便臣等仰知皇上洞見黃河遷徙之害深為國計民生之憂凡智力所及不敢不盡但欲興舉此等工役未免勞民傷財今山東等處荒歉之餘公私匱乏人夫尚可起倩財用無從取辦况好逸惡勞者怨謗易興聽聲躡影者議論難據臣愚乞敇戶兵二部會同在廷羣臣從長計處斟酌前項工程于理應否興止倘以臣言可採則其事宜速舉其買辦木石等項銀兩應于何處取用應用匠作等項口糧該于何處支給逐一處分明白定奪行令臣等遵守施行疏入帝嘉之賜璽書褎美申明律意疏𢎞治七年馬文升臣竊惟為治莫先于德教輔治莫先于刑罰洪惟我太祖高皇帝膺天眷命奄有萬方當前元入主之後法度廢弛之餘以為刑乃輔治之具不可不明首命大臣更定新律以一人心又命刑官重會衆律以協厥中而垂法萬世其勸善懲惡之意無以加矣且五刑之屬三千而罪莫大于十惡十惡之外而情莫重于強盜比之叛逆之徒相去不逺所以強盜條云凡強盜得財不分首從皆斬例該決不待時所以禁暴去惡懲姦止亂而輔治者也祖宗朝凡錦衣衛捉獲強盜綁赴御前引奏者俱奉綸音三法司錦衣衛午門前當時會問明白隨即具奏奉有欽依刑科三覆奏就行處決或有不待三覆奏而處決者所以良善者知所勸姦惡者知所懲典刑既正盜賊屛息至天順三年九月二十五日該司禮監官傳奉英宗皇帝聖旨人命至重死者不可復生自天順三年為始每至霜降後但有該決重囚著三法司奏請會集多官從實審録庶不寃枉永為定例欽此蓋專指律該秋後處決重囚臨決之際恐有寃枉故令三法司會集多官審録恐強盜重囚不在其內且強盜既該決不待時緣何監至秋後處決因有前該傳奉欽依所以一向因循但係強盜不分贓之多寡情之輕重俱監至秋後與秋後處決之囚一同會審比及會審之時十死七八存者監禁日久翻異原情能言者俱作矜疑情雖重而不決柔弱者俱作無詞情雖輕而行刑况處決之際因是囚衆多至日晚或至更深人多不見甚非刑人于市與衆棄之之義且情犯有輕重故行刑有遲速今常若如此則自此終無決不待時之強盜矣是強盜與鬭毆殺人者為無異矣又非歷代制律懲惡之意欲強盜之息得乎伏望皇上今後凡錦衣衛官捕獲強盜綁赴御前引奏者乞照先朝故事敕令三法司錦衣衛堂上官于午門前會問明白追有贓伏擬罪如律備由具奏奉有欽依刑科覆奏不必監候隨即處決中間果有情可矜疑者亦要明白上請定奪或有寃枉亦與辨明其法司徑問強盜及殺一家非死罪三人凶犯務在鞫問情犯明白贓仗直正毋撓于勢要毋拘于成案發大理寺審擬合律類奏奉有欽依者刑科覆奏亦就處決庶有以正邦刑而懲姦惡息厲階而安良善其律該秋後處決重囚照舊會審恭惟皇上寬仁慈厚實同舜禹而臣猶以此言進者蓋此時強盜恣肆劫財殺人全無忌憚比之往年大有不同殺一家非死罪三人者往往有之若不將強盜凶徒依律不時處決則恐厲階自此而生將來有不可制之患矣况辟以止辟刑期無刑帝王之盛事也強盜有犯不時處決餘賊知警是辟以止辟之意也蓋兵刑二事每每相須惡之小者以刑治之而有餘惡至于大雖兵加之而無益矣臣叨掌邦政弭盜安民乃其職任茍有所見事干國體不敢緘默疏入得旨是法司知道請添巡撫疏𢎞治七年馬文升臣竊惟我朝自宣德年間各地方添巡撫官員或都御史侍郎以節制三司比時惟河南山西陜西南直𨽻蘇松等府設有巡撫官其餘布政使止是不時差遣大臣巡視或一年二年而回所以三司官員互相因循府司官員惟知貪利以致福建賊首鄧茂七浙江賊首葉宗劉廣東賊首黃肅養倡為亂階多者數萬少者數千僭號稱王攻劫城池殺虜人民地方騷亂為之不寧者數年其廣西貴州苖蠻因而為亂朝廷命將出師方克𠞰平彼時兵食尚足人民富庶未甚費力近年以來宗室位多冗官太濫加以水旱相仍科派無極所在倉廩空虛軍士乏糧城池坍塌武備廢弛守門者皆老幼之卒操練者半尫羸之輩如湖廣桂陽縣被賊百十人進城如入無人之境江西贛州府地方流賊數百劫掠十數餘日至今未曽捕獲福建武平廣東程鄉縣賊盜尤甚倘或哨聚日久為患非輕其浙江大戶之家或爭私忿各聚人衆相殺數日有司莫敢禁治誠非治世所宜若非添設巡撫官員早為整治將來之患有不可測今江西已添巡撫官一員但止管南贛二府及福建汀州府廣東韶州南雄湖廣彬州一帶不預民事三司官員未聽節制難以行事查得本部先嘗建議要于福建浙江添設巡撫官員未蒙俞允今日之勢又非前數年之比矣應合早為處置臣等職掌兵政天下安危所繫若不弭之于早萬一有事臣等萬死何足以贖伏望皇上以地方為重乞敕吏部會同本部推舉練達老成剛柔兼濟官二員為都御史巡撫浙江福建地方專一撫安軍民緝捕盜賊禁貪殘除姦弊修理城池整飭武備措置倉糧操練民兵凡事與鎮守內臣計議而行大意以弭盜安民為本其江西都御史金澤就令巡撫江西多在南贛二府居住仍兼管廣東韶州南雄二府及湖廣郴州桂陽一帶候命下之日各另請敕行事疏及入帝不納御選明臣奏議卷七
