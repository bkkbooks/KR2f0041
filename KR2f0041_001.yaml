body:
  text: 乾隆四十六年十月二十七日內閣奉上諭厯代名臣奏疏俱有流傳選刻之本現在四庫全書內經館臣編次進呈其中危言讜論關繫前代得失者固可援為金鑑至勝國去今尤近三百年中藎臣傑士風節偉著者亦不乏人跡其規陳治亂抗疏批鱗當亦不亞漢唐宋元諸臣而奏疏未有專本使當年繩愆糾謬忠君愛國之忱後人無由想見非所以垂法戒著勸懲也即或其人品誼未醇而其言一事陳一弊切中利病有禆時政亦不可以人廢言至神宗以後諸臣奏疏內有因遼瀋用兵涉及本朝之處彼時主暗政昏太阿倒置閹人竊柄權幸滿朝以致舉錯失當賞罰不明其君綴旒于上竟置國是若罔聞遂至流冦四起兵潰餉絶種種秕政指不勝數若楊漣左光斗熊廷弼諸人或折衝疆場或正色立朝俱能慷慨建議剴切敷陳設明之君果能採而用之猶不致敗亡若是之極其事距今百十餘年殷鑒不逺尤當引為炯戒則諸人奏疏不可不亟為輯録也除明史本傳外所有入四庫全書諸人文集均當廣為搜採裒集成編即有違礙字句秖須略為節潤仍將全文録入此事關繫明季之所以亡與我朝之所以興敬怠之分天人之際不可不深思逺慮觸目警心著派皇子同總師傅蔡新等為總裁其皇孫皇曾孫之師傅翰林等即著為纂修校録陸續進呈候朕親裁書成後即交武英殿刋刻仍抄入四庫全書將此㫖冠于簡端所有前派紀昀等選出神宗以後各奏疏即著歸入此書按其朝代一體編纂特諭
