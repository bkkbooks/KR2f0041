  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_019-1a, image: WYG0445/WYG0445-0255a.png}
body:
  text: 請崇典禮親政務疏正德十四年楊廷和臣竊惟大祀南郊乃人君敬天第一事皇上所以仰承眷命茂膺景福者端在于此今聖駕南征罪人既得實天佑我國家所以戡定禍亂如此之速正宜奏凱班師舉行大禮告成於天以致享薦之誠明年春孝貞太皇太后大祥祔廟奉安神主俱應皇上躬親行禮非臣下所敢攝行者乂今天下諸司官員赴京朝覲吏部㑹官考察必須皇上親臨黼座靣賜裁決近日以來內外衙門具題事務纍次齎奏日久未見發出施行率多積滯如推用巡撫等項官員處置各邊兵糧問擬罪犯等事動經數月未奉明㫖人心疑惑誤事非細所據前項典禮政務關繫重大不可輕忽伏望聖明留神省覽俯賜采納中外臣民不勝慶幸疏入帝不納止微行疏正德十四年楊廷和臣荷國厚恩叨官內閣供職無狀心竊憂慙竊見近日以來在京各衙門題奏一應軍馬錢糧緊要事情動經旬月猶未得㫖事多壅滯不行又道路相傳聖駕不時巡行市肆或至野館菜園等處遊幸夜或不歸甚至馳驟街衢衝冒風雨深更靜夜出入宫門臣等初聞且驚且疑未敢輕信已而流傳既久衆議紛然今亦不敢不信況聞逺處軍民皆有不美之談臣等之心尤有不勝其隱憂者謹具奏聞伏惟聖明鑒納自今以後切望尊居九重裁決庶務頤養天和茂隆國本流通政務安內攘外綿宗社億萬年無疆之慶臣不勝惓惓之至疏入帝不納防邊患疏正德十四年王瓊臣謹奏議得明年黃河凍開邊敵大營若在河東威寧海子等處駐牧仰賴皇上威武嚴督宣大將官整搠軍馬及調延綏遊奇兵馬相機戰守邊敵入境必遭挫衄但恐河開邊敵在套駐牧擁衆深入延綏寧夏陜西地方廣闊兵馬分布不周難為戰守查得今之黃河套即漢河南朔方之地自古胸奴所居為患中國我朝除以前年分不查外𢎞治十四年套衆大舉深入命太監苗逵保國公朱暉統領京營官軍𠞰殺人命工部侍郎李鐩督理軍餉𢎞治十八年套衆大舉深入正德十年又大舉深入豫設總制都御史鄧璋調各路人馬防禦敵衆俱至固原平涼下營分投搶殺官軍寡弱俱未能成功正德十三年套衆聞知固原有備蘭鞏空虛欲從乾鹽池西入蘭鞏搶殺今不及早議處邉敵在套陜西地方必又被害合無本部差人馬上齎文交與宣府大同山西延綏寧夏甘肅陜西各該鎮巡官各差的當人役哨探查勘黃河凍開之後邊敵大營若不在套在于河東威寧海子等處駐牧宣大山西三鎮嚴謹隄備延綏遊竒兵馬聽調䇿應若不過河在套駐牧待候草長田茂勢將深入之時延綏遊竒等兵俱分布定邊安邊等營寧夏人馬俱分布花馬池等處遞年敵衆經行之處遇寇侵入㑹合𠞰殺陜西鎮巡官豫先計處除環慶固靖守備人馬及固原遊兵外再量調取腹裏衛所州縣堪用戰陳官軍土兵民壯編成隊伍委官管領處置盔甲馬匹並查照舊例豫造戰車火器炮銃等項料敵必由之路設伏隄備一遇敵入出竒奮擊或乘夜斫營或截其歸路伏相機行事再行宣府大同甘肅各鎮巡官各挑選精鋭官軍三千員名定委將官統領俱約定五月以裏到于固原㑹合禦敵户部奏差堂上官一員整理軍餉本部另行議奏差官處馬匹聽候屯置軍一應禦敵防邊本部今擬不盡事宜聽各該鎮巡官作急計議具奏定奪如此庶謀有豫定事得先機伏乞聖明俯念近年邊敵大肆搶掠地方受害早賜裁處特敕各該鎮巡官遵守施行邊方幸甚疏入得㫖是近年以來邊敵深入搶掠地方受害這禦敵防邊事宜恁部裏計慮周詳議處明白便差人馬上齎文著各該鎮巡等官依擬行不許怠玩停差燒造太監疏正德十四年唐龍臣惟鎮守太監一到地方凡百供應役使與夫無名之徵嵗該銀幾萬兩奏帶參隨供奉又該銀幾萬兩至于燒造太監應辦物料與供應役使之人嵗該銀二萬七千餘兩通總計銀十萬餘兩皆取於民西江地方被宸濠所虐誅求殆盡且連被災旱田無擔石之收室無升斗之積官兵四集民窮財盡殆未有如今日者設補鎮守燒造太監則前項銀兩何所出辦再念江西人稠俗黠人稠則易集而難散俗黠則易動而難安况盜賊無種起于飢寒禍福無門生于窮迫即今鄱陽湖賊船數百往來劫殺各府州縣非告白晝殺人則訴黑夜劫奪盜賊無處無之兼之桃源東鄉贛州南安懷疑之輩反側未安臣朝夕致慮為今之計惟有鎮之以安靜和平庶幾無虞若地方稍加騷擾則其變立起矣前議查革不蒙俞允未幾鎮守燒造太監相繼差出百姓聞之相顧失色且懼且泣曰人殃乃至乎頃䝉聖明將邱得拏問尹輔取回百姓聞皆私慶曰人殃幸不來乎自兹良善樂業矣官府不添科派矣獄訟賊盜日可消矣夫前項太監初本為地方而設今聞其來憂愁懼泣則若遇蛇蝎聞其不來則歡欣鼓舞若脫水火是誠何賴焉且江西前此之民止遇兵戈旱暵與宸濠之毒而巳加以淫雨無時洪水迭至禾稼淹溺室廬傾圮民之困苦比前尤甚伏望查照天順年間停差事例將江西鎮守太監崔和取回别用一應地方事宜俱責成巡撫三司等官綜理將燒造大監永久查革磁器行令饒州府督造起解供用臣又惟今之太監即古之閽寺也周禮閽人寺人掌王宫門掃除之役一切政事皆不預焉太祖初定天下百僚庶職無所不備而獨不立鎮守太監蓋倣周為治也其措意誠逺立法誠至永樂間始于緊關處暫設鎮守是時江西尚無嗣後乃不以原立者為成法而以暫設者為舊規甚至數人而營一缺一年而更數人以致橫政肆出綱紀蕩然民財蠧耗海內多事孝廟末年深知其害力與劉大夏商議罷之後復中止至今天下以為憾夫求治者必先去其妨治之源愛民者必先除其害民之本鎮守太監誠今日妨治害民之大者也伏望斷自宸衷將各處鎮守一併查革以復太祖之規以成孝宗之志則天下之禍亂于是乎塞蒼生荼毒于是乎除矣疏入帝不納江西捷音疏正德十四年王守仁臣竊惟寧王賊殺善類剝害細民數其罪惡世所未有不軌之謀已踰一紀兼以招納叛亡誘致劇賊渠魁如吳十三凌十一之屬召募四方武藝驍勇者萬有餘徒又使其黨王春等分齎金銀數萬隂置姧徒于滄州淮揚山東河南之間亦各數千比其起事之日從其護衛姻族連其黨與朋私脅其啇旅軍民使各募兵從行多者數千少者數百帆檣蔽江衆號一十八萬且又矯稱密㫖以脅制逺近僞傳檄諭以搖惑人心其舉兵倡亂一月有餘而四方震懾畏避皆謂其大事已定莫敢與之抗衡抱節者僅堅城而自守忠憤者惟集兵以待時非智謀忠憤不足其氣熖使然也臣才自囿于凡庸知每失之迂謬當兹大變輒敢冒非其任以行旅百數起事於危疑顛沛之中旬月之間遂能克復堅城俘擒首惡是固上天之隂隲陛下之威名而廟廊謀議諸臣消禍于將萌見機于未動改臣提督使得扼制上流而凛然有虎豹在山之威申明律例使人自為戰而翕然有臂指相使之形敕臣以及時策應不限以地而隱然有常山首尾之勢故臣得以不俟詔㫖之下而調集數郡之兵數郡之民亦不待詔㫖之督而自有以赴國家之難長驅越境直搗窮追人徒見嬖奚之多獲而不知王良之善御有以致之也然則今日之舉廟廊諸臣豫謀早計之功又孰得而先之乎伏願皇上論功錫命之餘普加爵賞旌擢以勸天下之忠義以勵將來之懦怯仍詔示天下使知姧雄若寧王者其不軌之謀巳十有餘年而廢之旬月輒就擒滅于以見天命之有在神器之難窺尤願皇上端拱勵精以承宗社之洪休以絶姧雄之覬覦則天下幸甚疏入帝不納邊軍缺食乞早議處疏正德十四年王瓊臣謹奏看得巡撫宣府都御史寧杲咨稱各路城堡官軍擁門稟告月糧半年未支人心憂惶不能度遣將來冬深及春夏軍日愈貧飢日愈甚逃竄死亡日多墩堡空虛誰與戰守要早議處一節臣等議得㑹計邊儲惟由户部職掌而軍士逃亡實與兵政相關且祖宗朝開設邊鎮屯兵集糧百五十餘年俱有定規今一旦匱乏如此若非原額虧缺必是浪費過多若不急為議處禁止軍士逃散失誤防禦關繫匪輕合無本部馬上齎文交與都御史寧杲等將缺糧軍人處置借支從權寬恤毋拘常法逼迫逃竄仍咨户部作急查議拖缺者追補缺少者借撥及查近年不足之由今日足用之法議處明白作急陳奏定奪庶軍不困憊邊備幸甚疏入得㫖是陳急務疏正德十四年黃鞏臣謹奏伏惟陛下臨御以來祖宗之綱紀法度一壞于逆瑾再壞于侫幸又再壞于邊帥蓋蕩然無餘矣天下知有權臣不知有天子亂本已成禍患將起試舉當今最急者陳之一崇正學臣聞聖人王靜君子慎動陛下盤遊無度流連忘反動亦過矣臣願陛下髙拱九重凝神定慮屏紛華斥異端逺侫人延故老訪忠良可以涵養氣質薰陶德性而聖學維新聖政一舉二通言路言路者國家之命賑也古者明王導人以言用其言而顯其身今則不然臣僚言及時政者左右匿不以聞或事關權臣則留中不出而中傷以他事使其不以言獲罪而以他事獲罪由是雖有安民長䇿謀國至計無因事逹雖必亂之事不軌之臣陛下亦何由知臣願廣開言路勿罪其出位勿責其沽名將忠言日進聰明日廣亂臣賊子亦有所畏而不敢肆矣三正名號陛下無故降稱大將軍太師鎮國公逺近傳聞莫不驚嘆如此則誰為天子者天子不以天子事陛下而以將軍事陛下天下皆為將軍之臣矣今不削去諸名號昭上下之分則體統不正朝廷不尊古之天子亦有號稱獨夫求為匹夫而不得者竊為陛下懼焉四戒遊幸陛下始時遊戲不出大庭馳逐止於南內論者猶為不可既而幸宣府矣幸大同矣幸太原榆林矣所至費財動衆郡縣騷然至使民間夫婦不相保陛下為民父母何忍使至此極也近復有南巡之命南方之民爭先挈妻子避去流離奔踣怨讟煩興今江淮大饑父子兄弟相食天時人事如此陛下乂重蹙之幾何不流為盜賊也姧雄窺伺待時而發變生在內則欲歸無路變生在外則望救無及陛下斯時悔之晚矣彼居位大臣用事中官親昵羣小夫豈有毫髮愛陛下之心哉皆欲陛下逺出而後得以檀權自恣乘機為利也其不然則袖手旁觀如秦越人不相休戚也陛下宜翻然悔悟下哀痛罪已之詔罷南巡撤宣府離宫示不復出發內帑以賑江淮散邊軍以歸卒伍雪已往之謬舉收既失之人心如是則尚可為也五去小人自古未有小人用事不亡國喪身者也今之小人簸弄威權貪溺富貴者實繁有徒至于首開邊事以兵為戲使陛下勞天下之力竭四海之財傷百姓之心者則江彬之為也彬行伍庸流凶很傲誕無人臣禮臣但見其有可誅之罪不聞其有可賞之功今乃賜以國姓封以伯爵託以心腹付以京營重寄使其外持兵柄內蓄逆謀以成騎虎之勢此必亂之道也天下切齒怒罵皆欲食彬之肉陛下亦何惜一彬不以謝天下哉六建儲二陛下春秋漸髙前星未耀祖宗社稷之託搖搖無所寄方且逺事觀遊屢犯不測收養義子布滿左右獨不能豫建親賢以承大業臣以為陛下殆倒置也伏望上告宗廟請命太后旁諏大臣擇宗室親賢者一人養于宫中以繫四海之望他日誕生皇子仍俾出藩實宗社無疆之福也疏入帝怒甚下詔獄復跪午門五日期滿仍繫獄越二十日廷杖五十斥為民諫泰山進香疏正德十四年鄭善夫臣聞芻蕘草野皆得獻于君臣待罪禮官竊守職事不能匡正萬一愧死無地近奉明旨有以威武大將軍鎮國公前往泰山獻香者竊念此事雖芻蕘草野茍有一念愛君蓋有䝉死而言其必不可矣況臣身有官守職與奉行者哉臣聞天子端居外屏以示嚴也非郊社弗離其宗廟以承重也宫墻九重出則警蹕以防姧也夫以天下大器權姧側目而不敢發者無其便耳陛下獨不見劉瑾之事乎陛下託瑾以心膂委瑾以機務時豈不以瑾為盡忠社稷且日在左右而一旦叛逆乃爾況今乘輿逺出萬一變出陛下誰保以無虞乎前車之覆後車之戒臣不敢斷其必無也且陛下逺舍宗廟以祀泰山誠以為社稷人民耶臣聞兩露所滋無不孶息雷霆所壓無不摧折煦然而福肅然而威萬化時行百神率職者天也泰山之神其有尊於天乎故于在天之下者祖宗相承之社稷人民也今以付之陛下誠欲陛下敬天之威和其人民保其社稷而能享其宗廟獻香之事其有重于郊社之禮與禘嘗之義乎今陛下郊不親牲齊不誓戒改卜者三出而馳道恐非所以事天享帝也禘嘗大禮率不親往恐非所以尊祖敬宗也是故圜丘之上烈風揚沙太皇太后祔廟之夕而七月雨雹此天戒也陛下顧不動心敬此天戒乃輟萬幾冒重險以事于泰山何哉臣見五嶽之神不啻天之僕𨽻也暴慢于主翁而敬恭于僕𨽻不待智者而知其必不敢享也況今民窮財盡青齊淮楚之間水旱連年甚至有父子相食者六飛一過勢必嘯匿山谷儻重傷心更何以徼福于社稷哉夫興亡之勢皆積漸而後成不可不察也陛下連嵗北巡而為陛下留行者抗言有害而未見其害非惟無害而反有利宜陛下厭言者之無稽而果于獨用其意也臣愚以陛下之漸成矣昔扁鵲再說齊君不用三見而遁去嘆曰昔公疾在腸胃湯爇可及也及在腠理針砭可及也今入骨髓矣雖有司命將奈之何哉臣恐失今不治而扁鵲遁矣天下名實方懼大乖春秋尊無二上制王公而下皆曰人臣今忍以天子之尊自貶而稱公此莫大之怪也非但大怪也且必有大憂今天下藩王皆陛下臣子也車駕所至萬一以公禮處陛下將安而受之耶抑責其不臣無禮耶明明祖訓臣恐彼有執詞矣且陛下之所欲自封者豈不以雄姿大略自足纍功將相耶然袵金革暴霜露縱能手格單于身甚勞而功顧甚鄙也臣聞堯舜惟恭默無為而萬世言治不聞其擅一將之長今不師堯舜則亦已矣亦不聞有先帝乎先帝敬天勤民親賢逺色察侫幸絶游畋亦惟自正其心以為天下本實未嘗有所作為下親將相之事也然而文武效用身不勞而天下治此陛下與左右所習知者陛下夜氣清明之時獨不一思先帝之所為乎臣竊以治亂之機實在陛下一心心一正則百邪皆廢陛下試一轉移靜求先帝何故身不勞而反治今何故身獨勞而反亂則一切荒淫悖謬之事將自追悔不暇只此一念欲成堯舜事業不難也夫以陛下之聰明英武顧不惜勞瘁其身以求治而豈惜一念之轉移哉惜無明智者早為陛下陳之也臣本草野職非言路所以寧觸忌諱不敢愛死者誠惜陛下之英明而不忍視天下之日蔽也謹疏上聞伏侯敕旨疏入忤旨廷杖請還宸濠所占民田疏正德十五年唐龍臣惟財者民之命也財散則民聚民者邦之本也本固則邦寧故文帝以賜租致富樂之效太宗以裕民成給足之風君子一體古今同符今寧賊宸濠志窮荒度謀肆併吞其于民間田地山塘房屋或用勢强占或減價賤買或巧為准折或妄行抄收中人之家一遭其毒即無棲身之所上農之田一中其奸即無用鋤之地猶且虛填契書以杜人言私置簿籍用增稅額利歸一已害及萬家前副使胡世寧直言指陳繼科道官交章舉發言皆有據事非無徴近奉詔書曰宸濠天性凶惡自作不靖强占官民田産動以萬計則陛下明以燭奸深知宸濠田産皆奪諸百姓者也又曰占奪田産悉還本主則陛下仁以憫下盡欲舉百姓之田産而給還之也聖言具在昭如日星國信不移堅如金石頃者宸濠既敗一應田地山塘房屋俱抄沒造報矣但查勘時業主多因驚散上司急欲了事依契溷查占買未分明詔雖有給主之條小人猶抱失業之恨澤未下究怨徒上歸況屋無主則毁地不耕則荒故兵馬之後瓦柱僅存田野之間草萊漸長兼以勢豪奸徒有私竊之計開埋沒之端其在南昌新建與惡同處受害獨深賊師起事抄掠尤慘圍雖已破殘者未蘇查得二縣額派兑軍淮安京庫三項糧米共十一萬九千石有零淮益二府祿米兵四千二百石節奏寬免未奉停徴民納不前官宜為處然一方之統㑹在于省城各府之錢糧併于司庫今布政司官先被賊兵劫掠繼因軍餉動支萬一變生則寸寸兵尺鐵皆無所需束芻斗糧亦不能辦且省城各門城樓窩鋪及諸司衙門先為王府占據多屬疏隘近因水災蔓延半遭蕩焚夫城樓者一方防禦之所關衙門者諸司政令之所出託始創新因陋就簡誠一時之不可廢者也乞敕該部速為處分工恤公家之所急下濟萬民之所需則庶乎財聚而民安矣疏入帝命下部議行水災自劾疏正德十五年王守仁臣惟有官守者不得其職則去受人之牛羊而為之牧者求牧與芻而不得則反諸其人臣以菲才謬膺江西巡撫之寄今且數月曽未能有分毫及民之政而地方日以多故民日益困財日益匱災變日興禍患日促自春入夏雨水連綿江湖漲溢經月不退自吉贛臨瑞廣撫南昌九江南康沿江諸郡無不被害黍苗淪沒室廬漂蕩魚鱉之民聚棲于木抄商旅之舟經行于閭巷潰城決隄千里為壑煙火斷絶惟聞哭聲詢諸父老皆謂數十年來所未有也徐行各該司府州縣修省踏勘具奏外夫變不虛生緣政而起政不自弊因官而作官之失職臣啓其端何所逃罪夫以江西之民遭厯宸濠之亂脂膏己竭而又因之以旱荒繼之以師旅縱使豐稔連年曲加賑恤尚恐生理未易完復今又重以非常之災危急若此當是之時雖使稷契為牧周召作監亦恐計未有措況病廢昏劣如臣之尤者而畀之􅸨然坐尸其間譬使盲夫駕敗舟于顛風巨海中而責之以濟險不待智者知其覆溺無所矣又况部使之催徴益急意外之誅求未已在昔一方被災鄰省尚有接濟之望兹湖湘連嵗兵荒閩浙頻年旱潦兩廣之征勦末息南畿之供餽日窮淮徐以北山東河南之間聞亦飢饉相屬由此言之自全之䇿既無所施而四鄰之濟又已絶望悠悠蒼天誰任其咎靜言思究臣罪實多何者宸濠之變臣在接境不能圖于术形致令猖突震驚逺邇乃勞聖駕親征師徒暴于原野百姓殆于道路朝廷之政令因而閼隔四方之用憊由是日深臣之大罪一也徒避形迹之嫌茍為自全之計隱忍觀望幸而脫禍不能直言極諫以悟主聽臣之大罪二也徒以逄迎附和為忠而不知日陷于有過徒以變更遷就為權而不知自紊于舊章徒以掇拾羅織為能而不知日離天下之心徒以聚斂徴索為計而不知日積小民之怨此臣之大罪三也上不能有禆于國下不能有濟于民坐視困竊淪胥以溺臣之大罪四也且臣憂悸之餘百病交作尫贏衰眊視息僅存以前四者之罪人臣有一於此亦足以召災而致變況備而有之其所以逮天神之怒深下民之憤而致災沴之集又何疑乎伏惟皇上軫災恤變别選賢能代臣巡撫即以臣為顯戮彰大罰于天下臣雖隕首亦云幸也即不以之為顯戮削其祿秩黜還田里以為人臣不職之戒庶亦有位知警民困可息人怒可泄天變可弭而臣亦死無所憾矣疏入帝不納乞寬免稅糧疏正德十五年王守仁臣照得正德十四年七月內節據吉安等一十三府所屬廬陵等縣各申為旱災事開稱本年自三月至於秋七月不雨未苗未及發生夏稅秋糧無從辦納人民愁嘆將及流離申乞轉逹寬免等因到臣節差官吏老人踏勘前項地方委自三月以來雨澤不降禾苗枯死續該寧王乘釁鼓亂傳播僞命優免租稅小人惟利是趨洶洶思亂臣因通行告示許以奏聞優免稅糧諭以臣子大義申祖宗休養生息之澤暴寧王誅求無厭之惡由是人心稍稍安禁背逆趨順老弱居守丁壯出征團保饋餉邑無遺户家無遺夫就使雨暘時若江西之民亦已廢耕耘之業事征戰之苦況軍旅旱乾一時併作雖富室大户不免飢饉下戶小民得無轉死溝壑流散四方乎設或飢寒所迫徴輸所苦人自為亂將若之何乞敕該部暫將正德十四年分稅糧通行優免以救殘傷之民以防變亂之階伏望皇上罷冗員之俸損不急之賞止無名之徴節用省費以足軍國之需天下幸甚緣由于本年七月十三日具題請旨耒奉明降隨䝉大駕親征京邊官軍前後萬數㳫至並臨填城塞郭百姓戍守鋒鏑之餘未及息肩弛擔又復救死扶傷呻吟奔走以給厮養一應誅求妻孥鬻于草料骨髓竭于徴輸當是之時鳥驚魚散貧民老弱流離棄委溝壑狡健者逃竄山澤羣聚為盜獨遺其稍有家業與良善守死者十之二三又皆顛頓號呼于梃刃捶撻之下郡縣官吏咸赴省城于兵馬住屯之所奔命聽役不復得親民事上下洶洶如駕漏船于風濤顛沛之中惟懼覆溺之不暇豈遑復顧其他為日後之慮憂及稅賦之不免徴科之未完乎當是之時雖臣等亦皆奔走道路危疑倉惶恐不能為小民請一旦之命豈遑為嵗月之慮憂及賦稅之不免徴科之未完而睱為之復請乎若是者又數月京邊官軍始將有旅歸之期而戶部嵗額之徴已下漕運交兑之文己促督催之使切責之檄已交馳四集矣流移之民聞官軍之將去稍稍脅息延望歸尋其故業足未入境而頸已繫于追求者之手矣夫荒旱極矣而又因之以變亂變亂極矣而又加之以師旅師旅極矣而又竭之以供饋益之以誅求亟之以徴斂當是之時有司者不忍睹有耳者不忍聞又從而朘其膏血有人心者而尚忍為之乎今逺近軍民號呼匍匐訴告喧騰求朝廷出帑藏以賑濟久而未獲反有追徴之令鬨然興怨謂臣等昔日蠲賦之言為紿已竊相傷嗟謂宸濠叛逆猶知優免租稅以要人心我輩朝廷赤子皆嘗竭骨髓出死力以勤國難今困窮已極獨不䝉少加優恤又從而追徴之將何以自全是以令之而益不信撫之而益憤憤諭之而益呶呶甫懷收復之望又為流徙之圖計窮勢迫匿而為奸肆而為寇兩月以來有司之以鼠竊警報者月無虛日無怪也彼無家業衣食之資無父母妻子之戀而又旁有追呼之苦上有捶剝之災自非禮義之士孰肯閉口􅑎腹坐以待死乎雖朝廷亦嘗有寬恤之令矣亦嘗有賑濟之典矣然寬恤賑濟內無帑藏之發外無官府之儲而徒使有司措置夫措置豈能神輸而鬼運必將取之富民今富民則又皆貧民矣削貧以濟貧猶割心臠肉以啖口口未飽而身先斃且又有侵尅之弊又有漁獵之奸民之賴以生者不能什一民之坐而死者常什九矣故寬恤之虛文不若蠲租之實惠賑濟之難及不若免租之易行今不免租稅不息誅求而徒曰寬恤賑濟是奪其口中之食而曰吾將療汝之飢刳其腹腎之肉而曰吾將救汝之死凡有血氣皆將不信之矣今户部以國計為官漕運以轉輸為任今嵗額之摧交兑之促皆其職使然但民者邦之本邦本一搖雖有粟吾得而食諸伏望皇上軫念地方塗炭之餘小民困苦已極思邦本之當固慮禍變之可憂乞敕該部速將正德十四十五年該省錢糧悉行寬免其南昌南康九江等府殘破尤甚者重加寬貸便得漸回喘息修復生理非但解江西一省之倒懸臣等無地方變亂之禍得免于誅戮實天下之幸宗社之福也夫免江西一省之糧稅不過四十萬石今吝四十萬石而不肯蠲異時禍變猝起即出數百萬石已無救于難矣此其形迹易見事理甚明者臣等上不能㑹計征斂以足國用下不能建謀設䇿以濟民窮徒痛哭流涕一言小民疾苦之狀惟陛下速將臣等黜歸田里早賜施行以紓禍變疏入帝不納請正大獄疏正德十四年楊廷和臣惟科道官劾奏張鋭等罪惡陛下赫然震怒下之法司天下聞之交相喜慶既而法司議上再命㑹官詳審臣等擬票進呈俱從上改竟至寬貸聞者莫不駭愕以為不誅此則國法不正公道不明九廟之靈不妥萬民之心不服禍亂之機未息太平之治未臻語曰上無失政下無私議殺一人而千萬人懼天下之大政也縱奸長惡而使亂臣賊子無所懲戒此行政之大失也所以科道與刑部司屬相繼言之或交章或獨奏入則議於朝出則議于巷逺臣小吏亦將有聞風而言者不意聖明有此舉措也自古帝王制刑三千餘條曰元惡大憝不待教而誅皇祖大明律一書首之以十惡大罪不待時而決如張鋭等正所謂誅不待教殺不待時者也堯時四凶之罪不過巧言令色治水無功而已舜誅殛之而天下咸服令張鋭等之罪萬倍于四凶而其罪止豫充軍何以服天下之人心乎姑以近日之事校之張鋭等所犯與錢寧江彬相同畢真王綸等又在其下錢寧等既伏誅而張鋭等乃得保其首領罪同罰異使錢寧等有知亦當不服于地下矣此輩縱不一一皆誅而張鋭張雄張忠三人決不可赦伏望俯納羣言即賜宸斷將張鋭張雄張忠三人仍依原擬則大法以正而人心皆服天下傳之史冊書之直可與舜之誅四凶千古並美矣疏入帝不納請均田役疏正德十六年唐龍臣惟國初計畝成賦縣有定額嵗有常征故糧均而民不病今江西巨室置産者遇造冊時行賄里書有飛灑現在人户者名為活灑有暗藏逃絶戶內者名為死寄有花分子戶不落戶眼者名為畸零帶官有留在賣戶全不過割者有過割一二名為包納者有全過割而不歸正户有推無收有總無撒名為懸掛掏回者有暗襲官員進士舉人揑作寄莊者在冊僅紙上之名在户皆空中之影以致圖之虛以數十計都之虛以數百計縣之虛以數千萬計遞年派糧編差無所歸者俱令小户賠償小戶逃絶令里長里長逃絶令糧長糧長負纍之久亦皆歸于逃且絶而已此弊惟江西為甚江西惟吉安為甚故遇僉當糧長者大小對泣親戚相弔至有寧充軍毋充糧長之謡臣嘗立法清理雖未收釐革之功亦稍有規正之漸大抵利者人之所欲也利多則樂趨法者人之所畏也法輕則易犯臣伏覩律例欺隱田糧罪止滿杖其田入官所欺稅糧依數徴納若詭寄影射并受寄者罪如之其田改正各鄉書手飛糧二百石以上發邊衛充軍夫不法之徒但知收租不知納糧里書但顧圖利不顧壞法皆奸民之首也今罪止於杖照常發落所以不可禁也乞令守巡官分詣地方嚴督州縣將境內飛詭田糧酌量弊深者挨田丈量輕者挨戶清理究首尾之因度廣狹之則定髙下之科分肥沃磽瘠之等均壅淤開懇之數各將原糧填入原田付歸原户使圖總都總縣總每圖令造流水冊各十本每年各收一本每縣造大流水冊各四本解南京後湖各一本布政司並該府州縣收架各一本以後因戶推田因糧編差戶與田有一定之額糧與差無兩避之患庶幾弊革利興一勞永逸賦役自此可充户口自此可復息盜止訟未必無少補焉疏入帝命下部議行御選明臣奏議卷十六
