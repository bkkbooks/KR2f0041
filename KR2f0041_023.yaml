body:
  text: 停國戚張鶴齡等恩典疏嘉靖二年張原臣謹奏昨見吏部奉敕皇親太師壽寧侯張鶴齡進封昌國公慶陽伯夏臣加太子太保欽此又奉敕都督同知陳萬言進封伯爵與誥劵子孫世世承襲欽此又該司禮監太監張欽傳奉聖旨都督同知陳萬言男陳紹祖與做尚寶司司氶欽此又該傳奉聖旨舍人蔣泰蔣清蔣昶俱與做正千戶吳振武授俱百戶欽此臣聞命錯愕甚有不安于心者竊惟祿以報德爵以賞功天地之常經先王之大法祖宗之定制不可易也易則濫濫則賤賤則無以收檢人心砥礪世道陛下纘祖宗大統為天下義主當以爵祿為公天下之具以待天下有才德之人不宜私恩外家而濫施妄豫以隳祖宗天下之法制鶴齡等無間關百戰功非俊傑九德士徒以椒房之親重荷恩寵富貴已極名位己甚今無一事復加崇階者一人授六品文職者一人五品武職者三人六品武職者二人不惟寵賚頻仍爵賞橫濫抑且私厚戚屬輕用王章臣竊為陛下不取也萬言新聫國戚列佐督府循之舊例進封以伯固有可諉臣猶嫌以太驟鶴齡等果何謂耶若以為母之恩罔極陛下之孝未盡則去歲之詔覃恩已至今兹之豫又似無名縱使鶴齡等有積勞于國家則論功行賞亦止宜于一行豈可去年降一敕今年又降一敕去年加官今年又加官洪恩過寵頻頒疊見以瀆以僭至于如此然則何時可已也吳振武受又出異姓臣不知為何人今皆曲緣私恩一概濫被輕授無度實啓傳升之厲階何以壓塞人言防杜僥幸臣所以不能不駭且惜也且公之與伯上爵也五品六品文武官階重職也封拜大事也陛下不謀之輔弼大臣輒自內降手敕率易行之揆之事理殊未為安况大恩不可以頻假上爵豈容以輕授祖訓昭然法制具在陛下又似不宜任情率易行之也夫富貴忌于太盈功名嫌于過盛造化消息盈虛之理有一定而不可誣者是以漢唐宋賢君往往慎重公賞抑絶私恩而不肯少假借外戚其外戚之知道理識時勢者亦或守謙讓戒盈滿而不敢少憑藉公家用是上下共成保全之道而為善處富貴之人書之簡册于今有光臣方以堯舜望陛下顧今所為又似戾于漢唐宋賢君逺甚使天下得而私相非議後世得而橫加指評臣所以為陛下甚惜者以此况今各處盜賊縱橫生靈糜爛飢饉連亘道殣枕藉而南京之所奏報又有不忍聽者陛下曾不少動于中而存心于宵旰顧惟拳拳戚畹而敷覃恩澤臣恐天下以陛下無意于斯民而秪知有外氏其害誠非細也臣所以為陛下甚惜者又以此伏望陛下以天下為家以萬民為念以義制事以禮制情遵祖宗慎守名器之訓謹戚屬驕僭禮制之防俯納臣言將前項恩典暫為停止徐俟他日再圖議行庶賜賚有名官爵不濫陛下不失守文之盛德戚畹得全知足之令名臣之此言非敢薄于陛下之所親自顧備員言路封駁乃其典守覩此事理之或舛實有不能恝然于心者抑懼天下後世之議及臣也是以昧死上聞不勝隕越待命之至疏入得旨該衙門知道停司禮監請乞疏嘉靖二年張原臣謹奏近該司禮監右監丞閻綬等題為己故司禮監太監張淮弟張銘姪張琦張瑋及閻欽等乞討官職及現任管事奉聖旨張銘淮南鎮撫司管事其餘罷該部知道欽此臣等竊見淮以閭閻之子入侍帷幄榮冒蟒玉叨官司禮雖有奔走之勤殆亦職分當然慨其生平寵榮殊禾足以報稱况當陛下繼統而覃詔推恩已嘗官銘為指揮同知今淮既死又錫之葬祭若復用銘不無失之濫繁往日太監趙山楊聰等死其發送諸內臣為其弟姪乞官臣等執奏論其不可不蒙俞允然彼皆藩邸舊人既獲從龍之幸或荷非常之恩事偶可以一行固亦妨于聖治不意今日遂以為例一槩踵而行之是何也臣等據法之言既不見信而彼徇私之請得以肆行故耳夫朝廷用人本以辦集事務茍不問其人之才不才乃惟念其私故輒委之事其不至于僨敗者鮮矣鎮撫乃機密之司尤當用人于推選而朝廷于機密之事豈宜以人而嘗試臣等昨嘗略見銘之為人禮度且猶不知于事何能辦集設若他日有所僨敗則陛下事也皆于事體有乖治道傷損甚非軌物憲世之意再照司禮監石監丞閻綬職名司禮顧不能守禮以贊成陛下維新之政乃棄禮任情為人乞官使陛下蹈濫賞妄施之過舉官署有幸位僨事之匪人設心不臧曷堪委任若係追念昔為張懷之門下則豈宜以朝廷之公物為報復之私圖召枉啓濫是謂不忠他或有所利而為之則又豈宜假朝廷之恩典為私門之商販賣公徇利是謂無恥其稱淮之墳塋離京窵逺須得親人往來照管聽其言似是究其理則非照管墳塋銘係親弟亦即可以自便似不係于官之管事與否又本後開寫乞官人數頗為衆多而閻欽本非淮之族屬實與綬之姓氏相同中間尤可疑惑且各名之下輒自注擬官職事屬擅専似不知恩典出自朝廷典守各有攸司怙寵擅權市恩罔利皆大不可賴陛下聖明止許張銘管事其餘俱已報罷臣仰贊聖德無任喜忭但張銘管事尤非祖宗軍政推選之舊法聖賢因能授任之明順臣等待罪該科不得不又為之言也伏望陛下慎重公賞抑絶私情俯納瞽言追寢張銘管事之成命仍將閻綬薄示懲責以為後戒臣又聞行事必先申命明罰所以敕法不塞其源不足以止其流不懲夫一不足以戒夫百更乞敕司禮監通行戒諭各監局官俱要同心協力守法奉公不可代人乞討升官管事等項恩澤以貪圖利益自壞行止則幸甚疏入得旨已有旨了該部知道論國戚張延齡等罪狀疏嘉靖二年張原臣謹奏訪得建昌侯張延齡被宛平縣民孫銘奏訴強占地土等不法事五件投匭而法司不敢理論延齡擅自差人前往法司門首將銘捉拏至家鎖拘馬房內者五日銘妻又嘗將情抱奏而法司亦不聞有所施行延齡又將銘責打二十而後疏放去訖似此恃負驕恣妨國害民臣恐陛下深居九重未之或知也近日皇親功臣轉相效尤大率皆是如此又如定國公徐光祚本以癲癎病夫騃蠢已甚而伊弟所謂三公子者每下鄉邑擅坐轎乘擅著蟒衣擅住公館擅接詞狀擅出告示擅用刑杖作威作福違禮違法不可疏舉而玉田伯家昌化伯家亦每代人追討錢債貪圖賄賂妄生事端羅織平人經月拘囚私自拷訊聲勢張皇道路側目恐非諸皇親功臣之福亦非宗廟社稷之利升下為天下軍民之主而實賴天下軍民以立國今視諸皇親功臣違法害人而不與之作王則軍民受害者將復赴訴于誰萬一日久勢迫民怨心離陛下又將何以立國延齡等已為富貴之極而不務求持盈守成之道乃貪婪貨利無有止足恣意妄為驕橫不法如此似不知有朝廷而畏法度也由今觀之則我太祖之待功臣漢文帝之處薄昭皆不可謂之少恩而諸皇親功臣之事陛下亦不可謂之守禮陛下之御諸皇親功臣或亦過于厚矣陛下固云念其親親之情世功之胄然民惟邦本之義獨不當念而惜之乎今小民受害而無所控訴法官畏縮而不究敢理以致諸氏之驕恣日甚民日不堪陛下曾不少為動心而略加詰責若縱之使然者非計之得也正德年間雖權姦用事而諸皇親功臣猶知畏罪自戢顧亦不聞有此今陛下聖明在上而延齡等乃至如此之甚臣竊以為陛下姑息太過威令不行致然耳伏望陛下重維祖宗洪業之難創億兆人心之易失閭閻生計之至微勳戚富貴之已甚常以義而制情不徇恩而掩義申飭戒諭痛賜裁抑務使諸皇親功臣皆知敦尚儉素恪崇謙恭各守禮法各保富貴不可輕自恣肆冒犯憲典以貽後悔其所奏建昌侯定國公事情仍乞敕法司通為究理倘得其情皆置之法庶威令得以彰明貴戚知所斂戢不徒小民之幸而亦諸貴戚保全富貴之幸也疏入得旨該衙門知道停止織造疏嘉靖二年張原臣謹奏先該內織染局署局事御用監太監刁永等題請差官蘇杭等處織造工部執奏以為不可反復辨論殆千餘言蓋據時勢而極言之事理極為詳盡不圖聖意竟莫之回而有差內臣二員提督之旨此事關係聖政之得失生民之欣戚世道之治忽不得不昧死以陳其愚陛下登極之初己將各處新添差出內官盡數取回聖明洞見萬里或知其為地方生民之害也天下方蒙更生之禍不甚喜幸迄今日月幾何而乃復有此差官之旨何前日知其害人而停止今復不慮其害人而允其請乎現今各處地方水旱相仍殍殱載道而南直𨽻一帶災傷尤甚為今之計正宜加意存恤尚恐其無濟矧可又加之以征科朘剝之擾耶陛下每遇各處撫臣奏報災傷之大府部臺諫疏論救濟之方屢降明旨發內帑減征派諄諄戒諭皆欲其加意存恤務使民沾實惠似此所行則是一面差官賑濟一面差官科害所謂實惠者何有存恤者何如也明旨所許雖止蘇松然弊源一開幸門再啓干用謀利之人遂以為利浸淫之勢決不可復止則陜西之羊絨江西之燒造與凡買辦採辦管莊管店之類亦或在所不免矣今天下地方大半多盜而陜西重鎮已經戎馬之所殘擾民或死于飢餓之間鋒鏑之下者餘已無幾呻吟之聲疾蹙之狀己是遍滿閭閻何以復堪乎此臣恐窮民之無告者或遂至于反袂而不逞上梗聖化噬臍何及夏間風聞浙江鎮守太監梁珤指稱進貢差人私齎寶貨滿載舳艫前來打點意圖帶管織造比時給事中章僑豫以為言正欲逆閉其途才延數月而太監刁永果有此請梁珤當倭賊搆亂之際不聞出謀設䇿以靖地方乃惟汲汲營幹圖管織造究其心蓋止知謀利而不知謀國止知愛身而不知愛朝廷陛下試詳察之彼果何如人也梁珤之營幹雖因章僑之言而暫止然實啓其端矣自後賄託左右夤緣宫掖以圖委用者皆由此以施其引伸疏濬之術致令差官之命竟爾必出而莫之挽回臣按珤之擅啓弊端違格詔書為陛下斂衆怨為朝廷生厲階誤國殃民背公徇利罪可斬也伏望陛下常懷民惟邦本之心重念民窮盜起之義所有差官提督之命速賜追寢俟後嵗時豐稔人民充足再為議行仍將梁珤取回究治以杜夤緣則生民幸甚臣亦幸甚疏入得旨該衙門知道論議禮諸臣黜陟疏嘉靖三年胡世寧臣昔于陛下踐阼之初竊效宋臣司馬光上言人君大德有三曰仁曰明曰武臣竊見陛下臨御以來子惠黎元洞燭事體仁矣明矣而武則未彰是以臣工多玩政化未隆邇因大禮之議羣臣執議不合陛下優容再三而彼激烈愈甚聖心不得已赫發斯怒薄示威罰朝野聞之肅然震栗聖武彰矣三德備矣然臣竊有憂之敢申前説未盡蓋是三德之中以仁為主而明與武所以成之也故譬諸天地仁則其生成之德明則其日月之照皆不可一日而無也若武則雷霆時可一震而已若震之數或震之過則天下何所容身而天威亦反褻矣故説者謂是三德仁或可過而明則不可過也明過則察明猶可過而武決不可過也武過則殘臣願陛下自今中外羣臣有罪下之司寇責問罪狀明白輕重誅黜皆俸律科斷姦不能惑佞不能移所謂武也乃若數用廷杖則恐其間或有心實忠良而體素怯弱者一時不堪箠楚偶斃雷霆之下遂傷日月之明臣知此事非出陛下本心實由羣臣偏見激烈之過然而傳播天下書之史册豈所以昭聖德之美哉臣願陛下自今謹之于後而已席書以逹禮受之陛下親擢禮部尚書真得古聖王知人善用之體然恐後有文臣武將才望非書之比而乃援書為例夤緣結託不由衆推以得幸進者聖明于是仍許選部言官執奏而追奪之可也其餘新進英達今雖議禮一言有合而以後難保其事事之皆是舊任老成今雖執禮一事過當而以後難保其事事之皆非聖明于是惟以天地日月三無私之心照臨于上其言是者從之非者置之其立心行事公者用之私者黜之無分彼此新舊而先有適莫于中天下之幸也皇上聰明仁孝親定大禮追崇皇考為恭穆獻皇帝聖母為章聖皇太后已無子臣父之失矣然而議者欲正兩考之失追改皇伯之稱紛爭不己中外共疑臣非敢謂其言之不然也然竊有見陛下入繼大統雖由皇考遺體倫序當立然而定策之初朝議大協實由慈壽皇太后擁翊之功既而即位以來人心永戴實承孝宗敬皇帝聖治之蔭臣知聖心純孝其于議者之言必有不欲盡行而皇伯之稱必有不忍遽改者矣臣願陛下明以此意止議者之再言而消其嫉怨亦以此意釋羣臣之固惑而宥其愚忠要使兩宫二廟均享陛下之孝而歡洽無間九州四海咸頌陛下之德而愛戴無疆亦使新舊諸臣和協于下以佐理維新之治用以祈天永命于萬年此陛下萬世之孝也臣愚昧死不勝惓惓疏入帝不納大禮疏嘉靖三年吳一鵬臣謹考前世入繼之君間有為本生立廟園陵及京師者第歲時遣官致祀尋亦奏罷然猶見非當時取議後代若立廟大內而親享之從古以來未有也臣等寧得罪陛下不欲陛下失禮于天下後世今張璁桂蕚之言曰繼統公立後私又曰統為重嗣為輕竊惟正統所傳之謂宗故立宗所以繼統立嗣所以承宗統之與宗初無輕重况當我朝傳子之世而欲倣堯舜傳賢之例擬非其倫又謂孝不在皇不皇惟在考不考不欲改稱孝宗為皇伯考臣等歷稽前古未有神主稱皇伯考者惟天子稱諸王曰伯叔父則有之非可加于宗廟也前此稱本生皇考實裁自聖心乃謂臣等留一皇字以覘陛下又謂百皇字不足當父子之名何肆言無忌至此乞速罷建室之意立廟安陸下璁蕚等法司按治議奏帝報曰爾等欺朕沖歲黨同執違往且勿問其奉先殿西室亟修葺盡朕歲時追逺之情請舉大禮以安人心疏嘉靖三年朱浙臣竊惟嘉靖三年二月三十日恭遇慈壽皇太后聖誕節奉旨命婦皆免朝賀伏見近來天災流行聖心警動諸凡供御一切裁省母慈體國當示謙沖但睿旨簡嚴不言所以臣民觀聽惡得不疑咸謂朝賀之禮近在興國太后固已舉行今者慈壽誕辰乃聞報罷事體相類禮數頓殊傳報之間關繫不小竊念慈壽皇太后手提神器親授吾皇母子至情天日在照孝宗在天之靈所以望陛下之事母后者何如天下臣民萬姓之心所以望陛下之事母后者何如今乃句月之間一廢一行彼此相較形迹太著何以安母后之心慰孝宗在天之靈副天下萬姓臣民之仰耶臣愚以為朝賀之禮在母后雖云固辭在陛下尤宜敦請比諸常禮加意舉行致誠致敬盡情盡文不然萋斐成文嫌隙易啓兩宫之疑漸積國家之㸑日生興衰隆替實繫于斯臣不勝感激之至疏入忤旨下獄杖斥勘地方賊情疏嘉靖三年張原臣謹奏先該福建鎮巡等官勘報過漳州等處流賊攻劫殺虜並官軍斬獲緣由前來己經兵部又據莆田縣被害民人詹與良奏稱彼處衛司不行勦捕致賊猖獗大肆荼毒等情看得中間情辭各異其他隱蔽尚多不無追究未盡遽難定奪欲再轉行彼處巡按衙門覆勘等因覆題奉聖旨是各該官員功罪并陳亡死節等項事情著巡按御史從公查勘務見明白來説賊起去處失事情由還著廣東鎮巡官上緊勘明具奏欽此臣惟前項盜賊攻劫鄰邑焚燒室廬搶虜人民汚衊婦女拒敵軍民殺戮官吏甚至殺人祭旗剝皮分尸剖腹取胎流毒三郡遺害兩省備極慘酷人皆憤怨蓋不獨詹與良一人言之其鄉人聽選官陳文淕及給事中等官鄭一鵬等幾二十人皆嘗連名具奏彼皆土著居人身親賭記所見必真所言可信其稱賊在附城劄營二十餘日衛司坐視不顧任其歌彈飲酒從容劫殺給票買物明報官司準令供應又稱忽聞賊至都司先己遁去次日方知所在軍出涵頭偶聞風吹于兵仗有聲指揮以下返奔入城官軍未嘗與交一矢止有民兵屢戰被殺約有五百餘人典史中箭而死檢校被虜贖回等項情節與臣所聞大略相同及觀彼處鄉人所撰癸未録者紀載彼時事情尤為詳備其與彼處官司之所勘報十無二三該部欲行覆勘蓋已洞燭其弊但彼處官員既經查勘回奏豈肯再有異詞自為先後矛盾况彼俱係待罪人員未免回護遮掩秖事虛文塘塞以致鬱閭閻之憤失綜核之實遂僥幸之心傷公平之治深為未便合無照依勘處倭寇事例再煩敕旨選差給事中一員前去將彼先次勘報并詹與良等各奏事情逐一查勘務見明白其廣東賊起去處失事情由亦令差去給事中一併勘保具實奏聞臣之此言非過為是刻薄也比見近年各處盜賊繁多率皆起于細小彼處守土官員既不設法捕處又不及早申報勢已釀成專事隱蔽擁兵自衛安坐旁觀聞賊在前惟擇善地而逺守與賊對壘乃先望風以奔遁大有喪敗則減百而為十又假為被傷之名稍或捕獲則張百而成千又多係冒報之數及被查勘率復遷延動經二三年間傳歷一二人手俟其日久時易心懈事緩方行掇拾冀以塞命中間又以遷官去任為解公罪掩贖為詞以至賞多濫恩罰不及罪法令不行人心玩愒沿傳此弊已非一朝往日山東河南南北直𨽻勘報事情大率皆是臣所以信今日詹與良之言不誣也臣又聞近日山東盜賊復起河南嘯聚已逾千人廬鳯地方現有奏報而湖廣諸郡在在生發以臣觀之皆非細故使非朝廷及早厲法度明賞罰大加振作于上臣恐人心無所警畏政令日就廢弛各處守土官員蹈襲宿弊皆事茍免天下之患未易止息用是拳拳不避塵瀆謹以愚見昧死上聞疏入得旨兵部看了來説在告極論朝事疏嘉靖三年張原臣近以灼艾在告聞科道等官交章劾論主事桂蕚張璁等之邪佞皆未見陛下有所指揮臣竊憂憤不知所以呻吟之餘謹昧死輒以蕚等所以固守前説必欲求勝之意與科道等官極言舉劾不欲與之並立之故為陛下備言之為蕚等者固自知變置宗廟詆毁詔書離間宫闈誹排大臣搖亂國是罪在不原然業既為之譬之騎虎難下益復固守前説猶冀可以富貴一時是即鄧管只知好官桓溫不避遺臭之類耳宜其大言橫詈愈無忌憚而不肯已也為科道官者亦固知聖志己定天威方赫雷霆之下無不摧折渙汗之餘豈容撓沮顧以邪説橫流姦人干進國之安危繫焉比之亂臣賊子其迹雖隱以微而害實大且烈恐陛下一時不察誤中其餌使姦邪之計萬一得行而伯考之説竟或改稱人心洶洶為是之懼所以連章纍牘紛紛不已逆鱗犯諱亦有不暇計者臣嘗驗之人心非特在廷之臣以為然雖下至閭閻匹夫亦皆以為然也此可見孝宗皇帝深仁厚澤洽被人心人心無不延頸思欲為孝宗死者科道官特因人心而述道之耳况其職守所繫公議所關亦宜其抗言執奏愈見激發而不敢已也蕚等既已召至京師搢紳大夫皆不與之立談彼豈無一鄉黨朋友素相親厚往來者哉聞其日所造接秖皆先年罷革不得志之人幸災樂禍之輩每語若人曰吾已得君矣吾言己見信矣吾行將柄用矣吾當進退百官變置法制矣肆行胸臆謬為大言以欺人如此尤可深惡而痛恨也新進小人曲學阿世才得陛下假借以顔色輒爾矜大衒耀若自不能堪者其器局狹隘識趣卑陋甚矣他又且不論也陛下亦嘗知之否乎今陛下于蕚等所奏一切留置于內庭其諸科道官之論列每漫應之曰該衙門知道然聖意叵測而國是無所底定以致人心愈自激發而言或傷于煩聖心愈見堅執而聽或至于厭蓋亦無怪其然也何也大禮已行于往時明詔已布于天下聖孝純篤萬萬無復改易之理此但陛下自知之耳天門九重外人不得而知也夫人不見知而致疑上不明言以示信馴至內外且惑君臣乖暌所謂上下不交而庶事叢脞也其將何以為天下臣所以憂憤而不能已于言者大率為此陛下為天下計曷不降敕大廷遍諭羣臣備述明詔已頒大禮已定以示再無改易之意其桂蕚等亦宜早賜處分遣之回還仍就舊列則人心以安人言以息國是以定實宗社無疆之休也疏入得旨該衙門知道乞停工匠等升賞疏嘉靖四年胡世寧臣竊見御用監太監張忠題準將成造龍牀等件官匠趙奎等六十八員名內升職五十四員冠帶一十四名節經部科諸臣據法奏駁未蒙聽許伏惟自古國家建官分職下至百工技藝之人皆有月給俸糧使之各食其食而事其事非若民間雇用工藝人等身非所屬事必相酬也至于升官止惟武職論工蓋因用其死命其餘則皆遇缺掄材銓補非以酬勞也今趙奎等歲入官廩成此工作乃其職分豈應更加升賞故如我太祖太宗創造兩京宫廟成闕及各項衣冠禮樂器物並各衙門廨宇比今趙奎等所作工程何啻倍蓰千萬皆若一一升職冠帶則流外官豈堪數紀而竭天下財力不足以供矣何以能至今日保民如此之盛傳天下如此之逺也豈惟我祖宗列聖未嘗有此雖考古厯代中葉之君亦未有因如是工作之成而一旦升職如是之多者陛下試思此事傳聞天下後世以為何如其于聖德有纍否也太監張忠素聞安靜老成今不意其有此蓋止知下植私恩不顧上虧國體知愛忠者猶為惜之况我皇上天縱聖明即位以來痛革權姦濫賞之弊豈宜誤聽人言一旦有此陛下試敕戶部通查天下額徵稅糧歲入幾何歲用幾何有無足彀更敕吏兵等部通查每歲功升乞升各項官職幾何該添俸糧幾何常賦有限將何以給竊惟自古國家財盡必取于民民窮必至于變我皇上聰明睿智日新聖學其于古今治亂之原何事不知今思所以為祖宗保天下為天地養生民者必由慎實節財其于前旨之誤鄭自璧等之言必有契于心矣而猶未即從者豈非以令出惟行不欲因臣下之言而遽改耶昔書言成湯不邇聲色不殖貨利德懋懋官功懋懋賞用人惟已改過不吝以為一代聖王垂裕子孫六百年之法我皇上天性恭儉仁孝自來聲色貨利一無所好蓋實于湯有光者乃惟官賞或非功德吝于因言有改惟此一事豈忍聖德未全如湯也伏願陛下痛思祖宗創業之艱備訪軍民困苦之狀思欲愛人必先節用欲節用必先省官俯察言官之諫曲從本部之請將趙奎等升官前旨收回敕令照舊關支不許與署職冠帶俸糧照舊關支不許再後夤緣奏乞如此則紀綱正而人心服財用足而民生安陛下聖德亦傳于百世祖宗鴻業長保于萬年矣臣以庸材誤蒙擢任兵部軍職之濫職所當言不敢負恩緘默謹昧死以聞疏入帝不納陳愚悃疏嘉靖四年林俊臣惟議禮如訟見各不同包容而採擇之德之大也若粉墨太辨恐未足以服其心臣伏讀明詔仰見天地之大日月之明于斯有悔焉存恤敘復日候而久未聞也昔成湯改過不吝陛下比德堯舜于湯何有哉伏望早降溫旨以答幽明慰人望臣又惟古者撻人于朝與衆辱之而已非必欲壞爛其體膚而致之死也亦非所以待士夫也成化時臣及見廷撻三五臣容厚綿底衣夾以重氈疊帕猶牀褥數月淤血始消正德時逆瑾用事始啓去衣之端重非國體所宜釀有撻死之慘幸遇新詔收恤士氣始回不謂又偶有此臣又見成化時詔獄諸旨惟叛逆妖言強盜打著問喇唬殺人打著問其餘常犯送錦衣衛鎮撫司問鎮撫奏送法司議罪中間情重始有來説之旨部寺覆奏始有降調之旨今一槩打問無復低昻恐舊典失查非祖宗仁厚之意即此二事似宜循舊臣又見去歲以來舊臣謝遣殆盡朝署為空近聞石珤又欲休致伏乞聖明留念既去者禮致未去者慰留與二三大臣時加延接又有碩望如羅欽順王守仁吕柟魯鐸諸人乞引自近以裨聖德圖聖政幸甚疏入帝下所司不果行御選明臣奏議卷二十
