  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_022-1a, image: WYG0445/WYG0445-0303a.png}
body:
  text: 勘處倭寇事情疏嘉靖二年夏言臣看得倭寇肆逆各該地方官員先事不能防禦臨變不能勦捕漫無籌䇿坐視機宜以致荼毒生靈占據城池劫奪庫藏燔燒官府戮害將臣辱國損威莫此為大及查據前後章奏俱各事涉掩覆而言辭多遁情狃寬縱而功罪未明該部節次覆題亦不過按據來文遷就議擬雖云行勘亦秪故常所以屢瀆宸聰多是曲為答即今因循日久未見回報不惟賞罰淹留而人心懈玩抑且法令廢弛而欺蔽肆行昨見朝鮮國王李懌奏稱倭寇打擾上國至殺官兵不伏天誅偷生到境仰伏皇威𠞰殺幾盡并將賊俘獻之闕下事聞中外頗喧物議以為堂堂天朝統御萬國而東南疆場之臣忘忽武備廢棄職守反外臣之不若方且務為掩蔽茍逃罪譴若不嚴加勘治何以示戒將來鎮守三司守巡重臣濫膺朝廷藩方重任不能協謀畫䇿以保障地方市舶海道備倭衙門不能遵守舊規嚴設武備以禁防禍亂寧紹府衛所寨掌印巡捕大小官員坐視倭寇縱橫來往于封域之內殺戮攻劫于旬日之久如蹈無人之境略無捍禦之方以上各官職任雖有不同俱各無所逃罪訪聞前項二起倭寇到時實因各官從事怠緩處置失宜釀成禍亂及至變作又一籌不展狼狽失措貽害生靈甚至以城門之扄鑰付之賊手以日本之國號封我東庫舉火自焚舶司差官為賊嚮導閫師墮馬而走匿民家守臣棄城而縱賊焚劫沿江呐喊殺人地方之驚擾可知抵城逼令獻賊府衛之官軍何在且宗設領倭寇不滿百十餘人而寧紹兩郡軍民何啻百萬今乃任彼凶殘肆意劫掠畢竟無與為敵尚謂國有其人致使蹂躪城郭破壞閭閻貽國大恥事出非常中間隱匿事情得于道路傳聞未易悉舉今若止令鎮巡宦查勘回奏竊恐上誤朝廷事機下貽地方災害法令幾于不振功罪終是不明況巡按御史當時倉猝聞奏稽察未精鎮守等官身負罪愆豈肯吐實臣夙夜思慮實懷隱憂伏望皇上軫念海隅蒼生罹此凶變特遣近臣素有風力才望者領敕前去查勘前項失事緣由明白分别功罪等第重行誅賞大明陟罰庶人心以定國威以伸而四方邊徼皆聞風知所警懼矣再臣旁考載籍日本在東海之中漢魏以來已通中國其地度與㑹稽臨海相望在勝國時許其互市乃至四明沿海而來艨艟數十戈矛森具出其重貨與中國人貿易不滿所欲則燔燒城郭抄掠居民往往為海邊州郡之害我祖宗灼見其情故痛絶之當開國之初八荒向風四夷賓服惟是倭寇時或犯我海道用是于山東淮浙閩廣沿海去處多設衛所以為備禦後復委都指揮一員統其屬衛摘發官軍以備倭為名操習戰船時出海道嚴加隄備近年又增設海道兵備副使一員專督可謂防範周且密矣是以數十年來彼知我有備不復犯邊奈邇來事久而敝法玩而弛徒擁虛名略無實效寧波係日本常年入貢之路法制尚存猶且敗事其諸沿海去處因襲日久廢弛尤甚乞特選官領敇由山東循淮揚厯浙達閩以極于廣㑹同巡撫官員按部備倭衙門親厯海道地方查㸃原設官軍閲視舊額墩堡盤驗現在兵器官軍缺乏者即與撥補墩堡圮壞者即與修築兵器朽鈍者即與換給官員之不才者即時易置法制之未備者即時區畫庶使海防嚴謹中土奠安可以防海堧不測之虞可以壯國家全盛之勢矣疏入帝從之遣給事中劉穆往按其事議大禮疏嘉靖二年席書臣惟三代之法父死子繼兄終弟及自夏厯漢二千年未有立從子為皇子者也漢成帝以私意立定陶王始壞三代𫝊統之禮宋仁宗立濮王子英宗即位始終不稱濮王為伯今陛下生于孝宗崩後二年乃不繼武宗大統超越十有六年上考孝宗天倫大義固已乖悖又未嘗立為皇子與漢宋不同自古天子無大宗小宗亦無所生所後禮經所載乃大夫士之禮不可語于帝王伯父子姪皆天經地義不可改易今以伯為父以父為叔倫理易常是為大變夫得三代傳統之義逺出漢唐繼嗣之私者莫若祖訓祖訓曰朝廷無皇子必兄終弟及則嗣位者實繼統非繼嗣也伯自宜稱皇伯考父自宜稱皇考兄自宜稱皇兄今陛下于獻帝章聖已去本生之稱復下臣等大議臣書臣璁臣萼臣獻夫及文武諸臣皆議曰世無二道人無二本孝宗皇帝伯也宜稱皇伯考昭聖皇太后伯母也宜稱皇伯母獻皇帝父也宜稱皇考章聖皇太后母也宜稱聖母武宗仍稱皇兄莊肅皇后宜稱皇嫂尤望陛下仰遵孝宗仁聖之德念昭聖擁翊之功孝敬宜隆始終無間大倫大統兩有歸矣奉神主而别立禰室于至親不廢隆尊號而不入太廟于正統無干尊親兩不悖矣一遵祖訓允合聖經復三代數千年未明之典禮洗漢宋悖經違禮之陋習非聖人其孰能之哉疏入帝詔布告天下尊稱遂定議大禮疏嘉靖二年桂萼臣聞帝王事父孝故事天明事母孝故事地察未聞廢父子之倫而能事天地主百神者也今禮官失考典章遏絶陛下純孝之心納陛下于與為人後之非而滅武宗之統奪獻帝之宗且使興國太后壓于慈夀太后禮莫之盡三綱頓廢非常之變也乃自張璁霍韜獻議論者指為干進逆箝人口致達禮者不敢駁議竊念陛下侍興國太后慨興獻帝弗祀已三年矣拊心出涕不知其幾願速發明詔稱孝宗曰皇伯考興獻帝皇考别立廟大內正興國太后之禮定稱聖母庶協事天事地之道至朝臣所執不過宋濮議耳按宋范純仁告英宗曰陛下昨受仁宗詔親許之為子至于封爵悉用皇子故事與入繼之主不同則宋臣之論亦自有别今陛下奉祖訓入繼大統未嘗受孝宗詔為之子也則陛下非為人後而為入繼之主也明甚考興獻帝母興國太后又何疑臣聞非天子不議禮天下有道禮樂自天子出臣久欲以請乃者復得席書方獻夫二疏伏望奮然裁斷將臣與二臣疏並付禮官命臣等面質疏入帝大喜明年正月手批議行録名德以重士風疏嘉靖二年林俊臣近見魯鐸為祭酒士夫相慶繼之鐸以疾辭允之屬有司俟其病痊具奏起用陛下知鐸處鐸士風增重其知勸矣夫治道教化為先學校教化之所由出而太學又收學校之成功明教化成人才贊天子以出治者也祭酒師儒之本型範非良則器非良器故曰經師易得人師難得上世多取德器醇厚儒學優長之臣周成王時彤伯為祭酒漢以下若劉向韓愈劉毅吕公著楊時諸人為國儲賢以致用成化非細故也魯鐸志尚清純道足以鎮雅黜浮學足以訂頑立懦方今釐革庶弊正育賢成德振作士風之時況魯鐸與前謝鐸人品相類謝鐸以祭酒養病孝宗用吏部薦進禮部侍郎掌祭酒事起之于家遣官以速其行重道尊師頌美有作陛下今日處魯鐸如謝鐸則今日頌美陛下將亦同孝宗矣夫薦賢所以為國祭酒尤賢才盛衰所關伏望斷自宸衷亟賜施行幸甚疏入得㫖該衙門知道正法守疏嘉靖二年林俊臣竊惟祖宗設立刑部都察院大理寺謂之法司凡大小罪犯無不由之錦衣衛謂之親軍伺察機密奸細鎮撫司鞫訊大盜妖言洪武二十年太祖以鎮撫司非法陵虐焚其刑具以所繫囚送刑部洪武二十六年申明鞫刑之禁凡罪囚俱送法司以後任遇漸加而職事仍舊見之大明㑹典者如此列聖相承恪遵無易正德年間劉瑾錢寧等相繼擅權凡意中愛惡輒奪付鎮撫文致成獄以遂其奸而祖宗之法大壞劇盜四起巨逆繼作皆陛下所習聞而痛惡者皇上入正大統撥亂世而反之正先朝之錮弊一舉而翦除之天下方仰至治不意于內監崔文等而廢法豈彼有所膚訴或假手以濟其私乎夫法本大公罪必居一使宋鈺所告崔文等涉虛自有反坐之罪所告果實亦有必當之條此祖宗成法在陛下亦有所不得私者況臣等微末之臣耶今不待法司問結而輒付鎮撫是固臣等奉職無狀祗宜治臣等之罪祖宗之法未可廢也況今風霾雨土赤日無光天之示戒甚明正上下內外省身修德之日今此小事尚拂于天萬一有大于是將何如耶誠恐將來之變有不可測者伏願皇上念祖宗之法畏上天之戒收回成命仍將李陽鳳等付法司從公問結以為將來之戒則刑罰當而天下服矣疏入得㫖宋鈺李陽鳯等還送鎮撫司問乞免查撥莊田疏嘉靖二年劉麟臣竊查各府皇莊先年各差太監旗校人等管理皇親功臣亦各設有管莊僕佃人等領種希勢取寵者撥置并吞爭競不明者朦朧投獻而地土之在小民者日侵月削有司莫敢誰何小民日見逃亡畿內雕零亦已太甚自聖明登極諸弊一新前項管莊人員通行裁革原係投獻地土盡歸業主仍令所司徴銀解部係各宫主者類進係皇親功臣者赴部告給公私相全上下交慶二年以來事體穩便況此項田地佃種既久或昔雖鹻薄而今則肥饒或昔曽灘窪而今則坦夷其原佃之人又經蓋有房屋種有樹木或祖孫相守或姻婭相聨俱難于摘離勢逼遷逐恐成激變且先年皇親功臣蒙賜地土踏勘丈量恣肆溪壑加以不才郡縣曲為奉承無賴佃僕巧事逢迎遂將左右民田因而一概吞噬力弱者流離殞斃能言者奏訴纒綿又有愚悍之徒聚衆逞凶殺人搆禍今又有原差主事坐守割取莊田兼以螟蝗蔽野毁食禾稼互相驚疑怨口嗷嗷臣既得之聞見不容緘默夫空閒地土虛名無據自撥置爭吞之計行而吏民拱手于昔朦朧投獻之私作而版籍失真于今民有逋逃之籍國有空閒之名豈真有所謂蕩然無人之境坐待所司舉以畀人哉慨自召佃以來民方得業疆場桑梓之計勞廬墓畎畝之工費翕翕融融相慶一時不謂旋即奪之如雀在叢如魚在水而忽有異物撲之情何以堪莊田之賜以臣觀之若陛下以股肱之肉而啖心腹之疾必欲盡飽禍不忍言臣又惟攘索無厭者寵幸之大戒錫豫有漸者保全之至恩伏望皇上斷自宸衷割恩以義將陳萬言等奏乞莊田盡行裁抑論令萬言等自省寵祿之厚比之未遇之時豐約何如茍或足供家衆將今賜莊田暫且停免待後子孫繁衍祿食不敷從實具奏方才議撥猶為未晚必不得已敕下戶部就將各官類進銀兩約量查給仍將原差主事行取回京則民心以安國本以固而所以重畿輔厚貴戚者亦兩得矣疏入帝不納論錦衣衛朱宸等疏嘉靖二年張原臣伏見錦衣衛前所千戶陳升官冒錦衣材本厮役虛張聲勢攝服衆人肆其壟斷之心挾以羅織之計接受詞狀搜訪隂私拏攝平人括撿富室妄自驕悍雖堂上官受其執持擅用刑威雖內臣家被其索害先嘗坐喇唬房肆志已甚又嘗坐通州季虐取尤多害衆不止數十家得利已踰一二萬道路側目儘有怨言錦衣衛革職千戶魏頤狡猾成性夤緣用心先年已奉詔㫖革除今又謀在東司房辦事夫以冠帶總旗之名乃與千百戶並坐理事于法例既舛于名分實乖況權勢憑依胸臆是肆貪叨括聚報復公行物論既多良可深惡錦衣衛掌印指揮同知朱宸既為一衛之統領凡事皆由其掌握卻乃納賄徇私用人不審始焉或貪其餌或附其勢終焉乃受其制乃容其奸縱彼豺虎之儔貽我閭閻之患觀其所用之人如劉儒關鳳及陳升魏頤此類頗多罪烏可逭再照錦衣衛乃親軍之司實機密之地責既云重官宜得人今指揮同知朱宸痼疾耳聾應對不給指揮使周傳素行不謹穢德彰聞而指揮同知駱安則又貪取略同才猷未著既皆未孚于人望曷可委任于所司況朱宸尅減俸錢官員皆鄙其行分取官緡旗校咸怨其貪營利之計百生訪事之使四出又其子誘校尉以羅織平人嚇大戶而欺取財物宿娼不檢生事妄為周傳鑽刺機巧實先朝奸邪之黨人彌縫殊深乃新政殛誅之遺惡顧方以為得計不知悛改前非代人追債而分其財唆人告訐而利其有朋惡相濟衆怨攸歸又以戚畹至親乃復營求管事故違事例擅啓弊端此二人者處之近侍尤非所宜乞將朱宸等特賜退黜陳升等通行懲究再乞飾下兵部該衛掌印管事員缺另行推選厯練老成公謹廉靜人望素推之人用之再將東西司房辦事寫字人役差官逐一清查遵照近日題淮事例勿得容留先年查革人員仍乞敕諭該衛凡有公幹須要秉公擇人但係平日生事害人者勿得一槩差辦此後敢有先年查革人數仍復謀在東西司房辦事寫字及平日生事害人之人營求一切差委者俱聽科道官指名劾奏治以重罪臣又訪得通州坐季原非祖宗舊制比因彼處盜賊生發權宜差人正為訪拏盜賊一事此外並不得有所干預其後生事圖利之人營求差委馴至今日遂為地方之害況天順年間已嘗因事奉㫖查革而今彼處又已設有兵備守備等官則此坐季人員似亦甚為冗贅伏望皇上察納臣言俯賜停止生民幸甚疏入得㫖兵部看了來說寢楊倫職命疏嘉靖二年張原臣謹奏近該內官監小火者張通等因本管太監楊聰病故比照太監趙山廕弟趙雲事例具本題請官其姪倫奉聖㫖准他楊倫與做錦衣衛百戶管事該衙門知道欽此臣等固知聰乃藩邸舊人也陛下昔者龍潛藩邸私厚于人固無不可今為天下主以天下為家天下之人皆陛下臣顧猶可自分彼此厚薄以示不廣乎祖宗朝內臣既殁間有寵被恩私録用弟姪者然皆賢勞著績輔翊有功素為內外人所知敬者方始得之然亦不過一二人以示異數初未嘗概豫而濫施之也藩邸舊人在當時人品不無賢否厯年不無淺深效勞不無大小左右近侍足當聖意者亦不無差等其間不宜槩以舊人一例論也夫官爵乃祖宗之定制天下之公器陛下自當為祖宗為天下崇重而靳惜之不宜任私意往往濫及私人也況倫以厮養之賤無戰伐功而濫受六品武職其于名器為何如以公家廩餼皆生民膏血而容倫叨餮其中其為冗濫何如且為官擇人因能授任乃國家官人之法今不論其才能可否而即使之管事豈擇人授任意耶縱使私厚舊人恐亦不宜如此也張通等代為之請是乞升也不由該部議擬陛下特降內批與之是傳升也陛下即位之詔己嘗痛革此類播告天下天下之所共知在先朝者俱查而革之在藩邸者又從而與之是天下之人皆不許傳乞而藩邸之人獨可任為之岐宫中府中于二體判前日今日為兩端方自行之旋復背之失信破例天下其以陛下為何如往時趙雲准與千戶妄起弊端臣等已經屢次執奏而不䝉俞允今倫襲其故智又復然矣小人得志日長月滋彼此效尤妄肆比引將來恐又不止于此此臣等所以凜凜然大懼不得已于言也伏望陛下以天下公爵待天下有功不比于匪人不溺于私愛崇重名器靳惜恩賞特降明㫖追寢楊倫廕官之命不使後人復援楊聰以為例天下幸甚若必欲其杜絶幸門更乞將趙雲官職一體追奪庶天下後世曉然知大聖人所為從善弗咈改過不吝回出尋常萬萬也疏入得㫖楊倫已有㫖了只著帶俸該部知道祛異端疏嘉靖二年張原臣謹奏該大學士楊廷和等上言慎選左右速停齊醮以光聖德奉聖㫖覽卿等所言具見忠愛朕已知道了欽此臣仰觀聖意似未慨然賜命者故復昧死一言之竊惟人君好上天下趨向繫焉雖發于一心之微著于幽深之地行于一時之暫然而感召孚應之理形發影響之機波蕩風靡之勢蓋有不言而信不令而行不疾而速者如此雖或告誡丁寧刑罰督責無益也故曰其所令反其所好而民不從況夫奸巧貪婪之徒夤緣干進者百計以用其心而輕儇柔媚之人乘時射利者每日以試其術二者錯布于內外則人主耳目之前舉凡可欲之事背理而害治者紛然雜進矣人主遇可欲之事或口一言焉或身一行焉讒諂面諛之人罔不亟順㫖以諛其美或先意以導其行人主殆有受其欺而不自覺者是以心志為之蠱惑視聽為之眩誘彼之甘言得投于間隙之時或竊國之命或移其所好奸巧貪婪之徒得以夤緣干進焉自古人主茍非明理燭幾之聖鮮不為其所欺矣昔唐太宗嘗止樹下愛之宇文士及從而譽之不已太宗正色曰魏徴勸我逺佞人我不知為誰疑是汝今果不謬宇文士及叩首謝若太宗者可謂厯代之英主而不為小人之所誑惑矣臣自去嵗聞左右近侍之人有與外面宫觀革職人員陰相交結承其指授誘引陛下崇信道教致于暖殿建置老子像又令內臣誦習其書演行法事比臣即欲具言竊念陛下明聖決不為此而外人之言或出孟浪以故中止近日道路流傳言者愈衆且謂陛下躬自臨壇焚香􅕥籙而大學士楊廷和等今又以之為言臣始信陛下真有此事而人言所謂左右輕儇之人乘間設餌以誑陛下欲為希寵干進者之媒不誣也陛下即位已踰二載聖心堅定百無所好一旦乃復為此此臣之所未喻也臣惟孔子之道載諸六經治天下者率必由之由之則治違之則亂無之則亡未聞以佛老也佛老之教以清淨無為為本苦空寂寞為宗今陛下為天地百神及天下民物主萬幾叢委萬物攸賴顧可清淨無為為耶抑可苦空寂寬為耶獻說陛下者或稱其導引之術或盛為福利之說其所以聳動宸聽大約不過二者陛下一時不察遂以為真有益而誤信之殊不知其事已嘗厯試于漢唐宋之君往往無益秪以自欺或且又有害焉明效大驗昭然可考陛下何不據往迹而省觀之乃復崇信之深如此也或者陛下欲為宗廟社稷及天下蒼生廣祈福利勉焉為之意固是矣但今星辰失度雨𤾉愆期風霾亘旬江湖湧溢盜賊充斥死亡載道彼佛老者不能副陛下崇敬之誠為陛下禦災捍患福國庇民以佐成泰和之治則彼無靈神而不足信也陛下亦可以考矣陛下屈萬乘之尊以事異端之教自視之若無大關繫也然而瀆亂大經虧損聖德貽笑天下取譏後世實非細細者況自祖宗朝來內殿未嘗有此建置陛下乃創為之可不可也及各宫好事及漢經厰番經厰西天經厰并靈濟宫顯靈宫諸處日遂俱要供給齊飯供養等物俱必經由光祿寺造辦所費至為衆多其一切支用內府帑庫錢糧以為襯施賞賜者當又不止于此夫內府帑庫錢糧儲之本為軍國之用現今各邊鎮軍士缺少月糧有司往往告乏各處地方盜賊旱潦百姓在在告飢陛下一切吝而不與而乃為此襯施賞賜等項所浪費使羣小侈然持之誇耀于人以示得志則亦安用此帑庫積蓄為耶臣亦未見其可也祖宗設師傅保之官而處之禁密之地師導之教訓傅𫝊之德義保保其身體乃其職也今楊廷和少師也蔣冕少傅也毛紀費宏少保也皆陛下師臣也彼聞人言或及于陛下顧未得密勿論道之義乃爾登言章奏之間計亦不得已矣觀其旁引曲譬析事論理委曲詳盡激烈剴切蓋實情迫于中責切于身所以盡忠陛下也所以求舉其職也陛下漫然應之曰已知道了詞雖婉而意實乖言若親而㫖則離略不見有改悟之意而許之施行此臣之所以不能不駭且疑也陛下初即位每召廷和等事必咨之而後行今併其言置之而不聽何也彼師臣尚且如此臣屬何望焉前日因災異陛下兩敕中外文武羣臣同加修省天語丁寧至再至三而吏治民隱興利除害都要著實舉行之㫖又往往形之批答之間既曰事關朕躬的朕自舉行又曰齊醮俱已停止迄今齊醮之設自若也抑又日益而月盛焉是詔㫖徒事靡文舉行託之空言停止虛應故事陛下已自食言而所令反其所好矣何以責中外羣臣祗承德意而欲其著實舉行政務耶此臣所以益信陛下受餌于左右輕儇者既深也伏望陛下清心窒欲以立天下之本稽古正學以建四方之極端其嗜好勿為小人之所偵知謹其習尚勿為異端之所搖惑上畏天戒下恤民窮速將所建佛像盡行撤毁內外齊醮俱各停止凡誦習佛老之人勒令散歸原舊各該衙門萬幾之暇惟當專一游心孔子之道涉覽大學尚書及古君臣事跡則聖心開悟樂地自多治道裨補宏益實大固不必服􅌁衣誦真言以從事所謂異端之教也臣又聞內臣有周用田顒蔡秀者駔儈之才奸狡之性柔佞便捷本其所長原係罪人名下之人今復夤緣左右答應彼乃巧伺上意動中機㑹挾持左道熒惑聖聰凡兹所為皆其誘引蓋欲隂為引用罪人立赤幟也臣于去年不揣愚忘請陛下遴選近習意正在周用等節奉聖㫖宫中一應執事內臣著司禮監從公㨂選謹厚老成的答應備用欽此至今司禮監官棄制私意廢格敕㫖不見有所施行伏望陛下將周用等屏逐出外勿得復留左右使為羣小引用之地其宫中答應執事人員更乞敕司禮監遵照前㫖從公㨂選中間但係往年罪人名下如周用等者一體俱賜遣逐庶幾拔本塞源而太平之治可成也疏入得㫖該衙門知道論王邦竒等七次奏辨疏嘉靖二年張原臣謹奏近日錦衣衛左千戶等所鑾輿等司旗校王邦竒等第七次奏辨意圖復官已經臣本科參駁去後臣竊惟詔㫖不可不信紀綱不可不振法度不可不行皆朝廷大體所關治亂攸繫恐陛下未之悉察故兹瀆陳查得奉先詔書內一欵正德元年以後各衙門官軍旗校人等緝捕妖言奸細並不係臨陳對敵强賊一應升授職役者通行查革欽此又一欵節奏抗違妄奏者問發邊衛充軍欽此及經科道部衛等官查明具題奉聖旨是冒濫人員既㑹同清查明白并其餘事情該部都看了來說欽此續該兵部覆題奉聖㫖是各該官員旗役都依擬查革中間係職官革盡職級的還與他冠帶閒住被革人員朦朧奏辨的你部裏及該科參奏重治欽此後因錦衣衛右所副千戶楊忠奏辨該兵部參覆奉聖㫖是楊忠抗違詔㫖朦朧妄奏法司提了問欽此又因錦衣衛衣中等千戶所千百戶總小旗劉鑽等奏辨該兵部參覆奉聖㫖你部裏說的是但係𢎞治十八年以前升授職級都照舊不動正德元年以後升授的盡行查革不許再來奏擾劉鑽等饒他欽此今邦竒等俱係官軍旗校在正德元年以後緝捕而升官正詔書相應查革之人中間雖或亦有事情真實者殆亦不過一二而今皆不可考難以辨理亦在所不必論也是何也蓋以正德年間國柄潛移權幸用事祖宗之制度朝廷之紀綱蕩廢殆盡以致奸邪小人依憑城社大肆夤緣率皆納賄以求官計日而遷秩下至販夫賈子厮養僕隸無不為之無不遂意名器為之大壞紀綱日以決裂比時雖彼儕輩之人亦以為濫而知後來不能安享也陛下昔在藩邸知之亦稔幸而天佑我明陛下即位之初湔刷垢敝克復舊章冠帶之塗天下方喜于廓清不意于邦竒等之奏復有看了來說之㫖臣固知邦竒等平日榮冒官資紆拖朱紫出入炫耀意氣揚揚一旦革之使之索然情固不能無怏怏然既有明㫖還與之冠帶閒住則亦可以安命知止矣若必欲復官則奉有正德元年以後通行查革之詔纍奉依擬查革及盡行查革之㫖理不可行法不可行朝廷之體統亦不可行凡茲舉朝大小臣工孰敢犯天下清議甘萬世重譏奮然自任再開幸門以復邦竒等之官以蹈抗違詔㫖變亂成法之大罪乎邦竒等本以緝捕得官臣即其事論之十五六年間羅織煆錬無辜而死者不知其數抑有罪人雖死而尚不知何事者有人心者無不痛心邦竒等試揣于心亦當自知也殺人以求富貴在天理以為何如今乃不自悔訟復爾騁其讎怨之口極為詆詈之言逞其凶悍之性欲為報復之計肆無忌憚至于此極古人有言敬近臣為近主也禮下公門式路馬亦皆所以敬君也今科道等官為陛下左右之官是近臣也銜陛下命往理其事乃陛下之命使也邦竒等視之曽陛下畜産之不若而叱詈之屢加漢法所謂大不敬何大于此其所攀比之人又皆一偏之見殊不知各人之事迹不同詔書之條格嚴密官司之冊籍詳明不入于此則入于彼應留據實可見非下不敢不敢容私雖有私亦不能容也且法者原于天道制于祖宗主于陛下而奉行于百官今天下事非一端奉陛下法治事者非一人審使邦竒等之奸計得遂市虎之流言成真則百官臨事皆將有所觀望而畏縮規避孰肯為陛下任事怨乎況屢奉詔㫖一則曰抗違妄奏者發邊衛充軍一則曰朦朧奏辨的參奏重治一則曰不許再有奏擾而大明律及現行事例又有托拾勘問官員者民發口外軍發極邊衛分之條今邦竒等七次奏辨不知于詔書于律例何如也臣該科雖嘗屢行參駁而不知復有引詔㫖據律例奏請論之如法如往日之治楊忠曰則邦竒等之不悛亦宜也今天下奸邪潛匿蠧政屏息世道清明者賴有此即位一詔為之隄防耳臣等之所以謹守而不敢茍邀人心緘默不言者亦以此也此焉一決則潰溢四出泛濫滔天陛下大事去矣臣待罪該科已奉有明㫖許臣參奏況又親見此輩牽朋引類以搖奪國是敗壞國體抗違詔書托拾勘官臣大懼世道之下陵上替紀綱之日隳月廢工不信道朝不信度關繫天下治亂也不細彼科道部衛區區數臣固不足惜也伏望陛下獨奮乾綱大張雄斷敕下法司將為首王邦竒遵照詔㫖從重發遣以為衆戒仍追究代寫奏本之人照例治罪庶朝廷不失信而百官得以展布供職也疏入得㫖兵部知道御選明臣奏議卷十九
