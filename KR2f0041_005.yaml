body:
  text: 請豫備倉儲疏永樂元年楊溥臣聞堯湯之世不免水旱之患而不聞堯湯之民至于甚艱難者蓋豫有備也凡古聖賢之君皆有豫備之政太祖高皇帝惓惓以生民為心凡有豫備皆有定制洪武年間每縣于四境設立四倉用官鈔糴穀儲貯其中又于近倉之處僉點大户看守以備荒年賑貸官籍其數斂散皆有定規又于縣之各鄉相地所宜開濬陂塘併修築濱江近河損壞隄岸以備水旱耕農甚便皆萬世之利自洪武以後有司雜務日繁前項便民之事率無暇及該部雖有行移亦皆視為具文是以一遇水旱飢荒民無所賴官無所措公私交窘即如去冬今春畿內郡縣艱難可見况聞今南方官倉儲穀十處九空甚者穀既全無倉亦無存皆鄉之土豪大户侵盜私用郤妄揑作死絶及逃亡人戶借用虛立簿籍欺瞞官府其原開陂塘亦多被土豪大户侵占以為私已池塘養魚及堙塞為私田耕種者此弊南方為甚雖聞間有完處亦是十中之一其實廢弛者多其濱江近河墟田隄岸歲久坍塌一遇水漲淹沒田禾又閘壩蓄泄水利去處或有損壞皆為農患大抵親民之官得人則百廢舉不得其人則百弊興此固守令之責若養民之務風憲之臣皆所當問年來因循亦不及此事雖若緩其實關繫甚切伏望聖仁特命該部行移各布政司按察司直隸府州縣除近有災傷去處暫且停止候後年豐熟舉行其現今豐熟去處悉令有司遵依洪武舊制凡倉穀陂塘隄岸並要如舊整理倉有損壞者即于農間時月修理榖有虧欠者除赦前外赦後侵欺者根究明白悉令賠償完足亦免其罪不許妄指無干之人搪塞若有侵盜證佐明白而不服賠償者凖土豪及盜用官糧論罪有司仍將舊有賠償實數開奏其陂塘隄岸亦令郡縣凡有損壞悉于農間用人修理有強占陂塘私用者即令退還犯在赦前亦免其罪不退還者亦凖土豪及盜官物論罪其退還陂塘及墟岸閘壩應修去處亦令有司開奏以次用工完日具實奏聞仍乞令户部行各布政司府州縣除近被災傷去處外凡秋成豐稔之處令府州縣官于現有官鈔官物照依時價兩平支糴榖粟儲以備荒免致臨急倉皇失措年終將所糴實數奏聞郡縣官考滿給由令開報境內四倉儲粟及任內修築陂塘隄岸實數吏部仍行該部查理計其治績以定殿最各按察司分巡官及直隸巡按御史所厯州縣並要取勘四倉實儲榖數及陂塘隄岸有無損壞修理實迹歲終奏聞以憑查考如有仍前欺蔽怠事者亦具奏罪之若巡厯之處仍前不問不理或所奏扶同不實從本衙門堂上正官參劾奏聞庶幾官有實績荒歲人民不致狼狽耕農無旱潦之虞祖宗恤民良法不為小人所壞臣愚見如此未敢擅便乞命部院大臣會議可否施行疏入帝從之三殿災請修時政疏永樂十九年鄒緝臣惟陛下肇建北京焦勞聖慮幾二十年工大費繁調度甚廣冗官蠶食耗費國儲工作之夫動以百萬終歲供役不得躬親田畝以事力作猶且征求無藝至伐桑棗以供薪剝桑皮以為楮加之官吏橫征日甚一日如前歲買辦顔料本非土産動科千百民相率斂鈔購之他所大青一斤價至萬六千貫及進納又多留難往復展轉當須二萬貫鈔而不足供一柱之用其後既遣官采之産所而買辦猶未止蓋緣工匠多𣲖牟利而不顧民艱至此夫京師天下根本人民安則京師安京師安則國本固而天下安自營建以來工匠小人假託威勢驅迫移徙號令方施廬舍巳壞孤兒寡婦哭泣呌號倉皇暴露莫知所適遷移甫定又復驅令他徙至有三四徙不得息者及其既去而所空之地經月逾時工猶未及此陛下所不知而人民疾怨者也貪官汚吏遍布內外剝削及于骨髓朝廷每遣一人即是其人養活之計虐取苛求初無限量有司承奉惟恐不及間有廉強自守不事干媚者輒肆讒毁動得罪譴無以自明是以使者所至有司公行貨賂剝下媚上有同交易夫小民所積幾何而內外上下誅求如此今山東河南山西陜西水旱相仍民至剝樹皮掘草根以食老幼流移顛踣道路賣妻鬻子以求苟活而京師聚集僧道萬餘人日耗廩米百餘石此奪民食以養無用也至報效軍士朝廷厚與糧賜及使就役乃驕傲橫恣間遊往來此皆姦危之人懼還原伍假此規避非真有報效之心也朝廷歲令天下織錦鑄錢遣內官買馬外蕃所出常數千萬而所取曽不能一二馬至雖多類皆駑下責民牧養騷擾殊甚及至死傷輒令賠補馬戶貧困更鬻妻子此尤害之大者漠北降人賜居室盛供帳意欲招其同類也不知來者皆懷窺覘非真遠慕王化甘去鄉土宜于來朝之後遣歸本國不必留為後日子孫患至宮觀禱祠之事有國者所當深戒古人有言淫祀無福况事無益以害有益蠧財妄費者乎凡此數事皆下失民心上違天意怨讟之興實由于此夫奉天殿者所以朝羣臣發號令古所謂明堂也而災首及焉非常之變也非省躬責已大布恩澤改革政化疏滌天下窮困之人不能回上天譴怒前有監生生員以單丁告乞侍親因而獲罪遣戍者此實有虧治體近者大赦法司執滯常條當赦者尚復拘繫並乞重加湔洗蠲除租賦一切勿征有司百官全其廩祿拔簡賢才申行薦舉官吏貪贓蠧政者核其罪而罷黜之則人心歡悅和氣可臻所以保安宗社為國家千萬年無窮之基莫有大于此者矣且國家所恃以久長者惟天命人心而天命常視人心為去留今天意如此不宜勞民當還都南京奉謁陵廟告以災變之故保養聖躬休息于無為毋聽小人之言復有所興作以誤陛下于後也疏入帝不納上仁宗奏疏洪熙元年李時勉臣聞言之逆耳者非聖君不能聽事之難言者非忠臣不能言然必上有仁聖之君斯下尤有忠直之臣伏思三代以上莫盛于帝堯而伯益猶以怠荒淫逸為規三代以下莫盛于太宗而魏徴猶以十漸不終為戒今聖人在上日月之明天地之量知周萬物而求賢常恐不及憂及困窮而從諫有如轉圜是有納言之君又遇可言之時愚臣豈敢緘默而不吐露心腹也哉然臣之所欲言者惟願陛下節民力謹嗜欲勤政事務正學伏惟陛下新登寶位渙發德音大赦天下首命京官舉薦賢才恩澤所加遠近無間羣臣鼓舞于朝萬物條暢于野所謂聖人感人心而天下和平者此也亡何即位未幾土木遽興雖茅茨土階非今日之所宜而峻宇雕牆亦前聖之所戒昔漢文帝作露臺召匠計之值百金帝曰中人十家之産也何以臺為以文帝之富貫朽粟陳于百金之費猶且惜之陛下何不惜百金之費而欲撤成功而更新乎唐太宗嘗有氣疾百官以大內卑隘請營一閣以居帝憚勞民竟不許以太宗之治斗米三四錢于一閣之費尚慮擾民陛下何不惜民力而取材于遠方乎矧宫殿創乎太祖高皇帝法規朴素渾堅傳之萬世可無震凌太宗文皇帝既任其勞于先陛下當守其成于後雖當改者猶且不忍于三年未可改者不宜速更于三月矧天下之民仰望太平正宜與之休息今又重勞民力聞內官催木疾如風火郡縣被其折辱小民被其箠楚公私繁擾所至騷然苟民力既殫而或繼以飢饉則臣恐陛下之赤子無復如前日矣臣之所願節民力者此也經曰三年之喪天下之通喪也自天子逹于庶人一也德教加于百姓刑于四海乃天下之孝也太甲居憂處仁遷義故成湯之業賴以不墜高宗諒隂三年而恭默思道故中興之功卒能有成斬焉衰絰之中正以禮導民之日也側聞內官遠自建寧選取侍女使百姓為之驚疑衆心為之惶惑若曰天子之宫古有常制則大孝尚未終左右侍御不可無人則正宫尚未册恐乖風化之原有阻維新之望况始者終之漸也小者大之萌也涓涓之水不先隄防則流必至于潰川星星之火匪豫撲滅則勢必至于燎原豈可不防微杜漸而慎終于始乎臣之所願謹嗜欲者此也自古人君莫不以勤而興以逸而廢書曰自朝至于日中昃不遑暇食此文王之所以勤政也雞既鳴矣朝既盈矣此齊君之所以早朝也太祖高皇帝在位三十餘年未嘗見日而臨百官今或東方既曙鐘鼓既聞旭日巳旦朝儀方肅似非古人庭燎待賢之意也若謂天下大安可以優遊于庶政則飛蝗蔽天民食寡乏誠戰兢惕厲之日也夫安不忘危治不忘亂猶恐禍生于所忽尚何容一息之或怠哉臣之所願勤政事者此也仲虺告成湯曰能自得師者王傅説告高宗曰惟學遜志務時敏是在昔人君未嘗不學也然帝王之學豈效尋章摘句也哉程子曰大率一日之中接賢士大夫之時多親寺人宫女之時少自然氣象變化德器成就臣願陛下于萬幾之餘進一二儒臣以侍左右以備顧問或求帝王經世之要古人治亂之由參究天人之藴察知稼穡之難俾涵養既深本心既正則惟精惟一逸樂無益之事無自而萌芽矣遵義遵道佛老異端之説無自而眩惑矣臣之所願務正學者此也臣荷國厚恩備員耳目久欲有言恐犯天威是以思之纍日不敢驟進然犬馬思效之誠當不辭直言之罪已往者雖不可追而方來者尤當謹慎陛下詳審而思之擇善而從之追大禹之克勤顧成湯之不吝敦崇節儉與民休息躬行仁義慎始慮終則太平之基將興天下其悠久矣臣愚忱戇昧罪當萬死伏望陛下矜其愚衷寬其斧鉞使來者盡其言則天下不勝幸甚疏入帝怒甚召至便殿對不屈命武士撲以金瓜脅折者三曳出幾死陳八事疏宣德元年范濟宣宗即位范濟詣闕言八事一曰楮幣之法昉于漢唐元造元統交鈔後又造中統鈔久而物重鈔輕公私俱敝乃造至元鈔與中統鈔兼行子母相權新陳通用又令民間以昏鈔赴平凖庫中統鈔五貫得換至元鈔一貫又其法日造萬錠共計官吏俸稍內府供用若干天下正稅雜課若干斂發有方周流不滯以故久而通行太祖皇帝造大明寶鈔以鈔一貫當白金一兩民歡趨之迄今五十餘年其法稍弊亦由物重鈔輕所致願陛下因時變通重造寶鈔一準洪武初制使新舊兼行取元時所造之數而增損之審國家度支之數而權衡之俾鈔少而物多鈔重而物輕嚴偽造之條開倒換之法推陳出新無耗無阻則鈔法流通永永無弊二曰備邊之道守險為要若朔州大同開平宣府大寧乃京師之藩垣邊徼之門户土可耕城可守宜盛兵防禦廣開屯田修治城堡謹烽火明斥堠毋貪小利毋輕遠求堅壁清野使無所得俟其備而擊之得利則止毋窮追深入此守邊大要也三曰兵不在多在于堪戰比者多發為事官吏人民充軍塞上非白靣書生則老弱病廢遇有征行有力者得免貧弱者備數器械不完糗糧不具望風股栗安能效死今宜選其壯勇勒加訓練餘伹令乘城擊柝趨走牙門庶幾各得其用四曰民病莫甚于勾軍衛所差官至六七員百戶差軍旗亦二三人皆有力交結及畏避征調之徒重賄得遣既至州縣擅作威福迫脅里甲恣為姦私無丁之家誅求不已有丁之户詐稱死亡託故留滯久而不還及還則以所得財物遍賄官吏朦朧具覆究其所取之丁十不得一欲軍無缺伍難矣自今軍士有故令各衛報都督府及兵部府部諜布政按察司令府州縣準籍貫姓名勾取送衛則差人騷擾之弊自絶五曰洪武中令軍士七分屯田三分守城最為善策比者調度日繁興造日廣虛有屯種之名田多荒蕪兼養馬採草伐薪燒炭雜役旁午兵力焉得不疲農業焉得不廢願敕邊將課卒墾荒限以頃畝官給牛種稽其勤惰明賞罰以示勸懲則塞下田可盡墾轉餉益紓諸邊富實計無便于此者六曰學校者風化之源人材所自出貴明體適用非徒校文藝而已也洪武中妙選師儒教養甚備人材彬彬可觀邇來士習委靡立志不宏執節不固平居無剛方正大之氣安望其立朝為名公卿哉宜選良士為郡縣學官擇民間子弟性行端謹者為生徒訓以經史勉以節行俟其有成貢于國學磨礱砥礪使其氣充志定卓然成材然後舉而用之以任天下國家事無難矣七曰兵者凶器聖人不得已而用之漢高祖解平城之圍未聞蕭曹勸以復讐唐太宗禦突厥于便橋未聞房杜勸以報怨古英君良相不欲疲民力以誇武功計慮遠矣洪武初年嘗赫然命將欲清沙漠既以餽運不繼旋即班師遂撤東勝衛于大同塞山西陽武谷口選將練兵扼險以待內修政教外嚴邊備廣屯田興學校罪貪吏徙頑民不數年間多爾濟巴勒獻女巴延特穆爾鼐爾布哈等相繼擒獲納克楚亦降此專務內治不勤遠略之明效也伏望遠鑒漢唐近法太祖毋以窮兵黷武為快毋以犁庭掃穴為功棄捐不毛之地休養冠帶之民俾竭力于田桑盡心于庠序邊塞絶傷痍之苦閭里絶呻吟之聲將無幸功士無天閼遠人自服荒外自歸國祚靈長于萬年矣八曰官不在衆在乎得人國家承大亂後因時損益以府為州以州為縣繼又裁併小縣之糧不及俸者量民數以設官民多者縣設丞簿少者知縣典史而已其時官無廢事民不愁勞今藩臬二司及府州縣官視洪武中再倍政愈不理民愈不寧姦弊叢生詐偽滋起甚有官不能聽斷吏不諳文移乃容留書寫之人在官影射賄賂公行獄訟淹滯皆官冗吏濫所致也望斷自宸衷凡內外官吏並依洪武中員額冗濫者悉汰則天工無曠庶績咸熙而天下大治矣疏入帝曰所言甚有學識多契朕心當察其素履以聞邊方事宜疏正統六年劉球臣聞帝王之馭四裔必宥其小而防其大所以適緩急之宜為天下久安計也周伐崇不克退修德教以待其降至于玁狁則命南仲城朔方以備之漢征南越不利即罷兵賜書通好至于丐奴雖已和親猶募民徙居塞下入粟實邊復命魏尚守雲中拒之今麓川殘冦思任發素本羈屬以邊將失馭致勤大兵雖渠魁未殱亦多戮羣醜為誅為舍無繫輕重璽書原其罪釁使得自新甚盛德也邊將不達聖意復議大舉欲屯十二萬衆于雲南以趣其降不降則攻之不慮王師不可輕出蠻性不可驟訓地險不可用衆客兵不可久淹况南方水旱相仍軍民交困若復動衆紛擾為憂臣竊謂宜緩天誅如周漢之于崇越也至衛拉特終為邊患及其未即騷動正宜以時防禦乃欲移甘肅守將以事南征猝然有警以何為禦臣竊以為宜慎防遏如周漢之于玁狁丐奴也伏望陛下罷大舉之議推選智謀將帥輔以才識大臣量調官軍分屯金齒諸要害結木邦諸蠻以為援乘間進攻因便撫諭冦自可服至于西北障塞當敕邊臣巡視濬築溝垣增繕城堡勤訓練嚴守望以防不虞有備無患之道也疏入帝命下兵部謂南征已有成命不用球言元儒吳澄從祀議正統八年楊士竒臣士竒等欽遵考得元翰林學士吳澄所著書及奎章閣侍讀學士虞集所狀澄事行蓋澄自十歲得宋儒朱子所注大學讀之即知為學之要專勤誦讀次讀語孟中庸亦然遂大肆力于諸經十五專務聖賢之學致踐履之實以道自任其所自勵有勤謹敬和自新自修消人欲長天理克已悔過矯輕警惰顔冉理一等銘其教學者有學基學統等篇深究濂洛關閩之旨考正孝經校定易書詩春秋修正儀禮小戴記及邵雍張載之書有易書春秋禮記纂言及易纂言外翼皆所以啓大道之堂奧開來學之聰明傳之百世而無弊也時朝廷屢起之乃就國子監丞稍進司業一言不合即自解去後屢徴復起亦不久于位進退之際卓然君子蓋元之正學大儒許衡及澄二人衡遭際世祖功在朝廷澄在朝之日雖淺其識論思教成均勸講經筵咸積誠意預大議論大事咸引古道而功在學者尤多故二人之沒皆諡文正衡在當時已列從祀澄既後出又卒于元衰之際當時已有建議宜列從祀者屬元綱日頽未及舉行今澄所著諸書具在我國家崇儒重道大明四書五經及性理之旨凡澄所言皆見采録以惠學者蓋澄問學之功朱子以來莫或過之而從祀諸儒自荀况下至范寧語其事功皆未及澄今若升澄從祀孔子廟廷列諸許衡之次允愜斯文之公議昭國家之盛典謹具奏聞議奏帝從之敷陳十事疏正統八年劉球臣聞古聖王不作無益故心正而天不違之臣願皇上勤御經筵數進儒臣講求至道務使學問功至理欲判然則聖心正而天心自順夫政由已出則權不下移太祖太宗日視二朝時召大臣于便殿裁決庶政權總歸于上皇上臨御九年事體日熟願守二聖成規復親決政事使權歸于一古之擇大臣者必詢諸左右大夫國人及其有犯雖至大辟亦不加刑第賜之死今用大臣未嘗皆出公論及有小失輒桎梏箠楚之然未幾時又復其職甚非所以待大臣也自今擇任大臣宜允愜衆論小犯則置之果不可容下法司定罪使自為計勿輒拘繫庶不乖共天職之意今之太常即古之秩宗必得清慎習禮之臣然後可交神明今卿二皆缺宜選擇儒臣使領其職古者省方巡狩所以察吏得失問民疾苦兩漢唐宋盛時數遣使巡行郡縣洪永間亦嘗行之今久不舉故吏多貪虐民不聊生而軍衛尤甚宜擇公明廉幹之臣分行天下古人君不親刑獄必付理官蓋恐徇喜怒而有所輕重也邇法司所上獄多奉敕增減輕重法司不能執奏及訊他囚又觀望以為輕重民用多冤宜使各舉其職至運磚輸米諸例均非古法尤宜罷之春秋營築悉書戒勞民也京師興作五六年矣曰不煩民而役軍軍獨非國家赤子乎况營作多完宜罷工以蘇其力各處水旱有司既不振救請減租稅或亦徒事虛文宜令户部以時振濟量加減免使不致失業麓川連年用兵死者十七八軍資爵賞不可勝計今又遣蔣貴逺征𬗟甸責獻思任發果禽以歸不過梟諸通衢而已緬將挾以為功必求與木邦共分其地不與則致怒與之則兩蠻坐大是減一麓川生二麓川也設有蹉跎兵事無已臣見皇上每録重囚多宥令從軍仁心若此今欲生得一失地之竄寇而驅數萬無罪之衆以就死地豈不有乖于好生之仁哉况思機發已嘗遣人來貢非無悔過乞免之意若敕緬斬任發首來獻仍敕思機發盡削四境之地方于各寨新附之蠻則一方可寧矣迤北貢使日增包藏禍心誠為難測宜分遣給事御史閲視京邊官軍及時訓練勿使借工各厰服役私家公武舉之選以求良將定召募之法以來武勇廣屯田公鹽法以厚儲蓄庶武備無缺而外患有防矣疏入帝命下庭議言球所奏惟擇太常官宜從劾朱勇等疏正統十年葉盛臣聞失律喪師難逭滔天之罪陷君辱國當加赤族之刑憲典甚明人心共憤竊照總兵官太保成國公朱勇鎮遠侯顧興祖修武伯沈榮等俱以庸輩幸際明時平居不義不仁惟務剝削軍事臨事無謀無勇遂致玷辱朝廷邇者額森侵犯邊境至尊為姦臣之所惑擐甲胄以親征朱勇等職典軍機手握兵符自合運籌畫策著勳績于疆場獻勇效勞靖兵鋒于邊境庶幾少竭涓埃之報以酬天地之恩奈何各官棄甲曳兵纍挫威于小冦望風承旨尚受制于姦臣凡事依阿專守諂諛之故態六師淆亂全無紀律之可觀遂使幕庭詫僥幸之功鑾輿成孤注之失臣民虀粉師旅創殘臣竊惟朱勇等總兵戎既無決勝之功臨國難又無致死之節含垢忍恥尚甘食息以偷生遁迹潛形不詣闕廷而待罪古今大惡何以加焉人臣不忠莫甚于此食其肉不足以慰四海臣民之心磔其尸不足以紓三陵祖宗之憤夫交址外邦小國非有萬乘之尊天下之大也當時征伐失利之臣先皇帝或誅其身或籍其家或削其爵况以朱勇等罪惡深重如此者哉伏望殿下恪遵祖訓大正邦刑挨拏朱勇等置之極典籍沒其家仍乞以臣所言姦臣王振誤國之由朱勇等敗事之實諭告天下然後訓將練兵以復不共戴天之讎興師問罪以成安內攘外之績如此則大綱以正大義以明聖駕之旋軫可期邊服之敉寧可致矣疏入郕王從之建言疏景泰元年劉定之臣惟昔者晉懷愍宋徽欽皆因邊塞外破藩鎮內潰救援不集馴致播遷未有若今日以天下之大數十萬之師奉上皇于漠北委以與冦者也晉宋遭禍亂棄故土偏安一隅尚能奮于既衰以禦方張之敵未有若今日額森乘勝直抵都城以我將吏之衆既不能奮武以破賊又不能約和以迎駕聽其自來而自去者也國勢之弱雖非旦夕所能強豈可不思自強之術而力行之臣愚敢略陳所見近日京軍之戰但知堅壁持重而不能用竒制勝至前敗而後不救左出而右不隨謂宜倣宋吳玠吳璘三疊陳法互相倚恃迭為救護至鐵騎衝突必資刀斧以制之郭子儀破安祿山八萬騎用千人執長刀如牆而進韓世忠破金軍拐子馬用五百人執長斧上揕人胸下斫馬足是刀斧揮霍便捷優于火槍也紫荆居庸二關名為關塞實則坦途今宜增兵士繕亭障塞蹊隧陸則縱橫掘塹名曰地網水則瀦泉令深名曰水匱或多植榆柳以制奔突或多招鄉勇以助官軍此皆古所嘗為巳有明效往者奉使之臣充以驛人招釁啓戎職此之故今冝擇內藴忠悃外工專對若陸賈富弼其人者使備正介之選庶不失辭辱國臣于上皇朝乞徙漠北降人智謀短淺未蒙採納比者此輩乘國釁奔歸故土冦掠畿甸者屢見告矣宜乘大兵聚集時遷之南方使與中國兵民相錯雜以牽制而變化之且可省俸給減漕挽其事甚便天下農出粟女出布以養兵也兵受粟于倉受布于庫以衛國也向者兵士受粟布于公門務月錢于私室于是手不習擊刺之法足不習進退之宜第轉貨為商執技為工而以工商所得補納月錢民之膏血兵之氣力皆變為金銀以惠姦宄一旦率以臨敵如驅羊拒狼幾何其不敗也今宜痛革其弊一新簡練之政將帥踵舊習者誅毋赦如是而兵威不振者未之有也守令朘民猶將帥之剝兵也宜嚴糾考慎黜陟犯贓者舉主預其罰然後貪墨者寡薦舉者慎民安而邦本固矣古販繒屠狗之夫俱足助成帝業今于謙楊善亦非出自將門然將能知將宜令各舉所知不限門閥公卿侍從亦令舉勇力智謀之士以備將材庶搜羅既廣禦侮有人昔者漢圖恢復所恃者諸葛亮南宋禦金所恃者張浚彼皆忠義夙著功業久立及街亭一敗亮辭丞相符離失事浚解都督何則賞罰明則將士奮也昨德勝門下之戰未聞摧陷強冦但迭為勝負互殺傷而已雖不足罰亦不足賞乃石亨則自伯進侯于謙則自二品遷一品天下未聞其功但見其賞豈不怠忠臣義士之心乎可令仍循舊職勿躐新階他日勛名著而爵賞加正未為晚夫既與不忍奪者姑息之政既進不肯退者患失之心上不行姑息之政下不懷患失之心則治平可計日而望也向者御史建白欲令大臣入內議政疏寢不行夫人主當總攬威權親決機務政事早朝未決者日御便殿使大臣敷奏言官察其邪正而糾劾之史官直書簡册以示懲勸此前代故事祖宗成法也願陛下遵而行之若僅封章入奏中旨外傳恐偏聽獨任致生姦亂欲治化之成難矣人主之德欲其明如日月以察直枉仁如天地以覆羣生勇如雷霆以收威柄故司馬光之告君以仁明武為言即中庸所謂智仁勇也智仁勇非學而能之哉夫經莫要于尚書春秋史莫正于通鑑綱目陛下留心垂覽其于君也既知禹湯文武之所以興又知桀紂幽厲之所以替而趨避審矣于馭內臣也既知有呂強張承業之忠又知有仇士良陳宏志之惡于馭廷臣也既知有蕭曹房杜之良又知有李林甫楊國忠之姦而用舍當矣如是則于智仁勇之德豈不大有助哉茍徒如嚮者儒臣進講誦述其善諱避其惡是猶恐道路之有陷穽閉目而過之其不至于冥行顛仆者幾何今天下雖遭大創尚如金甌之未缺誠能本聖學以見之政治臣見國勢可強讎恥可雪兄弟之恩可全祖宗之制可復亦何憚而不為之疏入帝從之覆楊寧陳邊計疏議景秦元年于謙臣等查得獨石龍門長安嶺等處俱係萬全都司所屬緊關城池去年敵衆深入俱各捐棄失守兹當聲息稍寧可以措置雖經具奏令總兵等官朱謙等修設整理誠恐各官遷延有妨邊備已經節次議擬奏準令都督僉事董斌提督前項衛所官軍修理城池防護糧儲等項及昌平侯楊洪原留在京開平龍門等衛官軍三千員名并其餘俱係口外衛分在京報效等項官軍俱令都指揮楊能盡數領回原衛所操守近該董斌題稱獨石馬營雲州雕鶚長安嶺等處城池委係外控敵境內庇宣府懷來一帶若獨石馬營等處城內嚴固則腹裏衛所自然無虞今議將前項城池重復修飭整設屯營誠安邊禦侮長策合設都指揮一員在彼分守地方請降敕書并給符驗及將獨石等處衛所官軍男婦人等俱要聽伊鈐束督發原處以實空虛之城並將萬全都司帶俸都指揮推選有謀有勇之人分派獨石馬營李家莊雕鄂龍門等城專一守備操綀聽伊調遣等因具題抄出本部又經逐一依擬奏準通行去後今尚書楊寧奏要將獨石龍門等處候有餘力然後議及一節臣等竊詳各處土地城池俱係祖宗經營創建其獨石龍門一帶正係極臨敵境緊要去處外為邊境之籓籬內為京師之屏蔽去年敵人糾衆入犯守臣慮恐勢孤援寡因而捐棄失守至今清議不容今額森等已來請和邊報不甚緊急所宜興滯補敝修設故疆以為久遠之計以圖復讎之舉况前項城堡已命董斌提督並原守各城軍馬俱已發回即日正在營置之際彼處鎮守總兵等官並不曾奏難以修復緣由豈可自餒自畫輕易擲棄且我退一尺則彼進一尺我失一寸則彼得一寸得失進退之機安危治亂所係就使干戈擾攘之日尚當固守封疆况平居無事之時不宜自蹙土地兼且守備各城自用原有軍馬而非那移他處官軍今以理勢論之必當修復整理合無通行請敕宣府總兵參將鎮守參贊巡撫官員撫寧伯朱謙右都督紀廣內官柏玉侍郎劉璉僉都御史任寧都督僉事董斌等將獨石馬營赤城雲州李家莊雕鶚龍門長安嶺等處一帶邊務查照本部節次議奏事理會同計議區處勘酌人情之勞逸相看地形之夷險先其急而後其緩舉其大而略其小果係緊關去處上緊修復不係緊關去處從容修理其各城合用都指揮務在推選至公俾邊城守備得人而糧儲防護有法不許各持已見怠忽因循自餒其志廢弛兵備若因此失誤事機必治以重罪不恕其奏永寧懷來宣府直抵大同當益兵將固守緣永寧懷來已有都指揮同知楊信萬全右衛已有都指揮僉事江福提督宣府已有總兵官撫寧伯朱謙參將右都督紀廣大同已有總兵官定襄伯郭登參將都指揮潘興東路已有參將右都督方善西路已有參將都督同知許貴宣府大同所屬前項城除總兵參將及把總提督守備官軍外又有都指揮或一二員或三四員守城管操而所在衛所官軍止勾固守别無相應官軍可以增添其奏有功官軍升賞以信如有似前棄城不守率衆在逃無分貴賤親疏必殺不宥其有斬首少而報功多及妄報殺敗敵衆斬獲首級希求升賞其功皆不必録軍勝陳亡官軍與軍敗失陷者升賞亦須節減一節臣竊惟兵之勝負固係乎賞罰而賞罰運用必在乎嚴明近年以來因南北冦戎紛擾所在用兵撫捕其有功官軍中間若有不明者本部議擬行令所在提督參贊軍務等項都御史及監察御史等官重復體勘明白方才定奪升賞而總兵參佐等官若有失機誤事亦往往覆奏降黜如向者所升德勝等門紫荆等關及大同宣府官軍俱係殺敗敵衆保全城池有功人數該總兵等官造册奏要升賞節行駁勘明白若不照例升用何以激勸人心其有退縮覆潰如陽和口及土木等處官軍雖已死于鋒鏑未嘗升用一人况兵家之事以決勝敗敵為全功不以斬首多寡為勳績若止以斬首多寡定為升賞崇卑則人皆顧戀首級未免為敵所制今稱有妄報殺敗敵衆斬獲首級希求升賞緣無指實無憑查考合無通行各處總兵鎮守參贊等項文武大臣今後若是奏報殺敵有功官軍務要體勘明白要見何人奮勇當先為首何人協力跟隨為從何人生擒巨敵何人斬獲首級從實開奏以憑定奪不許徇私泛濫將無功之人一概冒請升授以致賞罰不明士氣消沮如違一體治罪及奏沿邊遇有聲息豫將人畜收入城堡固守俟敵師老氣惰然後擊之如彼越關內侵則內外合兵令其腹背受敵等情俱係用兵常法亦係現行事例别無定奪緣節該欽依看計議來説事理具題議奏得旨是獨石龍門一帶乃宣大藩籬若棄城不守則宣府必孤京師何以禦敵寫敕與朱謙董斌等上緊修城不許因循誤事劾許貴請講和疏景泰元年于謙臣竊詳北敵額森既侵邊境復犯京畿拘留上皇震驚陵廟其為仇恨庸可勝言且以和議一事論之當去年秋冬之間正敵勢方張之際朝廷亦嘗遣都指揮李鐸指揮嶽謙等齎執金繒往使賄賂才入于穹廬敵騎已至于關口繼遣少卿王榮通政王復又往敵營不見上皇鑾輿而還敵衆知我戰守有備尋皆望風遁去朝廷灼見敵情譎詐和不足恃以故絶使不通往還惟敕邊將修武備勵人心固守城池相機戰守今許貴又奏和議之説臣竊惟今日之事理與勢皆不可和何者中國與彼有不共戴天之讎和則背君父而忘大義此理之有所不可和也人北敵貪而多詐萬一和議既行而彼有無厭之求非分之望從之則不可違之則速變此勢有所不可和也苟以為敵強難制姑從和以緩其兵臣請質之前代宋真宗澶淵之役契丹之衆纍被我兵摧沮既盟之後朝廷尚歲輸銀絹三十萬兩匹逮及季世徽欽北狩中國名將如張韓劉嶽之徒屢敗金師及姦臣秦檜一主和議朝廷既割境土以與之又輸歲幣以賄之甚則不得不降尊號其為含垢忍恥屈巳從和固無所不至卒之人心解體國勢陵夷無救成敗而後已援古證今和之不足恃也明矣為今之計莫若選將練兵養威蓄鋭敵若來侵則相機而勦殺敵若遠遁不貪利以窮追萬一復有大舉入邊之謀則我兵操練有素加以將帥思奮臣當盡死效力以圖勦滅以雪國恥必不出敵人之下其或皇天厭亂列聖有靈敵人自知數入不利變惡為善遣使入貢則示以善善量與賞賜遣回亦不拘絶而已若欲朝廷先遣使臣往彼通好則示彼以弱而啓其輕侮之心萬萬不可此則方今之要務而臣愚見至于如此及照許貴叨居重任保障邊方不能鋭意滅敵卻乃倡為和議畏縮之迹既明忠義之心何在合將本官明正典刑以謝天下以戒將來緣係陳言事理又係備邊將官合無姑記其罪差人馳驛齎文切責許貴令其整飭邊務操練軍馬作興士氣固守地方必期滅敵以贖前罪仍通差人齎文前去遼東宣府大同陜西等邊及永平山海居庸白羊紫荆倒馬等關口總兵總守等項內外官員令其整飭人馬固守地方如遇敵人來攻務要相機行事毋得聽信哄誘因而失誤機務仍通行在京五軍三千神機等營總督總兵等官嚴加訓練官軍諭以忠義大節使之感激思奮以圖成功不許苟且因循致誤大計緣奉欽依兵部知道事理具題疏入帝從之審察敵情疏景泰元年葉盛臣竊惟邇者衛拉特額森僥幸土木之戰驕氣盈溢自以其鋒為不可當逼脅其主托克托布哈擁我太上皇帝悉衆而來南北分道一從紫金關一從鼇峪關排闥直入肆無忌憚我師臨城拒守持重養威討罪之義尚未大彰而額森不約請和無故自屈勤惓懇切至于再三請奉我上皇還宫皇上待以不欺遣使迎復此誠天意悔禍隂誘其衷莫大之幸也然臣暗劣竊以為額森姦險狡譎至難測料今此舉有二説焉其一曰怯其一曰示怯此聞額森之來姧細如李讓喜寧輩誘之曰中國一遭土木之潰士馬耗矣人心去矣大物可唾手得也而今所聞見士馬尚如此其富也人心尚如此其固也孤軍深入且疑且懼故爾陽回善意送駕回京多索犒費貪得金帛意在復歸巢穴徐圖再舉此其怯也不然額森之計必以為中國人心不過以迎復上皇為急上皇既歸人心必懈且我力請和好彼必以我為怯而不我虞假託結好之名潛蓄跳梁之志緩我戰守之具誤我將士之謀乘弊而發大縱剽掠通州而南援絶水陸此則示怯而實不怯也今日之計怯固可擊示怯亦擊使其怯而縱其歸茍安則可矣如後患何因其示怯乃遂信之而不疑置之而不問臣恐禍患之來秪在目前不待久也昔者金人侵宋种師道奏俟困擊之李綱亦請縱歸擊之師道又奏臨河要擊之而當時主和議者不之聽以致釀成靖康之變追悔莫及前鑒昭然不可不慮伏望皇上以宗社軍國為心急敕總督總兵等官并各營大小頭目即須十分整辦軍馬趲運糧餉精明紀律申嚴號令厚賞而重罰以和為虛以戰為事以進死為榮以退生為辱仍四散分差健卒晝夜多方哨探敵騎一或退動或搗其虛或襲其後或乘其斷絶或縱其半出運籌決勝務出萬全使沙漠肅清匹馬不返庶足為雪恥復讎之一快機不可失時不再來臣不勝犬馬拳拳為國竭忠激切之至疏入帝不納賞功罰罪疏景泰元年葉盛臣竊惟衛拉特侵軼京師戒嚴神武奮揚尋見奔遁皇上念機會之不可失載命將吏乘其困而擊之廟算不遺成功可必矣臣愚昧竊念賞功罰罪治天下之要務况今日陳師鞠旅之時尤為切要者乎賞不徒賞有功者賞必厚罰不徒罰有罪者罰必嚴今日之賞罰既行他日之勸懲所係賞罰明信將見人人用命力于事功何讎不可復恥不可雪哉頃因德勝等門殺敵有功并陳亡官軍有司未暇取勘皇上趣其舉行賞罰之典且戒以勿遲指揮魏真臨陳逃回法司以其罪請皇上則殺之不宥臣叨居侍從躬奉綸言知皇上信賞必罰之意即造化春生秋殺之心真大有為之君也臣竊詳少保兵部尚書于謙武清侯石亨都督僉事楊俊俱以軍功近蒙超擢然其間如都督孫鏜毛福夀都御史羅通等或運籌畫策或奮勇克敵俱有足稱非他人比又如守備白洋口通政使謝澤從容就死守備紫荆關都指揮韓青力戰而亡都督武興御史趙麟亦皆親冒矢石殁于王事良可矜憫其提督紫荆關都御史孫祥先差守備按察使曹泰俱各棄城逃遁使關門無結草之固以致如馬出入自如戎履無人之境經今日久聲迹杳然身為大臣既不能捐生以赴難又不行詣闕以待罪不忠不道莫甚于此都御史假信明知紫荆關係該提督地方乃多方躲避不行前去整理及至敵人入關佯為不知具奏掩飾似此姦詐豈能盡忠錦衣衛指揮王虹御史吳中郭仲曦王晉職專巡視關隘因情怠惰以致關口不固軍守不嚴敵騎長驅尚不星馳奏報推原情犯法所難容上項公罪伏乞聖明將都督等官孫鏜等照依給與誥命録用其子優恤其家仍乞聖斷將都御史等官孫祥等挨拏赴京明正其罪以警將來則賞罰當而人心服法紀明而事功成矣疏入帝從之京畿民情疏景泰元年葉盛臣聞京畿為天下根本必畿甸充實然後京師鞏固必京師鞏固而後天下乂寧此理勢之必然者也方今順天等八府實為京畿要地比年以來蝗旱相仍斯民困極加以去年戎馬抵關驚疑之後民不聊生今又天久不雨禾麥不長臣近奉敕于河南等處公幹往還之際經過霸州等州永清等縣備見所在人民逃亡者衆道傍屋廬十空八九桑棗多被斫伐牛羊罕見成羣間見居民扶老擕幼或扒蜆以為食或拾草以為糧艱難百狀不忍言及况且各府差役較他處為尤甚有運送糧草者有赴上司築城挑壕者有當衝要水馬驛站者有朋合柴薪等項夫役者有沿途協送官船者牽遞官馬者幫運官物者夫斯民艱難若此衣食尚且不充而差役又加繁重尚何顧戀而不逃乎比者雖寬恤之恩詔纍頒然重困之民猝難蘇息雖有撫民鎮守等官職專綏撫未見實效又聞臨清以南八府及山東等處流民大車小輛拖男拽女草行路宿流移而南者自驚疑以來至今未絶臣惟地方有限流移無窮若不加意蘇息不無愈見逃亡非惟他處地不能容有干他慮實恐畿內空虛所係非小伏望皇上留意斯民特敕該部行移各府鎮守撫臣嚴督官司里老人等十分用心招徠撫綏逃者必欲復業存者務令得所其大臣務須親厯鄉村慰安人心勿視虛文務臻實效然其原本又在于朝廷仍乞敕該部與廷臣集議將前項地方應有派辦差役如軍器年例物料及册造夫役等項亦須量與斟酌不為常例或寬減分數或暫派南方待後事妥民安俱仍照舊仍查各府豫備倉糧有無多寡數目設法賑濟及給與牛種使得漸安生理則京畿安而天下皆安不然臣不能不為社稷憂也疏入帝從之御選明臣奏議卷二
