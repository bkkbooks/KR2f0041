  text: 欽定四庫全書御選明臣奏議卷三十三
  hash: sha256:c0df8787afdd0f9428f3ce398ddef8d8eaae4fa30becd6ff8f8a599ebe922179
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_036-1a, image: WYG0445/WYG0445-0541a.png}
body:
  text: 陳天下安危疏萬歷二十五年吕坤臣竊見元旦以來天氣昏黃日光黯淡占者以為亂徴今天下之勢亂象已形而亂勢未動天下之人亂心已萌而亂人未倡今日之政皆播亂機使之動助亂人使之倡者也臣敢以救時要務為陛下陳之自古幸亂之民有四一曰無聊之民溫飽無由身家俱困因懷逞亂之心冀緩須臾之死二曰無行之民氣髙性悍玩法輕生居常愛玉帛子女而不得及有變則淫掠是圖三曰邪謀之民白蓮結社遍及四方教主傳頭所在成聚倘有招呼之首此其歸附之人四曰不軌之民乘釁蹈機妄思雄長惟冀目前有變不樂天下太平陛下約已愛人損上益下則四方皆赤子否則悉為冦讐今天下之蒼生貧困可知矣自萬厯十年以來無嵗不災催科如故臣久為外吏見陛下赤子凍骨無兼衣肌腸不再食垣舍弗蔽苫藁未完流移日衆棄地猥多留者輸去者之糧生者承死者之役君門萬里孰能仰訴今國家之財用耗竭可知矣數年以來夀宫之費幾百萬織造之費幾百萬寧夏之變幾百萬黃河之費幾百萬今大工採木費又各百萬矣土不加廣民不加多初非有雨菽湧金安能為計今國家之防禦踈略可知矣三大營之兵以衛京師也乃馬半羸敝人半老弱九邉之兵以禦外寇也皆勇于挾上怯以臨戎外衛之兵以備征調資守禦也而户缺于役占家纍于需求皮骨僅存折衝奚賴設有千騎橫行兵不足用必選民丁以怨民鬭怨民誰與合戰夫人心者國家之命脈也今日之人心惟望陛下收之而已關隴氣寒土薄民生實艱自造花絨比户困于趣逼提花染色日夜無休千手終年不成一匹他若山西之紬蘇松之錦綺嵗額既盈加造不已至若饒州磁器西域回青皆不急之需徒纍小民陛下誠一切停罷而江西陕西之人心收矣以採木言之丈八之圍豈止百年之物深山窮谷蛇虎雜居毒露常多人煙絶少寒暑飢渴瘴癘死者無論已乃一木初卧千夫難移倘遇阻艱必成傷殞蜀民語曰入山一千出山五百哀可知也又如海木官價雖一株千兩比來都下為費何止萬金臣見楚蜀之人談及採木莫不哽咽茍損其數增其直多其嵗月減其尺寸而川貴湖廣之人心收矣以採礦言之南陽諸府比嵗飢荒生氣方蘇菜色未變自責報殷户而半巳驚逃自供應礦夫工食官兵口糧而多至纍死自都御史李盛春嚴旨切責而撫按畏罪不敢言今礦砂無利責民納銀而姦人仲春復為攘奪侵漁之計朝廷得一金郡縣費千倍誠敕戒使者母散砂責銀有侵奪小民若仲春者誅無赦而四方之人心收矣官店租銀收解自趙承勛造四千之説而皇店開自朝廷有內官之遣而事權重夫市井之地貧民求升合絲毫以活身家者也陛下享萬方之富何賴于彼且馮保入店為屋幾何而嵗有四千金之課課既四千徴收何止數倍不奪市民將安取之今豪家遣僕設肆居民尚受其殃況特遣中貴賜之敕書以壓卵之威行竭澤之計民困豈顧問哉陛下若撤還內臣責有司輸課而畿甸之人心收矣宗室皆九廟子孫王錦襲等蓋世神姦藉隔數千里而冒認王弼子孫事隔三百年而妄稱受寄財産中間偽造絲綸假傳詔旨明欺聖主暗陷親王有如楚王銜恨自殺陛下何辭以謝髙皇帝之靈乎此兩賊者罪應誅殛乃止令回籍臣恐萬姓驚疑誠急斬二賊以謝楚王而天下宗藩之心收矣崇信伯費甲金之貧十廂珠寶之誣皆通國所知也始誤于科道之風聞嚴追猶未為過今真知其枉又加禁錮實害無辜請還甲金革去之祿復五城厰衛降斥之官而勳戚之人心收矣法者所以平天下之情其輕其重太祖既定為律列聖又增為例如輕重可以就喜怒之情則例不得為一定之法臣待罪刑部三年矣每見詔獄一下持平者多拂上意從重者皆當聖心如往年陳恕王正甄常照等獄臣欺天罔人已自廢法陛下猶以為輕俱加大辟然則律例又安用乎誠俯從司冦之平勉就祖宗之法而囹圄之人心收矣自古聖明之君豈樂誹謗之語然而務求言賞諫者知天下存亡係言路通塞也比來驅逐既多選補皆罷天閽邃密法座崇嚴若不廣逹四聰何由明照萬里今陛下所聞皆衆人之所敢言也其不敢言者陛下不得聞矣一人孤立萬乘之上舉朝無犯顔逆耳之人快在一時貽憂他日陛下誠釋曹學程之繫還吳文梓等官凡建言得罪者悉分别召用而士大夫之心收矣朝鮮密邇東陲近吾肘腋平壤西郊鴨緑晉州直對登萊倘倭夷取而有之藉衆為兵就地資食進則斷我漕運退則窺我遼東不及一年京城坐困此國家大憂也乃彼請兵而二三其説既許兵而延緩其期力窮勢屈不折入為倭不止陛下誠早決大計併力東征而屬國之人心收矣四方輸解之物營辦既苦轉運尤難及入內庫率至朽爛萬姓脂膏化為塵土倘嵗一稽核苦窳者嚴監收之刑朽腐者重典守之罪一整頓間而一年可備三年之用嵗省不下百萬而輸解之人心收矣自抄沒法重株連數多坐以轉寄則並籍家資誣以多贓則互連親識宅一封而雞犬大半餓死人一出則親戚不敢藏留加以官吏法嚴兵番搜苦少年婦女亦令解衣臣曽見之掩目酸鼻此豈盡正犯之家重罪之人哉一字相牽百口難解姦人又乘機恐嚇挾取資財不足不止半年之內擾遍京師陛下知之否乎願慎抄沒之舉釋無辜之繫而都下之人心收矣列聖在御之時豈少宦官宫妾然死于箠楚者未之多聞也陛下數年以來疑深怒盛廣廷之中狼藉血肉宫禁之內慘戚啼號厲氣寃魂乃聚福祥之地今環門守户之衆皆傷心側目之人外表忠勤中藏險毒既朝暮不能自保即九死何愛一身陛下臥榻之側同心者幾人暮夜之際防患者幾人臣竊憂之願少霽威嚴慎用鞭撲而左右之人心收矣祖宗以來有一日三朝者有一日一朝者陛下久不視朝人心懈弛已極姦邪窺伺已深守衛官軍祗應故事今乾清修造逼近御前軍夫往來誰識面貌萬一不測何以應之臣望發宫鑰於質明放軍夫于日昃自非軍國重務慎無昏夜傳宣若夫章奏不答先朝未有至于今日強半留中設令有國家大事邀截實封揚言于外曰留中矣人知之乎願自今章疏未及批答者日于御前發一紙下會極門轉付諸司照察庶君臣雖不面談而上下猶無欺蔽臣觀陛下昔時勵精為治今當春秋鼎盛曽無夙夜憂勤之意惟孜孜以患貧為事不知天下之財止有此數君欲富則天下貧天下貧而君豈能獨富今民生憔悴極矣採辦日增誅求益廣斂萬姓之怨于一人結九重之讐于四海臣竊痛之使六合一家千年如故即宫中虛無所有誰忍使陛下獨貧今禁城之內不樂有君天下之民不樂有生怨讟愁嘆難堪入聽陛下聞之必有食不能咽寢不能安者矣臣老且衰恐不得復見太平籲天叩地齋宿七日敬獻憂危之誠惟陛下密行臣言翻然若出聖心警悟者則人心自悅天意自回矣疏入帝不納條陳海防疏萬歷二十五年李頤竊以倭奴欲窺中國先冦朝鮮初以中國易與深入平壤逮我兵環攻一鼓而下雖鋭氣少摧而雄心未已遂倡請封之説脫逐北之追優遊五年練兵聚餉置器造船種種齊備方聽使臣東去而彼已擊楫西渡水陸並進又稱聽天朝處分緩我兵援救嬰兒視我狡惡異常我太祖髙皇帝廓清寰宇四夷咸賔獨絶倭奴之貢蓋灼知鯨鰍最滑非豚魚可孚神謨逺矣今空國重來豈為朝鮮彈丸之地其情愈狡其形愈露幸遇聖明同符太祖命將興師再彰天討一以固腋左之籓籬一以驅榻邉之鼾睡天威震赫聖武布昭肅中外之人心鼓將士之敵愾封京覲而靜海氛旦暮遇之矣惟是大兵未集倭衆先發間山夜襲全慶風靡萬一狡奴乘燎原之勢揚西嚮之帆海濵到處是岸猝然無備言之寒心天津登萊等處最為要害近設撫臣専理切中機宜無容言矣至臣等所屬沿海要衝延袤七百餘里向無専設官兵雖經臣等先于萬厯壬辰料理稍有次苐然甲兵器具悉抽借于防邉額數之中嗣因倭讐少息旋即撤還頃復尋理舊緒節行鎮道覆加籌畫兹據册報分布兵防如主客官兵以石匣振武等營共三萬四千三百有竒各畫地分守以密雲左右等營共一萬八千五百有竒各整備應援如戎車火器以營路偏廂等車共五百四十餘輛大將軍等炮共七百餘位佛郎機共八百六十餘架及隨營隨車快槍銃厰火箭等器械俱足為守禦之資與夫應設烽堠坑塹哨船馬撥等項及修濬城池簡練壯快鄉兵一切保障事宜業次第舉行務臻實效苐前項官兵雖豫行布置申明責成須俟汛報緊急先以分守之兵統赴汛地再俟倭勢猖獗方發應援之兵飛馳協勦據兹一成之晝似若有備無患然必疆圉寧謐兵力有餘移緩就急庶克有濟今邉兵精鋭業多挑選東援諸冦往往伺隙倘倭氛塞警一時並起則顧此失彼終非完計查得臣等先年酌議薊鎮應設協守副總兵一員逰擊二員守備四員共募南北軍兵一萬五千分統駐劄密薊永三道濵海地方俱屬薊鎮總兵官莭制倭急則量調邉兵䇿應邉急則量調海兵協防聲勢相援緩急有賴已經疏請依行尋因議封中止今事急燃眉大非昔比設將募兵必不容已第時詘舉贏恐物力難繼無已則請照先議設逰擊二員各統兵三千共募軍士六千一駐永平道屬一駐密薊二道屬各緊要適中地方以為防海専兵又近調臺兵三千三百餘名其額缺自宜另募又因難以處餉暫以主兵代為守臺兹應照數召募權留防海併照先議設一協守副總兵統之控駐三道海隅要害之中東西逰擊兩營俱聽調度䇿應並屬薊鎮總兵官統轄總計三營增兵近萬除抵補臺兵者已有成議而所增實止六千不為過多相應責成三道選募無論南北務得精強仍照原議協守一營量用馬六百匹逰擊二營各用馬三百匹俱以附近州縣之馬充給便于臨敵馳擊互相䇿援其各兵安家銀照例每名五兩月餉銀一兩五錢及將領廪費馬匹料草等項俱候部覆咨至另議請發此専兵之當議者一也薊鎮所重在守沿邉臺垣等工率三年一次題派分修臣等近據鎮道議派現修工程俱照先年規則每甎牆一丈春防用軍二十五名秋防用軍三十名敵臺一座用軍五百名餘各酌派有差此間暇無事綢繆牖戶計也今征調紛紜邉海並急若工役不休則軍力滋困戰守奚恃似應照近年防倭已行事例無論春秋兩防以十分工程為率量減四分止修六分如每甎牆一丈派軍五十名每敵樓一座派軍七百名其餘次第減派稍恤荷鍤之疲豫養衝鋒之鋭仍督行三道嚴為稽查母容將領等臣賣放滋弊潦草塞責軍兵期有實數修砌務要精堅違者從重究治脫倭報緊急則當盡停工作速赴汛地防禦又難以平時例論者再照各省直班兵向來専事版築往往以脆弱充數器甲俱無逃亡相繼即修守尚多虛應欲責之賈勇禦敵難矣合候部覆通行河南山東北直𨽻撫鎮衙門督令來歲春班將領將所統軍兵俱要挑選精壯足額各帶犀利器械則限正月中旬赴薊以便分布修防毋拘常期後至其宣大延綏邉兵四枝併行精選速發入衛如兵馬器甲仍有不堪不足者責在統領將官容臣驗閲分數按法劾懲以肅邉紀此班兵之當議者二也薊鎮營路厯年製造軍火器具總為防邉頃因調發征倭官兵一萬二千六百有竒各以該營器械等項隨帶東行不足者復别項借給又南北省鎮調到官兵經由薊門所帶器仗間有缺少及合用馬匹馱騾與中途倒斃應補者俱于沿途營路借發便其速行業行各道通查借免過的數册報酌議第器械馬騾邉海所需甚急均當刻期補還然計費不資且近發征倭軍士例給安家等銀多屬有司借支候另請補庫今各庫空矣諸所急用豈能速輸合無請照近年防倭事規兵部量發馬價于密薊永三道每道二萬兩聽専備前項買馬造器及海防雜辦一應必用之需詳為登記有餘則互相通融不足則再行酌請事完册報臣等校實奏繳並咨部查考庶有財自可利用興事不致失時此兵費之當議者三也臣等前所經畫不過以本鎮兵馬守本鎮封疆萬一倭奴狂逞擁衆長驅非厚集精鋭未易撲滅臣頤于受事之初曽陳愚見謂宜豫行薊鎮總兵官無論主客南北料理精兵二萬宣大保定總兵官各料理精兵一萬嚴督將領整飭器械訓練步伐無事之時照常防守汛地一聞薊門重大警報不待徴發各總兵官速統前來薊為正鋒宣大保定為左右翼四鎮兵馬逆擊于其前仍令遼東總兵官挑選精兵二萬截殺于其後首尾相應前後夾擊使此奴四面受敵隻輪不歸彼時雖經部覆通行迄今嵗月頗久請再行申明俾豫為整備所謂勿恃其不來恃吾有以待之耳乃若昌鎮兵馬擁護陵寢本難他援顧薊昌接壤唇齒相依未有薊鎮相急而昌鎮可坐視者亦容臣等審勢相機量調標營馬步官兵各一技就近于密雲道屬地方協防然非萬分急迫未敢輕調此鄰鎮之當議者四也以上四議臣與鎮道等官再三商𣙜以簡便可行乃敢上請其間增兵一節尤為喫緊蓋兵增則諸條俱稱實際無兵則多言總屬虛文倘謂天津登萊業巳添兵增餉勢難復及于薊則臣又有請焉京營兵餘十萬雖勤校閲向未試用合無挑選精兵一萬速令赴薊容臣督行將領嚴為訓練分布海上量撤邉兵周防塞垣雖京師根本之地居重斯可以馭輕而薊門肘掖之區攘外正所以安內况近在數舍匪調逺征加給行餉聽其更番亦士心所深願者徒此漸習精勤潛消驕悍其利不獨在邉海也師行糧從自古記之今順永二府疊罹災傷閭閻艱食臣等方抱隱憂業行各司道查議務多積粟用備兵荒今適該部科題行以二府民運京庫銀兩改徴本色儲之郡邑更為便計容臣等徑從便宜一併督行俟各道詳報至日或量請漕糧或借給糴本不妨積貯過多統侯放支另議銷補不敢一一陳瀆今將分布過海防官兵車船火器烽堠馬匹及城堡狀快鄉兵等項事宜備造奏册隨本進呈伏乞敕下該部覆加查酌上請定奪施行疏入帝從之言倭患既平兵勿輕動奏萬厯二十六年沈一貫臣竊惟皇上以倭賊既平頒詔天下舉朝臣子欣欣然謂睿算神謨讋服四荒之逺莫不舉手加額相慶相朂蓋因今日之功而思前日之所以成此者不易又思後日之所以繼此者尤不易也是役也關酋雖黠不過一人奴也羣醜雖繁不能當我一大郡也螫僅中于一隅師遂勤于七省數百萬之裹糧六七年之奔命豈惟大小臣工竭智畢力即皇上旰食宵衣亦不能一日康豫夫以國家全盛聖主獨斷而成功猶若斯之難也蓋用兵之事資費浩大徵發艱難虛內事外本非長計而又勝敗之數最難豫期東功之成天幸不至乏絶耳痛定知痛至今思之不能不為栗栗有如水火焚溺可復蹈哉故古稱制治于未亂保邦于未危從天下之未亂未危而圖之一善言即可以結民心一善政即可以弭民患為力易而取效大也至於巳亂已危而圖之即集衆思而未必濟事持衆善而未必釋憂稍失算于秋毫即貽禍於罔極衽席之間瀚海再波蔀屋之下夷酋接踵憂勞不得不萃于聖躬財力不得不耗于中外縱爾善收亦已疲瘁萬一蹉跌悔何可追故舉朝之忠計咸謂國家之武功雖可觀而政治實多闕如礦稅擾民太甚閭閻民不聊生盜賊日夜窺伺而有竊發之虞守臣竭力補苴而有難支之勢孔子有言有國家者不患寡而患不均不患貧而患不安憂不在顓臾而在蕭牆之內臣每誦斯言輒為震惕自古蕩析播遷之禍皆始于上下不均民心好亂可不畏哉伏望皇上居髙聽卑思患豫防勿任一已之情而拂百姓之欲勿貪沾沾之利而而輕丕丕之基勿謂小民易虐而刑法可箝勿謂盜賊易誅而甲兵足恃聖心抑慎聖斷清明常欽欽如倭患未平之時而不少怠荒庶幾上下交利臣主俱榮盛德成功傳之萬時社稷幸甚疏入帝從之劾礦使陳增疏萬厯二十六年郝敬臣接山東益都知縣吳宗堯揭帖內稱開礦太監陳增背旨營私剝官虐民包賣鉛砂抽丁加派諸不法狀一句一切齒一字一墮淚官不得一日安其位民不得一日聊其生以聖明在上而豺狼噬人于大都狐鼠公行於白晝日甚一日莫之敢聞是祖宗之法令虛設而皇上之明旨不信也夫內官不許干預外事此髙皇帝明訓也貂璫進用差遣絡繹是中葉敝風耳今陛下不能逺法髙帝而下襲中葉已為過矣所幸者明旨不許擾害地方不許動支官銀不許加派小民可以稍救百姓水火之命於萬一今據吳宗堯所奏無論山東六州二十九縣即益都一縣之中一年之內已支費過銀二千兩必非無據也出巡比較打死臨縣礦夫孫有三日不許埋葬備極慘酷貧民單林韓文等久被刑禁富户瞿拔徐大亮等橫遭虜掠必非無據也計口抽丁包派金銀即益都一縣丁夫二千名共派銀三千六百兩又派鉛價銀一千八十兩則通省六州二十九縣約嵗派銀十餘萬兩必非無據也疏內縷縷萬言罪案百款即謂膚受之訴未必一一可信如臣所摘數條似非影嚮大于明旨有背不一行勘何以服吏民之心正貪殘之罪而彰陛下無私之明夫吳宗堯一縣令耳任事未滿一年書生貧苦初得一官豈不自愛而甘心挑禍况前日之韋國賢復轍不逺也彼豈不知之且開採一事羣臣百言而聖上百不聽豈因一有司言而忽聽之彼必知之矣欽差內使百言而皇上百聽又豈因有司一言而遂不聽彼必知之矣何苦舍七尺之身冒雷霆之怒徼必不可得之幸而呼必不可回之天哉此其萬不得已之情亦可諒矣故臣以為宗堯之言非盡無據不可不為一勘問也然此治其標耳倘開採之役不停內臣差遣不罷禁其勿擾而實導之擾也禁其勿加派而實縱之加派也禁其勿支費官銀而終不免于支費也地方何時而安寧哉何也彼明知聖旨所謂勿擾者為寬慰臣下之權辭而以有司之不應誅求者為阻撓礦務之大罪有司以騷擾需求為違旨內臣又以阻撓礦務為違旨有司之論違旨者不下而內臣之論違旨者已拏問矣是則陛下之旨在財貨者則惡人違之而在地方民命者雖違之固無傷耳天下仰見陛下之意在此而不在彼雖三令五申竟何益乎故臣以為礦事不停則明旨所云豈惟陳增不信即天下吏民亦不之信矣然陛下所以不肯信諸臣之言者其故有二謂昔言開礦無利而今所獲數萬金安見其不利也昔言開礦有害而今宇內晏然安見其有害也不知陛下所謂利者在帑藏之私蓄而諸臣之所謂不利者在閭閻之傷殘剝之閭閻而收之帑藏是舍百鈞而收秋毫也何利之有陛下之所謂無害者幸目前之無恙而諸臣之所謂有害者慮將來之不測漸積于目前而決裂于將來是今日而不能逆料于明日也何為無害如但以帑藏為利閭閻為非利是則臣之所未解也如必待禍之已然而始信其為實然是則臣之所大懼也伏惟陛下思倚伏之機究聚散之理納苦口之諍燭逄迎之姦焕發明旨停止開採是黃虞再世而化日重熙雖豺狼狐鼠如陳增輩欲摶噬吏民其可得乎如謂經費不足則開採之所入原未供之經費也如謂內帑之缺乏則鋪官買辦依舊取之外府也天下之疑陛下愈深而陛下之明旨不過為愚㺯臣民之虛文也奈何豎宦輩不辨髦視之也哉伏乞陛下先行停止然後以宗堯所奏令彼處撫按一一查勘請自上裁以正陳增之罪庶民心悅服大小臣工仰見日月之明顧臣所深恨尤不止此者據宗堯疏中述陳增口狀數語云便是撫按官兒説咱的本也不下只是咱的本便下的快些等語尤為不法陛下此意外人雖心知之而不敢言陳增公然言之而不知忌是明倚陛下挾制臣民以歸過于君上罪莫甚焉惡莫大焉聽臣之愚並將宗堯所奏速行勘問勿再寢閣以中姦人之言再將臣疏一並批發如臣言是乞陛下鑒其直而宥其死如臣言非雖戮之可也斥逐之可也亦足以罷臣之言責而彰陛下之明斷倘一概寢閣忠良徒勤而天聽愈逺疾痛呼而不應蟊賊猖而不誅日積月釀以至天變人離雖復盡天地為黃金變河沙為珠玉而瓦解之勢成天下之事敗矣當是時然後取今日之言而追思之取今日賊壞天下之小人而族滅之何補于理亂之數哉伏惟陛下早賜裁決生民幸甚宗社幸甚疏入得旨目今帑藏匱竭國用不敷開採礦務原為不忍加派小民且屢有旨禁約擾害陳增已有旨了還著遵奉敕內事理潔已奉公嚴束下人毋得自干法典吳宗堯借言官等奏揭狂逞顯是要名姑且不究這所奏知道了修省弭災疏萬厯二十七年馮琦臣近見太隂經天太白晝見巳為極異至山陷成谷地湧成山則自開闢以來惟唐垂拱中有之而今再見也竊惟上天無私惟民是聽欲承天意當順民心比來天下賦額視二十年以前十增其四而民户殷足者則十減其五東征西討蕭然苦兵自礦稅使出而民間之苦更甚加以水旱蝗災流離載道畿輔近地盜賊公行此非細故也諸中使銜命而出所隨姦徒動以千百陛下欲通商而彼専困商陛下欲愛民而彼専害民蓋近日神姦有二其一工伺上意其有成奏假武辨上之其一務剝小民畫有成謀假中官行之運機如鬼蜮取財盡錙銖逺近同嗟貧富交困貧者家無儲蓄惟恃經營但奪其數錢之利已絶其一日之生至于富民更蒙毒害或陷以漏稅竊礦或誣之販鹽盜木布成詭計聲勢赫然及其得財寂然無事小民纍足屏息無地得容利歸羣姦怨萃朝寧夫以刺骨之窮抱傷心之痛一呼則易動一動則難安今日猶承平民已洶洶脫有風塵之警天下誰可保信者夫巴拜誅關白死此皆募民丁以為兵用民財以為餉若一方窮民倡亂而四面應之于何徴兵于何取餉哉陛下試遣忠實親信之人采訪都城內外閭巷歌謡令一一聞奏則民之怨苦居然可覩天心仁愛明示咎徴誠欲陛下翻然改悟坐弭禍亂乃禮部修省之章未蒙批答而姦民搜括之奏又見允行如納何其賢妄説令遍解天下無礙官銀夫四方錢榖皆有定額無礙云者意蓋指經費羡餘近者征調頻仍正額猶逋何從得羡此今一下趣督嚴急必將分公帑以充獻經費罔措還派民間此事之必不可者也又如仇世亨奏徐鼐掘墳一事以理而論烏有一墓藏黃金巨萬者借使有之亦當下撫按核勘先正其盜墓之罪而後沒墓中之藏未有罪狀未明而先沒入資財者也片紙朝入嚴命夕傳縱抱深寃誰敢辨理不但破此諸族又將延禍多人但有株連立見敗滅輦轂之下尚須三覆萬里之外止據單詞遂令狡猾之流操生殺之柄此風一倡孰不效尤已同告緡之令又開告密之端臣等方欲陳訴而姦人之奏又得旨矣五日之內搜取天下公私金銀已二百萬姦內生姦例外創例臣前猶望其日減今更患其日增不至民困財殫激大亂不止伏望陛下穆然逺覽亟與廷臣共圖修無令海內赤子結怨熙朝千秋青史貽譏聖德則幸甚疏入帝不納劾晉璫誣重臣疏萬厯二十八年朱吾弼臣竊謂省直邉方之設巡撫用以表鎮將吏惠綏百姓所稱天下之重臣是巳以山西內拱神京外抵邉塞得清介端方如撫臣魏允貞彈壓其中墨吏寒心窮氓安堵七年之拮據口碑載道一生之砥礪士論傾心奈何惡璫孫朝者妄加汙衊顛倒是非不顧重臣輒放言欲食其肉寢處其皮臣竊訝此舉關于國體世道匪細蓋四出中使前此之恣貪殘尚憚撫按得議其後天下人民前此之被荼毒尚賴撫按維持其間今孫朝汚辱允貞朝廷知有公論于朝不加切責于允貞不賜慰留恐是非無兩可邪正不並立正直解體宵壬得志中使盡無所憚以播惡人民盡無所賴以為生斂怨于閭閻者日深釀禍于國家者日蹙縱不為國體惜而于世道可無慮乎且朝之出也朝廷原非擇賢而使不過乘機遘會通同原奏官得差為自利計其斃驛官以肆虐壓稅銀以肆貪與捆打平民索取綢緞氈絨凶狠黷貨種種不法致縣官閉門乞休山西之人所共見共聞曽謂朝足勝任使乎伏望沛發明旨重懲孫朝之欺妄溫諭魏允貞安心供職使天下知朝廷有重臣非羣小所得間庶國體崇人心協治平在是矣疏入帝不納陳礦稅六害疏萬厯二十八年田大益臣竊惟內臣務為劫奪以應上求礦不必穴而稅不必商民間邱隴阡陌皆礦也官吏農工皆入稅之人也公私騷然脂膏殫竭向所謂軍國正供反致缺損即令有司威以刀鋸祗足驅民而速之亂耳此所謂斂巧必蹶也陸下嘗以礦稅之役為裕國愛民然內庫日進不巳未嘗少佐軍國之需四海之人方反脣切齒而冀以計智甘言掩天下耳目其可得乎此所謂名偽必敗也財積而不用崇將隨之脫巾不已至于揭竿適為姦雄睥睨之資此時雖家給人豫亦且蹴之覆之而不可及矣此所謂賄聚必散也夫衆心不可傷也今天下上自簪纓下至耕夫販婦茹苦含辛扼掔側目而無所控訴者蓋已久矣一旦土崩勢成家為讐人為敵衆心齊逼而海內因以大潰此所謂怨極必亂也國家全盛二百三十餘年已屬陽九而東征西討以求快意上之蕩主心下之耗國脈二豎固而良醫走死氣索而大命傾此所謂禍遲必大也陛下矜奮自賢沈迷不返以豪璫姦辨為腹心以金錢珠玉為命脈藥石之言褎如充耳即令逢干剖心臯夔進諫亦安能解其惑哉此所謂意迷難救也此六者今之大患臣畏死不言則負陛下陛下拒諫不納則危宗社願深察而力反之疏入帝不納論孫朝魏允貞事奏萬厯二十九年沈一貫臣惟今日政體有一時之低昻而關當代之治亂不無大煩皇上之主持者則孫朝魏允貞之事是也祖宗斟酌百王立綱陳紀詳審精密防患最深如設官分職布列中外內則閣部院司以至臺省百僚外則都布按司以至府縣各屬靡不相兼相制紏結維持有一官必有數衙門為之統轄有一事必有數耳目為之經承故當其任者雖似有掣肘之苦而事精物詳法行政肅規模廣大體統公平君子有所依憑以效其忠小人有所忌憚以斂其惡國家二百年來太平無事者以此凡人臣之老於世故久于仕途者莫不抑心戢志以為宜然而不敢有所踰越惟敢作敢為不知事體之人則忿其拘束而思決裂之此慎不可許者也一有偏信獨任則勢重于極而難轉毒鍾于隱而難治矣憂患之來豈淺淺乎如巡撫一官祖宗所特遣以肅憲于一方者也雖無所不統而錢糧則制于布政獄訟則典于按察各差巡按又頡頏于一時未嘗不寓相制之意焉故足倚信也惟今礦稅內臣則體統不載于憲綱職守不著于會典欲行即行欲止即止欲參論即參論欲罪罰即罪罰使中外臣僚不得寓一毫相制之微意而盡廢祖宗之良法竊以為假之太過矣非惟憲臣不能制也且反制憲臣亂是用長屢奉皇上嚴諭豈不望其會同和衷而撫臣以安民為務中使以搜民為務職事既已相反調停何處得施理所難通必不能盈其欲法所難假必不能快其私水火異心終難和協臣久已憂其有今日之紛紛矣夫祖宗久設之官經制也皇上暫遣之使權宜也以權宜而妨經制非久安長治之道也朝廷之所以尊而國家之所以安者惟恃此體統法度撫臣必不可廢而徇內臣內臣豈可縱而參撫臣撫臣可參又何有于按臣又何有于司道而又何有于府縣盡魚肉之矣軍民何所恃以為安乎如此則百僚撫綏之計窮而四海更生之望絶內外低昻隂陽消長于此乎決皇上不可無主張于其間也且臣聞之醫之用藥必使之相畏而相使然後得其用用人亦然使之相畏然後各懷小心而不至于廢法使之相使然後共舉職守而不至于廢事且兩重其人縱有一人壞之而尚有一人救之可無意外之虞既巳相畏必復相制皆莫敢自為用而盡為朝廷用此明主用人之術也今日之事即不能伸此抑彼以為撫臣重猶當兩存而兩制之使形迹渾然無以測皇上之喜怒宫府一體無以竊皇上之威權庶幾國紀無虧而民心無失也臣為宗社久逺計不勝戰栗待命之至奏入帝不納乞免發私宅擬票疏萬厯二十九年沈鯉臣竊惟內閣之為密勿者豈不以軍國大事運籌帷幄機宜密而不宜泄故因有是名乎先朝懸榜閣門凡一應官員人等不許擅入夫外者固不可擅入也內者其獨可擅出乎臣鯉于嘉靖年間改庶吉士臣𢋫于隆慶年間改庶吉士先後中祕肄業猶及見內閣輔臣辰入申出辦事閣中擬票旨意所得預聞者獨寫票中書而已其于諸司章奏誰敢攜之以出而越閣門一步者後不知起自何年內閣輔臣偶然患病不能進閣遂將本發于私寓權一擬票自是以後乃遂相沿為常一往一來十手十目殆不能無漏泄矣夫公事而議于私室大政而決于委巷固巳非朝廷之體矣又况機事不密而有害乎且臣等亦因是有不能盡職者何以故中使臨門銜命守催則不得從容審處以竭其心思二三寮友各自為寓復不得相聚商𣙜以資其謀斷故率有進呈甫畢而旋即後悔以為不當者兹所謂不能盡職也夫首輔平章軍國臣等同平章事今姑為首輔代庖耳乃遂亦因循故事擬票私家寬之則見為茍且急之則指為專擅或以為髙下其手者亦安可獨任一見而居之不疑也若至于時當暮夜然燈秉燭衰朽之人眼目昏花連篇纍牘微茫細字欲逼近則懼有疏虞不逼近則不能了了其進呈甫畢而旋即後悔者此固亦一端也抑更有可虞者印在閣中臨時開用用畢封鎖亦宜慎密今祗因用印無時印不能隨官出入遂豫用封筒常三五十副付之直票中書使得隨便使用幸今中書皆其循謹守法可保無他者安知異日無不肖之人與意外之事出其間乎臣等亦不得不為是凛凛矣伏望皇上深維逺慮仍復先朝舊規發本閣中公同擬票以上尊朝廷之體統下盡臣子之職分旁塞窺伺之孔隙亦革故鼎新之一事也臣等不勝懇切祈望之至疏入帝從之請慎終保治疏萬厯二十九年楊東明臣竊惟天下之治本于人主之一心而人主之心則常始乎勤而終乎怠所貴明主採納忠言振勵逸志斯可以保治平于無疆而垂休光于有永皇上踐阼以來躬勤庶政皇猷美善未易殫述臣幸生盛明之世叨膺獻替之司以為聖朝無闕可以行所無事矣乃臨御既久漸致因循朝堂不御講筵不親諫疏徒勤不蒙俞允章奏非不覽發而一關緊要輒爾留中凡此數事俱屬罔終皇上蚤夜以思應自知其不逮于初矣夫以皇上宅至尊之位操威福之權居九重深邃難以進見之地即纍嵗月不出積章奏不下忠藎之臣有浩歎而巳如皇上何臣以為臣子之所敬而畏者皇上也至于皇上之所敬而畏者亦有上天之明命祖宗之典章與夫大小臣工四海九州向背之人情凡此三畏皆明主之所凛凛不敢忽者不得曰吾為天下君欲勤則勤欲怠則怠可以任情自用也且皇上每以盡職責臣下矣豈以大小衙門各率其職遂可宴然無慮乎夫天下猶一家也家長不視事則子弟僮僕必將各荒其業而家道日墮矣人君不勤政則百司庶府必將各怠其職而國事日非矣爾者議論繁興忠邪莫辨以致國家十餘年來所簡拔忠直賢士相繼摧殘臣以為此時政之大闕也則皇上深居不悉下情之過也從此不易絃轍流弊可勝言哉然皇上久不臨御動曰聖體違和臣聞輔臣蒙召之日親見龍顔開霽天語春溫想靜攝以來久有勿藥之喜矣兹者仁聖皇太后聖誕在邇而二月春和又當開講之期臣叨禮垣輒敢布款款之忠叩闕上請昔唐太宗末政之衰聞魏徴十漸之諌而嘉納之皇上固薄唐主不為者幸于臣言少留意焉疏入帝不納請罷礦稅疏萬厯三十年沈鯉臣頃以瞻仰至情疏請面見伏蒙聖諭令侯旨行且朂以閣務繁重宜與元輔同寅協恭臣仰奉綸言默自循省皇上以腹心任臣臣亦以腹心事主則今日所謂協恭者寧有外平生所謂勿欺二字乎蓋腹心之臣當言不言與有言不盡固欺也即掇拾微細與過為激切亦欺也臣內盟幽獨仰體聖心茍非懷社稷深憂何敢為激昻髙論雖諸臣纍言而不聽老臣或萬一之可回故瀝血嘔心進其愚説臣原籍河南當東西南北輻輳之衝四方民隱無不預聞而頃者奉詔北來所至皆觀風考俗悉其情狀乃知當今時政最稱不便者無如礦稅一事蓋採𣙜之始皇上本以權宜濟乏不欲重征其分遣內臣亦以區畫下情便于上達乃內臣不能仰承德意濫用羣小布滿州閭窮搜逺獵而羣小之中又各有瓜牙羽翼虎噬狼吞無端告訐非刑拷訊遂激為臨清之變武昌之變蘇州之變已煩皇上處分而近日廣東遼東陜西雲南尤復紛紛未巳臣竊觀天下之勢如沸鼎同煎無一片安樂之地貧富盡傾農商交困流離轉徙賣子拋妻哭泣道途蕭條巷陌雖使至愚之人亦知如此景象必亂無疑乃今市井姦民猶復肆為欺罔皇上祗見其目前所入如此豐盈寧知其私充囊槖十得八九彼假公圖利一旦事生地方固豢豕自屠獨使朝廷當百姓之怨耳夫自古天下之亂階皆始于民心之嗟怨朘削愈甚結怨愈深譬之蓄火未然乘風即熾彼愁苦無聊之衆何事不為而不及早安輯潛消亂萌也皇上豈將謂東征西討宣捷獻俘神武赫赫無復可慮乎以臣愚計則亂生不同有逆而亂者有憤而亂者逆而亂者如寧夏播州彼先據不祥之名而我為仗義之伐故人心用奮天戈所指當即芟滅若憤而亂者則所謂土裂瓦解者也以四海之衆而囂然皆怒一倡萬和雲合景從朝廷之號今必不可行官司之法度必不能制兵于何出餉于何資蓋國家連嵗興師行齎居送按丁增調履畝加租瘡痍未瘳呻吟未息更有徴發豈不速亂在昔唐德宗時稅間架除陌錢比涇原變起百姓操白梃逐官吏曰自今敢復稅間架陌錢否此今日懷亂之人心所必至也衛懿公好鶴鶴有乘軒者將與狄戰國人曰君使鶴鶴實有祿位豫焉能戰此他日遭亂之人心所必至也臣不勝杞憂方今亂形雖成禍機未發必欲速弭大亂莫先收拾人心必欲收拾人心莫先停止採𣙜徴還中使繫治棍徒曠然與天下更新此大聖作為太平景象海內人心所日籲天而求者也上也即不然而改畀撫按代與征輸則賦額即可無虧窮民亦得蘇息目前救弊亦其次之在皇上一轉移間耳夫財貨之聚珍寶之玩縱為可欲比之于四海萬邦祖宗之所垂金甌大業孰寡孰多往時中使未至則賦有常經歲有恆積夫孰非皇上之財也而今則商旅不行貸物不聚私槖盡滿公帑盡虛朝取其三暮失其四孰損孰益礦額非取諸山澤稅額非得之貿易皆有司加派于民以包賠之也有司既加之而使者又攫之加征者有數攫取者無極一林衆搜所餘幾何割股實腹詎能安飽曰包曰賠何以示復若反是而君不獨富民不獨貧上下相安公私兩利熙熙乎好義終事矣孰利孰害泉貨本流行不滯之物有乘除之數夫既拂民情而聚之又不收民心而守之一朝有變瓊林大盈豈能不發及今而止猶國之財也孰得孰失臣老悖誠不知國家大計皇上試以今時之事而徐察當世之人心凡為士為農為工為商與宦逰畿服內外者無大無小有不如臣所言者乎即道路往來之人室廬居處之衆入而巷議出而偶語者有不如臣所言者乎封疆之臣介胄之士或邉腹憂守憂戰者有不如臣所言者乎微獨是即礦稅內使如淅江孫隆湖廣杜茂者彼皆不昧其本心而稱賢者也有不如臣所言者乎夫以當今時勢舉天下皆知之而亦皆私慮之其烏可以不寒心也而猶可泄泄乎雖然此諸臣餘唾也臣何故又言之蓋諸臣有言責而言者憂在其耳目者也有官守而言者憂在其肢體者也猶在外者也臣腹心親密之臣也則憂在內矣惟在內故分猷分念而媚兹一人者其情為獨切惟情切故凡可集衆思廣衆益以宣其抑鬱而效之主上者自不得不詳不必皆出諸臣口也此前所謂勿欺之指也惟皇上裁察疏入帝不納請明功罪以勵人心疏萬厯三十年楊東明臣惟國家奔走臣民與臣民樂為國家奔走者有大機焉曰賞罰是巳故士有蠲身家冒矢石棄性命于須臾者非其愛生之心與人殊也前以利賞後以懼罰其勢不得自愛耳故王者不出堂序而能得士人死力樹功邉徼者執此機也如功罪不明賞罰不當無論當事者灰心解體而後來者且視為殷鑒猝有大難誰肯竭心力自扞文網哉頃者倭奴狂逞蹂躪朝鮮虜其臣民奪其都邑大張聲勢意圖內侵誠天誅所不赦者皇上宏恤小之仁奮伐暴之勇以經略付宋應昌征勦付李如松二臣奉命而往遵旨而還論二臣者紛紛靡定頃奉明旨目今四方多事朝廷之上必須功罪明白方能使人這本著吏兵二部會同查議宋應昌李如松是功是罪從公據實來説欽此是諸臣之參論與明旨之會議非有成心無非核功罪之實持賞罰之機而已臣竊恐此事係朝廷懲勸之典係九邉將士觀望之心又當時事多艱䇿勵人心之際不為二臣計當為國家計也臣安可徇衆論之同昧獨見之異不揚眉一吐其愚乎謹按東征之事有失利之罪亦有克敵之功克敵之功大失利之罪小朝廷用人當存其大略其小録其功赦其罪是所謂持大體也檢髮而櫛數米而炊是有司細事豪傑笑之當朝鮮之畏倭逺遁也所不失者全羅慶尚兩道耳今一旦舉故土而盡復之將謂朝鮮自取則望風而逃者必不能完壁而有將謂倭奴自退則力戰而得者必不肯棄利而歸非麗人之自取非倭奴之自退則是功也豈一無所屬哉且二臣之功可無論而從征血戰之軍士可不酬其勞乎陳前死敵之幽魂可不恤其後乎不酬其勞不恤其後是朝廷自今以後不欲復使一人如酬其勞如恤其後則寧可念追逐之功而忘發縱之力乎臣反復思之欲不録敘二臣不可得也然臣亦有以責二臣者二臣亦不得辭焉當應昌既取王京也宜的據情形明報天子如倭果可翦則當謂乘勝長驅以成破竹之勳倘勢不能為則當謂臣力已竭宜别選代庖之將奈何計不出此倭未歸也而詭云盡去川兵未見殺也而詭云亂民且謂倭往來無常難為確報夫一確報不能而可儼然稱經略乎今都人士總不知倭之兵馬若干數目倭之糧餉若何轉輸倭之盤據意欲何為倭之乞款有何指據憑沈惟敬之遙語執平行長之遊言廟堂不得真情䇿士無由藉手覬全勝之賞忽後事之圖應昌不得辭其責矣如松之從事西寧也臣聞其衝鋒陷陳收退敵之功乘瑕先登建焚巢之績綽有戰將之風矣第賊所括民間財物甚厚如松悉取為巳有輦載而歸寧夏人皆得言之古大將勾當公事回還篋中惟圖書衣衾者豈若是乎平壤之戰力拔堅城碧蹄之兵得失相伴臣亦為如松壯也第縱恣我軍掠取朝鮮被慘不異倭人古大將秋毫無犯即取一笠必斬以徇者豈若是乎故謂如松為戰將則可謂為廉將則不可謂有戰勝之功則可謂有節制之兵則不可如松應難置一喙矣臣誠愚􅍝謂應昌之功宜録也因其塘報舍糊或伏隱禍姑以薄報其功如松之賞當明也因其兵無紀律貽怨麗人姑以量行其賞其他諸將領諸戰士諸陳亡之卒宜速加精核厚行賞賚生者酬其本身死者録其後裔庶慰前人之忠義又結後日之人心然今之罪二臣者多謂倭奴結聚春汛可虞假封貢成徼幸之功啓釁端貽無窮之禍諸臣逺慮悉屬忠猷臣則謂此當視簡書責望之初情自可為二臣功罪之斷案非難決之疑也如必欲縱橫釜山俾無噍類驅除一旦杜患百年國家且將自屈其力韓白亦難遽效其能臣恐斬二臣之首無以服二臣之心矣然臣猶有説焉昔趙子弟無尺寸之功而漢髙輒捐四千户之賞謂吾誠不愛爵土則人不愛死生帝王勵世磨鈍機全在此昔東南倭患之烈至今寒人心膽胡宗憲一舉而平之而卒從吏議身死牢獄豈不寃乎頃者劉哱之變朝廷亦嘗示帶礪之封萬金之賞矣總督葉夢熊壯懷激烈自請平賊賊平之後即一尚書銜吝不肯豫委曲間關翦賊羽翼卒成內變克滅元凶周國柱之功婦人孺子所知而僅僅世以指揮使國家之待功臣匪徒寡恩蓋亦不信之甚矣臣懼豪傑之不為用也今宜急敘東事之功並録用宗憲之後于夢熊國柱易其封而優敘之並破格以待岩穴瓌竒之士毋若書生拘攣于毫髮間則海內英雄必有為陛下出而了倭事者矣疏入得旨吏兵二部一併看議來説條陳河漕先務疏萬厯三十年李頤臣竊惟祖陵奠億兆萬年之鴻基漕渠關四百萬石之大命國家重務孰有踰于此者自去秋黃河南徙陵運俱屬可虞中外共切隱憂廷推不一而足詎意臣愚􅍝叨簡命皇上之所以付託臣者何重且巨也臣感激天恩兼程赴任恨不能負薪荷鍤刻期成功顧心雖欲速而勢難遽成受事之初所可自效者惟有急先務而巳敢為皇上陳其梗概河臣久缺簿書填委臣擇緊要者披豁數日即趨鳳陽恭謁皇陵旋至泗州恭謁祖陵伏睹松楸蓊鬱王氣雲蒸臣蹈舞之餘周環相視陵麓之東先年砌有石隄捍禦淮流堅完可恃即去嵗蒙牆衝決黃水漫入五河與淮會合經泗州洪澤湖其石隄水痕較之往年尚少二尺臣不勝私喜但蒙牆決口未塞萬一伏秋水發河淮增溢不無可虞防禦之䇿惟在接築汴隄遏絶黃流障水東行盡由符離橋出宿遷縣小河口白洋河為便業經河南撫臣具題檄行該省管河官議築歸德至永城一帶汴隄二百三十里估用工料銀八萬餘兩暫借本省嵗修夫銀分委商邱夏邑等縣管河官鳩夫辦料修築臣抵任之初亦即檄行該道上緊興工勒限完報又鳳陽撫按二臣會題議息宿州界首鋪至本州東關止計長一百餘里內應接築汴隄三十餘里估用銀一千餘兩分派鄰近州縣設處夫役委官部押赴工臣抵任之初即催行知州馬獻圖上緊興築如期報完仍派撥官夫畫地防守此事關保護陵寢急務臣當督同省直管河各官同心戮力竭蹶趨事不容時刻怠緩者也至于徐邳一帶運道淺澀新運迫期該撫按二臣權宜濟急一併彚題督行該道會同中河郎中率同管河運使運同自徐州鎮口迆邐至宿遷縣磨兒莊倣照閘河規制建大閘七座中閘二座并挑濬河身積蓄汶泗泉流以濟重運估用工料銀二萬八千餘兩于河道銀內搜括支用仍委各州縣掌印官採石辦料臣躬閲各閘俱已鋪底砌石臣又查核工次分别犒賞嚴行申飭定限閏二月內完工此事關濟運急務臣當督同管河各官如期竣事不容時刻惰誤者也又開泇河備運屢經言官建議未有俞旨查前任河臣創開韓莊渠一帶分泄湖水續因黃河遷徙運道為梗分委中河郎中督同運使運同等通行濬闢業已成河第中間間多淺狹且有微山未竟之功湖水散漫牽挽艱難必開黃泥灣支渠方為穩便估計工料約用銀十六七萬兩庶奏完績臣因謁陵之便率同司道各官親厯查勘此亦必不可巳之役惟是運期巳迫費巨工難未敢造次舉事須俟閘工完畢糧運盛行之時臣當調撥徭夫將淺狹處所隨宜疏濬并建土壩草閘節蓄湖水揀派輕便糧艘分道並進亦可免于擠塞稽遲此備運之一䇿臣當次第舉行以竟成緒者也臣又惟黃河南徙乃為年來非常之變前項工程不過救一時之急必須上築決口下疏故道斯為永賴完計第決口三百餘丈河流湍急遽難填塞故道三百餘里淤為平陸遽難開挑近據省直司道會勘約估錢糧非百餘萬人夫非十數萬不克濟事工費浩繁臣一人之見未敢輕議現今會同河南山東直𨽻撫按督率各該司道及管河官親詣彼處覆勘會議另行題請外惟是水性就下即古之善治水者不過因其勢而利導之未敢與之爭利也今河流已趨下而南必欲障而東之是摶之過顙激之在山即使神禹復生亦難于旦夕之間奏平成之績臣何人斯而可若斯亟也先經科臣疏議河臣之任宜先為隄防挑濬以為目前祖陵明嵗新運之計繼殫力挑濬舊河故道通運長䇿以為日後經久之圖蓋豫計及此而先得臣心之所同然矣臣自受事以來虛心咨訪親身相度量愚臣之才力審目前之時勢窮日繼夜僅僅辦此幸而有濟亦不過因人成事何敢言功惟是汴隄增修而新土未必堅實恐難禦排山之勢閘座增建而黃水業已斷流難保無膠舟之患泇河備運而濵河支渠未開不免虞風波之險臣一念及此不覺心悸股栗寢食俱廢幸賴皇上純孝格天至諴感神河伯效靈支祁遁迹祖陵自奠磐石之安漕渠自成完璧之運此臣所恃無恐而鼓舞精神以從事焉者也疏入帝從之劾內監路辱大臣疏萬厯三十年湯兆京臣備員法從巡視西城凡有作姦犯科例得露章參劾况有壞法亂紀之尤在臣巡視之地而敢默不上聞乎伏見掌翰林院教習庶吉士禮部侍郎敖文禎于宣武門遇內監三人馳馬直逼肩輿因怒扇柄驚馬令衆碎扇毆打從人文禎走避門旁內監郭成家復擁逼辱詈嗔成救護及錦衣衛差人勸解亦肆毆打當時萬目聚觀莫不咨嗟嘆息謂為耳目所未經夫卿二乃天子股肱重臣城門乃輦轂咫尺禁地蠢爾諸璫乃敢于白晝大都之中挫辱朝廷重臣目中寧復有皇上乎宫中府中總是王臣原無彼此大小臣工自有階級難容僭亂若使內臣而可以虐外臣小臣而可以詬大臣則紀綱一敗萬事瓦裂天下何由而知天子之尊皇上何恃而操臂指之勢陛無級廉近地賈誼所為長太息也昔漢文帝中庸之主申屠嘉節俠之臣尚能檄召鄧通廷辱流血豈以聖明之世而容跋扈之璫皇上嚬笑不假于左右威權不貸于􅉏御中外莫不聞知而三璫獨敢跳梁正所謂極惡窮凶怙終罔悛者臣職在擊邪義不與之同朝輒敢據實上聞至于三人姓名則既打之後馳馬直入內府外人不敢執亦不敢問伏乞皇上責令司禮監查實的名敕下法司究擬上請庶舉朝士氣得伸四方觀望頓肅臣愚無任悚息待命之至疏入得旨這姦凶內官著司禮監查實的名重加處治來説御選明臣奏議卷三十三
