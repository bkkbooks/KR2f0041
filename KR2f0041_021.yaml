  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_021-1a, image: WYG0445/WYG0445-0283a.png}
body:
  text: 舉大禮以成大孝疏嘉靖元年林俊臣惟漢成帝立定陶王為皇太子即封楚孝王孫景為定陶王以奉共王之祀宋英宗以濮安懿王長子繼體仁宗以立濮安懿王次子宗懿以主濮王之祀陛下光起親藩入繼大統尊崇大禮已舉行無遺矣惟興獻帝之後未立主祀久虛尤禮不可緩者宜凖先朝故事擇興獻親弟之子倫序所當立者襲封興王繼興獻後以主祀事則義正心安情禮兼偹本生之報益曲盡無遺矣所以遲久而未决者或謂欲待前星輝祥螽斯衍盛然後分封為興國後臣以為不然陛下之子則興獻諸孫行也以孫繼祖是禰其祖而名實紊非禮也或謂冝封親王次子嗣王暫主興獻之祀俟皇子稍長襲封真王主其常祭暫主之王别封之以大國臣又以為不然夫禮為人後者為之子既主其祀即為之後不容復易且陛下大婚未舉儲二有待興待主祀容一日無耶雖歲時遣官相望道路乃天子命祭而非祭之主也概以人後之說則精意未必感孚冥漠未必顧饗非惟失禮之正亦莫識鬼神之情狀矣或謂親王亦有不立後者而無長立次繼伯以姪率用為常濮王宗懿之立立次者也共王景之立繼伯者也興獻茂育聖明入繼大宗顧不得世食小宗之祀如在之神殆若有未安者或又謂安陸龍興之地容有形似之嫌臣又以為不然昔周文武以德厚長世豐沛出漢高未聞復有漢高惑無謂之小見廢必舉之大禮以絶本生之祀謂陛下為之乎或又謂興獻立國已久土賦甲于他藩臣又謂此閭巷鄙俗之論天子天下為家不宜過自封殖王祿歲既有常數矣土田僅宜十分為率錫之二分割其八分以給無田之民則親親仁民並舉不悖是為堯舜之仁政道無先於此者臣恐議者互異或緩以失時或雜以愆禮或利以害義故不避煩瀆懇懇言之也疏入得㫖禮部知道請親大臣疏嘉靖元年林俊臣聞虞夏君臣更相告誡商周而下亦資輔弼故有臣鄰之喻股肱耳目之喻舟楫魚水之喻上下交修而趨向正心術純法令公人心悅有由然矣太祖未旦臨朝晡時而後還宫處宋濓劉基章溢等禮賢之館胡翰許元等會食省中賜坐從容咨詢治道講論經史當時外臣亦時引見論政事問民所疾苦太宗每當奏事畢令楊士竒楊榮金幼孜等承顧問商機密漏下十五刻而退仁宗賜士竒等並蹇義夏原吉繩愆糾繆等圖書令協心贊輔盡誠相與言有未從具本用圖書密進念蘇杭民力艱難供用服色减半織造宣宗每召儒臣燕見從容咨訪曰有君亦貴有臣使堯舜無禹臯能獨治乎又喜唐太宗善受諫曰君人當以太宗為法英宗親決章奏厭左右于預密語李賢執阻賢曰在獨斷時勳戚乞恩膏堅執不與家人私蓋店房命置之法毁其房賢曰真可謂王者無私憲宗初年時與李賢彭時等議政議禮故能茂宏至道恢廓皇猷中間雖有偶惑貴近之悔然瑕不掩瑜孝宗誅斥邪佞振舉舊章復午朝定日講開經筵時召劉健李東陽謝遷劉大夏戴珊等自論理道革傳奉裁冗食斯時之政虞夏比盛矣自古人君未有不由親君子而治狎小人而亂者也正德之間羣邪鼓扇干紀亂常沮喪士氣枯竭民財人心已離天命幾去幸聖神入承大統釐革一詔中外騰歡收已離之人心回幾去之天命然而數月之間天人之意似若稍異傳曰為君難陛下勿謂善始之易尤當計善終之難也其道親君子遠小人是矣今正人滿朝陛下傾心延接加意採納則邪念消躁心息驕氣平出政公布令信慮患遠為學勤所存所行皆大中正至之道夫君子道之所寄也大親則大效小親則小效不親則不效而小人乘間蠧國殃人前監固不遠也聞近時經筵少開諸臣延接頗少至大臣亦少宣召陛下所託腹心以共成嘉靖之化者何人偶亦未之思爾且太倉之儲盡無名之冗食小民之蓄盡無名之誅求而劉瑾錢寧江彬張鋭張雄等富倍于國華堂之盛以間計者數千百間神宫之費以銀計者數十萬兩新詔之革所謂壞極不得不革者也臣又惟移風易俗道化先之君倡之而臣和之漢文帝身衣弋綈云朴質為天下先毛玠在吏部清儉率人士羸衣糲食廉節自勵吏潔于上而俗化于下方令習俗之侈不獨貴近為然自朝廷以及搢紳民庶亦頗尚之奢侈成風公私俱竭革莫先于此者朝廷天下之觀陛下身先率之以立化本搢紳民庶之觀士大夫先奉之以立化基則下觀而化渾朴之風不改侈靡之俗盡革所謂朝廷正百官正萬民正而天下治也疏入得㫖覽奏具見忠愛至意該衙門知道請勤學疏嘉靖元年林俊臣惟學緝熙于光明日新則日進不日新則日退故曰莫止于畫莫病于自足君子有無已之功焉禹惜寸隂傅說告高宗念終始典于學君所自學臣所論學要皆如是也唐太宗延文學之士更番直宿討論文籍夜分乃寢宋太宗年老猶喜讀書仁宗邇英講讀未嘗少廢此故事也太祖有觀心之亭禮賢之館揭大學衍義于兩廡揭洪範于座右朝夕省覽太宗視朝之暇輒御便殿閲書史召儒臣講論仁宗専意文事留心讀書宣宗謂楊士竒等曰朕寒暑不廢書册對曰帝能勤學問宗社生民有賴英宗時楊榮等建議經筵降敕勉諭曰朕即位以來弗遑夙夜永惟厥道必學乃明爾翰林儒臣分直侍講憲宗孝宗循行無改國家列聖勤學故事在邇孔子曰吾十有五而志于學陛下正志學之年何可輟耶且經筵之聽講頗不謂勞文華之清燕亦不謂熱而平旦未與物接其氣清明善念易開正言易入又為進學之㑹夫天下之治不治在人君之聖不聖人君之聖不聖在人君之學不學太祖嘗言人君一心治化之本存諸中無堯舜之心欲施于政有堯舜之治決不可得也陛下天稟頴異聖性精純誠于此時日親儒臣以講求古先聖王之大經大本以開發聰明成就德性使神有所領意有所㑹則立道有體致道有用設心措念有所持循臨人出政有所據守是謂有堯舜之心斯有堯舜之政民無患乎不被堯舜之澤矣疏入得㫖經筵日講朝廷急務覽奏具悉卿忠愛至意該衙門知道節財用疏嘉靖元年林俊臣竊謂財貨譬如雨澤天地之間僅有此數我國家相承節儉天下休息百四十年武宗承之固豐豫時也而盜國之徒乃盡取而濫費之帑藏匱竭海內虛耗陛下承之則蠱極而困時也雖恭儉性成足以風示天下而積習流俗尚有未盡然者方今四疆多事水旱之報日聞軍旅之需日急民窮無所于斂所恃以應之者內帑之餘耳然私計所蓄不過三邉數月之儲而嗷嗷待哺之民尚無足以副之且歲供之費幾十倍于昔其可不思所以為繼哉兹者大婚有期六禮之儀固有不可易者但先朝故事內外賞犒為費尢多若於此時一一而彊舉之是謂時詘舉贏斷不可也夫禮備而已物可節也賞尤可節也昔漢文帝綈衣革履後宫不藉珍飾以示朴為天下先臣願陛下力取則焉使逺近見聞皆知朝廷訓儉而抑奢貴禮而賤物則自王公以及士庶畿輔以及荒陲浮靡之風翕然一變民生阜厚國用充之而和氣亦臻矣疏入得㫖覽奏具見卿忠愛至意朝廷自有處置該衙門知道議禮疏嘉靖元年臣惟天幸篤生聖神為天地人物綱常之主一兵不試而宗社奠安特頒詔書中外傳誦謂太祖之開創陛下之釐革前後並韙儷德同功焉近者所聞似涉稍異意議禮未定好事者遂成其妄人言甚可畏也臣聞憲宗臨御之初議上尊號近侍有迎合稱慈懿皇太后久病只宜推尊所生𫝊聖慈仁壽太皇太后㫖諭意大學士李賢彭時不可曰朝廷所以服天下只在正綱常此舉損聖德多矣因議並尊為皇太后賴憲宗委曲勸諭聖慈仁壽聽從及慈懿上仙又有迎合别擇葬地彭時曰梓宫當合葬裕陵神主當祔廟禮部尚書姚䕫等奏如前議憲宗御文華後殿召問彭時對曰只合依正禮上曰朕豈不知依正禮好但于聖母有礙彭時曰皇上孝事兩宫奉梓官合葬全聖孝為宜劉定之曰孝子從義不從令雖聖母有言不可從也因具本乞申勸聖母以終大事于是百官伏文華殿號哭聲聞于內傳㫖諭退皆曰不得命不敢退既而得㫖慈懿皇太后合祔陵廟固朕素志但聖母未允朕心不安冉三據禮祈請聖慈允諾其如前議施行衆遂稱萬歲皆謂憲宗孝隆兩宫故能曲成此二大事內不失親外不失禮彭時姚䕫皆紀之文集中外相傳以為盛事臣竊觀今日之禮似若未純陛下聖德罔愆從善甚勇容有不純事耶孔子曰觀過知仁陛下情𠂻過厚大禮未協過于孝故也夫有不可易之禮亦有不得已之情子女之于父母服三年無貴賤一也子為人後則服移所後之父母所生降期焉女子既嫁則服移所天之父母所生降期焉至于嗣子所得贈封盡隆所後而不及所生豈恝然忘情哉制于禮也其致所生之情無過候問供億之勤與伯叔父母異爾故司馬光謂秦漢而下自旁支入承大統或推尊所生父母為帝為后皆取譏當時貽笑後世陛下純德之主何忍襲為之臣等亦何忍陛下襲為之愛子莫如父母聖母亦何忍致陛下襲為之且新詔裁革皆深姧巨猾惟欲幸我有可指之隙外資藉口內恣交合以害正道甚非細故也中間必有不知禮之臣逢迎其間曽不知廷臣之皆謂不可正禮也一二臣之謂可私情也聖人治情以禮輔臣禮官持論甚正與往時憲宗之臣無異陛下孝誠純至必能勸成大禮與往時憲宗之請無異聖母慈愛純至必能允成大禮與往時聖慈仁壽之俞無異禮若未舉固無難從禮若既舉亦無難更孝召慈慈成孝孝成禮然後上下粲然有倫而綱常正祖宗安人心悅傳曰過無憚改又曰一慚不忍終身慚之乎夫禮天下後世之公議也禮不自正後人亦自正之憲宗事二太后盡孝然議尊議祔終不茍順從乖大倫失正禮所謂自正者也魯文公躋僖公春秋譏為近祀而卒正于定公所謂後人正之者也臣堅乞致仕諭責以輔成新政夫政莫大于禮禮失則政亦非古聖王之政矣疏入得㫖該衙門知道謹天戒以修人事疏嘉靖元年孫懋臣竊聞天人之間感應如嚮人事失于下則天變見于上此理之常也恭惟陛下臨御以來孳孳圖治任用輔相開廣言路斥遠邪佞登進忠良聖政日新令聞四達人事之闕失臣未之見也兹者伏聞五月初一日雷擊奉天門獸吻及日精門災天戒赫赫胡為而然也臣則聞之矣人事失而變隨應者固上天仁愛之心人事得而異或見者尤天心仁愛之至况天位維艱一念不謹或以貽四海之憂一日不謹或以致千百年之患天之所以警動陛下者殆不可謂無意也臣備員無補實切憂惶謹以所聞人事當修者七事仰塵睿覽一曰定聖志臣聞之君志定而天下之治成仰惟朝廷今日之政已大定矣所慮姧人或乘時妄議以疑聖心則他日之事有未可知書稱舜曰烈風雷雨弗迷伏惟陛下體天心之仁愛法帝德之罔愆聖志一定斷之不疑勿以調停之說為然勿以更張之驟為信亦勿始鋭而終怠則唐虞之治可望于今日二曰保聖躬臣聞之人君所愛莫切于身人臣亦莫切于愛君之身恭惟陛下頃以親藩入繼大統固上有祖宗之靈母后之聖下有內外臣庶之衆呵護翊戴靡所不竭但臣區區蟻誠竊謂陛下聖年方妙聖質未甚充盛凡夫起居飲食之期寢興勞佚之節小大曲折備慮所宜周悉至于左右前後委任尤須得人詩曰王躬是保伏惟聖明留意三曰信詔令臣聞之詔令所以行于天下者信也詔令不信則人主之權廢矣恭惟陛下改元肆赦革故鼎新救天下深沉固結之弊為生民永逺太平之謀所在聞之歡欣鼓舞甚于更生雖漢史所稱山東布詔民之老羸癃疾扶杖往聽者殆不是過書曰令出惟行弗惟反伏乞陛下維新渙號尤懷永圖執之必堅行之惟允保信以保民實天下至切之望四曰明賞罰臣伏讀祖訓有曰凡聽訟要明不明則刑罰不中罪加良善久則天必震怒焉又曰凡賞功要當不當則人心不服久則禍必生焉竊照江西宸濠之變雖己討平有日然忠義之勳未酬黨惡之罪未正若將有待然者不可不留聖意臣聞之功有高下亦有虛實今欲賞當其功宜將隨征各官繳過文册盡行降出仍令先後紀功各官查明開奏而冒功者必黜庶賞不僭而人人以為慶矣罪有輕重亦有真僞今欲罰當其罪宜取現獲各犯招過情由不拘成案仍聽法官及㑹多官冉三研審而負寃者必宥庶刑不濫而人人以為威矣五曰斥遣奸臣伏讀祖訓有曰歷代多因姑息以致姧人惑侮當未知之初一槩委用既識其姧退亦何難慎勿姑息竊照太監蕭敬與宸濠厯年來往已經太監張永查係書底簿籍有名人犯具奏先帝著外私宅間住所處已寬頃者忽聞司禮監太監賴義𫝊奉聖㫖外私宅閒住太監蕭敬著本監掌印照舊辦事此命一下中外驚疑其于新政所繫非小誠以宫府一體不宜異同今若起用蕭敬一人其何以處同犯諸人交結重情不宜輕縱今若不懲于既往其何以示警于將來且敬自負前罪強顔供職則亦無以取重同列展布行事伏乞陛下仰承祖訓早決宸斷縱不加罪仍令退閒以釋中外之疑以昭平明之治六曰嚴內禁頃者聞得御史張翰奉敕㸃押大工一日從內官監出忽見內使人等約有三五百人或拏棍棒甎石向翰圍擁撒土其守衛官軍直日旗校明見凶惡不為防護臣聞之不覺驚愕竟亦未諳其故然以皇城禁密之地而敢爾肆為凶忿其在外無忌則又可知仰惟天威震怒必有重法以處治之矣臣竊謂漸不可長事宜豫防伏乞陛下在內即敕各監局掌印官各行嚴束所管人員各于本衙門專務本等職事不許輒出各門各路口聚衆為非違者許守衛直日官旗人等即時捉獲通將該管官員參奏治罪其京城內外亦即敕錦衣衛及巡城御史兵馬司官嚴督官校弓兵火甲各于分管地方不限晝夜用心巡邏但有前項生事之人許即拏送法司從重問斷違者罪亦有歸七曰慎邊防臣聞之御戎之䇿守備為上備邊之要兵食為先然食足則兵強是食又先于兵也即令邊餉缺乏軍士困憊一旦烽火有警何以驅之應敵况先該宣府報稱敵中走回男婦供報敵衆扶起小王子與烏梁海等講和及暸報塞外兵勢下營四十餘里其意蓋非尋常侵掠之比幸遇聖明御極威靈遠震狂圖雖已大沮然亦不可忘備伏乞陛下軫念邊防之重特從廷臣之請早將各犯抄沒銀兩分給各邊以紓困急仍敕各該鎮巡總兵等官務在嚴飭將士保固疆圉以稱陛下內修外攘之意疏入帝不納止殷通等乞升職世襲疏嘉靖元年張原臣伏見興府旗軍軍校校尉軍人㕑役殷通等一千三百餘名俱緣從龍之故䝉恩填注錦衣衛食糧當差各賞銀兩彼乃不知止足援引喬成例連名具奏又乞升職世襲近該給事中安磐論奏奉聖㫖該部知道欽此臣仰觀聖意似非斷不欲與之者是以復昧死言之臣惟世祿以待有功而非軍功不易致此祖宗懸爵賞以為砥礪天下之大具立法至嚴且重也邊陲將士冒鋒鏑厯難苦脫萬死以得一生幸獲渠魁然後上功于莫府而復核驗于臺部輾轉歲時至冉至三方僅增其一秩今殷通等無汗馬之勞尺寸之功徒以一時遭際顧欲得世襲官職以自比于軍功之列臣恐邊陲將士聞之解體必曰吾捐軀命以求官而未可必得彼徒䄂手徼幸得之是朝廷視吾軀命不甚重于官秩也陛下將何以待邊陲將士之有功者耶抑將何以勸邊陲將士之有功者耶夫官至于世襲可謂至矣人至于一千三百有餘可謂多矣陛下嘗汏冗員革冒功今無故升此一千三百餘人其冒濫何如也陛下身自行之曽未幾時乃復自背之失天下大信破天下大間臣竊為陛下不取也往日喬成等乞請之初使陛下俯聽該科該部之執奏褫其秩而治以罪則殷通等今日之比例臣知其决不敢矣若謂其有扈從功出于一時之特㫖臣又以為不然扈從之功優之金帛足矣不必假之官且世襲也昔唐太宗時秦府舊人未遷官者多怨望太宗曰王者至公無私故能得天下之心如是則陛下今日之于殷通等實示天下私也陛下有堯舜之資圖堯舜之治顧所行反出唐太宗下臣固知非陛下本心也伏望陛下重天下公爵割一時私愛敕該部遵照前㫖殷通等止許食糧當差照舊替補仍將先後升官世襲如喬成等者通賜查革庶後人夤緣者絶覬覦之心貪冒者無援引之例而邊陲捍禦者亦有所企望而知勸奮矣臣不勝惓惓為國之至疏入得㫖該部看了來說寢趙雲升命疏嘉靖元年張原臣謹奏邇者皇上憫念御馬監太監趙山藩邸服侍殷勤于其死也賜之􅉠祭為之安葬曠蕩之恩至矣極矣尋因少監王佐學為其弟姪乞官䝉准升趙雲為錦衣衛正千户彼時臣等該科即嘗具奏論其不可奉聖㫖已升了罷欽此臣等自恨平日誠信淺劣不足以感聖心言辭鄙穢不足以啓宸聽有負聖宗設官求言及臣等以言為責之意俯首捫心靦顔慚懼既而又意該部論列宜有當聖意者冀猶可以回成命也及其極言執奏復奉聖㫖已有㫖了欽此臣等相顧錯愕莫知所以夫趙雲止一人其升官亦止一事似不可冉瀆宸聽但此事係祖宗之憲章朝廷之名器聖德之得失國事之是非非細細者不容緘默而已也然其事之不可臣等該科及該部論之已詳者豈能復贅其意外之言哉竊念官爵乃古聖人治天下之大法是故本之禮以為之綱維行之義以為之權度成之信以為之楨幹有品式以定其制有等威以異其名國家懸此以奔走天下之人使賢者居之有所勉而勸焉不肖者視之有所企而慕焉其名若虛而國家受其利也實大昔人謂為礪世磨鈍之具是也我太祖髙皇帝時臣下立戰陳功者多止賞之以金帛其或功出異常不得已始與以一階今之尺籍可考見己高皇帝豈刻印刓敝忍不能豫者耶誠以賞多則濫濫則人不以為恩少則貴貴則人知其為惠然必上之人自愛之重之斯下之人亦愛之重之何也以其得之者不易也否則漫然與之漫然受之與之者略無難色受之者以為當然其何以奔走天下之人而又何貴于礪世磨鈍也况可聽人代人乞請而即許之耶使可因人乞請而即得之皆將鑽刺請託取徑行險以競求遂其所欲幸門一開頺波四潰彼惟知恩出于所求而不知有君上矣陛下懲往年冒濫之弊嘗查革乞升𫝊升人員天下方想望仕版澄清紀綱振肅以成更化之治顧可又許趙雲之乞升以開新例紊舊典失大信乎趙山雖有服事殷勤亦其職分當然視戰陳功何如也使其服事殷勤即可以言功則陛下何用于山哉昔韓昭侯有敝袴命藏之曰吾聞明主愛一嚬一笑今袴豈特嚬笑哉吾必待有功者今之正千戶其階正五品其秩武節將軍其祿幾二百石尤非敝袴者比陛下略不少加敝袴之愛惜率意輕與無功之趙雲所見與昭侯異矣該科該部不肯阿意奉行而執言以請皆其職也居其位食其祿任其責而不能盡其忠舉其職臣竊恥之陛下亦安用之今臣等該科欲舉其職既以為不可該部欲盡其忠又以為不可陛下獨排羣議毅然以為可而與之則是臣等該科及該部之言舉不足信也臣等位卑望薄言不足信固宜獨念尚書為陛下喉舌之官分任責成賦政四海之人而彭澤又陛下以德業聞望特詔起用素所傾注倚毗者顧亦不信其言焉則陛下之所信者誰也臣伏見近日陛下批答中外執奏章疏率曰己有㫖了或曰己有成命了或曰已發落了不特趙雲一事為然詞涉婉而意甚厲情之順而㫖則離請雖繁而執愈堅雖未嘗顯言拒人而實寓不容人言之意是豈陛下任人用言之道哉究其末流將必至以人言為不足恤也孟軻氏曰訑訑之聲音顔色距人于千里之外則讒諂靣諛之人至矣與讒諂靣諛之人居國欲治得乎臣所以大懼而不能已于言者蓋亦為此昔史臣贊堯之德曰舍已從人湯之德曰改過不吝至漢高帝亦曰從善如轉圜唐太宗亦曰納諌如流是皆書之簡冊𫝊之後世人至今頌之不衰不識陛下何獨異于此也今之議者皆謂㫖由中出政多下逮貂璫竊國命姧幸擅朝綱政以賄成法緣私廢天下事漸不如初者十二三而正德之故轍多踵行之觀兹乞請即其一端陛下聰明神聖天下欽仰獨于此尚不省悟乃爾甘其諛而受其欺耶陛下去年即位之初覃詔天下天下之人扶攜往聽咸舉手加額欣欣然喜見大聖人之出世而幸閭閻之更生真有願少須㬰毋死思見德化之成之意陛下今日奈何懷姑息之小惠背已行之大詔渙既得之人心隳垂成之功業乎伏望陛下為祖宗崇重官爵為朝廷愛惜名器俯納該部體國之奏特寢趙雲乞升之官仍依擬量免徭役俾之世承其祀則君義臣忠兩為得之臣又聞漢諸葛亮告後主曰宫中府中俱為一體陟罰臧否不宜異同若有作奸犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使內外異法也臣更望陛下修太祖之舊典孝宗之遺烈宫府不異體刑賞不異法惇大信以示天下庶官有定守民有定志恩自上出權不下移平明之治行當見之矣疏入得㫖已有㫖了罷弭盜疏嘉靖元年張原臣奉命香河縣地方公幹行過通州甫出城門當有驛丞禀說前靣見有響馬強賊劫馬傷人止臣不行及臣冉行三四十步至河東岸有人告稱係上班官軍被賊四五十衆各騎馬披甲將伊用刀背砍打劫奪官馬去訖臣冉行二十五六里至地名甘唐莊又聞被賊劫去本地居人馬匹臣冉行十數里至寶林寺又聞被賊劫去牧放馬匹官軍跟纒哭告仍復丢還及臣回至通州又聞是日劫去張主事及南京進貢內臣船隻行李他物竊思響馬強賊雖云無歲無之然或三五人十數人而止抑或止于曠野無人之處遇有經過往來官員猶知有所畏避而不敢犯初未有若今日之甚者動輒紏合人衆歃血齊盟披戴盔甲擺列行隊白日大市之中州治郊關之內劫奪居人阻遏行旅而公差官員往往被其剽掠抑且拒敵官軍殺害丁夫或寫遞字帖于鄉村要來搶劫或傳寄語言于官府要來報讐每日巡行村落遍索富家供食酒飯牽取頭畜黨類滋蔓道路充斥縱橫任意莫敢誰何遠近驚疑不遑寧處翹首跂足日虞其來生民荼苦無所控欣上下相䝉匿不以聞臣自出京每每聞之人言前項強賊每起或四五十人或六七十人通共不下三百餘衆通州富河莊一帶村寨聮絡皆其巢穴平家灘諸處樹林茂密又其藏聚處所而固安等處地方今亦在在蜂起若不早為撲滅誠恐醖釀日深復如往年劉六劉七趙風子之為也臣又聞通州五衛巡捕官員素無謀勇率皆闒冗平時既不能率軍士設警備以時而巡邏有事又不聞出一騎發一鏃併力以追捕就使邂逅遇賊亦皆爭先潛避惟以恐其奪馬為言其分守指揮王蘭以新進之人承積習之弊人不豫附事皆掣肘立志雖勤坐成無䇿况其雇車賃馬夫豈長圖力小勢孤不能成事而各該掌印官既為各衛之統領預有地方之責任顧乃自分彼此坐視旁觀恬然自安略不經意以致賊勢猖獗肆無忌憚一日之內劫奪數四居民行旅受害孔多京官內臣咸罹其禍況通州地方土産多賊而張四張五蔣傻子等現今難制王蘭已嘗拘執張五之妻子彼亦知勢不可已但欲激之稔惡則緝捕之計不可不急為之處臣逆料各衛官員自解必曰前項強賊豕突鴟張出沒無常我軍出捕之時彼必先知而豫為避計殊不知彼能先知我軍之出捕而我不能逆知彼賊之欲來據事度情則諜報防範之未周玩因循之不免而官司知情故縱之宿弊民間窩藏𫝊漏之姧作殆亦不能無也似此曠職僨事玩冦養患情皆可惡法亦難原況小懲大誡乃人心之常而防微杜漸尤治道之急伏望皇上軫念生靈受害地方重事敕下兵部急為議處務經久之道以合事勢之宜其五衛巡捕及掌印官員合無通行查提遵照律例從重治罪或暫且住支俸糧令其戴罪嚴限俟獲賊完日冉行奏請發落而分守指揮王蘭亦乞行文戒諭責其後功以贖前愆如此庶官司知警而盜賊可息地方獲安也臣比與賊先後同行相距才三四里目擊耳聞其事如此臣恐九重之上或不能盡知其詳也故敢不避瑣細瀆冒聖聰倘肯俯加聽納少賜施行地方幸甚疏入得㫖是近京地方設置守備兵備等官正欲禁捕盜賊保安軍民各該官員因循怠玩以致賊徒嘯聚恣意行劫又彼此䝉蔽不行奏報好生不畏法度便著各督所屬用心緝訪務在一月之內擒獲盡絶以贖前罪還著提督巡捕都指揮桂勇量調官軍前去設法𠞰捕其餘事情兵部看了來說修德弭變疏嘉靖元年張原臣見邇者南京風雨異常伐屋折木而郊社寢陵宫闕俱各罹災抑且江水湧溢民多墊溺陛下遇災知懼不遑寢膳至勤手詔痛自尅責臣仰見陛下法祖敬天畏命重民甚盛心也然詔㫖不言臣等指陳時政缺失意者陛下無意于求言抑恐人之言及陛下歟雖然陛下縱不許臣言臣職在于言豈容不言況陛下又諭臣同加修省勉修職業則臣之所以修職業以修省者秖在于盡言是以昧死為陛下一陳其餘臣惟變不虛生必由人召天人之際捷于影響春秋二百四十二年間每有災異必謹書之雖不著其事應而事具存存或為君有失德或為臣有亂政或為羣小柄政或為宫壼制權或為外冦犯邉人事感于下則天變動于上事以類應有不可誣者陛下秉上聖之君備中和之德撫運中興撥亂反正天與人歸宜乎百異消滅衆祥駢集夫何即位未幾而有日精門之災涉冬而有雨沙之異郊祀之日而有掖庭之災今大婚適始議期而有局內之災南京又告此風雨之變也如湖廣江西之水河南峽西之旱盜賊竊發于畿輔戎馬深入于內境尚有未易縷數者陛下清燕之暇亦嘗􅌻思而反觀否乎𫝊曰災異者天心之仁愛又曰天不言以行與事示之而已矣今上天之仁愛陛下者不為無意而示之以行與事也不為不明且至陛下所以警戒省循仰答天意之仁愛者顧可怠耶臣伏讀聖諭謂政事乖違刑罰不中民困未蘇國是未定以致上干天和昭示譴告似矣臣恐陛下能言之而未能見之行能知之而未能悉其事也聖諭又謂事關朕躬者痛自省循臣又恐陛下徒事虛文而未得矯枉更化之要以為省循之實也何也臣聞之詩曰敬之敬之天惟顯思命不易哉言天命不易人當敬之也又曰畏天之威于時保之言天威可畏人當保之也又曰敬天之怒無敢戲豫敬天之渝無敢馳驅言敬保之道不可怠忽也陛下事天所以敬而畏之也果如是乎書曰天既孚命正厥德言正德以順天也又曰天棐諶辭言有誠德天輔之也又曰惟先格王正厥事言弭災之道先當正厥事也陛下莫天所以正德正事者亦如是乎夫天地之大不外隂陽而萬化之行亦惟隂陽人君為天之子代天立極其呼吸喘息與天地相為流通精神運用與天地相為孚契故王道公正修明則隂陽氣和而災害不生蒸民安樂如其偏陂失綱則陰陽舛繆是以有大風拔木水泉湧溢孽火燒宫之變皆天先以譴示乎人君也天先譴示之者天意若語為人君者冀其能悟而知改之也若此不悟不改焉天斯罪之而禍亂隨至矣董仲舒曰罪在外者天災外罪在內者天災內燔甚者罪當重燔輕者罪當輕今期歲之間大異疊見且皆出自禁掖而郊社寢陵宫闕皆不免焉則罪當重而在內也可知陛下自親藩入繼大位所以凝天命得人心者凡以登極一詔然耳詔書之所釐正率皆祖宗之舊典陛下行之曾幾何時冗冒增置猶夫故也爵賞濫豫猶夫故也刑緣近幸苟免權因左右下移猶夫故也內閣不聞夫宣詔府部不從其處分臺院不納其諌議猶夫故也廢詔書為故紙視聽音如常談先後異致自相齟齬略不復有所顧慮愛惜之此皆政事乖違刑罰不中民困未蘇國是未定之實上干天和昭示譴告之由陛下秖舉其概以及夫四者其詳則隱而不之發焉此臣愚所以謂陛下能言之而未能見之行能知之而未悉其事也然應天以誠不以僞以德不以以文若徒舉行故事近炫人情避殿減膳撤樂以為痛自省循云然臣恐上天昭鑒未易可以虛文感格此臣愚所以又謂陛下未得矯枉更化之要以為省循之實也詩曰我心匪石不可轉也言守善篤也易曰渙汗其大號言號令如汗之出而不反也今詔㫖已行旋復改之是反汗也是守善不篤也如此而求天意之回災變之弭難矣伏望陛下主敬立誠飭躬勵行正厥德以正厥事順天道以祈天心擴明聖之德昭然而遠悟體乾元之健奮然以有為總攬權綱明謹政體考之災變之應揆之當世之務追維前日詔書為得人心之本而近日紛更為疵聖政之由冉申敕㫖將近日事務一切有乖先奉詔㫖本意臣前之所疏或已經府部科道論奏者俱許案行故故信之以篤行之以果勿眩于浮言之疑似勿安于近日之姑息仍望陛下時宣內閣重臣俯加咨議其所啓沃裨益必多六部大臣亦乞特賜召對裨之明陳其職得以展布乎事情陛下因之核考其功亦可周知其人品庶乎上下相孚君臣一德陰陽可和政事可理嘉祥可致災變不待弭而自無矣臣幸得偹員諌議之列奉職不修不能輔宣聖德以召天和固不可言忠亦不敢辭罪儻陛下因臣愚言少賜省悟則臣愚報國之忠庶可少罄于涓埃而不職之罪亦可少逭于旦夕矣宗社幸甚天下幸甚疏入得㫖該衙門知道選近習疏嘉靖元年張原恭惟皇上纘圖撫運光啓中興褫罰憸壬肅振綱紀凡正德年間左右近習弄權納賄蠧政害人之流俱已置之法典但其人漏網于昔者或覬覦柄用扺罰于今者或夤緣復起緣附黨與盤據根株勢已漸成牢不可破率皆布置名下舊人或在各宫答應冀其假彼託此之言施其扺隙投聞之計其為謀也甚密其交人也甚廣謀密則祕計詭形未易以察其奸交廣則一唱衆和或可以誑乎聽雖皇上聖智同日月臣恐不能防間于日之久人之衆也况今市井之間𫝊言若人往往市買珠翠寶玩之物價值踴貴私齎進貢各宫以為孝順爭竒競功冀售其術出入宫門初無避忌皇上已嘗敕下各閣戒諭禁約然而流風未殄頽習尚存鼠伏蠅營乘間竊舉雖皇上無私如天地臣恐重違母后之心而亦不能已也臣又聞昔唐肅宗因李輔國之專恣致有興慶之事宋仁宗聽任守忠之讒間遂成章獻之隙臣每讀史至此未嘗不忿恨于肅仁二君也大抵小人獻諂進諛全無為人之謀依阿逢迎秖求目前之請𫝊報往來言說搆成彼此嫌疑積以歲時遂致罅隙釁基在此理固必然我武宗皇帝之所以不御內宫者蓋亦由小人讒間其間外人不得而知也不然何恝然于夫婦之情耶伏望皇上洞鑒往事聿先正始杜絶小人使往年以罪放斥之人勿復收用如或左右近習敢有巧言飾詞游說請託者即以姧黨治之或有夤緣各宫𫝊奉者亦宜一切置之勿聽仍乞冉申敕諭內城各門及各宫門守門人員凡遇內臣出入務要驗其牌靣審其事故不許容令前日罪人名下之人私擅進入各宫輒自進貢其各宫大小內臣亦宜禁其私相往來交接以杜後患即今册立中宫之始臣愚以為宫中一應答應內臣必須揀選謹厚老成之人左右用之若係前日罪人名下者即賜退黜勿得復留然揀選之任祇宜付之太監張佐鮑忠等以責其用心而太監蕭敬已自涉于姧人恐亦不足信也臣迫切至情言念及此不知忌諱死罪死罪惟望皇上俯賜察納不勝幸甚疏入得㫖宫中一應執事內臣著司禮監從公㨂選謹厚老成的答應備用其先年亂政壞事罪人名下之人不許假以進獻為名私相往來交通請謁還著司禮監嚴加訪察禁約勿得容隱回護該衙門知道請逐太監蕭敬疏嘉靖元年張原臣謹奏頃者巡按江西監察御史程啓充封進宸濠與太監蕭敬交通私書因具疏以發其姧奉聖㫖該衙門知道欽此繼而兩京科道等官交章論劾節奉聖㫖已有㫖了欽此臣聞之無任驚惶晝夜思維莫得其說夫罪之至大莫過于謀逆情之至可惡莫過于逆黨故春秋示無將之戒漢法垂不道之誅我太祖制刑擬以十惡之律而著于常赦不原之條蓋皆為此陛下豈以敬之交通宸濠謂為小過而可輕宥之耶宸濠本以宗室至親尚且削其屬籍置之典刑敬何人也獨可逭其罪耶陛下昔在藩邸越數千里之遠如敬之姧多未之詳猶可諉也今自即位以來凡江西逆黨之所招宸濠簿籍之所記注與夫兩京科道等官指其實而數其罪者不下二三十疏則陛下知之亦已明矣乃復排羣議任已私而不肯罪之不罪之猶可也顧又置之左右委以機務抑且屢賜溫㫖勉留之臣不知其何為也且敬受纍朝厚恩不思所以圖報乃敢植私黨而潛為異謀則其得罪天下得罪宗廟得罪社稷大矣陛下豈能無疑于敬而恝然于心乎雖敬亦自知為天下為宗廟為社稷之所不容而凡朝夕侍奉左右之際亦將有疑于心而不自安也上下相疑恐非陛下之利敬平日收恩于名下私覆其黨與凡內府各宫及各監局布置皆有其人况其掌家太監如劉恭門下家人如王諒者素號狡猾最善夤緣布在內外為之應援而陛下左右多所交通設或陛下一時不察誤聽浸潤之言使彼得施其默助之姧則敬又將得地矣先日以罪放逐之人皆倚敬之去留以為起伏臣竊為陛下危之書曰去邪勿疑今陛下知敬之邪而曲護之引以歲時竟猶豫而去之不决陛下縱全私愛奈天下人心何奈宗廟社稷大計何陛下若以敬為知事司禮監執筆不可無敬今敬之年八十五六亦己老矣就使其精神尚健能復幾時他日若敬已死陛下將復用人乎抑必欲留敬不死而用之乎敬以柔媚啖人以隂險賊物厯年已久更事頗多積慮設謀最深且熟真所謂老姧巨滑也自成化年來人被言官論劾略不畏避每語人曰我受國厚恩不忍一去俟大婚後即當懇辭耳今大婚既已禮成止見一具疏請陳旋即自止觀其意祗欲以暫謝人言也厚顔據位貪昧隱忍略無一毫愧恥之心敬尚得謂之人哉伏望陛下大奮乾剛洞垂離照俯念敬之事已敗矣罪已大矣順天下心為宗社計速發詔㫖將敬放黜則陛下保全敬之恩實大且至況敬囊橐積此不下一二十萬計其餘年用之不盡使敬優游安享老死牖下亦當感陛下于無窮也臣又按劉恭先因納賄招權被人論列彼乃稔惡不悛王諒及其子仁以市井匹夫投託敬門席其權勢冒罔授官凡此皆撥置打㸃為敬腹心肆為貪叨極其富貴敬賴此輩以保固寵位而不恤壞陛下之事此輩賴敬以茍圖富貴而不恤壞敬之事敬之所以不能去不肯去者有此輩為之謀主臣以為此輩之罪不可赦也更望陛下敕下法司將恭等明正其罪遠示竄殛仍敕內府一應內臣以後敢有代敬夤緣請託者一體罪之庶有以翦其羽翼除其根本而奸計不得潛滋姧黨無復依附矣臣與敬等本無睚眦但見其壞陛下之事亂陛下之治者甚多是以昧死為陛下備陳其愚臣無任戰栗待命之至疏入得㫖該衙門知道冉乞亟黜逆黨蕭敬疏嘉靖元年張原臣于前月疏論太監蕭敬與宸濠潛通逆謀宜賜罷黜奉聖㫖該衙門知道欽此臣意陛下憫念其老不欲顯言斥之姑賜其自陳而徐為之處恩至大也繼今口語藉藉劾者愈衆敬不自安始具疏辭免復䝉聖恩不即俞允臣請復以陛下之亟宜去敬與敬之自宜亟去者不避煩瀆冉為陛下備陳之敬受纍朝厚恩珍衣玉食寵極富貴至武宗皇帝託以心腹寄以股肱舉天下大柄一以付之肆其胸臆由其掌握頤指氣使無不如意武宗何負于敬而敬乃隂結逆黨忍心以負武宗如此耶今陛下之所以待敬者不加于武宗安知敬之他日又不忍負于陛下耶小人嗜利無恥貪得罔厭機深日熟無所不至前日之事可以左驗況其姧謀已攻發于衆人暴白于天下其心必不能一日忘意于禍之己及也技窮勢極尤有臣所不敢言者昔漢景帝見周亞夫言動心壞平平乃曰此鞅鞅者非少主臣也臣觀敬自陳之疏辭氣不平勃勃逼人鞅鞅殊甚略無畏懼之心漫託蕪詞以自解避而交通宸濠一事乃隱昧不及若人者顧可為陛下沖年新政臣耶臣謂陛下宜亟去敬者此也夫勢者衆怨之門利者欲衆之府敬老矣來日無多矣何為沉湎祿位貪戀權寵尚與人爭其所欲以蹈夫衆怨之門耶或者敬恐一去其位人有躡其後者抑敬之子姪臧獲恐敬去位而已皆不免焉故爾戀戀不舍以直俟夫死而後已也殊不知敬若速去則人之怨之者少而朝廷疑之者尚淺庶乎可以自全而子姪臧獲之富貴亦可以自保使其執迷不悟怨日以積疑日以深一旦鐘鳴漏盡雖有善者亦難乎其免也況敬負天下之惡也敬可謂不善于自謀抑不善謀其子姪臧獲者矣臣之所以謂敬之自冝亟去者此也陛下盍早賜乾斷聽敬之去以全其餘年仍發明詔㫖許敬之子姪臧獲得以共保富貴凡其平生罪惡皆置之不問庶敬無所顧慮肯于必去而其子姪臧獲亦肯令敬去矣臣固知敬乃帷幄權臣攖之而禍必至顧臣受君于朝以言為職不忍默默以負陛下之恩故敢據事之理極論以瀆宸聰復揣敬之心善言以導敬如此大要欲去極以安朝廷誼存吾君云耳實非有讎于敬以敬之去為快也伏乞留心察納不勝幸甚疏入得㫖該衙門知道御選明臣奏議卷十八
