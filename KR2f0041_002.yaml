body:
  text: 凡例一明代奏議現在四庫全書館散在諸臣文集内者甚多幷有彚萃成書如經濟錄及疏議輯略等編兹俱詳加蒐採選録全文至於館書未載而其言可録則從明史本𫝊中删節之文採入以存梗概一明臣習尚喜滋議論奏牘之繁迥逾前代是編所録専擇其危言讜論得失攸闗以著勸懲而垂法戒如屬泛行陳奏或涉門户交攻文采雖工槩從汰置一是編所録固多忠藎名流間有品誼未醇而所言實中利病謹遵聖諭不以人廢言之盛心並為採入書期有用與流傳選刻泥稱名臣者迥殊一明至神宗後應燬違碍文集奏疏良由事涉我朝其建議頗多剴切顧自楊漣左光斗熊廷弼諸人以外正史不及盡載姓名兹俱按其時代編入字句稍加節潤未曽改易全文用仰副皇上近取殷鑑昭垂萬禩之至意一舊傳選刻名臣奏議之本宋趙汝愚專録本朝明楊士奇兼綜厯代但分門别部轉近類書體裁是編纂次謹遵聖諭一依明代紀年先後其有同時陳奏者則參攷官階之大小編入次第釐然悉符史家體例一是編每疏題下俱謹遵聖訓注明某朝某年並查載進止原旨與疏之行否于後俾一事顚末展巻瞭如而其時之朝政亦遂可以攷鏡睿慮周詳尤為從來編輯諸家管蠡所莫逮云一奏議中有引用遼金元三史人名地名者悉遵欽定改正並將當時所稱蕃部人地名俱查出譯改
