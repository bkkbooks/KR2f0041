  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_009-1a, image: WYG0445/WYG0445-0097a.png}
body:
  text: 陳治道疏𢎞治元年馬文升臣竊惟贊襄治道固在於百司糾正百司莫先於風紀風紀正則百司自爾各盡其職百司盡職則庶績咸熙而治道隆矣自古君天下者未嘗不以此為先務焉洪惟我朝稽古定制在內設六科給事中十三道監察御史以司彈劾在外設提刑按察司以兼理都布二司軍民又設各道分巡以肅清郡縣巡按御史總監察焉良法美意至詳且密所以百餘年間相維相統內外肅然近年以來風紀不振是以姧宄得以逞其邪謀羣小得以姿其欺妄賄賂公行紀綱日紊帑藏錢糧浪費空虛貪官汚吏肆無忌憚仰惟皇上嗣登寶位崇重臺諫俾之盡言所以姧邪敗露羣小屏逐風紀頗振百司知警治道之隆端有望於今日矣臣猥以庸材荷蒙聖恩擢總風紀受命以來夙夜兢愓捫心揣已無由答知遇之隆進言納忠庶幾效涓埃之報謹以振揚風紀禆益治道一十五事條陳伏望皇上留心採納俯賜施行臣不勝幸甚天下幸甚今將所言事件開坐謹題請旨一選賢能以任風憲竊惟御史為朝廷耳目之官任風紀之重必須得人方稱厥職我朝自洪武永樂宣德年間不分進士知縣教官皆得除授但選之甚精而授之不茍至正統年間朝廷頒降憲綱新進初仕不許除授御史至正統八年進士復得除之成化六年仍遵憲綱凡遇御史有缺止於進士出身知縣並行人內行取中間多有不分賢否但資格相應皆得授任者所以未盡得人臣愚乞敕吏部行移各處巡撫都御史巡按御史並布按二司官各于所屬進士舉人除授到任六年以上知縣內從公推訪廉慎公勤政績昭著民心愛戴實有聲譽者明白具奏遇有御史員缺吏部據此並于考滿行人博士內行取如果六年以上知縣員少于辦事二年以上進士中選取仍照例會同本院官考選具奏除授若所舉不實事發連坐以罪如此則御史皆得其人而風紀為之振肅矣一禁托拾以戒贓官自古重贓吏之法所以為安養斯民之計也蓋贓吏之害良民猶稂莠之害嘉榖故我朝於文職官吏受贓不分贓之多寡罪之輕重俱罷職永不敘枉法滿貫充軍其所以定贓吏之法可謂嚴且重矣比先年間巡按御史並按察司官拏問貪贓官吏事無所枉俱不敢托拾具奏其風憲官員得以展布四體而有司官員不敢恣其貪酷十數年來文武官員被人具告貪贓等項重情巡按御史按察司官行提到官對證明白律該為民充軍者往往讎怨原問官員托拾虛詞朦朧妄奏輒將原問御史等官奏準差官提解來就或就彼與先問囚犯一同對理縱辨無干受辱已甚稍有小疵多致降謫虧損國體沮壞風憲莫甚於斯所以風憲官員互相效尤各保職任坐視贓官不敢究問以致法度廢弛貪汚恣肆而小民不得蒙至治之澤臣愚乞敕法司今後凡貪贓等項官員被巡撫御史按察司官提問明白追有贓私律該為民充軍不分巳未發落妄揑虛詞托拾原問官員者或另行差官或備行巡撫等官先行提弔一干人卷勘問明白别無冤枉委係托拾該充軍者發極邊衛分充軍該為民者發口外為民若御史按察司官果有枉問及違法情罪明白參奏按察司官行巡按御史就彼提問御史罪重者行提來京情輕者候巡按滿日到京參送問罪不許輒便將御史等官一概奏提及就彼與原問囚犯一同取問仍行各處按察司出榜于所屬張挂曉諭如此則貪官知所警懼而風憲不致沮壞矣一擇人才以典刑獄竊惟刑者國之重事死者不可復生斷者不可復續而司刑者不可不得其人也我朝舊例凡各處按察司官有缺吏部于兩京法司御史郎中員外郎主事評事等官內除授都布二司理問所理問斷事司斷事及各府推官有缺俱于法司歷事舉人監生內除授尚不得人近年以來吏部將各處知府除授副使府同知知州除授僉事而推官斷事等官一概以年老監生除授且前項等官多有不識憲體不諳刑名問刑之際止慿姧吏任情出入傷天地之和召水旱之災未必不由于此及各處巡撫巡按並三司官多有將推官理問斷事往往差遣赴京或别項公幹經年半載不得回任以致問刑缺人尤為誤事臣愚乞敕吏部今後各處按察司不分問刑管屯整飭兵備等官有缺俱于兩京法司屬官內推選除授推官理問斷事有缺俱于法司辦事進士及歷事年力精強舉人監生內除授不宜似前一概濫除仍乞敇內外問刑衙門以欽恤為心以人命為重務求真情勿致虧枉仍行各處撫按等官不許將推官理問斷事違例擅便差遣有誤問刑如此則司刑者各得其人而刑不致于枉濫矣一責成效以革姧弊洪惟我朝設按察司以總理各道以肅清郡縣無非欲振揚風紀彰明憲度俾官吏守法而小民獲安也其分巡分管官常川在外遍歷所屬接受詞訟禁革姧弊宣布教條訪察民隱所以貪汚知所警懼軍民不被殘虐近年以來多有顧戀妻子罔肯出巡所過州縣暮到朝行甚至偏僻去處經年不至地方事情全不留意官吏貪酷若罔聞知所以政令日隳而姧弊滋甚也必須定與期限庶可責其盡職臣愚乞敕各處巡撫巡按等官今後布按二司分巡分管官員每年春二月中出巡七月中回司九月中出巡十二月中回司務要遍歷所屬每處所住不拘日期凡貪官汚吏蠧政害民及一切興利除害之事有益地方者務在舉行每季終分巡官將問過贓汚官吏名數追過贓罰等項數目及完過勘合詞訟分管官將催完過錢糧撫按過人民並一應合行事件各開報撫按處查考撫按回日仍具略節總類開奏乞敕該部候三年六年考滿之時據此黜陟若推誘避事曠職茍祿不依期限擅自回司者許巡按御史指實參奏究問若有地方緊急事情應回與撫按官計議者不拘此例如此則官無瘝曠而姧弊為少革矣一申命令以修庶務洪惟我朝洪武永樂以來于各邊添設將官假以節鉞之權以鎮守其地各處設布都按三司授以方面之寄以分理庶事無非欲振揚威武修飭邊備以防外侮之侵承流宣化激濁揚清以造生民之福彼時各官奉公守法仰副委託所以朝廷無外顧之憂生民免流離之苦近年以來各邊將官中間多有指以進貢為名肆意科斂軍士廣置第宅恣情燕樂車馬凋弊而不整邊備廢弛而不修一遇有警動輒請兵其各處三司官亦皆因循茍且惟望升遷瘝曠逢迎罔思補報錢糧侵費詞訟不清小民控訴無門盜賊任其滋蔓此皆方今之弊而所當痛革者也伏望皇上降敕切責各邊鎮守總兵並各處都布按三司及巡撫官員務要下思安享祿位之榮上念朝廷付託之重洗心滌慮改過自新為鎮守總兵者用心操練軍馬修飭邊備務使軍士精鋭威武振揚以戰則勝以守則固為巡撫三司者務使朝廷恩澤之下布郡邑貪汚之斂迹倉廩充實軍民安妥凡百政令無不修舉如仍蹈前習許巡按御史從公糾舉國典具存決不輕貸如此則命令申嚴而庶務益修矣一逐術士以防扇惑竊惟禁門不許擅入者所以防大姧也左道邪術之有禁者所以懼亂政也故我太祖高皇帝于大明律及皇明祖訓皆惓惓以致意焉其所以鑒前代之失而立萬世之規者其慮深且逺矣洪武永樂宣德正統年間邪異之人不敢輕至京師近年以來或扶鸞禱聖或書符呪水或燒煉丹藥或假稱果報一切邪術人等往往來京潛住始則出入大臣之家終則進入皇城之內妄言禍福扇惑人心如往年李子龍近來李孜省鄧常恩之輩夤緣妄為人所共怒莫敢誰何幸而天厭其禍俱已敗露然雖敗於一時誠恐復於後日若不嚴立重禁何以警戒將來臣愚乞敕各該衙門行令巡城御史及五城兵馬司並錦衣衛巡捕官校嚴督地方人等各于所管地方逐一挨訪除軍匠旗校監生吏典承差知印天文陰陽生醫士上納糧草之人外若係邪術之人不分有無文引無故來京潛住妄言禍福者俱要趕逐出京若一月不出仍前在京潛住者捉送法司問擬明白軍發極邊衛分充軍民發口外為民仍乞敕守皇城四門內外官員今後務要用心關防搜檢但有前項之徒及不係內府工作人役擅入皇城者就便拏獲具奏送問如有故違事發一體治罪如此則邪術有禁而人心不至於扇惑矣一擇守令以固邦本洪惟我朝設官分職各有體統上下相維以臻治理今在外之官方面固重而守令為尤重蓋守令為親民之官得其人則民受其福往年知州知縣未盡得人該大學士李賢奏準凡遇朝覲之年吏部于聽選監生舉人內不分赴選逺近考選銓除臣在陜西巡撫之時亦曽具奏于進士舉人內選擇除授以此大州巨邑民頗受惠近年以來各處知州知縣有一年不曽除授者甚至有二年除授不到者詢其所以蓋由吏部每逢考選之時無堪任守令之人以此遲遲正官既缺佐二管事遲一日則民受一日之害且堂堂天朝豈無其人蓋因拘於附近年月所以不得越期除授誠恐豪傑之才坐淹嵗月多致衰老不得實用臣甚惜之乞敕吏部查照大學士李賢奏準事例每年一次于聽選舉人監生內考選年力精強堪任知州知縣者若干人臨時于各衙門辦事進士內相兼選用不許將雜行之人除補仍豫訪州縣之繁簡斟酌人才之高下除授其四川雲南廣西福建路途遙逺江水險惡所除官員一年之上方得到任若候缺到方才除去不無太遲亦須照缺豫先一年除授前官縱有事故亦不至於一年之久至于布按二司官各府知府乃守令之綱也所繫甚大尤宜慎選升用俾嚴考守令之賢否以報撫按撫按覆考是實轉達吏部吏部再加訪察以憑黜陟如此則守令庶得其人而政事修矣一嚴考核以示懲勸洪惟我朝舊制凡在京各衙門屬官三年六年九年考滿之時本衙門考核後俱送都察院考核初任稱職者朝廷給與誥敕封贈其親不稱職者不得關給且有黜焉此乃勸善懲惡旌亷戒貪即古三載考績黜陟幽明之意也比先年間依此考核人無異言近年以來各衙門屬官因見本堂上官考稱本院訪詢行止平常考作不稱職者輒便揑詞具奏或造謗言原考御史多被連纍自此因循虛應故事以致賢否不分廉貪無辨祖宗勸懲之典廢弛殆盡若不從公考核無以警戒百司臣愚乞敕六部等衙門堂上官今後考核屬官務要察其平昔行止斟酌出與考語若本院考核不稱職官員敢有似前揑詞妄奏原考御史者許十三道御史將本官實迹明白劾奏有贓者問罪罷黜平常者降調外任其本官委係亷能而御史挾私考作不稱者一體治罪如此庶舊典不致廢墜而官僚知所警戒矣一禁公罰以勵士風竊惟科罰科斂法律所當最禁者也邇來人心不古貪風愈盛天下府州縣官員不才犯此者固多中間有等曽經旌異或上司禮待稱為賢能者往往假公營私罰取百端一年之間所罰銀不下數百餘兩甚至千有餘兩者誠恐議論欲掩人之耳目或領支修理學校或給發蓋造衙門官用者百無一二入巳者十常八九其三司官指以公用為由亦各濫罰財物憲宗皇帝明見此弊之甚曽降戒諭之敕比之穿窬之盜今弊猶存並不知改且兩京為天下之本四方之極源清則流潔表正則影直兩京各衙門屬官中持正操節者固多而濫罰財物者亦有及供送柴薪皂隸到京正數已足縱容家人掯要銀兩致民嗟怨有玷士風臣愚乞敕各處巡撫巡按並布按二司各行分巡分守官員嚴加禁約所屬不許似前公罰財物虐害小民敢有不悛從公體訪得實不分有無原告就便拏問如律其三司官尤須律已正人毋蹈前轍如有故違巡按御史即便糾劾仍乞敕兩京堂上官各戒所屬以革前弊益敦亷恥之風共助維新之治如此則庶官各知所警而士風為不偷矣一廣儲積以足國用竊惟自古君天下者莫不兢業自持省財節用恆以國用之不足為憂洪惟我朝列聖相承咸能愛惜民財不肯妄費雖賞四夷不過綵段所以內帑金銀常有數百萬之積近年以來羣小用事妄興造作欺罔多端以致府庫為之空虛天下為之困憊皇上嗣登寶位賞賚未周而內藏巳蕭然矣况天下府州縣倉廩俱無數月之糧而各邊亦止有二年之用萬一邊方有事或水旱災傷將何以濟興言至此深可寒心臣愚乞敇戶部通查在京及天下方面府州縣衛所大小文武官員及各王府宗支一應軍士若干共該支本色俸祿糧若干折色銀鈔若干通計天下嵗收稅糧金銀若干鈔貫若干有無彀用如果不足作何區處使不缺乏及內帑前項已空之數如何措置使之充盈或造鈔貫或鑄銅錢或清理鹽法或查勘屯田或閲辦天下之稅課或清查各處之船料凡理財之方足國之計無擾于氏有益於國者宜從計處具奏定奪如此則積儲可廣而國用為之不乏矣一恤土人以防後患竊惟思患豫防有國之大事防微杜漸有治之良圖臣竊見順天府所屬固安永清武清漷縣及保定定州河間等處洪武永樂年間原安插外民不下千戶百十餘年生齒日繁雖同編氓終係各俗即今精壯男子恐有萬餘為官者止慿俸祿而俸祿為有限在鄉者全藉田土而田土為不增况其官折俸銀兩比先年間按季關支近來過二三季或一年不得關支者賴此養贍别無營生一有不足為盜行劫勢所不免萬一邊方有警不無乘機剽掠事之可憂莫大於此必須使之得所庶可保無後患臣愚乞敕戶兵二部計議將在京各衛長官折色俸糧務要按季關與及將在外各處外民如果田土不足者或將空間地土或將入官莊田分撥各人耕種使足養其妻子不致失所以絶為盜之心以杜覬覦之念或選立中長使有統屬或拘管操練得食口糧該管官員加意存恤果有違犯治之以法凡可以立久逺之規弭後日之患者宜從計處具奏定奪如此則撫恤有方而不貽患於後日矣一清僧道以杜遊食竊惟天下之事有當緩而所繫急者僧道是也蓋當緩者僧道也所繫急者民食也若視僧道為緩而不嚴加清查則遊食者日衆而民食恆不足矣我朝定制每府僧道各不過四十名每州各不過三十名每縣各不過二十名今天下一百四十七府二百七十七州一千一百四十五縣共額設僧三萬七千九十餘名成化十二年度僧一十萬成化二十二年度僧二十萬以前各年所度僧道不下二十餘萬共該五十餘萬以一僧一道一年食米六石論之共該米二百六十餘萬石可足京師一年嵗用之數况又不耕不蠺賦役不加則食之者衆而為之者少矣其軍民壯丁私自披剃而隱於寺觀者又不知其幾何創修寺觀遍于天下妄造經典多于儒書敗化滅倫蠧財惑衆自京師達之四方公私之財用于僧道者過半民食不足未必不由于此其勢又不能盡去若不通查嚴禁則將來遊食者何有紀極臣愚乞敇禮部通查天下並在京寺觀共若干處僧道共各若干名除額度之數外多若干名如果數多既已關有度牒難以追奪明白具奏不許額外再度僧道直至額數不足之時方許各該有司具結照數起送關給度牒敢有故違再言度僧者許科道官糾劾拏問仍通行各該撫按等官督責官司嚴加查勘但係新修私創寺觀即便坼毁併于古剎大寺觀其中但有原無度牒行道童即令還俗當差敢有私創庵觀及容隱未度行道童收為徒弟者各問發口外為民寺觀住持還俗為民僧道官罷黜不舉者罪同所司官員容隱者亦治以罪仍通行天下撫按出榜嚴加禁約仍令各寺觀按月開報不致故違重甘結狀付所在官司查考如此則僧道無濫度之弊而民食不致坐資矣一敦懷柔以安四夷竊惟四夷來貢者慕化之誠朝廷優待者柔逺之道洪惟我太祖高皇帝膺天明命肇造丕基太宗文皇帝神武雄略威震朔漠四夷八蠻罔不來貢賜以綵段衣服待以下程筵宴十分豐厚使之饜飫自成治年間以來光祿寺官不行用心局長作弊尤甚凡遇四夷朝貢到京朝廷錫以筵宴與之酒食大宴品物頗可而朔望見辭酒飯甚為菲薄每樣肉不過數兩而骨居其半飯皆生冷而多不堪食酒多攙水而淡薄無味所以四夷到席無可食用全不舉筯傳之四方豈不譏笑臣昔往遼東整飭邊備曽聞外人怨言亦嘗具奏蒙憲宗皇帝敇令禮部光祿寺凡遇宴待四夷禮部該司官並光祿寺堂上官各一員巡看一時頗可今猶如舊恐年復一年益加茍且此事雖小關繫甚重臣愚乞敕禮部查照洪武永樂年間事例及欽奉纍朝奏蒙詔旨行令光祿寺今後凡遇外夷朝貢到京或該筵宴或朔望見辭酒飯務要照依先年定例差官看視下飯斤數不許短少飯食菜蔬俱堪食用酒亦不許攙水今後除筵宴外其午門外供給酒飯仍令每日值班御史巡看但似前剋減酒肉十分菲薄者許將光祿寺官並局長等參奏拿問如此庶使懷柔有道而得四夷之歡心矣一節財用以蘇民困竊惟治國莫先於愛民愛民莫先於節用仰惟皇上嗣登寶位之初重下寬恤之詔示以憫念小民凡事減省之言天下蒼生無不欣戴且我朝洪武永樂洪熙宣德年間生養休息軍民富足故雖外征北邊內營宫殿樂于趨事未嘗告勞自正統十四年以後天下多事民始覺困自成化年間各處鎮守等官爭以進貢為名科取百端民愈凋憊加以山西河南陜西連年荒旱不收有司素無儲積民之死亡過半田土荒蕪而糧稅如故北直隸山東之民養馬供柴而征徭尤重江南各省人民輪納京儲及供兩京內府物料民困財竭未有甚于此時者也若非節財之用生養休息十數餘年豈能蘇其困憊然節用之道必自內府減省始臣愚乞敕禮戶工三部各查內府衙門自洪武永樂洪熙宣德正統年間一應供用之物如油蠟豬羊雞鵝及擡柴夫工價銀兩等類某年用若干某年添若干通查明白逐一上陳御覽斷自宸𠂻量加減省若減省一分則民受一分之惠就為定例不許各衙門再行具奏增添尤望皇上自今凡百用度賞賜更加撙節罷不急之修造裁冗食之人員則帝王克儉之盛德復見於今日而民困為少蘇矣一足兵戎以禦外侮竊惟為國之道足兵為先兵有不足外侮何禦洪惟我太祖高皇帝創建之初設衛籍兵天下之軍共有數百餘萬即今百十餘年而逃亡死絶者過半蓋由里老埋沒而無册籍之可查衛所作弊而無文卷之可慿雖有清軍御史而清出者百無二三雖解到衛所而隨逃者十常八九若再加百年絶故愈多此軍士消耗之弊如此也其現存之軍江南者俱各守邊備倭趲運糧儲江北者俱赴京邊輪班操備而在衛守城不過老幼數百人都司操練止有餘丁一二千名居重馭輕京師軍士雖有二十餘萬南京官軍雖有五萬之上然多有名無實况騎射之未精什物之未備加以連年做工疲困已極輪班往返艱難尤甚此軍士現存之弊如此也消耗之軍既不能復現在之數又不堪用兵戎誠為不足遇警將何調用况今邊騎猖獗于甘涼出沒於西北強賊又哨聚於江右此皆腹心之患而大有可憂者臣愚乞敕兵部通行天下都布二司各行所屬衛所府州縣有司將所管各里軍戶充軍衛所官旗姓名逐一查理明白衛所各將所管軍人姓名籍貫充軍來歷年月審勘無差各備造文册江南者送南京兵部江北者送在京兵部各將洪武以來舊册查對如有差訛即便改正仍收備照務要磨勘明白除年逺盡絶外將宣德以後逃故之數每省各鈔謄一本該部照例通行各清軍御史嚴督所屬用心清理不許視常虛應故事庶姧詐之徒不敢作弊埋沒其京營官軍候營造憲宗皇帝山陵畢日乞敕兵部徑自具奏請命本部堂上官一員會同各營總兵官將現操軍馬逐一查理先儘團營務足原額之數其南京各營官軍乞敕南京內外守備官員會同南京兵部堂上官一體清查仍乞禁約管軍官員不許私占役使及擅撥做工等項致纍逃亡候清查完日各另回奏仍造册送兵部查考其現在軍士務要著實操練精其騎射養其鋭氣一遇征調俾克成功如此則兵戎不致消耗而戰守為有備矣疏入得旨這本所言多切時弊該衙門便看了來説防邊患疏𢎞治元年馬文升臣謹奏為豫防邊患以保重地方事臣竊聞事貴早圖患當豫防易曰履霜堅冰至書曰制治於未亂凡事固然邊患尤甚竊照甘涼地方乃古左賢王之地漢武帝傾海內之財勞數十萬之衆方克取之設立酒泉張掖等郡以斷胸奴之右臂蓋北則蒙古所居南則番戎所處若不分而離之使兩郡相合不下數十餘萬中國何以當之則甘涼地方誠為西北之重地也漢唐之末終不能守而趙宋全未能得至我朝復入職方設立都司屯聚重兵故我太宗文皇帝深謀逺慮首命內臣總兵以鎮守其地邊境晏然無事干戈後至正統初年多爾濟巴勒等為患數年靖逺伯王驥定西侯蔣貴始克平之逮至天順年間保喇瑪拉噶等侵犯此地朝廷命將出師未能勦平既而寧夏副總兵仇亷前去截殺兵過蘭州迤北輕率寡謀被敵所誘數萬人馬喪亡過半自後敵入河套侵擾陜西而甘涼地方稍為寧靜近自成化二十年以來所在搶掠官軍失事先因進貢等項各該衛所罷困已極敵人知我虛弱益肆猖獗且陜西路通甘涼止有蘭州浮橋一道若彼以數千人拒守河橋糧運不能通援兵不能進不數年而甘涼之地難保無虞萬一甘涼失守則關中亦難保其不危近日本院接準兵部咨文該甘涼等處鎮守總兵等官具奏敵人入境或五六十騎或一二百人其所在各城堡官軍所報不曰追至某處路遠天晚恐墮賊計掣兵回還必曰用箭射死賊人數多俱被鈎拖去訖未嘗見奏有挫衄賊鋒斬獲賊級數多者止是陜西靖邉衛官軍斬獲敵人首級三十七顆而人民被其虜掠者亦不知其幾何況近因甘涼等處缺糧陜西臨鞏二府人民已經趲運數次困苦不勝近該巡撫甘涼都御史羅明差來奏事舍人石玘臣等詢問説稱成化二十三年十二月二十三日敵人自涼州直抵陜西蘭州一帶入境搶掠四五日得去頭畜人口不知其數今甘涼總兵等官奏稱止被敵人搶去夜不收馬五匹且前項敵人連年搶掠每得厚利邉將畏懼罪責往往惟務隱蔽誠恐敵人窺知我邉糧缺兵寡即因天氣炎熱遠遁窮荒固覺無事但恐秋高馬肥弓徑之日糾合别種部落擁衆入寇我邉無備不無又遭蹂躪年復一年敵人益為得志而甘涼之地大有可憂思患預防不可不慮乞敕兵部計議甘涼各城現有馬步官軍若干若敵人擁衆犯邉有無足彀調用如或兵數不足豫調别處客兵前去截殺雖曰延綏調兵三千往來不常久住則虗費糧草頻回則徒勞士馬遇敵入侵緩不及事如何為宜及行彼處總兵等官計議敵若擁衆侵犯用何方略挫其初來之鋒設何竒謀遏其深入之勢敵若據守河橋援兵從何而進糧運從何而通方略早定人馬豫集務使敵人大遭挫衄不敢犯我邉方用紓朝廷西顧之憂永絶邊陲侵掠之患明白具奏期于必行仍乞敕戶部查算甘涼各城現在糧草若干可彀彼處軍馬幾年支用如調客兵有無缺乏如或不足作何措置使糧草有數年之積不致臨時有缺乏之虞若再令腹裡人民趲運千里饋糧民有飢色樵蘇後爨師無宿飽皆兵家所忌況陜西之民瘡痍未復尤非所宜前項二事先時計慮猶恐為遲若臨時方籌不無誤事事之大有可憂者無過于此故我皇祖訓有曰外戎與西北邉境互相密邇纍世戰征必選將練兵時謹備之者正慮此耳臣等叨任大臣濫總風紀茍有所聞事關地方不敢緘默疏入得旨説的是邉防大計兵部便計議行請郤賽瑪爾堪進獅子疏𢎞治二年倪嶽臣謹奏看得賽瑪爾堪所進獅子乃外番之野獸非中國之所宜畜留之于內既非殿廷之美觀置之于外亦非軍伍之可用日逐餵飼之費及所賜銀幣等件俱係府帑之財帛百姓之供億兼且獅子真偽皆未可辨借使是真不免以彼無用之物易此有用之財倘或非真豈不受遠人之欺貽天下之笑且以啓番人窺伺之心以為中國好尚之所在殆非所以發揚聖德之光輝補益治平之實效也臣竊為朝廷惜之蓋因各番先于成化年間得利而去以此今次繼踵復來今若不為處置則今次既去後次復來一處既然各處倣效以朝廷柔懷之仁固不計此小費其如遠番之心貪得無厭何哉臣嘗聞聖帝明王不寶遠物故周武王時西旅貢獒召公致戒漢文帝時有獻千里馬者下詔郤之載之經史傳美萬世而我憲宗皇帝成化初年亦嘗降敕諭止朝鮮白鵲海青之獻皇上踐阼之初首頒明詔禁止各處鎮守等官進貢騷擾之弊既而放禽鳥縱鷹犬旬日之間屏逐無遺𢎞治元年四月內因迤南番人進貢玉石等物郤令帶回本年七月內又因雲南鎮守太監王舉欲進寶石等物嚴行禁絶善政善教遠近稱頌以為聖德恭儉蓋與成湯之不殖貨利同符而一致由是而終始惟一雖堯舜之聖何由過此今未及三年而廣東鎮巡官員又將賽瑪爾堪所進獅子要行起送赴京臣仰窺聖心必不納此無益之物以為聖德之纍但恐有以先年事例為言容其到京則經過道途騷擾必多賞賜犒勞須從舊例况本處進貢使臣例該于陜西甘肅驗放起送即今現一起哈瑪爾丹等一十八名到京為因後起使臣未到未及題賞其經從海道雖有先朝特旨止是準令回還不曽許從入貢今若聽從海道前來則後次倘有附近本地浮海番商詭從本處差來入貢則既無勘合又無印信何由知其真偽就令的係本處差來使臣則既從陜西又從海道濫冒差人糜費財幣終無窮已且又令其習知海道啓意外之虞即今各處地方水旱相仍人民窮困郤乃疲中國以供遠番費有用而易無用臣愚見深謂未便伏望皇上念生民財力之艱難察番人詭冒之姦計斷自宸衷阻其使臣盡郤所貢仍差的當行人一員馳驛前去沿途跟訪隨其所在會同巡撫或巡按及合屬司府官就于所在地方支給官錢量為宴勞仍依例給與廩給腳力送回廣東量豫賞賜嘉答其意將原來船隻官為修理著令撑駕回旋仍請敕一道曉諭阿哈瑪特王謂爾忠敬之心朝廷具知但差人進貢只宜照依常例量備駝馬從陜西陸路赴京為當其獅子鸚鵡不係常有之物不必遠涉海道來進如此則遠方諸國知明天子之所為有非彼之所能測然後益崇俊良益修政治使家給人足禮樂興行邉域無警萬邦賓服如此則雖四靈畢至未足以增光盛治矧一猙獰異獸亦何足以為明時之輕重哉再照鎮巡等官均受朝廷重寄明知海南諸番國惟占城真臘暹羅滿剌加瓜哇等處入貢有勘合者例該于廣東布政司比對起送赴京其餘不許起送係是定例今賽瑪爾堪差來進貢既該委官千戶孫祥等呈報各官自合遣人諭以朝廷事例并詔旨事理阻回為當如果番性執拗不肯依從亦合以理阻留在彼差人星馳具奏候請明命以為進止可也郤乃即便差人起送似此故違亦合參究伏乞聖裁疏入帝從之請嚴捕近京盜賊疏𢎞治二年余子俊臣竊惟京師乃宸居所在四方萬國所歸人煙輳集買賣繁華實有一等不務生理各處逃往軍匠囚徒心腹相結三五成羣為非作歹人號喇虎逮至家業蕩盡郤乃賭博抹牌下棋打雙陸踢氣毬贏者得財仍恣所欲輸者喪氣袖手無為遂至飢寒迫切發起盜心往往京師肆行劫掠防微杜漸誠不可緩乞敕五府六部六科各差有力量屬職官共五十五員內給事中五員會同錦衣衛堂上官并巡城監察御史督行五城兵馬司順天府委官通將城裡城外官民排門不越一家取勘果有容留賭博不務生理來歷不明軍匠囚徒等項許于各官處出首係民者送戶部係軍者送兵部係匠者送工部遞發原管官司收候無籍貫者送五城兵馬司監候事畢另議定奪以後再有逃來者查係發遣之數果曽原犯死罪遇蒙恩例得免仍送原問衙門擬以死罪鄰右窩家今次並以後容留隱蔽不舉俱與犯人同罪各官就行審編火夫除例該優免本身戶下二丁及止優免本身及官員優免本身一門外其餘大小人家不拘幾丁盡行編為火夫輪流坐鋪每夜務勾一十五名并力捕盜務在得獲不獲者巡城御史參奏責戒鄰右不行救護者就行送問獲賊之日要問出窩家不服審編及審編不出者果係應請旨者具實參奏餘人就行送問其火夫文册各官將稿付與兵馬司類造仍乞敕禮部查例禁約官民人等本等衣服靴帽等項不許僣分過侈以足財用以省姧盜其迤南北直𨽻三路軍衛有司照舊設立火夫防護道路及禁約往來人等早宿明行不可中賊姧計如果遇賊勢不能敵星馳通報京營差去把總官員撲捕毋得隱匿再乞聖旨榜文將前項弭盜事由詳載于內昭示臣民以為遵守各官此外再有所見何者為致盜之弊何者為弭盜之方俱令條奏以俟酌行臣謹奏疏入帝從之恤民弭災疏𢎞治二年馬文升臣謹奏照得先準禮部咨該司禮監太監韋泰傳奉聖旨近日京城雨水為災南京又奏大風雷雨之異朕當檢身飭行祗謹天戒爾文武百官尤當各加修省勉其圖報母事因循各衙門政事有缺失當舉行改正的斟酌停當來説禮部知道欽此欽遵轉行到臣除仰遵聖諭痛加修省及將本部當舉行改正事宜先行條奏外臣惟天命人君以出治人君命臣以分治皆所以為民也洪惟我朝列聖相承咸能愛養斯民使得其所深仁厚澤洽于民心故今百十餘年民之愛戴無異成周但生齒日繁地土有限豐收之年尚可度日一遇凶荒輒多餓殍况近年以來差役繁重科派無度且如京畿之民既有擡柴砍柴人夫每名一年用銀二十一二兩雖曽減去四五兩尚有一十六兩之多又有寄養孶生馬匹京班皂隸各閘閘夫及內府各衙門黃穰苗撞竿等頂差辦非止一端每一州縣一年多者用銀三四千兩少者一二千兩至如通州雇倩接應人夫一年各縣協濟亦用銀𢾗萬餘兩而稅糧馬草不在其數往年全靠多餘土地幫助近被皇親功臣勢要之家占奪已盡民之困苦所不忍言嗟怨之聲盈于道路致災之由恐在于此非獨畿甸之民如是而天下之民皆然又如南京內官監成化年間具奏徑行南京工部坐派南方各布政司銀硃土硃生漆鐵線肥皂各五萬斤共該用價銀二十餘萬兩其他買辦又不可勝計民困財竭誠未有甚于此時者也幸遇皇上嗣登寶位以來布德施惠節儉愛民凡百無益之事悉皆革罷然猶有災異者此蓋天心仁愛示此警戒正欲皇上仰體祖宗之心以安養斯民以撙節財用以培植國家而鞏固皇圖于億萬斯年也且天下之民固所當愛而畿甸之民尤所當深愛也今順天等八府之民既有前項徭役又遭此水患加以秋收無望即今己有缺食流移者冬末春初必須賑濟若徭役不減照舊徴收是所濟者不及十之二三而取于民者十之八九內而飢寒切身日無所給外而嚴刑峻法日加箠楚隨濟隨追欲民之不逃亡不餓死豈可得乎哉其追賠馬匹擡柴夫役己經兵工二部覆奏暫且停追外其餘科𣲖徭役尚多若不通行查勘痛加減免不惟逃亡餓死又恐致有意外之虞自古人君欲回天意而弭災變必先愛民而節財用伏望皇上法成湯之子惠困窮思周文之惠鮮鰥寡乞敕戶部速行巡撫直𨽻都御史轉行順天等八府除糧草外各將本府所屬現今一應買辦嵗辦併各項徭役共若干項每項用銀若干兩通共用銀若干兩作急具奏候奏報之日該部會同各部都察院大理寺通政司六科十三道從長計議某件合當暫且停免某件合當量為裁減中間果係內府緊關合用之物者該部支給官錢買辦送用仍通行浙江等十三布政司並南直隸應天等府今後每年終將奉到兩京各部勘合坐派所屬一應買辦物料及嵗辦之物備開件數併該用價銀數目備細具奏仍照前會官計議當裁減者奏請裁減當停罷者停罷永為定例內外諸司衙門敢有故違擅自朦朧具奏增添者許科道官指實劾奏究治仍乞敕戶部豫先區畫賑濟被災州縣飢民錢糧以備臨時之用併將各免糧草作急定奪蠲免庶民困少蘇天意可回災異可弭而祖宗之鴻業可以保之億萬年而不替矣臣叨居大臣同國休戚覩兹災異義所當言不敢緘默疏入得旨是戶部知道正罰俸疏𢎞治二年馬文升臣伏覩大明律內一欵凡祭祀及謁見園陵若朝會行禮差錯及失儀者罰俸錢半月欽此又伏覩大明令內一欵凡民官月俸錢米相兼罰俸止罰俸錢軍官月俸錢米如遇罰俸合與民官一體折算追罰俸錢欽此此我聖祖立法蓋因文武官員凡有小過輕犯不即加罪止是罰俸而又止罰俸錢猶存俸米使之得以養其妻子不至失所情法兩盡其仁愛優恤臣下之心雖古帝王無以加矣但令內所載年久未曽申明近年以來文武官或有大小罪責荷蒙朝廷寬容罰俸有一月二月者有四月五月者戶部行令將月俸不分錢米盡行住支況近因水旱災傷倉糧數少即今各官月俸止支本色米三分折色錢鈔七分若不分錢米全不關支妻子無所養贍未免啼飢大官猶可小官何以度日誠非聖朝頒祿養亷既富方穀之意也恭惟皇上嗣位以來凡事法祖一應舊章悉皆舉行天下臣民不勝慶幸乞敕戶部遵依大明令內所載事理通行在京大小衙門今後凡奉欽依罰俸者止將月俸折色銀鈔照數住支仍存本色養贍妻子庶祖宗舊章得以昭明罰俸官員感蒙惠澤臣叨任大臣事干國體所當言者不敢緘默疏入得旨是進鹽場圖册疏𢎞治二年彭韶臣伏聞自古聖帝明王莫不以稼穡艱難為念其忠臣賢士亦莫不以敷陳民事為先故有以豳風無逸親書以進者有以農桑耕織繪圖以進者甚至有獻流民圖者要之豈能盡夫民間百色艱難之狀但于深宫之中即是少寓目而動心焉亦不至草芥以取之矣然庶民之中竈戶尤苦惜乎古今未有圖詠士大夫少知之者況于在上之人乎臣近履鹽場始識其槩謹為陛下陳之海鹽煎熬全資人力竈戶饒給之家丁多力盛因山海自然之利無門戶不足之憂誠與樂土之民等也貧薄之人雖有分業塗蕩然自來糧食不充安息無所未免豫借他人凡是煎課餘利盡還債主而本身之貧有加無減故其艱苦難以言盡小屋數椽不蔽風雨脫粟糲飯不能飽餐此居食之苦也山蕩渺漫人偷物踐欲守則無人不守則無入此蓄薪之苦也曬淋之時舉家登場刮泥汲海午汗如雨雖至隆寒砭骨亦必為之此淋滷之苦也煎煮之時燒灼薰蒸蓬頭垢面不似人形雖至酷暑如湯亦不能離此煎辦之苦也不分寒暑無間隂晴日日有課月月有程前者未足後者又來此徴鹽之苦也客商到場咆哮如虎既無現鹽又無抵價百般逼辱舉家憂惶此賠鹽之苦也加有疾病死喪等事尤不能堪逃亡别處則身口飄零復業歸來則家計蕩盡誠為去住兩難安生無計孟軻謂窮民無所歸此等是矣所宜加意矜念遇事寬恤蓋雖未能使之頓如其願然亦足以示朝廷存記不忘之心彼將有所感動仰慰雖團極無復恨矣臣今將鹽場景象事情略分八節各繪為圖每圖各述以詩裝寫成册上進伏乞萬幾之暇俯垂睿覽庶幾日擊貧竈之迹臣不勝願幸之至疏入帝從之御選明臣奏議卷六
