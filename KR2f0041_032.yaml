  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_032-1a, image: WYG0445/WYG0445-0460a.png}
body:
  text: 議處科目人才疏隆慶五年髙拱臣惟國家之用人皆欲其砥礪名節建立事功以共成熙平之治非徒以一日之短長遂為終身定例而故有所抑滯于其間也今布列中外自州縣正官而上大較皆科目之人而科目分數進士居其三舉人居其七所謂進士舉人者亦惟假此為網羅之具以觀其他日之何如而非謂此必賢于彼也國初進士舉人並用其以舉人登八座為名臣者難以一二計厥後進士偏重而舉人甚輕至于今則極矣其係進士出身者則衆向之甚至以罪為功其係舉人出身者則衆薄之甚至以功為罪上司之相臨同列之相與炎凉迎面可鄙可羞之甚而皆不自顧也至于保薦則進士未必皆賢而十有其九舉人未必皆不賢而十曾無其一也至于升遷則進士治績之最下者猶勝于舉人治績之最上者也即幸有一二與進士同升然要其後日則進士之俸少而升官又髙舉人之俸多而升官又劣也若夫京堂之選則惟進士得之而舉人不復有矣其偏如此遂使進士氣常盈舉人氣常怯盈者日驕每襲取而寡實怯者日沮率隳墮而恬汙以故舉人皆不樂仕茍年稍強學未甚荒者皆相與遷延冀幸一第直至年邁學荒淪落已甚然後出而就選以為姑用了事云爾間有一二壯年從仕者又皆為貧之故求溫飽者也若是而欲望其有為胡可得哉夫崇尚進士才三分耳而又使之驕棄却舉人已七分矣而皆使之沮則天下之善政誰與為之而民生奚由得安也臣愚以為欲興治道宜破拘攣之說以開功名之路凡舉人就選者初秖以資格授官授官之後則惟考其政績而不必問其出身進士而優則先之茍未必優即後于舉人無妨也舉人而劣則後之茍未必劣即先于進士無妨也吏部自行體訪但係賢能一例升取不得復有所低昂仍行都察院轉行各該撫按官務除去舊套但係賢能一例保薦亦不得復有所低昂如舉人官未經保薦而升取數多者撫按官以不及論其既升取之後又惟論其政績一例推轉舉人之俸不必加深進士之官不必加美若果才德出衆則一例升為京堂即上至部卿無不可者如此則拘攣之說破而功名之路開茍非至不肖者必不甘于自棄也至于舉人就選之時又必稽其年貌五十以上者授以雜官不得為州縣之長蓋州縣之長責任艱重須有精力者乃可為之彼其精力既衰胡可以為哉如此則人皆趨可為之時以赴功名之㑹而甘于淪落者或寡矣夫舉人與進士並用則進士不得獨驕舉人皆益自效而善政必多即未必人人皆然而十分之中少亦可有六七固已過半矣善政多則民安民安則國可富而教化可行熙平之治可庶幾望也臣誠愚昧所以為國謀者如此伏惟聖明裁斷敕下吏部施行天下幸甚疏入得旨祖宗用人原不拘資格近來偏重太甚以致人無實用事功不興覽卿奏具見經濟宏猷于治道人才大有裨益依議著實舉行吏部知道議處馬政鹽政疏隆慶五年高拱臣惟國家設官各有所職而非故為剩員也若係剩員則不設之矣其用人也乃使之各舉所職而非徒以安置也若所當安置者則不用之矣今行太僕苑馬寺専理馬政戎伍所資鹽運司専理鹽政國用所賴皆係緊關要職非閒局也而近來視之甚輕即卿與使皆以考不稱職有物議者升之夫安置其人而名曰升是以棄之之道用之也升而實以安置是以用之之道棄之也棄之而用則其任必不勝用之而棄則其政必不美臣不知用人者乃何以若此也或曰考不稱職有物議者將何以處臣以為不然夫考課貴嚴果不稱職有物議直去之而已矣獨奈何以此等衙門為安置之所哉既劣處之使之靦顔又姑容之使之尸位遂致政務廢弛茍且狼籍而姧貪之弊且多祖宗之設此官意何為者而乃使若此哉合無今後大破常套凡卿使員缺必以廉謹有才望者推補而又議其階格卿視布政司參政使視按察司副使待政成之後視參政者升與參政同視副使者升與副使同如更優異查照先朝故事超等擢用則其官自重矣其官重則賢者樂就必且盡心于所職馬政鹽政當自修舉而所利于國家者必多非惟祖宗設官之意可以無失而用人之理亦得之矣伏望聖明裁斷敕下吏部施行不勝幸甚疏入得旨卿所言是馬政鹽政國家重務必重其官乃可責以實效著實舉行陳四事疏隆慶五年汪文輝臣惟先帝所任大臣本協恭濟務無少釁嫌始于一二言官見廟堂議論稍殊遂潛察低昂窺所向而攻其所忌致顚倒是非熒惑聖聽傷國家大體茍踵承前弊交煽並搆使正人不安其位恐宋元祐之禍復見于今是為傾陷祖宗立法至精密矣而卒有不行者非法敝也不得其人耳今言官條奏率鋭意更張部臣重違言官輕變祖制遷就一時茍且允覆及法立弊起又議復舊政非通變之宜民無畫一之守是為紛更古大臣坐事退者必為微其詞所以養廉恥存國體今或掇其巳往揣彼未形逐景循聲爭相詬病若市井喧鬨然至方面重臣茍非甚姧慝亦冝棄短録長為人才惜今或搜抉小疵指為大蠧極言醜詆使決引去以此求人國家安得全才而用之是為苛刻言官能規切人主糾彈大臣至言官之短誰為指之者今言事論人或不當部臣不為奏覆即憤然不平雖同列明知其非亦莫與辨以為體貌當如是夫臣子且不肯一言受過何以責難君父哉是為求勝此四弊者今日所當深戒然其要在大臣取鑒前失勿用希指生事之人希指生事之人進則忠直貞諒之士逺而頌成功譽盛德者日至于前大臣任已專斷即有缺失孰從聞之蓋宰相之職不當以救時自足當以格心為本願陛下明飭中外消朋比之私還淳厚之俗天下幸甚疏入下所司高拱惡其刺已調文輝為寧夏僉事議録卻賄三臣疏隆慶六年高拱臣謹按該禮科給事中王璇題稱該巡視南城試監察御史周于德因派柴炭商人有本地方富戶于彪賄託于德舊歇家曹雄投帖開具白米一百石欲求幸免本官隨即追問情由當將曹雄併雄妻弟秦守忠等捉拏到官搜出身邊銀一包連贓發兵馬司監候已經具題又該巡按山東監察御史張士佩因升任例該舉劾有齊河縣知縣陳天䇿假遞公文內夾柬帖呈具銀一百五十兩送至原籍以干保薦本官即將原來冊柬發按察司已經具題嚴究又該兩淮巡鹽監察御史李學詩有鹽商楊棟李祿開具禮帖銀一千兩送至學詩家當被伊弟令家人拏獲連贓送該府本官隨具奏盡法問遣外為照三臣職司風憲志向高潔事關名節乞敇吏部登記俟各官考績升遷之時分别優待以為堅持清節者之勸仍移咨都察院轉行內外大小衙門各嚴加砥礪等因奉聖旨吏部知道欽此欽遵為照黷貨者小人之惡行卻賄者君子之美節為治之道必使小人不得肆其惡而君子得全其美斯為當也乃近年以來是非不明議論顚倒行賄者既不加嚴受賄者亦不加察顧獨于卻賄之人深求苛責或曰此必素以賄聞者不然此物奚宜至也或曰此必平日所受者多而故假此以掩之也或曰此乃有人知見不得己而為之卻也甚至有被指摘形之章奏者焉遂使受賄者泯于無迹而卻賄者反為有痕受賄者恬然以為得計而卻賄者皇然無以自容而行賄之人則公然為之以為如其受則得以濟事幸也如其不受直不受而已而彼固不敢言吾固無恙也而又何畏乎是何使為惡者幸而為善者苦也夫君子惟知自信而小人則安能信君子之心古有卻賄而名至今存者使非賄至又安得有卻賄之名則所謂物奚冝至者非也彼素有貪聲者一旦卻之是誠掩也若素非貪而今又卻之則誠廉矣奈何不嘉其有據之亷而深探其無形之貪乎則所謂受賄而假此以掩者非也至于有人知見而卻之者是亦卻也非受也使無人知見安知其必受乎乃棄其廉于所可見而逆其貪于所不可知豈人情哉則所謂不得已而卻之者亦非也而世俗之論顧如彼則非惟不足以訓亷而常使人畏首畏尾不能自主固有本欲為亷而恐事露人議其後遂化為貪者矣所以綱維世道者豈宜如是哉今御史周于德張士佩李學詩乃能于行賄之事明言而不自隱藏行賄之人直指而不少假借可見其守法之正而不可干以私持身之清而不可浼以利見理之明而不可惑以俗說本部即當登記簿籍以俟優處為亷謹之勸至于訓示諸司尤為喫緊蓋俗說之浸淫既久人心之蔽迷已深使非曉然以示則孰敢安然而為合候命下本部移咨都察院轉行內外大小衙門官員不止當知守亷之為美凡遇有行賄之人即當執拏在官明正其罪仍另行南京吏部並兩京都察院科道等官及各處撫按衙門一體知㑹以後凡遇有卻賄之官便當記之善簿而不得反用為瘢痕列之薦牘而不得反指為瑕類庶乎清濁有歸而激揚之理不忒是非有定而趨避之路不乖君子有所恃以為善小人有所畏而不敢為惡亦興治道之一機也疏入得旨是議處廣東舉劾疏隆慶六年高拱臣等照得撫按官薦舉太濫日益而歲增者往時之通弊也本部題奉欽依嚴禁不許濫舉者近日之明例也乃在廣東則有不可以例拘者謹為之明其說廣東財貨所出舊稱豐裕固樂土也祗緣近年以來法度廢弛官其地者貪虐特甚習以成風而撫按亦不可以勝究于是民不聊生盜賊四起乃貪虐既不加懲而處置又不得當于是良民皆化為盜譬之病痞者然始緣客火為逼血脉聚而為痞其路既通而又逼之不已則痞日積而血脉日微實有難于救藥者也臣誠為國憂先曾具疏議處彼處有司荷䝉命允臣乃總計其州縣共八十處其掌印官每三處則用進士一舉人二皆揀其年力精壯才氣通敏者以充而監生以下不預焉其自京往者臣又每每集于堂階諄切戒勉諭以選擇任使之意歆以功名上進之階蓋欲為皇上奠此一方易亂為治也然臣又思得有司之勸懲係于黜陟而朝廷之黜陟憑諸舉劾今廣東有司既皆科目選擇之人使撫按舉薦同于他省則官其地者必曰吾輩科目人多而撫按舉薦同于他省則雖盡心效職稱上等者或且不得與他省中等伍而又何望于進取乎于是隳其志以玩愒者將有之矣是又不可以無處也臣誠欲于廣東舉劾另立科條令其撫按官將各有司時時體訪務在的確果有殃民不職應拏問者即便拏問應劾奏者即便劾奏不必待復命之時其他只不許徇私市恩若果有弭盜安民茂著循良之績者復命之時不拘多寡盡數舉薦本部另行體訪的確亦不拘多寡盡數行取超升如此則賢才雖衆而各有上進之途自不至于相礙體悉既周必多有奮勵之志當不肯以自隳庶乎善政可興而數年之閒可有安平之望也至于他省用人亦當如此但科目人少不能周遍則其撫按官自當守濫舉之禁不得援廣東以為例恭候命下本部移咨都察院轉行彼處撫按衙門遵照施行疏入得旨是弭盜疏隆慶六年高拱臣竊以海內雖稱乂安而盜賊殊為可慮其聚衆殺劫是處皆然然皆非飢寒迫也其間多健俠之徒博飲宿倡揮金如土自相雄視擊劔殺人且數千里外皆相聯絡召呼之間多可數千少可數百肆行荼毒而曾無誰何者也以求其故皆起于有司之養寇而成于上官之不察彼有司及巡捕官不職者多平日既不留心武備而于健俠之徒又不行懲禁任其所為及聚而為盜則又自先畏懼不敢嚮邇巡捕者又往往受盜之賄不行緝拏即有拏獲又多放縱却祗䝉蔽上官以為地方無盜而上官亦甘其䝉蔽茍稱目前無事以待遷轉習以成風彼此相效以為善宦于是有司之䝉蔽日益甚而盜之猖獗日益不可制良民受其殘害無所控訴每每被劫被殺不以報官曰官不為理徒益重賊之怒而禍益烈也直至劫庫不容隱匿乃始申報上司卻又以重為輕以多為少支吾了事而上司亦恐有已責也亦為之以重為輕以多為少支吾了事蓋不惟賊之故態官皆知之而官之本情賊亦皆知之彼此相款安然無事此其所以日益滋蔓而不可圖也使有司肯以捕盜為務有即殄滅則安得積而至于多又使肯以稽查為務凡健俠不務生理者必加懲禁有出而之他者必令里甲報知窮其所往而拘治之且收其家屬則安得肆意流毒于外使上司亦以捕盜為務日行體訪凡有盜地方及䝉蔽不以申報者必加重究議罷其官則彼安敢不捕使又以稽查為務凡捕獲強盜審是何州縣人即責問該州縣官有此無良何以不知出而之他何以不問亦加重究則彼又安敢不行稽察即是而言則海內之多盜其故可知也若不重為議處恐故套牢不可破官以䝉蔽為當然而盜以劫掠為當然將使良民皆化為盜脫有揭竿而呼者又將何以處也請以後各兵備條格各州縣掌印巡捕官有盜分别降級罷官各兵備及該道官所屬有盜分别降級罷官有隱匿不行劾奏者聽本部都察院及科道官劾奏重治若果地方有盜即行申報上司就便捕滅上司若聞地方有盜即撥兵馬就便捕滅者免究仍録取其捕盜之功量多寡為升賞曰罰必罰更無假借曰賞必賞更不食言庶乎捕盜有人而盜息民安可望于萬一也疏入得㫖這所議條格都依擬著實舉行辨名分疏隆慶六年高拱臣竊惟上下之分定而後紀綱立政令行近年以來屬官不奉堂官約束其在外省則推官知縣出自科甲者二司多不敢約束而反畏之上下之倒置甚矣上下倒置則紀綱何由立而政令何由行也以求其故皆因先年執政之臣悅人媚已于是憸夫之在庶寮者託為奧援入其幕中般鬭是非堂官少不曲意于已輒行排陷而遂因以不利于是堂官畏之不敢行其約束而屬官則益恣其胸臆旁若無人自稱風采焉習以成風彼此相效雖未必有奧援者亦皆以違拗堂官為得計而安意承行者蓋鮮矣在在外省則由巡按御史見得進士推官知縣有科道之望乃曲加護庇引為私人託其查訪凡二司之賢否悉出脣吻有所不悅遂以萋斐而禍終不免于是二司反皆畏懼遇其來謁每留飲幕中親陪談笑以結其歡心蓋奉承之不暇而又何敢問其政事之得失乎今臣秉持公道門無私交庶官既不敢般鬭是非而又每申明上下之分使諸司不得違越往日之風似可稍息但積習既久卒難盡變而以違拗為得計者固尚有也至于外省則全是舊習無一人之不然矣體統既乖法度盡廢害政莫甚于此若不重加懲創嚴行禁約此風何日止也如南京戶部河南清吏司主事張振選縱下人需索不能禁制反刑受害者以怙終䝉堂官戒示不行悔罪仍刑受害者以泄忿非惟執迷不返官守有虧抑且長惡不悛名分大壞此正所謂以違拗為得計者也合候命下將張振選革職冠帶閒住本部仍移咨都察院通行大小衙門今後敢有屬官抗違上官者俱照張振選處分上官有自降禮體款曲屬官平日不能督率有罪不行糾治者以不職論其各巡按御史皆當以公正為心不得仍庇進士推官知縣引為私人使各盡其上下之分違者聽本部都察院及科道官劾奏究治庶久塗之耳目可開而久紊之法紀可振其有裨于治道良非細也疏入得旨張振選著革了職冠帶閒住近來屬官不受約束上官不行糾治反為曲悅名分倒置政體大壞這所奏便行內外衙門一體戒飭以後再敢有這等的部院科道官著實參來重治不饒論諳逹貢市事疏萬歷五年方逄時臣䝉陛下特恩起臣草土中代崇古任賴陛下神武八年以來九邊生齒日繁守備日固田野日闢商賈日通邊民始知有生之樂北部輸誠效貢莫敢渝約嵗時請求隨宜與之得一果餅輒稽首歡笑有掠人要賞者告諳逹罰治即俯首聽命而異議者或曰敵使充斥為害或曰日益耗費彼欲終不可足或曰與寇益狎隱憂叵測此言心則忠矣事機或未覩也夫使者之入多者八九人少者二三人朝至夕去守貢之使賞至即歸何有充斥財貨之費有市本有撫賞計三鎮嵗費二十七萬較之曩時戶部客餉七十餘萬太僕馬價十數萬十才二三耳而民間耕穫之入市賈之利不預焉所省甚多何有耗費乃若所憂則有之然非隱也方庚午以前三軍暴骨萬姓流離城郭邱墟芻糧耗竭邊城首領不保朝廷為之旰食七八年來幸無此事矣若使臣等處置乖方吝小費而虧大信使一旦肆行侵掠則前日之憂立見何隱之有哉其所不可知者諳逹老矣誠恐數年之後此人既死諸部無所統一其中狡黠互相爭搆假託異辭遂行侵擾此則時變之或時而不可豫料者在我處之亦惟罷貢絶市閉關固壘以待仍禁邊將毋得輕舉使曲常在彼而直常在我因機處置顧後人方略何如耳夫封疆之事無定形亦無定機惟朝廷任用得人處置適冝何必拘拘焉貢市非而戰守是哉臣又聞之禦戎無上䇿征戰禍也和親辱也賂遺恥也今曰貢則非和親矣曰市則非賂遺矣既貢且市則無征戰矣臣幸藉威靈制伏強梗得免斧鉞之誅今受命還朝不復預聞閫外之事誠恐議者謂貢市非計輒有敷陳國是搖惑內則邊臣畏縮外則部落攜二事機乖忤後悔無及臣雖得去而犬馬之心實有不能一日忘者矣疏入帝從之遵旨議治黃運兩河疏萬歷六年潘季馴臣竊惟事師古者罔愆智不鑿者乃大孟子論智一章首以禹之治水為喻而論為政則曰為政不因先王之道可謂智乎是大智者事必師古而不師古則鑿矣然治河者必先求河水自然之性而後可施其疏築之功必先求古來巳試之效而後可倣其平成之業黃水來自崑崙入徐濟運歷邳宿桃清至清口㑹淮而東入于海淮水自洛及鳳城盱泗至清口㑹河而東入于海此兩河之故道即河水自然之性也元時嵗漕江南之粟由揚州直北出廟灣入海至永樂年間平江伯陳瑄始隄管家諸湖通淮河為運道然慮淮水漲溢東侵淮郡也故築髙家堰隄以捍之起武家墩經小大澗至阜寧湖而淮水無東侵之患矣又慮黃河漲溢南侵淮郡也故隄新城之北以捍之起清江浦沿鉢池山柳浦灣迤東而黃水無南侵之患矣猶慮河水自閘衝入不免泥淤故嚴啓間之禁止許漕艘鮮船由閘出入匙鑰掌之都漕五日發籌一放而官民船隻悉由五壩車盤是以淮郡晏然漕渠永賴而陳瑄之功至今未斬也後因剝蝕既久隄岸漸傾水從髙家堰决入一郡遂為魚鱉而當事者未考其故乃謂海口壅塞遂穿支渠以泄之蓋欲亟拯淮民之溺多方規畫以為疏導之計其意甚善而其心良亦苦矣詎知旁支暫開水勢陡趨西橋以上正河遂致淤阻而新開支河闊僅二十餘丈深僅丈許較之故道不及三十分之一耳豈能容受全河之水下流既壅上流自潰此崔鎮諸口所由決也今新開支渠尋復淤塞故河漸已通流雖深濶未及原河十分之一而兩河全下沙隨水刷欲其全復河身不難也河身既復面闊者七八里狹者亦不下三四百丈滔滔東下何水不容若猶以為不足而欲另尋他所别開一渠恐人力不至于此也以臣度之非惟不必另鑿一口即草灣亦須置之勿濬矣故為今之計惟有修復陳瑄之故業髙築南北兩隄以斷兩河之內灌而淮揚昏墊之苦可免至于塞黃浦口築寶應隄濬東關等淺修五閘復五壩之工次第舉之則淮以南之運道無虞矣堅塞桃源以下崔鎮口諸決而全河之水可歸故道至于兩岸遙隄或葺舊工或創新址或因髙岡或填窪下次第舉之則淮以北之運道無虞矣淮黃二河既無旁决竝驅入海則沙隨水刷海口自復而桃清淺阻又不足言矣此以水治水之法也若夫扒撈桃濬之說僅可施之于閘河耳黃河河身廣闊撈濬何期悍激湍流器具難下前人屢試無功徒費工料但恐伏秋水發淫潦相仍不免暴漲致傷兩隄故欲于磨臍溝陵城安娘城等處再築滾水壩三道萬一水髙于壩任其宣泄則兩隄可保而正河亦無淤塞之患矣徐州以南之工如此而已或有難臣者曰臣等欲順水性今淮水欲東而乃挽之使北黃水欲北而乃挽之使東無乃水性之未適乎臣曰水以海為性也決水乃過顙在山之水也非其性也或者又曰昔禹治河播九河同為逆河入于海今臣等乃欲塞諸決竝二瀆而不使之少殺耶縱有滾水壩僅去浮面之水百一耳亦烏能殺其勢也臣應之曰九河非禹所鑿特疏之耳蓋九河乃黃河必經之地勢不能避而禹仍合之同入于海其意蓋可想也况黃河經行之地惟河南之土最鬆禹導河入海止經郟縣孟津鞏縣三處皆隸今之河南一府其水未必如今之濁今自河南府之閿鄉縣起至歸德之虞城縣止凡五府河已全經其地而去禹導之時復三千餘年流日久河土日鬆土愈鬆水愈濁故平時之水以斗計之沙居其六一入伏秋則居其八矣以二升之水載八升之沙非極湍急即至停滯故水分則流緩流緩則沙停勢所必至者臣不暇逺引他證即以近事觀之草灣一開而西橋故道遂淤崔鎮一決而桃清以下遂澀去嵗水從崔家口出則秦溝遂為平陸此眼前事也又何疑哉所據司道諸臣款議前來臣復加參酌似應允從伏望敕下該部再加查議如果臣所言不謬俯賜俞允行臣即遵照及時興舉除工程夫役錢糧數目另本具陳其緊關工程如高家堰淮城北隄廠馬坡濬揚州諸淺并塞小缺口十四處工所必舉而伏前尚可舉事者一面分投興工外謹將條例開明請旨一議塞決以挽正河之水竊惟河水旁決則正流自微水勢既微則沙淤自積民生昏墊運道梗阻皆由此也臣查得淮以東則有高家堰朱家口黃浦口三決此淮水旁決處也桃源上下則有崔鎮口等大小二十九決則黃水旁決處也俱當築塞但伏秋之水相繼而至非惟地為水占無處取土抑且波濤洶湧為工不堅除將決口稍窄者現在分投興築外其決至數十丈以上者一面鳩集工料相時興舉一議築隄防以杜潰決之虞照得隄以防決隄不築則決不已故隄欲堅堅則可守而水不能攻隄欲逺逺則有容而水不能溢纍年事隄防者既無真土類多卑薄已非制矣且夾河束水窄狹尤甚是速之使決耳合無力監前弊凡隄必尋老土凡基必從高厚又必繹賈讓不與爭地之旨倣河南逺隄之制除豐沛太黃隄原址遙逺仍舊加幫外徐邳一帶舊隄查有迫近去處量行展築月隄仍于兩崖相度地形最窪易以奪河者另築遙隄桃清一帶南崖多附高岡但上自歸仁集以至朱連家墩古隄已壞相應復修下抵馬廠坡地形頗窪相應接築以成其勢北崖自古城至清河亦應創築遙隄一道不必再議縷隄徒糜財力又查清江浦外河一帶至柳浦灣止為淮城北隄除掃灣單薄量行加幫外但原基短促防護未周仍自柳浦灣至髙嶺創行接築四十餘里以遏兩河之水盡趨于海自清江浦運河至淮安西門一帶舊隄相應再行幫厚勿致裏河之水走泄妨運如此則諸隄悉固全河可恃矣一議復閘壩以防外河之衝查得先該平江伯陳瑄創開裹河仍恐外水內侵特建五閘設法甚嚴鎖鑰掌于漕撫啓閉屬之分司運畢即行封塞一應官民並回空船隻悉令車盤此在嘉靖初年尚爾循行故事制非弗善也奈何法久漸弛五閘已廢其一僅存四閘亦且坍塌殆盡漫無啓閉是以黃淮二水悉由此倒灌致傷運道合無議復舊制將現存四閘俱加修理嚴司啓閉俟二月前後糧運過完即行封閉俱加修理船隻方許啓放仍行查復五壩以便官民船隻照應車盤毋致曲徇使客致壞良規一議創建滾水壩以固隄岸照得黃河水濁固不可分然伏秋之間淫潦相仍勢必暴漲兩岸為隄所固水不能泄則奔潰之患有所不免今查得吕梁上洪之磨臍溝桃源之陵城清河之安娘城土性堅實合無各建滾水石壩一座此隄稍卑二三尺闊三十餘丈萬一水與隄平任其從壩滚出則歸漕者常盈而無淤塞之患出漕者得泄而無他潰之虞全河不分而隄自固矣一議止濬海工程以免糜費照得海口為兩河歸宿之地委應深闊但查海口原身自清口至安東縣面闊二三里自安東歷雲梯關至海口面闊七八里至十餘里深各三四丈不等止因去年旁決之後自桃清至西橋一帶淤塞尋復通流今雖未及原身十分之一而兩河之水全歸故道竝流洗刷深廣必可復舊至云相𫝊海口橫沙并東西二尖據土民季真等吐稱竝未望見潮上之時海舟通行無滯潮退沙面之水尚深二尺況橫沙并東西二尖各去海口三十餘里豈能阻礙河流故臣以為不必治亦不能治惟有塞決挽河沙隨水去治河即所以治海也别鑿一渠與復濬草灣徒費錢糧無濟于事一暫寢老黃河之議以仍利涉照得黃強淮弱每每逼淮東注故議者欲復老黃河故道冀使黃水稍避高堰民墊可瘳斯亦得䇿但勘得原河七十餘里中間故道久棄無論有水無水之地詢之居民俱失其真無從下手一不便也且已葉故道欲行開復必須深廣與正河等乃可奪流今現存大河口窄狹不及桃清三分之一而三義鎮入口之處背灣徑直猶恐水未必趨二不便也又其中流如魚溝鐵綿溝葉家口陰陽口等處地勢卑窪諸決之水漫流至此一望瀰茫築隄費巨且恐難保三不便也況今桃清遙隄議築則黃水自有容受崔鎮等決議塞則正河自日深廣高家堰議築則淮水自能㑹黃清江浦等閘議啓閉新城北隄議行接築則淮南高寶興鹽等處自無水患此河雖不必復可也疏入得旨工部看了來說查議黃河後患疏萬歷六年潘季馴臣猥以謭材謬膺重任畫夜思維欲求萬全之䇿以報陛下罔極之思食不甘味寢不貼席者三月矣而卒未能快于心也竊惟今之談河患者莫不曰徐邳河身墊高水易溢也崔鎮諸口未塞桃清淺阻也高堰黃浦淮水橫流淮揚之民久為魚鱉也淮黃兩河之水漫無歸宿海口沙墊也此徐州迤南之患耳耳目之所覩記運道之所必資故人人得而言之也臣已于前月二十八日㑹本具題陛下俯從臣請兩年之內或可脫淮揚昏墊之苦免運道梗阻之虞而臣亦得藉以少逭愆尤矣然其大可憂者不在此也敢敬陳之臣初抵淮安即詢黃河出接運道處所衆云出徐州小浮橋則臣喜以為此黃河故道之最順者也又詢水深若干衆云深四丈餘則臣又喜以為此河身之本體也又詢小浮橋迤西則為胡佃溝為梁樓溝為北陳為雁門集為石城集以上十五里則為崔家口即去嵗八月所決之口也其間淺深俱不能答臣即行淮安府管河同知王琰前往測度去後隨于四月二十九日親督淮北分司郎中佘毅中添注管河郎中張譽徐州管河兵備副使林紹添注管河副使張純沿河踏看行至徐州隨據王琰揭報前項河水深七八尺至二三尺不等而梁樓溝至北陳三十里則止深一尺六七寸散漫湖波一望無際原係民間住址陸地非比沙淤可刷故河流逾年而淺阻如故也臣不勝驚訝隨據徐州碭山鄉民段守金龔泮王霜等各呈稱老河故道自新集歷趙家圈蕭縣薊門出小浮橋一向安流名曰銅幫鐵底後因河南水患另開一道出小河口本河漸被沙淺至嘉靖三十七年河遂北徙忽東忽西靡有定向行水河底即是陸地比之故道髙出三丈有餘停阻泛濫妨運殃民懇乞開復老河上下永利等情臣當督前司道并山東管河道副使邵元哲河南管河道副使唐汝迪由夏鎮歷豐沛至崔家口復自崔家口歷河南歸德府之虞城夏邑商邱諸縣至新集閲視間則見黃河大勢以直趨潘家口矣隨據地方鄉老靳廷相等禀稱去此十二三里自丁家道口以下二百二十餘里舊河形跡現在儘可開復臣即自潘家口歷丁家道口馬牧集韓家道口司家道口牛黃堌趙家圈至蕭縣一帶地方委有河形中間淤平者四分之一地勢髙亢南趨便利用錐鑽深河底俱係滂沙見水即可衝刷又據夏邑虞城等縣鄉官王極鄉民歐陽照等七百餘人連名呈告俱為乞疏舊河便民事竊照黃河故道自虞城迤下蕭縣迤上夏邑迤北碭山迤南嘉靖年間岸闊底深水勢安流既于運河無虞亦于民田無害商賈通行貿易大遂民稱豐庶自嘉靖三十六年以後故道漸淤河隨北徙黃流泛溢青野汪洋居民十不存一運道屢年阻滯告乞早為開通上利下便是誠萬世盛舉等情臣度其言實為探本之論但道里遼逺工費巨艱復又沿河荒度更無省近可從者而臣猶冀崔家口一帶淺阻去處或可疏濬成河易為力也復督各官駕小舠至梁樓溝北陳等處躬親測量委果淺阻河底原係陸地委難衝刷蕭縣地方一望瀰漫民無粒食號訴之聲令人酸楚該縣城外環水為壑城中瀦水為池居民逃徙官吏嬰城難守現今題請遷縣臣竊思之一縣之害此其小也夫黃河并合汴沁諸水萬里湍流勢若奔馬徒然遇淺形如檻限其性必怒奔潰決裂之禍臣恐不在徐邳而在河南山東也止緣徐州以北非運道經行之所耳目之後人不及見止見其出自小浮橋而不考小浮橋之所自來遂以為無虞耳豈知水從上源決出運道必傷往年黃陵岡孫家渡趙皮寨之故轍不可鑒乎臣又查得新集故道河身深廣自元及我朝嘉靖年間行之甚利後一變而為溜溝再變而為濁河又再變而為秦溝止因河身淺澀隨行隨徙然皆有丈餘之水未若今之逾尺也淺愈甚則變愈速臣是以夙夜為懼也臣又查得此河先年亦嘗建議開復止緣工費浩繁因而寢閣臣竊料先時諸臣雖以工費為辭實非本心蓋誠慮黃河之性叵測萬一開復之後復有他決罪將安辭目前既有一河可通姑為茍安之計耳而不知臣子任君父之事惟當論可否不當論利害惟當計其功之必成不當慮其後之難必且所慮者他決也隨決隨塞亦非有甚難者故河變遷之後何處不溢何年不决寧爾不慮之乎臣與司道諸臣計之故河之復其利有五河從潘家口出小浮橋則新集迤東一帶河道俱為平陸曹單豐沛之民永無昏墊之苦一利也河身深廣受水必多每嵗可免泛溢之患虞夏豐沛之民得以安居樂業二利也河從南行去㑹通河甚逺閘渠可保無虞三利也來流既深建瓴之勢導滌自易則徐州以下河身亦因而深刷四利也必小浮橋之來流既安則秦溝可免復衝而茶城永無淤塞之虞五利也臣故以為復之便至于復故道難仍新衝易復故道勞仍新衝逸則臣計之熟矣然舍難就易趨逸避勞慮日後未可必之身謀而不惜將來必致之大患皆非臣之所以盡忠于陛下也臣勘議之後即擬具題但因伏水將發猶望水勢洶湧或可衝刷成渠近又行據同知王琰回稱勘得北陳等處原深一尺六七寸者今止深七八尺臣看得伏秋暴漲之時水增六尺有餘則客水消落之後不免仍存本體矣伏望敕下該部查議如果臣所言不謬擬議上請特差素識水性科臣一員前來候秋深水落與臣㑹同山東河南撫臣及兼理河道巡鹽御史躬親勘議如果可復即便估計錢糧㑹本題請早賜施行地方幸甚疏入帝不納恭報兩河工程次第疏萬歷六年潘季馴臣竊照治河之工築隄固難而塞決尤難今幸仰仗我皇上一誡默運上格天心河伯效靈諸決自塞臣原議欲挽旁決之水以歸正道今已悉從人願桃清而下昔如溝洫今皆洗刷深廣如故又查雲梯關海口大闢清口通利兩河順軌三月之間河形頓改止餘大澗口一十丈未合淮水尚分一小支東奔若天氣晴和功在旬日不足利也但黃河雖已歸正而隄不築則明嵗伏秋必復泛溢故堅築遙隄以固其防創築减水壩以殺其勢其工未可緩也髙堰之工斷流雖已可期而一線未足為恃必俟斷流之後隄內陸地乾出廣取其土加培髙厚方可無虞再查黃浦入淺二口皆因髙堰之水漫溢衝決髙堰既塞則二口之築自易湖隄閘座亦當次第告成崔鎮决水委已歸漕并趨雲梯關下海據稱留之無益應合一體建築遙隄復將磨臍溝減水壩移建本處姑留羅家等口以殺黃流似為允當工程次第此其大都矣再照築隄不難而取土為難或為水占或為沙掩逺搜深取務得膠淤老土方許填築夯杵竝舉務求堅實臣等三令五申諸司道朝乾夕惕惟此而已臣等猶慮官夫暗用飛沙填藏隄內無從辨驗又製鐵探筒數十具分散各工令其時時錐探臣等閲工之時亦將前器探試如筒內帶出浮沙揑不成顆即將本管官究治挖去改築真如燕雀壘巢日計分寸其工誠有不易者至于石土採運亦甚艱苦與其速而不堅孰若遲而可久故未可責效于旦夕也近因風雪大作地脈凍結難以興工目下暫擬陸續散失先逺後近至明年正月二十日以前鳩工再舉伏望皇上少紓南顧之憂容臣悉心料理務圗永賴之計必不敢茍且塞責以負任使謹具題疏入得旨工部知道恭報兩河工成疏萬歷七年潘季馴臣竊惟我朝建都燕冀轉輸運道實為咽喉自儀真至淮安則資淮河之水自清河至徐州則資黃河之水黃河自西而來淮河自南而來合流于清河縣之東經安東逹雲梯關而入于海此自宋及今兩瀆之故道也數年以來崔鎮諸口決而黃水遂北高堰黃浦決而淮水遂東桃清虹泗山陽髙寶興泰田廬墳墓俱成巨浸而入海故道幾成平陸臣等受事之初觸目驚心所至之處孑遺之民攀輿號泣觀者皆為隕涕然議論紛起有謂故道當棄者有謂諸決當留者有謂當開支河以殺下流者有謂海口當另行開濬者臣反覆計議棄故道則必欲乘新衝皆住址陸道漫不成渠一二淺澀難以浮舟不可也留諸決則正河必奪桃清之間僅存溝水淮揚兩郡一望成湖不可也開支河則黃河必不兩行自古紀之淮河泛溢隨地沮洳水中鑿渠則不能别尋他道則不得况殺者無幾而來者滔滔昏墊之患何時而止不可也惟有開濬海口一節于理為順方在猶䂊而工部移咨丁寧臣親詣踏看臣乃乘輕舠出雲梯關至海濵延袤四望則見積沙成灘中間行水之路不及十分之一然海口故道則廣自二三里以至十餘里詢之土人皆云往時深不可測近因淮黃分流止餘涓滴入海水少而緩故沙停而積海口淺而隘耳若兩河之水仍舊全歸故道則海口仍舊全復原額不必别尋開鑿徒費無益也臣乃思欲疏下流先固上源欲遏旁支先防正道遂決意塞決以挽其趨築遙隄以防其決建減水壩以殺其勢而保其隄一嵗之間兩河歸正沙刷水深海口大闢田廬盡復流移歸業禾黍頗登國計無阻民生亦有賴矣蓋築塞似為阻水而不知力不専則沙不刷阻之者乃所以疏之也合流似為益水而不知力不大則沙不滌益之者乃所以殺之也旁溢則水散而淺返正則水束而深水行沙面則見其高水行河底則見其卑此既治之後與未治之先光景大相懸殊也每嵗修防不失即此便為永圗借水攻沙以水治水臣䝉昧之見如此而已至于復閘壩嚴啓閉疏濬揚河之淺亦皆尋繹先臣陳瑄故業原無奇謀祕策駭人觀聽者偶幸成功殊非人力實皆仰賴我皇上仁孝格天中和建極誠敬潛孚而靈祇助順恩威並用而黎獻傾心念轉輸乃足國之資軫昏墊切警豫之慮宵旰靡遑絲綸屢飭其始也并河漕以一事權假便冝以任展布故臣等得效芻蕘之言其既也逮偷惰以警冥頑折淆言以定國是故臣等得竟胼胝之力俯從改折之議國計與民因咸紓特頒賞賚之仁臣工與夫役競勸致兹無競之功遂成一嵗之內今兩河蒸黎歌帝德而祝聖壽者自洋溢乎寰宇矣臣何敢貪天功以為已力哉除用過錢糧聽巡鹽衙門查核奏繳外謹將完過工程總數開坐伏乞敕下該部覆議差官勘閲明實施行疏入賚季馴等銀幣仍遣給事中尹瑾勘實御選明臣奏議卷二十九
