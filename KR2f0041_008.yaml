  text: 欽定四庫全書御選明臣奏議卷五
  hash: sha256:82796cb94041ce1be91f5de3c9dd787fed21b513a16b465c91311e2838288942
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_008-1a, image: WYG0445/WYG0445-0080a.png}
body:
  text: 乞取回中官王敬疏成化十八年王恕臣始為朝廷軫念淮揚蘇松等處地方飢荒軍民流亡恐臣等奉命不謹莫能區畫賑貸以致失所特遣近臣齎內帑錢物遠來救濟既喜且懼者纍日已而傳聞太監帶百十號馬快船隻裝載私鹽于江南收買玩好之物雖未委虛的第今大江南北飢荒殊甚斗米直七八十錢民有飢色野有餓莩老稚轉于溝壑壯者散而之四方不可勝數臣奉敕往來提督賑濟近來雖頗安妥而張口待哺者尚多若王敬此行為賑濟飢荒而來則太江南北億萬生靈蒙再造之恩陛下盛德大業可以比隆二帝三王國祚可以與天地相為悠久矣若為收買玩好之物而來似此聲勢張皇未免騷擾郡邑驚嚇吏民臣恐遠近傳聞將謂陛下惟珍竒是好而無憂民之心致使狂夫得以藉口非社稷之福也臣以為當此飢荒之際朝廷正宜裁冗員郤貢獻禁奢侈抑僥幸慎爵賞重名器輕徭役惜民力以收天下之心以培億萬年社稷之基本夫何織造旁午貢獻絡繹奢侈之風競起僥幸之門大開遂使爵賞冗濫名器混淆徭役繁興財力日屈欲斯民之不貧且盜得乎昔唐太宗遣使往涼州諷李大亮獻名鷹而大亮不可明皇令益州織半臂褶子琵琶捍撥鏤牙合子等蘇許公不奉詔其事載諸信史後之讀史者莫不稱太宗明皇之明李大亮蘇許公之忠今升下以上聖之資居至尊之位聰明睿知本乎天性仁孝誠敬不待勉強可以為堯舜可以邁湯武尚何太宗明皇之足言哉臣幸際明時備員巡撫偶有所聞若隱忍不言使陛下不知而天下國家受其弊豈忠臣乎非惟有愧于臯夔稷契伊傅周召豈不有愧于李大亮蘇許公之輩是以臣不避斧鉞為陛下言之者非為身家計也為社稷計耳惟陛下留神深思社稷幸甚生民幸甚疏入帝召敬還陳治安疏成化十九年王恕臣聞邇者敵人入侵內外戒嚴朝議以各邉軍餉不足也既遣官以糴買之以京營軍士不足也復遣官以清查之又以內帑銀物不足也而出征官軍無厚賞方今天下一家海內一國以言乎餉糧漕運之轉輸陸路之飛挽非不多也以言乎銀兩礦場之開辦糧草之折納非不廣也以言乎軍馬在京有四十餘衛所又有外衛番上之役到營而操練分將以統領非不衆也夫如是宜乎廩有餘粟而不可勝食矣庫有餘財而不可勝用矣軍士多且精而所向無敵矣奈何一旦有警輒見不足蓋承平日久安不慮糧費于冗食財費于侈用軍又疲于差占若王師不早出敵人不早退臣恐不止口外之被擾邉民之被虜其為患蓋有不可勝言者矣今敵人遠遁王師凱還此實皇上聖德格天天道助順將校用命之所致也然目前似無事矣臣不敢保其必無事似可安矣臣不敢保其必可安若謂敵人既遁必不來也臣不敢保其必不來書曰惟事事乃其有備有備無患孫子曰無恃其不來恃我有以待之此臣等居髙位享厚祿為國股肱者所當致意也伏望陛下當此間暇之時敕令諸司明其政刑量減在官冗食之人申嚴冒報功敘之罰重名器抑奔競則不加賦而糧自足矣少作無益之事不貴無用之物慎賜賚節用度則不厚斂而財自足矣免畚土輦石之差嚴私役買間之禁時教閲養鋭氣則不招集而軍自足矣三者既足則元氣自壯根本自固邪氣自不能入外侮自不敢入設有邉報需軍馬即有軍馬需糧草即有糧草需賞賜即有賞賜剋期而出相機而行以守則固以戰則勝何敵之不可破而何功之不可成哉茍不撙節愛養于平昔及其事至而欲取辦于一時臣未見其濟也此國家之大計廟堂之上必有以處之也若無待于臣言矣今臣言之者亦區區為國之心也惟聖明恕其狂瞽而裁察之幸甚疏入帝從之制治保邦疏成化十九年臣聞周官有曰制治于未亂保邦于未危誠以未亂而制則治必不至于亂未危而保邦則必不至于危使已亂而制治雖勞心經營終不能救其亂己危而保邦雖極力扶持終無以免其危此往古已驗之實事非俗儒間談之空言也臣不敢遠舉姑以近事言之宋徽宗初年天下太平蔡京倡邪説勸上作玉清神霄等宫崇信道士林靈素以朱勔領花石綱加以梁師成専務應奉是以民窮財盡政事不理國勢不競遂致方臘之亂而成靖康之禍方其初也使納言者之諫罷前項無益之事專以節用愛人為心使百官和于朝萬物和于野宋豈有衰乎方今天下太平四方寧謐國勢若金甌之完全無纎毫之缺損又况皇上聖德寬仁神武不殺上合天心下合民心禮樂法度之巍然典章文物之煥乎可謂治且安矣宜若可無慮矣然古人有言亂不生于亂而生于治治之極者亂之始此臣之所以為陛下憂也陛下雖一精執中無怠無荒第左右之感戴聖恩者思欲報之而不得其道崇飾非禮取容干進誠恐浸潤日久嗜欲日滋麋費日多財用日屈民日益窮事日益壞即不幸有數年之兵數年之荒不知何以為計欲如今日之安欲無後日之悔恐未能也此臣之所以願陛下制治于未亂之時保邦于未危之日以隆聖明萬億年無疆之丕緒也伏望陛下以古為鑑仍敕多官會議制治保邦之條件採而行之天下幸甚宗社幸甚疏入帝不納陳政治終始疏成化二十一年彭韶臣伏覩詔書凡朝廷政事缺失軍民利病許諸人直言無隱臣沗備員風憲之官幸遇聖明憂治之日不敢自諉在外隱忍緘默以仰負明詔求言之意謹以政治終始為陛下陳之夫更新曰始成功曰終使政治常新而不失事功常勤而有成雖堯舜之盛不能外矣伏聞近者星變既發于嵗暮又形于正旦此天心仁愛之至欲陛下善始善終而示于不言之表者也蓋嵗暮者天道之終正旦者嵗事之始天象兩見于此豈無意哉昔唐太宗時魏徴獻言有曰陛下志業比貞觀之初漸不克終者十事太宗嘉納至今稱為盛事臣愚妄謂今日之治不在他求惟守成化之初足矣兹于嵗首廣開言路禁止奢侈斥逐異端杜絶傳奉次第施行所謂漸不克終者非有如唐太宗之多然臣子之處心無異所望于聖明者不止于前數事也臣伏見陛下至聖至明若俯念四海為家之義少納臣子家衆之言以時裁正俾彝倫攸敘則隂陽不調災害不弭未之有也成化之初內侍近臣進用稀簡陛下防微之意蓋有在矣至于近年日有進益聞今大小名數將以萬計求之于古未見其比利源兵柄多付其手違禁犯科少有加罪所求能得所請輒從此慮防之意有未終者也夫貴近之臣人所畏憚久預外事便成重輕臣伏見陛下臨御以來洞察事機宜及此時斟酌裁省俾內外事務各還職守立為定制以傳于後實為萬世無疆之休不然異日故事已定偏重之勢遂成雖欲更張不可得己成化之初陛下之儉德已著兹者鎮守內外等官間有進奉仍照天順三年以前例行竊惟天順年間無事之時今遇災荒乃警戒之日古人遇有天災必皆減膳撤樂豈宜轉令進奉此持儉之德有未終者也前項官員不過剝取軍民之財以充進奉之名豈有出自己物哉而乃水陸勞擾人畜疲頓怨歸公家恩被私室誠無益也伏望陛下將此項罷免則天下幸甚成化之初陛下用人詳慎至于近日邉方多事內郡流移而公卿大臣無故而加之保傅及其致仕恩澤又月與之米嵗給之力無非所以禮大臣也然以是施于忠賢勞烈使人有所感奮若泛焉行之則人孰不思阿順從欲以圖日後之恩寵哉此用人之道有未終者也自古平治天下者責在大臣大臣自任既輕百司從而觀望後進一律世事將何賴耶伏望陛下慎重任使必忠賢而後優禮有勞力而後加官不惟其官惟其人則羣臣幸甚臣聞因事為功古人所貴即其已往而慎于方來斯為謹始而勿失則德澤加諸當時聲名昭于後世書曰終始惟一時乃日新又曰德日新萬邦惟懷此真陛下大聖人事也臣螻蟻微命隕越妄言不勝戰懼之至疏入帝不納論山陜救荒疏成化二十二年王恕臣伏聞近來禮部因陜西山西山東河南北直𨽻災傷題請查例令僧道關給度牒就彼納米給賑又聞湖廣鎮守太監韋貴奏稱飢民南流日有萬口請通行該巡撫將新舊流民招撫復業又聞大學士萬安等奏令生員納米準監民人等納米準授軍職俱赴災處上納給賑又聞差侍郎耿裕等祭告嶽鎮河海之神臣有以見皇上畏天憂民救荒恤患之心無所不用其極雖雲漢之詩所謂旱既太甚散無友紀靡神不舉靡人不周者何以過之臣惟陜西山西地方連年災傷米價貴甚閭閻小民貧苦者多殷實者少雖奉上項恩例恐願納者寡焉能濟衆臣思流民缺食無計聊生拊循失䇿必為盜賊勞師動衆所費益多合無將湖廣今年該起運南京各倉及兑軍秋糧量留一二十萬石運赴荆襄水次倉賑濟流民又將河南該兑軍秋糧量留一二十萬石運赴荆襄水次倉賑濟流民又將河南該兑軍秋糧量留一二十萬石賑濟本處飢民及四方流來之民以消後患如河南兑軍糧米無徴亦須别作區畫仍敕各處巡撫巡按提督三司委官如有流民到于該管地方即便加意賙恤不許驅逐致令失所且人一日不再食則飢兩三日不食則病不能起五六日不食則死此救荒當如拯溺救焚宜急而不宜緩緩則無及矣臣深慮各項納米急不能得有悮賑貸合無先出內帑銀二三十萬兩火速發出賑濟仍乞降詔將被災府縣今年稅銀買辦等項盡行蠲免如此庶幾全活生靈潛消後患易危就安轉禍為福有以見皇上深仁厚德含生之類益將感戴于無窮矣疏入帝從之進大學衍義補奏成化二十三年邱濬臣竊見宋儒真德秀所撰大學衍義四十三卷于大學八條目中有格物致知之要誠意正心之要修身之要齊家之要而于治國平天下之要缺焉臣不揆愚陋竊倣德秀凡例採輯五經諸史百氏之言補其缺略以為治國平天下之要立為十二目曰正朝廷曰正百官曰固邦本曰制國用曰明禮樂曰秩祭祀曰崇教化曰備規制曰慎刑憲曰嚴武備曰馭夷狄曰成功化又于各目之中分為條件凡一百十有九共為書一百六十卷補前書一卷目録三卷總一百六十四卷名之曰大學衍義補所以補德秀前書之缺也前書主于理而不出乎身家之外故其所衍之義大而簡臣之此書主于事而有以包乎天地之大故所衍之義細而詳其詳其簡各惟其宜若合二書言之前書其體此書其用也今已繕寫完備謹撰表文一通開寫卷首以進伏念臣濬逺方下士叨冒朝廷厚祿六轉官階以至今官一家溫飽三十餘年今年近七旬常恐一旦委命九泉有負國恩無以為報幸天假之以年以衰朽之餘任師儒之職無政務之擾得以暇日纂成此編第以性質昏庸學識迂僻加以老耄精力衰憊所見不能無偏所纂不能無誤然區區一念忠君愛國之誠蓋有出于語言文字之外者況臣所纂輯者非臣之私意杜撰無一而非古先聖賢經書史傳之前言往事也參以本朝之制附以一得之愚雖曰掇拾古人之緒餘亦或有以裨助聖政之萬一伏望皇上寬其妄作之誅察其願忠之意以清間之燕時賜省覽遇用人則檢正百官之類遇理財則檢制國用之類與凡臣庶有所建請朝廷有所區處各隨其事而檢其本類則一類之中條件之衆必有古人之事合于今時之宜者矣于是審而擇之酌古凖今因時制宜以應天下之變以成天下之變而其大要則又在于審察其幾微之先焉易曰惟幾也故能成天下之務此臣妄意著書之本指也臣之精力盡于此書皇上親政之始而繕寫通成蓋有天幸然也冒昧進獻不敢自謂其皆可用儻採于千百之中用其一二見于施行以成治效使臣平生竭力盡瘁報國之忠得以少效其萬分之一則臣學為有用而殁為不朽矣臣不勝懇悃願效之至為此謹具本親齎以所撰大學衍義補書四套計四十册隨本上進疏入帝下內閣議行漕運議成化二十三年邱濬臣按海運之法自秦已有之而唐人亦轉東吳粳稻以給幽燕原注見唐杜甫詩然以給邉方之用而己用之以足國則始于元焉初巴延平宋命張瑄等以宋圖籍自崇明由海道入京師至至元十九年始建海運之䇿命羅璧等造平砥海船運糧從海道抵直沽是時猶有中灤之運不專于海道也原注元初糧道自江入淮由黃河至封邱縣中灤旱站陸運至濬縣淇門一百八十里入御河二十八年立都漕運萬戶府以督嵗運至大中以江淮江浙賦財每嵗所辦糧充運自此以至末年專仰海運之道其初也自平江劉家港原注今在蘇州府崑山縣太倉入海至海門縣界開洋月餘始抵成山計其水程自上海至楊村馬頭凡一萬三千三百五十里最後千戶殷明略者又開新道從劉家港至崇明州三沙放洋向東行入黑水大洋取成山轉西至劉家島又至登州沙門島于萊州大洋入界河當舟入風順時有自浙西至京師不過旬日而已説者謂其雖有風濤漂溺之虞然視河漕之費所得蓋多故終元之世海運不廢我朝洪武三十年海運運七十萬石給遼東軍餉永樂初海運七十萬石至北京三十三年會通河通利始罷海運臣考元史食貨志論海運有云民無挽輸之勞國有儲蓄之富以為一代良法又云海運視河漕之數所得蓋多作元史者皆國初史臣其人皆生長勝國之時習見海運之利所言非無徴者臣則謂自古漕運所從之道有三曰陸曰海曰河河漕視陸運之費省十三四海運視陸運之費省什七八蓋河漕雖免陸行而人挽如故海運雖有漂溺之患而省牽卒之勞較其利害蓋亦相當今漕河通利嵗運充積固無資于海運也然善謀國者恆于未事之先而為意外之慮寧過慮而不為臨事之悔今國家都燕蓋極北之地而財賦之入皆自東南而來會通一河譬人身之咽喉也一日食不下咽立有死亡之禍况自古皆是轉般而以鹽為傭直今則専役軍夫長運而加以兑支之耗嵗嵗常運儲積之糧雖多而正戍之卒日少食固足矣如兵之不足何迂儒過為遠慮請于無事之秋尋元人海運之故道别通海運一路與河漕並行江西湖廣江東之粟照舊河運而以浙西東瀕海一帶原注浙江布政司及常州蘇州松江三府由海通運使人習知海道一旦漕渠少有滯塞此不來而彼來是亦思患豫防之先計也臣家居海隅頗知海舟之便舟行海洋不畏深而畏淺不慮風而慮礁故製海舟者必為尖底首尾必俱置柁猝遇暴風轉帆為難亟以尾為首縱其所如且暴風之作多在盛夏今後率以正月以後開船置長篙以料角定盤針以取向一如番舶之制夫海運之利以其放洋而其險亦以其放洋今欲免放洋之害宜預遣習知海道者起自蘇州劉家港訪問傍海居民捕魚漁戶煎鹽竈丁逐一次第踏視海涯有無行舟潢道泊舟港汊沙石多寡洲渚遠近親行試驗委曲為之設法可通則通可塞則塞可回避則回避畫圖具本以為傍海通運之法萬一可行是亦良便若夫占視風候之説見于沈氏筆談每日五鼓初起視星月明潔四際至地皆無雲氣便可行舟至于已時即止則不遇暴風矣中道忽見雲起即便易柁回舟仍泊舊處如此可保萬全永無沉溺之患萬一臣言可采乞先行下閩廣二藩訪尋舊時通番舤海之人原注許其自首免其本罪及行廣東鹽課提舉司歸德等場起取慣駕海舟竈丁令有司優給津使即至訪詢其中知海道曲折者以海道事宜訪以事成加以官賞俾其監工照依海泊式樣造為運舟及一應合用器物就行委官督令其人起自蘇州歷揚淮青登等府直抵直沽濱海去處踏看可行與否先成運舟十數艘付與駕使給以月糧俾其沿海按視經行停泊去處所至以山島港汊為標識詢看是何州縣地方一一紀録造成圖册縱其往來十數次既已通習保其決然可行無疑然後于崑山太倉起蓋船厰將工部原𣲖船料差官于此收貯照依現式造為海運尖砥船隻每船量定軍夫若干裝載若干大抵海舟與河舟不同河舟畏淺故宜輕海舟畏漂故宜重假使海艘載八百石則為造一千石舟許其以二百石載私貨三年之後軍夫自載者三十稅一客商附載者照依稅課常例就于直沽立一宣課司收貯以為嵗造船料之費其糧既從海運腳費比漕河為省其兑支之加耗宜量為減殺大約海舟一載千石則可當河舟所載之三河舟用卒十人海舟加五或倍則漕卒亦比舊省矣此非獨可以足國用自此京城百貨駢集而公私俱足矣宋朱子文集其奏劄言廣東海路至浙東為近宜于福建廣東沿海去處招邀米客元史載順帝末年山東河南之路不通國用不繼至正十九年議遣戶部尚書貢師泰往福建以閩鹽易糧給京師得數十萬石京師賴焉其後陳友定亦自閩中海運進奉不絶然則此道若通閩廣之綱運亦可以來不但兩浙也況今京師公私所用多資南方貨物而貨物之來苦于運河窄淺船艫擠塞腳費倍于物直貨物所以踴貴而用度為艱此䇿既行則南貨日集于北空船南回者必須貨實而北貨亦日流于南矣今日富國足用之䇿莫大于此説者若謂海運險遠恐其損人廢財請以元史質之其海運自至元二十年始至天歷二年止備載逐年所至之數以見其所説不無意也臣恐今日河運之糧每年所失不止此數況海運無剝淺之費無挨次之守而其支克之加耗每石須有所減恐亦浮于所失之數矣此䇿既行果利多而害少又量將江淮荆湖之漕折半入海運除減軍卒以還隊伍則兵食兩足而國家亦有水戰之備可以制伏朝鮮安南邉海之夷此誠萬世之利也臣謹議議奏帝不納陳時事疏成化二十三年鄒智臣惟體乾者人君之職贊化者宰輔之事陛下之于輔臣有缺必須有事必咨有殊恩異數必加亦云任矣然或改革一政進退一人處分一軍國重事往往出自內批其實一二小人者隂執其柄是既任之而又疑之也夫陛下任之而又疑之者豈不欲推誠以待物哉竊意其進身之初多出于私門有以致陛下之厭薄矣至于議事之時又唯唯諾諾若不能然伈伈俔俔若不敢然甘于模稜恬于伴食此陛下所以既任而疑之也臣竊以為過矣宋之英主無出仁宗夏竦懷姦挾詐辜負任使則罷斥之吕夷簡痛改前非力圖後效則包容之杜衍韓琦范仲淹富弼抱才氣有重望則不次擢之故能北敵契丹西臣元昊號為太平未聞一任一疑可以成天下之事也臣願陛下察孰為夏竦則斥之孰為夷簡則容之孰為杜衍韓琦范仲淹富弼則擢之召至便殿給以筆札使條陳治平天下之道不使小人得以參錯其間則天工于是乎亮矣臣又聞天下之事惟輔臣得以議之惟諫官得以言之諫官雖卑與輔臣等宋神宗將定官制謂蒲宗孟曰御史大夫非司馬光不可古人慎重諫官有如此者今之諫官以軀體魁梧為美以應對捷給為賢羣居終日罔思盡職甚則曰吾舌非不能言吾舌非不欲言吾官非不可言但言出而禍隨之其誰吾聽耶嗚呼既不進言以稱其職而復引咎以歸于君有人心者何忍為此臣願罷斥浮沉之輩廣求風節之臣使之得展底藴言有可採次第施行則天聽于是乎開矣臣又聞猛虎在山藜藿不採汲黯在朝淮南寢謀正人君子之有益于人國也大矣夫以陛下之聰明豈不知天下之事必得正人君子而後可任哉特以其所言所行利于公室而不利于私家故小人巧為讒間以中傷之耳姑以臣所知者言之如兵部尚書王恕元勳碩德顧削其爵監察御史強珍忠肝義膽顧禠其權他如章懋之亮直林俊之剛方張吉之純雅或斥之或疏之或竄之使不得一遂此豈上天生賢之意哉臣願陛下將王恕等分居要地使各盡其平生以圖來效則天心于是乎協矣臣又聞范祖禹有言國家之敗未有不由輕變祖宗之舊者我太祖髙皇帝監前古之迹識禍亂之原故凡寺人之徒惟供掃除之役頃年舊章日壞邪徑日開人主大權盡出刑餘之手內倚之為相外倚之為將藩省倚之為鎮撫其他耳目之所不加思慮之所不及尤有不可勝言者歐陽修曰宦官之禍甚于女寵可不念哉可不畏哉臣願陛下以宰相為股肱以諫官為耳目以正人君子為腹心深思極慮定宗社生靈長久之計則大綱于是乎正矣然深究其本則在陛下之明理以應事耳臣願陛下思事理之難窮考之于經驗之于史會之于心體之于身無一日之不然則所當為者不得不為所不當為者不得不去矣豈特四事之舉而己哉疏入帝不納論濫升內官奏𢎞治元年王恕臣伏覩祖訓條章內府各監局等衙門內官俱有定員各有職掌洪武永樂年間未嘗額外濫設其太監等官非歷練老成縱有聰明才俊亦不輕授近年以來則不然矣陛下前將內官論年遞降蓋矯往年濫升之弊欲復祖宗之舊制也臣于病中風聞近日又升一起內官其數頗多不知是日前遞降者不知另是一起也前既以為濫而遞降之今何不以為濫而升之似乎不可陛下嗣位之初人心歸向如古之二帝三王本朝太祖太宗復見于今日莫不稱頌而愛戴之蓋聞陛下在青宫時存心正大不喜聲色不貴貨利及登寶位治近習蠧國亂政邪術欺君罔上之罪革罷傳奉冗員追回濫賞莊田蟒衣等項裁抑奢侈奔競凡此數事皆壞名器損國體傷民財臣民所不欲而不能革非一日矣陛下一旦而盡革之此天下臣民所以稱頌而愛戴之也夫何未久而又濫升內官如此若復濫升莊田蟒衣將見前數事不數年復如舊矣欲天下臣民稱頌而愛戴之如今日恐不可得此天命去就人心離合之幾也可不慎哉况今北敵在邉災異迭見此正君臣上下同加修省之時而國政如此其何以服遠人而弭天變伏望陛下自今伊始于出入起居之時發號施令之際務守祖宗之法決不可為巧言所惑蹈襲前事上拂天意下失人心而為社稷憂臣誠激于中詞不能婉干冒天威無任戰栗隕越之至疏入有旨這起內官隨侍春宫年久因遇節日各量升一級了罷請講學聽政疏𢎞治元年楊守陳臣聞孟子曰我非堯舜之道不敢陳于王前故齊人莫如我敬王也臣于孟子固非其倫然而敬君之誠異世同心孟子于侯國之君尚陳堯舜之道況逄天王之明聖者乎夫堯舜之道一也書曰人心惟危道心惟微惟精惟一允執厥中此堯舜之得于內者深而為出治之本者也又曰詢于四嶽闢四門明四目逹四聰此堯舜之資于外者博而為致治之綱者也本立則末自茂綱舉則目自張故不勞而庶績熙無為而天下治也陛下御極以來放遠姦邪登用正人聽納忠諌躬覽題奏勤政若此可謂堯舜之君故天下翹首以望唐虞之治獨臣之愚猶有過慮蓋革故而正始猶易持久而保終實難臣昔沗侍從伏覩陛下儼然端拱朗誦經書未嘗降一睿問以究聖賢之奧旨儒臣肅然進退略陳訓詁未嘗進一詳説以闡帝王之全道理欲危微之辨何自而明知行精一之功何從而盡臣恐陛下之得于內者未若堯舜之深也今陛下視朝所接見者惟大臣之風儀而己至于君子小人之情狀小官遠臣之才行何由識之退朝所閲覽者惟百官之題奏而己至于諸史之條例羣吏之情弊何由見之宫中所聽信者惟內臣之語言而已至于千官百職之正論六軍萬姓之煩言何由聞之賢才不能以自逹聰明時有所偏臣恐陛下之資藉于外者未若堯舜之博也內得未深外資未博如木之方植而易搖如泉之始導而易塞倘或鋭志少懈欲心漸滋則今日之所放遠者異時將召而親之今日之所登用者異日將憎而斥之今日之所聽納者異日將厭而拒之今日之所勤覽者異日將嫌而麾之豈能始終如一而純乎堯舜之道哉此臣之所以過慮也伏望陛下遵用祖宗舊制仍開大小經筵以講學常御早午二朝以聽政其經筵則必擇端介博雅之儒臣侍班進講陛下聽講之際凡所未明輒賜清問若復有疑更加詳詰講官或訥則侍班諸臣佐之覆解詳釋旁引曲喻必得聖心洞然明悟而後已凡聖賢之旨帝王之道與夫理欲危微之所以辨知行精一之所以盡以及人臣何者為賢何者為否政事何者為得或者為失天下因何而治亂歷代為何而興亡若此之類皆必講之明而無疑乃可行之篤而無懈凡經書典訓及歷代諸史百官題奏皆當聚之文華殿後日輪大臣講官使居前殿之右廂凡遇題奏或有竒字奧義則録示講官使解或召問使對一日之間陛下居外朝之時多處深宫之時少則欲寡而心清惑少而理明當萬幾間暇之際湛然凝思常恐欲心長而理心微邪佞進而忠良退必使心常得其正事常執其中則陛下之得于內者深而出治之本立矣至若午朝則御文華門而五府六部都察院堂上官并六科各輪番列侍其御史郎中等官有事已具本者皆先用揭帖略節口奏陛下詢其事情條分而裁決之鎮守撫按及府衛有自任所來見者皆條陳地方之事亦略節口奏陛下令諸司承旨議行有見辭赴任者隨其地方職任而諭戒之若有大政則陛下御文華殿召內閣及府部院寺大臣會議使人各盡其謀而勿相推避事必求其當而勿至茍且議若未當則許諫官駁正必得至當之論而審行之其具本進者召內閣大臣面議可否批答凡大小官員當奏事見辭之際陛下必俯降顔色或詢時政或詢賢才以及諸司利弊兵民休戚年嵗豐歉下至五方之風俗四夷之情狀俾各從實以對言有忠讜切實之議行之其讒佞諂諛者斥逐之愚蠢狂直者容恕之謇訥不能言者令具本奏之俾賢才常集于目前視聽不偏于左右合天下之耳目為一已之聰明則陛下之資于外者博而致治之綱舉矣若謂經書不必與儒臣問答謂政事不必與羣臣面諭凡百題奏皆付內監諸臣調旨批答即可以致治則豈有不立其本而末能茂不舉其綱而目能張者哉疏入帝從之復午朝召大臣面議政事講明律意疏𢎞治元年馬文升臣謹奏伏覩大明律內一欵凡國家律令參酌事情輕重定立罪名頒行天下永為遵守百司官吏務要熟讀講明律意剖決事務每遇年終在內從都察院在外從巡按御史提刑按察司官按治去處考校若不能講解不曉律意者初犯罰俸錢一月再犯笞四十附過三犯于本衙遞降敘用欽此欽遵外臣惟國家大事則莫先于刑獄刑獄所重莫先于人命蓋以死者不可復生絶者不可復續自古帝王莫不慎刑獄而重民命也仰惟我太祖高皇帝膺天眷命奄有萬方臨御之初屢詔大臣更定新律至于五六為之弗倦以求至當復命刑官重會衆律親御宸翰為之裁定務協厥中而于人命尤致意焉是以當時司刑官員多所用心而于律意務為講明鞫讞之際少有失平隂陽以和風雨以時而天下無寃民矣近年以年兩京法司官員或由進士初除寺正寺副主事評事或由知州行人就升員外郎郎中而御史亦多知縣所除到任之後未經問刑就便斷獄公差所以律條多不熟讀而律意亦未講明所問囚人不過移情就律將就發落且笞杖徒流縱有所往為害未大至于人命一有所寃關繫匪輕且如強盜􅌪主重在造意若窩藏強盜而不曽造意同謀雖分贓亦難問擬斬罪又如官吏懷挾私讎故勘平人因而致死重在懷挾私讎若因事到官但有笞罪雖勘至死亦可止問擬因公毆人至死徒罪又如故殺鬪毆殺人若兩人相爭互相毆打毆死一人則名鬪毆殺人一人未曽動手一人于彼致命去處有意致死則名故殺此等律意人多忽略有將強盜窩主未曽造意同謀止是分贓及官吏因公事毆人致死本無私讎故勘情由而俱問擬斬罪者有本係鬪毆而問擬故殺斬罪者有本擬故殺而郤擬鬪毆殺人絞罪者甚至謀殺故殺無尸撿驗而問擬斬罪輒取情真罪當奏請處決者或本因與人妻妾通姦其夫别項身死而問擬本婦因姦同謀殺死親夫凌遲處死姦夫斬罪者其他以非為是以重為輕者非一查得數年之間天下布按二司等衙門呈詳死罪重囚本院并刑部詳擬明白大理寺復詳合律該科覆奏處決幸蒙憲宗皇帝慈愛仁厚不忍殺人止令監著恭遇皇上嗣登寶位重念刑獄屢下明詔強盜無贓仗人命無尸檢驗者具奏定奪其節年原監該決重囚近日辦理寬宥者亦多若使當時就令處決則含冤而死者不知幾人矣其所以傷和召災者果誰之咎哉法司尚然則其餘府州縣衛所囚犯枉抑者而死又不知其幾何矣此皆原問官員律學未講律意未明之故也況府州縣官員多有不曉刑名不知律意者遇有刑名事務多有不能剖決問理而惟聽于主文之人蓋由巡按御史按察司官按治去處不行考校之故也臣愚乞敕兩京法司堂上督令所屬官天下都布二司督令折事理問及浙江等按察司官並各府推官各要將大明律條熟讀講解深明其意不許似前忽略置而不講其問囚之際參錯訊鞫務在得其真情方其取招議罪之時尤須原情定擬不許輕易致有寃抑獄成之後難以辨明及通行天下大小衙門並兩京部屬官吏各置大明律一本朝夕熟讀用心講解務曉其意仍通行各處巡按御史按察司分巡官按治去處遵依大明律內事理從公考校若有不能講解不曉律意者依律施行當奏請並降用者徑自具奏發落仍乞敕吏部行移法司將撥去辦事進士就令與現任官員一同問刑以後該選之時兩京法司有缺先儘各衙門問刑進士除授如果法司無缺方令除授别部等衙門庶使人精法律而刑鮮濫施之弊獄無枉抑而世砥刑措之美緣係講明律意以重人命事理未敢擅便謹題請旨疏入帝不納請勤政事疏𢎞治元年馬文升臣謹奏為法乾健以勤聖政事照得近來各處具奏地震而雲南尤甚近者天象示警彗星偶見此皆上天仁愛皇上之意也皇上憂勤惕厲減膳撤樂凡有遊燕悉為停止此又應天以實而不以虗文也將見彗星漸消與宋景公一言而熒惑退三舍者無異信乎天人相與之際甚不偶矣臣惟帝王之德莫先于勤勤則裁決萬幾而無少壅滯上天之道惟在于健健則發生萬物而無或差􅑯是則天道聖德實相吻合故易曰天行健君子以自強不息臯陶之告禹亦曰兢兢業業一日二日萬幾史書美大禹曰克勤克儉是皆以勤而成聖德所以載之經史而垂光萬世也洪惟我太祖高皇帝以至憲宗純皇帝俱昧爽視朝早朝後日每二次裁決在京各衙門並天下一應章奏或有大政事復召大臣面議而行此我朝列聖之定規也恭惟皇上膺上天之眷命紹祖宗之鴻圖即位之初宵衣旰食勵精圖治視朝決事悉遵祖宗舊規日長時月每日又有午朝之舉誠足以㜶美古帝王而克紹祖宗也近年以來視朝稍晏間或早而復晏日止裁決章奏一次此固皇上頤養天和保固皇躬雖得君逸臣勞之道但所其無逸帝王所重仰惟皇上清心講學節膳寡欲聲色不邇貨利不殖篤志以求道遊藝以養心雖古帝王祈天永命之道亦不過此又豈待于他有所求哉今視朝固亦早矣但日止裁決庶事一次非所以率由舊章而垂法後昆也甚有以掩皇上勤政之心其于聖德所關甚大臣則惜焉伏望皇上自今法天道之健遵祖宗之訓每日二次裁決庶務而視朝常常如此則聖心之政不異于初政祖宗之規不改于今日其于聖德實非小補而砥堯舜之治亦不難矣伏乞聖明留意宗社幸甚天下幸甚疏入帝不納御選明臣奏議卷五
