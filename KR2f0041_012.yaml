body:
  text: 應詔陳言疏𢎞治十一年何孟春臣聞范睢獻秦王書曰語之至者臣不敢載之于書其淺者不足言也宋蘇軾曰臣試論其小者而大者將有待而後言也夫言係乎事事視乎時時之所急雖小而非泛言非時之所急君子不以溷其君乃者清寧宫災陛下夙夜祗畏敕天之戒特詔廷臣痛加修省凡有所見許其直言浹月之間囊封投匭延頸企踵顒俟報可而所見施行未盡遂言者之所望其所言者皆非時所急耶當世之務入于弊者多矣臣敢先以果聽斷公委任為陛下陳焉而始及之前日宦官李廣未死陛下于聽斷委任不無假借今廣身死罪露宵旰之間聽斷果矣朝廷之上委任公矣臣猶以為言者蓋欲陛下即已往以戒將來也人君御煩治廣茍聽斷不果意緒紊于遲回藻鑑昏于私繫則政出多門命從中降而紀綱不立爵非士共罪非衆棄而賞罰不明前之所是著為律後之所是疏為令而號令不一史稱漢宣神雀五鳯之治吏稱民安由其信實必罰聽斷惟精以得之也元帝嗣阼權入恭顯之手而宣業遂衰由其優遊不斷牽制文義以失之也近者陛下于各衙門所奏事宜或不即出出則有非原所議擬者中間豈無有奔走幸門交結近侍以相引救者乎躁者望速化戾者覬茍免私者願獨利左右之人惟利是嗜惟黨是親所偏好則曲為掩覆所偏惡則橫肆擠排是以人言籍籍謂某人某隂為之地某事某隂為之間如都御史王越以傳奉見斥及推西路總制乃閲數人而用越其間得無有譽越于陛下者乎給事中王綸奉詔補外乃踰年而後得參議其先得無有毁綸者乎甘肅守臣請封哈密兵部具題欲無差官陛下不允所奏及擬人以上閲一月而又準不差官夫前欲差官者陛下之意久而不差必所差之人有非陛下意所欲者庸知左右不有欲差其所厚者矣僥幸功名因無陛下之命而遂致中止乎陛下英睿邁古不應左右能預末議惟遇事稍涉遲緩故或有如李廣者得進言也近年各官所上封事多有久留中者彼所言不干廟廊則觸權貴鰓鰓然常恐彼禍而陛下輒復留中使彼不得請命徘徊鬱塞叩天無路何也夫事之可與不可行與不行兩言而決耳陛下豈欲留陳斧扆時省覽耶抑欲保全言者以滅謗耶又或其言謬悠無可採耶計彼之敢于上聞傾瀝肝膽熟思審計非以為巳謀也以為已謀小加譴黜大止典刑可也非為已謀則于國家之慮縱有不熟思審計者陛下亦當節短取長未可漫無别白使為左右者得以成其曖昧之禍而誣風節之士也陛下始意圖治求言甚切先朝以言被黜之人如林俊輩無不起用而御史彭程胡獻以言事罷斥給事中胡易猶在禁獄臣恐非陛下求言始意也伏乞速賜矜憫以釋論者之疑昔唐太宗問魏徴比來政治徴對曰陛下貞觀初導人使諫見諫者悅而從之比年勉強受諫而不平也徴之對不及政治而政治之進退實決于此臣願陛下一審察焉得頌不如得針得唯唯不如得諤諤得所可悅不如得所可警人情不甚相逺彼顧欲噓死灰以自焚啖野葛而自毒耶白璧不可為容容多後福有能奮然不顧盡其言于天子者蓋素有風節之士不多得也而言脫其口咎攻其身怨種于前患生于後彼非失心遺死生之人則誰肯更言者將來流弊人且浮沉自營心口相戒甘茍玩以誇太平執文具以為觀美務因循而長偷慢樂軟熟而憎剴切隨時好尚以固寵榮雷同是非以便附會臣不職此于盛世安所取乎臣所以願陛下之聽斷果也天下大器也措諸安地則安措諸危地則危然舉而措之一人之力不能濟故必借其力于下而使下咸與其力然君子與力則安小人與力則危故力不可又輕借也易師之六五曰長子帥師弟子輿尸謂君子用事而使小人參之之過也參术以補芩黃泄之不可以為醫繩墨以引斧斤背之不可以為器甘滑以進苦澀雜之不可以為味理必然者陛下今所委任不為乏人然上下情隔忠誠未孚動遭掣肘貂璫乘之然運潛持隂邪之徑貨利之關日闢日廣爭馳捷出人才雜揉吏事滋蠧陛下且不知其底止矣然其致此則固有由也古之君臣相與以圖天下之治都俞吁咈談燕一堂推置心腹洞徹表裏纎芥之嫌不萌其間是以其臣知無不言言無不盡出其身為天下營各執其職而始終無所避忌而其君所為而成所欲而遂陛下能如此乎臣生長外郡見郡守所屬來謁必門卒為通無不賂門卒者所上簿書必付房吏看詳所屬恐其尋隙無不賂房吏者門卒房吏于守何親而得賈利而假權况乎人主之左右哉外廷固不如內廷之近密也士大夫固不如宦官宫妾之褻昵也前李廣未死陛下之政事彼得而撓人才用舍彼得而議九重非時之旨諭彼亦可以時而假也羣臣趦趄于外觀望風旨固李廣之不若也于是有苞苴其門相與生盟死結者矣名位巳盛欲其固基宦遊未達欲其進級地在間逺欲其招携迹涉孤危欲其倍植事防注誤欲其回護衣冠清流豈直不知恥哉無以結知于陛下故結知于升下之左右也憂時之念奪于有我之私徇國之誠不敵營身之計士風如此陛下可無挽之歟近科道請按李廣贓簿以治交結者罪陛下但令指名以上而卒置不究科道所指之人得于所聞縱未皆實陛下亦當黜一二之尤者矣警後來也令陛下用意過厚殆謂彼附李廣由廣有寵廣死彼將自罷何足深責以敗士類陛下于此可謂惜大體矣臣以為陛下果有此意莫若自今以後公于委任自古願治之君無不詳責于臣下而考其政詳責于臣下故賢否不能隱考其政故是非不敢私其所以使之不能隱不敢私者非用智術以伺察猜防也恭惟我祖宗在位優接臣下罔有間隔早朝奏事未畢每于晚朝盡之遇有機務輒駕御左順門召六部大臣與之商榷然後施行今陛下視朝稀闊通政司引奏之外德音不可復聞天下事一切徴諸尺牘臣惟臣下之告君見于疏奏不如見于對陳之為切蓋疏奏者剴切言之而不足對陳者從容出之而有餘疏奏者堂亷髙逺或蔽于讒邪對陳者公論具存無憂于扞格今羣臣有得更畨需次對陳于陛下者乎是以賢否是非左右得以調停消息而陛下無由知之將何以詳責于臣下而考其政哉臣願陛下明目達聰兼聽博采日與內閣講論當世之務大小內外一一付部詳議既得畫一則斷而行之不以小恩廢大義不以私憾枉公法不以舊習妨新政不迷于兩可之辭不沮于交鬭之口如此而行不當者少矣其不勝任之人科道劾之而彼非被空文陛下斥之而彼更無遺憾豈復肯以賂結左右而取罪哉士大夫之氣既作宦官宫妾之勢自不得行臣所以願陛下之委任公也若夫時政之入于弊者請别白而終言之其一曰臣聞郡守縣令民之師帥縣得人則百里受其賜郡得人則千里蒙其庇或非其人則百里千里攖其害聖君在上思天下匹夫匹婦有一不獲其所猶為不可况千里百里之生靈可寄之于匪人乎臣觀今之為陛下守令者有非其人者矣狼羊相牧禽犢是資闒茸齷齪所在皆是陛下之名有不獲其所者矣筋骨疲于鞕撲肌虜刮于銛刀終歲瘡痍痛定復痛知治體者能無怵然古者郡守入相郎官出宰守令之職甚不輕也今之為知府者皆四品延臣纍日積久而後至宜少不才者府佐及知州知縣佐二等官則進士出身者十三四監生吏員出身者十六七而世之所重在進士其考課之法旌異之典獨詳至監生吏員出身者不才者恕于考課才者略于旌異此其弊也論者曰進士年少氣鋭州縣職非彼所止彼能自不安故愛小成而多舉職旌異之典宜先焉監生吏員出身者大率志氣銷蝕精力疲憊無有幹局貪利而昧事相沿成風若考課弗恕十人而九皆坐可黜之列無以酬其燈火棲遲之望塵埃奔走之勞矣其間有鐵中錚錚者雖間被上司旌異部議又以此非進士無所事旌異也臣以為不然趙禹之才出于佐史龔勝之賢發于郡吏黃霸丙吉薜宣非漢名相乎嘗為卒史為獄吏為書佐矣人才何常之有作之則振摧之則靡進之則前退之則郤所賴上之人執其機耳天下善人少不善人多號名進士者亦有不才者矣況今郡縣之官不皆進士監坐吏員出身者常居大半而上復無以為作之進之機采名不采實惟其出身為之拘而不較其才使監生吏員出身者才者無以見其能而不才者遂無顧藉曰我非進士比空自苦何為于是受賂營私不復以承流宣化為事上司空則厚奉迎以寬指摘節玩好以市姑息幸不失官則以嵗月廣為子孫之地是監生吏員出身者無勸于前無懲于後幾何其不率天下而為不才之歸也天下之名又何辜焉祖宗時其取人也廣其察之也核待之也均凡諸途出身之人皆數人外乃少可旌異者此考課不嚴之弊也臣愚欲令撫按以及分巡官凡遇所屬府州縣掌倅官員有政績超卓者遞行核實奏聞旌異不以其出身之異而偏低昻之衡不廢乎資格之循而無形迹之泥進士出身者將益有所激發監生吏員出身者亦將不肯自棄矣至于考課之道古今有二一察其守一視其為守以廉為以能而課牧民之官者又以得民心為本世有廉者未必能有能者未必得民心而民愛之者非有噢咻撫循之政而無歎息愁怨之聲不能也臣故以得民心為考課府州縣官之最郡縣官之有亷者有能者有得民之愛者該部既按實以擢用之又每嵗取其亷且能而民愛之者一人奏為髙第如漢故事陛下特降璽書奬諭以風天下使為守令者知愛民是尚而循良之歸民將受賜于無窮矣其二曰臣聞國初未嘗有巡撫宣德間始設于南直𨽻河南山陕今則除浙江福建外悉有常置秩皆都御史邉方領制置之權腹裏兼轉運之職手持敇旨以便冝行事三司屬其管轄數郡係以慘舒是固不可不謹擇而久任之也臣見吏部推各處巡撫腹裏則會户部邉方則會兵部審酌已定而後請上親擇何謹如之然其受任往往不久人方與地冝而地莫能留地方得其人而人莫與處功垂成而來者交籍事未集而謀者已易其又不然者屬府未及按部下情未及體悉六條未及舉刺庶務未及興革席不暇暖而座已非矣今制嵗差御史一員巡按各處若巡撫不久其任與巡按無異何復用巡撫為哉昔宋司馬光有言古者各守一官終身不易今居官者三年數月輒以易去望職事之修功業之成不可得也臣謂陛下欲行久任之道又冝從巡撫始近例巡撫每年一次赴京議事然當議事之年多有以地方有事不可行者臣請限以腹裏三年邉方五年必須一次赴闕陛下親降德音詢問民瘼一示以優異一觀其底裏六部各奏其所行果有成績蕃錫而慰遣之其或不職科道指實而論之夫既擇其人于先而又久其任于後于更互赴闕之際有增秩賜金之褒有削官奪爵之辱則彼必思有益地方而無負陛下矣其三曰臣聞古之明君必慎惜名器惜之故人不易得而得者以為重後世爵祿混濫無復審擇童蒙無知坐致人上視其名器無足為重上與之而謂其法應與也下得之而謂上與我者乃我故物也如此上之爵祿不足以為下勸矣此後世之任子識者所以致議于其時歟我朝祖宗立法凡文職大臣必立朝既久勳勞茂著者方降特恩録其子孫一二以榮後裔近年三品以上始概乞恩以子孫入監然亦有所裁節不至如宋之任子使子任其孫孫又任其子也其武臣則不然父死子繼無子同産兄弟繼之從兄弟亦繼之又廣于任子之法蓋我太祖平定四海太宗肅靖內難武臣摧鋒破敵九死一生惟具艱險故報之獨延長也今天下衛所己定人滿于位而後來之官往往倍蓗什百不論事之難易功之大小例得世襲其中乃有身不臨陳徒以預參隨頭目之末而濫冒者彼所獲首級豈陳前手刃之賊或由勢邀或出貨取或戮已死守臣皆與奏報張皇功次雖經部議節行各邉禁約而弊端竟不少衰今之新任有功之人要無祖宗時比者將不世襲之歟則隳將士立功之心將世襲之歟則繼繼繩繩無有限極其如後來之冗何臣惟文武之途有二食君之祿實一世襲既優諸武矣則法律之繩于文武者豈容復異今文職犯贓必罷職枉法滿貫必充軍而軍職所犯該絞斬者止降級調衛該徒流者止原衛帶俸同罪議罰甚覺不倫臣考之于律軍官犯笞罪者收贖杖罪者降調該罷職不敘者降充總旗該徒流者發各衛充軍皇祖制律未嘗不與罪文職者等而刑官乃特遵近年條例近例又載搶奪姧盜敗倫傷化者俱發原籍為民子孫承襲夫敗倫傷化者罪死而得為民巳非懲惡之典而其子孫即得承襲是其職特舉此付彼有為民之名無罷職之實其罪不更輕于降調者之不得即替哉或謂職乃其先人之功所得職亡于其身故即承襲于其子孫以報其先湛恩汪濊固應如是臣以今之世襲者不皆開國佐命之舊至于有罪又每從寬貸其原不清其流不節爵祿益濫如之何名器之足重也乞敕部議今後各邉有警從征官軍若能臨陳斬級回轡之際赴鎮巡官辨驗以俟具奏升賞其中官軍貧苦當升而願賞者鎮巡官厚與賞犒如敢依阿奏報事發之日凡關節所通俱坐欺罔又乞法司會議軍職犯罪一斷以律成化年間事例不得引用該罷職為民者必俟本犯身死方許子孫承襲其先人非開國佐命之舊承襲之日革去一級于原衛所帶俸差操庶幾彼之慮後不敢褻上之名器矣其四曰臣聞民惟邦本故山附于地君附于民陛下視民如傷發政施仁凡天下旱乾水溢宜無不盡知者守令責在牧民民傷水旱彼亦宜有不忍者然臣竊見凶荒之處耆老告報府州縣必委官踏勘得實始為上申鎮巡官必委官踏勘得實始為請命命下該部必查例當行始為行文轉而下府州縣即所傷分數以減征貸賑夫凶荒之民枵腹待哺如涸轍之鮒望斗升水于旦夕猶恐不足而彼文移往復動經數月豈其所堪哉故今之凶荒耆老既不以報府州縣復不以申蓋明知其無益也委官踏勘多一次適滋一次騷擾究之貸賑之及其濟幾何此守令之宜不忍于民者而亦有忍焉者也此天下之凶荒朝廷所以有不盡知而莫之救也凶荒而莫之救襁負相屬道殣相望無賴于此嘯召烏合必多盜賊業可生活者均被其害而有司又催督租稅身受棒枷良民亦且流移行劫矣臣以為九重軫念元元宜先事詔諭府州縣官倘遭水旱即委公正官一員勘明分數具申鎮巡官若係半災即將當年夏稅秋糧開除若係大祲即為設法處置令府州縣將豫備倉糧放支賑濟事畢取具回報以憑奏聞蓋救荒之道宜速宜不緩速則肉骨之恩人人皆偏緩即排門散粥延街俵米而不及事漢謁者汲黯過河南以民傷水旱持節發粟不顧矯制之罪今之鎮巡官行事于外非黯當時之比地方去京師逺㩲以救荒亦不為專也或謂朝廷誠降是令凡遭水旱不賑則貸倉廪何所儲民將有妄稱凶荒者臣謂非也漢文帝自即位賜天下民租之半者再其後除之而不收者十餘年不遇凶荒尚爾況于凶荒而可吝乎上之儲蓄固以為民也茍無妄費冗食奚患儲蓄之虧凶荒水旱有目共見有耳共聞其勞豈至于可欺哉其五曰自秦開阡陌天下遂有兼並之弊然止民間貧富強弱之相形耳今乃有甚焉者其皇莊乎先朝畿內空間之地籍之公家佃民種而收其入其地廣狹有定界其入有定額非以病于民也近年看莊人役罔恤國體近莊田土小民衣食之資橫加侵占求益不己在莊旁者産去稅存征科之及負纍賠辦富者以貧貧者日甚民間馬牛羊豕或誤逸莊地即無望復歸有以近莊之故㙇墓被發屋廬被毁耕夫餉婦稍不退讓輒罹鞭箠含酸忍痛閔默無言按巡之使過之而不敢問守牧之官即之而不敢直此非九重厚民之意也承平以來生齒日繁雖盡地力不足以給民食而莊地莊賦今廣于昔豈荒地果日闢哉不過掠之于無辜耳昔漢宣帝詔池禦未御幸者假與貧民流民還歸者假公田種食今縱不能以假貧民忍于民衣食租賦所出者而又奪之以致其貧乎畿甸咫尺尚不能無害民之地況于逺方陂湖園池為王府所有者私蓄聚斂之臣各操漁獵之具所在之民能無困乎臣聞勳戚世族所得附京恩賜莊田家人亦多挾之以肆蠶食其他軍民之不逞者復以已業投獻權要恃為窟穴而他取償焉或投作陵戶以嫁糧差附京如此在外王府之所認納宜又倍之為害不資不可不嚴為之所也伏乞陛下敕官往勘皇莊地面從實丈量若軍民告認舊業鄰證有可執結割而歸之其本莊之地坐某府州縣即就地起科佃民耕種止稱公田丈量已定造册繳部歲將其入以備經費若遇水旱與民田一例開除既不失本莊之賦亦不病近莊之民畿甸之內庶無侵奪之害矣該部仍通行各省王府凡陂湖園池係王府奏討者有司準此例歲為送納租賦免致王府差人督取今後世族之家各飭管業家人母致生事軍民舊非陵戶不許冒報及以巳業投獻敢復不悛事發其業入官軍發邉衛民發口外受獻者奏聞處置如此兼并之弊庶幾可去矣其六日臣職司馬之屬竊檢軍政條例有以見我朝列聖之拳拳于軍政也我太祖皇帝砥定中原治不忘亂設為衛所養天下兵荒陬絶徼所在充斥今經百三十年未嘗有大征伐以耗之也各處府州縣今皆有清軍官而又有欽命之御史上下相益其查出軍丁例行批解軍丁到衛例加存恤清軍官查出數少者考滿行黜解人縱軍在家延住及在道賣放者并坐衛所官旗侵剝所管軍丁致其逃者降級調衛立法之密若此此外問刑衙門又有問發充軍之律清軍御史又有招募為軍之榜日積月纍宜各衛所尺籍嵗有增益矣今視祖宗時額數反損邉方腹裏一遇番替僅敷無餘何也臣知其故矣軍之新舊相承出入參差不容齊一丁從衛所逃逸則册從原籍查勾查勾不斷于遞年而逃逸常虛于舊伍姧黠之徒或竄大户而昜姓或贅婦家而避身或乘調他衛而遂脫亡或因流他方而遂變役軍固不易清也清軍官異境之人在任不久豈能備知本軍充調來歷里書作弊動曰文册無稽敝紙千百之中展轉查閲幸得查出一二起解之際又非親丁即解親丁亦不得其正妻同解所解去者乃其義男女壻及臨期掠賣之妾婢此類到衛其有不逃者乎衛所率去原籍數千百里逃而再勾率過數年勾而再解又復數年在逃三次于法應死輒稱原逃不獲或稱已死官司以人命至重往往不肯追究何怪乎軍伍之常虛也其據律問發者官為押送沿路防護涉煙瘴逼沙漠飢渴勞頓將己實邉而邉卒不可實不徒戍者之就死且纍送者之無還其出榜招募者蓬萍無蒂孰保收籍況今時非國初可比土著良民孰願為軍此例之行虛名而已此衛所之軍所以不免于缺乏也臣聞唐陸贄論鎮守之兵曰非物理所愜不寧非人情所欲不固論選置鎮守之兵曰必量其性習辨其土宜而總之以便于人情之一語今天下為軍者北人而南南人而北使其族姻永棄齎費不前僵仆于不可極之途而困迫于巳至之域豈便于人情者哉是以軍戶被勾痛若剝膚軍丁被解哀同棄市原籍茍可匿迹遑恤其他衛所茍可脫亡無虞厥後宜乎律示免死而人懷等死之心榜求報效而人鮮自效之念也然則陸贄便于人情之語其安為軍者之道乎今日安軍之道即贄所謂量其性習辨其土宜是以伏乞敕部計議轉行各處清軍御史督同清軍官員稽查伍册凡缺伍失勾及勾而未到衛者造册繳部將兩直隸十三省所屬府州縣區其衛所南北于南北又各度其逺近然後各計查出軍丁之數與之兑換使南解補南北解補北近及五百里逺止二千里入伍之後舊伍不許再勾則風塵免其艱難水土易于諳服逃者將自行首官居者將樂于就役豈憂額數之不復乎至各處問發人犯定擬衛分雖非應發極邉亦宜分其南北并令當家小房隨往斯不過逺以纍解役而本犯不敢逃逸行伍亦得其助若曰罪戍不逺無以警衆臣以為𣣔警衆庶在于遇赦不輕原不在違其土宜而窮之極逺也其已查出軍丁有不願行者令其户當二軍于本處或鄰近衛所食糧差操餘丁照例優免彼安土重遷宜多有之是亦足兵之法也凡此六事其中亦有急于時者故終言之願陛下終聽之焉疏入帝後之陳邉務疏𢎞治十二年王守仁臣惟邇者皇上以彗星之變警戒修省又以邊疆告警命將出師宵旰憂勤不遑寧處此誠聖主遇災能警臨事而懼之盛心也當兹多故茍有一二之見敢隱忍不以上聞耶臣愚以為今之大患在于為大臣者外託慎重老成之名而內為固祿希寵之計為左右者內挾交蟠蔽壅之資而外肆招權納賄之惡憂世者謂之迂狂進言者目以浮躁沮抑正大剛直之氣而養成怯懦因循之風故其衰耗頺塌將至于不可支持而不自覺今幸上天仁愛適有邉陲之患是憂慮警省之機也此在陛下必宜有所以痛革弊源懲艾而振作之者矣新進小臣何敢僭聞其事以干出位之誅至于軍情之利害事機之得失茍有所見是固芻蕘之所可進卒伍之所得言者也臣亦何為而不可言之有雖其所陳未必盡合時論然私心竊以為必宜如此則又不可以茍避乖剌而遂已于言也謹陳便宜八事以備採擇一曰蓄才以備急二曰舍短以用長三曰簡師以省費四曰屯田以足食五曰行法以振威六曰敷恩以激怒七曰捐小以全大八曰嚴守以乘敝何謂蓄才以備急臣惟將者三軍之所恃以動得其人則克以勝非其人則敗以亡其可以不豫蓄哉今者邉方小警曽未足以辱偏禆而朝廷會議推舉固已倉惶失措不得巳而思其次一二人之外曽無可以繼之者矣如是而求其克敵致勝其將何恃而能乎夫以南宋之偏安猶賴宗澤嶽飛韓世忠劉錡之徒以為之將李綱之徒以為之相尚不能止金人之衝突今以一統之大求其任事如數子者曽未見有一人萬一敵人長驅而入不知陛下之臣孰可使以禦之若之何其猶不寒心而早圖之也臣愚以為今之武舉僅可以得騎射搏擊之士而不足以收韜略統馭之才今公侯之家雖有教讀之設不過虛應故事而實無所禆益誠使公侯之子皆聚之一所擇文武兼濟之才如今之提學之職者一人以教育之習之以書史騎射授之以韜略謀猷又于武學生之內歲升其超異者使之相與磨礱砥礪日稽月考别其才否比年而校試三年而選舉至于兵部自尚書以下其兩侍郎使之每嵗更迭巡邉於科道部屬之內擇其通變特達者二三人以從因使之得以周知道里之逺近邉關之要害敵情之虛實事勢之緩急無不深諳熟察于平日則一旦有急所以遙度而往蒞之者不慮無其人矣孟子有云茍為不蓄終身不得臣願自今畜之也何謂舍短以用長臣惟人之才能自非聖賢有所長必有所短有所明必有所蔽而人之常情亦必有所懲于前而後有所警于後吳起殺妻忍人也而稱名將陳平受金貪夫也而為謀臣管仲被囚而建霸孟明三北而成功顧上之所以駕馭而鼓動之者何如耳故曰用人之仁去其貪用人之智去其詐用人之勇去其怒夫求人于倉卒艱難之際而必欲拘于規矩繩墨之中臣知其必不克矣臣嘗聞諸道路之言曩者邉關將士以驍勇強悍稱者多以過失罪名擯棄于間散之地夫有過失罪名其任平居無事誠不可使處于人上至于今日之多事則彼之驍勇強悍亦誠有足用也且彼擯棄之久必且悔艾前非以思奮勵今誠委以數千之衆使得立功自贖彼又素熟于邉事加之以積慣之餘其與不習地利志圖保守者其功相逺矣古人有言使功不如使過是所謂使過也何謂簡師以省費臣聞之兵法曰日費千金然後十萬之師舉夫古之善用兵者取用于國因糧于敵猶且日費千金今以中國而禦敵非漕挽則無粟非征輸則無財是固不可以言因糧于敵矣然則今日之師可以輕出乎臣以公差在外甫歸旬日遙聞出師竊以為不必然者何則北地多寒今炎暑漸熾敵性不耐我得其時一也敵恃弓矢今大雨時行筋膠解弛二也敵逐水草以為居射生畜以為食今己蜂屯兩月邉草殆盡野無所獵三也以臣料之官軍甫至敵迹遁矣夫兵固有先聲而後實者今師旅既行然已無及惟簡師一事猶可以省虛費而得實用夫兵貴精不貴多今速詔諸將密于萬人之內取精健足用者三分之一而餘皆歸聲既揚矣令之密歸京師邉關固不可知也是萬人之威猶在也而其實又可以省無窮之費豈不為兩便哉況今京軍之出戰則退後功則爭先亦非邉將之所喜彼之請兵徒以事之不濟則責有所分焉耳今誠于邉塞之卒以其所以養京軍者而養之以其所以賞京軍者而賞之旬日之間數萬之衆可立募于帳下奚必自京而出之何謂屯田以給食臣惟兵以食為主無食是無兵也邉關之輸水陸千里踣頓捐棄十而致一故兵法謂逺輸則百姓貧貴賣則百姓財竭此之謂也今之京軍既不堪戰陳又使無事坐食以益邉困是與敵為謀也三邉之戍方以戰守不暇耕農誠使京軍分屯其地給種授器待其秋成使之各食其力敵至則授甲歸屯遙為聲勢以相掎角敵去仍復其業因以暇日繕完敵所拆毁邉牆亭堡以遏衝突如此雖未能盡給塞下之食亦可以少息輸餽矣此誠愛人俟時之道王師出于萬全之長䇿也何謂行法以振威臣聞李光弻之代子儀也張用濟斬于轅門狄青之至廣南也陳曙戮于麾下是以皆能振疲散之卒而摧方強之敵今邉臣之失機者往往以計幸脫朝喪師于東陲暮調守于西鄙罰無所加兵因縱弛如此則是陛下不惟不之罪而復為曲全之地也彼亦何憚而致其死力哉夫法之不行自上犯之今總兵官之頭目動以一二百計彼誠以武勇而收録之也則亦何不可之有然而此輩非勢家之子弟則亳門之夤緣皆以權力而強委之也彼且需求刻割騷擾道路仗勢以奪功無勞而冒賞懈戰士之心興兵戎之怨為總兵者且復資其權力以相後先其委之也其敢以不愛乎其愛之也其肯以不庇乎茍戾于法又敢斬之以徇乎是將軍之威固以因此輩而索然矣其有何以臨師服衆哉臣願陛下手敕提督等官發令之日即以先所喪師者斬于轅門以正軍法而所謂頭目之屬悉皆禁令發回毋使瀆擾侵冒以撓將權則士卒奮勵軍威振肅克敵制勝皆原于此不然雖有百萬之衆徒以虛國勞民而亦無所用之也何謂敷恩以激怒臣聞殺敵者怒也今師方失利士氣消沮三邉之戍其亡死者非其父母子弟則其宗族親戚也今誠撫其瘡痍問其疾苦恤其孤寡賑其空乏其死者皆無怨尤則生者自宜感動然後簡其強壯宣以國恩喻以敵讎明以天倫激以大義懸賞以鼓其勇暴惡以深其怒痛心疾首目夜淬礪務與之俱殺父兄之讎以報朝廷之德則我之兵勢日張士氣日奮而區區敵患有不足平者矣何謂損小以全大臣聞之兵法曰將欲取之必姑與之又曰佯北勿縱餌兵勿食皆損小全大之謂也今敵勢方張我若按兵不動彼必出鋭以挑戰挑戰不巳則必設詐以致師或捐棄牛馬而為逃或掩匿精悍以示弱或詐潰而埋伏或潛軍而請和是皆誘我以利也從而信之則墮其計矣然今邉關守帥人各有心敵情虛實事難猝辨當其挑誘之時畜而不應未免小有剽掠之虞一以為當救一以為可邀從之則必陷于危亡之地不從則又懼于坐視之誅此王師之所以奔逐疲勞損失威重而敵之所以得志也今若恣其操縱許以便宜其縱之也不以為坐視其操之也不以為失機養威畜鋭惟欲責以大成而小小挫失皆置不問則我師常逸而兵威無損此誠勝敗存亡之機也何謂嚴守以乘敝臣聞古之養戰者先為不可勝以待敵之可勝蓋中國工于自守而敵人長于野戰今邉卒新破敵勢方劇若復與之交戰是投其所長而以勝與敵也為今之計惟宜嬰城固守逺斥堠以防姧勤間諜以謀敵熟訓練以用長嚴號令以肅惰而又頻加犒享使皆畜力養鋭譬之積水俟其盈滿充溢後乘怒急決之則其勢并力驟至于排山漂石而未巳昔李牧備邉日以牛酒享士士皆樂為一戰而牧屢抑止之至其不可禁遏而始奮威并出若不得己而後從之是以一戰而被敵今我食既足我威既成我怒既深我師既逸我守既堅我氣既鋭則周悉萬全所謂不可勝者既在于我矣由是我足則敵日以匱我盛則敵日以勞可怒則敵日以曲我逸則敵日以勞我堅則敵日以虛我衰則敵日以鈍索情較計必將疲敝奔逃然後用竒設伏悉師振旅出其所不趨趨其所不意迎邀夾功首尾橫擊是乃以足當匱以盛敵衰以怒加曲以逸擊勞以堅破虛以鋭攻鈍所謂勝于萬全立于不敗之地而不失敗敵之道也抑臣所陳非有竒特出人之見固皆兵家之常談今之為將者之所共見也但今邉關將帥雖或知之而不能行類皆視為常談漫不加省勢有所軼則委于無可奈何事憚煩難則為因循茍且是以玩習廢弛一至于此陛下不忽其微乞敇兵部將臣所奏熟議可否轉行提督等官即為斟酌施行毋使視為虛文務欲責以實效庶于軍機有禆臣不勝為國惓惓之至疏入授刑部主事御選明臣奏議卷九
