body:
  text: 乞休第六十一疏萬歷四十二年葉向高臣謹奏竊臣八載備員孤蹤獨立荷蒙皇上寵眷恩私隆天重地近世所無言雖不盡用而不可謂不用事雖不盡行而不可謂不行人言愈起而信任愈深求去愈殷而慰留愈切君父之於臣子至矣盡矣無以復加矣臣私衷感刻真口不能宣筆不能寫千生萬生變為犬馬以謝皇上猶不能報也兹當萬夀聖節臣杜門日久本不宜赧顔復出但情不能已於今早勉強同臣從哲詣仁德門叩賀禮畢之後臣念自此永無再到宫門之日謹再五拜三叩頭一以謝皇上纍年養育之厚恩一以伸微臣逺離闕廷之私念伏望皇上察臣微誠成臣素志更勿以溫旨留臣即賜俞旨放臣歸去使天下人知今日朝中尚有奉旨去國之大臣而臣之蒙恩於皇上終始不替如此君臣上下皆有光彩何幸如之臣謹於私寓恭候數日至於不得已而效尤二臣是臣之罪而非臣之得已也臣不勝冒昧懇切惶悚之至疏入得旨覽卿奏求去愈切情詞愈苦朕心惻然不寧但閣務繁重豈從哲一人所能獨理少待新輔道南至日即準卿去以遂雅懷卿既念朕恩當思終始圖報且八年勞苦何惜數月勉留若效尤徑行不候朕命既非卿從來忠愛之義將遺朕以恩禮不篤簡忽輔臣之名卿心忍乎尚體朕懇至之情毋得再有陳奏該部知道劾惡璫辱官剝民疏萬歷四十二年王紀臣看得驛遞之設原以供命使之往來非以供寺人之魚肉自中使四出而遺遞之膏血盡矣孰意又有狂悖不法如李永其人者按永不過一掃除賤役耳營得押船一差鳩聚四方亡命大逞聲勢擅作威福懸挂龍旗妄僭天子之仗偽造印信竊弄人主之大權而擕客以至千餘得銀豈止萬計惟圖夾帶以射利罔顧明禁之疊頒至甚陵轢署官搶奪縣印勒金取贖則與強盜剽掠者何異墩鎖驛夫非刑弔打借銀赴救則與暴寇殘虐者何殊蓋廣文卑秩也猶是朝廷之命官驛夫賤隸也誰非朝廷之赤子一旦橫被李永吞噬至此真貂璫中之豺狼人面而獸心者也目今福藩之國人心驚懼若不誅一永以謝天下則後之為永者將不知其幾而迢遞千里其橫遭剝削荼毒之苦又不知其幾千萬家也至於把總金廷貴指揮楊惠楊應吉身奉公委藐視刑章助桀行凶敢造逆天之寃業如虎傅翼大張食人之爪牙貪殘異常法律何逭神棍崔見吾陶左川劉禿子等流毒肆虐藉勢詐財歷訊已明詎宜漏網除臣等移咨南京兵部先將金廷貴崔見吾等提問正法另行奏請外伏乞皇上垂憐郊圻重地疲驛苦情敕下法司將李未嚴拏究問依律追贓庶刀鋸餘人上不敢輕蔑天憲下不至播惡小民而窮困驛遞亦可以稍寧矣為此具本謹題疏入帝不納劾趙煥疏萬歷四十二年周起元臣惟皇上御極以來於言官獻替雖罕採納而輒多優容惟觸權奧忤巨姧者其敗不旋踵其錮終身忠臣義士扼腕久矣謹按吏部尚書趙煥虧喪大節難以縷陳今營據要地結權璫而招黨與逐總憲而傾善良借事誅鋤凶險狠惡近日例推孫振基等三臣皆惡其異已一時芟盡此三臣者非有玷官常干清議而獲罪於皇上也特以議論異同居恆建白詞多與趙煥相觸犯煥恐終不利於已而急修嫌怨豫為翦除以僥幸長竊柄耳例推一事明旨令科院從公擬議而趙煥獨擅雌黃略無顧忌是煥之權尊於皇上也乃幸然以職掌為爭則吏部侍郎方從哲不由會推徑竇躐進顧未聞敢爭執半語何其蓄縮於大臣而狠毒於小臣也鮑應鼇起廢謫籍清貞端謹薰蕕不同宜遭煥忌謂不當以祠部改銓似矣乃科推正閏自有往例任意轉移巧用猾手何其苛求於賢者而通融於所昵也有科臣周永春亓詩教為之畫䇿有司屬李飬正郭士望為之布網彼皆度皇上待大臣有禮不輕呵譴遂敢蔑明旨而弄威權逐異議以固爵位夫議論原有兩端雷同誠非國福在皇上尚容臣下盡言以參酌是非之衡在諸臣亦誰願因殿上之爭而自傷和氣趙煥不能擴大公以秉衡渙小羣而事主乃挑彼此之鬭以收一網借言路之歧以營三窟雖自恃羽翼堪耐彈抨恐公論久而澄清豪傑代將輩出雖有善畫三䇿者無能為煥效一籌矣例轉何足為三臣辱特臺綱自此廢墜權姧自此縱橫長此不已將令言官俯首喪氣盡折而入於權門羞熙朝而譏青史臣臺臣也豈能坐視臺綱決裂默無一言以希全祿位哉伏乞皇上敇下三院九卿科道會議如果趙煥植黨擅權掃滅臺規違旨報怨即立賜三臣仍入班行以褫姧謀而肅憲紀若臣所奏不實即將臣與三臣同罷以謝趙煥臣雖抱膝邱圓有餘榮矣疏入忤旨坐停俸極陳時弊疏萬歷四十三年熊明遇臣竊惟春來天鼓兩震流星晝隕地震二十八天火九雨菽女妖兵端吐火即春秋二百四十年間未有稠於今日者且山東大祲黃河水稽天太白經天輔星湛沒熒惑襲月金水愆行或日光無芒日月同暈恆風枯旱天譴愈深而陛下所行皆誣天拂經之事此誠禽息碎首賈生痛哭之時也敢以八憂五漸三無之説進今內庫太實外庫太虛可憂一餉臣乏餉邊臣開邊可憂二套部圖王插部覬賞可憂三黃河泛濫運河膠淤可憂四齊苦荒天楚苦索地可憂五鼎鉉不備棟梁常撓可憂六羣譁盈衢訛言載道可憂七吳民喜亂冠履倒置可憂八八憂未巳五漸繼之太阿之柄漸入中涓魁壘之人漸如隕蘀制科之法漸成姧藪武庫之器漸見銷亡商旅之途漸至梗塞五漸未已三無繼之匹夫可熒惑天子小校可濫邀絲綸是朝廷無紀綱滇默之守令皆途窮揚粵之監司多規避是遠方無吏治讒構之口甚于戈戟傾危之禍慘於蘇張是士大夫無人心天下事可不寒心哉疏入帝不納特請蠲賑疏萬歷四十五年王紀臣惟天災流行何方蔑有未有如畿南三四年來旱蝗疊見至今日而益甚者也追維四十三年大旱僅亞山東幸皇上發米十萬石以賑救之凡今日孑遺之民皆君恩之所留也次年春夏又旱二麥一顆一粒不收者十之八九秋禾稍稍暢茂却被蝗蝻蠶食幾盡小民望今年二麥之熟不啻以日為嵗誰料天不悔禍災沴相尋未已乎去年三春無雪自春徂夏五月不雨藴隆蟲蟲如惔如焚河水少溪澗斷流真是赤地千里比前酷烈更甚矣臣方雲漢之是憂而飛蝗突生適與之會整若行陳疾若風雨所過殘毁不盡不休誰其尸之羽孽與旱魃爭出肆虐昊天上帝似乎有意以降喪亂者矣頃六月十三才得透雨已後時矣即今煢煢小民餓者餓逃者逃二東奇禍轉眼再見此時此際欲勸輸而閭閻懸罄矣欲議賑而倉庫若洗矣諺云巧婦不能作無麵湯餅臣又安能神輸鬼運以活此百萬涸鮒計惟有哀號皇上速沛浩蕩之恩而巳一切恤災事宜謹會同巡按直隸監察御史毛堪劉廷元開列上請伏乞敕下戶部再加查議覆請臣等遵照施行一曰發帑金邇來內帑之請臣子諱言亦淺之乎窺皇上矣不嘗以中州大飢發三十萬山東大飢發二十萬乎況三輔根本重地非二省比嗷嗷待哺之民不下百萬何忍令其顛覆溝壑竊謂欲急救民命非十萬金不可夫十萬盈數也合之似稍奢分之則無幾皇上自為根本計諒必不惜此阿堵矣不然愁怨之民心一散急難收拾瓊林大盈有不為大盜積者乎孰若善散之為愈也一曰發倉米畿南飢饉薦臻民不聊生久矣頃復遭此奇災家家懸釜待炊斷非升斗之水所能活也前嵗皇上曾發米十萬石一半賑濟一半平糶今嵗之災更甚於前臣亦不敢望之太奢只如前嵗發臨德二倉十萬石盡為賑濟足矣此一米也以朝廷視之直滄海涓滴耳而散之民間粒粒皆續命之金丹也豈其有愛焉一曰留監稅夫𣙜稅算及雞豚是手實之法也臣甚為國體惜罷之是矣惟是今年已征在官者計一年不過四萬三百餘兩半屬彚解內帑長物也進之秖益朽蠧留之足起溝瘠輕重已自較然況斂於民者還散之民寧獨全活飢莩抑且立收美名矣何惜此錙銖而戀不忍割也臣竊謂留之便一曰急蠲停夫帶徴之法從來已久況當九邊呼庚之時臣何敢輕議蠲停然實非所論於畿南也奇災之後更有奇災嗷嗷飢民即本年京邊尚有鬻妻賣子難完者若并責之九年帶徴縱敲骨吸髓必不能完徒有驅之死且逃耳至於死且逃將并本年現徴亦悉化為烏有矣其曷利焉合無將四十年以前帶徴盡為蠲免四十年以後帶徴暫為停徴俟明年大熟仍照舊帶徴庶國賦民命兩不相妨計無便於此者疏入帝從之再請敕書關防疏萬歷四十七年熊廷弼臣伏處田間耕食鑿飲為終焉之計不圖東事破敗皇上過聽羣臣之言起臣大理兼御史職銜馳赴遼東宣慰軍民比及在途又蒙有催熊廷弼星夜前來之旨其促臣之來不為不急矣臣聞報之日仰體憂懷俯憫危狀不顧妻子不謀友朋束裝五日而即就道日行三百餘里雖熱毒遍體而不敢言病其趨封疆之難亦不為不急矣但以人臣未有無憑而擅往地方之理每朝廷小小差遣且給敕書勘合以便行事況軍國重情不藉王言為重何以感動人心而激勵士氣不藉關防示信何以往來奏報而上下行移所以必候領得而後可去前日具疏恭請未蒙批發迥與前月兩次嚴旨緩急不侔一似以臣為可有可無之官而不必設宣慰為可行可止之事而不必往者臣竊謂此官可無而此行宣慰斷斷乎未可中止也何也遼東軍民及調來薊保宣大甘延川浙援遼官軍皆皇上守遼禦敵良民赤子也無罪無辜而驅死於一年之內者十餘萬人或全城死全營死全寨死全村死全家死或家死其半子死其父弟死其兄妻死其夫山骸川血鬼哭人號而皇上忍不為死者惻惻心動乎方軍散之日遼瀋數城放聲大哭惟各抱頭攜手收拾包裹待敵至而去耳幸敵未至而魂魄雖收頭顱猶寄朝人暮鬼誰卜所終人有百死而無一生日有千愁而無一樂家家抱怨在在思逃而皇上忍不為生者惻惻心動乎皇上此時即不下罪已之詔悔制馭之失䇿痛自刻責以上回天心下挽人意而亟付尺幅之紙畀臣宣諭弔死問傷拊循慰恤以見皇上之念遼救遼而不肯忘遼棄遼也則全遼之父老子弟與援遼之官兵人等誰不感激泣下拭淚而相告曰吾君哀吾儕之死有如此吾君憐吾儕之死有如此吾君之念遼不忘遼救遼而不棄遼也有如此又誰不忠義感慨捐糜圖報願出身以投伍出資以佐軍出死力以禦敵而顧乃悠悠忽忽漠不關意一至此臣恐遼人之灰心解體而潰不可收於一旦也皇上何吝此半通之綸方寸之符不早屬臣而慰此一方之人耶且前者兩旨催促之急臣晝夜馳赴之急中外見之誰不誦皇上任人之専壯微臣赴義之勇乃徒以領敕之故稽留於此不得前行萬一不相諒者或謂臣畏往遼有規避之私或謂臣候新推有觀望之意而臣不將與全軀保妻子之臣沾沾于一官者同類而一視耶是行也君恩為重臣命為輕灑一腔之血于朝廷付七尺之軀于邊塞惟願皇上早賜頒給勒限出關刻期報命遄往遄來俾遼人感泣咸知德意遠過河東之詔而臣願畢矣臣責畢矣臣無任瞻天仰聖激切候命之至疏入留中陳河東諸城情形疏萬歷四十七年熊廷弼臣惟遼左為京師肩背欲保京師而遼鎮必不可棄河東為遼鎮腹心欲保遼鎮而河東必不可棄開原為河東根柢欲保河東而開原必不可棄今開原破矣青陽棄矣慶雲搶矣鎮西圍矣中固鐵嶺懿路蒲河數城婦女老幼空城而逃矣自鴨緑江東南起至西北一帶城堡除撫順清河失陷已報外如末甸新甸靉陽孤山鹻場一堵牆灑馬吉東州會安白家衝三岔撫安威逺鎮北等處城堡數十座已棄去而邊內之村寨已搶燬無遺矣獨遼陽瀋陽為河東孤注而昨據經臣揭報瀋陽之民又逃軍亦逃矣而遼瀋何可守也敵未破開原時北關相倚猶有後背之憂朝鮮未敗猶有左腋之患今開原破而北關不敢不順使幣往來而朝鮮不敢不從既無背腋之虞又合東西之勢以此交攻而遼瀋何可守也雖有敗殘新集士卒四五萬人皆有名無實而此番開原損折又奚啻萬計且又無甲馬器械而所調各鎮兵馬又多不來間有到者亦聞戰驚散而遼瀋又何可守也然而不守遼瀋必不能保遼鎮以保京師不復開原必不能保遼瀋以保遼鎮然則今日之開原皇上以為當棄乎當復乎皇上試問羣臣當棄乎當復乎棄之而成敵國東西之交絶北關觀望之路是棄遼以棄京師也三尺之童皆知其不可而欲起而收復之雖精兵良將甲馬器械錢糧芻粟等項一時齊備足以副臣之用臣猶恐敗氣難復覆水難收敵鋭難當敵交難斷四顧躊躇無一措手之處而況乎事事俱無臣又如之何哉臣昨隨諸臣會議於中府議及恢復皆決然以為當復及議兵而皆謂兵無議餉而皆謂餉無議處兵處餉或調或募或近或遠或借或括而又皆或默或爭迄無成議即如議增新兵七萬先調一萬隨臣入遼姑壯聲勢以定人心又且議徴此而恐此阻難議調彼而恐彼空匱左牽右掣尚望其他是其所謂當復者不過為國家慷慨粉飾之詞而心口私語必謂兵餉難辦且守遼瀋遼瀋有失且守河西河西有失且守山海關山海有失再作區處云爾是豈真能同心共濟亟圖收復以保遼鎮保京師而保宗社者哉且今日之禍皆前日明白所已言後來之禍自今日理勢所必至臣請再為皇上明言之夫前日敵勢東有朝鮮北有北關西南有遼開僅東北一條走路四圍逼束無充拓之兵山地出産無寬餘之糧使于清撫失事以後兵餉湊集之時中外當事者不急戰不催戰議復清河撫順守寬甸再建城設將於柴河靖安間悉宿重兵互相掎角以漸逼而轉格之猶可幸也自大軍三路敗沒而敵兵始出入無常自我兵坐守四城而敗始交合西部徑取開原是前日不復清撫以失開原之覆車即後來不復開原以棄遼鎮而危京師之榜樣也今開原一帶盡失而外交合矣朝鮮北關皆隂順之而內患除矣彼亦何所牽掣何所顧忌愛我瀋陽而不攻我夫開原古之黃龍府而元之所謂上都也城大而民衆物力頗饒搬運金錢財貨數日未盡何止數百萬向無充拓之兵而今且合兵于西向無寬餘之糧而今且因糧于我但分我開原餘財十數萬以與鄰近各部落使之東攻遼瀋西攻廣寧各部營所得春夏兩賞于我者幾何又何愛于我而不從彼以攻我試觀前此塘報敵攻開原而西部五營即率三千騎搶慶雲又率五萬騎至廣寧索賞是西部明明巳皆為所用矣而遼瀋可保乎遼鎮可保乎不惟遼鎮難保也如彼全有遼鎮所獲金錢財貨何止數千萬但分數十萬金與諸部令入攻昌薊薄京城又分數十萬金與諸部令入攻宣大趨兩關以牽綴我使不敢出京城一步然後長驅入山海關或由海道取天津及登萊一帶此皆國家必受之患理勢必至之事而臣十年前不幸而屢中之言也且十年之前禍機隱微臣巳䇿之而無遺豈今日之後事勢明白臣又料之而不驗皇上動疑臣下之言為欺為誑試檢臣疏牘一一覆核有一字涉欺誑者耶即中外諸臣凡有章疏皇上一切疑為欺誑置之弗聽徒視敵緩以為緩敵急以為急而今日併敵急亦不以為急也諸臣惟各感慨欷歔以氣運付天以天下事付皇上自理而相率茍且支吾為悠悠待盡之計而已往昔皇上與中外諸臣交誣以致今日亦已極矣今日若能早為收拾則河東尚存其半河西尚處其全山海尚未逼而薊昌尚無恙猶幸一隙之暇可圖恢復之舉使皇上以京師視遼立從臣下之請而無有中隔使兵戶二部以京師視遼共商兵餉彼此通融而毋以例爭使兩京各錢糧衙門以及邊腹撫按諸臣皆以京師視遼凡遇徴調那借搜括催解等項一一真心委曲多方措處而無一套應則兵餉諸事尚可立致天下事何據不可為而顧猶悠悠忽忽漫無所致緩急於其間豈真待遼鎮盡失西攻昌薊東入山海天津一帶而後皇上始聽臣下之言中外諸臣始肯破例破套為同心之應而天下之事去矣當斯時也臣之肉固不足食而中外諸臣之誤皇上與皇上之自誤亦何以妥陵廟安宗社謝天下而各保其身家也乎臣久廢田間茍活性命本無仕進之志忽蒙皇上起臣大理宣慰臣念國家事重不得不星馳而來不意諸臣竟用部院職銜授臣經略處臣以非分之榮加臣以絶筋之任臣實不堪比欲具辭而相知諸臣皆以大義責臣中止臣往矣臣已移書訣絶妻兒寄謝親友拚此七尺之軀為皇上戮力封疆置利害死生於度外矣惟是兵餉有無遲速實係遼鎮存亡京師安危之急務乞皇上省覽臣疏亟敇廷臣會議開原地方應否恢復如不當棄便須急為處辦兵馬器械錢糧芻豆等項勒限齊備母缺少以窘臣用母遷延以緩臣期母中格以阻臣氣母旁議以掣臣肘母交擔於臣不相照管而獨遺臣以難以致誤臣誤遼誤國而併誤諸臣之身家則宗社幸甚諸臣幸甚臣愚亦幸甚疏上得旨恢復開原乃禦敵安邊急務應用兵馬器械錢糧芻豆等項著各該衙門火速處辦刻期齊備母得藉口缺乏將帥以下不用命者先斬後奏著星夜前去用心經理以副朝廷委任至意該部知道陳戰守大略疏萬歷四十七年熊廷弼臣惟今日禦敵之説有三一曰恢復一曰進戰一曰固守當開原初陷時鐵嶺北關尚在懿路蒲河未逃法當亟復開原全我形勢今破者破空者空徒分數萬人馬守各空城無一人民居住何益似不如合兵併力以戰為先著何也戰固無俟於復也顧以此時漫談進戰之事何敢草草似又不如分布險要以守為穩著何也守正所以為戰也然而守何容易八九月間敵統全衆駐新寨日壓撫順關而窺我遼瀋我猶守在一面今冰堅可渡或南出夾河搶清靉村屯以窺海蓋或順鴨緑江而上奪鎮江以窺金復不然則渡江而東以窺朝鮮而敵出愈寬我守愈遠兵分力寡守何容易也頃臣親至各邉隘口相度地形算敵之出路即可為我之入路者有四在東南路為靉陽南路為清河西路為撫順北路為柴河三岔兒間俱當設置重兵為今日防守他日進戰之備而鎮江南障四衛東顧朝鮮亦其不可少者此分布險要之大略也每路設兵三萬人裨將十五六員主帥一員布為前後左右中各營如遇敵對壘則前鋒先出中軍繼之左右助之後軍殿之使各路自為一分合奇正以為一面如敵與一路相持在西路則南路北路各出奇兵東南路悉力以佐之在南路則東南路西路各出奇兵北路悉力以邀之其在鎮江當設兵二萬人裨將七八員副總兵一員半在義州半屯鎮江夾鴨緑而守如敵向朝鮮則鎮江與朝鮮合力拒堵而四路則分道以綴之敵與四路相持則鎮江朝鮮合兵而西以應之使各路總為一分合奇正以成全局此各路聨絡之大略也清河撫順三岔兒三路山多漫坡可騎步並進當用西北兵以西北大將統之寬靉林箐險阻可專用步當用川土兵以西南大將統之鎮江水路之衝當兼用南北兵以南北將兼領之此酌用南北兵將之大略也各路領兵到邊畫地而守無警就彼操練小警自為堵禦大敵亙相應援時各挑其尤精悍者為遊徼以一路率所部直入敵境而分其三之一設三覆以待且戰且郤遇覆則又戰然後從容進邊而東路未已西路復然北路未已南路又然更番迭擾然後相機進戰或四路並進或三路牽綴而隂併一路此多方以圖進取之大略也兵行一次必立一營貯放糧草兼作退步各路兵雖三萬如深入百數十里必須留營數所撥兵防守而前路迎敵兵馬必漸單薄所定前數斷難減少且兵馬既隨各帥往邊遼城空虛應再設兵二萬平時駐劄遼陽以壯中堅有事䇿應四路以作外援又于海州三岔河設兵一萬聨絡東西以備後徑金復設兵一萬防護海運以杜南侵此征行居守之大略也今者敵勢強盛已併有兩關及海東諸國又令降將李永芳等收集三路開鐵降兵萬人計兵已近十萬今議用兵十八萬馬九萬匹而現在主客殘兵續到援兵及召募新兵雖近八萬尚在沙汰難作實數其餘惟有召募徵調二法遼人以遼守遼之説自李如楨李登等建議屢試不效勢不得不取諸徵調臣請以此責成兵部每兵一名嵗取餉銀一十八兩兵十八萬該餉三百二十四萬兩內每軍月給本色五斗該糧一百八萬石又每馬日給豆三升九萬匹該豆九十七萬二千石草重十五斤者日給一束嵗除四個月青草不計外計八個月該二千一百六十萬束小束倍之通共嵗計般費幾何車牛人工船費幾何此皆一毫裁削不得者臣請以此責成户部往者清撫開鐵懿路蒲河俱無恙則河東以遼陽為家業廣寧為轉輸今遼陽為衝邊矣又當以廣寧為家業山海關為轉輸凡兵馬糧餉器械馬牛一應軍中必不可少之物勢自不能不仰資協同幹辦臣請以此責成督撫近日調取將材各省鎮紛紛執留及發來兵不成兵馬不成馬每詰問來將皆云院道不容挑選甚有授意邊堡故將瘦弱塞責者除已到者容臣挑選發回換補外其以後調將徴兵臣請以此責成各省鎮此又中外同心共濟之大略也度我兵五而當敵兵一即他日人經訓練器經整頓猶須三而當一今敵兵有衆近十萬即我兵十有八萬尚費支吾誠度海內物力不得不減省籌畫若此兵法曰客倍而主人半然後敵若舉兵進戰敵主我客于法尤應加倍閲臣姚宗文疏欲兵部于臣所議外量增二三萬人以為訓練䇿應之用户部照兵處餉之外多備三分之一此尤多多益善有備無患之長䇿也伏惟聖明裁斷疏上得旨這所奏審度形勢及分布戰守方略頗合機宜所用兵馬糧餉著該部多方措處毋致缺乏督撫職任封疆務同心協力以圖共濟鎮道將領等官都要實心任事料理兵食戰守之計毋得因循推避有誤軍機各省鎮應調兵將著作速遣發仍挑選精鋭不許以瘦弱搪塞熊廷弼著益用心經理副朕倚任之意請勒限發兵疏萬歷四十八年熊廷弼臣前疏言部調紙上有兵過關無兵以虛數誑皇上者實查得自三月失事以來援兵到遼陽者止有此數止足抵開鐵失亡及召募新兵逃兵之虛數及見樞臣黃嘉善辨疏開列遼東現在新募出關三項自謂十萬之數僅少二千又是紙上之虛數而臣第出一揭以駁之不敢復瀆聖聽惟是事到于今冬寒巳過春暖巳來時候已逼事勢已蹙有不得不為皇上之封疆生靈求救于樞臣而望其受臣之言以實數相應者當去年八九月間開鐵連陷北關繼亡遼陽巳危在旦夕顧臣時初到猶得張大虛聲多方搖惑以冀敵疑不輕出今日久情見凡我兵之逃亡馬匹之倒死糧草之缺乏出關援兵之有無西來市馬之瘦損某營某處之孱弱某城某方之低塌一一皆被間諜報知又敵兩入開鐵收割運糧誘賺我兵竟不敢出益窺我無能為而前用之法窮矣據諜報口辭及朝鮮逃回兩將所言皆云敵于二三月間合兵進攻歷歷有憑而遼陽危不可言矣遼陽各兵除河西兵馬盡數發與總兵李光榮防禦西部外其年來召募遼兵雖數近三萬竟不可以兵名真保宣薊及南浙兵之殘者亦不可以兵名川兵毛兵僅能穿山透林非平原衝戰之用惟總兵柴國柱賀世賢李懷信各領馬步設防要害而國柱懷信管下皆陸續烏合之援兵世賢管下多召回逃陳之殘卒俱見敵立足不住世賢嘗私稟臣云我部下各兵説動東敵便面黃無人色每張開頭敵向前而後隊便退走如中固懿路兩番光景實是心寒惟賴手下數百親丁勉強支抵如何能當大敵其他總兵併親丁亦不可得雖在虎皮驛三塊石地方設防皆明知寡弱抵敵不住但畏軍令不敢言不如且回遼陽依城據守為穩臣于諸總兵中更恃世賢今其言若此使臣心膽俱碎顧又恐無故撤回益示弱以速敵至且徑棄瀋蒲而不顧遼陽益失掎角而無兵護耕種百數十里田土皆拋棄糧草益無所出猶力持之不聽乃各道屢以為言即閲臣姚宗文亦勸臣聽許回城第以一總兵時常更番往彼防守蓋亦深知遼城現兵必不能乘城固守三帥各兵必不能拒險當敵而為此根本之慮者也臣不得已聽其更番回城操練如前議而頓違臣初心初計矣去秋併瀋歸遼本望多發援兵今春得再守瀋故置三總兵于適中處為南顧北窺之計而今已矣敵如攻瀋蒲我必不能救也本望撥兵守清河寬靉防敵南來而今已矣敵如搶村屯窺南衛我不必能救也本望撥兵守鎮江為朝鮮聲援而今又已矣敵如攻鎮江攻朝鮮我必不能救也何也三總兵現于虎皮驛一帶列三大營以待敵尚懼不能抵敵意欲回城況逺而奔救瀋蒲再逺而奔救清靉再逺而奔救鎮江朝鮮此臣斷斷乎有以知其不能也凡此皆兵部紙上調兵之過也樞臣不應受虛誑之名而臣亦不應受失誤之罪勿謂臣不先言也為今之計不亟徴多兵遣援則遼必不守不責成各省鎮則必不肯遣援不先責成兵部則該部寧誤封疆必不肯失省鎮情面而援兵終無到時臣嘗見兵部調兵不論其鎮之兵多兵少某家之有兵無兵某廢將之或存或亡一概填書入疏某家土兵一千某將家丁幾百某處調兵幾千某處合兵幾萬皇上閲之豈不強盛可觀而不知此紙上之兵也今宜確查某鎮某家有兵若干某將現存家丁若干某將贖罪能納馬若干又能募家丁若干然後從而調之不得少一人一騎以誤軍機則省鎮不得推辭而各將亦無所容其展脫此其當責成者一每次調各邊兵馬之文動稱一面發遣一面即給錢糧補軍補馬補造器械而一毫不為解補以致各省鎮畏其欺誑不肯調遣此又紙上之兵也今後調兵當一面發銀一面調兵使各省鎮得隨發隨補不致空虛各汛地以滋他虞如兵部無此錢糧當力與戶部各衙門爭討以應急用此其當責成者一每各省鎮留兵留將又或報其家無兵某將物故兵部即置之髙閣而竟不肯執覆以責其必發又如調各土兵才被人駮即拱手而謝曰聽地方官斟酌只斟酌二字即將調發斷除殆盡此又紙上之兵也今後或有吝留不遣及逗遛不行者疏到即覆以如數必發為主此其當責成者三又嘗見部請欽限日某鎮道里若干應限若干日出關某省道里若干應限若干日出關然此限雖定而兵部已先忘之矣何況各省鎮何曽見處一承調不如期者此又紙上之兵也今後定限日期必不可遲誤一刻一時以長兵將玩驁難御之漸此其當責成者四今土狼毛浙各步兵僅可用于寬靉清河山險之地而緊對山寨如撫順三岔兒一帶平坡漫嶺非西北各邊兵必不可若見土毛各兵易調則任意調之而西北邊兵顧皆為督撫所阻而不敢多調此又紙上之兵也今除調土狼毛浙兵五六萬但足山險之用外餘當悉調西北邊兵之徑者以便衝突此其當責成者五伏乞皇上嚴諭兵部通將前調未到者近今增調者明白開列務足臣議十八萬之數而一一酌量逺近定之以欽限仍乞天語諄諭樞臣曰前者三路失事之後假有援兵接濟出關張揚聲勢或冀敵不再出攻開鐵乃坐視邊臣呼號漠然不應既已被敵窺破連陷重城姑令待罪視事若此番調遣仍不如數不依限致有失陷兩罪並發定有祖宗朝處治本兵之法在此臣之所謂當考成兵部者也兵部既查有某鎮某家某將兵馬應調確數矣又為處給錢糧補募軍馬及各丁安家矣如此而猶吝執不遣逗遛不前者此各省鎮之罪也如甘固援遼總兵以下在遼者甚多誰不對臣言祁魯二家有兵可調而該鎮乃疏稱其無兵不肯發遣如此之類誰念神京危逼誰念皇上顧憂誰念宫寢宗廟震驚不寧併乞天語諄諭諸臣曰此非救遼之師乃勤王之師也若遼東不守禍逼京師他日煩費諸臣者更苦更難倘有調發派數不依欽限因而失誤者定有祖宗朝處治督撫之法在此臣之所謂當考成各省鎮者也兵部如數以調矣各省鎮又如數以發矣而軍不精鋭馬不壯大器甲不堅利兵部但滿調數而可用與否不問也各省鎮但滿發數而可用與否不問也此又紙上之兵也冒虛名而受實禍年來遼東受纍海內受纍全在于此若不于山海關上逐一點驗出關何所稽考何所責成伏乞皇上特遣科臣之有風力而實心任事不避嫌怨者一員駐劄關上隨到隨驗凡不如數者參不依期者參兵馬孱弱器甲朽鈍者參仍即發回立限換補如有容縱出關而臣復點驗不堪者臣即執筆而議科臣之後此臣之所謂當亟遣科臣到關查核者也今時急矣雖核徴調之實嚴考成之法若必待考成各省鎮然後來援而遼已去矣頃聞薊西部落已經受款自應移緩就急依近調援查得寧夏固原甘肅延綏等處遊擊各領兵馬一千七八百名現在薊鎮駐防應急調出關救援至于各省鎮兵之調在通州昌平天津者聞已近二萬許人臣不知是何方兵士盡否堪戰亦當查其悍猛中用者如越效忠許定國丁吕試等所領各兵之類速發至遼應用又有原係援遼兵數而近為兵部曲徇天寒之請留派內地過冬者一併發遣亟催出關以上各項通限二月初十盡到遼陽違者以承調失期論蓋保遼陽無事薊鎮與京師自可安枕無憂無煩過慮無事張皇正不必堅持神京為重之説坐失遼陽而先自喪其所為重也此又今日之第一救急著也伏惟皇上亟賜裁斷施行疏入得旨援兵屢奉明旨通未著實遵行倘致失誤該部與省鎮各官豈能辭責今情形益迫救援難緩所請兵馬著如數調發勒限赴遼再有遲誤著以考成之法聽該科不時查參同罪不貸應遣科臣便作速議覆請處分以重封疆疏萬歷四十八年熊廷弼臣前以部調紙上有兵出關無兵責成兵部部臣黃嘉善揭辨謂臣介介于部中爭禮之故而拾疏語以相加此淺之乎視臣者可置勿論但謂免進數言欲臣收拾人心聨屬將士臣乃因是以娓娓相譏而自認為知罪是謂以收拾人心聨屬將士兩語獲罪于臣也是必勸臣以勿收拾勿聨屬而後可無罪也臣即粗戾何遽不曉人意一至此頃臣閲報見科臣官應震疏言部臣明是謂臣欠此收拾云云八字一味嚴核足以召怨致亂將來遼亡非兵力不足之故嘉善得推諉謝過是否洞中其微部臣當自知之而惟是臣于今日行事實過嚴實有不能自諱者蓋遼東向來文驕恣而武貪懦下懶傲而上縱徇全被一寬字所壞一事不作而冀人悅巳安靜一法不行而冀人感已仁慈一人不處而冀人誦已寬大本市德避怨而藉口收拾皆庇貪容懦而托詞聨屬大家相嚅相沫只圖作人情了套數誰肯認真上緊為地方幹事而茍有一認真上緊者出又從而忌之詆之運肘足以排之布蜚語以敗之以致今日事事壞處處壞將一完全遼東失陷一半而今尚可不認真不上緊悠忽遷延再將此一半失陷以為皇上宗社憂乎缺兵將甚急催兵部徴調而漫不著意乏糧餉甚急催户部處辦而漫不著意兵弱馬羸甚急催各省鎮揀發精壯而漫不著意猶謂地逺情疏不管他人死活至地方官火已燎眉刀已在頸宜何如其急急者乃敵方收糧運窖而我却悠悠于轉輸敵方開局治械而我却悠悠于打造敵方穵壕樹柵而我却悠悠于守具敵方秣馬礪刀而我却悠悠于餧養操練事事讓敵人人畏敵顧日日兀坐以待敵每一事公移私劄千言萬語且任飄風過耳而臣催安得不急詞語安得不厲此其嚴嚴在急公有募兵倚部道之庇而違將官約束者有採草斫木而抗令擅回者有拐馬成羣脫逃者有棍辨強徒濁亂營伍者有衙蠧索錢沈壓合營馬匹至兩月不與草料者以至剝軍倒馬玩法誤事之類臣知之安得不問處之安得不重此其嚴嚴在執法即地方官弗諒臣為急公而嗔其太逼弗諒臣為執法而怨其無情因而觖望動咸抵牾者而臣不顧也即因而别立議論如斬將而謂某可惜誅逃而謂兵非逃引水而謂淹遼城堆冰而謂軍淹死之類以阻惑衆心而臣不顧也即因而對面弗言而私稟各院地方弗言而布散長安以必伸已説彰臣謬而臣亦弗顧也何也恃有皇上獨知于其上閣部諸臣協助于其下也乃部臣亦為此説以佐之而臣復何恃哉自去冬以來相知寄書無不以開霽威嚴虛納道將為言臣駭詢其故始知有謂臣于各道講禮叱使簷下站立者謂臣性氣不好不容人説話者而不知其為以告者過也按部院儀注部臣補服見于簷上道鎮素服見于簷下一路皆然獨分守道簷上相見臣恐禮自臣壞待茶時從容語之見其辭色俱厲遂止及該道行後各道鎮不安仍請改正如儀注其情節原是如此而傳聞如彼何怪部臣引部中爭禮之説亙相印證若謂臣性氣不容人説不審是與臣細心商量戰何以勝守何以固兵馬何以練器械何以修糧草何以運車牛何以辦而臣拒不容耶抑亦一事不作但以強詞支抵而不容其説也今臣于部道鎮將固歡然相得也操急縱舍顛倒亙用而實非專主于嚴也今坐定一嚴字以生現在者之心而且使四方調補者皆疑畏不敢進臣即欲盡變其急公執法之念以收拾而聨屬之亦何可得去秋遼陽朝不保夕臣為皇上竭力死守今已半年無事臣雖不敢言勞然亦未嘗有罪今臣急公而人以私抗臣執法而人以情撓臣言敵難支而人云無妨臣言兵要多而人云將彀臣言兵將尚難用而人云兵精將勇總謂臣不能寬容而善用之使惡嚴樂寬者皆喜其説而叢怨于臣之一身不但他日敵來臣之法令決不能行于諸將而中間借事搖動暗相鼓煽且更有不忍言者臣本不敢言斥而人情事勢相迫而來不得不趁今日一控訴于皇上以求罷斥别選賢能早來收拾聨屬母徒以臣實部臣之言而重殘遼之後禍臣素善飯自去秋帶病出關猶日食數碗馬上挽強左右顧射今才數月耳食已減半手至不能舉弓心神怔忡眼目昏眩鬚眉頓白肌肉全消誠不料一強壯之身一旦銷減至于此醫官董一中謂臣過憂過勞過惱過鬱臣性命不足惜實恐誤皇上封疆事初五日部道鎮皆勸臣善攝臣撫膺自傷不覺對之泣數行下嗟乎此病此苦誰有憐臣諒臣者惟天地祖宗與皇上鑒此心耳臣無任哭懇天恩急迫待命之至疏上得旨遼事敗壞皆地方官玩愒所致熊廷弼一意振刷恢復封疆朕深切倚賴今情形甚急豈經略釋肩之時自棄前功著益殫忠任事與諸臣協心共濟母為人言所阻該部知道請敕臺臣查勘遼事疏泰昌元年熊廷弼臣謹奏伏惟神宗皇帝以半殘已壞旦夕待亡之遼交伏臣手保全至今天地祖宗在上文武軍民在下臣似有勞不知其罪頃臺臣張修德論臣罪應貶竄遐方此時天理不在人心有罪無罪一任橫詆但謂臣以破壞之遼遺他人他人從何處下手又謂付託得人亦須收得一半倘再不得人亦付之無可奈何何修德豫伏一破壞之案以俟日後成則惟他人功敗則惟臣罪而計之過早也去年開鐵連陷大小各衙門相向而哭莫卜所往而今且依然冠履雍容公私燕語也皇上試問修德遼破壞否懿路蒲河空城而逃無論已遼陽人北城奔南城南城奔各門或顛倒衣裳或棄置妻子以先脫去為幸而今且去者歸散者聚嬉嬉然室家相樂也商賈逃難回籍者今且捆載麏至塞巷填衢不減五都之市矣皇上試問修德遼破壞否遼城非常破碎士民知不可守而謀欲先去敵亦知不可守而謀欲速來今且內外鞏固壯哉一金城湯池也即瀋陽奉集堡向為人迹所不到而今亦以修守之固官吏商民晝夜通行如腹裏也皇上試問修德遼破壞否去年無車無牛無夫運糧自臣與各道處辦本地牛至三萬餘隻車二萬餘輛晝夜趲運而軍中始漸有糧草三路失事之後軍無片甲手無寸鐵庫局甲仗多不可用復調宣大各鎮匠役晝夜改造又增造大炮數千位槍炮一二萬計而軍中始漸有器械採桑削幹買角易筋調延大各鎮弓箭匠晝夜製造而軍中始漸有弓矢又調各鎮木匠旋造雙輪戰車五千餘輛每車安炮二位或三位以至火箭火輪火人火罐之類無所不備而軍中漸有攻守之具也皇上試問修德遼破壞否自斬貪懦三將而將知畏斬逃叛卒數十人而兵知戢不時捆責不餧馬不操軍者而營伍知收拾寒衣有賞馬棚有賞久戍有賞時節有賞而軍士知鼓舞犒以牛酒勞以燒割給以紗羅奬以花幣而將帥知感激亦無不人人盡心整頓圖一結局以歸鄉里也皇上試問修德遼破壞否去年破壞才是破壞臣從無可下手處下手收拾以至今日規模粗定自足為他人下手張本何須為人代愁而至于痛哭流涕謂臣歸而出其槖中金也金從何入謂臣內恃奧援也而臣生平孤行一意謂臣聞敵來而肝膽墮地也而冒險往撫順巡寬靉擐甲衝敵圍援瀋陽者獨何人斯修德有耳目有心肝終當自曉不待臣言惟是臣以積勞積鬱自五月二十一日發病衄血吐血大泄大痢虛危沈篤七月初始連疏請告非因人言也即從瀋歸病發再告而時亦未聞人言也遼陽莫危于去秋八九月今年四五月凶辰險日臣已撑過此後局勢已定無奈內有二豎入臣膏肓外有諸臣唾臣顔面扼臣喉吭掣臣手足百般弄臣死不得死生不得生雖欲不負先帝厚恩而去亦何可得修德不欲臣養病去而欲臣貶竄去則貶竄之耳何必矢口詈人遽傷雅道頃臣遺姚宗文書曰朝廷以一塊殘破疆土付弼而為之保全以無虧弼以一副完全身子報朝廷而為之消亡其大半遼已之亡而致存弼且之生而致死天地鬼神實共憐鑒即為衆口所銷鑠而一假勞苦公案有遼山遼水在此實録也無端結黨傾陷抹殺臣勞欲臣蒙罪而去輔臣票擬定為衆口所挾惟乞皇上電斷將臣罷斥即敕臺臣張修德馮三元立限往遼查勘遼事有無破壞使天下人曉然知臣罪之所在而不為他人代受其過病臣幸甚疏上得旨熊廷弼先以病告隨以會議著回籍聽勘其所奏事情候勘自明不必再辨該部知道御選明臣奏議卷三十五
