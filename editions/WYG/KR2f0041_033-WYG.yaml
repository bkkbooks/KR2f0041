body:
  text: 陳吏治積弊八事疏萬厯十一年邱橓臣謹言臣去國十餘年竊見近日士風漸靡吏治轉汙逺近蕭條日甚一日此非世運適然由風紀不振故也如京官考滿河南道例書稱職外吏給由撫按官概與保留以朝廷甄别之典為人臣交市之資敢徇私而不敢盡法惡無所懲賢亦安勸此考績之積弊一也御史巡方未離國門而密屬之姓名已盈私牘甫臨所部而請事之干牘又滿行臺以豸冠持斧之威束手俯眉聽人頣指此請托之積弊二也撫按定監司考語必託之有司有司則不顧是非侈加善考監司徳且畏之彼此結納上下之分蕩然其考守令也亦如是此訪察之積弊三也貪墨成風生民塗炭而所劾罷者大都單寒輭弱之流茍百足之蟲傳翼之虎即贓穢狼籍還登薦剡嚴小吏而寛大吏詳去任而略現任此舉劾之積弊四也懲貪之法全在提問乃豺狼見遺狐狸是問徒有其名或隂縱之使去或累逮而不行或批駁以相延或朦朧以幸免即或終竟其事亦必博長厚之名而以盡法自嫌苞苴或累萬金而贓止坐之銖黍草菅或數十命而罰不傷其毫釐此提問之積弊五也薦舉糾劾所以勸儆有司也今薦則先進士而舉監非有憑藉者不預焉劾則先舉監而進士縱有訾議者罕及焉晉接差委專計出身之途于是同一官也不敢接席而坐比肩而行諸人自分低昂吏民觀瞻頓異助成驕縱之風大喪賢豪之氣此資格之積弊六也州縣佐貳雖畀亦臨民官也必待以禮然後可責以法今也役使譴訶無殊輿𨽻獨任其汚黷害民不屑禁治禮與法兩失之矣學校之職賢才所闗今不問職業而一聽其所為及至考課則曰此寒官也概與上考若輩知上官不我重也則因而自棄知上官必我憐也又從而日偷此處佐貳教職之積弊七也科場取士舊有門生座主之稱若廵按舉劾固其職也乃劾者不任其怨舉者獨冐為恩尊之為舉主而以門生自居筐篚問遺終身不廢假明揚之典開賄賂之門無惑乎清白之吏不概見于天下也方今國與民俱貧而官獨富既以官而得富還以富而市官此餽遺之積弊八也要此八者敗壊之源不在于外從而轉移亦不在于下也昔齊威王烹一阿大夫封一即墨大夫而齊國大治陛下誠大奮乾綱痛懲吏弊則風行草偃天下可立治矣疏入帝從之請復建文年號立景㤗實錄奏萬歴十三年沈鯉臣竊惟人君有位號則有紀年有政令則有實錄此春秋不易之法自古及今無有以興亡隆替而因革予奪其間者我朝自太祖開基列聖相承金匱石室之藏具在乃建文以革除而槩稱洪武景泰以分附而并系英宗則皆為我朝缺典矣所據司業王祖嫡有循史職修缺典之奏臣等請先述其略而後及所以當正之故為皇上陳之我太祖髙皇帝在位懿文太子先薨至洪武三十一年太孫嗣位改元建文在位四年成祖文皇帝靖難踐位乃削去建文年號仍以洪武紀年及重修髙廟實錄遂將建文實厯附作洪武虚數此則革除之大略也正統十四年北兵入犯英宗睿皇帝躬馭六師自行天討至土木北狩景皇帝時為郕王奉皇太后命監國旋即大位次年八月英廟囘鑾後七年復辟是為天順元年其時奸臣石亨輩奏將景皇帝廢為邸王加諡曰戾成化元年修英廟實錄遂以景㤗事蹟附于正統之後天順之前注曰邸戾附至成化十一年憲宗純皇帝追體英宗本意始敕廷臣復景帝位號上恭仁康定尊謚改修陵寢景泰七年事蹟未及釐正此則附錄之大略也因循以至于今非謂其不可而遂已之也夫位號既復則實錄自當改正許其大不許其細是未體夫英廟之心而巳矣伏讀成祖登極詔書不過以建文四年為洪武三十五年然猶稱為少主未聞降削位號是在成祖親親之心亦必有不忍絶者而一時宣力歸命諸臣或務張功伐或茍存形迹遂贊成革除之事其亦未逹夫成祖之心耳夫成祖奉天靖難再造邦家正使年號不除何損萬一而曲為掩諱若此且天下後世各有耳目安可盡泯稗官野史各有紀載安可盡革此不但無益于事適足示人以疑故議復革除者非為建文為成祖也議更附錄者非為景帝為英宗也兹皆所不必諱者也方今聖明在上修遺舉墜以宏先徳正在此時臣等不敢為更張之議惟將英廟實録中間七年事蹟名曰恭仁康定景皇帝實錄無相混淆如斯而巳至于建文位號詔書中原無降削之文今亦無憑議復亦惟于髙廟實錄之末摘出四年事蹟復稱建文年號如斯而已夫以我太祖甫定天下即首命儒臣纂修元史又追謚其主為順帝淵哉聖心至公至厚矣成祖英宗之心同符太祖而建文景㤗又非勝國之君之比也元主可謚何忍沒其號于建文元史且修何可缺其錄于景㤗且景帝之位號既可復則建文年號亦可復建文之死事諸臣且䝉我皇上之䘏錄而況其君乎況其為太祖之嫡孫乎慰祖宗在天之靈伸寰海久抑之意彰微顯闡幽之烈寓興滅繼絶之仁斯舉也實聖徳聖政之第一事也豈獨稱昭代之信史而已耶惟鉅典湮于累朝而一旦頓復公論闗乎萬世而傳信無窮皆出自人主獨斷非臣等所敢擅擬伏候聖明裁定奏入下部議不果行請宥革除緣坐外親疏萬厯十三年温純臣竊查先准兵部咨該廣東道監察御史屠叔方題前事本部覆奉欽依咨行各撫按官通行司府州縣衛所弔取節年軍冊備查革除年間被罪諸臣除齊㤗黃子澄外其方孝孺等連累發遣親故不拘現在死絶遵奉明㫖務查世代逺近接輩来厯明白的確具奏奏免以廣皇仁内有族黨親戚墳宅資産久在戍所者若一概遷移囘籍于人情恐有不堪合聽其自便願囘者給與免帖放囘不願囘者給與免帖仍在戍所附入民籍隨住該衛即將冊内軍名削除不許復行勾提本部仍載入考成簿内通限本年十二月終奏報如原無應宥人數查實咨部不得輕信流移奸人妄告混免等因備咨前任撫臣准經案行浙江布政司轉行各清軍守巡海兵等道及各府州縣衛所逐一查議呈祥以憑具題去後未報該臣接管催據該司呈稱依奉行據杭湖紹金衢嚴處七府各囘稱所屬州縣衛所並無革除年間被罪諸臣方孝孺等連累發遣親故無從開報各具印結繳覆在巻又據嘉興府申稱平湖崇徳海鹽嘉善四縣海寜嘉興二衛所並無前項累遣親故止據嘉興縣申開應宥軍人吳阿真秀水縣申開軍人朱慶員等雖無明書方孝孺事蹟而有奸惡外親字様范小孫等係忠臣方孝孺株連楊任外親累遣桐鄉縣申開軍人仲阿添等事亦因革除年間忠臣方孝孺株連楊任外親牽累發遣俱各有據均應一體申豁等因又據寜波府申稱鄞慈定象四縣寜定昌三衛所俱無前項累遣親故外據奉化縣申開忠臣戴徳彝累遣軍人屠叔保并户絶軍人楊佛童等擬合轉申豁免等因又台州府申稱黄巖天台二縣并台州衛左右中前水軍等所松門衛左右中前楚隘等所海門衛外屬前新桃健等所各無應宥軍人其臨海太平仙居寧海四縣台州衛後所松門衛後所海門衛左右中等所各造忠臣方孝孺王叔英鄭恕累遣軍人陳景原等文冊到府理合申詳豁免等因又據温州府申稱永樂平泰四縣温金盤三衛海瑞平等所各無前項累遣應宥軍人止據瑞安縣申開忠臣卓敬累遣軍人徐亞生等到府合行轉申遵例矜豁等因及准清軍守巡海兵等道各咨覆到司該本司左布政使衷貞吉右布政使余一龍查得原題止稱革除年間被罪諸臣方孝孺等並未開有諸臣細名今據各府造到冊内有忠臣戴徳彛王叔英鄭恕卓敬累遣親故隨查得先為仰遵明詔查錄遺忠以彰聖政事該巡按浙江監察御史蕭具題革除年間被罪諸臣方孝孺陳性善戴徳彝卓敬劉璟鄭恕鄭華王叔英程本立盧原質龔泰盧迥一十二人俱經禮部覆查遵奉欽依襃表備行撫按二院轉行本司于省城總建一祠春秋致祭訖為照戴徳彝等既與方孝孺俱係已襃忠臣則凡累遣親故通應一體推恩矜宥但有祖充軍役繼復累遣而調併别衛者雖應宥其後衛軍役而原係軍籍隨衛安居多年似不必更張生擾至如原籍有丁盡而户存及丁盡而户絶者均應照列開豁再照嘉興府申送嘉興等縣冊開有方孝孺株連忠臣楊任致累伊外親范小孫等遣戍雖范小孫等非方孝孺親故而遣戍實由方孝孺波及亦應併免今將各府縣衛非查過累遣軍人姓名來厯分款造冊現在呈乞本部院再行加覈俯賜㑹議題請施行等因到臣據此該臣㑹同巡按浙江監察御史范議照捐軀盡節人臣殉國之忠褒往勸來聖主礪世之典革除年間被罪諸臣方孝孺等節䝉累朝褒崇恤錄所以振綱常表節義者誠千載之一時矣但諸臣外親族屬連累發遣者尚未矜復似猶未足以普聖澤而慰忠魂也兹者仰荷皇上俯納部院諸臣之言特㫖查豁綸音一下非惟株連蔓繫久成窮囚喜得更生之幸而凡率土臣民莫不舉手加額感激鼔舞共思殫忠畢義報效于明時矣臣等仰承徳意敢不竭力清查以期對揚于萬一今行據該司呈報前来臣等逐一細加查覈除祖充軍役繼復累遣調併一衛者照舊軍籍隨住不必更動生擾外其方孝孺戴徳彝王叔英鄭恕卓敬諸臣累遣親故現在著伍供役者似應悉從矜宥以霑浩蕩之恩原籍丁盡户存户絶者均應遵例開豁以免勾擾之害至如方孝孺連累楊任併累伊外親發遣者雖非孝孺親故而實由孝孺殃及亦應併請宥豁以宏一視之仁據呈查議的確委無詐冒奸弊相應具題伏乞敕下該部再加查議覆請將革除年間被罪諸臣方孝孺等累遣親故現在著伍吳阿真等八十二名連累楊任外親范小孫等十一名併丁盡户存户絶朱阿定等六百九十一名通行本省各該府縣衛所盡行宥免願囘者給與免帖不願囘者亦給免帖仍在戍所附入民籍當差該衛削除軍名不許復行勾擾仍督行外省直衛所遵照但有營丁在衛者一體查明豁免開除施行庶聖恩廣施忠魂永慰不惟雪彼時株蔓之冤亦且扶萬世綱常之重矣疏入帝從之陳十蠧疏萬厯十三年余懋學臣竊惟諸臣之不能容李植等一則以科場不能無私而惡植等之訐發一則以往者嘗保留張居正而忌吳中行沈思孝等之召用二疑交于中故百妬發于外也夫威福自上則主勢尊植等三臣陛下所親擢者也乃舉朝臣工百計排之假令政府欲用一人諸臣敢力挫之乎臣謹以臣工之十蠧為陛下言之今執政大臣一政之善輒矜賛導之功一事之失輒諉挽囘之難是為誣上其蠧一進用一人執政則曰我所注意也冢宰則曰我所推轂也選郎則曰我所登用也受爵公朝拜恩私室是為招權其蠧二陛下天縱聖明猶虚懐納諌乃二三大僚稍有規正輒奮袂而起惡聲相加是為諱疾其蠧三中外臣工率探政府意向而不恤公論論人則毁譽視其愛憎行政則舉置徇其喜怒是為承望其蠧四君子立身和而不同今當路意有所主則羣相附和敢于抗天子而難于違大臣是謂雷同其蠧五我國家諌無專官今他曹稍有建白不曰出位則曰沽名沮忠直之心長壅蔽之漸是為阻抑其蠧六自張居正䝉蔽主聰道路以目今餘風未殄欺罔日滋其蠧七近中外臣僚或大臣交攻或言官相訐始以自用之私終之好勝之習好勝不已必致忿爭忿爭不已必致黨比唐之牛李宋之洛蜀其初豈不由一言之相失哉是為競勝其蠧八佞諛成風日以寖甚言及大臣則等之伊𫝊言言邊帥則等之方召言及中官則誇吕張復出言及外吏則頌卓魯重生非藉結歡即因邀賂是為佞諛其蠧九國家設官各有常職近兩京大臣務建白以為名髙侵職掌而聽民訟長告訐之風失具瞻之體是為乖戾其蠧十也疏入帝不納請正文體疏萬厯十四年沈鯉臣准儀制清吏司案呈照得近年以来科場文字漸趨竒詭而坊間所刻及各處士子之所肄業者更益怪異不經致誤初學轉相視效及今不及嚴禁恐益灌漬人心浸尋世道其為患害甚于異端蓋人惟一心方其科舉之時既可用之以詭異獲禽逮其機括已熟服役在官茍可得志何所不為是其所壊者不止文體一節而亦于世道人心大有闗繫相應題請申飭以遏狂瀾等因到部臣等看得言者心之聲而文者言之華也其心坦夷者其文必平正典實其心光明者其文必通逹爽暢其不然者反是是文章之有騐于性術也唐初尚靡麗而士趨浮薄宋初尚鈎棘而人習險譎是文章之有闗于世教也憲宗諭詹事黎淳曰出題刋文務依經按傳文理純正者為式故今鄉㑹試進呈録文必曰中式則典雅切實文理純正者祖宗之式也今士子之為文何式乎自臣等初習舉業見有用六經語者其後引用左傳國語矣又數年而引用史記漢書矣史漢窮而用諸子諸子窮而用百家甚至取佛經道藏摘其句法口語而用之鑿樸散淳離經叛道文章之流弊至是極矣其文體尤恥循矩矱喜創新格以清虚不實講為妙以艱澀不可讀為工用眼底不常見之字謂為博聞道人間不必有之言謂為别解茍竒矣理不必通茍新矣題不必合斷聖賢語脉以就已之鋪叙出自巳意見以亂道之經常白日青天之下為杳冥魍魎之談此世間一怪異事也夫出險僻竒怪之言而謂其為正大光明之士作𤣥虚浮蔓之語而謂其為典雅篤實之人也可乎如謂人自人而言自言則以文取士者獨以其文而巳乎抑孟子之所謂生于其心害于其政者豈為無稽之言乎臣等不以文為重而為世道人心計心竊憂之嘗謂古今書籍有益于身心治道如四書五經性理司馬光通鑑真徳秀大學衍義邱濬衍義補大明律㑹典文獻通考諸書已經頒行學宫及著在令甲皆諸生所宜講誦其間寒素之士不能徧讀者臣等不能彊博雅之士渉獵羣書臣等不敢禁但使官師所訓迪提學所課試鄉㑹試所舉進者非是不得旁及焉仍乞容臣等㑹同翰林院掌印官將𢎞治正徳及嘉靖初年一二三場中式文字取其純正典雅者或百餘篇或十數篇刋布學宫以為凖則非是不得錄取焉除郷㑹試已經臣等題定有犯前禁者隨即指名參處外其直省提學官各持一方文衡品題髙下人皆嚮風轉移士習尤為𦂳切如使膠庠之所作養者皆務為險僻竒怪之文而鄉㑹之場欲合乎平正通逹之式臣知無是理也乃往時止于科舉年分稍一申飭其各直省小考則任其變亂程式置之不問是謂濁其源而求其流之清也不可得巳合無恭候命下容臣等咨都察院行兩直𨽻提學御史及各省巡按御史轉行各該提學憲臣務仰體朝廷徳意相率以正文體端士習轉移乎世道而不得厭常喜新標竒攬異如復有前項險僻竒怪決裂繩尺及于經義之中引用荘列釋老書語者即使文采可觀亦摘其甚者痛加懲抑以示法程仍將解部考巻容臣等逐一閱驗咨送吏部以為提調學政官殿最伏乞聖裁疏入帝從之請停礦稅疏萬厯十四年温純臣等近暏時事不勝把憂竊幸皇上屢禁𣙜採擾害散遣隨從虎翼中外臣民舉手加額謂聖明日月照臨停止可旦夕待也不意蕞爾貴州亦遣稅使臣等志在獻替若徒以一言塞責不求實囘天聽是曠官職是昧禍機是負皇上坐待有事圖之無及臣等之罪將用何詞以解蓋自𣙜採四出其害則閭閻隠忍巳極雖官司未必盡知其禍則官民相向深憂而皇上以為無事厯星變火災水旱民不聊生之地在在有礦稅之役在皇上愛民盛心固曰不忍加𣲖乃有此舉在地方有司官吏則曰奉有明㫖誰敢不遵于是或攤之行户或𣲖之經紀或為頭㑹箕歛或為椎髓剥膚蠅頭錐末雖細不遺肩挑背負無微不及其所進數萬數千皇上以為數止于此不知特此其一耳而各官役之狼攫侵牟充私囊者十而九也夫攘臂而奪之食弱者必怒于色強者必怒于言悍者必操戈從之矣豈有奪民之財而戕其命能使之束手而待斃乎彼特有所俟而未發耳皇上毋謂臨清儀真激變之後竟亦帖然無足慮也亦母謂今日解銀幾千明日觧銀幾萬可以惟其所欲而無不如意也夫多藏厚亡天地大數財聚民散黼扆箴規不可不深長思也在昔忠臣愛君必防其漸𫝊稱長國家而務財用必自小人菑害並至今所用惟不知民艱之中使茍求衣食無頼之棍徒從来大盗往往乗釁待隙今鹽法壊軍餉匱戎馬凋疲顧此失彼山澤之雄樂禍幸亂流散之民有死無生征戍之役沿途肆虐岌岌乎不止釁與隙矣而語目前之多故莫如遼左尤莫如貴州與四川在四川苦採木之役民已喪其樂生在貴州號彈丸之區餉皆資之各省而播酋復肆鴟張為川貴大害皇上惻然西顧方且趣兩省督撫星馳征討以拯塗炭奈何復從而重困之軍馬芻餉方望内帑給發數十百萬不止而又求數萬之稅于其地與素不産之名馬乎此驅民使之歸播驅啇旅使不更出入于滇楚譬如藩垣不培盗必斬闗而入病夫垂斃而復飲以烏喙鮮有不立仆者皇上不為封疆計則已茍為封疆計可任網利之徒恣意漁獵以撤其藩垣且益之疾而速其斃乎故語民間愁苦各省礦稅皆宜報罷為生靈命脉計也語及疆事安危則川貴遼左尤宜先罷為國家保障計也夫生靈之休戚較諸一已之玩好孰輕孰重國家之大計較諸一時之小利孰利孰害矧與民爭利而究也必不得亨其利又孰與以天下之利還之天下而使一心愛載疆圉無虞之為愉快耶臣等竊懼時艱不忍徒仰屋空嘆是用昧死而進其狂愚伏乞皇上深維安攘之至計遐覽元元之苦情亟將各省𣙜税諸使慨然召囘于以上綿皇祖之鴻業下答四海之民心宗社幸甚倘少須時日次第罷遣則乞于川貴遼左用兵之處先停征稅庶重地免分外之擾征討有底定之期其闗繫國家尤非淺鮮惟聖明幸留意焉臣等無任懇切待命之至疏入帝不納乞矜廉吏被誣疏萬厯十四年温純臣等竊惟國家事有當婉詞曲陳以冀下情易逹者有當苦口盡言以求天聽蚤囘者今事勢景象日急一日臣等敢不盡言伏自皇上礦稅兼行旋以中官李道訐奏逮問南康府知府吳寳秀星子縣知縣吳一元一時人心錯愕臣等雖身任言責止從九卿陳乞不再為疏煩瀆竊以為舉朝之言公言也必䝉皇上垂聽又恃皇上不詳擾害地方之㫖各官役或不敢違若嵗事豐登官民相安縱有意外之慮知皇上必暫為而旋即已之也今據李道訐吳寳秀等遂令寳秀之妻上怖天威下懼夫難脫􅆪以佐路費不及四金旋即自盡死别遺一幼子呱呱就寄夫寳秀固國家一廉吏也臣等于京察時訪其官大理茹苦有聲今任南康甫十六日偶與李道齟齬輒遭䧟以鄰境竒禍且于桎梏中傷妻不可復生念幼子未必復見祗畏嚴命且泣且行而又重以長途跋渉之艱緹騎繫緤之苦不啻隆冬而遇霜雪之交加也此等情狀南康士民痛惜道路逺近悲憐我皇上聞而知之未有不惻然動念者也臣等聞其體甚羸弱倘付詔獄加以箠楚萬一不支或死杖下縱不即死傳之天下後世將謂皇上以中官爭利之故而致方面㢘吏妻死身危不亦輕重失倫甚非朝廷為民設官之意乎况今異星東墜明屬兵兆徐鳳以北旱二千里麥苖無望民雜草葉以食即如皇上初年布衣祈禱以囘天意發倉賑貸以救民窮猶恐無濟于時而礦稅官役方且交錯滿道有掘之地不得則以一條鞭法索之民而民不能堪者有本地棍徒通同官吏指某塚某屋有礦而詐銀入巳者有一物而四五稅或稅及于囊資者有搶奪成風官役倡之市棍又假官役以效之利則歸衆名則歸皇上者遍天下皇皇然相欺相爭相仇不至于竭澤殃民不已也不至于召釁起亂不巳也即今輦轂之下商旅罕至况其逺乎郊闗之外搶奪公行况其逺乎近儀真太監暨禄又報上新河民蜂擁萬餘幾成大變矣而㑹徐鳳以北大旱淮揚鹽法阻滯竈丁罷煎徐鳳固從来掲竿聚衆之藪淮揚鹽課尤年例邊餉取給之地也各省稅銀舊所資以充邊餉者亦少半充内帑太半充各官役之囊矣無論軍士枵腹不待脱巾乃見竊恐不軌之民與失意失利之民並起所謂失意之民林章輩是也所謂失利之民上新河之蜂擁與竈丁是也所謂不軌之民我朝之劉六齊彦名師尚詔輩是也然而不軌之民又因失意失利之民而起縱能撲滅將安所資餉于庫藏匱竭之時即取原奏各官民而盡置之法亦何濟矣蓋天下所最可患者有可修省之時而以為不足畏則可畏者至而修省無及有可挽囘之計而以為不足慮則所慮者至而挽囘無及臣等誠願皇上之及時以挽之也及時則不過片紙温綸而風行雷動立見四海臣民仰頌我皇上即堯舜禹湯文武不能過且其為力甚易不然則其難有萬倍于今日者臣等職在守法竊有感于吳寳秀等之逮而恐天下之夫不能有其妻父不能保其子者不獨一寳秀也又恐今日聚利之禍不獨在官民也故敢以苦口之言進伏乞皇上特霽天顔俯察臣等所言原非過計臣等所慮原出閭閻廹苦真情倘荷天恩憐呉寳秀之廉而矜其苦渙發徳音放囘令復原職臣等之上願也如以業有成命仍乞聖慈于拏到之日敕下刑部併知縣吳一元從公審實請㫖發落俾得保其殘生因停礦稅收回原差各省中官及各官役以收人心以弭禍兆以保治安之休于無疆宗社幸甚天下臣民幸甚疏入帝不納乞保聖躬重宗社疏萬厯十四年盧洪春臣伏見陛下自九月望後連日免朝前日又詔頭眩體虚暫罷朝講時享太廟遣官恭代且云非敢偷逸恐弗成禮臣愚捧讀驚惶欲涕夫禮莫重于祭而疾莫甚于虚陛下春秋鼎盛諸症皆非所宜有不宜有而有之上傷聖母之心下駭臣民之聽而又因以廢祖宗大典臣不知陛下何以自安也抑臣所聞更有異者先二十六日傳㫖免朝即聞人言藉藉謂陛下試馬傷額故引疾自諱果如人言則以一時馳驟之樂而昧周身之防其為患猶淺倘如聖諭則以目前衽席之娛而忘保身之術其為患更深若乃為聖徳之累則均焉而已且陛下毋謂身居九重外廷莫知天子起居豈有寂然無聞于人者然莫敢直言以導陛下是將順之意多而愛敬之心薄也陛下平日遇頌䛕必多喜遇諌諍必多怒一渉宫闈嚴譴立至孰肯觸諱以蹈不測之禍哉羣臣如是非主上福也願陛下以宗社為重毋務矯託以滋疑力制此心慎加防檢勿以深宫燕閒有所恣縱勿以左右近習有所假借飭躬踐行明示天下以章律度則天下萬世將慕義無窮較夫挾數用術文過飾非冀以聾瞽天下之耳目者相去何如哉疏入帝震怒命治罪杖六十斥為民請嚴言官曠職之罰疏萬厯十五年李懋檜臣竊見給事中邵庶論誠意伯劉延世波及言者欲概絶之防人之口甚于防川庶豈不聞斯語哉今天下民窮財殚所在饑饉山陜河南婦子仳離僵仆滿道疾苦危急之狀蓋有鄭俠所不能圖者陛下不得聞且見也邇者雷擊日壇星墜如斗天變示儆于上畿輦之間子弑父僕殺主人情乖離于下庶以為海内竟無可言巳乎夫在廷之臣其為言官者十僅二三言官不必皆智不為言官者不必皆愚無論往事即如邇嵗馮保張居正交通亂政其連章保留頌功詡徳若陳三謨曽士楚者並出臺垣而請劔引裾杖謫以去者非庶僚則新進書生也果若庶言天下幸無事則可脫有不虞之變陛下何從而知庶復以堂上官禁止司屬為得計伏覩大明律百工技藝之人若有可言之事直至御前奏聞但有阻遏者斬大明㑹典及皇祖臥碑亦屢言之百工技藝之人有言尚不敢阻况諸司百執事乎庶言一出志士解體善言日壅主上不得聞其過羣下無所獻其忠禍天下必自庶始陛下必欲重百官越職之禁不若嚴言官失職之罰當言不言坐以負君誤國之罪輕則記過重則褫官科道當遷一眎其章奏多寡得失為殿最則言官無不直言庶官無事可言出位之禁無庸太平之效自致矣疏入帝責其沽名鐫二秩劾廠監張鯨疏萬厯十六年張沂臣聞宦官之禍譬猶腹心之疾惟英明之主早見豫防㧞去本根故免日後之禍臣不敢逺引即如正統時太監王振正徳時太監劉瑾舞弄朝權傾危社稷後雖萬死何足贖罪至今令人切齒寒心此二朝明鑒也皇上臨御十有六年宫闈穆清朝綱整肅文武諸臣兢兢奉法獨有東厰太監張鯨倚仗恩寵欺天壊法膽大心雄從来未有科道諸臣所奏八罪一一有據詔付法司覆究惡黨中外臣民踴躍歡呼咸謂必將翦除元兇以杜後禍法司問明奏請邢尚智等俱奉㫖處分張鯨姑念侍奉多年勤勞令痛加省改䇿勵供事中外聞之大失所望惡本不除為害滋甚臣恐王振劉瑾復見于今日矣敢為皇上極言之昔我太祖髙皇帝防制宦官極嚴有罪不赦洪武中一監官供事内廷言及政事即日斥遣因諭羣臣曰自古英明之君凡有所謀必廣及公卿大夫而斷之于已未聞近習嬖倖可得預者今此宦者雖事朕日久不肯姑息決然去之所以懲將来也夫監官僅言及政事未曽挟威逞勢如張鯨之甚也太祖即日斥去不肯姑息使如張鯨犯法太祖當如何處置也今科道交章法司究問皇上知鯨罪惡屬實即加顯戮以洩天地祖宗神明之怒猶謂其晚奈何令罪大惡極者仍處宫闈禁掖之地乎往年馮保招權納賄皇上巳籍没之矣近日宋坤挟詐騙財皇上即斥去之矣張鯨之惡百倍馮保宋坤擢鯨之髪不足數其罪食鯨之肉不足報其冤故京師為之語曰寜逢虎狼莫逢鯨張言虎狼有時而不噬張鯨無人而不害也皇上英明同符太祖不難去馮保不難去宋坤何猶難去一張鯨耶臣伏讀明㫖以意斷之邢尚智監候處決謂其黨壊邊事也使鯨不恣權雖百尚智豈能撥置李登雲張維徳發烟瘴地方永逺充軍謂其受賄縱情欺君賣法也然受賄賣法孰過于鯨尚智李竒等冐領鈔銀供稱張鯨主令冒領者既加之罪主令者何獨幸免此臣所未觧也以為鯨侍奉多年其弄權壊法亦多年矣皇上當深恨之何復念其勤勞也以為痛加省改猶可供事則未聞狠于狼虎之人而可責令守門戸者也况在宫闈左右安知不包藏禍心乎前數有流傳鯨廣置金寳多方請乞皇上猶豫未忍决斷中外臣民初聞不信竊謂皇上富有四海豈少金寳明並日月豈墮奸詐威如雷霆豈徇請乞及見明㫖復許鯨䇿勵供事外議紛紛遂以此事為真謂鯨奸謀既遂而國家之禍自此始矣伏乞皇上大奮乾綱為法割愛将張鯨重治以儆奸邪以釋羣疑宗社生靈俱可無恙不然臣恐皇上之聰明聖智竟為此閹誤也皇上十六年清平世界竟為此閹壊也以一閹官之故而壊聖明之治壊祖宗之法壊朝廷之體天下謂何後世謂何此忠臣烈士所以日夜仰天拊心必欲殄滅此賊而後已也臣職在諌垣君側有惡不為掃除皆臣之罪故敢直言無諱惟聖明裁察幸甚疏入得㫖這事情已有㫖了這厮每欲與張居正馮保報復私意不遂故醜汚君父好生無禮著拏送鎮撫司好生打著究問了來說不許縱情賣法御選明臣奏議巻三十
