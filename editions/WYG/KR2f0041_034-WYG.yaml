body:
  text: 請保䕶聖躬疏萬厯十七年趙志皋臣謹奏為披瀝悃誠懇祈明聖慎保聖躬以介萬年以衍靈長事臣荷䝉皇上㤙寵叨居侍從尋厯卿貳爵位之榮禄養之厚有捐軀難報者豈啻爵禄㤙寵而已哉蓋自有此身以來皇上葢之如天容之如地則此身非臣之身皇上所賜之身也愛其身而不知愛君之身天地間之罪人也然自古忠臣愛君頌之曰萬福曰萬壽天保諸詩可詠也愛君而不以古人之心為心非真愛君者也臣不敢也請為皇上陳之臣惟古帝王之御天下能以天下重其身為上天之眷命為下民之共主為祖宗紹鴻業為子孫埀丕基九重端拱非以自恣也有逸慾之戒焉萬方供獻非以自侈也有耽樂之戒焉冶容麗色伐性之斧斤也有荒滛之戒焉崇飲酣歌迷心之鴆毒也有沈湎之戒焉夫是以操存内固血氣順軌精明堅實壽考無疆周公為成王作無逸述商王不敢荒寧文王不遑暇食不敢盤于遊田厥享國長乆者葢此意也臣近嵗以左諭徳少詹事侍朝講㳟覩天顔和睟聖體康強退而私相喜曰真萬年之令主也今年三月初于邸報中見鴻臚寺接出聖㫖朕近因動火免朝四月中又見大學士王鍚爵疏奉聖㫖覧卿所奏悉見讜言但朕自去年以來動大頭眩輒不耐勞煩欲以静攝非安逸怠荒臣伏讀之仰見皇上虚懐納言敬徳慎疾臣惓惓之所願望者然私心竊有疑焉皇上春秋鼎盛精神健旺稍有不和一養旋復何自冬相延至今也臣謂人身之有水火猶天地之有陰陽心屬離為火腎屬坎為水水宜升火宜降此水火既濟之理也善養者清心寡欲俾腎水有餘自然上升制伏離火生津生液而君火常住不善養者徇情縱慾致腎水不足不能上升制伏離火為眩為暈而邪火盛行今奉㫖乆稱動火臣私心求之得非九重之内可以自肆將逸慾而不之儆乎萬幾之暇欲以自娛將耽樂而不之節乎嬿婉在側而袵席之愛不能自割乎聲樂在御而麴糵之好不能自克乎有一于此皆足以損真伐和耗傷元氣天元氣之在人猶木之有根水之有源也木傷根則枯水傷源則竭人傷元氣則精神短少軀體孱弱致疾蓋有由矣伏願皇上念天地祖宗子孫人民之重思古帝王逸慾耽樂荒淫沈湎之戒惜元氣之不可傷而于宫中娛樂燕饗視之若花鳥水石然以寄一時之興行之有節而不沈溺守之以禮而不放逸則外耗旣除内體自固元氣常足而邪火不攻聖躬自爾清泰矣茍為不然則攻取者衆存養者㣲如火之鑠金也如斧之伐木也良可畏哉年不可恃時不可失願皇上當此富盛之年而調燮以培之則為力也昜若他日虧損之後而藥石以扶之則為力也難此在皇上深思而力反之爾宋臣蘇軾有言曰人生之所好者逸慾而所甚好者生以其所甚好禁其所好庶幾必信臣願皇上信臣之言而已臣又惟養身莫善于寡慾寡慾必先于清心然人心必有所寄寄于嗜慾則念兹釋兹在嗜慾寄于存省則念兹釋兹在存省語云日親日近日逺日疎此有所寄之說也皇上當何所寄哉宋儒真徳秀曰惟學可以養此心惟親近君子可以維持此心臣願皇上日臨講幄常御經筵與二三儒臣講究義理退則将所講經史覆玩而詳繹之務求必得于心則此心寄于學問而他念不足以入之矣又願如常視朝數召三公九卿于便殿商㩁庶政退復将所上章奏徧閲而深省之務求必察其故則此心寄于治道而他好不足以奪之矣内廷之中非外臣之所得預又當擇其内臣之忠謹者給事左右以侍旦夕之起居以䕶燕間之遊息取其箴善規過察其導慾獻諛由此自朝至昃必警必戒無以内逸妨外勞無以十寒勝一暴自然聖慮日清嗜慾日寡聖躬無不強固矣非天下臣民之幸哉臣待罪南都寔叨近侍願獻忠于皇上乆矣秖以官非言責而匡扶朝政指陳時事則大小臣工前後臺諌俱巳言之臣何敢復瀆天聴至于保䕶之義臣寔預有責焉而一念忠愛之心耿耿不容以自已也夫言及乘輿則畏禍者忌事闗宫壼則遠嫌者疑臣顧不畏斧鉞而冐言之臣之罪也然苦口之藥治病者利焉拂心之言治國者資焉臣乃直披肝膽而力陳之臣之愚也舍其罪以取其愚臣之所大幸也惟皇上埀擇焉臣無任祗慄祝願之至疏上得㫖覧卿奏知道了論公用舍疏萬歴十七年逯中立臣惟朝廷有用舍之權而天下有是非之公用舍合于公則人服而議論自息用舍不合于公則人不服而議論日滋故曰王道本乎人情自古以來未有上下異情大小臣異心邪正倒置衆論沸騰而可以言治者臣睹近來諸臣相繼而罷者率多砥行好修守正不阿之士如郎中譚一召䟽中所云得罪棄置者六十餘人臣不敢謂其皆皭然君子然而為君子者多也而偶以一事固執一言觸忤遂令其牢落下僚跧伏田間壮志鬱而不伸忠猷藴而未竟此臣所以深為諸臣惜也方今中外多故苦無任事之人而今被斥諸臣雖位有崇卑才有偏全皆國家所作養生平所砥礪今不使之為國家用而反令藉之以成其私名致感時者有憐才之嘆司銓者有乏才之憂此臣所以深為世道惜也夫諸臣有以爭國是而去者有以詆輔臣而去者又有以申救株連疑及輔臣而去者陛下怒言者則曰出朕獨斷而輔臣王鍚爵之自觧亦曰有主上親筆臣謂所罷者非正人也則斷自宸衷固主上去邪之明卽擬自閣臣正大臣為國之忠若所罷者果正人也出于閣臣之票擬而有心斥逐者為妒賢出于主上之裁决而不能匡救者為竊位彼職贊密勿身膺隆眷不補牘力諍而坐視忠良屏棄䜛佞鴟張雖間有揭救然而諸臣之擯斥者如故也大臣以人事君之道恐不如是故臣又深為輔臣惜也今陛下欲安輔臣則罷言者言者罷而論者愈多論者多而輔臣益不自安卽如髙攀龍一䟽惓惓為國惜才卽部院大臣亦許其願忠之心矣中外諸臣亦多為之申觧矣孫繼有譚一召之疏不無過激而扶正抑邪之言不無可採陛下重罰二臣以謝輔臣二臣罰而輔臣能自安乎臣聞防口甚于防川聖如虞舜猶察邇言而用之況泰交一疏輔臣不以淹棄諸臣請乎陛下以心膂託輔臣則何不行輔臣之言從中外臣工之願明諭吏部于先後廢謪諸臣隨材錄用以示大公則君有容直之名臣無敢言之譽國收多賢之益廟堂無處分之煩衆囂自息輔臣自安矣宋劉安世曰愛惜人才乃人主自為社稷計程子曰朝廷不失于舉錯使議論何名而沸騰釋羣疑而收人心莫要于此然臣又有言焉留都銓卿以沈鯉推而不用尚寳司丞以李懋檜補而不允至于鄒元標慷慨大節海内屬目而不能一日立朝夫以陛下寛仁獨不能容一二直臣乎以輔臣見知于王獨不能為國用一二直臣乎端人短氣正士結舌聖明之朝不宜有此輔臣不思竭力叩閽仰回天聴以收民譽而樹令名而徒忿衆口之呶呶以歸過于君父此臣所以義激于中不容黙黙也臣一介草茅䝉拔寘吏垣感時効愚罔知忌諱伏惟聖明裁納疏入帝怒停俸一年論修史用人疏萬厯十七年逯中立臣伏見該輔臣王鍚爵題請纂修正史起原任詹事劉虞䕫充總裁官輿論嘖嘖以為匪人臣曰是輔臣援所私而不顧天下之公議也方具䟽參論旋聞同官業已上請竊謂輔臣必聞言而悔滌心而聴則臣可無言矣旣奉旨先該呂坤保薦劉虞䕫急宜起用今御史紛紛參駁孰為公論著該部院定議來說欽此臣仰見皇上深居大内留神章奏采公論于外廷付定議于部院而毫不以成心預也繼而思曰是出于宸衷之主裁歟則呂坤保薦事在往年猶然簡在聖心虞䕫何人而當此隆眷也抑出于閣臣之票擬歟則是以桃李之私情謬為推引而奈何假呂坤之一薦以自文也臣請得而畢其說撫按之臣鎮輯一方境内士夫所改容而禮者也非巨姧豪宦不以列弹章其薦人也不得不寛廟堂之上提衡天下宇内才品所懸鏡而别者也非宏才碩望不以辱弓旌其用人也不得不嚴撫按之保薦或偶取其鄉論廟堂之起用必詳核其官評試查各處撫按所薦舉地方人才者能人人而用之乎彼虞䕫生平具在去嵗拾遺疏中真士類所不齒聖世所不容者不卽罷斥已為漏網遺姧此固滿朝公論輔臣獨不知乎知之而何故復用之乎夫用虞䕫也為得意門生而私之也私虞䕫而借明㫖以塗天下也借堂官以箝臺臣也則黨䕶之心化而為機械儻皇上試召輔臣而問不知輔臣何詞以對且今天下多故需人甚急廢謪諸臣無賜環之日中外士紳日夜望輔臣補牘力諍今未能進一君子而先進一邪臣輔臣又将何詞以謝天下乎伏乞明諭輔臣以後用人當秉公心勿植私黨以後擬㫖當持大體勿挾私見則國家之休也亦所以成輔臣之令名也臣再維修史鉅典也必博訪名流廣招俊士前輔臣疏有欲取之别署取之外僚取之閒廢取之山林隠逸而必曰文行兼優又曰行義無虧然邪媚如虞䕫者首預總裁之選矣第恐天下之為虞䕫者不少也洿行無節徒餙浮華之詞夤緣干進者亦不少也儻誤䝉收錄則修史之典適以啓邪臣奔競之途而開小人仕進之竇耳卽掇英摛藻何足以昭法誡而埀萬世哉伏望諭輔臣及吏部嚴行諮訪務求端方直亮博聞有道街之士母得濫及匪人以汚本朝盛舉則仕路肅清而國史可傳不朽矣疏入帝從之論邉事疏萬厯十八年王錫爵臣惟方今文武内外之吏名實異同之間與古事相反者三古謀國之臣無事則深憂有事則不懼故經營與鎮定各當其時今則不然自敵欵二十年來吏恬卒玩無復守戰之備一旦烽火乍驚鳴鏑内嚮則當事者亡羊補牢亦猶未晚而震怖憂惶止辦呶呶追尤首事此一反也古策敵之臣搢紳守和親介冑言征伐雖各膠柱一偏然文武隨其事任廟堂自可折衷用之今則不然武官㸑下求安專藉欵闗之利文吏隙中觀鬭爭談出塞之功賈勇不在邉境而在朝廷禦冦不以甲兵而以文墨此二反也古當機制變之臣或胡越使之相救或父子不嫌異趨今則不然諸邉以彼此支吾為熟套以日月玩愒為良謀轉和慕效翕然同風遇緩急重難之事則隔垣内外便分爾我如徹哩克一人在宣大則力保其無他在甘肅則以之為誅首犯邉一事在西人委東則曰爾何不招在東人委西則曰爾何不戰皆逃責于已而嫁禍于人此三反也今經略大臣業有專遣臺諌諸臣之疏且次第酌行臣不敢冄條便宜猥瀆視聴獨前所謂三反者乃安危得失之大機廟堂擇之不可以不精持之不可以不定而就中緊闗切要之計決當以經營鎮定相兼而行然所謂經營者不在臨敵倥偬調兵易将在知彼知巳知擒知縱母示人以拙而已所謂鎮定者不在矯情倉猝賭墅清談在緩急有次第措置有精采母示人以法而已臣竊觀目前惟和碩一枝斷㫁乎不可收拾若其他或在陰陽逆順之間或在觀望反側之際形状未露則不妨廣布威信以招之羽翼未成則不妨多行間諜以散之雖良平復生于今日察彼已之勢審擒縱之宜其策必不出于此而臣之所憂者獨恐将吏以忘戰之乆而畏事之甚茍聴要挾急圗招撫使外敵反持中國之權武吏反襲文儒之論則其患有不可言者故必廟堂氣先定謀先審母動摇于流議母怵愓于近憂重懸賞罰使将官之勇氣先振而後使文吏策其便宜嚴責推諉使諸邉之血脤先通而後使文吏課其功實經營在此鎮定亦在此如必以一鎮有事使四鎮同時樹敵一嵗有警乃盡掩二十嵗保境息民之功盡更将吏盡絶諸部盡掃先朝大臣馬文升王瓊等老成持重必然之畫則非臣所敢持空喙而保借前箸而籌者也方今諸邉戰士有幾習兵敢戰之將有幾安攘之計獨有一面推擇新将又一面策勵舊將一面調集客兵一面招募鄉兵然一時部署巳覺落落難合況轉餉詘于嵗儉發帑困于國虚萬一諸部瓦觧該邉四面大征則我之拙形盡露何以支撑故臣以為不如且從容寓戰于謀藏拙于巧威之以先聲示之以不法莫遽為張皇自擾之状其經略大臣旣奉有特㫖全付之以諸邉重擔則廟堂但當總其大綱授以太指如敵入則我之指麾當愈暇敵去則我之隄備當愈嚴敵驕而挾賞則我之拒捍當愈嚴敵懼而乞哀則我之牢籠當愈密而至于瑣細節目隱微情狀之間則機闗在彼中功效在事後自當一切寛假以觀其運籌調度之何如若豫掣其手足而遥制其事權適足為邉臣藉口逃責之資爾今之議者獨引宋人以和自愚之說殊不知彼出闗而奉之此開闗而欵之彼稱南北兄弟為敵國此稱臣納貢為屬國古今強弱之勢原自絶然不同有如今日改絃之後士馬誠練糗糒誠充備守誠設斥堠誠謹則國家之全力具在豈可與北庭歳幣南宋偏安同日而語哉此臣所以謬為三反之論而約以經營鎮定之二言蓋欲少省議論使當事者可以措手而巳惟皇上留意裁擇疏入得㫖覧卿奏具見謀國忠慮邉務重大兵機秘密要湏臨事鎮定及時經營豈可倉皇紛擾因循畏怯這所議著各該經略督撫等官查照舉行母得虚文推諉請止開礦疏萬厯十八年王錫爵臣謹題今日該文書官劉宣口傳聖㫖開礦一事節經諸人題請如何不見部裏覆來臣䓁仰見皇上留心國計不勝欽服竊惟天地生財本以資國家之用況今帑藏無餘財山澤無遺利則權宜開礦亦是理財一策但開礦必當聚衆聚衆必當防亂現今山西河南間礦徒嘯聚正議驅逐若官自開煎恐姧民乘機爭利隠憂愈不可測且朝廷一切事務茍闗大體皆可不惜小費為之若開曠止于求利必須計算工本募徒之費若干防兵之費若干與開煎所得之利若干果見出少入多不為虚費而後可斟酌舉行非造次可因民間私請隔境遥度而朝庭便可為之出㫖差官議開者也户部所以遅回未覆之意一者防患二者惜財三者恐差官騷動地方四者亦不欲宣露國家空虚窘急之状使傳聞四夷愈輕中國臣䓁惠見如此伏望聖明採擇謹具題以聞疏入帝不納陳天下四大害疏萬厯十八年趙南星臣謹奏竊見楊巍乞休左都御史吳時來謀代之忌户部尚書宋纁聲望連䟽排擠副都御史詹仰庇力謀吏兵二部侍郎大臣如此何以責小臣是謂干進之害禮部尚書沈鯉侍郎張位諭徳吳中行南京太僕卿沈思孝相繼自免獨南京禮部侍郎趙用賢在詞臣黄洪憲輩毎陰䜛之言官唐堯欽孫愈賢蔡系周復顯為詆誣衆正不容宵人得志是謂傾危之害州縣長吏選授太輕部寺之官計日而取郡守不問才行而撫按諭人贓私有據不曰未甚則曰任淺概止降調其意以為惜才不知此乃惜不才也吏治日汙民生日瘁是謂州縣之害鄉官之權大于守令横行無忌莫敢誰何如渭南知縣張棟治行無雙裁抑鄉官被䜛不獲行取是謂鄉官之害四害不除天下不可得治疏入朝論韙之而中所抨擊悉時相所庇于是南星以病歸論輔臣植私黨阻言路疏萬厯十八年湯顯祖臣伏見陛下以星變嚴責言官欺蔽臣以為言官豈盡不肖葢陛下威福之柄潛為輔臣所竊故言官向背之情亦為黙移御史丁此吕首發科場欺蔽申時行屬楊巍劾去之御史萬國欽極論封疆欺蔽時行諷同官許國逺謫之一言相侵無不出之于外于是無恥之徒但知自結于執政所得爵禄直以為執政與之縱他日不保身名而今日固已富貴矣給事中楊文舉奉詔理荒政徴賄鉅萬鬻嶽市薦輔臣乃擢首諌垣給事中胡汝寕權門鷹犬以其私人猥見任用夫陛下方責言官欺蔽而輔臣欺蔽自如失今不治臣謂陛下可惜者四朝廷以爵禄植善類今直為私門蔓桃李是爵禄可惜也羣臣風靡罔識亷恥是人才可惜也輔臣不越例予人富貴不見為㤙是成憲可惜也陛下御極二十年前十年之政張居正剛而多欲以羣私人囂然壊之後十年之政申時行柔而多欲以羣私人靡然壊之此聖政可惜也乞立斥文舉汝寜誡諭輔臣省愆悔過以召天和肅綱紀天下幸甚疏入帝怒謫顯祖徐聞典史備陳邉事疏萬厯十九年王錫爵臣謹題為逺臣戀主特陳邉境遺憂以決大計事臣之感誠忠欵已具前疏六條中尚有國家大憂安危大計不可不盡言者臣竊惟方今邉事正在可為而不必強為乃議者爭言二十年貢市以來敵日益驕各邉備日益弛臣以為此皆有之然自古豈有全利無害之事亦豈有算徹首尾之人趙充國班超一去邉而諸羌瓦觧當時並未嘗追尤首事矧今保安邉境二十年木乆而蠧絃乆而危乃固然必至之理豈可謂一哽一咽遂當廢食惟在講求病源痛加針砭一番將必簡兵必練賞罰必信順逆必明則三年之艾尚可得厝火之憂尚可觧此臣所謂正在可為者也昨尚書石星與臣言今之邉事乃唐事非宋事臣深服其言請遂以唐事諭方回紇叛盟蹂掠我奉天涇陽杖殺我命使郭子儀再出師禦之一則戒軍吏不得言戰逼之出境而止一則親入虜中握手定盟呼可汗萬嵗而止今将非有子儀之威而敵非有回紇之桀彼其肯消沮閉藏以言欵我而我必欲悍然厲齒把其前負而責之曰爾何不斬爾之酋以獻是樂羊殺子之忠也又曰爾二月約歸何不歸是尾生抱柱之信也如此號令如此題目譬之清淵布網魚鼈寜復敢投此臣所謂不必強為者也從來番漢講和豈有百年臣之初計固亦謂權忍湏臾期于必絶而已絶一也而諸臣之論則以為早絶一日可以快一日之憤恥臣之論則以為晚絶一日可以落一日之便宜夫便宜非偷息養安之謂也諸邉之不競乆矣将少食少兵少非倉猝可辦故不若趁彼徘徊塞外信使往來之間而一面陰修戰守之備然則彼歸愈遅我應愈暇彼以欵愚我我亦可以欵愚彼其功多于匆匆索閙以慱一時之快心爽口無算也或有難臣者曰若是則遅之可矣而尚書鄭洛之日夜求彼不巳急乎臣以為此非求也割土地輸金寳尊醮而禮之扶服而叩之乃真求矣今虚聲恐喝淡面羈縻實不費國財名不辱國體何以為求卽使洛而果求也則桓桓赳赳之夫乃落得借他人之齒牙以措自已之手足人勞而遺我以逸人弱而遺我以強則洛也何乏于諸臣之事而嘵嘵為哉或又有難臣者曰夫待講而後修備則未講之前水泉莽川之二㨗獨何備而能然臣以為此皆執之有名據之有勢彼客而我主彼驕而我怒彼曲而我過不先故一舉可以勝之今川底迴逺未聞侵犯則主客之勢殊矣而彼懲于敗日夜枕戈防我則驕怒之情異矣據前後夷書現在乞哀請路並無反形則我復憑何名而據絶之曲直之理分矣臣故曰借講而修備或又有難臣者曰然則敵終不歸終以言欵我則我終當聼之乎臣以為正不在汲汲聴之何妨且必無此理馬瘦可待壮草長可待枯夏秋之候更以何辭臣前晚絶之說正待此也或又有難臣者曰待乆而事機已壊不可收拾則奈何臣以為凡已壊之事不可收拾且如鄭洛先主戰而諸臣却欲撫此則撩虎出山無弭耳遂馴之理若羈縻在前决絶在後譬之掬水覆之地而止耳本無壊事何難收拾或又有難臣者曰然則何不聴鄭洛諸臣言戰言撫各行已志之為兩全臣以為安危之機間不容髪夫言戰可也言戰而必欲先破言撫之論使老成長慮之臣一靣防敵情又一面防人情一面憂同事之不信又一面憂朝廷之不信譬之使船中流而遇風篙師柁工狼狽無所措手而國家之事危矣或又有難臣者曰敵昜與耳即舉事一不當而何至于危則臣以為古之易敵者王安石韓􅇑冑賈似道三人及其後如之何也大抵敵性無常彼其内絶市賞之望而外負我以不直之名窮狼怒虎無復顧忌泰山在前蚩尤之頭可觸也而徼外雜夷聞之亦且寒心裭魄以朝廷之恩信為不足恃五合六聚兵絓而不觧然則國家之事本非宋而好事者日趣之入宋耳可不為之深慮哉或又有難臣者曰夫慮危是矣有如敵再欵而我冄如二十年前事嵗嵗増賞以媚之尾閭之洩何時可已臣以為向來増賞雖誤然亦㑹敵中無釁不能屑屑與爭今事當更始明㫖既已譙讓一番則乘其恐懼要以定約巳嘗已加之外不許另索一緡尺帛而将吏有私加媚敵者罰之無赦此改絃易轍百嵗一時也或又有難臣者曰如此而敵必就約固甚善即不就約則我終以将少食少兵少怯而不言戰乎臣以為此又當以義理利害相提而論有如敵果就約則我雖有十萬横磨甲必不可先失大信掩其不虞卽不然而嫚書鳴鏑之事起堂堂天朝寜復可以劒鈍而諱割矢弱而廢射也或又有難臣者曰然則主晚絶之議者不能保将來之必不戰戰不能保必勝矣早與晚等之無全策也何以偏是此而非彼臣以為事無全利前已言之若防敗而不免于敗則天也若本不敗而觸之使敗則非天矣今諸臣偏好言宋事臣又請以宋事喻岐溝之役樞宻院主戰中書主守澶淵之役王欽若主絶王旦㓂準主和熙和之役王安石等主進取富弼力爭以為干戈一起禍福不細勸且十年不復用兵今千載而下觀之利害得失如何且他人勿論即如富弼之偘偘爭獻納非今羣議以為赤幟者乎夫一使之勇孰與萬全之謀而今之言弼者偏不及此是知其一而不知其萬也先是陜西總督缺出臣卽以魏學會薦故尚書宋纁謂臣曰吾觀目前邉才無過鄭洛恐學會前輩重望必不肯為洛下不如俟洛功緒稍見而後用之今纁雖死而都御史李世逹不亦嘗聞之乎不意纁之言至今猶驗也臣素敬學會之為人剛方嚴介惟恐其不早用今方用而遂駁臣議朋友忠告人情所難而陜西巡撫葉夢熊臣亦嘗耳剽其膽勇會以爭事見嘲于四川不忍遂挫其舞劒擊楫之氣匆匆議調臣實預聞兹夢熊又見告矣姍笑鄭洛為無能矣葢學會臣所重夢熊臣所奇然謂學會忠于臣等則可謂夢熊敢于向前則可謂二臣必不誤國家則不可方今各邉之備莫如修守督撫之職惟在朝經暮營某邉置戌某邉給餉何計不煩内帑何策可支百戰此亦儘勾二臣饜事矣乃不揣其本惟其末之求舍已之事而惟人田之務芸臣且不暇與夢熊辯姑就學會疏中所謂小犯小禦大犯大禦近理之論質之夫小犯大犯豈可先圗有如今日小犯明日大犯西邉小犯東邉大犯而纍纍調發七塞盡騷以待數年之乆臣恐時移事變兵敝民殘學會能保目所見亦能保目所不見否能裏革横草以致其報國之身亦能神輸鬼運國家之財力否當宋太宗全盛之世而趙中令之諫開邉曰所得者少所失者多非惟得少之中尤難入手又從失多之後别有闗心何至今日乃空拳空手之皆兵而百戰百攻之必克耶臣此言一出則議者又以臣為褊心不能容人不知褊心人臣之小過誤國人臣之大戮臣親薦此二臣有如一舉蹉跌貽萬世之悔是誰人誤國也草莽已去之身所惓惓憂念無大于此敢直舉千慮一得歩歩蹈實之事以禆廟略以釋羣疑惟皇上留聴無惑社稷幸甚疏入帝從之寜夏兵變疏萬厯十九年趙志臯臣謹題昨晚兵部尚書石星接到總督魏學會書揭並延綏總兵宻揭為叛賊哱承㤙陰遣人勾引套夷為外援致套夷入來寧夏城外住已助玉泉營之戰勢甚猖熾夫寜夏鎮城後倚賀蘭山前臨黄河孤懸塞外與敵隔一水在内者據城以叛在外者反來應援則寜夏之城恐非中國之所能有也寜夏屆在東西六邉之中寜夏一失則東西各邉勢相隔絶而敵騎充斥于其中各邉恐無寜日而内地甚為可慮臣見書揭夜寝不寐秉燭具草述陳危急伏望皇上亟下兵部速行總督魏學會議處將有可任聼其選取兵有可用聼其調發一切隨機應變且聼便宜行事務期内勦叛賊外退強敵使敵人之勢不合則寜夏之鎮城可完而邉鎮可以無憂矣兵部尚書石星見敵人乆據戎騎復侵欲自請兵以往念套夷皆受中國撫綏或宜以朝廷威徳或誘以市賞厚利令其觧㪚如必不然則督率各鎮調兵使之力戰此星一念忠勇之心不遑寜處者也又總督魏學會疏請鹽菜銀三千兩以資犒賞此何禆于纎毫之用哉語云軍無賞士不往今該鎮調發旁午之際厲兵秣馬之時若非錢糧稍充何以鼓舞士氣更願皇上念事在燃睂仍發帑銀數萬兩以充其費以作其氣此臣汲汲之私也再惟士宜激勸兵貴先聲更祈皇上軫念邉情重大聲息緊急特降敕諭一道奨勞臨陣将吏另發帑銀萬兩散給各鎮調兵以激勸士心卽著兵部行文馬上傳示及今徴選慣戰各将調發邉腹精兵及募義勇敢死之士數十萬不日㑹集寜夏務期勦滅以寒敵膽臣等書生未􅈺軍旅僭陳一得之愚仰贊廟謨萬一統希聖裁無任恐懼待命之至疏入帝不納論寜夏事並陳時政䟽萬厯十九年趙志臯臣謹題今早該文書官李文輔口傳聖諭詢臣等以寜夏之事臣等仰見皇上軫念邉陲至意又思寜夏兵變以來凡有章䟽奏上不踰時輒發擬票又兩敕将士以安其心又不靳帑銀數十萬以充軍費皇上雖處深宫念切西顧臣敢不具悉以對臣惟寜夏之變其始藉口撫道剝削致廑明㫖撫安謂可誨化不崇朝而底定也不意其謀益深祕勢益猖獗迄今三月未下此殆不可不深為之慮者夫變起于降人哱承恩父子蓄謀已乆待釁而動自始事以至今日其謀若有成算其舉動皆有次第其勾外援也出婦女以誘之厚金帛以賂之其嬰城而守也密遣姧細以招集松套二處志在籍外勢以據寜夏寜夏一失卽犯靈州靈州一失卽窺闗中據闗中以臨河之南北可建瓴而下也其詭辭而求撫出賊首以獻也葢欲緩我師以俟各敵騎之至昨兵部接得陜西巡撫沈思孝書為松套二處因哱賊父子遺以重賄與飲血酒鑽刀下為盟各領兵馬到于寜夏城下不知其數紛布徧野我師雖已過河屯劄城外然因敵騎之集防其夾救不敢攻城又屯住已乆糧運艱阻師老力疲勝負難必臣又先聞之逆賊造為妖妄之言以鼓惑衆志倡為不道之語大犯忌諱以摇動人心此其志誠不在小本兵調度于中殫竭心思總督戰守于外畢盡智力皇上為天地神人之主係中外華夷之望乃今深居九重漫視不顧節經奏請視朝俱未奉㫖允行今當邉事孔棘人心皇皇臣等若再不言是臣等順非從過輔導無狀也伏望皇上大奮乾綱卽出臨御召兵部并大小臣工面定大計必討此賊則天威所震迅如雷霆天語所加疾如風雨人心有不鼓躍而將士有不百倍振勵者哉譬如家有外侮必須主人奮迅率衆捍禦然後心力齊一鼓舞向前又如太陽一出萬方快覩魑魅魍魎自然潛消臣又維今日之所可憂者不特一寜夏為然變異屢形災荒迭至閭閻匱乏帑藏空虚賦役繁苛民生憔悴人人有思亂之心在在有觀變之望西北各鎮屢兆情形東南倭奴已報入犯天意人事一時湊合豈為偶然大有可慮皇上謂土宇之廣大足以制馭法度之森嚴足以束縳哉不然也變亂常起于承平消弭必由于儆戒今日之事格天心挽人事在皇上一念之憂勤而已若臣等有力所當為之事自與諸大臣計議而行不敢不竭其愚以負皇上之委任也臣等無任激切仰望之至疏入帝不納請容直臣以勸百僚疏萬厯十九年逯中立臣伏見該吏部以㑹推閣臣之故上干聖怒嚴㫖督責降處司官旋以言者申救斥為編氓朝論惜之臣言官也誼不能黙黙無言臣伏惟陛下念閣務繁劇簡任輔臣不卽斷自宸衷而先付之廷推以示公也銓臣博訪旁搜䟽名上請公論採之盈庭可否決于聖斷非敢專也亦非取私也且威福者朝廷之權也該部亦不得而專也予奪者君上之㤙也該部亦不得而市也以今聖明在上公議在下一時臣工非至愚不肖誰敢罔上行私自速罪戾而況郎中顧憲成者砥行好修往以直言獲譴陛下起自謫籍而用之矣司銓未乆復遭擯斥士紳相顧咨嗟咸謂憲成以直道被黜而陛下有不容直之名將何以勸任事之心鼓豪傑之氣乎夫用舍則國家之大政也銓臣者又用舍人之人也邇來相繼屏去不竟其用孫鑨去矣陳有年杜門求去矣司官之空署削籍而去者至再至三矣今顧憲成又以罪去前者将竭後焉不續人才凋謝可為寒心語曰察察不可為容容多後福臣恐今而後非如王國光楊巍也者則不能一日為太宰非如徐一檟謝廷宷劉希孟也者則不能一日為部臣臧否混并舉錯倒置将使黜陟重典為權門供愛憎銓衡重地為私門樹桃李天下不知有是非人心不知有勸懲風靡波流莫究所終矣大抵近年以來君臣道隔上下異心上所謂可而下未必是也下所謂可而上未必是也用舍一慿喜怒黜罰幾于無章公議壅閼繁言滋起臣謂人才消長之機理道廢興之漸正在于此故願陛下虚心而觀也然臣又有言焉會推閣臣非自十九年始也皇祖二十八年廷推六員而張治李本二臣用卽今元輔王鍚爵之入閣亦會推也葢特簡與廷推祖宗朝並行已乆而要之廷推之法尤自古而然故舜舉臯陶湯舉伊尹而必曰選于衆今輔臣趙志臯等不稽故典不惟逺圗妄為牽引妄激聖怒卽揭救數語譬之強笑而神不偕來欲以動聼難矣方今疆場交聳公私耗竭而嗷嗷思亂者又十室而九識者抱厝火積薪之憂所幸公道昭白宰輔無私人朝廷無過舉可以回氣化而收人心而今時事至此可為長嘆臣職司獻納冐昧塵瀆非為銓司惜一郎官也為國家惜人才也為國家惜政體也亦願廟堂之上共捐成心而重為國體人才惜也臣不勝惓惓䟽入帝嚴㫖切責貶中立陜西按察司知事條陳禦倭事宜疏萬厯二十年李頤臣竊惟倭奴警報業踰半載經本兵區畫諸臣建言如選将増兵造船建臺畫地分守一切戰守機宜不啻詳且盡矣臣受事兩閲月終日拮据奉行不暇何敢復有陳説特恨島外狡夷輕視中國用是蚤夜殫思圗効一得直攄臆見釐為七條昔霸國用人不鄙九九之數聖明兼聼豈厭卑卑之言伏乞敕下該部酌議倘可採覆議上請㫖施行臣無任惓惓祈望之至一安民心臣聞民為邦本本固邦寜自倭警以來中外紛紜盡屬備倭之計臣以拊循為職敢置民生于不講乎況臣所屬州縣大半逼近邉海地多沙磧物産非饒時值軍興粟價頓踊兼頻災之後閭閻愁嘆之聲比比而是如懐柔一縣土瘠民貧極目蕭索臣查該縣錢糧自萬歴十四年至十七年分所欠柴夫等銀二千六百餘兩知縣賈濬非不苦心追徴而彌望草萊租稅安出舉一邑而其餘可知矣若非破格蠲免所謂財竭而斂不休民窮而令愈急上虐下離威尊命賤竊恐地方之憂不在肘腋而在腹心也容臣督行各道查被災州縣積欠錢糧稍緩者議蠲難緩者改限現年盡數完納毫不許負庶民困稍甦邦本漸固卽有外患不足慮矣一省議論臣聞多指亂視多言亂聼議論多而成功少不獨今日為然也況言倭情者必先述其可畏之状談倭不啻談虎以致邉氓畏倭不啻畏虎臣前月入境經過固安地方見該縣人心洶洶至欲挈家南徙臣雖再四曉諭恐愚民終莫之信也且倭奴主謀多係中國亡命之徒輦轂之下豈無耳目轉眼春汛警報漸急廷論益滋若盡形諸章疏盡數發抄狡賊聞之壮氣軍士讀之寒心愚民轉相傳告益重其疑畏而速其離居也臣謂自今以後除科道及當事臣工建白外其餘條陳倭策者許開具揭帖送内閣發道科掛號送部酌議可行者覆不可者止異日果以何策決勝仍查先日建議之人論功陞賞其罷閒官吏欲借建言起用無甚奇謀秘計通政司不必收受蓋所以安人心亦所以密兵機也一簡鎮兵臣聞兵貴精不貴多古之善用兵者每以寡勝衆固以其有勝算亦以其有勝兵也薊昌宣保四鎮環衞畿輔屯有重兵雖挑選精鋭者援遼而存留在邊者獨不可整理備用乎養兵以備緩急邊與海何擇焉邊報急則以防邊為重倭報急則以防倭為重除昌鎮兵馬䕶衞陵寢不敢經議外合無豫合薊鎮總兵官無論南北主客料理精兵二萬宣保總兵官各料理精兵一萬嚴督將領整飭器械訓練戰陣無事之時照常防守汛地一聞警報不待徴發各總兵官星統前來薊為正鋒宣為左翼保為右翼三枝兵馬逆擊其前仍令遼東總兵官挑選精兵二萬截殺其後首尾相應前後夾擊此常山蛇勢也倭奴雖狡欲返隻輪得乎今四方精鋭行將直𢷬望京倭奴救死不贍豈能内犯兵法云不恃其不來恃吾有以待之今日之謂也一嚴城守臣聞王公設險以守其國城池之謂也使城而匪高池而匪深何足以言險安可以守國然濠池淤淺乘此農隙挑濬為易若牆垣增高及村鎮建堡雖為保障長策而工費頗大旦暮難完須俟倭警稍息方可次第舉行如教習鄉兵訓練民壯此守城要務各属業已奉行矣臣廵厯州縣見城垣雉堞間多聚石塊以便擲擊然投石于下賊不以石反擊上乎是借宼以兵非計也間有貯灰瓶者似矣然瓶大難逺質厚難碎亦非利器也合無令濱海有司相地所宜土可陶者就近起窯募匠焼脆薄砂罐形如小甌腹廣而口狹實細石灰子其中另置一葢覆其口土不宜者于鄰壤窯户用價收買如法貯聚俟賊將臨城用此擲擊將見罐裂灰揚昬天撲地弓矢且不知避況敢仰面而攻乎價極廉而利用工極省而速成亦守城之一策也一取強弩臣聞弩者怒也其機甚速其力甚猛故彍弩伏弩連牀弩見于兵法試于古人不可殫述臣見邊防多不用弩怪問其故僉謂强弩難挽弩發一矢弓發三矢不知諭遲速則弩不如弓論命中則弓不如弩卽不利于戰獨不利于守乎近據總兵張邦奇圖説盡查營路戰車編派緊要海口使車前留隙弩發如雨誰謂非戰勝之具也臣查沿邊臺路間或有之但為數不多邊兵用之不熟遂為間具今江浙閩廣南直𨽻地方多産山桑檿柘皆弩材也人習此技卽鳥雀微物無不應弦落者合無下令省直各造強弩一萬弩箭百萬分督各府開局集事非難停解弓箭弦條加派可免馬上差人陸續解運務汛前完足再令召募善射弩手厚給安家路費使人樂從多則百名少則數十名各令廣帶弩藥蓋弩藥最毒俗謂見血封喉猛虎中之不數武而死倭雖悍厲未必人人如虎也到日分發沿海州縣教習鄉兵守城海上有警徧發行間禦敵倭患旣平或發邊鎮或留京營以一教十以十教百俟有成功發囘原籍願留者聽此一舉也防邊禦倭均有實用矣一備神器臣聞器械不利以卒予敵薊鎮向知防邊不如防倭邊營銃礮神火器具雖頗足用但置設臺路各有正數原無多餘卽舊有庫貯一二類皆朽敝不堪無禆于用自倭警以來各道鳩工聚材並手偕作計至汛期種種不啻足矣顧臣所属地方二千里邊防八百里海岸況防倭之時又當防邊火器為中國長技所謂多多益善者近者閣臣題議戎器要略中間制作俱戰守利器巳經督臣郝杰分行鎮道督造外臣思倭奴最可畏者不過鳥銃耳然鳥銃止于百歩之内若魚􅆃竹牌用布褥裹其外以水濕之卽數十歩鉛子不能入也中國大將軍礮逺可六七里三眼銃及火箭逺可數百歩以我之長攻被之短彼敢當我哉臣于遵化另開厰局躬自料理選委中軍叅將陶世臣等調集匠役星夜打造礮一百五十位礮車五十輛三眼銃一千杆火箭二萬枝火藥二萬斤魚脊竹脾三千面併隨銃礮鉛子什物刻期正月内盡數完報再于豐潤縣局委官陳雲鴻等現造大將軍礮續完者借留五十位載礮滾車五十輛俱聽分發沿海要害以資防禦仍補發價銀勒限作速造完前礮併瀼車解還京營不敢違誤計合用工料大約該銀八千餘兩俱應于備倭馬價銀兩動支今查前銀該薊密永三道分發兵餉及安家犒賞等項猶且不敷欲濟大事豈惜大費合再乞請照數發銀以便接補支用事完聽該道核實冊報臣覆核具冊奏繳所造銃礮等件平倭之後可用禦邊固不朽器也一重根本臣聞帝王之治天下毎詳内而略外非外為可輕蓋内為尤重也薊鎮為畿輔肘腋内拱陵京外環山海豈不稱根本重地哉故敵臺烽墩星羅棊布利兵精卒蟻聚蜂屯所以為防衛計者至詳矣自倭警以來客班河間等五營留防天津南北步騎數營調援遼左計前後徴發共二萬七千有奇無論邊長勢分製襟露肘而延袤海岸設備為難先設遊擊吳惟忠募南兵二千餘名東駐樂亭専為防海今且併調出闗近雖題議増兵一萬五千而南北召募未必旦夕可集邇者經略部臣議量留兵馬于薊保以資防守兵部覆議仍簡精騎赴遼聽候相機調遣總之為安内計也竊思進勦有期則兵宜厚集萬一事機未輳按兵待時乞將薊兵一萬一千暫且撤囘或以南兵習倭不妨留用臣議豫簡鎮兵者蓋恐倭奴分道入犯援遼精鋭勢難急歸故欲各鎮再為料理以備不虞其實邊卒非十分𦂳急豈容輕調若以出闗士馬分𣲖内地海口倭急則防倭邊急則防邊兵不加募防亦可周不然攘外以安内虛内以實外非計之得也伏乞聖裁施行謹疏疏入帝從之陳時政闕失疏萬歴二十年王玉立臣竊惟陛下寵幸貴妃宴逸無度恣行威怒鞭笞羣下宫人奄豎無辜死者千人夫人懐必死之心而使處肘腋房闥間儻因利乘便甘心一逞可不寒心田義本一姧豎陛下寵信不疑邇者奏牘或下或留推舉或用或否道路藉藉咸謂義簸弄其間蓋義以陛下為城社而外廷之憸邪又以義為城社黨合謀連其禍難量且陛下一惑于嬖倖而數年以來問安視膳郊廟朝講一切不行至邉烽四起禍亂成形猶不足以動憂危之情奪晏安之習是君身之不修未有甚于今日者矣夫宫廷震驚而陛下若罔聞何以解兩宫之憂深拱禁中開夤縁之隙致邪孽侵權而陛下未察其姧何以杜旁落之漸萬國欽輩未嘗忤主而終于禁錮何以勵骨鯁之臣上下隔越國議軍機無由參斷而陛下稱㫖下令終不出閨闥之間何以盡大臣之謀忠良多擯邪佞得名何以作羣臣之氣遠近之民皆疑至尊日求般樂不顧百姓塗炭何以繫天下之心他如李如松麻貴不可為大將鄭洛不當再起石星不堪為本兵並時政闕失之大者惟陛下留意幸察疏入帝不納御選明臣奏議巻三十一
