body:
  text: 請勿用小人疏崇禎五年黄道周臣自幼學易以天道為準上下載籍二千四百年攷其治亂百不失一陛下御極之元年正當師之上九其爻云大君有命開國承家小人勿用陛下思賢才不遽得懲小人不易絶蓋陛下有大君之實而小人懷干命之心臣入都以來所見諸大臣皆無遠猷動尋苛細治朝宁者以督責為要談治邊疆者以姑息為上策序仁義道德則以為迂昧而不經奉刀筆簿書則以為通達而知務一切磨勘則葛藤終年一意不調而株連四起陛下欲整頓紀綱斥攘外患諸臣用之以滋章法令摧折搢紳陛下欲剔弊防姧懲一警百諸臣用之以借題修隙斂怨市權且外廷諸臣敢誑陛下者必不在拘攣守文之士而在權力謬巧之人内廷諸臣敢誑陛下者必不在錐刀泉布之微而在阿柄神叢之大惟陛下超然省覽旁稽載籍自古迄今決無數米量薪可成遠大之猷吹毛歎睫可奏三五之治者彼小人見事智毎短于事前言毎多于事後不救凌圍而謂凌城必不可築不理島民而謂島衆必不可用兵逃于久頓而謂亂生于無兵餉糜于漏巵而謂功銷于無餉亂視熒聽浸淫相欺馴至極壞不可復挽臣竊危之自二年以來以察去弊而弊愈多以威創頑而威滋殫是亦反申商以歸周孔捐苛細以崇惇大之時矣疏入帝不懌摘葛藤株連數語責令具陳遵旨具陳疏崇禎五年黄道周臣竊見邇年諸臣所目營心計無一實為朝廷者其用人行事不過推求報復而已自前歳春月以後盛談邊疆實非為陛下邊疆乃為逆璫而翻邊疆也去嵗春月以後盛言科場實非為陛下科場乃為仇隙而翻科場也此非所謂葛藤株連乎自古外患未弭則大臣一心以憂外患小人未退則大臣一心以憂小人今獨以遺君父而大臣自處于催科比較之末行事而事失則曰事不可為用人而人失則曰人不足用此臣所謂舛也三十年來釀成門戸之禍今又取搢紳稍有器識者舉網投阱即緩急安得一士之用乎凡絶餌而去者必非鰌魚戀棧而來者必非駿馬以利祿豢士則所豢者必嗜利之臣以箠楚驅人則就驅者必駑駘之骨今諸臣之才具心術陛下其知之矣知其為小人而又以小人矯之則小人之焰益張知其為君子而更以小人參之則君子之功不立天下總此人才不在廊廟則在林藪臣所知識者有馬如蛟毛羽健任贊化所聞習者有惠世揚李邦華在仕籍者有徐良彦曽櫻朱大典陸夢龍鄒嘉生皆卓犖駿偉使當一面必有可觀者也疏入帝益不懌斥為民三大可惜四大可憂疏崇禎五年華允誠臣竊惟當事借皇上剛嚴而佐以舞文擊斷之術倚皇上綜覈而騁其訟逋握算之能遂使和恒之世競尚刑名清明之躬寖成叢脞以聖主圖治之盛心為諸臣鬭智之捷徑可惜一帥屬大僚驚魂于回奏認罪封駁重臣奔命于接本守科遂使直指風裁徒徵事件長吏攷課惟問錢糧以多士靖共之精神為案牘鉤較之能事可惜二廟堂不以人心為憂政府不以人才為重四海漸成土崩瓦解之形諸臣但有角戸分門之念意見互觭議論滋擾遂使𠞰撫等于築舍用舍有若舉棊以興邦啓聖之嵗時為即聾從昧之舉動可惜三人主所以總一天下者法令也喪師誤國之王化貞與楊鎬異辟潔己愛民之余大成與孫元化並逮甚至一言一事之偶誤執訊隨之遂使刑罰不中鈇鉞無威一可憂也國家所恃以為元氣者公論也直言敢諫之士一鳴輒斥指佞薦賢之章目為姧黨不惟不用其言并錮其人又加之罪遂使喑黙求容是非共蔽二可憂也國家所賴以防維者亷恥也近者中使一遣妄自尊大羣僚趨走惟恐後時皇上以近臣可倚而不知倖竇已開以操縱惟吾而不知屈辱士大夫已甚遂使阿諛成風羞惡盡喪三可憂也國家所藉以進賢退不肖者銓衡也我朝罷丞相以用人之權歸之吏部閣臣不得侵焉今次輔體仁與冢臣洪學同邑朋比惟異己之驅除閣臣兼操吏部之權吏部惟阿閣臣之意造門請命夜以為常黜陟大柄秖供報復之私甚至庇同鄉則逆黨公然保舉而白簡反為罪案排正類則講官借題逼逐而薦剡遂作爰書欺莫大于此矣擅莫專于此矣黨莫固于此矣遂使威福下移舉措倒置四可憂也疏入帝詰其别有指使責使陳狀允誠列上閔洪學温體仁徇私朋比等事帝亦悟兩人同里有私乃奪允誠俸而洪學亦旋罷去痛憤時艱疏崇禎九年劉宗周臣竊惟陛下銳意求治而二帝三王治天下之道未暇講求施為次第猶多未得要領者首屬意于邊功而罪督遂以五年恢復之說進是為禍胎己巳之役謀國無良朝廷始有積輕士大夫之心自此耳目參于近侍腹心寄于干城治術尚刑名政體歸叢脞天下事日壞而不可救廠衞司譏察而告訐之風熾詔獄及士紳而堂廉之等夷人人救過不給而欺罔之習轉甚事事仰承獨斷而諂諛之風日長三尺法不伸于司寇而犯者日衆詔㫖雜治五刑歲躬斷獄以數千而好生之德意泯刀筆治絲綸而王言䙝誅求及瑣屑而政體傷參罰在錢穀而官愈貪吏愈横賦愈逋敲扑繁而民生瘁嚴刑重斂交困而盜賊日起總理任而臣下之功能薄監視遣而封疆之責任輕督撫無權而將日懦武弁廢法而兵日驕將懦兵驕而朝廷之威令并窮于督撫朝廷勒限征𠞰而行間日殺良報功生靈益塗炭一旦天牖聖衷撤總監之任重守令之選下弓旌之招收酷吏之威布維新之化方與二三臣工洗心滌慮以聮泰交而不意君臣相遇之難也得一文震孟而以單辭報罷使大臣失和衷之誼得一陳子壯而以過戇坐辜使朝宁無吁咈之風此闗于國體人心非淺鮮者陛下必體上天生物之心以敬天而不徒倚風雷必念祖宗鑑古之制以率祖而不輕改作以簡要出政令以寛大養人才以忠厚培國脈發政施仁收天下泮渙之人心而且還内廷掃除之役正懦帥失律之誅慎天潢改授之途遣廷臣齎内帑巡行郡國為招撫使赦其無罪而流亡者陳師險隘堅壁清野聽其竊而自歸誅渠之外猶可不殺一人而畢此役奚待于觀兵哉疏入帝怒甚巳而意解降㫖詰問謂大臣論事宜體國度時不當歸過朝廷為名高且奬其清直劾溫體仁疏崇禎九年劉宗周臣竊惟己巳之變誤國者袁崇煥一人小人競修門戸之怨異己者概坐以崇煥黨日造蜚語次第去之自此小人進而君子退中官用事而外廷寖疎文法日繁欺㒺日甚朝廷日隳邊防日壞今日之禍實己巳以來釀成之也且以張鳳翼之溺職中樞也而俾之專征何以服王洽之死以丁魁楚等之失事于邊也而責之戴罪何以服劉策之死諸鎮勤王之師争先入衞者幾人不聞以逗遛䝉詰責何以服耿如杞之死今且以二州八縣之生靈結一飽颺之局則廷臣之纍纍若若可幸無罪者又何以謝韓爌張鳳翔李邦華諸臣之或戍或去豈昔為異己驅除今不難以同己相容隱乎臣于是而知小人之禍人國無已時也昔唐德宗謂羣臣曰人言盧把姧邪朕殊不覺羣臣對曰此乃把之所以為姧邪也臣毎三覆斯言為萬世辨姧之要故曰大姧似忠大佞似信頻年以來陛下惡私交而臣下多以告訐進陛下錄清節而臣下多以曲謹容陛下崇勵精而臣下奔走承順以為恭陛下尚綜覈而臣下瑣屑吹求以示察凡若此者正似信似忠之類究其用心無往不出于身家利祿陛下不察而用之則聚天下之小人立于朝有所不覺矣天下即乏才何至盡出中官下而陛下毎當緩急必委以大任三協有遣通津臨德有遣又重其體統等之總督中官總督置總督何地總督無權置撫按何地是以封疆嘗試也且小人毎比周小人以相引重君子獨岸然自異故自古有用小人之君子終無黨比小人之君子陛下誠欲進君子退小人決理亂消長之機猶復用中官參制之此明示以左右袒也有明治理者起而争之陛下即不用其言何至并逐其人而御史金光辰竟以此逐若惟恐傷中官心者尤非所以示天下也至今日刑政之最舛者成德傲吏也而以贓戍何以肅懲貪之令申紹芳十餘年監司也而以莫須有之鑽刺戍何以昭抑競之典鄭鄤之獄或以誣告坐何以示敦倫之化此數事者皆為故輔文震孟引繩批根即向驅除異己之故智而廷臣無敢言陛下亦無從知之也嗚呼八年之間誰秉國成而至于是臣不能為首揆温體仁解矣詩曰誰生厲階至今為梗體仁之謂也疏入帝大怒斥為民劾温體仁六大罪疏崇禎九年傅朝佑臣竊惟陛下當邊警時特簡體仁入閣體仁乃不以道事君而務刑名窺陛下意在振作彼則借以快恩仇窺陛下治尚精明彼則託以張威福此謂得罪于天子鳳陽昌平鍾靈之地體仁曾無未雨綢繆兩地失守陵寢震驚此謂得罪于祖宗燮理職在三公體仁為相日月交蝕星辰失行風霾迭見四方告災嵗比不登地震河決城陷井枯曽莫之懲而日尋恩怨圖報睚眦此謂得罪于天地强敵内逼大盜四起高麗旦暮且陷體仁冒賞冒廕中外解體因之此謂得罪于封疆體仁子見屏于復社諸生募人糾彈株連不巳且七年又議裁茂才國家三百年取士之經一旦壞于體仁之手此謂得罪于聖賢同生天地誰無本心體仁自有肺腸偏欲殘害忠良秖今文武臣僚幾數百人駢首囹圄天良盡喪此謂得罪于心性夫人主之辨姧在明而人主之去姧在斷伏願陛下大施明斷速去體仁毋以天變為不足畏毋以人言為不足恤毋以羣小之逢迎為必可任毋以一已之精明為必可恃大赦天下除苛政庶倒懸可解太平可致矣疏入帝怒除名下吏按治踰月體仁亦罷諫令錢士升回籍疏崇禎九年詹爾選臣竊惟輔臣錢士升引咎求黜遽奉回籍之諭夫人臣所以不肯言者其源在不肯去耳輔臣肯言肯去臣實榮之獨不能不為朝廷惜此一舉也璡以非法導主上其端一開大亂將至輔臣憂心如焚忽奉改擬之命遂爾執奏皇上方嘉許不暇顧以為疑君要譽耶人臣無故疑其君非忠也乃謂吾君萬舉萬當者第容悦之借名必非忠人臣沽名義所不敢出也乃人主不以名譽鼓天下使其臣尸位保寵寡廉鮮恥亦必非國家利況今天下疑皇上者不少矣將驕卒惰尚方不靈億萬民命徒供武夫貪冒則或疑過于右武穿札與操觚並課非是者弗錄人見賣牛買馬絀德齊力徒使强寇混跡于道途父兄莫必其子弟則或疑緩于敷文免覲之説行上意在甦民困也而或疑朝宗之大義不敵數萬路用之金錢駁問之事煩上意在懲姧頑也而或疑明啓之刑書幾禁加等之紛亂其君子憂驅策之無當其小人懼陷累之多門明知一切茍且之政或拊心愧恨或對衆欷戱輔臣不過偶因一事代天下發憤耳而竟鬱鬱以去恐後之大臣無復有敢言者矣大臣不敢言而小臣愈難望其言矣所日與皇上言者惟苛細刻薄不識大體之徒似忠似直如狂如癡售則挺身招摇敗則潛形逋竄駭心志而爚耳目毁成法而釀隱憂天下事尚忍言哉祈皇上以遠大宅心以簡静率憲責大臣弼違之義作言官敢諫之風寧獻可替否毋藉口聖明獨斷掩聖主之謙沖寧進禮退義毋藉口君恩未酬飾引身之濡滯臣愚不勝惓惓疏入帝震怒面詰再三罪且不測諸大臣力救乃命繫于直廬削籍去撫賊未可輕信疏崇禎十一年范景文臣謹疏據職方清吏司案呈本部於七月内連接塘報稱流賊八大王于襄陽等處與小民兩相交易開局打造軍器又毎日置造戰船積至百有餘號等情據此已經移咨總理密察情形撫𠞰互用須防意外毋墮彀中併咨江楚鳳應皖操各撫嚴檄所屬鎮道府縣緊要處所防備去後相應具題等因到部臣查得流寇蹂躪中原十載于兹矣皇上銳意蕩平以撻伐之柄屬于理臣熊文燦十二萬之兵二百餘萬之餉不惜竭海内民力九邊兵力供其指揮原欲摧陷廓清洗而空之非令一撫豢彼苞蘖為茍且計也從來治盜之法曰𠞰曰撫權可兼行勢難偏廢誰不知之但𠞰而後撫求撫在彼而權在我不𠞰而撫求撫在我而權在彼權在我可操縱自如權在彼則叛服不常且撫之不效已非一矣此撫彼叛朝撫暮叛外撫中叛非撫事之局變無法𠞰之以制其死命耳今楚賊張獻忠據理臣初疏以為真切輸誠終無異志果如所言便宜解散徒黨賣劍賣刀安意耕耘即使隨營効力亦宜巻甲韜戈静聽調遣乃人不散隊械不去身分食于地資貨于商據陸而復問水市馬而復造舟道路流傳更有不堪言者此其逆萌叵測伺隙狂逞豈獨智者知乎理臣身任撫局或當服舎之間别有駕馭決不至以賊遺君父憂然而當局易迷偏聽不察倘養癰一潰破浪乘風加以江北旱蝗流亡載道飢寒之徒易于響應決裂譸張噬臍豈有及乎臣己密布文告毖飭沿江俟其來時以計殱之而猶恐千里長江處處可乘順流横渡皆不可知且賊狡智多端真偽難辨人扮估客船作商舶白衣搖櫓猝發一旦可不為預防乎伏乞皇上嚴飭理臣既任𠞰何以𠞰之不力兼任撫何以撫之有終收局于已殘弭患于未著寧使臣言之太過疆事尚亦有利焉乞併敕江楚鳯應皖操各撫嚴督道鎮府縣置艦練兵遠探密哨節節布置再行闗使設法稽查商民船隻分編字號毋使乘隙潛窺或調水師一旅扼之江楚中間以伐狡謀想廟堂必計之早也伏祈聖裁施行疏入得㫖該部看議具奏讜論當存人材可惜疏崇禎十一年范景文臣等待罪南國碌碌班行不能有所建明以仰裨聖治日懷慚悚惟于邸報中仰見皇上瑩精化理側席求賢夜寐夙興急欲躋世三代之上而流寇燄熾不能即慰一人之心頃者枚卜之舉廣咨博訪至下霽天光曲垂清問特簡五臣俾以爰立求之如此其誠擇之如此其慎也而兵部尚書楊嗣昌忽從墨縗首膺白麻想因綸扉無習軍旅之人以彼久厯巖疆曉暢邊情必能雪恥除凶立定大計天下無不亮皇上不得已而用之心輔臣自起家筦樞以及秉政封事屢上頻以終制為請情辭惻然聲淚俱下終惕天言逡巡就列其不得巳而應之心天下亦多亮之乃詞臣黄道周等執義廷諍不憚再三以致仰干宸嚴卒無迴避或謂輔臣昔日奪情尚可據金革以為言至于今則未有處也亦豈得巳而爭之哉一時羣議咸快主聖臣直于今再見皇上必且欣然嘉納蓋惜材濟急不妨通一時之權而立法垂世仍當存萬世之經聽言用人朝廷並行不悖孰敢弗服乃伏奉嚴綸黄道周降六級調外任矣何楷降二級調别衙門矣林蘭友補任降級矣劉同升趙士春俱各降三級調外任矣天下乃始徬徨疑惑不勝私憂過計蓋以難得而易失者人材也難振而易靡者士氣也光岳之所毓孕靈不常鍾祖宗之所培育用有時蝎即今以草土棘人置鼎元重地亦因人材之難也如道周等有數人物用之猶懼其晚棄之何得其用乃共推碩果遂嗟抱蔓此臣等所為人材惜者也古云平居無直言敢諫之士臨事鮮仗節死義之臣凡以氣為主在上長養之耳而用舎之間實闗天下趨向諸臣之處分在皇上不過聊示創懲以神磨厲第恐見聞不察遂謂朝廷有意厭棄直節必且習成頑鈍脂韋成風毁方干進亦豈國家之利耶則臣等所為士氣慮者也皇上神明天縱獨觀萬化之原豈其念不及此所以然者欲以安輔臣之心而得其用耳臣等以為容之則輔臣之心更安何也輔臣淹貫古今儼以豪傑自負亦知夫違清議摧人望則不能出而有為即昨連疏剖心欲明孺慕于天下平臺召對力救道周胸中所存具可想見皇上若容言者則輔臣之心以白罪言者則諸臣之名益彰故曰容之所以安之也且獨不觀之往事乎宋唐介極詆文彦博彦博乃請召還唐介故介之名終不高于彥博則今日輔臣之所以自待與皇上之所以待輔臣從可知矣以臣所聞道周立志欲法古人學問卓有原本而清風頑懦識洞人天忠義凜然實有堯舜吾君之思何楷林蘭友皆剛腸勁骨百折不迴鳳鳴梧岡一時稱為國瑞劉同升趙士春忠孝家傳蔚為時棟曽經帝心親簡不愧科名海内咸服得人之數臣者孤忠自許獨立敢言不識忌諱何有依傍聖明或亦鑒其無他耶雖其持論不無過激稍嫌于戇然漢廷稱戇者莫如汲黯而淮南寢謀卒賴其戇如公孫𢎞乃發䝉振落耳則用舎之間可不慎乎以人事君上臣極軌輔臣職在贊襄諒必極力推援以昭意表行事故願皇上終為輔臣地以宥諸臣也臣等叨在九列誼難三緘謹此合詞披瀝上請伏祈聖明裁察臣等不勝惶悚待命之至疏入得㫖大臣當絶私奉公尊君體國何乃附㑹邀名玩視屢㫖摭拾合瀆明屬朋謀把持其主稿的是何人著范景文明白具奏姧回誤國請正憲典疏崇禎十五年馬嘉植臣謹奏臣敷對日指當事以封疆為兒戲蓋斥中樞陳新甲也新甲罪狀長安道上三尺童子莫不唾罵何用白簡臣猶正告其罪彰明國法以垂戒天下萬世之為司馬者祖宗三尺法以治天下者也茍功罪不明賞罰不當雖有熊羆之衆百萬之師安所用之新甲亦有血氣心知豈全不知兵愍不畏法茍求賒死蓋有所恃而無恐新甲之心路人知之矣以為登司馬之堂不消講方略不消講戰守不消顧君父不消恤人言己别有術可立于不敗見前此為宗社之罪人犯千古之清議者伊何人哉生前倖免兩觀之誅沒後猶䝉殊等之錫者伊何人哉天下事不過如斯耳衣鉢授受則燈火遙相照也寧負公家不敢負私室此新甲敗壞封疆張本也至撫鎮求成損威辱國成與不成皆罪罄南山之竹書罪無窮姑留其説俟事久論定另結一重大公案臣秖請就封疆失事論之新甲淪陷藩封一罪祖宗金甌地尺寸不可與人今拱手棄去一罪叛帥愛子護送出境一罪以松立為孤注坐視不救一罪其更有失策者當革左竄伏山中勢同釡魚誰為附和私人偏主撫議養癰滋蔓一罪數年抽練喪于一蹶沙場白骨波底游魂慘淡旌旗飲恨何極誰為交通授意以致撓敗今門庭震驚事變叵測一罪臣平心以論亦何讎于新甲哉恐姑息養姧新甲之前既有新甲新甲之後又有新甲天下事尚可言哉伏乞敕下法司會議罪狀大奮乾綱彰明國憲以存天下萬世之大法封疆幸甚疏入得㫖已屢有旨了該部知道國勢阽危廟算未定疏崇禎十五年馬嘉植臣謹奏竊謂治天下者急則治標須識目前之利害通盤打算須觀天下之安危蓋内憂外懼開闢至今未有如此日之劇者也左支右詘自皇上御宇以來未有如此日之窘者也似病久之人千瘡盡潰百孔俱發及早延醫尚有補救若仍諱疾忌醫因循姑待年復一年日復一日必有一錯昔云未雨綢繆今既雨矣風雨飄搖岌岌不支安為固然恬不知怪羣臣坐觀成敗于下皇上獨處孤危于上此真可憂可懼可痛哭不忍言而又不敢不言者也敵逼門庭而泄泄者且曰己已丙子戊寅入且不久遁耳不知丙子甚于己已戊寅甚于丙子至今而益難試觀天下大勢何如乎海内騷動望屋而食揭竿以起所在糜爛民之思亂者十室而九萬一此乘其虚彼乘其敝轉睫之間措手不及天下事未知終始皇上宜召見廷臣一切兵馬錢糧等衙門逐一條對不厭反覆毋俾游移以臣愚見闗門固急尤當通盤打算如各口不宜防衝突乎津門登萊不宜防游兵以擾海上乎津運不憂資敵糧乎臨德不宜設重鎮乎囤漕有督催矣至于水陸不防張頤以逞乎羣盜蜂起二東川浙暨江淮南北勢難一旅抽調作何應援乎栁營精鋭太僕上駟俱喪闗外縱選督撫能隻手搏戰徒卒攖鋒乎叛將賀人龍等跋扈無道作何殱滅乎闖曹若捲土復來汴梁無竊據乎潼闗上下大河南北與餉道運道作何防扼乎二東咽喉作何掃蕩乎留都豐鎬盈盈一江保無乘風破浪窺睨根本乎倉庾懸罄萬一事患叵測作何供億乎及今不圖後嗟何及兵法有云致人而不致于人又云先為不可勝以待敵之可勝徒以有用之嵗月坐消于無益之舉動不大謬哉皇上見安攘無效不得不請命于天而臣以為總不若急修人事恐齋醮未撤在内隳軍民之氣在外增窺測之心片紙符籙豈能禦侮折衝所當早賜停罷如果臣慮不謬召見廷臣求講實著是戡定一大機括也臣無任激切待命之至疏入帝留中乞停遣部科催餉疏崇禎十六年倪元璐臣謹奏為官省則專能辦則勵謹條簡便責成之法以速輸將事夫臣部急餉惟嚴攷成攷成者明乎其有專責也其責巳專矣又别設官以分其責是敎之卸也以臣之議催餉科臣既當停遣催餉侍郎亦宜併罷即分催司屬亦可不差蓋臣以為節用愛人之道莫大乎省官遣一朝臣地方即多一番供億小民即多一番驚畏而究竟無加于撫按幸不辱命仍是乞靈撫按耳今之巡撫比于古之大國諸侯而巡方繡斧所謂代天巡狩者也撫按不能為誰能為撫按不足賴又誰足賴乎朝遣既停撫按自無所推卸然猶望皇上特申嚴諭兼敕撫按而尤專其事于按臣蓋撫務猶繁按威特重宜併令按臣選委亷幹推官一員專催一省餉務仍以其姓名上聞使推官凜凜常有天威鑒臨其上夫推官者州縣所憚也而自治其土即于地方無所擾怖皇上以錢糧為第一義攷核按臣而推官能否臣部亦得而問之誠無愆欠即與減俸行取否者論罰有差凡為此者誠以皇上天語必愈于餉臣之筆舌而巡撫必愈于客卿之侍郎按臣必愈于行省給諫推官必愈于閒局分司此臣所謂省官則專者也至于錢糧起解職屬藩司往者州縣多有完徵解司而被部參重罰者此由藩司不為即解或那移他用或委任非人部無由知惟有參罰州縣以致羣論不服勞吏灰心今請令有司完解到司取有藩司實收印結立申到部臣部于文到之日即于本官名下註完攷優立移吏部紀錄先經降罰者立與開復凡收結不到部罰在州縣收結既到而銀解後時者計道里遠近歸罰藩司持之斷斷如此則賞罰明而人無曠職臣所謂能辦則勵者也帝王之制天下貴乎術簡而法信當民窮愁苦之時術愈貴簡然而行法不信則簡適所以導慢臣所謂速輸將之計者止此伏候聖裁疏入得㫖覽奏簡要直截深得速運之法已另有諭㫖了劾馬士英疏崇禎十七年劉宗周臣竊思陛下龍飛淮甸天實予之乃有扈蹕微勞入内閣進中樞宮銜世廕晏然當之不疑者非士英乎于是李沾侈言定策挑激廷臣矣劉孔昭以功賞不均發憤冢臣朝端譁然聚訟而羣陰且翩翩起矣借知兵之名則逆黨可以然灰寛反正之路則逃臣可以汲引而閣部諸臣且次第言去矣中朝之黨論方興何暇圖河北之事立國之本計巳疎何以言匡攘之略高傑一逃將也而奉若驕子寖有尾大之憂淮揚失事不難譴撫臣道臣以謝之安得不長其桀驁則亦恃士英卵翼也劉黄諸將各有舊汛地而置若奕棋洶洶為連雞之勢至分剖江北四鎮以慰之安得不啓其雄心則皆高傑一人倡之也京營自祖宗以來皆勲臣為政樞貳佐之陛下立國伊始而有内臣盧九德之命則士英有不得辭其責者總之兵戈盜賊皆從小人氣類感召而生而小人與奄宦又往往相表裏自古未有奄宦用事而將帥能樹功于方域者惟陛下首辨陰陽消長之機出士英仍督鳳陽聮絡諸鎮決用兵之䇿史可法即不還中樞亦當自淮而北歴河以南别開幕府與士英相掎角京營提督獨斷寢之書之史冊為今日第一美政矣疏入福王優詔答之促其速入陳時政疏崇禎十七年劉宗周臣竊惟今日大計舍討賊復仇無以表陛下渡江之心非毅然決策親征無以作天下忠義之氣一曰據形勝以規進取江左非偏安之業請進圖江北鳳陽號中都東扼徐淮北控豫州西顧荆襄而南去金陵不遠請以駐親征之師大小銓除暫稱行在少存臣子負罪引慝之心從此漸進秦晉燕齊必有響應而起者一曰重藩屏以資彈壓淮揚數百里設兩節鉞不能禦亂争先南下致江北一塊土拱手授人督漕路振飛坐守淮城久以家屬浮舟遠地是倡之逃也于是鎮臣劉澤清高傑遂有家屬寄江南之説軍法臨陣脱逃者斬臣謂一撫二鎮皆可斬也一曰慎爵賞以肅軍情請分别各帥封賞孰當孰濫輕則收侯爵重則奪伯爵夫以左帥之恢復而封高劉之敗逃亦封又誰不當封者武臣既濫文臣隨之外臣既濫中璫隨之恐天下聞而解體也一曰核舊官以立臣紀燕京既破有受偽官而叛者有受偽官而逃者有在封守而逃者有奉使命而逃者法皆不赦亟宜分别定罪為戒將來至于訛言南下徘徊順逆之間寔繁有徒必且倡為曲説以惑人心尤宜誅絶者也疏入福王詔納其言宣付史館陳五事疏崇禎十七年劉宗周臣竊惟今日時勢敬陳五事一曰修聖政無以近娛忽逺猷國家不幸遭此大變今紛紛制作似不復有中原志者土木崇矣珍奇集矣俳優雜劇陳矣内豎充庭金吾滿座戚畹駢闐矣讒夫昌言路扼官常亂矣所謂狃近娛而忽遠圖也一曰振王綱無以主恩傷臣紀自陛下即位中外臣工不曰從龍則曰佐命一推恩近侍則左右因而秉權再推恩大臣則閣部可以兼柄三推恩勲舊則陳乞至今未已四推恩武弁則疆埸視同兒戲表裏呼應動有藐視朝廷之心彼此雄長即為犯上無等之習禮樂征伐漸不出自天子所謂䙝主恩而傷臣紀也一曰明國是無以邪鋒危正氣朋黨之説小人以加君子釀國家空虚之禍先帝末造可鑒也今更為一二元惡稱冤至諸君子後先死于黨死于徇國者若有餘戮揆厥所由止以一人進用動引三朝故事排抑舊人私交重君父輕身自樹黨而坐他人以黨所謂長邪鋒而危正氣也一曰端治術無以刑名先教化先帝頗尚刑名而殺機先動于温體仁殺運日開怨毒滿天下近如貪吏之誅不經提問遽科罪名未科罪名先追贓罰假令有禹好善之巡方借成德以媚權相又孰辨之又職方戎政之姧弊道路嘳有煩言雖衞臣有不敢問者則廠衞之設何為徒令人主虧至德傷治體所謂急刑名而忘教化也一曰固邦本無以外釁釀内憂前者淮揚告變未幾而高黄二鎮治兵相攻四鎮額兵各三萬不以殺敵而自相屠毒又日煩朝廷講和何為者夫以十二萬不殺敵之兵索十二萬不殺敵之餉必窮之術耳不稍裁抑惟加派横征蓄一二蒼鷹乳虎之有司以天下徇之已矣所謂積外釁而釀内憂也疏入福王優詔報聞御選明臣奏議巻四十
