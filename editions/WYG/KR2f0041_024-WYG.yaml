  text: 欽定四庫全書御選明臣奏議卷二十一
  hash: sha256:4c3c1911e4bafff7822196e61cda364ac644b0a77a79c30c579453fd678433a1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_024-1a, image: WYG0445/WYG0445-0330a.png}
body:
  text: 論刑獄疏嘉靖六年黄綰臣謹奏伏惟我朝太祖髙皇帝肇跡民間享國特久備歴艱難飽諳物態故立制定法準今酌古周備無遺視漢唐宋為過之至刑獄一事尤在所慎既設刑部以掌邦禁又設都察院以司糾察兼之問刑又設大理寺以專審錄凡問過罪囚具照送審凡招不協情情不合律者駁回再問若駁回三次改擬不當将當該官吏具奏送問謂之照駁照者照其情律也若問有寃枉囚自翻異不服則取供行移改調隔别衙門問擬二次翻異不服則具奏㑹同九卿圓審詳載諸司職掌與大明㑹典為制甚宻及查現行條例遇有重囚稱寃原問官員輒難辦理者許該衙門移文㑹同三法司錦衣衛堂上官就于京畿道㑹問辦理果有寃枉及情可矜疑者奏請定奪葢使彼此精研互相覺察故為問刑審錄之司者敢不積誠竭慮據情法以議其平哉法得其平人皆易知易守而不犯故刑罰得中民獲措其手足所謂辟以止辟刑可期于無刑也奈何豐豫之餘人心玩怠問刑者不惟五詞之審五疵之克審錄者不知觀刑之中獄成之孚惟意出入百司視效不究其當究刑每濫于無辜不問所以問罪常訛于非情苛碎煩擾長宄興姧俾良善無控訴之門狙詐得横行之路習迷不返乃稱守法因陋踵弊反為得禮以求實理為怪異以論舊章為狂愚遂使祖宗良法廢壊殆盡臣等有難盡言者今幸陛下天錫仁勇孜孜勵精剗除宿弊圖新化理臣等幸沐遭逢忝司平反以為照駁圓審之法不行則司刑者無所畏憚度獄決不可清他若詳定法律攷課官屬矜恤獄囚查革淹滯省節煩擾體悉吏隠又所以清獄之源逺修舊章上裨聖政之萬一也伏望皇上俯察特敕法司今後問刑凡有擬議未當者容臣等查照舊規照駁再問駁囘三次改擬不當將當該官吏具奏送問若問有寃枉囚自翻異不服取供改調隔别衙門問擬二次不服止照條例㑹同三法司及錦衣衛堂上官㑹審十分重情遵照會典會同九卿圓審原問及改問官若容私偏向仍有寃枉不明者一體參提問罪其餘事情均乞敕令本寺及各衙門欽遵施行臣等幸甚天下幸甚為此開坐一問刑衙門固應遵照律例問擬發落伹民偽日滋或有所犯出于律例所不載者或情重律輕或律重情輕難以照常科㫁者節該刑部都察院及本寺臨時擬議上請奉有欽依發落歴年以來非止一端此皆出于聖明參酌情罪以補舊章之未備誠宜𫝊之永逺使司刑者有所遵守也臣等恐文移積久職守不常未能一一查照奉行至有出入或重複奏請上煩宸㫁深為未便合無行令刑部都察院會同本寺将自嘉靖元年以來凡問過事情臨時議擬奏請及撫按等衙門奏行部院議處具覆奉有欽依發落者逐一查出再行議擬停當開􅍁具奏取自上裁著為定式增入問刑條例通行内外問刑衙門永為遵守其近日刑官私議比附律條之類刻附律書者俱不許𫝊用庶聖謨丕顯而刑不濫矣一法司所以専理刑名至于大理寺職司㕘駁闗繫尤重凡任兩寺官非精律例見出原問官員之上何以評其輕重服其心乎近見兩寺官其間歴年既久諳諫事體盡心職業者固多亦有初入仕途律之名例尚未通曉即欲㫁按庶獄未免有差原問官因得指摘罅漏借為口實至于參駁本寺亦不降心輒逞雄辯往復數次淹累囚衆至不得巳只得将就允行亦有彼此騰謗遂相擠陷本緣公務反成私隙以致刑獄不清多此故也合無行令本寺今後遇有新除評事督令講讀律例半年以上攷居疏通者方許干預平允如有刑名生疎者比照試御史事例仍令重歴重歴不堪者參送吏部對品改調在京别衙門叙用其現在者除寺正寺副不攷外其餘亦限三月以裏通加攷騐勤隋内有年久未諳者一體參送吏部别用若有究心刑名才識出衆者開送吏部候兩寺正副員缺不論年資銓補至為正副又能益勵職業比照刑部各道年深郎中御史一體不次推陞如臣等堂上官不能正已格物以致刑獄未恊于中亦乞聖明早賜罷黜以為不職之戒庶人心知勉法律昭明而足為天下之平矣一訪得刑部近年以來問理刑獄多便已私不體朝廷欽恤之意每遇强竊盜及人命重囚不問虚實輒加嚴刑苦訊又有經本寺審允題奉欽依處決者分付獄官私行謀死詐稱病故不得明正典刑及未成招死者枕藉于獄雖經御史及錦衣衛官相視不過虚應故事本寺所審者止據現在人犯病故者例不查攷以致該部肆行無忌問官緣此得省文移提牢官緣此便于防守而以人命之重如拉犬彘習以為常漫不知惜甚傷天地之和召災致變未必不由于此此等弊政巳非一日兹當欽明大獄之後人圖自新諒無敢蹈前非者臣等恐宿弊難祛頽風易靡不可不豫為之防也合無行令刑部衙門戒飭各屬俱要仰體至仁重惜民命一應罪囚無得非法陵虐有患病者提牢官及司獄官請醫調治不痊身死者一面行文都察院等衙門差官相視明白仍一面将患病緣由開送本寺以憑查審若御史等官騐有重傷及本寺審係矜疑人犯并未結事情雖係真正死罪重囚不曾請醫用心調治假揑虚文開報者俱将當該官吏參究従重治罪其男子杖罪以下及干證平人婦人徒罪以下者不許一槩淹禁每月終該部堂上官仍将現在開除病故囚數開具説帖御前宣奏庶司刑者有所避忌而囹圄無寃獄矣又訪得相視官往往畏懼復命推延數日積死數囚方行相視以致屍肉潰爛臭穢熏蒸莫敢近前非惟死者莫辨其寃生者亦被所染瘟疫舉發莫可救藥誠為可矜亦乞敕都察院等衙門遇有該部開報死囚隨即差官相視所差似前耽誤參究治罪如此則陛下如天之仁及于枯骨矣一近時法司問事多有淹滯日久牽累人多合無行令今後問擬大小事情及行各城勘騐者大事限二十日中事限十日小事限五日俱要提齊完結如錢糧行查未明强竊盜俟拏正犯未獲人命未檢結勘以致稽遲者将現在人犯及本状内各起事情先行問招送審本寺即明開各犯到官之日以慿查攷有淹滯過期者年終彚奏量請罰治如例應委官勘問及行軍衛有司會勘違限并託故推調不即赴勘者原委衙門照例參奏提問庶宿弊可革而官無曠職矣一近日各城巡視御史并兵馬司衙門每遇地方呈報小事不論情之輕重槩送法司法司又加求入以重罪送寺審駁方行改正又聴人囑託濫准詞訟批發兵馬司問理以致牽累貧民動經旬月甚至傾家蕩産鬻賣子女始得完結者臣等以為律設大法禮順人情市井細民愚蠢無知過恒不免或因醉酒喧譁或因㣲末争搆至有妻妾妬寵而反目子孫違令而打罵皆人情所不免該城量行責治已足示懲戒若一概送問反戾人情誠為擾害合無今後行令各城御史今後除强竊盜人命等項重情地方呈報照舊送問外其餘一應小事審無别故者量情發落不許送問法司亦不許受理凡軍民詞訟俱赴通政使告行法司提問亦不許巡城兵馬司等衙門濫受擾民庶刁風可息而貧民獲安矣一給由服滿雜職官并吏員人等到部違限及洗改𦂳闗字様者查攷大明會典及該部節年題准各有送問事例固難輕宥但近據送問者審其情各可矜事非獲已如過限者因久候巡按攷覈或因官司不即起文或因缺盤纒或因病疾或因地方逺涉不得及期赴部其洗改者或因司府吏胥差誤所致原無𦂳闗字様若不體恤一槩送問則贖罪一番所費不貲又聞有吏違限免其送問罰班書辦轉行雇人繕冩逺方貧吏未免掲債了事掲債日多未免貪求自給及至敗露或反回護衙門不肯送問如此是責其細故而啟之以犯法也合無行令該部今後除官吏職役已滿及丁憂服滿并事故已經起送不行赴部者吏除照常十七箇月與官批限外再量地方逺近各除水程復有違限及查有真實姧弊批文咨結俱有洗改𦂳闗字様者俱照舊追問外其餘過限未及三年原籍并所在官司告有事故勘帖明白至若雖有𦂳闗字様或洗改批而咨結真正或洗改咨結而批真正或結状一處洗改他處查對不差並洗改非𦂳闗字様律稱勿論者俱免其送問及罰班書辦等項庶情法兩盡事得不擾而卑官賤吏亦可以責其守法矣疏入得㫖這本所言體悉人情不渝法守且合朝廷欽恤之意法司便查照著舉行執中行政疏嘉靖六年臣聞帝王之學中而已矣堯之授舜舜之命禹皆曰允執厥中嗣是以來若成湯文武之為君臯陶伊尹周召之為臣既皆以此而接夫道統之𫝊至吾夫子繼往開來而𫝊至其孫子思遂筆于書曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉夫喜怒哀樂情也方其未發則外物未有所感而此心寂然不動無所偏倚故謂之中及感物而動喜怒哀樂發皆中節則事無不當物無不宜無所乖戾故謂之和和即中也夫喜怒哀樂發于一心之微而措諸天下之廣凡國家刑賞之政慶恤之典無不皆由于此故曰天下之大本天下之達道故如人君喜有賞怒有罰或當喜當怒而隠忍不發或既喜既怒而留滯不㪚皆非中節也又或今日當賞而因前日之怒格之不賞或今日當罰而以平日之喜縦之不罰又或此事當賞一分而因喜賞過二分或此人當罪一事而因怒並罪其餘亦非中節也故人主于平居無事之時常當涵養此心使寂然在中無所偏倚既而遇事有當喜當怒者則又臨時審察其中節與否而後發之至于哀樂亦然不徒今日如此而無一日之不如此不徒此事能然而無一事之不皆然此之謂致中和而天地以位萬物以育是使天下無一物不得其所而何徳不修何治不隆何災不弭哉先儒以為此學問之極功聖人之能事者不過此中而已伏願聖明留意然中無定體隨時而在隨事不同故執之者當如持衡之勢不使少有所偏如古聖賢論治體則周公告成王有曰伻嚮即有僚明作有功惇大成裕汝永有辭謂使百工知上意嚮各就有僚明白奮揚而赴功惇厚博大以裕俗則王之休聞亦永有辭于後世矣夫當守成易溺宴安之時而不為明作有功之戒則士習偷惰而廢政殃民日見陵夷之狀矣若專明作有功而不為惇大成裕之圖則治流刻薄而人心不安又非悠久之道矣此二者不可偏廢亦執中之意也故周公欲使百工知成王意嚮如此以供職而使其君長有令聞于後世忠臣為國逺謀之意如此臣竊見國家承平日久士習因循偷惰太甚以致政弊民窮天災日見聖心憂勞累年今一且豁然天啟奮然雷動信用忠賢釐革政弊人心惕然警省政治焕然一新知我皇上勵精圖治之志而皆奮為明作有功之舉然而中人之性素無定見惟事隨風趨靡以速時名而或事為過舉以失朝廷建中立教之本意則非惇大成裕之道也臣近見撫按參官本中有以飲食紙劄應用微物而即坐贓奏提者至或大姧大貪置之不舉而惟繩此武職小官以塞責如此臣恐諸臣倣傚刻薄成風而𫝊諸天下後世不知我皇上天髙地厚之徳非周公願其君永有辭之意也除此小事臣已駁令改政外至于大政事大賞罰之有闗于天下大體者伏願聖明特敇大小臣工今後供職行事常懐明作有功之念而不可有失惇大成裕之體雖懐惇大之心而又不可遂隳明作之志復蹈因循之弊則陛下之聖學推之政事者真為允執其中而堯舜禹之聖不過是矣至論聴言則舜戒禹曰予違汝弼汝無面従是則舜之大聖亦欲其臣正諌也然雖樂正諫而又曰朕塈讒説殄行則妄言者亦疾也雖堲讒説而又曰欲竝生哉格則承之庸之則又疾之不為已甚而許其改過復用也此舜之執中見于所言者如此至于後世孔子論事君曰進思盡忠退思補過将順其美匡救其惡則将順與匡救皆忠也孟子則曰逢君之惡其罪大則深惡逢迎之不忠也臣昔上論逢迎與将順不同君所行是而人臣順承其志以成就其美者将順也君所行非而人臣迎合其意以求媚其心者逢迎也二者事情不同忠邪所由以分也近嵗以來講學不明人心士習不正妄以将順為逢迎而各欲掠取正諫之名故于君上至徳所當将順者而亦曲加阻遏以為匡救甚者其心靡懐報國之誠惟圖媚竈之利因而排擊忠良驅除異已至欲明主不得專行一事自用一賢而威福惟其所媚者之歸數年以來主威不立善政不行民生困苦亦已甚矣其罪葢不止如舜之所言也近賴皇上天日開明赫然奮發讒説屏除士習一變矣然恐其間或有事實當言而言或過激又或心本効忠而意見差謬者與彼讒邪同棄不無可惜又恐中人惕禍遂怯正言而後有大事大姧莫之敢論至昧我皇上本心納諫之誠以誤國事伏望聖明容臣與吏部細加查訪并凡因公降謫官員究其心之公私原其罪之輕重量其才之長短陸續上請或還原職或量收叙至于情理難容不該收叙之人久謫遐荒者亦乞聖慈體大舜欲並生哉之意量加寛恤使得生全至論用人則曰湯執中立賢無方此其大要也伊尹告太甲曰任官惟賢才左右惟其人其難其慎惟和惟一此其大法也夫難者難于任用慎者慎于聴察夫既立賢不拘其類而欲難慎如此者所以防小人之似君子而誤用之也然人全徳實難或有一失如玉之美有一玷木之良有一朽不害其為器也惟夫姧險媢嫉之人無隙可指而能誤國大事者則不可用耳和者可否相濟一者始終如一所以任君子也往時人才自入仕途即事交結拔置清要坐躐卿輔而乃私立門戸謬為舊制以排斥真材不使得用以是民瘼不知政體日壊民生困苦實由于此今我皇上聴納忠言痛革前弊均調内外立賢無方期得真才以輔至治大臣體國者日事薦賢明良相遇真足以共成正大光明之業矣然恐其間萬有一誤者則在聖心其難其慎而已至于可否相濟者非徒君臣為然而僚寀之間見或不同相規相就亦當如是不以為嫌此臯陶陳謨于舜禹之前所以有百僚師師之説也更願陛下以此時戒羣臣使和而不同以共成我國家無疆之休而已凡此經書大㫖聖明天縦經筵日講豈有不及而臣猶以為獻者區區芹曝之私不能自已也伏望聖明俯賜採納天下幸甚疏入得㫖覽卿所奏足見大臣愛君陳善至意朕知道了查復官員且罷吏部知道陳八事以足兵食疏嘉靖六年李承勛臣惟孔子論政不過曰足食足兵孟子每語王道亦未嘗外耕桑而有髙逺難行之説是知王政莫先于兵食而兵食取足之道非增兵以耗國加賦以病民也在審勢而救其偏隨事而去其弊耳足兵之目有四曰選京軍以壯根本止調操以實内地足衣糧以䘏邊軍振紀綱以申軍令就中論之振紀綱為要紀綱振則三者自肅矣足食之目有四曰謹收納以清宿弊便轉輸以蘇民困定經制以裕國用召和氣以致豐穰就中論之召和氣為本和氣應則三者不勞而自理矣何謂選京軍以壯根本夫京師天下之根本皇宫又京師之根本故居守環列周防鍵閉其制甚重将領必勲舊卒伍必精勇器械必鋭利而鮮明豈徒示觀美巳哉葢居安防危其為慮深且逺矣臣見京軍膂力勇健而武精通者百無一二兵刃不堪用盔甲不稱身者十常八九使九州朝貢外藩來王者見之何以壮國威而懾姧謀哉至于各營之所分隸號稱百萬團營之所揀選號十二萬為将領者果皆召虎亞夫之流而不至有膏梁債帥濫竽其間乎為卒徒者果皆武力絶人一可當十而不至有竄名影射耗斁于其間乎其操習果能得六伐七伐八陳五花法外之意而不至有若霸上棘門之兒戲以玩愒日月乎臣皆未得而知也自古武備常弛于承平之久而振于中興之日故殷武車攻雅頌並稱髙宗宣王服逺之美以為得苞桑之良圖今官軍以勇悍善鬬稱者在北則各邊在南則狼土禁軍之中未聞有力扼虎射命中可以戢逺近之邪心者失今不治竊恐寖失居重馭輕之權養成尾大不掉之患臣誠至愚不能不竊憂之昔周勃仗北軍之强乃能制産祿之死命李林甫壊府兵之制而范陽之變莫可救藥殷鑒不逺患須豫防乞下兵部凡宿衛練營官軍将必擇忠順勇壯曾經戰陣之人軍必擇少壮有力各精一技之士而不致虧原額之數器械必可用盔甲必稱身而後給葢團營較各營為重而守衛較團營為尤重也使精兵良将萃于京師布列環衛伏太險于至順之中消不測于無形之表此即詩所謂君子萬年保其家邦者也其他各營之衆汰老弱偽冒以省國儲練少壯精勇以備次撥而役占剝削之宿弊一切革去則貧軍不致怨嗟逃避國威一振天下聞之孰不畏服何謂止調操以實内地我朝官軍調操之制肇自永樂初年京師兵少調發中都大寧山東河南附近官軍輪班上操宣徳正統以來踵為故事日益加宻除南方各省未暇具論如河南山東南北直𨽻俱京師咽喉山陜又中原形勝要地各處官軍或調操于京師或調操于各邊本地無軍可守臣昔備員陜西右布政使經過潼闗詢其實在軍士不過數名驚問其故始知皆在各邊備操後盜入商洛鎮巡官議欲赴救無軍可遣河南山東直隸武備單弱尤甚以故盜賊縦橫莫可禁禦劉六趙遂足為前車之戒臣知調操官軍在京止堪備工作之役在邊則将領給私役供饋送而已于國有行糧草料之費於私有齎送科尅之苦而又未嘗得其實用今昔相因以為舊規而不敢變此軍旅所以日耗而内地日益空虚者也如臣愚計慮邊旅之寡請将調操官軍留于本處委官同民壮精加操練如鄰境有賊則互相䇿應又或一邊告急則合力赴援如此貧軍無侵尅之害地方得保障之功比之不問有驚無驚一概分𣲖調操者強弱多寡之勢又不可同年而語此一弊革而數利興者也何謂足衣糧以卹邊軍臣惟戍邊之卒烽火斥堠終嵗不休鋒鏑死亡朝夕不保比之京輔之軍勞逸安危何啻百倍近年調取邊軍征𠞰流賊貫串于河南山東江淮間又久屯京師出入禁地稔見内地軍民安逸脆弱有子女玉帛之供無饑寒危迫之患未免有不均之嘆起羨慕之心萌輕視之志况以各邊撫臣撫處失宜將領剝削日甚往往以衣糧不足呶呶于軍門推求其本軍情之所以易動者因無恒心也恒心之所以失者由衣食不足也臣願皇上敕下吏兵二部查議各邊撫臣有不宜于邊者急易置之賢者久任之或由僉都陞副由副陞左右而不輕移動糧餉不足户部查議給足不許將領尅減令沾實恵而又察其疾苦時其勞逸彼将感恩圖報之恐後何變之足憂如此則邊徼安天下安矣何謂振紀綱以申軍令臣聞紀綱御軍之大柄其機在于賞罰賞罰不明則政令不一政令不一則紀綱不振宋儒朱子嘗言紀綱在核功罪以公賞罰之施正以此也在昔軍中號令最嚴徵調會期時刻不爽止因正徳年間逆彬怙勢曲庇邊軍又因功次不明使賞濫及無功而罰不及有罪是以紀綱漸紊彼此效尤官防緩而姑息之政行軍恃衆而侮慢之態作臣願皇上大奮乾綱申明軍令選将領而束以什伍連坐之法明敎化而導以親上死長之義嚴上下之分平彼此之怨以消其驕悖跋扈之氣有功必賞有罪必刑而痛革姑息之政則威惠並存紀綱振肅勇健之士足以為國爪牙而無跋扈之足虞此即子路之所謂有勇知方者也何謂謹收納以清宿弊州縣夏秋税糧開倉收受各有定期起運存留各有定數本色折收加耗災免之類各有定法夫何近年以來上下各官留心國計者名為俗吏用心勞而反得謗怠事奏承者稱為識時自處逸而獲美稱以此各官鮮肯實心任事每嵗正當冬月收成之後州縣多以會計不定不出由票示民易知細民辦糧交納上司輒将州縣正佐管糧等官或委勘事或派逺差無人監收多致費耗來年三月以後軍船已至水次府司管糧官員方下州縣比較嚴刑逼迫窮民去嵗所收已空今嵗農功又誤或有本色而責其輸銀不得不半價以求售或願輸銀而責其本色又未免稱貸而取盈此後時之弊也如每嵗七月以前布政司會計完竣明示下司依時收納自十月至十二月而止州縣管糧各官不得差委以妨監收災傷蠲免務使民沾實恵而無黃收白放之謡守巡各官毋於收糧東作之際舟輿銜尾既往復來以私謁撫按而費民夫馬則後事之弊可革也又糧里人戸各有善弱各有豪强糧里豪强則以善弱人户為可欺加增每過于正額糧里善弱則以刁惡人户為可畏拖欠而代之賠賞上司按臨糧里之豪强者以無人敢言而反得安身善弱者以人易誣執而反受屈抑此勸懲顛倒之弊也茍能不避嫌疑虚心推究則二弊既革小民及時完納而東作無妨糧里不致追賠而身家可保完糧之䇿莫先于此何謂便轉輸以蘇民困國家糧税多仰給東南糧長之設責在收納蘇湖等處糧長所管税糧既多解納雜費尤甚州縣不肖者以糧長為囊槖上司過刻者視糧長為冦讎兑軍之類每石包賠七八斗者有之起運白糧包賠二三石者有之各衛菽豆之類每石不過值銀三四錢而他費㡬至一兩者有之家有千金之産充糧長一年有即為乞丏者矣家有壯丁十餘充糧長一年有即為絶户者矣以致民避糧長之役過于謫戍官府無如之何或有每嵗一换之例或為數十家同充之條始也破一家數嵗則遍鄉無不破家矣糧長之家既破國課何由可完數十年以來各縣逋負動數十萬多由于此臣久任東南目睹諸弊日甚一日而不能救不敢不為陛下陳之伏乞通行兩京内府及兑運等官上下一心同恤民隠本分之外毋肆需求敢有故違聴撫按科道等官指實查參若夫豪惡糧里刻害小民有司科派糧長上司亦宜重究庶㡬錢糧不致破家亦不致害人而税糧易完矣何謂定經制以裕國用夫量入以為出是謂仁政量出以為入是謂虐政既不量入為出又不量出為入雜然而收泛然而用是謂無政攷成周之制以四分制國用每嵗用三存一以備凶荒故三十年之存則國有九年之積漢之時則有計相唐之時則有判度支宋之時則有判三司皆所以會有無而制國用也近年以來户部雖有會計之虚名而無量入為出之實政臣愚以為通查一嵗天下税糧所入總計若干經國之費總用若干倣周禮用三以足一嵗之用存一以備不測之虞萬一所出多于所入則㑹九卿堂上科道官各查凡百費用有約于昔而浮于今者必攷昔之所以約者復之又攷今之所以浮者省之其裒多益寡挹彼注兹又在臨時通融調劑務使所出不踰于所入仍将出入總數造冊進御即時有盈虚事有因革每十嵗一會而損益之若嵗之豐凶事之多少每嵗季冬户部㑹奏通查何處災傷蠲免若干何處用兵支用若干以各省茶鹽商税之所入者補足錢糧正額以備軍國正支其餘雜用一切不得糜費經制一定取之有經用之有義而財恒足矣何謂召和氣以致豐穰昔人有言天下之財不在官則在民今者太倉無數年之積閭閻鮮足食之家既不在官又不在民説者以為蠧于兼并耗于奢華似矣而未知其要又或以農功奪于雜役失時茍且而水利塘防之制一切不講亦似矣而未探其本大都年不順成由于雨𤾉之不時而雨暘之所以不時者實由天地之氣未和也伏望皇上聖不自聖于聴政之時大而慶賞刑威小而一顰一笑適中輕重之宜喜所當喜而不失之過怒所當怒而不失之不及普均平之治宏樂利之休則和氣之敷既充于下而天庥之應自徵于上又何患乎雨𤾉之不時若而萬物之不得其所哉疏入得㫖覽卿奏具見忠愛事闗朕躬者朕自有處餘下所司酌議以聞罷兵行撫疏嘉靖七年臣惟思恩田州之役兵連禍結兩省荼毒已踰二年兵力盡于哨守民脂竭于轉輸官吏罷于奔走即今地方巳如破壊之舟漂泊于顛風巨浪中覆溺之患洶洶在目不待智者而知之矣今若必欲窮兵雪憤以收前功未論其不克縦復克之亦有十患何者今皇上方推至孝以治天下惻怛之仁覆被海宇惟恐一物不得其所雖一夫之獄猶慮有所虧枉親臨㫁決況兹數萬無辜赤子而必欲窮搜極捕使之噍類不遺傷伐天地之和虧損好生之徳其患一也屯兵十萬日費千金自始事以來所費銀米各已數十餘萬前嵗之冬二酋復亂至今且踰二年未嘗與賊交一矢接一戰而其費已若此今若復欲進兵以近計之亦須數月省約其費亦須銀米各十餘萬計今梧州倉庫所餘銀不滿五萬米不滿一萬矣兵連不息而財匱糧絶其患二也調集之兵逺近數萬屯戍日久人懐歸思兼之水土不服疾病死者不可勝數潰散逃亡追捕斬殺而不能禁其未見敵巳若此今復驅之鋒鏑之下必有土崩瓦解之勢其患三也用兵以來兩省之民男不得耕女不得織巳踰二年衣食之道日窮老稚轉乎溝壑今春若復進兵又将廢一年之耕百姓飢寒切身羣起而為盜不逞之徒因而號召其禍殆有甚于思田之亂者其患四也論者皆以不誅二酋則無以威服土官是殆不然今所賴以誅二酋者乃皆土官之兵而在我曾無一旅可恃又不能宣布主上威徳明示賞罰而徒以市井狙獪之謀相欺相誘計窮詐見益為彼所輕侮每一調發旗牌之官十餘往返而彼猶驁然不出反挾此以肆其貪求縦其吞噬我方有賴于彼縦之而不敢問彼亦知我之不能彼禁也益狂誕而無所忌岑猛之僭妄亦由此等積漸成之是欲誅一二逃死之遺孽而養成十數岑猛其患五也兩廣盜賊猺獞之巢穴動以數千百計軍衛有司營堡闗隘之兵時常召募增補然且不敷今復盡取而聚之思田之一隅山猺海寇乘間竊發遂至無可捍禦近益窺我空虚出掠愈頻為患愈肆今若復聞進兵彼知事未易息逺近相煽蠭起我兵勢難中輟救之不能棄之不可其為慘毒可憂尤有甚于飢寒之民其患六也軍旅一動饋運之夫騎征之馬各以千計每夫一名雇直一兩馬一匹四兩馬之死者則又追償其主之直是皆取辦于南寧諸屬縣百姓連年兵疫困苦已極而復重之以此其不亡而為盜者則亦溝中之瘠矣其患七也兩省土官于岑猛之滅已各懐脣齒之疑其各州土目于蘇受之討又皆有狐兔之憾是以遲疑觀望莫肯効力所慿恃者獨湖兵耳然嵗前之疫湖兵死者過半其間固多借倩而來兵回之日死者之家例有償命銀兩總其所費亦以萬數今兹復調踣頓道途不得顧其家室亦巳三年勞苦怨鬱潛逃而歸者相望于道誅之不能止因一隅之小憤而重失三省土人之心其間伏憂隠禍殆難盡言其患八也田州外捍交趾内屏各郡其間深山絶谷又皆猺獞之所盤據若必盡誅其人異時雖欲改設流官亦巳無民可守非獨自撤藩籬勢有不可抑亦藉膏腴之田以資猺獞而為邊夷拓土開疆其患九也既以兵克必以兵守嵗嵗調發勞費無已秦時勝廣之亂實興于閭左之戍且一失制馭變亂隨生反覆相尋禍将焉極其患十也故為今日之舉莫善于罷兵而行撫撫之有十善活數萬無辜之死命以明昭皇上好生之仁同符虞舜有苗之征使逺夷荒服無不感恩懐徳培國家元氣以貽燕翼之謀其善一也息財省費得節縮嬴餘以備他虞百姓無椎脂刻髓之苦其善二也久戍之兵得遂其思歸之願而免于疾病死亡脱鋒鏑之慘無土崩瓦解之患其善三也又得及時耕種不廢農作雖在困窮之際然皆獲顧其家室亦各漸有回生之望不敢轉徙自棄而為盜其善四也罷散土官之兵各歸守其境土使知朝廷自有神武不殺之威而無所恃賴于彼隂消其桀驁之氣而沮懾其僭妄之心反側之姧自息其善五也逺近之兵各歸舊守窮邊沿海咸得修復其備禦盜賊有所憚而不敢肆城郭鄉村免于驚擾劫掠無虚内事外顧此失彼之患其善六也息饋運之勞省夫馬之役貧民解于倒懸得以稍稍甦復起呻吟于溝壑之中其善七也土民釋兔死狐悲之憾土官無脣亡齒寒之危湖兵遂全師早歸之願莫不安心定志􅇽育深仁而感慕徳化其善八也思田遺民得還舊土招集散亡復其家室因其土俗仍置酋長彼将各保其境土而人自為守内制猺獞外防邊夷中土得以安枕無事其善九也土民既皆誠心悦服不須復以兵守省調發之費嵗以數千官軍免踣頓道途之苦居民無往來騷屑之患商旅通行農安其業近悦逺來徳威覃被其善十也夫進兵行𠞰之患既如彼罷兵行撫之善復如此然而當事之人乃猶往往利于進兵者其間又有二幸四毁焉下之人幸有數級之獲以要将來之賞上之人幸成一時之捷以葢前日之愆是謂二幸始謀請兵而終鮮成效則有輕舉妄動之毁頓兵竭餉而得不償失則有浪費財力之毁聚數萬之衆而竟無一戰之克則有退縮畏避之毁徇土夷之情而拂士大夫之議則有形迹嫌疑之毁是謂四毁二幸蔽于其中而四毁惕于其外是以寧犯十患而不顧棄十善而不為夫人臣之事君也罷其職而茍利于國亦甘心焉豈以僥倖之私毁譽之末而足以撓亂其志者哉今日之勦撫利害較然是在擇而行之者矣疏入帝従之覆張經請慎差遣疏議嘉靖七年胡世寧臣竊惟聖明御天四海臣僕孰召不來孰罪敢匿内外法司委之提問罪犯孰敢延縦至差官校齎駕帖出外所過地方無不驚擾雖有以身許國之人素持不顧利害者無故猝然途遇亦皆震駭失色至于所提罪犯之家老幼驚惶被嚇財物怯懦者或因喪膽以成疾貧窮者或因稱貸以破家被提罪犯或被窘辱難禁而自殘身命所至官府急無打發多借官銀姧貪官吏乘機尅落以一報十上司坐視莫敢誰何小民代賠不勝哀怨聲聞于天降災致儆不無所自我皇上至仁覆物勵精圖治平日事天如父愛民如子凡所以體天心而究民隠者無所不用其極惟此一事無人敢言未經聖慮今給事中張經等因言弭災建議及此實効忠諫之職言所難言伏願聖明俯従今後官民有犯在内責之法司在外責之撫按按察司等官作急提問完報不許淹滯遇有事體重大合提在外𦂳闗人犯到京問理者行令各該巡按御史嚴限責差的當人員提解來京以慿問理非有事干機宻十分𦂳急重情近在畿甸地方不須再差官校乞㫁自宸衷永為定例如此則陛下攬權于上百官承式于下體統正而朝廷尊人心懽悦而和氣致祥矣伏乞聖裁疏入得㫖卿等所言朕知道了自有酌處論知人安民疏嘉靖七年李承勛臣聞自古帝王治天下之要道至簡至易在知人安民二事而已人曷為而難知乎毁譽亂之而四目四聰或不能無蔽也民何為而不安乎守令虐之而監司不能振風紀以激揚之也天下之本在君心我皇上奉天法祖精明純粹君心正矣而天下未治何也安危之機在君徳皇上恭以守身恕以及物君徳盛矣而治效未臻何也葢由郡縣之官愛民者少殃民者多而為監司者又不秉公任怨以督率其屬故也臣嘗稽之案牘科差日重察之閭閻軍民日困上澤雖布而不得下流下情雖苦而不得上達奉詔寛恤之事廢格不行奉㫖蠲免之糧重複徵擾其他姧弊百孔千瘡實政不修虚文是急皇上有不忍人之心無人為之宣播而小民不能盡知皇上有不忍人之政無人為之奉行而小民不得沾恵太平之治何日可期伏望皇上特敕天下撫按督察有司使朝有善政必及于民民有隠情必達于上天下之官厲民者去宜民者留天下之事厲民者罷宜民者行事有當為即為之而毋以利害為念姧有當擊即擊之而毋以强禦為畏事有當言即言之而毋以觸犯為虞則所謂徳之流行速于置郵者庶㡬可冀矣至于兩京科道以言為職亦多不能體皇上求言求治之心間有論列不過略舉小事僅以塞責乞賜戒諭令其靖共爾位略承順之細節進陳善之良規于凡官之失職政之失宜知無不言言無不盡憲職舉則逺近嚮風而郡邑之政無不舉言路通則實事必聞而隠伏之情無不通何憂乎人之難知民之未安也哉疏入帝従之御選明臣奏議巻二十一
