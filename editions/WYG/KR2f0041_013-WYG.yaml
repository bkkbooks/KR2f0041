body:
  text: 制科議𢎞治十年王鏊臣惟國家設科取士之法可謂精宻矣先之經義次之論表終之䇿問行之百五十年宜得其人卒未聞有如古之豪傑者出于其間而文詞終有愧于古雖人才髙下係乎時然亦科目之制為之也夫科目之設天下之士羣趨而奔向之人才之髙下士風之淳漓率由是出三代取士之法今未暇論唐宋以來科有明經有進士明經即今經義之謂也進士則兼以詩賦當時二科並行而進士得人為盛名臣將相皆于是出則明經雖近正而士之拙者為之謂之學究詩賦雖近於浮艶而士之髙明者多向之謂之進士詩賦雖浮艶然必博觀泛取出入經史百家蓋非詩賦之得人而博古之為益于治也宋王安石為相黜詩賦崇經學科場以經義論䇿取士可謂一掃前代之陋也然士專一經白首莫究其餘經史付之度外其學誠專其識日陋其才日下蓋不過當時明經一科耳後安石言初意驅學究為進士不意驅進士為學究蓋安石亦自悔之矣今科場雖兼䇿論而百年之間主司所重惟在經義士子所習亦惟經義以為經義即通則策論可無俟乎習矣近年頗尚策論而士習既成亦難猝變夫古之通經者通其義焉耳今也穿鑿支離以希合主司之求人才之不如古其實由此也然則進士之科可無易乎曰科不竢易也經義取士其學正矣其義精矣所惜者其途稍狹不能盡天下之才耳臣愚欲于進士之外别立一科如前代制科之類必兼通諸經博洽子史詞賦乃得預焉有官無官皆得應之其甲授翰林次科道次部屬而有官者則遞陞焉如此天下之士皆將奮爭于學雖有官者亦翹翹然有興起之心無復専經之陋矣或曰今士子一經俱不能精如餘經何曰制科以待非常之士也以科目收天下士以制科收非常之才如此而後天下無遺才故曰科不竢易也議奏帝不納論傳奉疏𢎞治十四年馬文升臣惟人君之大柄莫先于惜名器國家之首務莫急于節財用仰惟太祖髙皇帝奄有天下之初稽古建官各有定員非効勞任事者額外未嘗輕授一官彼時事無不立而政無不修所以府庫之財用有餘雖遇兵荒未嘗告乏列聖相承咸率是道未聞有傳奉之官至成化年間始開傳奉之門而宂官為之漸多十六年因遇星變廷臣論奏奉憲宗皇帝聖㫖傳奉文職大小官員除勲戚功陞廕授録用不動外其餘及儒士都寄名放囘有缺取用内有為事妄冒并乞恩陞授的查來定奪各衙門匠官精通藝業的存留著支半俸欽此欽遵綸音一下中外歡欣鼓舞咸以為雖漢武輪臺之詔亦不能過但當時𫝊陞官員尚有退之未盡者恭遇皇上嗣登寶位之初俯從言官之請但係𫝊奉官員盡行裁退天下欣然稱頌仁明奈何近年以來大小官員傳奉者復多其他亦有白衣人送中書處食糧習字出身得授中書舎人者前項傳陞等官十年該支俸糧動至數萬石皂𨽻銀不止萬餘兩况今親藩至三十餘府而郡王將軍中尉郡主郡君縣君儀賔等項不下千數所用祿糧通該百萬石有餘而兩京軍職比之洪武永樂年間員增數倍加以軍國之費所以内外倉廪空虛帑藏匱竭一遇兵荒動至賣官鬻爵而措之無方矣且國家貢賦有限皆小民脂膏以此有限之脂膏供彼無功之庸輩月計不足嵗計有餘則天下生靈豈有不困而府庫之財豈有不竭者哉本部嘗上請乞退此等宂官人等以省財用俱未蒙俞允亦有留中未出者伏望皇上大奮乾剛俯從羣議將額外傳陞及乞恩所陞官員及中書處習字人數除勲戚並進藥有效書寫制敕及大臣並經筵講讀官子孫外其餘通行裁革閒住或止許冠帶榮身隨藝供事仍乞今後凡有代替乞恩傳奉陞官之人斷之以義不徇所請以塞倖門而戒奔競庶名器不濫而國用少足矣疏入得㫖你每再查議停當來説災異陳言疏𢎞冶十林俊臣聞雲南等處地震山崩災變異常今年正月初一日陜西延安朝邑等二十餘處同時地震決非泛泛循省可以消此大變者也攷之前古漢和帝永元二年則宫闈之應安帝建光元年則内侍之應晉元帝大興元年則柄臣之應今宜皆無是也惟兵禍之應漢光武時則武谿蠻反晉成帝時則蘇峻亂宋仁宗時則元昊不庭方今敵人久聚河套兵禍之結已兆于斯萬一制勝無常可憂非細而草澤之間又保必無相煽而起者乎臣觀近時用費日奢科差日重人民日貧頗無固志如荆州瑞州九江等處烏合强徒輕竊名號敵殺官兵况内地人民之苦有加數倍者乎則不但北敵可憂逺壤内地均可憂也漢宣帝本始年間地震詔問經學賢良方正之士無敢端言其所以然宋儒胡氏謂地妻道也著見如此若有敢言使宣帝戒懼有以善處則霍家之禍無由成矣夫宣帝賢君也霍光有輔遺之功有房闥之親小心恭慎賢臣也謂帝而不念光家謂光之家容有禍耶事不可料政亦類此則所謂宫闈内侍柄臣者臣望陛下靜思而善處之未有謹而太過者也他如齋醮之設䙝天黷神不惟無福實足招災南京蘇州織造花様太巧松江大紅布太倉洗白布太細古人謂之服妖費財勞人災或由此至于占役當清宂食當汰工作當止供應當省賞賜當節儉徳當謹逸欲當戒佞幸當逺賢士君子當親皆陛下所宜留情盡已以修人事囘天變者也伏望獨斷宸衷如元氣運行妙于無迹則宗社幸甚疏入帝從之論欺罔疏𢎞治十四年周璽臣竊見近日右副都御史洪鍾題稱新開潮河川工程己完乞要賞賜有功官軍等因奉聖㫖該部看了來説欽此欽遵議者皆謂洪鍾忍心流毒已逃既往之誅無實冒功復望將來之賞輿情未愜公道難容臣待罪言官義不容黙竊照洪鍾先于𢎞治十二年冬奏要于潮河川鑿山改水築立重闗計料程限可用千人之力不過半年之期如半年之外事不能成成功之後差官閲實不為國家經久大利則治臣之罪臣雖萬死亦不敢辭續該兵部題奉欽依已行欽遵修築去後即今工程已過二年未見成效况本官行事乖戾天毒降災壓死無辜人命數多窮竭民力糜費財用言官交章彈劾累次曾經該部奏要停止節奉聖㫖潮河川已有前㫖了不必停止欽此欽遵臣仰窺節次詔㫖無非軫念邊方惟懷永圖􅂷宗社億萬無彊之休也有君如此何忍負之惟洪鍾者一介凡庸叨蒙委任正宜感恩圖報以死勤事上體皇上深謀逺慮之心下副自巳經久大利之計顧乃率意妄為肆行欺罔計其今年四月差錦衣衛千戸牟兵前去踏勘得洪鍾䟎工甚急就使今夏鑿深止可容放小水誠恐日後沙石草木淤塞廵按御史張垣亦奏稱工程尚多相隔等情至今未及一月遽爾奏成乞要賞賜縱有拔山蓋世之雄亦安能倉猝成就如此之速觀其奏稱初意止欲分泄水勢以免衝城及六七月大水猛發難料臨期于新隄之傍分減水勢使二處分流水勢必緩庶無衝城决地之患等情又稱新開河道尚存第一崖岸水盡開鑿除量留工價委付分守兵備等官候夏秋大水過後臨期相度水勢分數再加修築寛廣用石包砌隄堰比之原奏第二第三寨之間山凹川水衝聚散流入闗鑿而通之則皆由此而入無復衝激闗口之患外髙内低約餘二丈鑿為兩涯水行其間則沛然就下無復横流因而疏之以達宻雲而至通州則有水之時十解運船可至其地水小之時小船亦可常行因之水運得免山東河南北直𨽻之民轉輸于崇山峻嶺之間其利不小等語前後所奏轉換支吾自相矛盾又聞所修磚城亦將衝倒若遇大水猛發旋築旋壞終無了期貽害匪輕大利安在自𢎞治十二年二月興工至𢎞治十四年五月已經兩度夏秋曾遇大水此時洪鍾何不相度水勢必待分守兵備等官後來修築即其本心自知前功洪不可成欲免後患既不服罪輸情痛省已咎乃敢文過飾非重為欺罔以無益微勞聳惑聖聴以難成大役退託他官雖稱乞賞官軍其實豫為已地欺罔之罪法所難容况今奏稱雁尾山等處係伊撫屬地失火延燒周圍七十餘里逼近禁山臣恐洪鍾先年壓死人命數多荷蒙寛宥今又燒山烈石致傷和氣故皇天震怒火災逼近驚動陵寢然地道尚靜神體宜安今民怨天怒火逼禁山我祖宗在天之靈豈能安耶是豈可獨歸罪于地方官軍謂非洪鍾燒山烈石之所致歟伏望皇上以天變為畏以人言為恤以祖宗陵寢為念通查洪鍾先年原奏事成之後差官閲實不為國家經久大利治臣之罪原由仍選差科道公正官員前去從實體勘果有大利如洪鍾先年所言具奏陞賞若是茍簡成功僥倖目前圖免後患亦必拏送法司明正典刑以為欺罔之戒以雪蒼生之怨仍乞敕該部計議遣官祭告陵寢以安祖宗在天之靈如此則國法昭明神人胥慶而先年無辜壓死之寃不致含憤幽壞矣疏入帝從之㑹計天下錢糧奏𢎞治十五年韓文臣等竊惟因地制賦乃立國之大經量入為出實理財之要道故禹貢承六府之修而分土作貢成周以九賦歛財賄必九式均節之降是而後若漢唐盛世或度官量吏以賦民税或計丁授田以立租調是皆能推本末之義以適斂㪚之宜者也洪惟太祖高皇帝混一海宇疆理之盛逺過前代貢賦之制取準哲王不可尚已然洪武年間建都金陵當時供給之大南京為重各邊次之自永樂以來定蹕燕都其後供給之大京師為重南京次之而各邊又次之然洪武年間供給南京止于湖廣江西浙江應天寧國太平及蘓松常鎮等處而已供給各邊止于山西陜西及河南山東北直𨽻等處而已今天下司府州除陜西山西雲南貴州廣東廣西福建四川八布政司隆慶保安二州錢糧俱本處存留起運邊方備用内福建廣東止有起運京庫折糧銀兩一項其湖廣江西浙江及蘓松常鎮廬鳳淮揚既供南京又供京師北直𨽻河南山東既供京師又供各邊則是前項五布政司兩直𨽻地方昔之供億者一而今之供億者二昔之常賦甚簡而今之常賦甚繁然不特常賦之繁而已正統以前國家費用減省故百凡輸納皆不出常額之外自景泰至今國家供用日盛科需日増有司應上之求不得已往往于額外加徴派納如河南山東等處之添納邊糧浙江雲廣等處之添買香蠟金兩皆先年所無者由是觀之則知今日國用之急民力之窮誠為可憂也雖然所可憂者不過據已往之用計近日之費耳若計近日以逆將來之費又有可憂者焉何則往者年豐嵗登運河昜達邊方無調發之久州縣無流徙之多有司得以藉先年之積制一嵗之用或徙有以均無或用豐而補歉猶之可也今太倉無數年之積而宂食者加于前内帑缺現年之用而給費者日伺于後征需已極而郡縣旱潦之不時輸送已窮而邊方請給之不已顧後瞻前朝不謀夕萬一他日河流少止漕運遲誤邊郡有警軍餉空虚則京儲求嵗入三百七十萬之數固難猝至邊餉須四百萬兩之銀亦難遽集不幸復加數千里之水旱通行賑貸連十數萬之軍旅皆欲餉給是時欲賦之民而民困已極欲借之官而官帑已虚不知乂將何所取給哉所謂又有可憂者正以此也臣等猥以菲才叨司國計今天下倉庫處處空虚軍民在在疲憊晝夜思維䇿無所施伏望皇上憫天下民物凋敝之餘念國家財賦需用之急須先事以豫圖斯有備而無患如蒙俞允乞敕五府六部都察院通政司大理寺堂上官并科道掌印官公同計議京通糧儲支費日増如何節之使不濫費太倉銀庫虧損日滋如何制之使得充實内庫告乏累取天下銀兩以實之然隨實隨虚何以得常實而緩急之不誤厨料缺用屢借别項銀兩以給之然隨給隨缺何以得減省而民困之少甦各邊軍儲如何調度使小民免征輸之苦各運司鹽課如何撙節使邊警得倉猝之用祿米莊田如何處置可以應無已之求馬房草料如何經畫可以省無窮之費速香黄蠟以何年為中制可行而不濫取布疋收受以何例為凖則可守而不害民河南山西存留糧之短少何以補助湖廣等處存留糧之足否何以查處以至天下災傷蠲免税糧又何以處分使有恤民之實通行議處停當開立條件奏請定奪施行如此庶于聖政有補而天下蒼生咸被其澤矣伏望皇上憫天下民窮財盡之極體祖宗節用愛人之心少留睿覽斷自宸衷俯賜施行臣工胥慶此外凡供應興造之浩繁量為減省近臣貴戚之賞賚少加撙節如此庶幾存一分國有一分之益寛一分民受一分之賜而于邦計亦大有所賴矣臣等不勝悃懇之至奏入得㫖卿等所議事宜深切時弊重京儲另㫖發落省供應均禁例已有㫖行了清鹽法等再奏來説其餘都准議行請皇太子御經帖疏𢎞治十五年馬文升臣謹奏恭惟皇太子殿下年漸長成天資英偉内外宫臣朝夕輔導講讀學有進益此誠宗社無疆之休後世臣民之福也但臣等叨任大臣臣文升臣珪俱任東宫保傅自𢎞治十一年三月初六日皇太子初出讀書于文華殿獲覩睿顔之後至今五載止是正旦冬至及每月朔望日于文華殿門外朝參相去頗逺仰惟皇上嗣登大寶日決萬幾猶每月三御經筵令翰林儒臣講讀經書以隆聖學而追古帝王今皇太子當進學之時雖日出讀書止在左春坊與二三内閣大臣及東宫並翰林院講讀等官相接且去處頗狹未甚從容攷之古者帝王之教太子左右前後罔非正人出入起居罔有不欽此所以教諭而徳成也臣等愚見以為欲請皇太子照皇上御經筵故事每月三次初六十六二十六出御文華殿令臣等六部都察院大理寺通政司鴻臚寺掌印正官並二品以上官同内閣大臣東宫講讀等官侍班講書其侍衛將軍等項比皇上御經筵之日減半庶臣等得覩皇太子之睿顔而皇太子亦識臣等之愚貌收斂身心嚴威淵穆相接日久自然度量益宏識見益廣日就月將以至于緝熙光明之地睿徳益盛而帝王之域有不難造矣臣等惓惓犬馬愚誠如此伏乞聖明留意裁處宗社幸甚臣等幸甚疏入帝不納巡撫事宜疏𢎞治十五年馬文升臣等查得先該戸部奏准各處巡撫官員每年八月以裏一次赴京議事續准兵部咨為公務事照得各處巡撫官員每年在邊者于四月内腹裏者于八月内到京議事縁近日各處地方中間賊情未甚寧息者若令一概赴京誠恐缺人誤事合無行移各處巡撫官員其斟酌各該地方如果平安别無緊要事情妨占照例議事若是地方賊情尚未寧息軍民未得安輯有事難以摘離宜將應議事件明白條陳徑自奏請定奪等因具題奉聖㫖是各處正要用人且都不必來欽此備咨前來臣猥以菲材謬膺重寄夙夜憂愓思圖報稱惟欲軍民安妥地方寧靜其一應合行有益軍民事務除遵依欽奉敕諭内便宜處置事理陸續施行及㑹同欽差鎮守陜西太監等官計議停當節次具奏外今將合議事件開列具本謹題請㫖一重守令以廣徳澤竊惟致治莫先安民安民在擇守令葢守令者親民之官得其人則庶民皆安養而天下無不治矣皇上愛民之心無異于舜禹宰相贊理之勤有同于伊周然而治不古若而小民不蒙郅治之澤者葢以守令不得其人而已矣守令之不得其人者由作之無其法而已矣竊見今之守令由進士舉人出身者往往多得其人由監生除授者鮮有能稱其職揆其所自其監生坐監並在吏部聽選二十餘年方得出身比至除授之時年已五十以上鬚髪皓然神志昏倦其意以為在任不久又將黜退陞用之例諒不我及所以惟務貪贓之計罔有治民之心雖有吏部攷察黜退之例及臣與巡按御史按察司拏問之嚴然今日之黜退者為因老耄貪婪後來之除授者又有老耄闒茸之甚于前所退者葢以國子監所養人材不過如此若止仍舊攷察數數黜退而不知所以更張遴選之則小民送舊迎新徒為勞費夫用賢所以育民而賢才之盛未有過于進士也以進士而除授今人皆以為幸登黄甲輒除外任有辜父母之望而灰士子之心殊不知設科所以求賢求賢所以為民以年幼進士而任守令民情世故無不練達他日或居藩臬或補内任輔世長民綽有餘裕是亦作養人材之一端也陜西地方比之各處大有不同其同知判官縣丞主簿近年部運各處邊方夏秋税糧相繼往來并不在任止有知州知縣獨員處事若非得人事何克濟伏望皇上敕吏部今後各處知州知縣有缺照依己故大學士李賢奏准事例每選將在部聽選舉人不分到部年月日逺近及監生中年未老耄資質英俊者通行攷選學問老成文移頗通堪任正官者並將各部觀政進士照依甲數挨次取用除京任外其餘相兼舉人監生除授知州知縣其進士到任之後果有㢘名政績昭著者不分三年六年仍令挨次擢用知州量陞郎中知縣量陞主事御史評事或令巡按御史並布按二司官于所屬官員内㢘名素著才能出衆堪任知州知縣者各舉所知三五員各另徑自具奏吏部定奪授職在任若有貪酷事發連坐舉主之罪以後知州知縣有缺俱照此例除選如此庶使守令皆得其人而太平之治可期矣一添風憲以撫流民臣聞防禍于未然者易除患于已然者難葢禍患未萌以治術防之而有餘禍患已成雖兵戈除之而不足此古人所以圖難于其易而消患于未然也竊照漢中府地方廣闊延袤千里人民數少出差甚多其河南山西山東四川並陜西所屬八府人民或因逃避糧差或因畏當軍匠及因本處地方荒旱俱各逃往漢中府地方金州等處居住彼處地土可耕柴草甚便既不納糧又不當差所以人樂居此不肯還鄉目今各處流民在彼不下十萬以上去嵗因滿四等反叛臣恐乗機嘯聚為患地方已令按察司僉事孫逢吉前去彼處查勘現數造冊收照行仰各該官司撫恤禁治聽其自在生理候豐年省令囘還此等之徒若逼趕𦂳急又恐激變為患若聽令在彼居住難保久逺無虞況漢中山勢之險尤甚于竹房流民之多不減于襄鄧雖嘗委官巡視終是責任未專必須添官以專其任庶使地方可保無虞查得河南為因南陽之間流民甚多添除參議僉事各一員奉敕專一撫治近于荆襄南陽之間又蒙欽命都御史一員以總其事是皆思患豫防防微杜漸之意也如蒙乞照河南事例或添除或就于按察司僉事内專委一員請給敕書前去漢中府就帶家小專一在彼往來巡視撫治前項流民其一道分巡事務亦令本官管理及㑹同守備漢中府都指揮張順操練軍馬守䕶城池禁革奸弊防察不虞務要處置有方不許偏執誤事如此庶使責任專一而地方可保無虞矣一増課鈔以瞻軍用竊惟理財之方有經常之道有權時之宜經常之道可行于無事之日權時之宜則施于財匱之秋也若拘經常之道而不知權時之宜則軍國之用有不足而瞻軍之需有不充矣照得陜西所屬衛所官軍除沿邊外其腹裏軍人月糧該支一石者止闗本色六斗其餘四斗折支鈔貫其軍職不分沿邊腹裏四六闗支本色六分折鈔四分及查得官軍折俸折糧并各王府及將軍儀賔并司府州縣官員折俸通共一年該用鈔一千七十六萬五千四百六貫今所屬每年止收額設戸口食鹽課程鈔共九百五十八萬七千四百九十四貫所收不及所用一年共欠少一百一十七萬七千九百一十二貫而災傷減免者不在其數且陜西官軍披堅執鋭臥雪眠霜比之各處官軍勞逸不同其妻子在衛全資月糧俸米養贍為因糧餉不足減半折支鈔貫今所折鈔貫亦因不敷有一二年不得闗支者四五年不得闗支者縱得闗支一年鈔貫亦不得易買數月之糧又兼要買補馬匹置備軍裝或典賣妻子或揭借財物艱難困苦相繼逃亡月糧折支鈔貫人情已有不堪鈔又不得闗支尤非事體若不行權時之宜另行設法整理誠恐年復一年困苦嗟怨益為罷弊將何以蓄養鋭氣而使折衝禦侮也臣看得西安府在城四門一日之間各處販賣柴薪等項牛騾車不下五百餘輛及看得陜西河南客啇販賣馬騾一年之間亦不止數萬餘匹俱從潼闗經過前項車輛馬騾亦令投税若將馬騾車輛量加納税鈔是亦權時増廣鈔貫之一端也如蒙乞敕戸部計議轉行陜西布政司將西安府在城四門所進柴薪等項車輛照依在京事例每大車一輛納鈔四貫小車一輛納鈔二貫其馬騾委西安府首領官員于潼闗收報每馬一匹納鈔十貫每騾一頭納鈔五貫每季將二項所收鈔貫俱送布政司官庫收貯以備官軍折色俸糧支用候年終將通收過鈔貫數目布政司造冊奏繳戸部查照其收鈔去處按察司分巡官不時巡視敢有作弊者就便拏問如律如此庶使課鈔頗増而官軍俸糧折色不致匱乏矣一撫軍士以蓄鋭氣竊惟克敵制勝莫先于軍士之効勞養鋭蓄威必在乎衣食之充足葢軍士在邊必衣食充足而復可以蓄養其鋭也照得陜西腹裏衛所軍士俱在三邊採備有一年一次囘衛休息者有十八個月囘衛休息者又有一家正軍餘丁二三名在邊操備者其在衛餘丁又要種納屯糧子粒守城等項差使且以在邊軍士言之既有官給騎操馬匹赴邊之日彼處總兵副叅等官每軍一名又要腳力或馬或騾一匹頭其軍士既無營生又無産業止靠月糧六斗養贍置備軍裝整理盤纒亦皆仰給于此懼怕到邊責打只得原籍戸下津貼財物置買前去比至則邊方該管官旗或指以買置旗號纓頭為名或假以修理城垣門樓為由節次科斂逼廹無柰乂將原買腳力馬騾變賣出辦未及一年使用盡絶或又有倒死官馬隨要買賠逼迫𦂳急只得揭借或本管指揮千百戸彼處副參等官馬匹錢物馬一匹還銀二三百兩者有之銀一兩還本利三四兩者有之比至囘衛各官家人隨即前來索取在衛官員懼其勢要只得監追或典賣妻子或揭借月糧歸還前去賠馬一匹已至破家蕩産倘再倒死將何所買賠因此而逃亡者十常八九所以各邊軍士日見缺少且以官馬倒死責令賠補固為良法其馬之倒死若不論其急病瘦損倒死之分一概令軍士賠補誠恐年復一年艱難益甚又不止于逃亡之患而恐有意外之虞矣罷弊軍士莫甚于斯況在邊軍士多有衣不遮體食不充口瘦損尫羸形容枯槁總兵等官略不介意臣在石城目所親覩如此而欲望其用命効勞克敵制勝葢亦難矣所以一遇兵戎犯邊多有不能支持必須奏討京軍若不肯著實優恤蓄養鋭氣誠恐因循年久益加困弊敵人窺伺我軍虚實擁衆犯邊重有以貽國家之大患也臣每念及此深為寒心如蒙乞敕兵部計議行移各邊太監總兵都御史等官今後將所屬官軍領騎操馬匹置立印信文簿每月三次㸃視臕息肥壯者列為一等臕息瘦者列為一等若三次㸃視俱瘦以後馬匹倒死者著令買補以戒軍士不肯用心餵養之弊其三次臕息肥壯遇有𦂳急病證倒死者免其追賠以蘓軍士艱難之苦如果例該買補本軍在邊艱難者行移原衛著落戸下餘丁買補完備本都司差人解送前去若是各軍將及下班倒死馬匹者就仰囘衛從容置買上班之日騎坐赴邊及遇有纓頭旗號損壞須該置備者令總兵廵撫等官設法措置買辦應用如果無處措置行移陜西都布二司派屬買辦解去並不許分毫科擾于軍及非奉奏准事例亦不許擅自投使酷害其各軍士上班腳力隨其貧富或騾或驢或二人共買驢者各聽從其便總兵等官俱不許追究逼迫及不許仍前放債于所管軍士令家人前去各衛取討逼軍逃竄果有前項奸弊許巡按御史指實具奏區處仍用心優恤軍士作興鋭氣務令得所不致逃亡如此庶使軍士感激而可以成克敵制勝之功矣一清軍丁以杜勾擾竊惟發冊清取軍人不許差官擅勾所以絶勾擾之弊而立長久之法也然法立既久不能無弊若不隨時斟酌嚴為禁治則前法愈壞奸弊愈生而民有不勝其害矣矣近該陜西布政司清軍委官左叅政于璠呈查得節據西安府耀州等州蒲城等鄉軍丁惠林等各告稱各有戸丁應當瀘州利州清州等衛所軍没有告稱在營現有正軍身力精壯又有餘丁三四丁者七八丁者十四五丁者甚至二三十丁者俱各種田買賣家道富實因怪原籍戸丁不來供給往往買囑衛所官旗揑稱老疾逃故等項遞年發冊勾擾及至解衛為因軍伍不缺將解去戸丁為奴驅使者有之耕種田地者有之甚至將盤纒衣服等項盡數拘收入已放囘者亦有之又有告稱正軍囘還取討盤纒不一二年軍妻又囘取討軍妻囘衛不五七月餘丁又來取討者原籍人丁為因辦納糧差家道貧窘無從措辦只得將田地房屋典賣者有之將男女頭畜貨鬻者有之及至打發起程稍不如意輙便囘衛發冊勾取又有告稱正軍餘丁人丁囘還出賣自已房屋田地因與房族親戚及鄰里人等爭競讎恨在心囘衛妄取别房人丁者有之妄取同名同姓者亦有之此等情節往往赴官訴告分豁所司因見兵部發冊清勾難于主張只得依文解去查理原籍抛下田地無人耕種遺下糧差無人辦納又累里甲僉㸃大戸管解及到衛所投文官吏又要拜見錢物旗甲索取饋送土宜彼既有丁只得放囘往囘數千餘里動經半年之上破家蕩産甚可哀憐查得欽降軍政條例内開正軍在營已有壯丁就收補伍不許原籍勾取有司體勘是實囘報原衛將在營已有壯丁就收入軍衛不許違例勾擾降依奉外今各該官吏故違前例往往聽受在營軍丁賄囑輒與發冊清勾非惟紊煩官府抑且擾害人民照得陜西布政司每嵗該清軍士不下數十萬餘各該衛所發冊之弊固有而利州瀘州二衛青川一所發冊之弊尤多呈乞通行四川前項衛所禁約等因到院竊詳衛所缺軍發冊清取戸丁理固當然軍伍不缺行文勾擾原籍民實受害且陜西人民遞年供給各邊糧草兼以累嵗旱荒薄收財力皆困凋弊已極今前項衛所軍人不思原籍人丁艱苦因怪不與供送盤纒輒便揑故清取連年擾害不得安生誠為可恨除前項清勾軍人行令參政于璠暫解戸丁前去查理及行四川按察使禁約外誠恐各處衛所亦有此弊如蒙乞敕兵部行移天下衛所各將現在并逃亡等項軍人備查的確鄉貫充軍來厯現在者要開應役正軍并在營餘丁姓名口數每一布政司並直𨽻各府各另類造文冊一本差人齎送本部照清冊事例轉發各該布政司並南京直𨽻府分收照以後各處衛所發冊清勾軍人到彼先行比對原降文冊如在衛原造有空閒餘丁數人又清取戸丁顯是挾讎作弊所清戸丁免其查解仍行彼處清軍按察司官員再行本衛查理如果在衛有丁就將作弊之人并該管旗吏先行提問如律干礙本官奏請提問不許管軍管事著令帶俸差操若是在衛原先止有一丁今開逃故者亦要開寫某年月日逃故許解戸丁前去補役仍通行各處巡撫巡按並清軍官員嚴加禁約所屬衛所不許接受財物聽從本衛當軍之人因怪原籍不與供送盤纒揑作逃故一概發冊清勾擾害果有逃故例該清勾者衛所官員務要取勘明白方許造冊送部清勾如此庶使在衛軍人無讎揑之弊而原籍戸丁免勾擾之害矣一存逺軍以實兵備竊惟陜西闗中重地北連河套西抵番夷南通漢中東接襄鄧安危所繫誠為不輕比之他方尤當軫念況敵人犯邊必先于此方今急務惟在兵部兵若不足以戰則不能勝以守則不能固今陜西腹裏衛所軍士以十分為率逃亡等項已有三分以上除各邊操備及屯田外現在守城正軍每衛或二百名或一百名甚至止有五六十名又皆老弱尫羸不堪守戰若非宣徳正統年間將本處充發逺方不服水土逺年清勾軍人編發附近衛所收操及將鞏固臨洮延安慶陽人民選作土軍則陜西軍士誠為之缺少而各邊操備者益為之不敷矣近年缺少各邊操備逃故及死損軍士為因腹裏軍少無從撥補文移往來終無禆益查得陜西西安等府所屬縣分人民先年為事充軍多有發編四川貴州雲南廣東廣西福建等處衛所者為因水土不服多為煙瘴所侵隨到隨死不可勝計及至各衛所移文清取過二年或三年方得起到解彼又為前項之故復多死亡仍行原籍清勾其戸丁與解人懼瘴煙死亡之患兩懷戀土之心彼此通因或逃走外郡潛入番夷一二十年不得到衛原籍人丁懼怕清解全家逃亡者有之其南方之人發充陜西當軍逃故等項發冊清勾者亦多畏懼此間地方苦寒不肯前來著役間有解到又多氣體瘦弱不甚操調到衛未久隨即在逃雖有清勾之名全無解補之實軍伍空缺兩無所益如蒙乞敕兵部計議將陜西人民先發四川雲貴廣東廣西福建地方充軍者除四川貴州現今有例仍令解補應當外其雲南兩廣福建年久逃故原衛無丁戸丁屢到屢死屢解屢逃者行仰陜西布按二司清軍官員將前項衛所逺年清勾當解户丁如果屢次解發到彼死亡者仍照比先不服水土事例收發陜西三邊缺軍衛所補伍操備若雲南兩廣福建有充陜西衛所軍役逺年逃故清勾不到者即令收發本處鄰近衛所當軍仍行兩處清軍官員責令各該衛所將名伍彼此開除操備之後但有在逃者仍發原衛當軍如此庶使軍士各服水土而無死亡之患衛所不致缺軍而有操守之實矣一禁通番以絶邊患竊惟欲絶邊方之患當禁啓患之源葢邊患不能以自生必因人以啓召之也照得陜西洮岷河州西寧等處衛所沿邊番夷即古之吐番其性譎詐叛服不常厯代以來屢為邊患洪惟我太祖高皇帝平定天下撫治四夷示之以威懷之以徳彼皆順服嵗時進貢其所用食茶鐵鍋銅器羅叚等物奏奉明文方纔給與及許令各該番人四時前來各邊交易買賣委官管領當時法度嚴明軍民遵守不敢私自通番以取其利其各族番人亦盡知我邊情虚實一向畏服不敢為惡其後有等各邊無知軍民及軍職子弟甚至守備官員往往亦令家人將鐵鍋食茶叚疋銅器等貨買求把守闗隘之人公然私出外境進入番族易換彼處所産馬匹等物以致番人將所得鐵鍋叚疋置造軍器及戰襖等項遂萌侵犯之心或因爭論價值將通番漢人殺死同去之人因是違法不敢告官番人畏懼漢人報讎亦不敢前来交易曰肆搶刦漸成讎隙及各寨堡把守官軍因見鄰近有等本分不曽為惡吐番卻又妄稱本族搶劫等情恐嚇賠償財物因而激變隨同各族為惡引惹邊患皆由于此甚至有等近邊土人居民因與番人結親或通吐番冒名進貢貪圖賞賜往來情熟專為緝探邊方一應事情動輒傳與所以各邊番人益加生抝不聽撫化節次為惡搶殺人畜物件若不嚴加禁約誠恐各邊官軍互相倣傚一概通番積習年久重貽邊患未便如蒙乞敕都察院查照洪武永樂年間福建廣東下海通番事例出給榜文發仰洮岷河州西寧但係鄰近番人去處張掛曉諭今後但有置買鐵鍋銅器羅叚私茶等貨潛出外境進入番族貨賣及各寨軍人將良善不曽為惡族詐稱搶劫恐嚇財物並與番人結親傳報腹裏事情者事發勘問明白本身處死全家軍發極邊衛分民發腹裏衛分充軍若軍職及守備官員縱容弟姪兒男通番買賣者指揮千百戸鎮撫亦發邊衛充軍守備官員奏請定奪如此庶使法度嚴明人知驚懼而邊患為少息矣疏入帝不納御選明臣奏議巻十
