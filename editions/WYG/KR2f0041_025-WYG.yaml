body:
  text: 郊禮議嘉靖九年夏言臣於前月伏承聖制問及南北郊大祀幷朝日夕月之禮臣即時欲述所聞以對乃以臣前上疏已畧開陳奉有諭㫖今方廣詢廷臣以求公是臣固可以無言日夕覬望公卿大夫必有稽古識治之學必能悉心殫慮敷陳先王之典以仰稱休命者不意旬月以來側聞議論紛糅人懐異見殊為可訝及昨覩詹事霍韜之奏深非分祀之議臣攷先王之遺訓稽國朝之典章殊未見不可然後知韜之言過矣臣兹不容於不言也請先以郊祀之禮為對而後辨韜之失言臣竊聞周禮一書言祭祀甚詳大宗伯掌禮者也而首及於天神人鬼地祗之三禮以祀天神則有禋祀實柴槱燎之禮以祀地祗則有血祭埋沈疈辜之禮以享人鬼則有獻祼饋食祠禴烝嘗之禮大司樂冬日至地上圜丘之制則曰禮天神夏日至澤中方丘之制則曰禮地祗圜丘禮天方丘禮地則天地分祀從來久矣宋儒引昊天有成命為郊祀天地之詩則曰郊祀無天地之分劉安石以豐年潛有多魚二詩證之以為郊祀天地皆歌此詩何嘗言其合祭朱子則斷以此詩多道成王之徳疑祀成王之詩以今觀之葢終篇無一語涉天地朱子之言的然可據而小序不足凖也况周禮掌次王大旅上帝則設氈案設皇邸司裘為大裘以供王祀天之服皆言天而不及地宗伯六器則以蒼璧禮天黄琮禮地是天地之祀玉有别也典瑞則以四圭祀天兩圭祀地是天地之祀玉不同也祀天於冬至以陽氣來復於上天之始祭地於夏至以隂氣潛萌於下地之始時不同也用圜鍾於震之宫取其乾出乎震之義用函鍾於未之地取其坤居於未之義其樂不同也小宗伯言五帝且兆於四郊而不言與昊天上帝同祀郊况可與后土地祗合祭乎則天地不合祀從來亦久矣是故宋儒葉時之言曰郊丘分合之説當以周禮為定今之議者以社為祭地而不知天子之社有三曰大社曰王社曰亳社大社為百姓而立王社為藉田而立亳社則遷國之社也而祭地不與焉朱子釋中庸曰社祭地不言后土者省文耳葢祭地之名亦曰社也祭地之社總天地言之與天對者也大社乃自王畿千里之地言故諸侯國社以至庻民鄉社皆祀其所主之土也故社字從示從土義有在矣且議者既以大社為祭地矣則南郊自不當祭皇地祗何又以分祭為不可乎議者又疑古無北郊然郊特牲曰兆於南郊就陽位也則南郊固見於經矣祭天而兆於南郊以就陽位則祭地而兆於北郊以就隂位曷見其不可也程子曰北郊不可廢况陳氏禮書直曰祭地於北郊方丘者北郊之丘也丘方而下所以象地則古人固嘗行之矣議者又謂莫大於天地實天中之一物耳不必别祭則以天為尊以地為卑不得與天抗似也然天地合祀則同尊並大是崇地抗天矣與天為敵矣乃不以為非何也程子曰郊天地與共祭父母不同此是報本之祭須各以類祭豈得同時又曰冬至祭天夏至祭地此何待卜朱子曰古時天地定是不合祭日月山川百神亦無合共一時祭享之禮又曰天下有二件極大底事其一是天地不當合祭於南郊夫程朱三代而下大名儒然則其言皆不足據乎秦去古未逺則祀天不於圜丘而於山下祭地不於方丘而於澤中漢之制祀天於甘泉祀地於汾隂則秦漢天地之祭猶分也至元始之制則天地同牢於南郊此則莽賊隂媚元后之計欲以妣並祖故不得不以地並天也合祭之説實自王莽始矣自漢而唐而宋皆合祭而地之特祭少矣漢之前皆主分祭而漢之後亦間有之如魏文帝之泰和周武帝之建康隋髙祖之開皇唐睿宗之先天皆分祭也開元制禮則専主合祭矣元豐一議元祐再議紹聖三議皆主合祭而卒不可移者以宋人有郊賚之費故二年一郊至傾府藏之財而不足以從事所以必於合者從省約也安簡便也亦未嘗以分祭為非禮也蘇軾言祖宗㡬年合祭一旦分之恐致禍朱子謂其説甚無道理然兩郊之説在宋似為難行與今日之事異矣本朝邱濬之言以類於上帝類字强訓為合此葢臆説又以元始禮天地同牢不為凟不可以莽廢又謂夏至祭地則地先天食其辭多歸美本朝之制葢從周之意而不知其言之悖於義也今之議者大率主濬之言而徃徃以太祖之制為嫌為懼然知合祭乃太祖之制為不可改而不知分祭固太祖之初制為可復也知大祀文乃太祖之明訓為不可背而不知存心録固太祖之著典為可遵也且皆太祖之制也從其禮之是者而已矣矧敬天法祖無二道也陛下今日之舉欲復古禮以大報天也欲遵祖初制以求盡善也欲逺跡三代之隆而一正千古之謬也將以建一代中興之業而陋漢唐宋於下風也所謂功光祖宗業垂後裔之事未有大於此者也是故文武之制未備周公作禮樂以成之未聞周公變文武之舊也况禮樂必積徳百年而後興聖祖之心豈無所望於後世之聖子神孫者乎此正今日之事也韜之奏曰紊亂朝政曰變亂成法必有任其責既而曰諫官創議葢指臣也韜之此言私心害之也夫律有姦黨之條内開若在朝官員交結朋黨紊亂朝政者皆斬此指國家一應法度政令干係紀綱名分而姦臣交結朋黨紛更壊亂交通扶同為姦作弊以欺君罔上虐民害政者言也今日所議者郊祀之禮耳乃古前哲王令典我太祖髙皇帝之所已行載在典章律亦有毁大祀丘壇之文觧律者曰丘壇祭天圜丘祭地方邱壇其所登祭之處此法家之所知也惜乎韜之未達乎此也至於毁周禮一書尤為妄議臣不敢一一指摘當於其大者辯之韜曰宋儒胡宏有言周禮非周公之書王莽劉歆為之也韜名為讀書知禮者且備位儒臣矣何其不攷之甚也胡宏之言非宏言也承舛踵訛之説也夫周禮之出自劉徳始累周禮者亦自劉徳始周禮之立自劉歆始誣周禮者亦自劉歆始周禮之𫝊自鄭康成始壊周禮者亦自鄭康成始先儒嘗謂累周禮者其罪小誣周禮者其罪大誣周禮者其法在壊周禮者其法亡然禮經之學所賴相𫝊至今不墜者實諸儒講明之功也今韜不以諸儒講明者之言為陛下獻乃獨取胡宏憑私臆决之一言以厚誣周禮不惟取辯一時以誤陛下而又誤天下後世使信周禮為王莽偽撰不得表章而遵行之其闗繫名教非細故矣臣竊為韜懼也臣何敢隐而不盡言與之辯乎至力詆天官冢宰篇為莽誑天下之術則又大可異矣夫天官冢宰一篇朱子以為周公輔𨗳成王垂法後世用意最深切處欲知人主正心誠意之學於此攷之可見其實又謂冢宰一官兼領王之膳服嬪御此最是設官者之深意葢天下之事無重於此後世雖不能行豈可盡廢聖人之良法美意而誣以莽之偽為耶且莽之前固嘗有周禮矣今則以為周制之土苴而莽集其大成韜又曰合祭以后配地自莽始夫莽既偽為是書矣何不削去圜丘方丘之制天神地祗之祭而自為一説耶其説不得而通之也是故疑周禮者漢武帝何休謝氏黄氏之徒也彼程子朱子東萊横渠則固無疑矣周周禮誤天下者王莽劉歆蘓綽王安石也彼周公召公畢榮毛散諸公則未嘗誤也韜謂皇上好古之篤如此志復三代如此千萬世一人而已矣未見儒臣以三代純王之學上輔聖主此言誠是也然既以皇上好古志復三代則分祭天地固古禮也三代之典也何以言其非禮而必欲使襲王莽凟亂之舊耶夫致主之學周公之道純矣今乃欲盡廢周禮使不得行於世則祖宗之設官分職大小政體其倣於周禮者多矣然則必一舉而變亂之耶抑不知此外又别有何道乃為純王之學可以輔聖主耶是故韜之言臣不敢以為是也獨怪夫韜之言出而和者遂紛紛也况近年禮部行移令立小學習讀周禮又令科場必以周禮䇿士是皆奉陛下明㫖施行者也乃不聞韜奏正之及韜修大明㑹典嘗具奏欲將内府各監局職掌屬之禮部亦復援引周禮天官冢宰之文是韜平日未嘗非周禮也何得因議郊祀而一旦遂欲盡棄其學耶殆不可曉也議禮之家名為聚訟常情所向自古己然惟是天地大祭國家重務况於千八百年之下興起三代而上之盛典所當尤加慎重必使損益合宜足以垂範宇宙不致少有遺恨以貽後議則天下之太幸也伏望皇上恢宏天度開張宸聰矜愚盡下曲示優容小大臣工必能克去己私仰體聖明深求古義以奉明詔所據圜丘方丘朝日夕月諸神壇壝規制自有我太祖刋定之典備載存心録一書不須創設無所變更一凖乎舊而已但大祀殿以之祀天則不應經義以之饗帝則脗合周禮然祖宗並配父子同列稽之經㫖未能無疑矣周人郊祀后稷以配天臣以為太祖聖神文武欽明啓運俊徳成功統天大孝髙皇帝足以當之宗祀文王於明堂以配上帝臣以為太祖體天行道髙明廣運聖武神功純仁至孝文皇帝足以當之區區之愚有見於此不敢不以為獻乞再下臣章敇禮部一併㑹議所貴廷臣恊心同徳深攷博求務合經訓破除臆説不狃於茍且之情不遷於衆多之口忠誠精白以仰承皇上中興大有為之志以光復太祖之始制使天下後世知郊祀天地獲全古禮一洗千古之陋自陛下始顧不休哉疏入得㫖這所奏皆發明古典朕已具悉禮部便上緊將各官所奏並此本詳看開具務要據古斟酌㑹官議擬明白奏請定奪勿得稽遲避忌請弭災變以安黎庻奏嘉靖九年楊爵臣於嘉靖九年十月内承制往湖廣公幹即今事完囬還臣知陛下哀憫斯民之心懸於閭閻之下凡四民利病民間休戚必欲聞之故今謹述所過地方災傷生民可痛之狀為陛下言之南北直𨽻河南山西陜西等處地方當禾苖成熟之日蝗蝻盛生彌空蔽日積於地者至三四寸厚將禾根食之皆盡居民往往率婦子將蝗蚋所食禾苖痛哭收割以為草芻之用其他蝗蝻稍少之地禾苖食有未盡者頗有秋成之望矣未及成熟嚴霜大降一時盡皆枯槁遭此災變民失依倚去年冬月民所資以為食者皆其先時所捕曬之蝗蝻與木葉木皮等物當此之時民之形色顛悴雖甚可哀而死於道路者尚未多見比及今春臣復經此地毎見餓死尸骸積於道路者不可勝數又見行者徃徃割死者之肉即道傍烹食之又聞有父子相食者井陘縣一日而縣官獲殺人食者三人臣聞之拊膺大痛食不下咽自謂有司必能具奏聖明在上聞有是事必至流涕比臣到京聞廟堂之上救民之死非其所急而所議者郊社之禮耳微臣憂國愛君之心切於中而不能不有所言也昔者漢文帝之時家給人足海内富庻賈誼上書猶曰可為痛哭謂抱火厝之積薪之下而寢其上不可謂安况於今日時勢當何如耶古賢王之治天下也生養遂而後教化行教化行而後禮樂興方今災傷之地生民死十有六七存者起而為盗賊雖稍有積蓄之家亦難保於自食其勢渙散不可收拾朝廷之上舎此不之憂而議合祀分祀之禮是所謂不能三年之䘮而緦小功之察放飯流歠而問無齒决也夫民惟邦本本固邦寜民心離散邦本不固土崩之勢可以立待縱使周公所制禮文盡行於今日亦何補於天下之亂乎深念及此可謂寒心不知陛下宵旰之際亦嘗慮及於此乎左右謀國之臣亦嘗言及於此乎且南北分祀以復先王之禮非不可也但今日救民死亡之日而非興禮樂之時也自古國家衰亂未有不由民窮盗起而為上者不知憂恤遂至人心離叛而天命亦去宗社不可復保矣故臣之所憂者不在府庫之財不能徧濟天下而但恐陛下無憂勤斯民之心也夫憂民即所以憂國治民即所以治國也陛下日事經筵隆寒甚暑未嘗少怠臣知陛下鋭志太平而欲為堯舜之君矣葢堯舜之心急於救民一民饑曰我饑之也一民寒曰我寒之也假使當時饑死之民滿於溝壑有如今日堯舜之心當何如哉臣願陛下上畏天心之儆戒下憫斯民之死亡不遑他務専廣仁恩移此議禮之心區畫賑濟之䇿以長沃民生則皇恩浩蕩孰不頌明明天子深仁廣被在在戴生我父母向之枵腹待哺者今有飽食之慶矣向之妻子離散者今有室家之樂矣民心已渙而復收邦本雖摇而轉固縱值天時之災鮮不以人力勝之也海宇蒼生享太平之福聖子神孫纘萬年之緒者端在此矣臣不勝戰慄儆愓恐懼之至奏入帝從之修舉武備疏嘉靖十一年徐問臣生長南服發跡儒生蒙皇上擢臣兵曹之佐雖才不足以充任而志不敢以曠官謹條八事上塵聖覧一練畿兵以重聲勢順天府霸州文安縣等處古為幽冀人習悍强且宻居畿内實為周官六郷六遂漢六郡良家之地也曩聞有招軍之令急而行之亦一䇿也然召民為軍已失國家定籍倉猝應募類非土著居人既無父兄産業以藉稽查未免徒耗衣裝冐叨糧賞遇利則先趨見害則退避緩急將何所恃乎臣愚以為平居無事宜申飭撫按督同兵備分管府官悉心查訪舊團有年壯膂力過人并家有二丁以上者開報到官再加精選毎選五十名推身家衆服者一人為郷長俾其各相聨屬自為教練如上司初至之日召令而試藝勇量給犒勞即放歸農生業若有緩急必待兵部題本方纔起調冑鎧器械該部各豫儲給庻使各邊之人知内外皆兵潛消窺伺矣一練外兵以為羽翼山東徳州武定山西陜西潼闗等衛設為直𨽻葢欲犬牙相制以禦外侮拱衞京師而京師擁列諸衞居重以馭輕强幹以弱末立法之初未嘗不善但承平日久人心玩狎京軍以多役少練而坐致罷弱直𨽻以形分勢逺而久不簡稽重以世胄誅求尺籍雖存而逃流過半矣正徳初年邊事告急議以参政韓福為大理少卿操練畿輔民兵又分行巡按官閲實直𨽻衞所武備葢亦不忘内豫潛消外憂但當時補偏救急未有著實振舉而施行之者況燕趙涿易古稱悍强若欲安不忘危有備無患當如徃年故事推舉内外文職官内有文武長才諳曉韜畧實心亷慎者加以僉都少卿之任以提督直𨽻民兵著實清查挑選遇有緩急行移提督衙門調用可一呼而集兵威振揚在在有備古所謂不戰而屈人之兵也一防制邊人以需調用直𨽻保定等衞有來自邊外之人其驍勇悍强狀貌氣習與漢人不同未敢保其不異但以安插既久勢難變更惟在所司設立紀綱嚴飭武備以攝其攜貳反側之心合行巡撫督令兵備一體鈐束毎霜降開操之日間或一試以觀武藝而犒勞之又須加意推誠諭信恤其所私使知有中國生涯之樂妻子室廬之繫必得其心而盡其力庶可無他釁也一區畫屯丁以防敵患邇者城堡不完人無固志有舎業者多就鎮城以居所遺在堡類皆游徒單弱無所賴藉城堡既破必將深入逼近邊城而士女震矣為今之計再行查勘種地居人若干籍其姓名嚴禁該管官不得别項科差索取仍於堡内官為起葢房屋安插居住不許任意星散令其無事則聚衆耕牧敵至則登陴拒戰入則俱入守則俱守不許参差延緩致生他虞官軍既以此輩以為應援則氣勢自増防守自固敵不得乗虚而突入矣一經畧邊闗以防黠敵看得居庸紫荆等處皆隣邊阨塞之地地方廣闊或限於巡閲之未周文移雖頻或苦於奉行之弗恪又各衞守邊官軍闇於利害徑自潛回將來尤可深憂若使各邊巡按督令兵備等官嚴加閱視邊闗城墻如有頹塌即加増繕修補務須堅實使邊軍可恃為守以衞中華其各處守邊官軍兵備官躬親查閲若有逃囬等項参究治罪而守衞必嚴矣一鞭䇿武臣以冀自効查得現行條例軍職有犯罪者俱發邊方立功五年滿日還職夫操持宜責備乎文臣而磨勵宜激昂乎武職使其闒茸庸才棄之可也或平時武勇偶阻於時勢之未乘氣禀粗豪或至於跅弛而不檢一發地方置於無用其於邊境亦何利焉臣以為随宜調遣令其懲創奮發立功如果有功即與議奏逓為未減以贖前愆或有非常勲績一體拔用所謂不以一眚掩徳當有如古名將出於罪戾者矣一専委任以杜聚冦朝廷随時設官務為除害而所用之人類多未能舉職其兵政不修殃民召冦者固不足道亦有固遜嫌疑營幹他務者有厭棄荒野延住省城以宻近撫按者有徒藉刑威陵轢官屬而於緊要事㡬一切不理者以致民患莫除盗賊滋蔓况今湖廣辰常等處時有早災民多饑殍里甲散之四方未必不轉而為盗而洞庭湖又聞常有盗警失今不治將來隐禍深為可憂應申飭各處撫按督令兵備江防海道官於原設緊要地方住劄亷正以率屬咨訪以盡情簡閲以實兵操練以振武聨屬里保使之相稽逓設鑼鼓使之相聞互為犄角使之相救堅其險阨使之相守其平時振舉武備者務須益勤乃職以固藩維焉一専内治以杜釁端兩廣雲貴在禹貢荒服之外山箐險阻猺獞羅􅈎諸蠻所居漢武拓地或稍通中國或自相盤據雖設土官統轄亦僅羈縻而犬羊狼虎吞噬無常終不能使之馴也奈何守邊將吏平時不能宣威示信以嚴其防惟利大征翦除以盡其類不知此類蕃如草木巢穴充盈非誅殺可盡一聞大征兵至其渠魁惡黨相率走藏所殺類多愚蠢苖人是生民膏血斂為軍儲秪足以飽用事邊臣谿壑之欲以易千百無辜之命而已昔宋儒楊時以為邊事之興多出於貪功幸利之人不務撫馴幸其時草薙而禽獮之以求有功一有失律則敗衂不支上貽朝廷憂此邊吏之大患也今日遐方弊正坐此宜申敕各邊廵撫都御史嚴戒各該兵参等官務要仰體皇上好生之心布其威信嚴其阨塞謹其哨保則久安長治之道得矣疏入帝從之遵憲綱攷察御史疏嘉靖十二年王廷相臣謹奏為遵聖諭定條約嚴攷察以新風紀事臣等伏覩嘉靖六年八月内皇上敕諭都察院有云正統六年英宗皇帝詔中外風憲係綱領之司須慎選識量端宏才行老成任之其有不諳大體用心酷刻者並從都察院堂上官攷察降黜成化七年憲宗皇帝欽准事例巡按公差御史回京之日本院堂上官仍依舊例查勘攷察保結稱職者具奏照舊管事若有不稱奏請罷黜近年此例雖存不聞劾罷一人葢因堂上官不能振揚風紀反為屬官所制避讒逺怨以致人心怠弛今後巡按滿日務要嚴加訪察果無贓私過犯推諉避事等項實蹟取其該道結勘明白方許回道管事若有不職事蹟不許朦朧具奏照例奏請罷黜欽此欽遵臣等伏讀之餘仰見皇上慎重風紀之司必欲御史得人使徳化宣流生民得所而後已真帝王之盛典萬世之所當守也臣查得御史出巡舊規除盤糧等差與給事中同行互相闗防免其攷察外其餘巡按巡鹽巡闗巡茶清軍刷卷印馬等差一年滿日及事完回京各具行過事蹟御前復命仍備呈都察院攷覈出巡有無贓犯及乖違等項違礙劄仰刻道從公保勘委無違礙方許奏准照舊管事但御史出巡責任甚多今攷察之例止言贓犯乖違未曽明具條件使御史無所據守以之盡職本院無所憑藉以之覈實漫言指摘似為未便臣等議得今後御史出巡回京攷察除犯該贓犯據有實蹟照例奉請提問及過違限期照依舊定水程查算外今將闗繫職守之大者六事定為出巡規格凡御史有差備開載於劄付之内行令一一遵照條款攷其修否以别勤惰臣等另有訪察不在此限如此則御史目覩耳聞之餘必能警省愓厲無怠職廢事之愆而朝廷之風紀亦於是乎振揚矣臣等欲候命下咨行各巡撫都御史劄行十三道并各巡按等項御史各一體欽遵施行縁係遵聖諭定條約嚴攷察以新風紀事理未敢擅便具本開坐謹題請㫖一除革姦弊御史之職方今天下官邪民玩甚矣錢糧出納之侵欺驛𫝊往來之汎濫里甲困於無藝之供糧長苦於應官之饋巡鹽即販私鹽捕盗與盗通氣入官有見靣之錢管事有常例之賄假以公用而科斂任情指稱修理而罰金無度吏典無賄而文書不行豪富通財而差役得免隐姦蓄慝不可枚舉近年以來御史出巡惟務作威作福以聳人之耳目不事廣諏博采以察下之隐微况巡厯所在止二三日飄風驟雨一過不返若不用心體察民間姦弊深隐何由以知合無今後御史出巡務要悉心亷訪但有姦弊發露即當置之法理使按屬之地風清弊絶以副皇上救弊恤民之心回京之日仍將革除過各項姦弊事由開造文册呈院以憑攷察職業修否一伸寃理枉御史之職竊惟推情訊獄非上智之才公平之心鮮有得其真者况權勢之家問官懾於利害富豪之室賄賂靈於神明朴實之民鈍口奪於狡佞酷暴之官殺人輕於草菅粗疎之吏才情拙於淑問由是情偽莫分寃枉無愬小民有不得其生者矣既不能體皇上好生之心且有以干上天至和之氣致災召眚莫不由此合無今後御史出巡務要慎刑明獄及一應詞訟勘問之事虚心推理縁情求實但有枉抑勿問成案即與伸理使按屬之地刑罰得理瞭無寃民囬京之日仍將伸理過各項寃枉事由開造文册呈院以憑攷察職業修否一揚清激濁御史之職竊惟御史為朝廷耳目出巡於外人才臧否賴之采訪部院攷察憑之黜陟其闗繫至重也近年以來御史旌舉司府州縣等官不問其人品髙下立心行事曽有卓異政績與否但見其奉承齊備禮貌足恭便以為好即一槩濫舉多至數十餘人致使賢否同途薫蕕同器而不辨其所糾者類取一二塞責甚至糾及縣丞典史等官其大貪大姦蠧政而害民者則以鄉里同年親故之情掩蔽而不發惟念私情全不為國大壊風紀於斯為甚合無今後御史出巡於司府州縣官員務要即事察政即政察心果見其人品髙明心術正大政事卓異在司府官㫁可為科道郎署之臣者方許薦舉其中人以下平常之才止可注在攷語不得混同髙流以辱薦章其所糾劾首先貪酷殃民不法之人次及罷軟無為老疾之輩務要據其實跡奏行罷黜不許挾私報怨以害賢善回京之日備將舉劾過各官賢否實跡造册呈院以憑攷察若才賢者以不能奉承舎之而不舉中才平常之人反夾雜一二以盡私情及大貪極酷隐蔽而不劾者臣等體訪得出攷以不職一本院劄去巡按御史勘合公文皆闗繫地方重大事情及官民寃苦奏詞有等公謹盡職御史督行二司及守巡官員一一依期完報其有等漫無才志者則悠悠度日𫝊食郡縣多致緊急事情廢閣不省又有等乖猾利巧及阿私偏黨者毎遇闗繫利害之事則推託閃避遲留而不為干礙御史糾劾不實者雖容易勘明而不報以至終年累嵗事無歸結此等御史尤為不職今後差去御史接管承行比先次御史勘合務要作急勘報其自已任内劄付者除滿前兩箇月待贖差御史勘完其餘十箇月内務要一一勘明銷繳回道之日備將先差御史及自已任内勘合開具已未完數目造册呈院以憑攷察其有邊疆等項事情難於提人行勘者亦要明白開造一監察御史出巡所以上宣徳意下逹民隐風四方貞百度此其大節也為御史者必須清修簡約鎮静不擾庻足以安民格物以振風紀近年以來御史出巡在外動輙人馬千百擺列兵衞吹打響器以張大聲勢擅作威福又随帶府縣能幹官員及狡猾驛丞十數不等以備任使導從如雲飲食若流全無清約之節反生擾擾之害所至州縣計其一日之費毎至百數十兩本以安民而反以勞民欲振風紀而反壊風紀此等御史乃淺陋無識徒假聲勢於外以自大求其中未必有者也合無今後御史巡厯郡邑務要安静不擾本等導從皂𨽻之外並不許多用一人其府州縣驛丞等官亦不許隔境随送迎候以為有司之害違者許巡撫巡按互相糾劾臣等察訪得實回道之日攷以不職一巡撫巡按兩相和恊則能開誠布公以成王事近年以來輙因小忿遂成嫌隙至相訐奏安望其同心戮力有益地方乎臣等嘗求其故皆巡按御史無禮不遜致之都御史正坐御史旁坐禮也近年以來御史毎與都御史上下賓主坐矣都御史前班御史後班禮也近年以來御史毎與都御史同班並列矣豈非執法者不法貞度者無度乎巡撫柔和忍事者則隐忍而不與之較若遇剛毅正直者則必與之相講論不從則嫌隙成矣由是巡撫所行者巡按則不行巡按所允者巡撫則不允官吏人等答應巡撫者巡按則惡之答應巡按者巡撫則惡之至有無罪拏問因而革去職役者巡撫自相搆隙而禍及平人豈不寃哉以斯人所行乗勢驕傲為患如此欲望一方政令之平民庻之安胡可得哉臣等以為春秋之義王人加於諸侯之上禮也巡按御史在三司則可在巡撫都御史則不可何也都御史列銜内臺奉敕巡撫一方非在外守土之臣可比也地方事情可以共議而名分體統則不可越近日本院題准都御史正坐御史隅坐臣等以為此只以私情非禮議處非所以論於朝廷之上也若據禮制名分御史仍當旁坐仍居後班為宜合無今後巡按御史不論副都僉都其坐旁坐其班後列以正體統若有仍前不遜者臣等察訪得實回道之日攷以不諳憲體奏請降調疏入得㫖覧奏足見振揚風紀深切時弊都依議務要著實舉行内除姦弊一事還查照前㫖不許假以訪察為由誣害平民御選明臣奏議卷二十二
