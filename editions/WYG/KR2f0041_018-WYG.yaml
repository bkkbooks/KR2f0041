  text: 欽定四庫全書御選明臣奏議巻十五
  hash: sha256:e183dc8b5a1d5269297652a6a453b06c4c858c075363010fb4a0fe6f1e7acd8a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_018-1a, image: WYG0445/WYG0445-0240a.png}
body:
  text: 革冗員以安邊方疏正徳十一年王瓊臣查得陜西延綏寧夏甘肅三邊先年各設總兵官一員掛印鎮守係是舊例其陜西省城並固原地方原無設立因𢎞治十四年邊賊大舉入宼方纔暫設副總兵一員于固原駐劄不久裁革以後或留或革或兩員並設事體不一近年又將副總兵趙文暫移河州駐劄原議邊寇寧息另議定奪現今趙文陞充總兵官專一固原駐劄鄭卿陞副總兵更代仍在河州其額布勒等賊已過河西事仍照舊河洮岷三州舊各有守備官一員足以責委今户部署郎中馬應龍奏要將副總兵鄭卿照舊裁革委的事理相應亦與本部原擬相合及照鄭卿先任甘肅遊擊將軍該吏部尚書楊一清保舉嫺于弓馬習于戰鬭臨機有謀遇敵不怯以此本部㑹官推陞副總兵協守陜西今署郎中馬應龍奏稱本官在彼無事髙坐罔恤軍民疾苦窮極剥削絲髪無遺頭目家人作弊百端等情合當究問但無指實合無將鄭卿革回原衛帶俸本部行移巡撫巡按官通行嚴加訪察禁治果有貪害實跡參奏治罪其鄭卿原任協守副總兵員缺不必推補河州洮岷等處事情聴巡撫都御史督同兵備副使並各守備官照舊施行疏入得旨是鄭卿既罔恤軍民弊端百出便革了任著回原衛帶俸待查奏至日來説其餘事宜依擬行傳奉疏正徳十一年王瓊臣等謹議得京城内外先年設立五城兵馬指揮司職専禦風火察奸盜及錦衣衛官校巡警夜禁緝捕盜賊監察御史巡城禁革奸弊在外通州良鄉等處各設有軍衛委官巡捕其後通州等處又設分守涿州良鄉又設守備又三年一次差御史錦衣衛官分路巡捕𢎞治元年因盜賊生發奏准于三千營選撥官軍一百員名于彰義門外義井兒及良鄉並清河髙碑店四處每處二十五名隄備盜賊正徳初年京城内添設把總官二員委官八員各分地方毎委官一員管領馬軍二十四名歩軍二十五名共四百員名京城外添設把總官二員毎員領有馬官軍五十員名委官七員每員管領馬軍六十名共四百二十名正徳十年㑹議京城内每委官一員各添馬軍二十五名歩軍二十五名共軍七百九十二名馬四百匹京城外毎委官一員各添一百名共軍一千一百二十名馬一千一百二十匹把總並委官俱一年一換城外把總該領官軍全給盔甲海巡馬軍給與一半八十副今年又奏差工部右侍郎趙璜専一整飭武備挑選河間等衛舍餘交與分守通州都指揮袁傑及涿州守備崔澄亦添撥官軍各給與馬匹嚴謹巡捕壩上良鄉等處正係袁傑崔澄等該管地方立法不為不密責任不為不專但京城内外人烟輳集遊食者多壩上良鄉等處軍民艱窘差役繁重以此盜賊隨捕隨發難得盡絶自去年本部㑹官議添巡捕官軍數多定擬條格賞罰嚴明又給與盔甲火器馬匹草料以此一年之間把總官捉獲强盜二百餘名錦衣衛坐委官校及各該緝事衙門亦皆緝捕數多奈何世情艱難財重命輕致廑聖慮屢降明旨著落官軍用心挨拏未得寧息今又奉旨令臣等從長議處停當奏來定奪臣等愚見若欲從長計議處置停當必先撫恤軍民輕徭薄賦人得安生則盜賊自少前項節年議處捕盜事宜已極周密今若不先撫安專立嚴法捜捉擒捕誠恐法網太密致有激變前代漢武帝時因山東盜起遣官衣繡持節發兵擊斬至萬餘級盜賊愈滋至不可禁正徳四年添設巡捕御史帶領家眷專督捕盜法網嚴密賊勢愈熾兇惡之徒乘機倡亂肆行刧掠至動邊軍入𠞰逾年始平是其明驗以故捕盜之法固不可寛縱亦不可太嚴今將弭盗根本及先年捕盜事件開查明白合無照依𢎞治元年事例本部㑹同錦衣衛並六科十三道掌印官再行計議應否施行奏請定奪正徳十一年十二月十三日具題本月十五日奉聖旨是這先年捕盜事宜恁每還㑹官議處來了説欽此欽遵今將原擬捕盜事宜開列前件㑹議明白一弭盜根本近年捉獲盜賊多係當差軍民原無産業又被管軍管民官員不肯撫恤惟知科害以致艱窘衣食不給飢寒切身甘心為盜視死如歸合無請降敕旨令各營並在京各衛所順天府及在外直隸保定等府州縣衛所管軍管民官員今後非奉朝廷明文一夫不許擅起一錢不許擅科敢有故違科害逼迫軍民失所許被害之人指實陳告治以重罪前件依擬一大明㑹典一欵凡地方軍匠人等舊例令各家俱于門前置粉壁一面開冩本家籍貫人口身役營伍並冩不敢窩藏逃軍逃匠囚徒盜賊等項以憑挨究今查前例日久廢弛以致盜賊潛藏無所警畏合再申明置冩挨究但有犯者照依律例究問解發前件依擬不拘内外官員及勢要之家一體挨查但有一應來厯不明及不係官員軍民匠籍之人俱不許容留潛住如有依勢窩藏不報挨查者該城兵馬司具呈錦衣衛並巡城御史㕘奏處治一京城内外人烟輳集去處盜賊强劫皆由夜禁不嚴巡捕不謹所致合無今後但有强盜明火持杖强劫人家財物出入自由火甲不行傳報救䕶巡捕官軍不在地方巡厯追捕將巡捕官軍並該管兵馬司官吏弓手火甲人等俱參送刑部問罪若地方被盜火甲知覺傳報救䕶及巡捕官軍現在地方巡厯遇賊追捕者不在此例前件依擬一𢎞治元年百户王敏建言要于京城内外小巷路口置立柵攔夜間闗閉本部㑹官計議題准先于城内閻廂試驗令巡城御史督同兵馬司計算工程先儘財主勸出銀兩如法成造果為有益城内另擬後因兵馬司奉行無法一概科取騷擾地方又行禁止其已修完柵攔亦不如法不久損壞今照京城之内大街小巷不止一處巡捕官軍止有七百餘名未免巡厯不周一聞有盗昏夜追趕小街曲巷輒被藏匿合無除寛街大路不必置立外但係小街巷口相應設門去處各置立門柵遇夜闗閉如遇追逐盜賊不得委曲隠藏本部仍委官一員㑹同巡城御史督同兵馬司官相視計議如法修置合用工料勸倩本巷得過之家情願出辦不許强逼科害致生怨議别有良法具奏定奪前件先年已行未免騷擾地方今不必舉行一京城外東北巡捕現有把總都指揮楊昺西南巡捕現有把總都指揮王佐通州一帶現有分守都指揮袁傑涿州一帶現有守備都指揮崔澄各有原設巡捕官軍壩上良鄉等處皆是各官該管地方又該工部侍郎趙璜奏准許令袁傑帶領河間等衛舍餘五百員名太僕寺撥馬五百匹又行令崔澄㨂選官軍舍餘五百四十二員名太僕寺撥與馬一百五十匹盔甲腰刀選給三百副合無本部再行整飭武備右侍郎趙璜並巡撫都御史李瓚嚴督袁傑崔澄等本部督令楊昺王佐等各照地方務要比常加謹用心緝捕如遇追襲强賊走出該管地方亦聴乘機掩襲㑹合𠞰捕但不許一概捜捕妄拏平人驚疑地方事發從重㕘究前件依擬一各巡捕官軍捕獲强盜或地方失事正徳十年㑹議賞罰條例俱係暫行今已革去除陞賞遵照舊例施行及京城内外失盜照依前例查明送問外但係通州良鄉壩上等處在外地方被盜强刧失事仍照正徳十年㑹議事例把總官委官一年之内該管地方被强盜響馬打劫一次全無挐獲委官積至五起以上降一級十起以上降二級不及五起者委官毎一起罰俸兩箇月分守守備把總官毎一起罰俸一個月捕盜該陞者照級准贖其罪庶使人心知警不敢玩忽前件依擬每年終一次兵部查奏又將另議合行事宜逐一開款一現今京城内東西二邊把總巡捕官下共有馬步官軍八百員名京城外東北西南把總巡捕官下共有有馬官軍一千一百二十員名但京城内外地方廣濶街巷數多巡邏不週合于城内每總添撥歩軍一百名城外毎總添撥步軍一百五十名共五百名與原撥官軍分作兩班派定地方輪流巡邏不許私役放賣一現委城内東邊把總巡捕都指揮章縉西邊把總巡捕都指揮謝素城外東北把總巡捕都指揮楊昺城外西南把總巡捕都指揮王佐俱各謀勇未聞難責成效俱各更換今不為常例㑹推得原委西南巡捕都指揮髙謙堪替楊昺原委城外巡捕都指揮盛瑾堪替王佐指揮孫浩堪替章縉指揮郟文堪替謝素伏乞聖裁候命下之日仍令各官把總巡捕以後事故仍照舊例兵部委用一捕盜陞賞事例必須申明通行庶使人知激勸查得近該兵部議得合無今後務要所獲强盜果係聚至數十人之上兇惡顯著委曾相與對敵人所共知行該地方覆查得實者方准照例陞級其餘緝捕零賊並買求他人所獲輳數捏作兇惡勢衆對陣擒獲者俱不許陞級等因正徳九年七月初四日節該奉聖旨是今後挐獲强賊果係數十人以上兇惡顯著曾經對敵人所共知覆勘是實的方許照例陞級不許將緝捕零賊並計買捏輳的一概朦朧奏擾欽此又查得兵部㑹官議得南北直隸山東河南江西等處遇有官兵人等擒斬賊級若與賊對敵就陣擒斬有名劇賊一名顆不願陞級者賞銀三十兩擒斬隨從盜賊者毎名顆賞銀五十兩陣亡者重加優恤若不係對敵止是緝捕强盜者毎名顆賞銀十兩若擒獲偽稱名號首賊者又不拘定數目聽候各官斟酌加賞其不係應捕人員一體給賞等因正德六年三月十七日兵部等衙門尚書等官王敞等具題本月十九日奉聖㫖是這賞罰事例既議擬停當都准行通行出榜曉諭各該地方官員人等知道欽此前例合再申明通行若京城内外把總廵捕官及在外分守守備等官遇有擒捕緝捕盜賊查勘是實照依前例陞賞有能運謀設法擒捕强盜數多地方寧靖功績顯著者聽廵撫廵按官奏保陞級兵部遇有相應員缺不次推用一大明律内一欵凡強盜窩主造意身雖不行但分贓者斬若不行又不分贓者杖一百流三千里共謀者行而不分贓及分贓而不行皆斬若不行又不分贓者杖一百欽此又查得問刑事例内一款皇親功臣管莊家僕佃户人等勾引外處來厯不明之人窩藏為盜坐家分贓者同發邊衛充軍其該管家長參究治罪又一款知強竊盜贓而接買受寄若馬騾等畜至二頭匹以上銀貨坐贓至滿貫者俱問罪不分初再犯枷號一箇月發落若三犯以上不拘贓數多寡與知盜後而分贓至滿貫者俱免枷號發邊衛充軍今竊詳立法之意止欲禁止窩藏盜賊之家及接買受寄之人不敢窩贓寄買則盜賊無所藏匿寄放易得事發但令盜賊事發到官窩主及接買受寄之人多從寛發落以致人無警畏合無兵部轉行法司今後盜賊窩主及接買受寄盜贓人犯務要照依律例從重問擬枷號充軍等項發落一錦衣衛原有領馬校尉一百名務要不時徃來各該地方督同兵馬火甲人等緝捕盜賊遇有强盜打刼㑹合廵捕官軍併力擒捕如有誤事聽本衛提督官比較處治疏入得㫖高謙盛瑾孫浩郟文各著把總廵捕其餘准議劾太監史宣疏正徳十一年孫懋臣聞織造太監史宣與沛縣官奏訐尋奉欽依將主事等官王鑾胡守約等拿解去訖臣聞之初尚驚駭謂胡守約必有遲誤御用重情隨訪得史宣在途酗酒作威肆行兇惡所過索要茶果分例或逼取折乾起闗等錢又有聲言欽賜黄棍專令打死官吏勿問隨路陵辱指揮知縣等官人民逃竄雞大驚散風聲氣熖有若雷霆道路傳聞莫不震駭計其所獲動盈千數流賊之害不慘于此及照史宣織造有年貪虐日甚贓賄之入亦動以千計南京軍民痛恨入髓先經南京科道糾劾未䝉究治近該廵按王崧奏稱進貢進鮮等項黄馬快船管運官員多勒人夫嚇取財物綁縛官吏乞要出榜禁約等因己經該部題准如有仍前違例索取財物及曲為奉承者該巡撫廵按等官指實參奏處治詔㫖已行史宣何人乃敢公然不遵愈肆兇暴一不滿欲輒行搆䧟職官若王鑾等果被中傷則各官聞風畏懼莫敢誰何何禁令之足行耶臣竊觀憲廟時太監王敬帶領千户王臣江南為害該廵撫官王恕奏其罪惡當明正典憲今史宣惡浮于敬真當道豺狼也陛下明足燭姧仁足保民而容忍史宣之惡如此耶況各處皇木續至若不為慮臣恐沿河軍民無以自存人情洶洶易于生變昔宋朱勔以花石綱擾害江淮卒致靖康之禍安可忽以為細故哉惟陛下惕然深思超然逺覽即將史宣寘之重典王鑾等復其原職庻使刑政允當人心稍安而禍變可息矣疏入帝不納自劾不職乞賜罷黜疏正德十一年孫懋臣竊惟災異之來實由人事人事失于下則災變見于上天下感應之機㨗于影響甚可畏也頃者伏覩四方奏報災異比之往年特為尤甚豈非羣臣不能盡職之所致耶伏念臣猥以庸愚誤䝉選擢寘之言論之司委以耳目之寄凡時政之得失生民之休戚庻官之賢不肖皆得以聞之亦皆得以言之若聞之而不能言言之而不能盡或既盡言之矣而不能委曲開導以致主上之必納皆所謂失職也然則臣之失職亦多矣若近者以用舍之未審于是有明國是之言以委任之未重于是有存國體之言以天變之未囘于是有實修省之言民害當去而憂其未去也于是有保重地之言兇惡當懲而憂其未懲也于是有安人心之言姧有當昭而微有未防也于是有安宗社之言是數言者皆有益于朝廷有闗于時政有切于生民有繫于庻官之賢否者也臣晝夜以思詳復以議而後敢言亦庻幾仰瀆之餘施行一二以少裨職分之萬一也豈意陛下一切留中不報臣即不審果已經聖覽以為不急姑置之耶將左右權倖務為壅蔽末之達耶謂曰壅蔽以陛下之聰明察下左右之忠誠事上且逆瑾覆車方切為戒寧有是耶謂曰不急陛下亦宜批降明示大廷公議可否可則行之否則置之其或臣情有過激言有太驟或誤犯忌諱或觸忤權貴陛下幸而賜之優容可也加之罪譴可也何乃是非不分可否無辨而竟留中若罔聞耶萬一姧人縁此陰相結黨公為隱秘果有警急陛下不聞大臣不知其禍可勝言耶臣竊聞明目達聰堯舜所以成聖治偏聽獨任秦隋所以致敗亡伏願陛下以堯舜為法以秦隋為鑒則天下之幸宗社之幸也若臣待罪無狀不能匡賛大猷裨益化理以致人事缺失上干天變災異頻仍貽憂宵旰負國之罪不容誅矣伏願陛下特賜罷黜以為人臣不能盡忠者戒疏入帝不納武舉議正徳十二年王瓊臣謹奏查得今㳄各處起送應舉官生人等共八百七名内遼東二百三十七名其餘各有二三名者有全無者多寡不均四月初九日試馬上箭毎人走馬三回射九矢共該走馬二千四百餘回共射七千二百餘矢本日射必不周又于初十日試馬上箭一日方畢若遇風雨又難拘日期若不照鄉試事例酌量地方南北定數起送不惟地方取人有偏抑恐以後人漸加多難于較射況武舉之設重在騎射或有馬上中九箭步下中四箭以上者因論䇿不稱不䝉收録監生省祭官生員等項已有出身正途又應武舉中式仍送吏部選用未免紊亂選法舊例軍職官非親冒矢石獲有軍功者不陞今以從容較射偶中數矢輒陞二級一級似失之易千戸以下官員徒在取中支米之列終無出身効用之路其得陞試署鎮撫知事終身支米亦無可用又文武科舉自有不同今武舉既倣文舉㑹試殿試事例刋録文字其馬步數目不載録内亦似欠缺既稱答策論三道馬上中四箭步下又中二箭以上者陞署職二級答䇿論三道馬上中三箭步下又中一箭以上者陞署職一級則是專以騎射為重又稱所答策論參以弓馬俱優者列為上等弓馬稍次者列為中等則是又以䇿論為主以致主司難以去取前項事件俱未稳當臣等議得漢制武舉皆起布衣至唐開科亦有定議我太祖高皇帝初定天下召集海内各儒酌古準今議定制度文職設科貢兩途以取士武職世襲故不設科然又設流官五府都督及方面都指揮俱不世襲以待有功及賢能者陞用各衛指揮千百户五年一㳄攷選委用蓋于世襲之中而寓選舉之意則武舉之制已在其中矣天順間始議武舉成化𢎞治以來間一舉行猶取騎射大畧而已至正德三年尚書劉宇議定今行條格三年一㳄舉行著為定例中間條格如前項所查既不取法于古又不合宜于今規制茍且事體乖謬誠未穏當臣等先巳查奏不係洪武永樂年間舊例應否舉行不敢擅議奉欽依照例行今若不備陳議處誠恐紊亂舊章取譏後世伏望皇上念祖宗制度係干重事非劉宇與臣等孤陋寡聞之人所可更定遂足以為遵守乞敇翰林院儒臣攷據古今詳度事理如果舉用將才秪應遵照舊例于武職中推舉攷選賢能之人及于功陞官内酌量推用則武舉一科不必另設若世襲武職之外恐有遺材則參酌古今定立武舉制度務在事必師古不礙今制將前項現行條格未穩事件逐一改擬停當開陳明白徑自具奏本部㑹集多官再議上請定奪其以前武舉中式官生人等内都指揮果有行檢材能者照例推用千百户鎮撫總小旗及舍人軍餘所陞試署職級内有情願赴各邊總兵等官處報効殺賊者在京者具告本部在外者具告該管官司轉行本部各送所告地方總兵等官處參隨殺賊該支米石就于彼處查照支給仍聽廵按御史查㸃不許寄帶空名冒支食米其生員民庻人等所陞試署鎮撫知事及試廵檢聴該管上司就委本處本州縣衛所專管廵捕如有犯罪依律問革議奏得㫖是今後武舉還照舊舉行其間事宜有未備的恁部裏還議了來説聲息等事疏正德十二年王瓊臣等謹議得宣大鎮廵官現奏賊營大衆近邊駐牧入寇之舉旦夕難測延綏官軍已調大同遼東官軍現在薊州駐劄給有賞賜馬匹亦該同時調去今若遲疑不決令蕭滓自行哨探亦待宣府報有𦂳急纔令前去必致坐失機㑹虚調無用查得近來因謀慮不審無事不調否即班師有事纔調緩不及事糜費錢糧動以數十萬計前項南京兵科給事中周用等所論切中時弊臣等深以為戒明白具陳誠欲為先事之謀以弭患省費非敢偏執一見必欲自用也伏望皇上俯察用兵機宜闗繫最重現今宣大各報賊衆逼境姧謀難測特允臣等原議即今蕭滓統領人馬過闗隨宣駐劄相機戰守有事䇿應兵精可得其用無事徑囘兵少亦不多費如此調度似為得宜若必待寇犯宣府然後出口往返十日必不得用不如此時即囘遼東尤為省便臣等叨掌兵政事有所見不敢隱黙再照團營官軍臣等原擬行提督官計議應否挑選備用㑹議停當具奏定奪不曾奏要馬不下場今奉欽依團營下場馬匹照前牧放則是不准各官會議惟以户部所議為主竊恐職掌侵越事難責成萬一如去年賊勢强盛大舉入寇軍令戒嚴倉卒無措雖是罪坐所由臣等終難辭責伏望皇上俯念兵機最重委任當專許照臣等原擬行團營提督官計議應否挑選備用奏請定奪庻明炳先幾事無後悔不勝幸甚疏入得㫖是蕭滓便冩敕與他著統領人馬前去鄰近宣府地方隨宜駐劄相機戰守㑹合策應毋致誤事團營官軍應否挑選備用恁毎還會議停當來説給衣禦寒疏正德十二年王瓊臣謹奏看得遼東右參將署都指揮僉事蕭滓呈稱原選調宣府征進官軍來時各穿夏衣即今八月天氣漸寒缺錢置買棉花乞要給衣禦寒一節查得常年各邊調來策應官軍原無另給胖襖袴鞋事例前項正德八年延綏遊擊李愷官軍三千員名調來山西策應正德九年遼東遊擊林睿調來薊州駐劄俱該工部並本部議擬奏准給與胖襖袴鞋蓋念調征之苦時將寒陳不能自備衣鞋所以不拘常例給與實非過也今遼東官軍自遼東逺來調去宣府駐劄策應又非先年遊擊李愷調在山西駐劄之比若不准給軍士受凍致疾將何以責其効力殺賊若遼東官軍既准給與其延綏官軍連年調出在外比之遼東官軍勞苦尤甚若不一例准給誠恐恩惠不得均普致生嗟怨合無本部移咨工部查照前項李愷林睿事例不為常例將蕭滓杭雄朱鑾周政各領官軍俱照數查給胖襖袴鞋庻使調出在外軍人不受寒凍緩急可用疏入得㫖是蕭滓並杭雄等所領遊竒官軍俱准照數與胖襖袴鞋不為例申明賞罰疏正德十二年王守仁臣惟招撫可偶行于無辜脅從之民而不可常行于長惡怙終之寇可施于囘心向化之徒而不可屢施于佯服隨叛之黨按南贛間始有被害之民恃官府之威猶或與之相角及有司以為既招撫之則皆置之不問盜賊遂靡然相從而不畏死百姓益無所恃而日益受害平良多冤苦無伸而盜賊乃無求不遂是故近賊者為之戰守遠賊者為之嚮𨗳處城郭者為之交援在官府者為之間諜其始也出于避禍其終也從其為惡故曰賊盜之日滋由于招撫之太濫者此也夫盜賊之害神人共怒獨有司必欲招撫豈得已哉使强兵悍卒足以殱渠魁而蕩巢穴功成名立豈非其所欲然而南贛之兵素不練養類皆脆弱兵力勾攝將至賊已稇載歸巢矣或猶遇其未退則望塵先奔不戰己敗以是禦冦猶驅羣羊而攻猛虎也安得不以招撫為事乎故凡南贛之用兵不過文移調遣以茍免坐視之罰也間有任事者勦捕之䇿行則必徴調日繁督責日至糾舉論劾者四面而起往往至于落職敗名者有之若招撫之䇿行可以安居地方多事亦不得滯其遷轉夫如是亦孰不以招撫為得計耶是故寧使百姓之荼毒而不敢出一卒以抗方張之賊葢招撫之議其始也出于不得已其卒也遂守以為常䇿故曰招撫之太濫由于兵力之不足者此也古之善用兵者驅市人而使戰收敗亡之卒以抗强敵今南贛之兵尚足以及數千豈盡無可用乎然進而効死無爵賞之勸退而奔逃無誅戮之及則進不必死而退有幸生也何苦而求必死乎呉起云兵之情凡畏我則不畏敵畏敵則不畏我今南贛之兵皆畏敵而不畏我故曰兵力之不足由于賞罰之不行者此也今朝廷賞罰之典未嘗不具但未申明而舉行耳古者賞不踰時罰不後事過時而賞與無賞同後事而罰與不罰同夫兵得隨時調用而無觀望掣肘則自然無可推託逃避思効其力由此言之律例具存前此惟不申明而舉行之耳今使賞罰之典悉從而申明之其獲效亦未必不如是之速也伏望皇上特敕兵部俯採副使楊璋之議亦如往者律例再加申明臣亦得便宜行事如是而兵有不精賊有不滅臣無以逃其死矣若任不專權不重賞罰不行以至于僨軍敗事然後選重臣假以總制之權而往拯之縱善其後已無救于所失矣疏入帝從之請囘鑾疏正徳十三年呉儼臣初聞聖駕出京幸昌平等處曽具疏凟冒聖聰言詞蹇拙不蒙採納既而又聞八月廿八日聖駕復出過居庸闗幸宣府又幸大同宰輔不及知羣臣不及從三軍之士不及衛䕶以行臣戰懼驚惶罔測聖意之所在伏而思之是必邊境弗靖羽書急數陛下慮羣帥之不力憫邊氓之被俘急于制馭遂不遐咨之廟堂謀之帷幄而行耳不然沙漠之淒涼決不若京師之富麗邊塞之馳驅決不若宫禁之尊嚴陛下奚取于此而輕身以幸之哉古之聖帝明王不能無外夷之患三苖不服虞舜固征之矣而奉辭伐罪乃責之大禹舜實未嘗自征獫狁孔熾周宣固伐之矣而出師致討乃責之尹吉甫周宣實未嘗自伐載之詩書昭然可攷今在廷之臣文武如林寧無一人忠貞謀勇可以委任而陛下必欲自行耶夫君居其逸臣任其勞此古今之大義若天冠地履不可得而易者今陛下自任其勞而以逸遺臣下是愛身不若愛臣下之深也無乃倒置歟聖駕初出之時臣民引領北望皆謂囘鑾必在九月萬夀聖節則天下之朝賀者畢至四夷之貢獻者在廷豈宜使之空行九月過後又謂囘鑾必在十一月長至令節則九月有歲享之大祭兩宫有慶賀之大禮豈宜遣人以代十一月過後日望一日今又過元旦若干日矣聖駕己囘遠不能知萬一未囘則郊祀大禮古今所重尤非臣下所敢代者將遂缺而不舉歟若謂敵尚在邊則待靖敵而後聖駕可囘歟萬萬無此理且京師者天下根本之地郊社宗廟于此乎建立宫殿陵寢于此乎奠安羣臣百工于此乎㑹萃三軍萬姓于此乎長育財貨珍寶子女玉帛皆于此乎輻輳外之郡國雖㦯有一二富庻必不及京師萬分之一況遠在邊徼者乎譬諸人身京師猶腹心也郡國猶肩背腰膂也邊徼則四肢也腹心安然後肩背腰膂安肩背腰膂安然後四肢無恙今有人焉養其四肢而心腹之不安則不顧是可謂之善養身乎況今京師内外人心搖動口語藉藉轉相傳播淮徐以南荒僅千里去冬三月雨雪為災民無衣食至于父子漂流兄弟離散略不係戀間有自經及投水而死者民窮至此安保其不為盜哉臣恐所禦之敵尚遠隔于陰山而不虞之患或猝起于肘腋此不可以不煩聖慮也伏望皇上念九廟之統緒思兩宫之付託審内外之輕重恤黔黎之窮苦速囘聖駕端居九五修明政教委任賢才則百廢盡舉萬國來王無復北顧之憂矣臣縻禄留都山川脩阻恨不能俯伏道左扣馬泣諫不勝惶恐戰懼之至疏入帝不納劾朱彬疏正徳十三年臣竊觀自古國家信用奸邪未冇不為所禍者葢其始也媚君以徼寵其終也挾君以自恣必致危人宗社而後已載諸史册可具攷也竊照都督朱彬本以梟雄之資兼懷憸邪之念自縁進用以後專事從諛𨗳非或游衍馳驅或聲色貨利凡可以蠱惑聖心者無所不至由是陛下聖徳為彬所累者多矣況復怙寵恃恩愈肆無忌游樂罔節輕褻至尊流聞四方驚駭人聴臣即欲指名論奏猶恐傳言未真且猶冀彬改心易慮自為善後之圖誠不意彬自知罪盈惡積公議難容乃欲挾陛下自庇故又𨗳聖駕出居庸闗又無大臣一人保䕶置陛下孑然獨處于沙漠苦寒之地者殆將半載險哉彬之用心誠有不可知也且彬武夫其于前代若漢高白登之事或有未知至于我朝英廟土木之變則固習聞之矣何故乃𨗳聖駕既臨宣府又過大同以致引惹外敵深入應州等處與之交戰六日六夜使當時各鎮之兵未集狂狡之衆沓來㡬何不蹈往轍㦲然昔王振之挾英廟猶以敵衆犯邊率師親征今彬之挾陛下不知何所為哉是振以禦冦彬以誘冦彬之罪又浮于振矣且聖駕在外萬㡬叢委兩宫違養廟享不親四方災異迭見遠近盜賊蠭起中外臣民疑懼向非皇天眷念之有歸朝廷法度之具在宗廟社稷亦岌岌乎危哉是彬也不獨陛下之罪人實宗廟社稷之罪人且彬在一日則為宗廟社稷一日之憂故議者皆曰容一朱彬國之安危未可知也臣竊又料彬無以自解必將肆為巧言以為行止皆出陛下欺罔聖聴夫陛下臨御已十有三年于兹何前此未聞他幸自彬用事而乃輕出不常如是耶在陛下左右之臣亦多矣何以皆不及從獨彬為之先𨗳耶正使實如彬言又獨不可諫止之耶故自彬言之以為赤心事陛下自臣觀之實未免包藏禍心彬之罪固有不得而逃矣陛下于此亦宜不欲復庇之矣臣叨荷國恩養育成材備員言官當此權奸稔惡之秋正委身圖報之日如緘口自黙徒切浩嘆禍亂已成噬臍何及故不得不極力痛切為陛下言之且嘗伏讀祖訓有曰歴代多因姑息以致奸人惑侮當未知之初一槩委用既識其奸退亦何難慎勿姑息大矣皇言所以為萬世聖子神孫告者明且切矣伏乞陛下仰承祖訓俯納芻言急勅錦衣衛將朱彬挐送法司按鞫其罪從重處治以雪神人之憤以為奸惡之戒疏入帝不納御選明臣奏議巻十五
