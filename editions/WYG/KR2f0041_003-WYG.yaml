body:
  text: 巻一洪武應求直言詔上書葉伯巨太平十二策桂彦良大庖西室封事解縉言九事疏馮堅巻二永樂洪熙宣徳正統景泰請豫備倉儲疏楊溥三殿災請修時政疏鄒楫上仁宗奏疏李時勉陳八事疏范濟邊方事宜疏劉球元儒吳澄從祀議楊士竒敷陳十事疏劉球劾朱勇等疏葉盛建言疏劉定之覆楊寧陳邊計疏議于謙劾許貴請講和疏于謙審察敵情疏葉盛賞功罰罪疏葉盛京畿民情疏葉盛巻三景㤗天順請釋㤙克特穆爾還北疏于謙劾郭亨等縱民壯脱逃疏于謙劾衛頴等怠廢軍政疏于謙劾宫聚等疏葉盛禦敵安邊疏葉盛劾陳循疏葉盛陳災異疏葉盛請置五團營疏于謙論時政疏左鼎請修屯政撫逃民疏孫原貞劾内官弓勝疏葉盛論時政疏鍾同兩廣軍事疏葉盛巻四成化扶植綱常疏羅倫政務疏商輅乞分豁土田疏彭韶校勘資治通鑑綱目疏謝鐸陳京衛官職因差騷擾疏彭韶嚴賞罰以禁盜賊疏王恕論駕帖無印信疏王恕巻五成化𢎞治乞取囘中官王敬疏王恕陳治安疏王恕制治保邦疏王恕陳政治終始疏彭韶論山陜救荒疏王恕進大學衍義補奏邱濬漕運議邱濬陳時事疏鄒智論濫陞内官奏王恕請講學聴政疏楊守陳講明律意疏馬文升請勤政事疏馬文升巻六𢎞治陳治道疏馬文升防邊患疏馬文升請卻賽瑪爾堪進獅子疏倪岳請嚴捕近京逃賊疏余子俊恤民弭災疏馬文升正罰俸疏馬文升進鹽場圖冊疏彭韶巻七𢎞治論内外不可異法奏王恕再論内外不可異法奏王恕恤民弭災再奏疏馬文升清理刑獄疏馬文升諌寧府用琉璃瓦疏林俊請振紀綱疏蔡清覆張九功正祀典疏議倪岳請豫教太子疏馬文升議疏黃河築決口狀劉大夏申明律意疏馬文升請添巡撫疏馬文升巻八𢎞治陳災異疏馬文升修飭武備疏馬文升請視朝疏徐溥請罷興作疏周璽論重名器疏周璽巻九𢎞治應詔陳言疏何孟春陳邊務疏王守仁巻十𢎞治制科議王鏊論傳奉疏馬文升災異陳言疏林俊論欺罔疏周璽會計天下錢糧奏韓文請皇太子御經帖疏馬文升巡撫事宜疏馬文升巻十一𢎞治正徳議行武舉疏劉大夏覆金洪陳邊務疏議劉大夏請立記注史官疏儲巏豫處邊儲以備供餉疏楊一清經理要害邊防疏楊一清豫處兵機疏楊一清陳政令十失疏李東陽巻十二正徳裁宂食節宂費奏韓文請辨忠佞疏劉玉論誅太監李興伐木石疏周璽論正失罰疏周璽論内侍劉瑾等奸邪疏周璽劾劉瑾疏蔣欽再劾劉瑾疏蔣欽劾太監馬永成等疏陸崑器使將才以修戎務疏楊一清劾宦官疏韓文論誅大逆疏周璽巻十三正徳舉糾漕運官狀邵寳獻納愚忠疏羅欽順議邊軍入衛疏李東陽地方利害疏胡世寧請戒諭寧藩疏胡世寧時政疏張原應詔陳治安疏何景明巻十四正徳請遵祖訓以光聖徳疏楊廷和勸止臨幸疏梁儲大舉入境乞兵救援疏王瓊亟易鎮巡官以保重地疏王瓊請究失事邊臣疏王瓊豫防邊患疏王瓊禦敵安邊疏王瓊劾朱寧疏方良永訟胡世寧疏程啟充請罷遣中官疏梁儲請罷中官奏討鹽引等疏梁儲審大計以重本兵疏王瓊邊情疏王瓊巻十五正徳革冗員以安邊方疏王瓊𫝊奉疏王瓊劾太監史宣疏孫懋自劾不職乞賜罷黜疏王瓊武舉議王瓊聲息等事疏王瓊給衣禦寒疏王瓊申明賞罷疏王守仁請囘鑾疏吳儼劾朱彬疏孫懋卷十六正徳請崇典禮親政務疏楊廷和止微行疏楊廷和防邊患疏王瓊停差燒造太監疏唐龍江西捷音疏王守仁邊軍缺食乞早議處疏王瓊陳急務疏黄鞏諌泰山進香疏鄭善夫請還宸濠所占民田疏唐龍水災自劾疏王守仁乞寛免税糧疏王守仁請正大獄疏楊廷和請均田役疏唐龍巻十七嘉靖講學親政疏王鏊請正綱常昭典禮疏楊廷和議大禮疏張璁議大禮疏方獻夫遵祖訓以端政本疏夏言請實邊儲以固人心疏夏言大禮疏毛澄大禮議汪俊辭封爵乞普恩賞疏王守仁慎刑獄疏韓邦奇巻十八嘉靖舉大禮以成大孝疏林俊請親大臣疏林俊請勤學疏林俊節財用疏林俊議禮疏林俊謹天戒以修人事疏孫懋止殷通等乞陞職世襲疏張原請趙雲陞命疏張原弭盗疏張原修徳弭變疏張原選近習疏張原請逐太監蕭敬疏張原再乞亟黜逆黨蕭敬疏張原巻十九嘉靖勘處倭冦事情疏夏言議大禮疏席書議大禮疏桂萼録名徳以重士風疏林俊正法守疏林俊乞免查撥莊田疏劉麟論錦衣衞朱宸等疏張原寢楊倫職命疏張原社異端疏張原論王邦奇等七次奏辯疏張原卷二十嘉靖停國戚張鶴齡等恩典疏張原停司禮監請乞疏張原論國七張延齡等罪狀疏張原停止織造疏張原論議禮諸臣黜陟疏胡世寧大禮議吳一鵬請舉大禮以安人心疏朱淛勘地方賊情疏張原在告極論朝事疏張原乞停工匠等陞賞疏胡世寧陳愚悃疏林俊巻二十一嘉靖論刑獄疏黄綰執中行政疏胡世寧陳八事以足兵食疏李承勛罷兵行撫疏王守仁覆張經請慎差遣疏議胡世寧論知人安民疏李承勛巻二十二嘉靖郊禮議夏言請弭災變以安黎庶奏楊爵修舉武備疏徐問遵憲綱考察御史疏王廷相巻二十三嘉靖議處浥爛倉糧疏韓邦奇諫討安南疏唐冑益兵據險以防敵患疏韓邦奇昭典禮疏唐胄諫征安南疏張岳請順人心以隆治道疏楊爵劾嚴嵩疏張永明巻二十四嘉靖劾李如圭張瓉疏周怡請敇責大臣不和疏周怡劾嚴嵩疏周怡旱災陳言疏張永明請復河套疏曽銑議河套疏翁萬達卷二十五嘉靖重論復河套疏曽銑議曽銑復河套疏楊守謙陳邊務疏胡松請罷馬市疏楊繼盛災變請黜奸臣疏趙錦請誅賊臣疏楊繼盛卷二十六嘉靖議撥種馬應用疏李遂議設狼山副總兵疏李遂論嚴嵩欺君誤國疏董𫝊策條上定策備邊疏楊博黜貪臣以消民怨疏林潤議分布西北防秋兵馬疏楊博條上經略薊鎮善後疏楊博倭冦暫寧條陳善後事宜疏譚綸巻二十七嘉靖劾縱盜各官議川省善後疏譚綸選練州縣民壯疏楊博諫修齋建醮疏海瑞條陳薊鎮未盡事宜疏譚綸應詔陳言疏王世貞巻二十八隆慶懇乞聖明覽本顧問疏温純乞慎重贈典奏温純察變謹微疏鄭履淳請面奏事宜疏駱問禮議處安攘大計疏髙拱議處邊方激勸疏髙拱議處邊方有司疏髙拱辨大寃以正法疏髙拱議處本兵司屬疏髙拱言邊事疏譚綸言宜許諳達貢市疏王崇古言宜許諳達貢市疏王崇古巻二十九隆慶萬厯議處科目人才疏髙拱議處馬政鹽政疏髙拱陳四事疏汪文輝議録卻賄三臣疏髙拱議處廣東舉劾疏髙拱弭盜疏髙拱辨名分疏髙拱論諳達貢市事疏方逢時遵㫖議治黄運兩河疏潘季訓查議黄河後患疏潘季馴㳟報河河工程次第疏潘季馴㳟報兩河工成疏潘季馴巻三十萬厯陳吏治積弊八事疏邱橓請復建文年號立景泰實録奏沈鯉請宥革除縁坐外親疏温純陳十蠧疏余懋學請正文體疏沈鯉請停礦稅疏温純乞矜亷吏被誣疏温純乞保聖躬重宗社疏盧洪春請嚴言官曠職之罷疏李懋檜劾厰監張鯨疏張沂巻三十一萬厯請保獲聖躬疏趙志皋論公用舎疏逯中立論修史用人疏逯中立論邊事疏王錫爵請止開礦疏王錫爵陳天下四大害疏趙南星論輔臣植私黨阻言路疏湯顯祖備陳邊事疏王錫爵寧夏兵變疏趙志皋論寧夏事並陳時政疏趙志皋請容直臣以勸百僚疏逯中立條陳禦倭事宜疏李頤陳時政闕失疏于玉立巻三十二萬厯請召對疏王錫爵定國論一政體疏王錫爵催發章奏疏王錫爵請御門宣㨗疏王錫爵請發宸翰免口𫝊疏王錫爵請減免織造錢糧疏王錫爵再請召對疏王錫爵乞禁止倭人貢市疏沈一貫劾王錫爵疏髙攀龍請斥奸奨忠疏安希范再救降謫各官疏趙志皋請視朝疏楊東明請寛言路疏馬經綸弭變修省疏趙志皋乞振朝綱疏趙志皋請補本兵疏趙志皋再催補本兵疏趙志皋請儲邊材疏趙志皋陳議兵事疏趙志皋巻三十三萬厯陳天下安危疏吕坤條陳海防疏李頤言倭患既平兵勿輕動奏沈一貫劾礦使陳增疏郝敬修省弭災疏馮琦劾晉璫誣重臣疏朱吾弼陳礦税六害疏田大益論孫朝魏允貞事奏沈一貫乞免發私宅擬票疏沈鯉請慎終保治疏楊東明請罷礦税疏沈鯉請明功罪以勵人心疏楊東明條陳河漕先務疏李頤劾内監路辱大臣疏湯兆京巻三十四萬厯議開泇河疏李化龍遵㫖備陳河工疏李化龍時政疏沈鯉請召還言事諸臣疏姜士昌乞休第二疏葉向髙乞振朝綱疏周起元寮僚征去揭葉向髙請革解納白糧積弊疏徐必達乞裁藩邸求請疏周起元劾税監髙寀疏周起元劾三黨疏李朴巻三十五萬厯泰昌乞休第六十一疏葉向髙劾惡璫辱官剝民疏王紀劾趙焕疏周起元極陳時弊疏熊明遇特請蠲賑疏王紀再請勅書闕防疏熊廷弼陳河東諸城情形疏熊廷弼陳戰守大略疏熊廷弼請勒限發兵疏熊廷弼請處分以重封疆疏熊廷弼請敕臺臣查勘遼事疏熊廷弼巻三十六天啟金吾逺逮廢弁疏畢自嚴請移宫疏左光斗仁義兼盡疏左光斗敬剖和尚之㫖以銷結習疏侯震暘諫令客氏再入疏侯震暘門軍法紀全弛疏侯震𤾉禁廷人命疏侯震暘請發帑金疏朱燮元上復讎疏王之宷新餉苦累難支疏髙推防緝都門劫盜疏宋禎漢巻三十七天啟藺地善後機宜疏朱爕元地震陳言疏畢自嚴地震頻仍疏畢自嚴劾魏忠賢二十四大罪疏楊漣請除奸璫疏蔡毅中糾傅櫆疏左光斗再劾監織中涓李實疏周起元請興江南水利疏周起元請修省以弭災疏周起元水災請蠲賑疏周起元巻三十八天啟劾魏忠賢疏魏大中極言捕務不修疏髙推請斥魏忠賢疏宋禎漢極言濫舉縦貪疏宋禎漢修政恤民疏宋禎漢矢心入告嚴杜請託疏范景文簡兵屯守疏朱爕元巻三十九崇禎請燬要典疏倪元璐辯楊維垣詆東林疏倪元璐舊餉告匱疏畢自嚴劾孫之獬請存要典疏吳煥嚴行彰癉以息羣棼疏吳煥直抉吏治病源疏范景文陳黔省情形用兵機疏朱爕元議主客兵餉疏畢自嚴請無急近功小利疏劉宗周請撫䘏三秦疏吳煥革大户行召募疏范景文督黔善後事宜疏朱爕元陳黔蜀連界扼要情形疏朱爕元蠲錢粮疏畢自嚴巻四十崇禎請勿用小人疏黄道周遵㫖具陳疏黄道周三大可惜四大可憂疏華允誠痛惜時艱疏劉宗周劾温體仁疏劉宗周劾温體仁六大罪疏傅朝佑諫令錢士升回籍疏詹爾選撫賊未可輕信疏范景文讜論當存人才可惜疏范景文奸回誤國請正憲典疏馬嘉植國勢阽危廟算未定疏馬嘉植乞停遣部科催餉疏倪元璐劾馬士英疏劉宗周陳時政疏劉宗周陳五事疏劉宗周臣等謹案御選明臣奏議四十巻乾隆四十年奉勅編以皇子司選錄尚書房入直諸臣預繕寫毎成一巻即恭呈御覽斷以睿裁葢敷陳之得失足昭法戒而時代既近殷鑒尤明將推溯勝國之所以亡與昭代之所以興者以埀訓于無窮故重其事也考有明一代惟太祖以大畧雄才混一海内一再𫝊後風氣漸移朝論所趨大致乃與南宋等故二百餘年之中士大夫所敷陳者君子置國政而論君心一劄動至千萬言有如䇿論之體小人舎公事而争私黨一事至數十疏全為訐訟之詞迨其末流彌增詭薄非獨小人牟私君子亦不過争名臺諌閧于朝道學譁于野人知其兵防吏治之日壊不知其所以壞者由閣臣奄豎為之奥援人知閣臣奄豎之日訌不知其所以訌者由門户朋黨為之煽搆葢宋人之弊猶不過議論多而成功少明人之弊則直以議論亡國而巳矣然一代之臣多賢姦並進無人人皆忠之理亦無人人皆佞之理即一人之身多得失互陳無言言皆是之事亦無言言皆非之事是以衆芳蕪穢之時必有名臣碩輔挺出于其間羣言淆亂之日必有讜論嘉謨榰柱于其際所謂披沙簡金在乎謹為持擇也是編奉承訓示辨别瑕瑜芟薙浮文簡存偉議研求史𫝊以後效駮其前言考證情形以衆論歸于一是譬諸童謡婦唱一經尼山之刪定列在六經一代得失之林千古政治之鑑也至于人非而言是不廢蒐羅論正而詞乖但為刪潤聖徳之廣一善不遺聖度之宏大公無我尤非尋常所可測量矣乾隆四十九年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
