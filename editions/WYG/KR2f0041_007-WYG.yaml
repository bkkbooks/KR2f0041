body:
  text: 扶植綱常疏成化二年羅倫臣聞近者李賢遭䘮朝廷援楊溥故事下起復之命臣竊謂李賢大臣起復大事綱常所闗風化所繫天下所瞻後世所監左右侍從給舍臺官必有知禮義不顧流俗陳正論以扶綱常者是用緘黙因循至今今臣若又欲言而不敢言是乃偷合茍容之徒非有忠君愛國之心固非陛下期臣之本心亦非愚臣報陛下之夙願也臣備員近侍䝉恩深重扶植綱常臣之志也披寫悃憤臣之忠也惟陛下亮之伏讀聖策有曰朕夙夜拳拳欲正大綱舉萬目使人倫明于上風俗厚于下陛下是言真可為國家扶綱常天地立民極萬世開太平者也然欲正大綱莫先于明人倫厚風俗欲明人倫厚風俗莫先于孝孝者天之經也地之義也國而非此不可以為國家而非此不可以為家人而非此則不可以為人矣故先王制禮子有父母之䘮君命三年不過其門所以教人孝也古者求忠臣于孝子之門誠以居家孝故忠可移于君為人臣者未有不孝于親而能忠于君者也為人君者未有不教其臣以孝而能得其臣之忠者也昔子夏問三年之䘮金革之事無避者禮歟孔子曰魯公伯禽有為為之也今以三年之䘮從其利者吾弗知也陛下于李賢以金革之事起復之歟則賢所未聞也以國家大臣起復之歟則禮所未見也似與先王制禮之意孔子之言不類也似與陛下策臣之初意不合也陛下將以故事起復之歟則為君者當以先王之禮教其臣為臣者當據先王之禮事其君臣不暇遠舉請以宋言之仁宗嘗以故事起復富弼矣弼之詞曰不敢遵故事以遂前代之非但當據禮經以行今日之是仁宗卒從其請孝宗嘗以故事起復劉珙矣珙之詞曰身在草土之中國無門庭之寇難冒金革之名私竊利禄之實孝宗卒允其辭此二君者未嘗拘當代之故事以强起其臣此二臣者未嘗循當代之故事以茍從其君故功澤加于當時名聲垂于後世史冊書之以為盛事士夫誦之以為美談此無他君能教其臣以孝臣有孝可移忠于君也自是而後無復禮義史嵩之援例起復為丞相王黻起復為報政陳宜中起復為宰相賈似道起復為平章此數君者未嘗不以當代之故事起其臣此數臣者未嘗不以當代之故事從其君然生靈以之而困天下以之而亂社稷以之而傾貽禍于當時遺臭于後世此無他君不教其臣以孝臣無孝可移忠其君也詩曰殷監不逺在夏后之世願陛下以宋為監使賢盡孝于君親為當代之大臣陛下以禮處賢為當世之大君此臣之願亦賢之分也以賢身任天下四方多虞而起復之歟則仁宗之時契丹桀驁未為無虞也孝宗之時金人盛強未為無事也陛下必欲賢任天下之事不專門内之私則賢身不可起口則可言冝降温詔俾如劉珙不以一身之戚而忘天下之憂使賢于天下之事知之則必言言之則必盡陛下于賢之言聞之則必行行之則必力則賢雖不起復猶起復也使賢于天下之事知之而不言言之而有隱陛下于賢之言聞之而不行行之而不力則賢雖起復猶不起復也陛下無謂廟堂無賢臣庶官無賢士君盂也臣水也盂員則水隨以員盂方則水隨以方君好諌則臣隨以直君好諛則臣隨以佞陛下誠能于退朝之暇清閒之燕畧崇高貴重之勢親直諒愽洽之士開懷收納降禮尊賢講聖學之大要明君道之急務詢政事之得失察生民之利病訪人才之賢否攷古今之治亂諏風俗之盛衰咨邉防之緩急舍一已之見而以衆人之見為見舍一已之知而以衆人之知為知順已之言則察而逐之使貢諛保寵者無以自容忤旨之言則容而受之使輸忠為國者得以自盡羣策畢陳忠賢並用則賢所欲言者人亦能言之又何必違先王之禮經拘先朝之故事損大臣之名節虧聖明之清化而後天下可治哉夫賢之起復猶諉之曰負天下之重任應先朝之故事比年以來朝廷以奪情為常典搢紳以起復為美名食稻衣錦之徒接踵廟堂據禮守經之士寥寥無聞不知此人于天下之重任何所闗耶于先朝之故事何所據耶先朝自楊溥之外未聞起復某人為某官也今起復之官何如此之多耶以其高謀遠慮足以斷天下之大議耶何未見其發也以其折衝禦侮足以定天下之大難耶何未見其能也以其直節勁氣足以厲天下之士習耶何未見其有也以其深仁厚澤足以浹天下之民心耶何未見其行也以其忠言讜論足以裨朝政之缺失耶何未見其敢也陛下何取于斯人而起復之哉意其平昔不過阿媚權勢豫為巳地及遭通䘮之時則必曲為諛説上䝉天聴不曰此人辦事理可奪情則曰此有故事例當起復既遂奸計畧為虚辭一不俞允歡然就位未有堅請如富弼懇辭如劉珙者也名曰奪情實則貪位名曰起復實則戀禄且婦于舅姑䘮亦三年孫于祖父母禮有期服奪情于夫初無預其妻起復于父初無干其子今或舍館如故妻孥不動乃號于天下曰本欲終䘮朝廷不容雖三尺童子臣恐其不信也為人父者所以望其子之報豈擬至于此哉為人子者報其親之心豈忍至于此哉枉巳者未有能直夫人忘親者未有能忠于君望其直人而先枉巳望其忠君而先忘親陛下何取于斯人而起復之哉昔富弼有母䘮韓琦言起復非盛世事而富公竟不可奪史嵩之遭父䘮太學生羣攻之至數百人而嵩之竟乞終制今大臣起復羣臣不以為議且從而為之辭所以豫為巳地也羣臣起復大臣不以為非且從而成其事亦所以豫為巳地也大臣既無忌羣臣復何慙羣臣既有例大臣復何辭今之大臣固韓琦富弼之罪人今之羣臣又太學生之罪人也上下成風靡然同流致有公無起復之例私為匿服之計利在溥恩則匿服以受封利在得官則匿服以聴選利在掇科則匿服以應舉利在遷官則匿服以候選利在求賄則匿服以之任率天下之人為無父之歸臣不忍聖明之世風俗之敝綱常之壞一至于此也夫愛親之心孩提有之短䘮之説下愚恥言况在冠裳之列聞聖賢之道肯于其親無三年之愛乎特以貪利遂至忘親孔子曰是可忍也孰不可忍也陛下誠能守先王之遺禮遵祖宗之成憲待之以禮義而不縻之以爵祿激之以亷恥而不誘之以名位使積習之敝脱然以除則忠孝之心油然而生特在乎陛下轉移之間耳夫天子者以孝治天下者也大臣者佐天子以孝治天下者也欲孝行于天下必先行于大臣臣願陛下不惑羣議斷自聖衷許令李賢依富弼故事守制依劉珙故事終䘮其餘已起復者悉令追䘮未起復者悉令終制脱有金革之事亦從墨絰之制任國事于外盡心䘮于内朝廷既正則天下自正大臣既行則羣臣自效綱常由是而正人倫由是而明風俗由是而厚士心由是而純紀綱由是而張國勢由是而一矣臣愚昧豈不自知言忤于人殃及于已然夙夜皇皇惟恐上負朝廷下負所學取議于天下貽笑于後世是以昩死為陛下言之惟陛下矜賜優容使讜言日進士氣日振則天下幸甚疏入謫福建市舶司副提舉政務疏成化三年商輅臣叨居内閣慚無補報偶有所見不敢緘黙謹述時政上塵睿覽一勤聖政臣惟自古人君總攬萬幾未嘗不以勤為本如堯舜兢業于一日之間大禹克勤于寸隂之下成湯坐以待旦文王不遑暇食而周書無逸一篇諄諄以逸為戒矧當災異屢見邉方弗靖之日可頃刻而忘于勤哉所謂勤者非必下侵庶職惟在戒逸欲以率人法乾健以御下如各司章奏事無鉅細悉經御覽固已勤矣然而章奏之外豈無所當䆒其心者乎何者為足國裕民之道何者為安邉禦敵之術何者為才賢當任之而不疑何者為奸貪當去之而不吝伏望皇上日以數事詢于大臣謀及庶官或使口陳其説或令疏陳其事乞賜裁度見諸施行如此則臣下有所觀感樂于趨事矣一納諌言臣惟自古帝王未嘗不以求言為務堯舜詢于芻蕘禹聞善言則拜湯從諌弗咈數聖人者其德無以加其治無可議而猶汲汲求言納諫者誠慮夫處崇高之位逸欲易生非有忠言莫聞其實此其德所以愈盛而治所以不可及也下逮漢唐宋之君未始不以納諫而興拒諫而失若唐之太宗慚德雖多惟納諫一事高出近古用能彌縫缺失易亂為治史冊書之以為美談惜聴受之際誠偽相半至其晚年漸不克終是以不能無愧于帝王耳皇上嗣位以來詔㫖丁寧凡政事得失民情利病許諸人直言無隱太平之治其機端在于此伏望自今以後凡遇建言之人並賜優容所言可用即為施行如不可用亦不加罪及成化元年以後廷臣或因建言降調如羅倫軰乞敕吏部查收量復職任如此則善言可進治道可成一儲將材臣惟今之議者率以將臣乏人為慮殊不知自古及今未嘗借于異代特以智勇之士或沈困下僚或棄置閒散才能未著人不見信為今之計冝倣前代武舉之法必湏儲養試驗于先庶可委任責成于後乞命内外重臣會同總兵等官于在京各營各府各衛現任公侯伯都督都指揮千百户鎮撫年四十以下二十以上精加簡選取其體貌雄偉筋力壯健諳曉文墨之人或五六員另擇近便處所時常操練空間之日令讀兵書講求方畧就三營總兵官内委任一員帶管教習每歲一次會官攷試如果兵馬習熟兵書通曉列為上等或弓馬雖熟兵書未通或兵書雖通弓馬未熟列為中等若二長俱無列為下等三歲三攷照例賞罰如此則才識日有所進而將臣不至缺乏一飭邉備臣惟禦敵之要邉城為急邉闗次之大同宣府等處軍馬宜多糧草宜廣若不豫為處置一旦有警倉卒調遣遲則緩不及事速則人馬疲乏虚費糧賞訖無成功兵法所謂待敵者佚趨戰者勞是也乞敕該部㑹議凡前項緊闗城堡酌量添撥軍馬糧草增置墩臺器械遇有聲息就便相機行事不必臨期調撥其山海至鴈門闗中如喜峯古北居庸白羊紫荆倒馬闗口雖有官軍守備然各闗地方散濶多有山坡小徑可通人馬如往年邊警何曽經由正闗率皆越山而來後雖差官修理誠恐歲月經乆或被雨水衝塌或因樵採開通徒守正闗敵至莫禦乞差能幹大臣一員前去督同各闗守備官員帶領軍夫逐一挨踏何者小坡平漫可通上下即令刓削峻壁使敵人不能攀授何者蹊徑可通往來即令營築堅固使人馬不能衝突此則邊闗謹嚴内地人心不致驚疑一汰冗濫臣見吏員攷滿􅃣帶聴選有經十二三年未得除授者中間多有衣食不給借貸于人將來授之以官委之以事何以責其亷介弗至侵漁于下哉又况累積愈多聴選愈乆數年之後宂濫之弊有不可言當道慮其宂濫也于是多方裁損授職之後曾未幾時有以罷軟而去者有以老病而去者混及他途槩加屏黜彼貪酷不才聲跡顯著者固無足怪矣若乃中人以下之資民情必乆而始熟政務必乆而始諳雖欲假以歳月勉圖後功不可得矣夫欲流之清必先濬其源慮官之多而不慎選于出身之際徒裁損于任事之後非良法也乞敕該部今後吏員攷滿仍照宣德正統年間事例而行則賢否不混而宂濫可革一廣蓄積臣竊照各處豫備倉所儲米穀本以賑濟飢民每歲官司取勘口數里老止將中等人户開報其鰥寡廢疾無所依倚著實飢民一槩不報葢慮其無力還官負累賠納故臣思宋時朱子社倉之法豐年取息二分中年取息一分凶年無息止収其本數年之後息米不可勝計此誠良法也今後各處豫備倉飢民闗過米榖不拘豐年中年歲通取息一分有係鰥寡廢疾户内别無人丁無所依倚之人俱照數闗給不必追徴將所收之息抵補其數抵補之後或有餘剰自作正數入倉如此非惟飢民得濟而數年之後倉廩亦漸充實矣訪得各處提調正官不行親閲展轉委付致使看倉大户人等多生奸弊放支之際或揷和糠粃沙土等頃毎米糓一石止得五斗六升者有之及還官之時或刁蹬留難多收斛靣或高估價值折收銀物名雖無息其實加倍今後乞令巡按分巡等官嚴督府州縣正官放收之際務在親行提調痛革前弊庶幾官無虚費民得實用矣一崇聖道臣惟孔子道高德厚功參造化故中庸稱其如天地之無不持載無不覆幬如四時之錯行如日月之代明臣謹按前代封號唐稱文宣王宋加至聖元加大成亦云至矣至聖二字本中庸惟天下至聖言其德之盛也大成二字本孟子作樂者合衆音之小成而為大成言其德之全也伹于道字或有所遺于中庸所稱猶有未盡故元時加封詔云先孔子而聖者非孔子無以明後孔子而聖者非孔子無以法所謂祖述堯舜憲章文武儀範百王師表萬世者也豈非封號未盡于上律下襲故詔詞止及于祖述憲章也歟我朝尊崇孔子遠過前代而封號仍舊豈非缺典臣愚望皇上斷自宸衷于大成之上加封道配天地四字則于孔子之道德無遺中庸之稱述兼盡矣臣又思宋胡安國蔡沈真德秀諸賢雖我朝増入從祀然皆未有封爵乞敕禮部翰林院通行議擬奏請定奪則儒道増光斯文幸甚一謹士習臣惟古者人生八歲入小學教之孝弟忠信禮義亷恥之事以正其心術十五入大學教以窮理正心修已治人之道以明于體用此其教有次序故學有成效後世科舉之事立士無少長率留意于文詞無復有如古人之學宋時朱子慮風俗人才日趨于下也于是輯為小學一書以垂世立教元時許衡嘗稱之曰小學書吾敬之如父母信之如神明是誠㓜學之軌範入德之門户也今之府州縣學生徒俱令兼讀小學教官與之講解義理以啟發良心提督等官按臨之日兼令背誦講說以攷察其實行庶幾學無躐等將來得用矣疏入得旨所言有理著該衙門看了來説乞分豁土田疏成化五年彭韶臣伏聞為臣以不欺為本慮事以大體為先豈不欲順事為恭哉顧以大體所在不敢茍從是乃所以為恭也且以臣所勘真定土地言之真定在堯舜時為冀州之域其賦為第一等或雜出第二等説者以為如周官田一易再易之類葢以其地有間一歲一收者所以賦有不同則是未嘗逐畆定賦而一畆必兼數畆之地明矣洪武二十八年奉聖㫖百姓供給繁勞已有年矣山東河南民人除已入額田地照舊徴科外新開荒田地不間多少永遠不要起科宣德六年戸部官又奏北京八府供給尤多宣宗皇帝准令照例是祖宗之心即堯舜之心也以此真定所屬武強等縣新開地土一向不曽増科至天順二年太監韓諒奏請武強縣踏勘得無糧地五百一頃三十五畆英宗皇帝欽撥一百頃與韓諒外有四百餘頃仍舊與民耕種不曽科糧是英宗皇帝之心即祖宗之心也後因廣寧侯家人劉聰等累年攪擾民間方將前地并韓諒還官地減輕起科誠出無奈今周彧又奏求前地有司不能明白敷奏再量出無糧地七十餘頃葢其地間有多餘故也然地雖間有勢難盡量臣請陳其實頃者親詣本縣見其地有高阜者有低窪者有平坦磽薄者天時不同地理亦異且如亢旱則低處得過而高處全無水澇則高處或可而低處不熟沿河者流徙不常鹻薄者數年一收截長補短取彼益此必須數畆之地僅得一畆之入是以堯舜行錯法于前我祖宗許開種于後良為此也即今彼處人民追賠馬匹起運糧草砍柴人夫京班皁𨽻等項一年常有數般差役以致丁丁皆受役之人歲歲無空閒之日所深賴者顧戀地業盡力耕種以取給朝夕而已今若一畆多餘皆奪為閒地則仰事俯育且無所資其于糧差何暇復計臣知其非死則徙耳自古立國皆重根本今真定近在畿内理宜加厚此臣所謂不可盡量者也而戚里功臣之家錦衣美食與國咸休但能存心忠孝自然富貴兩全奚待與民爭艱食之利哉况聖朝卜世無疆法當垂後土地有限而求者務多亦恐終不能有所應付也臣到彼時百姓扶老攜幼遮道哀告臣不覺自失不忍重擾伏望陛下遠以堯舜為心近以祖宗先帝為法所有賞賚之施聖恩區處外其他田畆乞特憫其祖宗開種艱難念其子孫衣食所託量加寛恤庶㡬民間知有生生之樂沭浴太平歌頌罔極則本固邦寧而世臣亦咸休無窮矣疏入帝詔以田歸民而責韶方命下詔獄校勘資治通鑑綱目疏成化九年謝鐸臣謹奏成化八年十二月十六日太子少保吏部尚書兼文淵閣大學士彭時等傳奉到資治通鑑綱目五十九巻令修撰羅璟并臣鐸等校勘訛誤將翻刻以供睿覽臣退竊自念是書成于宋儒司馬光朱熹之手上師春秋下薄遷固實經世之大典帝王之龜鑑也曩在宋時神宗理宗二君雖嘗留意是書卒不能推而見之政治之間百世之下識者未嘗不望有如陛下今日之舉者是葢不特是書千載一時之幸實宗廟社稷之幸天下生民之幸臣等豈勝欣慶踴躍之至臣待罪翰林今八年矣恒竊愧懼思欲仰酬聖恩于萬一而庸鈍淺暗不識治道之宜凡臣所未能言與所欲言而未能者大臣能言之諌官能言之百司庶職能言之是以口與心謀趦趄前卻不敢無因冒越以至于今臣愚竊觀今日天下之勢如日之中如月之望如四時之夏正易所謂泰所謂豐所謂大有之時也以陛下端拱持盈于上羣臣奔走仰成于下宜若無待于私憂過計者然而中者昃之漸望者弦之漸夏者秋之漸故昔者聖人在泰有艱貞之戒在豐有勿憂之戒在大有有无備之戒葢不如是則無以保其常豐常泰常大有如一日也然則將如之何哉亦曰廣求賢臣如泰九二之得尚中行豐六二之有孚發若大有九二之大車以載相與講學圖治以保此泰豐大有之業于無窮而已然帝王之所謂學者亦豈區區尋章摘句間哉孔子曰智仁勇三者天下之逹德也葢必明足以燭理然後謂之智不然則智之不精至有以君子為小人以小人為君子者矣必理足以勝私然後謂之仁不然則行之不篤至有知其為君子而不能用知其為小人而不能退者矣必氣足以配道義然後謂之勇不然則所知而行者亦且半途而廢至有知用君子而率不果于用知退小人而卒不果于退者矣堯舜禹湯文武之所以為智為仁為勇者具見諸經臣愚不敢遠引備述姑即是書所載漢唐二代之君其于君子小人進退用舍之間亦略可見矣葢必若漢昭帝辯上官桀之詐以信霍光庶可謂之智而苛察之智非智也必若漢文帝割鄧通之愛以從申屠嘉庶可謂之仁而姑息之仁非仁也必若唐憲宗不沮羣議卒任裴度以成淮蔡之功庶可謂之勇而亢暴之勇非勇也彼代宗深信佛法惑于元載報應之言而不能察是以貪昧而昬其智也明皇溺意聲色知李林甫之妬賢嫉能而不能去是以爱欲而害其仁也元帝屈于恭顯之譖而不能直蕭望之之冤是以柔懦而䘮其勇也是數君者其治亂安危之相去何如哉臣愚竊觀今日天下之治上安下泰文恬武嬉積習因仍徇名廢實天下之事恒所令非其所好天下之人皆奉意而不奉法如曰振綱紀而小人之無畏忌者自若如曰勵風俗而士夫之無廉恥者自若飭官司也而汚暴益以甚裕民兵也而疲弊益以極減省有制而興作每疲于奔走蠲免有詔而征歛每困于追呼攷察非不行而倖門日益開簡練非不舉而私撓日益衆賞竭府庫之財而有功者未必勸罰窮讞覆之案而有罪者未必懲凡若此者其蠧根弊源將必有在臣愚誠不足以知之夫以陛下之聰明天縱宵旰勤勞若今日之留意是書豈不知講學用賢以圖政治而故使之至是哉特以人心不可兩用或者一念之間奪于彼則不得務于此惑于外則不得專于内故雖勞于求賢而一或有妨乎已則賢者未必得用雖勤于立政而一或有礙乎已則善政未必得行是惟陛下密察此心懼有于無必開拓此心之所謂智必力行此心之所謂仁必奮發此心之所謂勇以力求所謂中行有孚大車以載之賢知之必深任之必篤以為左右啟沃之助稽之經傳質以是書直以今日之事驗之既往之迹見其用某人而興行某政而得則曰今嘗亦有是乎見其用某人而亡行某政而失則曰今豈亦有是乎反觀内省長慮卻顧兢兢此心罔有内外罔有終始大本既立萬目自隨則前所謂積習因仍徇名廢實之弊皆將一旦革去無有難者而此豐泰大有之業可保無失不異唐虞三代時矣區區漢唐之治如此書所載尚何足道哉臣狂瞽迷謬凡此皆儒生之常談世之雄傑才辯者未必不以為迂腐而不可用然臣力求往古反復究思要之至理竊惟治道之大本莫切于此而救時之急務亦莫先于此舍此而欲别為竒謀良策以坐收唐虞三代之治臣愚不敢負此心以欺陛下也夫以陛下之聖據大有為之勢操大可為之權如天之于萬物欲春而春欲夏而夏欲秋而秋無與牽制無與沮撓斷然而行在聖心一轉移間耳伏惟陛下察臣之愚矜臣之志不以出位為責不以未信為嫌試以今日惓惓是書之意而一行之則宗廟社稷之福天下生民之福皆將不外是矣臣不勝惓惓戰慄待罪之至疏入帝不納陳京衛官職因差騷擾疏成化十一年彭韶臣近准本司所屬驛遞申呈雲南鎮守太監錢能差千户舍人等進象六隻沿途非法拷打勒要銀兩陵辱上下逼打驛官等因到司臣聞自古帝王不患娛心之不足惟患德業之未隆不患備物之未能惟患盈成之難保是以勤儉守已撫綏遠人誠不敢恃太平而自暇逸也葢勤則剛斷于事儉則不貴異物柔遠人則休息物力三者在陛下盛德中無所不至而羣臣或不能仰體聖心其所使官員又不能善于其事因而作非遂使遠方軍民漸至失望思欲告訴而無階也竊見鎮守雲南太監錢能屢貢象馬禽鳥等物雖曰敬奉朝廷之意然而孜孜于勤奉外物未見其為淳實忠愛也伏聞禽畜之類内苑已備非所急用有之無益無之無損萬里傳送勢必勞擾承遣之人狐假妄為亦或有之伏乞陛下廣德業之盛美念成守之艱難斷自聖心將前項物件罷去嚴敕内外臣下敦素守法撫安夷民則逺人歌舞聖治永遠無極矣疏入帝不納嚴賞罰以禁盜賊疏成化十二年王恕臣惟衛所官軍本為防奸禦侮緝捕盜賊征討不庭而設非徒費軍實張虚聲而為美觀也且雲南地方諸種蠻夷雜處其人兇悍好殺不以盜賊為恥盔甲槍刀弓箭挨牌等項軍器家家有之動輙三五十人或一二百人結為羣黨各執軍器流劫村寨抄財殺命或截商旅貨物略無忌憚各處雖有哨堡巡司及巡捕官軍非惟賊衆軍寡不能抵敵亦由馭之無法所以不能成功何也伏覩大明律失誤軍事及主將不固守條内别無與賊對敵殺傷官軍罪坐管軍頭目之例况勝負兵家之常雖智如良平勇如信布亦不能保其必勝奈何近來庸愞不才頭目因向時領軍將校或以輕進被參或以損軍得罪以此遇賊先以退縮保軍為心略無向前勦賊之志幸而稍得其利輙便虚増首級妄報功次以圖陞賞不幸而折損官軍就行隱匿不聞設辭遮掩以避其罪况進則有死而無功退則有生而無罪如此為將校者雖肯提軍出戰為士卒者誰肯奮不顧身此官軍遇賊所以不能成功者也設若臨陣奮勇與賊對敵而死者原䘏其家不罪領軍之官若能成功厚加賞賚其臨陣退縮不能奮勇効死致賊猖獗殺害良民失陷地方依軍法處治設或鼓之再戰誰敢退縮誰不向前此馭之之良法也如此則賊不期破而自破功不期成而自成矣且雲南强賊比之他處數加十倍雖曰習俗使然其致之也則有由焉或土官令家奴糾合部民而為之或管莊之人招引無藉軍民而為之盜以土官并管莊之人為主人贓俱藏于其家誰敢搜捕此雲南強盜所以多于他處也况雲南去京萬里非可以朝發而夕至若將應決强盜依例奏請至秋後然後行刑動經監候一年之上或二三年者亦有之比及奏請至日或死于獄中而不受刑者多矣將何以警兇惡而快人心乞敕該部計議今後官軍人等與賊對敵而死者官給銀物以恤其家本管頭目督軍同戰救不及者不罪如或有功量加賞賚若遇賊退縮不能奮勇不能督戰及見同征軍士被圍故不救援者俱以軍法處治土官并管莊之人縱賊為非者亦治以重罪仍將今後所獲并已獲未結強盜三司㑹問明白同在獄已問結者俱引赴鎮守總兵巡撫巡按等官處㑹審無冤委官就便處決仍于打劫之處梟示然後具奏如此則賞罰當而官軍知所勸法令嚴而賊盜不敢肆矣疏入帝從之論駕帖無印信疏成化十二年王恕臣叨掌風紀材疎學淺不諳事體近聞雲南中衛百戸汪清自京師齎駕帖與刑部郎中鍾蕃錦衣衛百户宋鑑臣竊疑焉伏見五府六部都察院行移天下公文及給批差官公幹或提取犯人俱于所在官司比號相同然後行事又聞駕帖下各衙門則用司禮監印信該科掛號皇城各門印照出闗防所以防詐偽也今齎來駕帖既無監科印信字號又無各門闗防此臣之不能無疑者一也近臣等題邊外脱囘内地軍丁事都察院奉旨選官往勘明白干礙錢能奏來處置今原差郎中鍾蕃等齎前旨于本年九月初六日到雲南提犯人盧安等到官鞫問百户汪清又齎駕帖于本月十一日到送與鍾蕃等此臣之不能無疑者二也然臣所疑者無他惟為事體之不一葢事體一則人皆尊信而無疑事體不一非惟起人之疑且使投間抵隙者得以行其詐而濟其私設駕帖内有賜死重事而無印信可驗其人將死乎不死乎果出于上意而不死則違君命而罪愈重若非上意而死之未免含寃于地下由是言之駕帖之出誠不可無印信臣以疎逖孤蹤劾炙手可熱之權要真可謂不知量者也但緣此事干係地方之安危生民之休戚國體之輕重人心之向背且如昔者交趾守鎮非人因而失䧟騰衝一夫啟釁以致麓賊反叛費無限之錢糧傷無限之生靈至今無老少言之莫不疾首蹙額酸鼻流涕今日錢能所為殆有甚焉將來之禍誠不可測朝廷縱無按問之文部屬縱無訴告之詞臣巡撫其地風聞其事亦當為陛下言之其罪與否朝廷自有法度臣豈敢容私意于其間哉臣不以實告則是黨權要而欺朝廷也其罪將安逃乎縱使倖免亦豈忠臣孝子所忍為乎且忠孝乃臣子之節臣若以不忠不孝存心朝廷將安用臣臣將何以報陛下哉况居其位則思死其官乃臣之分也黨權要而茍利祿臣則不忍為也臣干冒天威不勝戰慄之至疏入改恕南京都察院參贊守備機務能事立解但抵盧安等罪御選明臣奏議巻四
