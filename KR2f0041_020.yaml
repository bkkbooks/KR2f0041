  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_020-1a, image: WYG0445/WYG0445-0270a.png}
body:
  text: 講學親政疏嘉靖元年王鏊臣竊念古之聖君賢相共成至治之隆者蓋由于上下之交而近世之弊多由于上下間隔夫所以為上下之交者果遵何道哉臣伏見陛下即阼以來時御經筵聖學勤矣臣愚猶過憂工夫或間斷而不洽所望燕清之間時召文學侍從之臣從容講論凡帝王為治之大經大法日陳于前則自內及外無非進學之地殷高宗所以惟學遜志務時敏道積于厥躬者此也陛下昧爽視朝聖政勤矣臣愚猶過憂堂陛太懸絶而不親所望視朝之暇時御便殿公卿大臣侍從臺諌逐日輪對從容咨詢生民疾苦政事得失則自朝至暮無非修政之時周宣王所以早朝晏罷卒成中興之名者此也臣聞古人雖在畎畝義不忘君故敢輒效愚誠不自知其言之可用與否其義則臣子事君盡心之道也臣請盡言之惟陛下少留意焉一請講學國家經筵之設其甚矣乎天子自正朝輦御文華公侯九卿大臣盛服侍列羽林之士亦皆環列以聽經筵一開天下欣欣焉傳之以為希闊之典故曰其盛矣乎然一歲之間寒暑皆歇春秋月分不過三五日風雨則免政事有妨則免講之日夙具講章至期講訖綸音賜宴儼然而退上下之情未見其親且密也至于日講可謂親矣然體分猶過于嚴上有疑焉未嘗問下有見焉未嘗獻也昔傅説之告高宗曰學于古訓乃有獲惟學遜志務時敏厥修乃來遜者遜其志如有所不能敏者敏于學如有所不逮成王訪落于羣臣曰學有緝熙于光明弼時仔肩示我顯德行緝熙者繼續而光明之示我顯德行者冀羣臣有以開示之也商周之君其學如此之切夫人主一日萬幾固不暇如儒生學士日夜孜孜然而帝王精一之傳治天下之大經大法古今治亂之迹天人精微之際自非遜敏緝熙亦安望其有得今也闊略如是暴之之日少寒之之日多傅之之人寡咻之之人衆未見其能得也且不獨商高周成為然也漢光武雖在軍中投戈􅊰藝息馬論道至夜分乃罷唐大宗延四方文學之士房杜褚薛輩十八人分番直宿討論經籍或至夜分今貞觀政要與魏徵所論亦可見矣宋世賢主宫中消日惟是觀書居常禁中亦有日課翰林侍從日寓直禁中以備顧問我太祖高皇帝初得天下開禮賢館與宋濓劉基章溢輩日相講論其後聖學高明詔告天下皆出御製睿翰如飛羣臣拱視今御製文集是也仁宗皇帝臨御建𢎞文館于思善門之右文學之臣數人入直時至館中講論孝宗皇帝經筵之外每觀永樂大典又嘗索太極圖西銘等書于宫中玩之尤嗜故學士沈度之書日臨數過夫自古帝王之學如此祖宗之學如此陛下睿哲自天春秋鼎盛講明聖學正其時也臣愚特望于便殿之側修復𢎞文館故事妙選天下文學行藝著聞者七八人更番入直內閣大臣一人領之如先朝楊溥故事陛下萬幾有暇時造館中屏去法從特霽天威從容詢問或講經或讀史傳或論古今成敗或論民間疾苦間則遊戲翰墨雖詩文之類亦惟所好而不禁蓋亦日講之義而加親焉大略如家人父子上有疑則必問下有見則必陳日改月化有不知其然而然者夫時御經筵所以昭國家之盛典曰造𢎞文所以修聖學之實功如是不已則聖德日新又新高宗成王不得專美于前矣一請親政易之泰曰上下交而其志同其否曰上下不交而天下無邦蓋上之情逹于下下之情逹于上上下一體所以為泰上之情壅閼而不下逹下之情壅閼而不上聞上下間隔雖有國如無國矣所以為否也交則泰不交則否自古皆然而不交之弊未有如近世之甚者君臣相見止于視朝數刻上下之間章奏批答相關接刑名法度相維持而已非獨沿襲故事亦其地勢使然何也國家常朝于奉天門未嘗一日廢可謂勤矣然堂陛懸絶威儀赫奕謝恩見辭惴惴而退上何嘗問一事下何嘗進一言哉此無他地勢懸絶所謂堂上逺于萬里雖欲言無由言也臣以為欲上下之交莫若復古內朝之法蓋周之時有三朝庫門之外為外朝詢大臣在焉路門之外為治朝日視朝在焉路門之內曰內朝亦曰燕朝玉藻云君日出而視朝退適路寢聽政蓋視朝而見羣臣所以正上下之分聽政而適路寢所以通逺近之情漢制大司馬左右前後將軍侍中散騎常侍散騎諸吏為中朝丞相以下至六百石為外朝唐皇城之北南三門曰承天元正冬至受萬國之朝貢則御焉蓋古之外朝也其北曰太極門其內曰大極殿朔望則坐而視朝蓋古之正朝也又北曰兩儀門其內曰兩儀殿常日聽朝而視事蓋古之內朝宋時常朝朝則文德殿五日一起居則垂拱殿正旦冬至聖節稱賀則大慶殿賜宴則紫宸殿或集英殿試進士則崇政殿侍從以下五日一員上殿謂之輪對則必入言時政利害內殿引見亦或賜坐或免穿靴蓋亦三朝之遺意焉蓋天有三垣天子象之正朝象太微也外朝象天市也內朝象紫微也自古然矣國朝聖節正旦冬至大朝會則奉天殿即古之正朝也常朝則奉天門即古之外朝也而內朝獨缺焉非缺也華蓋謹身武英等殿豈非內朝之遺制乎洪武中如宋濓劉基永樂以來如楊士竒楊榮等日侍左右大臣蹇義夏原吉等嘗奏對便殿于斯時也豈有壅隔之患哉今內朝罕復臨御常朝之後人臣無復進見三殿高閟鮮或窺焉故上下之情壅而不通天下之弊由是而積孝宗晚年深有慨于斯屢召大臣于便殿講論天下事惟陛下逺法聖祖近法孝宗盡剗近世壅隔之弊常朝之外御文華武英倣古內朝之意大臣三日或五日一次起居侍從臺諌各一員上殿輪對諸司有事咨決上據所見決之有難決者與大臣面議之不時引見羣臣凡謝恩見辭之類皆得上殿陳奏虛心而問之和顔色而道之如此人人得以自盡陛下雖身居九重而天下之事燦然畢陳于前夫外朝所以正上下之分內朝所以通逺近之情如此豈徒除近世壅隔之弊哉唐虞之世明目逹聰嘉言罔伏野無遺賢亦不過是而己疏入帝優詔報聞請正綱常昭典禮疏嘉靖元年楊廷和臣忝為三孤之官謬當輔導之地凡諸司之所守者皆臣之所當遵者也況綱常典禮之大者哉近者陛下欲追崇本生父母禮官據禮以守其職科道交論以定其制臣與同官蔣冕毛紀費宏等上稽古史之舊俯察庶言之同執奏再三不蒙采納續奉皇太后懿旨加帝后之稱既已力排天下之公議曲伸罔極之私恩矣後乃再奉詔旨欲于帝后之上復加皇字臣聞命驚惕不敢奉行隨即封還請從前議豈敢無禮于君取罪于已哉誠以典禮所繫不可壞之于朝廷綱常所關不可廢之于今日也昔者魯夏父弗忌逆躋僖公其死也焚煙徹于上宋濮園之議論者謂韓琦歐陽修皆失當夫生莫逃于公議死莫逭于天刑何也蓋人臣事君不以禮議禮不以正之鑒戒也陛下謂臣等所陳皆推至義朕之所奉昊天至情又令臣等不必拘于史志臣思自古帝王入繼大統皆不行追崇之典豈忘昊天之情無罔極之恩哉而儒者之論亦未嘗議其不孝何也天無二日國無二統身無兩考尊無二上守此者謂之綱常行此者謂之典禮典禮一失綱常以隳拂萬方之心也萬世之議豈聖人以禮事親以孝治天下之道哉綱常典禮之在世譬如日月之在天江河之在地自三代至今日萬古不可變非若制度文為可以損益不相沿襲也豈可謂前史所載非今日之制而不遵哉疏入帝不納議大禮疏嘉靖元年張璁臣聞孝子之至莫大乎尊親尊親之至莫大乎以天下養陛下嗣登大寶即議追尊聖考奉迎聖母誠大孝也廷議執漢定陶宋濮王故事謂為人後者不得顧私親夫天下豈無無父母之國哉禮曰禮非天降非地出人情而已漢哀帝宋英宗固定陶濮王子然成帝仁宗皆豫立為嗣養之宫中其為人後之義甚明故師丹司馬光之論行于彼一時則可今武宗無嗣大臣遵祖訓以陛下倫序當立而迎立之遺詔曰興獻王長子未嘗著為人後之義則陛下實承祖宗之統與豫立為嗣者不同議者謂孝廟德澤在人不可無後假令聖考尚存嗣位恐弟亦無後兄之義且迎養聖母以母之親也稱皇叔父則當以君臣禮見恐子無臣母之義禮長子不得為人後聖考止生陛下一人利天下而為人後恐子無自絶其父母之義故在陛下謂入繼祖後而得不廢其尊親則可謂為人後以自絶其親則不可夫統與嗣不同非必父死子立也漢文承惠帝後則以弟繼宣帝承昭帝後則以兄孫繼若必奪此父子之親建彼父子之號然後謂之繼統則古有稱高伯祖皇伯考者皆不得謂之統乎臣竊謂今日之禮宜别立聖孝廟于京師使得隆尊親之孝且使母以子貴尊與父同則聖考不失其為父聖母不失其母矣疏入帝大喜悅下廷臣議議大禮疏嘉靖元年方獻夫臣惟先王制禮本緣人情君子論事當究名實竊見近日禮官所議有未合乎人情未當乎名實者一則守禮經之言一則循宋儒之説也臣獨以為不然按禮經喪服傳曰何如而可以為人後支子可也又曰為人後者孰後後大宗也大宗者尊之統也不可以絶故族人以支子後大宗也適子不得後大宗為是禮者蓋謂有支子而後可以為人後未有絶人之後以為人後者也今興獻帝止生陛下一人别無支庶乃使絶其後而後孝宗豈人情哉且為人後者父嘗立之為子子嘗事之為父故卒而服其服今孝宗嘗有武宗矣未嘗以陛下為子陛下于孝宗未嘗服三年之服是實未嘗後孝宗也而強稱之為者豈名實哉為是議者未見其合于禮經之言也又按程頥濮議謂英宗既以仁宗為父不當以濮王為親此非宋儒之説不善實今日之事不同蓋仁宗嘗育英宗于宫中是實為父子孝宗未嘗育陛下于宫中其不同者一孝宗有武宗為子矣仁宗未嘗有子也其不同者二濮王别有子可以不絶興獻帝無别子也其不同者三豈得以濮王之事比今日之事哉為是議者未見其善述宋儒之説也若謂孝宗不可無後故必欲陛下為子此尤不逹于大道者也推孝宗之心所以必欲有後者在不絶祖宗之祀不失天下社稷之重也豈必拘拘父子之稱而後為有後哉孝宗有武宗武宗有陛下是不絶祖宗之祀不失天下社稷之重矣是實為有後也且武宗君天下十有六年不忍孝宗之無後獨忍武宗之無後乎此尤不通之説也夫興獻帝當父也而不得父孝宗不當父也而強稱為父武宗當繼也而不得繼是一舉而三失焉臣未見其可也且天下未嘗有無父之國也瞽瞍殺人舜竊負而逃今使陛下舍其父而有天下陛下何以為心哉臣知陛下純孝之心寧不有天下決不忍不父其父也説者又謂興獻帝不當稱帝此尤不逹于大道者也孟子曰孝子之至莫大乎尊親周公追王太王王季子思以為逹孝豈有子為天子父不得稱帝者乎今日之事臣嘗為之説曰陛下之繼二宗當繼統而不繼嗣興獻之異羣廟在稱帝而不稱宗夫帝王之體與士庶不同繼統者天下之公三王之道也繼嗣者一人之私後世之事也興獻之得稱帝者以陛下為天子也不得稱宗者以實未嘗在位也伏乞宣示朝臣復稱孝宗曰皇伯興獻帝曰皇考别立廟祀之夫然後合于人情當乎名實非惟得先王制禮之意抑亦遂陛下純孝之心矣疏入帝大喜下廷臣議遵祖訓以端政本疏嘉靖元年夏言臣嘗伏讀聖祖之訓有曰凡廣耳目不偏聽所以防壅蔽而通下情也又曰朝堂決政衆論稱善即與施行大哉王言此誠子孫萬世帝王所當遵守者也項緣先朝內外姧人交通盤據蒙蔽主聽竊弄威柄朝政廢弛言路靡通將一應章奏或遷延沈匿不與聞逹或揑改旨意肆為欺罔以致豫奪非宜刑賞失當及至言官論列又多留中不出甚者假以朝廷震怒動遭譴謫箝制人口不復敢言是以下情不能上通真贋無從辨詰紊亂政本養成禍機壞祖宗法莫大于此重以竒邪淫巧百爾誘惑經筵輟講積有歲年浹月臨朝恆以昏暮君臣隔絶形迹疏違由是威福大權盡墮姧人之手綱紀大壞姦黨橫行蓄患邊防毒流海內上干天變下失人心十六年中大難繼作貽憂社稷壅蔽之禍兹亦極矣如先年劉瑾揑寫旨意既己伏誅而近日錢寧家又復搜出題奏本四十餘件江彬阻抑邊情本一百三十六件司禮監隱藏不報本又數百件似此欺蔽可為寒心尚賴皇天眷祐宗廟有靈社稷不致顛危乃真幸耳兹者伏遇陛下聰明天錫仁孝夙聞四方萬國延頸拭目瞻望太平國家安危之機俗化汙隆之候天下治亂之分君子小人進退消長之際于此焉決昨者伏覩明詔痛革先朝敝政洞察小人姦狀中外臣民不勝歡慶以為我朝百六十年以來未有如此詔今陛下撥亂之功可謂盛美蔑以加矣但臣以為本源之地不治則末流尚有可憂伏願陛下奉天法祖總攬舊綱明目逹聰大開言路臣請自今伊始每日視朝之餘即御文華殿聽政凡中外大小臣工所上章疏凝神注思逐一俯賜觀覽不時召入內閣大臣以備顧問從容講論斟酌裁決凡事情重大論議矛盾者則敕下廷臣集議不宜謀及褻近徑從內批如先朝之為者即有寢罷亦宜明示外廷可否以彰陛下至公無我之度臣又竊念內閣機密重地祖宗設官立法必極周詳擬旨進奏宜必各有職掌綸音渙號亦必有所紀載前項姦蔽似若無可容者何以公然隱匿而無所稽憑肆行矯詐而無復忌畏則是關防之術尚若闊疏進擬之權容有侵越而小人乘勢因得以竊弄之矣然臣考之司禮監職掌著之祖訓內閣創置列于會典臣愚欲乞陛下仰遵聖祖大訓載稽故事敕令內閣專一擬旨司禮監專一進奏仍令內閣置立印信文簿一扇或鈐以御寶將逐日聖旨裁決過事件明白開載每五日一次類進揭帖與六科旨意題本對同雖陛下聖旨有所豫奪亦必經由內閣議而後行事有可否許令執奏不宜復有傳奉之制更乞敕令御前紀事給事中二員朝罷赴左順門會同司禮監官收接一應章奏紀其數目送吏科附簿以備查照如此則大公至正明白洞逹壅蔽矯詐沈匿之姦舉無所容而朝廷之政將無一不出于正矣疏入帝從之請實邊儲以固人心疏嘉靖元年夏言臣聞禦戎之䇿守備為本兵之所屯以食為急茍無儲蓄是棄封疆故曰兵不理則無可用之師食不足則無可固之地自昔敗亂之故鮮不由斯今宣大二鎮凋敝極矣蓋緣先朝六軍之供億頻繁萬姓之瘡痍未復兼之將帥無恥刻剝恣行撫臣不才侵漁太急加以連歲荒旱穀粟不登況近日傳聞二鎮飢窘比昔尤甚米價騰貴敻異往時所欠軍糧多未補足人懷愁怨日不聊生又聞大同飢民爭啖人肉宣府飢卒搶奪市米教場操枵腹之軍至不肯舉旗以應號令營門卧飢羸之卒至不能跨馬以執器械兵勢委靡人心渙散計其無事已甚阽危有如敵騎不測果于內侵京軍出征復來駐劄臣恐餽餉不繼無剋敵之資儲蓄不充非屯兵之計萬一制御乖方三軍觖望拊循失䇿邊人離心以不制之兵懷無聊之志意外之患何可不虞前此雖嘗發銀十萬或二十萬不過補塞罅漏未見大振頽廢為今之計所宜急處宣大資糧專以充足軍倉稍復賑濟邊氓昨該提督軍務刑部右侍郎臧鳯奏乞穵運漕糧數十萬石以濟軍餉可謂老成長慮知所先務者矣臣愚欲乞陛下特敕廷臣再加會議將通倉應儲漕糧或已貯在倉或現在水次者撥發三四十萬石每石加以出關腳價米若干責令侍郎臧鳯設法調度挽運出關其關內合用人力車腳必須計處周密勿致騷動仍令本官不必待有警報先著領敕前去專務區畫糧料賑活疲人一面就彼簡閲邊士振揚軍聲其所運米斛不必盡赴宣府宜分貯懷來保安等城以便附近官軍輪班支給其大同去關稍逺宜敗貯二鎮交界要害城堡以備主客兵馬就便關支更令塞外乏食流亡之人挑負轉運資以腳米酌量時勢緩急略加賑恤庶軍民得以大沾實惠救百萬生靈之命收三軍離散之心外可以防敵患內可以固軍情此實今日所當留意者也伏望陛下軫念邊務俯察愚忱邊圉幸甚生靈幸甚疏入帝從之大禮議嘉靖元年毛澄臣伏考漢成帝立定陶王為皇太子立楚孝王孫景為定陶王奉共王社共王者皇太子本生父也時大司空師丹以為恩義備至今陛下入承大統宜如定陶王故事以益王第二子崇仁王厚炫繼興王後襲興王主祀事又考宋濮安王之子入繼仁宗宗後是為英宗司馬光謂濮王宜尊以高官大爵稱皇伯而不名范鎮亦言陛下既考仁宗若復以濮王為考于義未當乃立濮王園廟以宗朴為濮國公奉濮王祀程頥之言曰為人後者謂所後為父母謂所生為伯叔父母此生人之大倫也然所生之義至尊至大宜宜别立殊稱曰皇伯父某國大王則正統既明所生亦尊崇極矣今興獻王于孝宗為弟于陛下為本生父與濮安懿王事正相等陛下宜稱孝宗為皇考改稱興獻王為皇叔父興獻大王妃為皇叔母興獻王妃凡祭告興獻王及上箋于妃俱自稱姪皇帝某則正統私親恩禮兼盡可以為萬世法議奏帝怒曰父母可更易若是耶命再議大禮議嘉靖元年汪俊臣謹惟祖訓兄終弟及指同産言今陛下為武宗親弟自宜考孝宗明矣孰謂與人為後而滅武宗之統也儀禮傳曰為人後者孰後後大宗也漢宣起民間猶嗣孝昭光武中興猶考孝元魏明帝詔書后無子擇建支子以繼人宗孰謂入繼之主與為人後者異也宋范純仁謂英宗親受詔為子與入繼不同蓋言恩義尤篤尤當不顧私親非以生前為子者乃為人後身後入繼者不為人後也蕚言孝宗既有武宗為之子安得復為立後臣等謂陛下自後武宗而上考孝宗非為孝宗立後也又言武宗全神器授陛下何忍不繼其統臣等謂陛下既稱武宗皇兄矣豈必改孝宗稱伯乃為繼其統乎又言禮官所執者不過前宋濮議臣等愚昧所執實不出此蓋宋程頥之議曰雖當專意于正統豈得盡絶于私恩故所繼主于大義所生存乎至情至于名稱統緒所繫若其無别斯亂大倫殆為今日發也謹集諸章奏惟進士張璁主事霍韜給事中熊浹與蕚議同其他八十餘疏二百五十餘人皆如臣等議議奏留中辭封爵乞普恩賞疏嘉靖元年王守仁臣謹奏竊念臣以凡庸在正德初年以狂言被譴隨加收録洊陟清顯繆膺軍旅之寄猥承巡撫之令後值寧藩肇變臣時適嬰禍鋒義當死難不量勢力與之掎角賴朝廷威靈幸無覆敗既而讒言朋興幾陷不測臣之心事未及自明乃幸天啓神聖陛下龍飛開臣于覆盆之下而昭之日月憫惻慰勞至勤詔旨憐其烏鳥之情使得歸省推大孝之仁優之以存問超厯常資授以留都本兵之任懇疏辭免慰旨益勤在昔名臣碩輔鮮有獲是于其君者而况于臣之卑陋淺劣將何以堪此乎今又加以封爵之崇臣懼功微賞重無其實而冒其名憂禍敗之將及也夫人主于嚬笑之微不以假于匪人而況爵賞之重乎人臣之事君也先其事而後其食食且不可而況于封爵乎且臣之所以不敢受爵其説有四不敢不為陛下一陳其實寧藩不軌之謀積之十數年矣持滿應機而發不旬月而敗此非人力所及也上天之意厭亂思治將啓陛下之神聖以中興太平之業故蹶其謀而奪之魄斯固上天之為之也而臣欲冒之臣叨天之功矣其不敢受一也也先寧藩之未變朝廷固已隂覺其謀故改臣以提督之任假臣以便宜之權使據上遊以制其勢故臣雖倉猝遇難而得以便宜調兵與之從事當時帷幄謀議之臣則有若大學士楊廷和等該部調度之臣則有若尚書王瓊等是皆有先事禦備之謀所謂發縱指示之功也今諸臣未蒙顯褒而臣獨冒膺重賞是掩人之善矣其不敢受者二也變之初起勢焰猖熾人心疑懼退沮當時首從義師自伍文定邢珣徐璉戴德孺諸人之外又有知府陳槐曽璵胡堯元等知縣劉源清馬津傅南喬李美李楫及楊材王冕顧佖劉守緒王軾等鄉官都御史王懋中編修鄒守益御史張鼇山伍希儒謝源等諸人臣今不能悉數其間或摧鋒陷陳或遮邀伏擊或贊畫謀議監録經紀雖其平日人品或有清濁高下然就兹一事而言固亦咸有捐軀效死之忠勠力勤王之績所謂同功一體者也今賞當其功者固已有之然施不酬勞之人尚多也其帳下之士若聽選官雷濟已故義官蕭禹致仕縣丞龍光指揮高睿千户王佐等或詐為兵檄以撓其進止壞其事機或偽書反間以離其心腹散其黨與隂謀祕計蓋有諸將士所不預知而辛苦艱難亦有諸部領所未嘗歷者臣于捷奏本內既不敢瑣瑣煩瀆今聞紀功文册復為改造者多所刪削其餘或力戰而死于鋒鏑或犯難而委于溝渠陳力效能者尤不可以枚舉是皆一時號召之人臣于顛沛搶攘之際今已多不能記憶其姓名籍貫復有舉人冀元亨者為臣勸説寧濠反為姦黨搆陷竟死獄中以忠受禍為賊報讎抱冤齎恨實由于臣雖盡削臣職移報元亨亦無以贖此痛此尤傷心慘目負之于冥冥之中者夫倡義調兵雖起于臣然猶有先事者為之指措而戮力成功必賴于衆則非臣一人之所能獨濟也乃今諸將士之賞尚多未稱而臣獨蒙冒重爵是襲下之能矣其不敢受者三也臣世受國恩虀身粉骨亦無以報謬當提督重任承乏戎行茍免鰥曠況又超擢本兵既已叨冒踰分且臣近年以來憂病相仍神昏志散目眩耳聾無復可用于世兼之親疾顛危命在朝夕又不度德量分自知止足乃冒昧貪進據非其有是忘己之恥矣其不敢受者四也夫殃莫大于叨天之功罪莫甚于掩人之善惡莫深于襲下之能辱莫重于忘己之恥四者備而禍全故臣之不敢受爵非所以辭榮也避禍焉已爾伏願陛下鑒臣之辭出于誠懇收還成命容臣以今職終養老親茍全餘喘于林下以所濫施于臣者普于衆以明賞罰之典以彰大小之功以慰不均之望以勵將來效忠赴義之臣臣死且不朽矣不勝受恩感激懇切願望之至疏入得旨卿倡義督兵𠞰除大患特加封爵以昭公義宜勉承恩命所辭不允該部知道慎刑獄疏嘉靖元年韓邦竒臣謹奏為慎刑獄以光新政事臣聞刑者人主治天下之大防而天下治忽所由繫書稱堯舜之治至于四方風動其究歸于臯陶象刑之功故刑者人主之所當重慎而不可忽者也國家法古制刑內則總之三司外則總之提刑按察司後又特差監察御史審録都御史巡撫且付以糾察之寄其法詳且盡矣矣至于錦衣衛之設蓋以待夫隱罪極惡天子非時震怒特遣下之非以為常者也然其制列聖相承止行于畿內至正德二年以來權姦相繼用事假此報復私讎中傷善類用張淫威迫脅海內官校紛紛而出所在有如豺虎破家亡身者郡邑相望天下洶洶幾至大亂使非聖明繼世中興革而正之天下未可知也近者聖母駕過山東高唐州同知金波供應有缺陛下詔錦衣衛官校拏至京師天下愕然驚疑謂聖明在上亦復有此夫金波小官何足以動天下之聽聞而錦衣官校出京拏人則固天下聽聞之所繫也伏望陛下特宥金波之罪自後在外府州縣官有犯付之按察司三司官有犯付之撫按官撫按官有犯付之三法司如此則內外相承體統不紊罪皆閲實孰可逃刑哉臣以外服之臣乃敢塵穢聖聽罪誠難逭但臣山東方面官高唐臣山東屬州金波臣山東屬官陛下差錦衣衛官校拏人自臣山東始故敢輒肆狂瞽以獻芹曝惟聖明采擇焉疏入下都察院覆題御選明臣奏議卷十七
