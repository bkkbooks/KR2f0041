  text: 欽定四庫全書御選明臣奏議巻十三
  hash: sha256:c8a000e91e77f1847c084513308480b8bdc1d45b2614f7c91877241a45ff9563
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_016-1a, image: WYG0445/WYG0445-0206a.png}
body:
  text: 舉糾漕運官状正徳五年邵寶臣謹題為奉命催儹糧船舉大義以糾運官事查得本年九月初五日濟寧州地方被大夥流賊燒燬糧船臣仰思國計不勝驚易除具題處置外參看得漕運官軍值此流賊有不能不避之勢有不容不敵之義有不當不用之法有不可不體之情必酌于此而行之此朝廷不得不舉之事臣愚不敢不言之職也蓋此賊嘯聚人衆馳突數千里内攻城掠野莫有攖其鋒者顧此運軍固非其敵此所謂不能不避之勢也但軍至十萬之衆既有都御史總兵參將為統制又有把總都指揮等官分領之又有指揮千百户等官管押之大小相承居則有衛行則有次導前距後儼然行師之規為各官者儋爵食禄孰無是分尊君親上孰無是心死衆死制孰無是責此所謂不容不敵之義也今或圖便以先或偷安而後遂致卒伍乖方紀律失序軍不足道未聞何官以智而全何官以勇而傷何官以義而死慌忙披靡實與建置軍運之初意不副即今山東等處被賊攻圍失事地方自府州縣至守巡兵備巡撫等官現䝉差官查勘論罪臣愚竊謂漕運都御史總兵參將體同巡撫把總都指揮等官體同藩臬指揮千百户等官體同守令以此較彼其罪惟均倘以力之不敵縱而不問則何所懲以為他日責成之地哉此所謂不當不用之法也然各處兑運軍船到遲則罪在軍民糧納遲則罪在民若水旱災傷奏報失時以致𣲖豁相戾則罪在有司官吏向者漕運衙門雖經議准立法稽查縁地逺時促卒之罪可無歸人不知警況各處衛所軍無完伍船無完具料無完價口無完糧身無完衣棄逺父母妻子終嵗勤動不得休息加以繁科重斂叢于一身如此而責其死力可乎此所謂不可不體之情也臣待罪計司奉命督運惟兹事闗朝廷竊有所見不敢不言如蒙敕部院大臣詳議其是行移新任總督將把總等官逐一查勘職名并失事實跡明白的確照例于運事畢日拏問治罪總兵參將任大責重亦合請命行法庶㡬分義昭明政令振肅自是厥後雖有玩心不敢復作仍敕本部毎年例差監兌官員務選精鍊之人令其親詣各水次從實查勘除依限交兌外若有遲誤者必根究所由或在軍或在民或在官吏指實參奏係軍職行漕運衙門係民職行各該廵按御史提問如律照例發落不許視為泛常茍且塞責其軍伍船料衣糧缺少及一應科斂宿弊明詔各該衙門速為處置嚴加禁約使上下相安遷善逺罪漸復漕規之舊天下幸甚奏入帝從之獻納愚忠疏羅欽順臣惟事君之義以獻納為恭謹竭愚忠上陳四事一曰修徳臣聞惟徳可以動天惟天佑于一徳竊嘗仰窺天意其眷佑陛下甚隆是以賊臣劉瑾之蓄謀雖深而太監張永之輸忠甚力葢有陰相之者非偶然也陛下既以褒賞功臣延其後嗣獨不思所以奉答天眷以祈永命乎奉答天眷無他惟増修其徳而巳夫孝奉九廟敬事兩宫親睦宗藩禮接大臣仁愛萬民凡此皆修徳之實也而其要則在勤御講筵痛節遊宴盛徳髙于千古天眷申于萬年宗社靈長之慶其必在兹二曰勤政臣聞虞舜兢業以圖㡬周文和民而忘食我祖宗躬勤聽斷逺法舜文毎日昧爽臨外朝府部等衙門以次奏事巳而又臨内朝司禮監等衙門亦以次奏事皆有定規臣嘗伏讀髙皇帝詔㫖有云朕居江東三十六年未嘗見日而臨百官又嘗伏讀睿皇帝聖諭有云朕負荷天下之重五更二㸃起齋潔具服拜天謁奉先殿行禮畢視朝循此定規定時不敢有誤退朝至文華殿或政事有闗大臣者則召而訪問商㩁臣惟此皆陛下家法所當率而行之者也奈何近年以來視朝愈簡時或一出多至日中萬務糾紛未遑盡理流𫝊四逺虧損實多臣愚伏願陛下常以昧爽視朝使大小之臣趨走之吏有職役者皆得以盡亹亹之勤于昭昭之際而事無不康朝集之員蠻方之長當見辭者皆相與瞻穆穆之容于蒼蒼之表而心無不肅遇有大疑未決大政未安即乞如舊規特御文華殿宣召大臣從容商㩁憂勤愓厲之心果無間則安富尊榮之福亦無疆矣三曰作士氣頃者賊瑾盜權擅作威福毒痡四海不忍究言在朝臣工孰無知覺曾弗能抗已愧于心或首開趨附之端或陰為羽翼之助臣不知後人之視今日其猶以為國有人乎否耶今士氣積衰理宜振作振作之要舉錯為先蓋凢為賊瑾挾私懷忿而斥逐之者大抵多正直之士也近雖節次起用而其大者或遺凡為賊瑾超遷累擢而委任之者大抵多邪佞之徒也曩雖節㳄誅鋤而其大者猶在當治化更新之日實世道轉移之機伏願陛下參攷羣言勿為私意之所牽制勿以一𤯝棄大善勿以微勞貰大姧伸阨窮斥朋比退讒謟進剛方意嚮既明士風立變庶㡬緩急之際有可倚仗之人不然國之安危未可知也四曰審時宜臣聞禮莫大於時易貴通其變祖宗立國參酌古今其大經大法之昭垂蓋與天地相為終始至于剛柔之用損益之權理須隨時勢難執一臣嘗推尋故事竊見永樂年間之所行已不盡如洪武而大者至建新都宣徳正統年間之所行又不盡如永樂而大者至捐交阯是非固欲相反皆其勢不得不然然則今日之所宜行有不容以常例拘者救時之道也臣聞至誠成物猶待悠久漢人為吏至長子孫祖宗盛時在外巡撫大臣及方面府州縣正佐官員莫不久于其任如周忱巡撫蘇松等處凡十有八年陳本深知吉安府亦十有八年其他但有遷改往往近八九年故人無茍且之心而事無廢弛之患然而遷轉之際不盡循資惟其才賢而已如周忱自郎中即陞侍郎陳本深自主事即陞知府其他科道部屬或即陞都御史布政按察使知府髙第或即陞布政使蓋超遷之法與久任之法相為流通超于前則後之久任皆謂當然超于後則前之久任孰云淹滯人心競勸職此之由頃年以來専用資格一資半級魚貫以升自西徂東倐近而逺往來如織勞擾多端奮勵有為者或開端而未竟其功因循自便者第謹守以坐待其進欲求事理民安其可得乎臣愚以為時方多事所宜破常格拔真才省逓遷隆久任以為陛下分憂共理惟陛下主張于上則大臣有以奉行于下矣此時宜之所當審者也臣聞去盜之䇿或動干戈用兵之道必嚴賞罰今自京城内外至山東河南四川湖廣江西廣東等處盜賊羣興大者攻陷城池僭稱名號小者燔燒村落殺擄人民朝廷節嘗慎擇文武大臣俾其分頭招捕或㸃集民壯或摘撥禁軍區畫多方而成功未奏者臣竊推求其故無乃賞罰皆輕之所致耶兵法有之軍無財士不來軍無賞士不往夏書亦云威克厥愛允濟今大臣雖奉敕行事然將士有不用命者未嘗輒誅一人或有勇力超羣敢于殺賊及機謀深宻堪以為間者數金之賞又不足以易其一死欲以重賞購士則府庫之財大抵劫掠無餘安危所闗變在呼吸始謀不善後悔何追臣竊聞頃者查抄賊瑾家財金銀動踰百萬此皆萬民衣食之資而聚為賊瑾囊篋之實民之為盜固其所也夫盜起由財之聚則財散而盜可平散小儲以成大儲此臣之所為陛下願也陛下幸聽臣言乞于前項用兵地方各分給入官銀錢十數萬兩俾討賊者以為購賞之資仍乞假以便宜之權俾其一切以軍法從事前有重賞後有重罰則將士無不用命間諜無不盡心盜賊之平計日可待此又時宜之所當審者也夫天下至大可言之事蓋不止此第臣愚陋所見弗周自源徂流纔得其四伏乞以前二事躬行于上以後二事付大臣討論斟酌奏請施行誠致察于邇言必廣求乎衆論盡聞天下之利害以謹百司之廢興馴致太平實由于此疏入帝不納議邊軍入衛疏正徳七年李東陽臣聞有獻宻計者託言京軍不習戰陣欲調宣府邊軍三千入衛京師而以京軍屯戍邊陲毎歲春秋番換臣惟京邊官軍各有分地必有急事乃可互相應援今無事而動一不便也京軍備邊不習戰陣難保必勝恐損國威二不便也京軍出京駭人耳目𫝊聞各處未免驚疑三不便也京軍出外倚恃强勢占住房屋索要錢物需索酒食將官䕶短而不肯禁邊方受害而不敢言四不便也邊軍在内傲睨軍民蔑視官府小則怠玩大則違法治之則或不能堪縱之則愈不可制五不便也逺違鄉井抛棄骨肉或風氣寒煖之不相宜或盤費供給之不相續六不便也糧草之外必用行糧布花之外必須賞賚非𦂳急不得已之時為糜費無紀極之計七不便也往來交替無有寧息倉猝之際或變起于道途厭倦之餘或患生于肘腋八不便也示京營之空虚見國中之單弱九不便也西北諸邊脣齒之地正須䇿應脱有疎失咎將誰歸十不便也凡此一事不便者有此數端伏望博采人言務求至當實宗社之福也疏入帝不納地方利害疏正徳九年胡世寧臣竊惟盜賊之興即當撲滅若其既久而多不得不撫捕兼行者蓋以情則脅從當罔治以勢則延曼難盡誅也故如漢武帝以南征北伐之威不能盡殺盜賊及後輪臺詔下休兵恤民盜賊不見其迹又如漢龔遂當宣帝强盛之時下令勃海諸持田器者為農民吏無得問固不聞其誘使釋兵而盡殺之也自古招撫之失有當戒者謂如唐宋金元之季官其渠帥授以土地假以兵權更或因其懈弛而遂行誘殺見其跋扈而復事姑息以是威信兩失紀綱大壞坐致衰微耳若令委任得人撫處有道萬無是失也江西之賊華林瑪碯𠞰散無餘東鄉遺黨尚及千人姚源或云三倍其數其他尚有贛州舊招之徒新淦初起之衆動皆以千數至于樂安建昌等縣亦有餘孽觀望反側未盡消除今以事理言則在東鄉者皆原被脅從舊日招定之人亦既憤其首惡之陷巳而助官擒斬矣其他别有違犯者亦皆陸續送官治罪不敢隱匿其在姚源者舊雖聴招不曽流叛近于王重七䓁之殺官焚縣大肆兇惡彼則始憂濫及而有觀望之罪後求自雪而有助討之誠此二處賊情應議撫𠞰之大略也有言當撫者曰彼既脅從聽招已定朝廷恩信豈可輕失惟待之以誠治之以法嚴禁光棍不許擅殺于前過惡永不追究後或再犯決不姑息則彼知一人之罪不累衆人今日治刑不同昔日自然心悦誠服帖然助順不過撫治三五月而事定矣若其誘殺一處則處處驚疑而起當此民窮財盡之時兵連禍結為之奈何有言當勦者曰今日地方大戸皆欲殺賊衆口同辭以招為誘浮言既不可解擅殺又不能禁彼固賊耳安能保其激之終不為變哉變則招撫之人獨罪難當矣固不若𠞰則成敗利鈍與衆共之地方之禍自彼地方使然也于我何咎此則撫𠞰二䇿未有定見之情弊也如臣愚見則謂舊招者不殺再叛者不招而新起者必撲滅于微即此三言而事定矣朝廷憫念地方節次差官體勘賊情及羣臣功罪臣以功罪一時難定蓋由事目繁多文案堆積巡閲難遍于鄉邑採訪或謬于𫝊聞又況忠臣或逺或去而又恥于自揚智士日近日親而又巧于媒糵雖有至公至明必須假以嵗月方得查實否則一時輕信未免有傷公正之體致負忠義之心若前賊勢衆寡賊情向背則早宜勘報以定撫𠞰畫一之論庻㡬官有定守民有定志而地方早得寧息耳臣愚欲乞聖明廣集羣臣㑹議于前各處新舊盜賊應撫應𠞰計畫萬全則天下幸甚疏入帝命下兵部議行請戒諭寧藩疏正徳九年胡世寧臣竊惟江西之盜𠞰撫二説相持其實無難決也已撫者不誅再叛者無赦初起者亟𠞰如是而已顧江西之患有不止于盜賊者伏見寧府自賄計瑾復衛兵以來威勢日張不逞之徒羣聚而導以非法上下諸司承奉太過數假火災奪民廛地採辦擾旁郡蹂藉徧窮鄉臣恐良民不安皆起為盜臣下畏禍多懷二心禮樂政令漸不自朝廷出矣臣愚欲乞聖明廣集羣臣及江西郷土有識士夫㑹議或于現在都御史俞諫任漢中専委一員或另推才望服人公忠體國不避權勢不惑浮議大臣一員前來地方兼任提督巡撫之職假以陳金彭澤之權使其統御將帥調度兵食激揚清濁易置官吏興革利弊皆得便宜于前各處新舊盜賊應撫應𠞰或先或後悉聽計畫萬全奏聞區處至于光棍害人姧貪怠政等事悉聽禁革其于久困窮民妙選循良曲加撫綏早期休養務使安全更乞温詔戒諭賢王益崇謙徳逺避嫌疑遵依祖訓止治其國内官僚而江西三司以下政務聽令各官照常自行若有事情重大應合奏請者奏聞朝廷區處不許該府干預更宜嚴戢下人恪守禁例施舍已責惠及貪民莊田基址悉還原業内臣軍校等項擅出外府生事者悉令取還再有稔惡不悛及額外投充者聽令法司提問如例更乞嚴敕鎮撫以下官員俱要查照欽奉太宗皇帝聖㫖事例或遇王府發出事務必須奏准方許奉行違者重治庶㡬小民有再生之望地方無意外之虞宗室有磐石之固九重紓南顧之憂矣臣不勝激切願望之至疏入下部議尚書陸完覆奏違制擾民疑出偽託宜令王約束之得㫖報可時政疏正徳九年張原臣無似誤蒙聖恩擢居言路日月云踰涓埃莫報竊惟以言為職以諫為名上自朝廷下及邊陲政事得失生民利害舉所當言即言不盡中猶愈無言也臣觀今天下之事弊縁法久事以時殊博訪熟思有慨于中激切之誠莫能自已粤稽往古之道載攷祖宗之法爰及今時之弊因酌政治之宜謹條為十二事言雖鄙俚事皆切實迹若淺近效實恢宏千慮一得輒用進呈伏望陛下逐事覽擇留意施行至于臣之愚昧不知忌諱指斥時事言雖直戅心實靡他更乞曲賜優容不加譴斥以開忠諫之路臣無任激切戰慄之至一曰正守令臣聞漢宣帝嘗曰庶民所以安其田里而無歎息愁恨之聲者政平訟理也與我共此者其惟良二千石乎是知守令最為親民得其人則政平訟理萬民樂生非其人則刑繁政陂民多愁歎然其斡旋之機顧人主激勸如何耳漢宣時二千石有治理效者輒以璽書勉勵增秩賜金公卿缺即徵入用之唐太宗疏刺史縣令之名于屏風注其政跡于下以備黜陟我英宗皇帝亦嘗因天下諸司朝覲旌其才行超卓政績顯著者賜以衣服褚弊筵宴是皆斡旋激勸之道也令之守令固有端靖慈祥之士亦多闒茸汚賤之流大肆貪饕過逞酷鷙諂諛成風拜塵乞幸請託終日跂足待遷發謀舉事皆為身謀若是者十常八九然來朝之時陛下賜宴賜幣毎行賞格而卒未見士風之變吏治之精臣以為攷察之責繫于御史御史職分于訟獄之繁力限于地域之廣其不能精其事有由也伏望陛下于三載攷察之外更遣周嵗巡行之使官如御史職専訪亷令博采輿論之公不據一人之見如其賢者不俟來朝即加襃賜如漢郭賀故事遇有貪酷之人不拘攷察年限即奏罷黜其穢聲著甚者又當破除常調大加顯罰用為衆戒以安民生二曰擇將帥臣聞將者三軍之司命繫國之安危古者築壇而拜告廟而授推轂而遣分閫而治蓋重其事慎擇其人也我太祖皇帝奮起東南混一海宇雖曰天授而諸將之功實多當時命將必先選于稠人觀于燕閒審其器識量其勇謀而後遣之今之為將者多紈綺貴冑子弟平居意氣軒昂漫以戰陣自許及應敵臨戰遽爾怖懼或逗留玩冦或退縮僨軍況其平日威不足以服三邊恩未能以綏士卒韜略未聞智勇安在非徒無益兵事抑且有損國威且世之善言兵者莫如孫武而其論將之五徳曰智信仁勇嚴不識今之将有一于此乎無古人一略而濫膺將寄臣實寒心伏望陛下廣為蒐羅慎加簡察武舉之外别置貢舉科條攷察之餘再立采訪官使不惑于阿大夫之譽言日至不執于趙奢子之大言無實戰陣屢經者始授之節鉞不限于邊鄙之逺人智勇著譽者方寄之藩閫不昵于左右之嬖信庶㡬蒐羅得人邊陲有備三曰理刑獄臣聞治天下以政為治具以刑為政輔刑以輔政而後姧慝懲暴亂息矣此古之降典者又有待于折民之刑而政刑二者所以不可偏廢也書曰式敬爾由獄以長我王國蓋能慎用刑則仁恩孚洽足以培固國本是持法者又不可不慎也漢唐之初立法甚善其後巧文深智酷鷙鍛鍊之徒耗散國脉天下囂然喪其樂生之心惟太宗毎決重辟必令三覆五奏減膳撤樂誠知人命至重而敬慎之也我太祖皇帝當草昧之初即留心于刑獄刪定律令昭示章程告戒丁寧亹亹不巳嘗曰用法不當則無辜受害又曰刑得其當則民無寃抑又嘗因讞獄淹滯廷責輔臣蓋垂畫一之法存欽恤之心也今天下承平日久法弊政弛治獄之吏卒不任法貪墨自恣賄賂成市輕重在手喜怒任情或二人同事而異罪或二人同罪而異罰或一獄而梏滯者十餘年或一事而株連者百餘輩舞智弄法深詆巧文雖陛下時下湔滌之詔敬慎之言殆亦彌文而已張釋之曰法者天下公共者也今天下之法如此陛下以為公乎法既不公而欲天下之治得乎伏望明敕法司申嚴成憲以大明律令為聖祖之所詳定者遵用而不違以現行事例為廷臣之所集議者參攷而不失内外一律不以輕重自恣大小稱情不以喜怒自任讞訊明允俾無株連之寃決遣以時使無梏滯之枉陛下亦宜篤示大信敬守祖法曲赦不行視宫中府中于一體欽恤懇至謹三覆五覆于崇朝庶㡬刑罰以清姧宄以息五教以弼四民以安四曰汰冗食臣聞洪範八政食貨為首孔子論政足食為先聖帝明王未有不以此為急也自非旱乾水溢霜隕雹擊則天之所生地之所養自足以供一嵗之用古者立什一之法以制其取較五榖之入以制其用建百官之秩以制其食他如府史胥徒之類亦必量功稱事初無糜費因事置人略無冗員是以費用省約公私優裕我太祖皇帝既酌天下地里建置官吏復因内府衙門置設工役官有定員不至冗雜工有定數㒺有濫侈今國家之用率多取辦于東南然而旱乾水溢霜隕雹擊以為天災地歉者既無寧嵗抑且貪饕朘剥漁奪蠶食以為民害物蠧者復無餘利則食之所生其源已病矣加以都畿之内耗食者衆巧計投充而趨辦月糧恣意影射而假食月糧一方之内氓隸匠卒無不食禄之家一家之中父子兄弟無不給粟之人夫趨辦月錢則利歸官府假食月糧則害及廩庾況月錢之辦僅費月糧十分之二三則民之所以競趨于彼者固其所也是以供辦之夫數倍往昔而徵求之民盡越法制物力如之何不絀哉伏望陛下從國初清明之制洗近年積習之弊嚴立法禁大加簡閲内外官員係因事建置勢不可無者姑仍其舊若事在得已職涉冗繁者一切罷黜又各色匠作及勇士力士校尉人等凡近年巧計投充者盡為裁黜其有占恡影射者亦必從法究治以杜其弊庶㡬漕粟充羨國計可舒五曰省征斂臣聞𫝊曰百姓足君孰與不足百姓不足君孰與足古者太宰以九賦斂財賄大府以九式節財用以九貢致邦國之用以九府為掌財之官漢景帝時民毎三十而税一唐髙祖令租庸調之外不得横有調斂我太祖皇帝嘗曰嵗賦有限而日用無窮費或過度何從辦集侵漁剥削皆原於此又嘗因四方進貢而郤之以為四方之物皆民之財斂萬民之財以為彼一身之利制自今其毋復獻是知民不可貧漸不可長而希寵生事者宜有以塞其源也今天下征斂日新地無遺利民無遺力宜財用之多也然一舉事而掌國計者輒至告乏何哉民貧故也民之所以貧者有二一由守令之貪殘一由守臣之進貢國家近年均需雜輸層見疊出率十倍于舊制而皆取辦于守令守令之貪殘者且假託以自殖而又十倍于上供此民之所以貧者一也至若守臣進貢其弊有不可勝言者巧立名目競出新竒恣意逢迎以為孝順彼豈肯舍巳之財以盡已之患哉不過取于民耳取于民者有數十倍而供于上者纔一二分虎狼之暴莫可梏制谿壑之欲無有止極此民之所以貧者二也伏望陛下禁守令之貪殘而一毫不許擅取止守臣之暴斂而一物不許擅進執此之政堅如金石行此之令信如四時務使斂之有定賦用之有定數掌之有定員貢之有定制法外之征不加之民無名之貢不入于上庶幾民財不匱民心不失六曰慎工作臣聞古稱善治者必曰不盡民之力蓋匹夫之家上父母下妻子嗷嗷數口待一人而食茍使之終日勤役而不得經營口食則彼父母妻子之養何所取給哉況軍士𨽻名尺籍實為防禦而京營之設又所以衛王室以備緩急者也顧可使之勤勞工作以索其力哉平居無事既索其力倉猝有事復欲其捐軀殞命以効一旦之用非惟法制不宜抑且人情不堪昔者漢文帝欲作露臺既召匠計直而復已唐太宗欲修洛陽宫已下詔發卒而復罷我太祖皇帝嘗指宫中隙地曰此非不可以亭館臺榭為遊觀之樂但恐傷民之財勞民之力耳大哉王言萬世攸仰今都城内外工作繁興起撥軍夫動以千計雖非急務一概舉行事可因仍皆務改作計其工程或期月可辦而恣其怠緩嘗至終嵗而不休徒事因循耽延嵗月假為督理大肆誅求做工者能㡬人而縱放者率已過半上工者能㡬日而停止者又或歴時虚名有在實效無徵利入私門怨歸公室況今内殿營建在邇工程浩大力役重繁使不豫為培養何堪臨事動煩伏望陛下俯頒渙汗申敕所司養鋭節勞坐待重役合謀併力動應大工將現今大小工作一切停止内外人役舉皆免放庶㡬民有餘力樂于趨事讒慝不作謳誦聿興七曰恤士卒臣聞樂生惡死者人之情也今驅無罪之人使之披堅荷戈以蹈必死之地而樂于進趨勇于敵愾者豈其情哉惟上之人加意于存恤使平昔遂其飽煖安逸之願而無倚矛脱巾之怨而後可耳茍或勞役而不肯節其力朘剥而不能體其心怨讎聿興戰禦喪氣深可畏也昔魏吳起為將與士卒分勞苦趙李牧臥不設席行不騎乗親裹贏糧與士卒分勞苦趙李牧居代鴈門市租皆輸入幕府為士卒費日擊數牛以享士邊士日得賞賜而不用皆願一戰故能克敵禦侮所在成功我太祖皇帝躬臨戰陣備知艱苦屢頒詔㫖恒切注意嘗因天寒念沿邊將士加給衣帛又制優恤軍屬之律申尅減衣糧之禁恩至渥也今境内之卒既疲於道路之奔涉而屯邊之卒又困于差役之繁重兼且統領將佐百計征科巧立名目下及芻薪肆行朘剥至窮髓血月糧雖給曾未得升斗以贍私上下誅求又旁及餘丁以輸辦一家數口迄無閒人一身百工都無餘力人人無更生之樂懐終嵗之憂夫平時愛養既不能得其歡心則臨敵禦侮安可望其死力㢤伏望陛下申明舊章嚴立約束務使統領將佐不敢貪殘軍伍士卒得受實惠有玩法自殖稔惡不悛者寘于重法用為千百之戒初不以内外大小異法殊科庶㡬萬衆如挾纊之和邊陲有踴躍之樂勇氣倍増戰禦無失八曰明賞罰臣聞賞罰者人主勵世之大權不可不昭大信于天下也蓋由賞當其功則不惟有功者知所勸而天下之人亦將汲汲焉圖効力以立功罰當其罪則不惟有罪者知所懲而天下之人亦將惴惴焉圖自修以免罪是故操此大權昭示大信其賞也因天下之善而後賞罰也因天下之惡而後罰故紀綱振立政事修舉人心淬礪治功可成也昔漢張裔稱諸葛亮曰賞不遺逺罰不阿近爵不可以無功取刑不可以貴勢免此賢愚之所以僉忘其身也唐裴度亦以藩鎮底平為處置得宜能服其心而致然我太祖皇帝嘗曰人君操賞罰之柄以御天下必在至公無善而賞是謂私愛無過而罰是謂私惡皆不足懲勸至哉斯言誠治天下之龜鑑也今天下好惡不公賞罰不信或無功而受賞或有罪而不罰或既罸而復免或既賞而復加庸才薦登率又賜玉微功莫効輒爾封侯恩或濫及于年資賞或妄加于閥閲希圖𫝊奉習生徼倖之心請託乞恩大啟覬覦之念政體廢弛權柄下移載稽邊功其舛尤甚足不出門庭率寄名而受賞身未經戰陣多迎合以奏功捐生禦敵者或未沾恩臨機畏縮者或至脱禍功差六級古法不免謫官覆至全軍今則縱其贖過虚張諜報率欲冒功深自匿藏全無實覈士卒由之解體邊宼因之陸梁似此弊端殆難盡數伏望陛下申示章程大張乾斷精明賞罰實覈功勤凡所施行必布公道賞不令其倖得罰不致其倖免其或左右近習之人閥閲權勢之輩沮公撓法背理任情請託夤縁肆無忌憚者皆聽所司執奏或已經聖㫖俞允雖有成命者亦聽科道參駁皆付法司究懲庶㡬公道昭明國是有定九曰親大臣臣聞君者臣之元首臣者君之股肱況大臣者又人君之所遴選甄拔置諸左右以資輔弼啟沃尤非羣臣比也既將以為輔弼啟沃之資而堂陛森嚴限乎尊卑之分法制繁宻沮乎情意之孚甚至廟堂大計雖付外廷雜議者亦皆承示意㫖徒縻虚名而不使可否于其間則向之遴選甄拔者豈徒隆之以虚禮縻之以髙爵而已哉唐虞之世君臣相與一堂之上都俞吁咈喜起賡歌唐制天子燕見大臣開延英殿從容坐論移刻乃退宋仁宗召大臣于天章閣賜坐給札使條具其所欲施行者我太祖皇帝及列聖皇帝正朝之外亦率于便殿不時召問燕語或究機務得失之故或察閭閻幽隠之情當時諸臣以為榮遇各有紀述可攷也其後時事漸異禮意寢衰形迹濶略日以暌廢𢎞治年間我孝宗皇帝因言官建白亦嘗舉而行焉故當時政務修舉刑賞昭明海宇乂安治化休美伏望陛下崇信老成優禮耆宿毎遇閒燕特賜召延脱略儀文外棄形迹從容賜坐款曲晤言講論經書旁及民隱商㩁機務博究事情可否之言出口入耳宻勿之計彼感此孚務使上下之情兩達内外之事周知庶㡬老成之臣曲盡忠悃天縱之質益進聰明而一徳可成庶績咸熙矣十曰開言路臣聞主聖臣直古有是言主非聖不能容臣之直臣非直不足見主之聖故君以降志受言為徳臣以犯顔敢諫為忠彼此相須上下相濟而後天下可理也朝廷設臺諫之官而名為耳目之司所以廣九重之見聞益一人之心思彼天下萬事未易周悉者于此可悉也茍循黙緘晦不能盡言使天下之事因之隳廢此為不忠之臣不忠之臣誅無赦抑或人主驕愎自賢不容盡言使天下之事因之隳廢是自壅蔽其耳目也昔漢文帝于郎從官上書疏未嘗不止輦受其言羣臣袁盎等勸説雖切常假借納用之唐太宗于上書言事者皆黏之屋壁出入省覽我太祖皇帝臨御之初毎導羣臣使之盡言進投疏奏無不盡覽言或可采輒賜襃嘉欣然改從初無繫吝蓋即成湯從諌弗咈改過不吝之心也故當時治化之隆與三代同之今天下政事之興革人才之用舍大有可言者而人亦未嘗不言之然或略而不詳迂而不切陛下一皆優容聽納無所咈戾甚盛心也但言者雖衆而尚懷逆鱗之憂聽之雖勤而尚有遺善之嘆伏望陛下廣詢博訪疇咨延納如古之所謂開導而求諫和顔色以受之虚襟懷以聽之者務使有懷者皆盡其所言有言者各盡其所見然後徐察其可否而賜之施行其或言有不當觸忤塵瀆亦宜假借優容不加罪責庶㡬兼天下之善集衆人之長羣䇿畢用庶政無議十一曰崇天道臣聞君者民之父母天者君之父母人子有過則父母戒敕之規諭之甚則笞責譴呵無所不至蓋其愛之之心無所不至故朝夕警省冀其飭躬勵行而後巳也人君事天實亦類此彼其位曰天位職曰天職民曰天民皆不以為君之所自有而必繫之天者是其受天地之託居宗子之任宜乎祗奉若天以盡其道也況人君尊臨九重至尊無上頤指氣使無不如意使非上天陰鑒而黙相之尚何所憚而不為哉故災祥殄異之來蓋亦愛君之至薄示笞責譴呵之意以為戒敕規諭之方冀于飭躬勵行而已也董子以災異為天心之仁愛詩人以不敢戲豫馳驅為敬天漢文帝以水旱疾疫下詔責躬宋太祖以霖雨不止夙夜焦思我太祖皇帝嘗因時不雨素服草履步詣禱祠設藁席而露坐晝曝于日頃刻不移夜臥于地衣不解帶每令蔬食雜麻麥以進其憂民之心事天之誠萬世無容議矣今天地示變戾氣作沴雨暘愆伏日月薄蝕星辰隕墜風雹震擊是天道不清于上也旱魃洊臻大水侵溺盜賊充斥三邊侵擾是地道不寧于下也不識陛下以今此之時為治安矣乎抑或以為未也若以為未至于治安則所以飭躬勵行者豈可已耶臣以為應天以敬而不在儀文繁縟之末立政貴誠而不係聲音笑貌之為使能持一敬以為感格之本積一誠以為施設之基孚洽于羣僚百執事之間昭著于宫壼涖大廷之際如漢光武之推赤心置人腹中唐太宗之至誠理天下則一誠足以消萬偽一敬足以敵千邪至和感召萬靈順應而沴不為災矣昔唐太宗憂民食而蝗不為災宋景公發善言而災星退舍是皆應天以誠而能轉災為祥巳行而有驗者惟陛下察之十二曰進徳學臣聞人君之徳為天下治忽之機古之明王未嘗不以修徳為急而賢臣之輔導勸説亦未嘗不以修徳為急何也世無常治亦無常亂徳日新者有以致萬邦之懷儀不􅑯者足以致四國之正感應之機有不可誣者然徳之修否顧學何如耳髙宗遜志時敏以求建事成王宥宻緝熙以求顯徳故曰明君以輔學為急知務學而徳之不純者有矣未有不知學而能修其徳者也知修徳而治之不純者有矣未有不修徳而能善其治者也務學而不能純其徳者抑務之未得其要也修徳而不能善其治者抑修之未得其要也且人君之學豈若經生曲士之為哉撮大㫖繹大義審治亂安危之機探得失是非之源如斯而已耳我太祖皇帝創業之初萬㡬叢委日取論語洪範諸書樂而玩之毎遇儒臣經筵進講率令盡心剖析乂命有司訪古今書籍以資覽閲又深慮聖祖神孫以暇逸為垂拱無為故其垂訓拳拳以大禹惜寸陰文王不暇食為言著之乎典冊𫝊之乎後世如日麗天如水行地凡有耳目者所共見聞當萬世遵行而不可違者陛下即位以來于茲九年雖求治之念恒切于中而致治之美未臻其效意者修徳之實尚有可言也伏望陛下念祖宗付託之重思天下仰賴之廣體聖賢治善之言遵皇祖垂世之訓深居法宫尊嚴簡出清心窒慾勵志省非日取論語孟子尚書諸書以及戈直之貞觀政要真徳秀之大學衍義陸贄之奏議循文約理撮㫖取義時賜省覽以禆聖學緝熙之益又采其切近簡要者施之踐履以為聖徳髙明之驗而騎射弋獵荒遊盤樂之事絶意不為或左右嬖習之人有以此事先意承順逢迎導引者亦必大加懲艾以為姧諛不忠之戒如此而聖徳不純聖治不美者臣未之信也昔唐貞觀之時斗米三錢刑措不用太宗曰此魏徵勸我行仁義既效矣夫太宗一行仁義而天下即見治平是以進學修徳而能成化致治已行而有驗者惟陛下察之疏入得㫖張原這厮驟陞科道不諳事體掇拾往言輒來奏擾本當重治姑且從輕降雜職調逺方衙門今後新科進士俱要先選在外有司歴事一二攷方許除授京職其有因事發遣的不許朦朧擅自取用如有違犯的都治罪不饒吏部知道應詔陳治安疏正徳九年何景明臣謹奏邇者皇上敕諭羣臣下求直言大小臣庶無不感動交相慶慰然自敕諭之後已將旬日未一視朝輔臣言官奏論邊軍義子數事一言未見採納一事未蒙施行臣觀災變之來天道甚邇陛下上回天怒下安人心如此數事宜急省改而今復處之晏然何也夫災禍切近悔厲斯深形勢積成改悟何及臣上原天意下究人心近觀時事逺攷古昔治亂存亡之機實在今日陛下欲圖理興化更絃易轍過此不為無可為矣臣聞天下之政勤則治逸則亂明則治暗則亂治則可存亂則終亡事理有必然者方今上下恬嬉逺近壅塞功實不稽名器多濫欺蔽之風長偷惰之習成兼以民生已困宼盜未息兵馬弛備財利並竭外僅維持中實潰散其勢如此而其治如彼臣實憂之陛下不急省躬以懲禍始而欲肆志以待患成何也臣聞内外附固長久之道今公輔不得通謁乃日與邊軍並出入義子同起居此真今日所創見先朝所未聞者也耽樂逸遊厭怠政理何以圖治況義子為陛下寵幸之人盛滿為災鮮能善後尤宜早為裁抑明示區處使義既不失恩亦有終豈不美乎夫國事執奏實在大臣大臣阿徇事乃寖敝臣謂大臣奏事宜使即決是非直陳利害準之憲章制之理義不為兩可之辭則制度不隳功實不謬名器可正矣其大臣進退當以義制行賄交結無恥取容者并為罷斥而奬拔恬退訪求者俊則名節明而事不茍然後嚴督庻官以成精明之治寛撫百姓以培殷富之基治安之道此其大略也要之大本秪在聖躬陛下若以章奏繁委瀆亂聖聰莫若一御便殿宣進輔弼召集侍從以通上下之情必有能陳説利弊指稱時事為切要之言以悟陛下者矣臣聞先勞後逸先後之間相去逺甚故儆戒之後必有餘樂怠荒之後必有餘憂陛下若體天心之仁愛念祖宗之創建堅忍自勵常加矜飭務舉實政不事虚文太平之治可以立就永踐九重之安長享萬乗之樂憂勤于一時而怡豫于無窮陛下何憚而不為此乎昔成王感于風雷之變乃有措之休髙宗感于雄雊之異是臻嘉靖之效惟陛下深思感悟稍一轉移海内將從風而靡要荒必仰流而化尋常小康之治亦何足為陛下言哉疏入帝不納御選明臣奏議巻十三
