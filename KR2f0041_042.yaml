  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_042-1a, image: WYG0445/WYG0445-0647a.png}
body:
  text: 請燬要典疏崇禎元年倪元璐臣謹奏為公議自存私書當燬敬陳膚見以襄蕩平之治事臣觀梃擊紅丸移宫之三議鬨於清流而三朝要典之一書成於逆豎其議本可兼行而其書則當速燬者請詳其說蓋當事起議興盈庭互訟主梃擊者力護東宫爭梃擊者計安神祖主紅丸者仗義之言爭紅丸者原情之論主移宫者弭變於幾先爭移宫者持平於事後六者各有其是不可偏非總在逆璫未用之先羣小未升之日雖甚水火不害塤箎此一局也既而楊漣二十四罪之疏發魏廣微此輩門户之說興於是逆璫殺人則借三案羣小求富貴則又借三案經此二借而三案之面目全非矣故凡推慈歸孝於先皇正其頌德稱功於義父又一局也網已密而猶疑有遺鱗勢極重而或憂其翻局於是崔魏諸奸乃始創立私編標題要典以之批根今日則衆正之黨碑以之免死他年即上公之鐵劵又一局也由此而觀三案者天下之公議要典者魏氏之私書三案自三案要典自要典今為金石不刋之論者誠未深思若夫翻印紛囂改亦多事以臣所見惟有燬之而已夫以閹豎之權能役史臣之筆亘古未聞當燬一未易代而有編年不直書而加論斷若云倣佛明倫規模大典則是魏忠賢欲與肅皇帝爭聖崔呈秀可與張孚敬比賢悖逆非倫當燬二矯誣先帝僞撰宸篇既不可比司馬光資治通鑑之書亦不得援宋神宗手製序文為例竊假誣妄當燬三又况史局將開館鈔具備七載非難稽之世實録有本等之書何事留此駢枝供人唾詈當燬四故臣謂此書至今日不燬必有受其纍者非主三案者之纍而爭三案者之纍抑又纂修三案者之纍也何也爭三案諸臣其品原分三等下者如崔呈秀劉志選李春昱等之附和希寵不足問矣最上莫如黃克纘賈繼春王業浩高宏圖劉廷宣等始處君子而不必求同既遇小人而自能為異本末炳然雖有忮者莫或能加之也然而管華之席未割老韓之傳同編在數臣高明之觀豈不引為坐塗之辱若其次焉者雖非盡有撑持要亦不肯濡染而特以史氏抑揚之過保不為後人翻駁之端至於纂修詞臣之在當日則更有難焉者丹鉛未下斧鑊先懸姜逢元閣筆一歎朝聞夕逐矣楊世芳吳士元余煌等備極調維其於忤璫諸疏有匿其全文者有删其已甚者時傳書成而獄又起則有寧加醜詆之詞而决不肯下一不道無將等字面以傅㑹爰書者凡此苦心亦多方矣而事在見聞之外未易可明彈章一加萬節俱喪諸若此者皆臣之所謂纍也纍之不已元氣又必大傷當今正氣日伸方隅漸化自應進其平飲沃以溫湯倘復尅伐不休正恐清寧無日然而逆璫之遺跡一日不湮則公正之憤心千年不釋也伏願陛下敕下該部立將三朝要典鋟存書板盡行燬焚仍命閣臣擇期開館纂修天啓七年實録而又命纂修詞臣捐化成心編摩信史凡關三案之事必執兩端之中而又命三案中賜環諸臣各以聖明御極為再生之年勿以恩怨橫胸理前身之業至於一切妖言市語如舊傳㸃將之謡新騰選佛之說毋許妄形奏牘橫起風波則廓然蕩平偕於大道矣臣向以是非之心言是非今以史臣言史事統關大計伏惟聖斷施行疏入得㫖這疏持論虛平有裨新政該部知道辨楊維垣詆東林疏崇禎元年倪元璐臣頃閲章奏見攻崔魏者必與東林並稱邪黨夫以東林為邪黨將以何者名崔魏崔魏既邪黨矣擊忠賢呈秀者又邪黨乎哉東林天下才藪也而或樹高明之幟繩人過刻持論太深謂之非中行則可謂之非狂狷不可且天下議論寧假借必不可失名義士人行已寧矯激必不可忘亷隅自以假借矯激為大咎於是彪虎之徒公然背畔名義决裂亷隅頌德不已必將勸進建祠不已必將呼嵩而人猶且寬之曰無可奈何不得不然耳充此無可奈何不得不然之心又將何所不至哉乃議者以忠厚之心曲原此輩而獨持巳甚之論苛責君子所謂舛也今大獄之後湯火僅存屢奉明綸俾之酌用而當事者猶以道學封疆持為鐵案毋亦深防其報復乎然臣以為過矣年來借東林媚崔魏者其人自取何待東林報復若不附崔魏又能攻去之其人已喬嶽矣雖有東林烏能報復哉臣又伏讀聖㫖有韓爌清忠有執朕所鑒知之諭而近聞廷臣之議殊有異同可為大怪爌相業光偉他不具論即如紅丸議起舉國沸然爌獨侃侃條揭明其不然夫孫慎行君子也爌且不附况他人乎而今推轂不及㸃灼橫加則徒以其票擬熊廷弼一事耳廷弼固當誅爌不為無說封疆失事纍纍有徒乃欲獨誅一廷弼豈平論哉此爌所以閣筆也然廷弼究不死於封疆而死於局面不死於法吏而死於奸璫則又不可謂後之人能殺廷弼而爌獨不能殺之也又如詞臣文震孟正學徑骨有古大臣之品三月居官昌言獲罪人以方之羅綸舒芬而今起用之㫖再下謬悠之談不已將毋門户二字不可重提即用更端以相遮抑耶書院生祠相勝負者也生祠毁書院豈不當修復是非無中立伏望俯賜鑒察幸甚幸甚疏入帝以論奏不當責之舊餉告匱疏崇禎元年畢自嚴臣竊惟天下不可謂無事矣東而薊密一帶在在戒嚴西而宣大二鎮時時枕戈至於山陜諸鎮叛服無常戰欵靡定無地不設重兵無人不需月餉羽檄頻馳飛章疊至非以數月無糧見告即以效尤寧逺為憂臣承乏司計竭蹶咨諏敢抒固陋仰佐持籌一曰核民運之逋缺國初九邉主客兵餉俱有各省民運以資供億後來間發京帑不過一時權宜之計無奈承平日久疆場之臣忘其初意以京運為必不可少之物其視民運積逋漫不經心夫臣部舊餉缺額至一百六十餘萬猶竭力供辦省直民運俱祖制額編乃任意延逋不知臣部之京運亦府州縣之所解納億萬姓之所輸將與夫民運何異奈何歧而視之也今後責成各鎮撫臣年終徑自查參其山陜極邉地方有疲瘠太甚者准照腹裏上疲州縣豫為題明量減分數其餘分别懲戒此後臣部先儘民運原額以酌發京運之數倘逋缺仍前而參疏不至異日邉儲有誤疆埸之臣難他諉其責矣一曰議屯糧之徵收祖制軍丁俱隸衛所各有屯田徵收本色入官還充軍糧支放是即唐朝府兵營田寓兵於農之意聖祖所謂養兵百萬不費民間一粟者此物此志也逮後年祀寖深有子孫瓜分其田者有貧窶轉鬻者有丁倒户絶而埋沒無存者有田本磽確而荒蕪不治者不才武辨既視為乾沒之資奸猾軍旗又恣為延捱之計又或無災而稱災不遵納本色而告納折色每石多不過三錢又且緩征逋負於是屯糧之設什不得五而祖制盡湮沒矣為今之計似當行委府佐官員加意查核有埋沒者則溯流而窮源有荒蕪者則設法以開墾清查完日地方撫按具實奏聞造册報部定為額數徵收本色入倉非遇大荒不得輕議改折以饜奸貪之腹則屯糧漸復祖制之舊而邉餉亦稍助一二矣一曰嚴京邉之考成目今太倉如洗國家隱憂乃各省直京邉錢糧共止三百四十二萬九千八百九十餘兩而拖缺者每歲約至百萬臣部將何所賴以撑持乎固緣百姓物力有限既完新餉頓逋舊餉亦由有司急新遺舊若曰是可緩圖云爾至於考成之例止於薄罰降級玩愒易起今後臣部查有拖缺獨多者特糾一二從重降調夫度支之困極矣出入之數相懸生財之藪已盡所恃九邉續命者止此惟正之供而積玩成習非惕以功名之路不可也一曰汰踰額之營制先年各邉鎮俱有一定兵馬一定糧料名曰經制如田之有畔不得踰越逮後督撫條議陸續添設總為固圉防邉言亦鑿鑿可聽然兵日增而餉日益後遂至於不可繼矣督撫虛心酌議昔何以減而有餘今何以增而不足度其緩急設法裁汰以歸經制斯亦今日清餉之急務也蓋今日軍餉别無生之一法止有節之一法額外節得一分則額內留得一分矣總之清理民屯稽核京邉直還以軍餉之所固有而考核經制澄汰兵食實祛其邉鎮之所本無伏惟采納亟賜施行疏入帝從之劾孫之獬請存要典疏崇禎元年吳焕臣聞世開治平惟定一是臣子事君莫先盡禮有如行僻言堅咆哮於君父之前以冀驚衆聽而懟至尊黨私交而傷善類此不忠之大者也臣閲邸報見詞臣孫之獬疾廢不能供職一疏不勝駭憤其所爭要典不可燬云皇上於熹宗嘗北面事現有御製序文在朕之一字豈可投之火是明以御製兩字壓皇上不敢動矣又云皇上同枝繼立非有勝國之掃除何必以此忍心很手使於祖宗則失孝於熹宗則失友是明歸皇上以不孝不友矣且臣子拜疏不曰進呈而曰投入之獬尚知有人臣禮乎夫欲知今日要典之燬毫無損於聖祖神孫之孝慈應先自當日爭梃擊爭紅丸爭移宫三案諸臣原未嘗陷主於不慈陷主於不孝特羣奸欲殺忠良苦無題目故借為罪案耳夫當張差之梃而馳至排禁闥直入也其有所使而然何待辨此而不問將亢圖魚腹踵發禁庭東宫危矣惟廷臣為朝廷持破柱詰奸之威神祖光宗自行燒梁獄詞之法父子兄弟間所全實多當時召對慈寧諄然面命和氣盈庭光映千古止慈止孝得此益彰而謂諸臣陷主不慈陷主不孝不亦寃乎乃光宗嗣寶匝月之內雨露滂沱天下方慶萬年有道之觴一日哀思太過聖體恇羸崔文升李可灼漫以瀉下之藥進而鼎湖遽逝攀髯無計則涕泣呼號咎歸嘗藥此忠臣孝子痛極不擇音之言此而遽以悲憤叫號定諸臣不赦之辟而以聖躬嘗試之崔文升立躋總鎮李可灼登用方新刑賞亦太不平矣至於移宫一案誠嫌太驟然當其時大故接踵朝野震驚宫府徑庭危疑紛起誠早得元子升中出震以定羣疑則負扆奠鼎他無遑恤彼謂宫眷必宜從厚此痛定事後之言及至聖眷無改恩禮有加於先帝之孝益彰顯已雖曰爭梃擊爭紅丸爭移宫而初無損於三聖之孝慈則又何必劉志選徐紹吉輩諸大奸共成要典一書稱之為孝而後孝稱之為慈而後慈然則要典一書在當日原不必作在今日又何妨於燬如以皇帝之制為必不可更彼僞祠之建僞爵之頒位上公錫鐵劵錫土田何一非稱皇稱制奸人邪黨正將借此以壓庸愚欺當世而不知三代之民斷不可枉也惟是功罪不明邪正顛倒所以辨言亂德邪說橫行夫觸邪者為君子媚邪者為小人兩言可定羣品臣首疏即舉以入告顧有一疏之內一觸邪而一以媚邪甚至始觸邪而繼即以攻正變換無端何怪乎人言之及惟是始進雖未甚正而能首出攻邪或當徐俟以觀其將來之向往則政府主持國是萬不可不斷而其候似宜少需分别忠邪萬不可不嚴而其路似宜少廣蓋遵王之路宜闢蕩平使天下回心易向以共遊大道可息紛囂而消反側如復有隂陽閃爍形迹顯露者必與衆共擊之今日宏開治平之象似應如是則有識者宜即以此意明告於皇上明商於政府乃何至倒置其詞譸張為幻政府本用嚴而名之曰凶心本用斷而名之曰辣手將必至首尾兩端依違情面賢奸並進而涇渭不分羣言雜投而黑白莫辨養成一不痛不癢為過為命之世界而後可則又誰肯身任勞怨擔當國是以開闢清明之治哉不幾上負聖明而邪正掎角無已時也伏祈皇上將孫之獬立賜褫斥以為人臣無禮於君者之戒仍諭政府早出視事一意擔當稍示寬大而嚴闢邪說以定國是以息紛爭則世道立見蕩平矣臣不勝悚息待命之至疏入得㫖據奏孫之獬狂躁宜加處分第已回籍詞臣閒局不必過求該部知道嚴行彰疸以息羣棼疏崇禎元年吳焕臣竊計是非者人心之至公也誅賞者朝廷之大柄也是非混淆即清時不能以定國是誅賞不嚴雖聖主無術以開太平况當泯棼濁亂之餘必有一番大剖析大剸割然後可冀蕩平師濟之盛自逆璫煽禍世界倒翻賴皇上聰明神武立殛元凶旌忠起廢除奸逮惡之詔播告再三亦既彰明較著矣乃竊觀廟堂之上持論未見有畫一之繩刑官未見有明允之奏司勳未見有旌揚之典相䝉之久勢必至於相激恐元黃之戰復興有負皇上宵旰求治之念臣竊憂之夫天下公非公是人各有良惟是自匿其心以閃爍於隂陽不測之境則相尋傾軋無已時自朝論紛紜以來南北水火凡再三變至閣臣魏廣微出挺而走險以其權拱手授之逆璫魏忠賢動稱中㫖莫敢誰何時國中早已有內魏外魏之謡原其初意將借以驅除異已者為一時立勝局耳孰知國之利器不可倒持刑餘隂毒叨殘無厭逆璫騎虎之勢既不能下而憸邪狐假之羣又不可解於是驅除不已因而戕虐搒掠不快輒動刀刃門户兩字幾羅織天下賢士大夫而空之甚且伏甲宫牆張牙閫外震主之威幾危社稷誰實階之厲哉此誠國家一大厄運也然臣則謂此正天意欲助聖明以開治平故特生忠賢為世大逆觸之者為君子翼之者為小人若懸一西秦之鏡以照破天下之肝膽即陰陽閃爍無可藏身自此流品可清朋黨可散國是可定也臣跧伏田間靜觀逆璫自弄權煽禍之始以至殄滅其勢凡數變而在野在朝諸臣不幸而身逢其殃其皎皎心跡確然可指者品亦凡有數等方逆璫宫廷露刃中㫖侵權浸假有履霜堅氷之漸而能凛乎早見飄然逺舉則見明哲全身之智及羽翼漸布爪牙斯張赫然威焰方將擇人而食而諸臣首觸凶鋒明蹈虎口至身為虀粉則見捨生擊賊之忠及至網密無魚清流投濁必務驅除剗削而後已而諸臣挺持自若鍛羽投荒則見守正不阿之操及至殺焰通天寃聲載道風雷震疊海宇張皇而能乘便建言危詞激論直批鱗甲甘心責譴則又見忠憤激發之氣而其間亦有欲進不可欲退不能而借差請告曲避投閒以自完名節則見修潔自好之標乃有舉朝無敢開之口觸石有必碎之威而伏蒲請劍首擊瘋邪以翦璫翼則見朝陽鳴鳯之節又有事係邉疆典邀封爵岌岌乎有䝉恬賜劍之危九錫加身之變而發憤上書抗疏辭廕隂折逆謀則見當幾力諍之勇及至忠良已盡篡逆垂成天地祖宗明威欲殛然聖怒未張伏戎在側羣虎密謀積威未解而挺身犯逆慷慨擊邪如諸臣補牘連章盡發罪狀則又見扼吭除逆之烈此其品雖人人殊而心迹洞然同抱忠君報國之念故衡君子者決當以此為定鑒應從風波泥淖之中分别其所為君子不應於剖心碎骨之後復强誣其為小人若夫建祠獻媚貢諛養奸其作俑當先者固蓄欺君賣國之謀即附和同聲者徒知保身固寵之計亷恥喪盡食影懷慚誠何顔復厠於冠裳之列乎至於天人共憤罪狀昭彰國有典刑決不容毫髮假借者如劉志選梁夢環之傾危聖母田爾耕許顯純李永貞李實等之同夥殺人田吉倪文焕劉詔等之贊謀助逆立當肆諸市朝投之荒服而遺奸漏網更有一大憝曰崔文升文升為逆璫第一腹心故特遣之督漕以扼江淮要害此其志不在小文升遂虎踞咽喉陵轢撫按剝軍虐民幾激成大變巡江御史何早抗疏陳言立遭譴逐鄉官孝亷居然逮繫如縛雞豚且與劉志選朋比逞威招權納賄東南官寮半天下生殺黜陟俱出其手倘忠賢逆謀果成文升必為元輔此其罪在李實劉若愚之上速應逮問正法者也乃若十孩兒中第三人曹欽程同朝共棄人類不齒言之汚頰然其當先殺四御史以獻首功投入魏良卿崔呈秀之幕傷殘善類無所不至科臣吳國華首發其奸立致嚴譴併所薦熊江周詩雅無端屏斥至今未得申雪非潘士聞力擊除之其叛逆之惡當不在崔田下其臨出都門拜别忠賢口稱君臣之義已絶父子之恩難斷遂慟哭失聲而出如此異類凶殘亦決當提問追贓以償三臣之命臣安敢避睚眦之嫌而不以入告乎皇上旌忠鋤惡業已屢播明㫖仰祈今日斷然行之蓋立國之綱亷恥為重彼效死除奸諸臣如揚漣周宗建等皆碎骨裂膚而周順昌至拔舌敲齒罵不絶口而死生氣凛凛為臣死忠之義宇宙間尚留此一線倘不亟為表章人心幾至於澌滅而助璫殺人諸凶自非誅殛竄逐亦無以懾奸黨而戒將來乞皇上明詔法司將田爾耕許顯純崔文升曹欽程等立提至刑曹正法應誅者誅應遣者遣即奪諸奸恩廕以旌忠直此天意人心所共快者也誅賞既明之後更邀天語申飭朝野守正諸臣共濟同心若更有巧詆忠良及黨同報復者是即顯悖明㫖天威咫尺誰敢仰負聖明將國是可定平康立奏矣疏入敕下崔文升法司鎖之馬房諸閹伏宫門哭聲震帝座帝益怒逮首倡二豎及文升各杖一百發孝陵淨軍就宫中處分原疏留直抉吏治病源疏崇禎二年范景文臣被命撫豫受事匝月懷奉簡書無日不以察吏安民為兢兢伏念今日吏治之病惟有一貪而對證之藥止有一亷然貪吏之日多亷吏之日少者其起於察吏者乎何也吏之能為貪必有才力可恃而吏之敢為貪又必有牆壁可倚者也其一段翹然自喜之氣既已奕奕動人而工逢迎善彌縫又能偵上官意而巧中之相得既深覺察不暇彼之志遂肆膽遂張為所欲為無復畏忌且分其囊槖供作苞苴延譽多方虛名易起甚有畏其奧援假之羽翼而不敢動者以是薦剡日騰於上而怨怒日盈於下彈文所列不過一二庸碌悃愊無華之輩聊充故事而已嗟嗟撫按意向屬官之所奔走也撫按舉劾屬官之所轉移也而今若此世安得有吏治乎好官不過多得錢原屬昔人謔語今竟守為祕訣人見得錢既多又復好官自我通神得力轉相效尤卓然自立者有幾即謂吏之多貪實上官教之可也又何誅焉若其潔已愛民者有顯庸剝民自肥者有重戮昭昭垂示斷斷不假甄别嚴而賞罰當茍非病狂喪心誰不自愛其官所謂借其愛官之心以成愛百姓之心則風勵之善術也昔齊威王不過一霸主烹阿封墨齊國遂以大治正於風勵天下之術有合耳今皇上鋭意太平將立致唐虞之業而海內未有向風誰司撫綏激揚無效臣每為痛心思一力破此關然地處暌絶權在受成無一事不需查議無一官不需開報而又不能為鉤距之術以耳目人所恃為耳目者惟司道府㕔各官故責成亦宜先自各官始語曰大臣法小臣亷豈亷節止小臣事哉所謂法者即以亷為法也已不亷而求人之亷則無法以身致貪而以令責亷則無法所升者不亷而所黜者不貪則又無法果欲以亷為法則莫如斷絶饋遺夫饋遺者以交際為名而賄賂為實者也此徑一斷則情面自絶威望自肅上下綱紀相維職事相課了無沾滯而後真是非乃出真懲勸乃行豈不休哉行之歲月而吏治有不變民生有不安臣未之嘗聞故持一亷為對證不若拈一法字法乃祖宗以憲後世皇上以繩羣工者也律云官吏受財者計贓科斷追奪除名饋遺非贓乎枉法者通算全科受饋遺而有曲庇非枉法乎臣特揭與諸臣約煌煌在上或無敢有越厥志臣若自言而自背之無所逃說謊之律諸臣而仍不回心以相應臣請操三尺議其後則諸臣實負功令臣未嘗負諸臣即負諸臣臣敢負功令哉伏惟天語申飭施行臣不勝激切待命之至疏入得㫖懲貪責成道府執法禁饋甚得申飭吏治之要該部即與覆行陳黔省情形用兵機宜疏崇禎二年朱燮元臣自歷黔境乃知萬山皆苗獨上下六衛一線通道迤西畢烏赤永四衛久被酋隔計省城歸業者尚不滿五百家敗址殘阡蕭條滿目祗有營哨各兵略為裝㸃該先任撫臣傅宗龍以洎前督臣張鶴鳴皆逐衛設兵出據屯堡迄今滇路疏通米不騰貴實有攸賴近日龍場六廣乾溝徉狼劄佐等處築城四座漸進逼賊大勦規模似亦粗立但此戰局也城多則守廣勢分則力微酋隔河立哨日夜耽耽譬則騎虎安能復下曩所恃者安其爵欲得官而效順今被逆彥逐入東川箐峒矣海子峒民兵居酋腹心頗有牽制今已淪陷矣入秋水涸酋必四出大犯此定勢也臣惟八年以來局面屢換或專言勦而殺其獻功之人益致狂逞或專言撫而未張撻伐之威酋亦不附今日之䇿在於以守為戰以戰寓撫專講致人之法嚴為先事之防將必求於摧鋒兵必期於用命爵秩太易則精神全在競賞提哨太多則臨陳反相推諉業已申明備為訂定若墨陳紙兵謬居參贊之職白衣遊食爭誇軒蓋之榮此皆軍中大蠧臣先從此輩破情斥絶隨遍歷各隘觀其營壘移平就險改近據衝日取各將士較其膂力多寡試其銃弩槍刀三試而不中程者即行汰革其地方最為害者在於零星小功緣各將坐耗廪餼無可搪塞有虛報賊級而殺順苗以送驗者有一將已經撫定而一將乘隙掩殺者有本來投順而詭稱設伏縛獻駢首就戮者夫環黔皆苗安能盡殺御以威信總是良民况六衛腴土儘多全賴此輩耕墾惟是殺不當罪事每失信遂致鉤夷生釁叛服不常臣三令而五申之逆則必勦毋縱惡以養奸順則共撫毋此收而彼殺肘腋之間安靜妥帖然後一意圖賊募耕墾以資粒食懸賞格以廣招徠戮訛匿以定煩囂省差遣以絶需索清郵遞以節虛費把兵精勇者悉收之降將有勇者參用之任忠實之土司選屢勝之弩手用一將必求當一將之才養一兵必期得一兵之力日夜孜孜不敢怠遑按臣蘇琰與臣同心持火攻祕方親於公署督造試有竒效一切指揮風行雷厲司臣朱芹等道臣張允登等皆拮据劻勷不遺餘力倘糧餉獲敷三方畢㑹臣自當親率將士直搗長驅若其勢有可乘機難明布用竒迭出惟力是視固不敢孟浪以蹈前車亦不敢優游而稽天討蠢爾小酋伎倆有限安位一騃豎子夷漢相猜各自爭攻正苗運告終之日仰仗皇上威靈一二年間或可滅此妖氛以少靖疆圉矣疏入帝從之議主客兵餉疏崇禎二年畢自嚴臣竊惟方今軍興孔棘財用匱乏朝夕講求得一最耗糜之大端最節省之要著則軍餉中之客餉是已夫各鎮主餉之外又有客餉主餉者計口之需也客餉者不常之用也總計各鎮客餉已一百九萬三百餘兩矣客餉之費不一其大者則有征調之費邇來征調漸稀即循例分防入衛者用亦有限而支放開鎖寧無九實一虛事故扣存寧無報一漏二至於以主為客調遣不離本鎮何以行坐兼支此不可議節省乎其次則有撫賞之費今宣大撫局方殷勢恐難惜小費至各邉叩款無日而奸辨仍居為竒貨此不可議節省乎又其次則有召買之費貴賤相權本折相生原屬善政今則高擡時估從中漁射巨萬金錢半供飛銷此不可議節省乎又其次則有修築之費夫一勞永逸工作豈成年例且估計報成冒破更自多方此不可議節省乎年來臣部按額題發而法阻於綜核各邉計數責償而情憚於清理不分孰主孰客誰知用少用多及給發難前盡以危詞恐赫曰枵腹待斃此為主餉言則可耳其於客餉何與焉臣度今日之財用至不足之中各伏其有餘而以根究無人遂爾埋沒於因循徒使拖缺虛糜中外開一互諉之端而成一相沿之局亦誰思其究竟哉請及今亟定節省之計以後臣部發餉先儘主餉其客餉必不可已者各鎮督撫豫行造册奏報敕下臣部核算無弊方行題發各鎮仍於季報內詳細開銷或解運遷延各鎮不妨於主餉中通融支散候客餉到抵補庶在各鎮用之有實臣部省之有名而百萬之中可以節省過半矣至於主餉仍合民屯兼本折而定經制務為長久之䇿永垂可守之規亦籌邉裕國之上計也疏入帝從之請無急近功小利疏崇禎二年劉宗周臣伏見陛下勵精求治宵旰靡寧然程效太急不免見小利而速近功夫今日所汲汲者非兵事乎誠以屯守為上䇿簡卒節餉修刑政而威信布之需以歲月未有不望風束甲者而陛下方鋭意中興刻期出塞當三空四盡之秋竭天下之力以奉飢軍而軍愈驕聚天下之軍以博一戰而戰無日此計之左也今日所規規者非國計乎陛下留心民瘼惻然痌瘝而以司農告匱一時所講求皆掊克聚斂之政正供不足繼以雜派科罰不足加以火耗水旱災傷一切不問敲撲日峻道路吞聲小民至賣妻鬻子以應有司以掊克為循吏而撫字之政絶上官以催徵為考課而黜陟之法亡欲求國家有府庫之財不可得已功利之見動而廟堂之上日見其煩苛事不勝糾人不勝摘於是名實紊而法令滋頃者特嚴贓吏之誅自宰執以下坐重典者十餘人而貪風未盡息所以導之者未善也賈誼曰禮禁未然之先法施已然之後誠導之以禮將人人有士君子之行而無狗彘之心所謂禁之於未然也今一切詿誤及指稱賄賂者即業經昭雪猶從吏議深文巧詆絶天下遷改之途益習為頑鈍無恥矯飾外貌以欺陛下士節日隳官邪日著陛下亦安能一一察之且陛下所以勞心焦思於上者以未得賢人君子用之也而所嘉豫而委任者率奔走集事之人以摘發為精明以告訐為正直以便給為才諝又安所得賢者而用之得其人矣求之太備或以短而廢長責之太苛或因過而成誤且陛下所擘畫動出諸臣意表不免有自用之心臣下救過不給讒諂者因而間之猜忌之端遂從此起夫恃一人之聰明而使臣下不得盡其忠則耳目有時壅慿一人之英斷而使諸大夫國人不得衷其是則意見有時移方且為內降為留中何以追喜起之盛乎數十年來以門户殺天下幾許正人猶蔓延不巳陛下欲折君子以平小人之氣用小人以成君子之公前日之覆轍將復見於天下也陛下求治之心操之太急醖釀而為功利功利不已轉為刑名刑名不已流為猜忌猜忌不已積為壅蔽正人心之危所潜滋暗長而不自知者誠能建中立極默正此心使心之所發悉皆仁義之良仁以育天下義以正萬民自朝廷逹於四海莫非仁義之化陛下已一旦躋於堯舜矣疏入帝以為迂闊然歎其忠請撫恤三秦疏崇禎二年吳焕臣謹奏流賊之戕害全秦禍中於西安漢中最烈鄜延宜雒之境實係賊大淵藪往來結聚處也臣自奉命巡行離西安而北初至耀州又北而至同官其荒凉廣漠之景即巳迥異長安至一出金鎖關則為宜君為中部鄜州寧州真寧千餘里皆荒山大川竟日行不見民居烟火纍纍白骨委溝壑臣每至一扼塞即向山谷之中搜飢民問之至一州縣必停車一二日遍訪父老子弟真聞真見乃知耀同宜中鄜雒寧真數邑之民自遭大荒大亂大疫之後死亡逃散十分已去其六七孑遺茍活惴惴焉皆團聚一隅其餘極目曠土遍地蓬蒿山窩水窟盡為盜藪而此孑遺之民既虞盜賊之復來又憂荒地舊糧之拖纍終日皇皇只思逃竄他鄉以全性命臣再三撫慰許其即奏聞朝廷為汝料理無不感泣號慟令臣不能仰視而府州縣官居其地者皆思卸擔求去新選者多半聞風不來故延安府屬之官十缺其五慶陽平凉二府之官十缺其七若目今不為計處二三年必化為異域臣竊思此鄜延寧真之地皆前朝所創為雄都巨鎮先賢韓琦范仲淹從此奮武揆文外卻敵而內拱護者也今何以一旦至此哉蓋緣此地界在邉腹主無專屬故向來在內之臣委之邉鄙在邉之臣視為贅疣且土寒地瘠三四十州縣坐定為老明經之缺潦倒貪殘無所不至故官輕俗悍一任强陵弱衆暴寡魚肉刀俎而莫之禁戢觀其可憐之狀真如無母之子流離荒野直棄之悍奴豪賊之手而無可控訴嗟乎此三郡者尚可緩視之哉長邉踞其北則三郡乃邉鎮之腹心省㑹居其南則三郡乃長安之門户如及今再不料理使窮民散而盜賊叢則腹心化為毒蝎而邉鎮何所恃以自固門户盡為賊窟而省㑹何時得而安枕臣愚以為欲絶三秦之亂萌必先從此地急為下手臣初出巡時即與撫臣熟商及此及行至鄜延目擊顛危方且躊蹰深計而督臣遺臣手書鰓鰓數百言所以為三郡計者甚悉皆先得臣心之所同然敢不忌煩瑣一一為皇上陳之一曰分荒熟以便徵輸延慶之地山深川廣土曠人稀今值兵荒之餘且死徙相枕阡陌荒蕪若仍舊額不為分别則遺民欲墾熟田先防荒纍坐是束手欲逃應急令公勤之吏履畝注明將荒糧暫停為之歸併里甲止據現在徵輸百姓既樂於荒田之不拖纍又曉然知成熟者之不可推諉將民業可安而錢糧亦易辦至便計也一曰緩舊糧以完新稅舊糧之拖缺已非一日之積今死者死矣逃者逃矣即現存遺黎皆鵠形鶉結茍活無計新稅固不堪為夙逋之償而趙甲豈能代錢乙之纍即額缺不可頓蠲而徒挂空名亦無益目下不若將此數邑暫緩舊糧使其一一完新新糧不及額者官有常罰民有常刑則吏胥不能借名以混淆户長亦難指舊以扣剋可以恤民力而亦便徵輸矣一曰搜盜窟以拔禍本盜之不可盡也豈不欲悉化盜為良以仰體皇上並生之願然無奈盜積有年按延慶之南則尚有本地大窩營三窟以盤結延境之北則神木府谷地方秦晉交界更多邉回賊聚千百以鴟張兩地聲勢相應此皆亂民絶非飢民也依慿城社搜之急則倡為殺良之說以挾官府防之緩則時逞咆哮之威而肆虜掠今若諭之不可懷招之不可聽必將大整兵威掃除之以拔數十年之病根不敢不先為皇上告者也一曰給牛種以續民命自盜賊興而民間資糧牛畜殺虜殆盡故有土既患無民有民又患無耕土之具幸皇上允罪撫贓銀賑濟候山西撫臣追解前來應令各州縣乘今秋榖價稍賤糴貯倉廪賑給此則撫臣先清查貧民户口已有頭緒即當飭有司亟圖者也一曰選縣令以託民依延慶平三府土瘠民貧俗囂糧缺故多坐明經之缺不知欲濟艱危正需才幹一官到任萬命攸關大縣必期揀選科甲即明經如恩選貢亦儘多青年壯志此在吏部掣籖注選時一覽可見必須選擇精明强固之人不然漫以龍鍾潦倒朽儒付之是直以萬千民命委之溝壑矣一曰少寬疲邑考成以展吏才夫考成之法以課羣吏豈容寬假然在上疲之邑難及額即新糧不可寬而舊糧必祈通變如以幾年逋負責之現在一人將州縣未到任先懸參罰以待之故來者悔而思去選者聞而不來其不肖者明知考滿無望貓鼠吏胥惟祈稍潤槖以去故民任瘡痍糧皆挂缺若得寬舊糧之罰而止考新糧之成則官得安心料理民生有賴國課亦得輸矣一曰平薦舉以鼓吏治薦舉之法從來明經盡壓於科甲之下即預薦者亦甚寥寥不知全陜州縣官明經十居其九我先棄之彼安得不自棄非棄官也是以數十州縣民命棄之也况現在臣所耳目儘多錚錚自好在不肖者斥問宜嚴而能表異者薦揚宜廣此今日振揚吏治之先務也一曰清宗祿以救民困平凉宗室繁悍當事日抱隱憂止就宗祿兑宗糧一事論之有以祿少而欲兑多又以無糧而包攬强兑奸貪吏書既通同以作弊不肖有司亦託詞以謝責民受其殃而邉虧其餉端實由此計莫如申飭道府州縣官盡數清查某宗應食祿若干應派定某州縣某宗應納某州縣糧若干各先定一清册以應食之祿配應納之糧糧浮於祿則本宗找辦官糧祿浮於糧則有司找還宗祿井然分明不容紊亂臣已經出示清理自非邀皇上之命則有司法令不行此救平凉之民於水火最急事也此數者乃為全秦决涣潰癰拔本塞源計行之非一手一足之力今幸督臣與陜西延綏兩地撫臣皆念切痌瘝同舟共濟臣一路巡行目擊危形心憂亂本竊計當急從此下手故雖字踰限額不敢不縷陳於皇上之前祈皇上天語丁寧下部敕賜准行如臣所奏請分荒熟緩舊糧搜盜窟給牛種選縣令寬考成平薦舉清宗祿許著實奉行計無阻礙則三郡肩背脊膂之毒可除而全秦通體皆得安泰矣其關於邉防內患殆非渺小非沾沾為延慶平三郡計也臣不勝悚息待命之至疏入得㫖據奏延慶平三郡景狀殊可軫念安民弭盜奏內八款允於補救有裨著各與覆行缺官速當銓補勒限到任已補不到的吳焕便行查參該部知道革大户行召募疏崇禎三年范景文臣奉命撫豫日思所以撫之之方而求一當惟是與民休息為第一義顧今天下民生瘁矣或困於水旱此患在天者也或厲於盜賊此患在人者也尚可隨時補救隨地銷弭不至大苦獨官患苦之而莫可解免則莫如差役臣請得而悉數之如錢糧之收有收户解有解户驛遞有馬戶供應有行户皆僉有力之家充之名曰大户固曰有田則有賦有賦則有庸則壤作貢理或然也而所僉實非真大户何也大户之錢能通神力能使鬼不難幸免而脫雉罹大半中人耳中人之産氣脉幾何役一著肩家便立傾一家傾而一家繼一家繼而一家又傾輾轉數年邑無完家矣即彼所謂能通神能使鬼以免一時者亦漸日朘月削免與不免同歸於盡此不水旱而荒不盜賊而憯者也豈不痛哉往時建議者心痛之變為條鞭法以闔境之力役均於闔境之丁糧此其苦宜少蘇矣而試觀民間有不經年纍月奔命於公家者為誰有不賣妻鬻子罄資於津賠者為誰是條鞭之行者自行而大户之革者未革也總之役在民則官便役在官則民便此不兩利者也便在民則民欲革便在官則官不欲革此不兩立者也夫官民之不相勝也久矣有司官即不無念及民瘼者無如胥徒之中為格何蓋僉派一行則手得高下口得低昻日市其重於民間而民奔走以奉之嗟嗟民間天子藏富之地而反為彼外帑以致官日富而民日貧在官之人日富而民日貧民貧矣國安得富私費多而公賦詘此必至之數也臣剜心蒿目議下有司實行條鞭之法一切差役俱歸之官錢糧官雇人收為議廪餼官差人解為議盤費倉漕為之議腳價官委人置驛遞為之議芻豆官募人養供應以市值平買不立官價名色凡夫傾銷添搭幫賠之費徹底蠲除百年患苦一旦灑然不亦快乎是非移民之害於官也官任之而害自減耳官自經手官自留心金錢無所容其穴窟倉箱無所容其耗蠧郵驛支應無所容其冒破在民免於害而官亦并受其利所慮失利者獨胥徒耳置官以為民豈為胥徒哉如有日與胥徒比而陽奉隂違名去實存者斷以白簡隨其後從此百姓辦正稅而外足不至官府目不見青衣日惟是含哺鼓腹以嬉遊於化日是亦一時華胥也即猝有水旱盜賊亦有以待之豈足為厲哉嚮臣司理東昌曽行此法歲所省以數萬計東人至今思之臣不揣欲以已效之法試之兩河以起沈痼將欲使兩河亦如二東也而今量移矣人去法更久將復斁所關於民生休戚者最大故特披瀝於聖明之前其中條欵頭緒繁多不敢一一瀆覽而略陳其大端如此臣謹㑹同巡按河南監察御史吳甡具疏以聞伏乞天語申飭著為功令敢有變法虐民者官吏議處參究不少貸將休養既久物力漸充久安長治端必由之矣疏入得㫖體恤民隱是撫按第一急務這奏內革僉派行召募飭吏治安民最得要領便著定為例勿輕變更該部知道督黔善後事宜疏崇禎四年朱燮元臣惟邉徼雖安不可忘戰制夷之法必先內固水西自河以外六目九司之地亦頗廣衍業巳悉入版圖大渡要隘俱築建新城列兵據守既有扼項拊背之勢當為深根固本之謀從來人土財用原自相因參據衆議必須分建衛所責成有功各將久任世守不惟鼓舞激勵用為酬勸之資且因以勞來安集永杜窺伺之漸請備陳之安酋地方中有河一條安莊與普定適中之所為三岔衆水至此始滙為河織金臥這等酋皆由此出犯臣於三年四月內牌行參將范邦雄在地方鐵王旗築城一座距安莊九十里普定六十里距河尚十五里建高寨一堡另設山京下窩化處蔣義架底五哨以環之由鐵王旗迤北與平霸衛相對為思臘河係應察阿奎阿傀等各酋出犯之路臣牌行遊擊金良田離平壩西三十里樂平地方為三路總隘建城一座移兵屯劄又都司僉書任先覺率里民於七里房沿河築一石堡離樂平又四十里由思臘而北為簸箕隴又迤北十里為鴨甸河又迤北三十里為鴨池河此則各酋㑹聚出入之大隘與威清衛相對隔一百四十里崇禎二年六月臣與御史蘇琰查此一路羣賊如毛先於距威清六十里乾溝地方督副將楊正芳一面驅殺一面建造石城以便駐師及後過河戰勝臣因與撫臣撤出各兵劄於河上總兵林兆鼎率同楊正芳陳謙彭應魁袁可成覃載勳等各將共於鴨池河岸上分定丈尺建城一座都司僉書任先覺亦於簸箕隴建城一座皆上據高原而下瞰長流即一葦片刀無不瞭然者自鴨池迤北三十里為大索橋乃各賊暗渡之所已建一石堡又迤北四十里則為六廣此酋千百年通省官道也天啓六年該前任御史傅宗龍行副將今升總兵官王國正建劄佐等處五小城又崇禎元年前任督臣張鶴鳴㑹同巡按御史陸獻明行本官建龍場大城一座題奉明㫖命名敷勇臣履任後與御史蘇琰酌審地勢去河尚逺仍牌行王國正責成將官方國安劉鎮藩於六廣河岸建城一座又於迤北三十里虎場地方建城一座以防暗抄自此迤北三十里為黃沙渡臣行袁桂芳於九莊地方築城一座距渡可十里又迤北六十里為明家渡先是崇禎元年督臣張鶴鳴行參將牟文綬建城一座題奉明㫖命名息烽臣閲其規制稍狹行參將牟文綬展拓工未竣而奉調入衛臣行袁桂芳同守備牟海竒修築報竣今年二月又於烏江渡口築一小堡過此河皆繞蜀境矣以上各城如敷勇鐵王旗乾溝俱九里三分高二丈鴨池息烽俱七里三分高一丈八尺六廣六里三分高一丈六尺虎場九莊簸箕隴樂平劄佐俱三里三分高俱一丈五尺內外用石包砌以上皆在酋地控制河岸用以防邉者也貴州省城向苦湫窄居民多在北關酋變將積聚盡焚以致大餒臣行王國正楊正芳陳謙彭應魁張舜齡孫志學袁可成覃載勳等共築新城一千丈悉造三門廣順州無城向苦賊害三年二月內行屯田都司孫志學定廣守備蔡紹周署州事都事馬登崙新築石城一座洪邉開科地方該河防道僉事沈翹楚親督築石城一座又安南普安二衛地方該參政朱家民督率各將前後築新城十一座此皆防盜竊發用以內固者也迤西四衛除永寧衛城堞無恙畢節衛安酋代修其赤水衛普市所摩尼站多被毁掘該道參政鄭朝棟㑹同總兵許成名督各將從新修造用以聨滇蜀而馭夷通商者也以上各城木因於箐石因於山採取扛擡則因之兵力惟木石二匠磚灰二窑頗費價值皆各將捐資督兵拮据共效臣與按臣或助工費或犒工匠俱載部册為費頗省臣據各將報到工次恐其茍且搪塞於今年正月初八日自省出巡南至普安北至烏江遍歷查閲至二月十七日回省查驗所報俱符中有未建月城與丈尺稍不合者摘出修補今四月內陸續俱報到臣該臣看得城垣立則屯劄有區田土闢則粒食漸廣與酋相隔近則一河逺亦不過數十里聲息易聞哨探聫絡若守之俾無失墜定無意外惟是各將勞苦十年無不勃勃各懷出谷之思臣惟久任屢煩明㫖重地須用宿將近日兵部推用王國正為總兵不惟人地相宜且見功苦得酬將士暮氣劃然一開此亦鼓舞責成之關鍵也所有各款事宜謹具列於左一設建衛所查得通省新城如安普十一座廣順開科等處皆係內地祗是整頓舊日營哨因壘為守不煩更置惟沿河自三岔起至於烏江內如鴨池敷勇各宜設衛鐵王旗息烽各宜設一直隸守禦千戶所敷勇則以六廣虎場九莊烏栗為四所劄佐小索橋凹絞設為三哨鴨池則以大索橋簸箕隴乾溝樂平為四所七百房安家橋麥城設為三哨鐵王旗則以山京下窩化處蔣義架底設為五哨息烽則以烏江明家渡落邦開科設為四哨大小相權如臂使指無事荷鍤而耕有警一呼可應為長久計似無出此一久任世守查得沿河一帶向為酋地今俱各將戍守應增新缺除總兵王國正外如鴨池副總兵楊正芳安莊副總兵商士傑鐵王旗參將范邦雄六廣遊擊方國安初守六廣今調徉狼遊擊劉鎮藩樂平遊擊金良田九莊部劄遊擊袁桂芳簸箕隴僉書任先覺皆應責成久任內范邦雄應加副將方國安劉鎮藩應加參將袁桂芳應與實授敷勇鴨池宜設指揮各三員千户各六員百户各十員鐵王旗息烽宜設指揮各三員千户各四員百户各六員擇其勞久功多且專任版築之役者容臣酌議叙題世守再照九司尚存其三如養龍司土官蔡啓東底寨司土官蔡應吉乖西司土官楊光綬家口俱被殺虜或無助逆實迹應照播州袁初袁切事例改為世職副千户附入息烽其産悉聽照舊管業庶省此贅疣且便控制一監臨提調衛所既建將士碁布則勢易相畸而力亦易分如總兵官王國正整飭沿河一帶奉有明㫖除責成駐劄龍場時時巡歷經理外中間統馭查核必藉監司如沿河巡視兼理屯田此河防道責任然官係添設未必久任如鴨池鐵王旗一路應隸威清安平二道敷勇息烽應隸貴寧畢節則貴陽府為提調各有界限庶便責成一官俸兵食衛所既設土地亦闢添官必資俸廩設戍必需口糧相應即以地之所出收取為用今計沿河一帶地儘廣衍惟是各將士從去歲至今甫息水西之役又有狼峒擺金火烘兩江之役未遑開墾近日又抽援滇省故未能一一清楚大約二衛二所安定之後祗可用兵萬人計舊例一軍授水田十二畝旱地六畝今應照二祖成例量寬之俾足自贍其各官俸廩亦就中取足近日現兵除下六衛省城并安南普安二衛外沿河一帶幾及二萬自此地可漸闢兵可漸裁今方寓戰於耕後可即兵為農其田現在清丈地方豪强侵占影射負固不明者容臣一一以法懲之一更易新名二衛二所之地經臣親閲二遍公署街市雖云草創亦可棲止街市團集多者千餘少者亦有數百家生聚日久自當改觀如敷勇息烽於襄連雲有嘉靜氛恬波奏膚俱䝉欽命新名今如鴨池鐵王旗樂平乾溝簸箕隴六廣九莊虎場開科鼎站阿機尾灑定頭小龍場亦資孔乞請皇上俱賜新名改易耳目一振僻陋其二衛應設經歷各一員二所應設吏目各一員臣已行各將俱草創一署合敕吏部選授以上各款俱因陋就簡草立規制臣疏庸暗陋多有茫昧統祈敕下兵部酌議覆奉明㫖容臣遵奉施行謹題疏入帝從之陳黔蜀連界扼要情形疏崇禎四年朱燮元臣謹奏竊照黔之迤西四衛曰畢節曰赤水曰烏撒曰永寧永寧衛與蜀之永寧宣撫司連界犬牙相錯向來彼此相安未有爭者自奢酋作難先將黔之辨紳士民恣行屠戮然後四出犯蜀其幸脫者或入箐峒或被掠賣或逃入烏蒙鎮雄十年以來不見天日今幸事寧稍稍還集流離瑣尾之狀有不忍見者夫哀鳴日久誰無安宅之思黍離可悲宜與生全之計顧此衛為黔蜀合縫之區若事不兩利情不交暢則措處失宜紛搆環起非大公之道長久之術也總惟照祖制以清界限酌近勢以定規畫俾協於情而當於法則彼此自可相安而地方庶可鞏固臣不揣愚暗謬列五欵於左統冀聖裁一黔蜀界址查黔之永寧衛設自洪武四年屯田五萬三千二百九十畝其餘皆為四川永寧宣撫司之地舊制宣撫司城垣衙署原在城外後因宣撫梗法生事議遷城內以便彈壓自是宣撫司各夷與蜀人多相雜而居今黔蜀紛紜互爭甚至假威權以恣虐嗟此孑遺多有不保生命者近閲邸報吏部已升有永赤同知蔣之芳合責成本官到衛臣移㑹蜀中撫臣委府佐一員查舊日街巷自辛酉以前為率喚集父老將街地逐一踏勘某為黔某為蜀某為宣撫司各查出原址周圍丈尺取各認狀是黔還黔是蜀還蜀則公道昭而人心自服矣一蜀鎮駐劄蜀之幅員最廣設立總鎮原無定所惟地方用兵隨處屯兵劄駐如松潘越雋遵義建武皆有舊駐衙署今奢賊既殱水西就撫西則普市摩尼赤水南則瀘衛建武交錯相環永寧一塊土反在腹裏查此衛係黔省按臣出巡察考與提學道臣考試駐劄之所今此彈丸地武士若林布滿街巷黔之軍衛士民曽不得聚廬而託足焉夫以全蜀之大决不宜駐總鎮於黔衛查自永寧至瀘衛五十里由瀘衛至建武九十里相距頗近論形勢則建武扼控諸蠻最為要害舊有衙署亟宜移駐即不然則瀘州衛或城外宣撫司舊基皆可駐鎮惟將此一衛仍歸黔轄庶疆界明白而流移獲返此似不待再計者也一川貴參將查永寧衛原設迤西參將一員統束衛所各軍以資守禦及後改為川貴參將兩員交轄除黔用衛所各軍外蜀以鎮逺營兵輪番撥防奢賊發難時參將久缺新推萬全尚未履任以致縱橫無忌今川貴參將武聲華反移駐瀘州衛舊制盡失且黔中衛所各軍分屯歸伍誰為管束相應仍照舊制移駐該衛督修屯政嚴行操練兼飭蜀中防兵以修武事庶幾事有專責勢可兩利也一四川叙馬瀘道駐劄蓋四川之有叙馬瀘兵備副使原用以整飭兵防保固邉境兼制鎮雄烏䝉烏撒東川四上府責任綦重守道已駐叙府巡道已駐瀘州獨叙瀘兵備向駐長寧縣今復移駐叙城相距建武永寧為期五六日最屬不便曩者永寧宣撫司棄為外夷蔑有彈壓以致尾大不掉今藺土內外既入蜀之職方自應就近統理合將叙瀘道署移入蜀之寧衛宣撫舊基之內其於建武瀘衛相距不逺既便飭兵搜乘兼可鎮夷消萌似為妥便夫總鎮則議移而兵道則議入者蓋文臣法紀清肅隨從稀少軍民咸有依戴彼此自可相安也一宣撫司內外四里昔年攻入永寧奢賊父子遁走時臣未經履畝審據降目并蜀人習藺事者俱云奢賊地有內外四里外四里地多平原與江安納溪瀘州合江仁懷壤界相接向來俱蜀人佃種照額輸租其內四里與水西接壤多荒山險囤惟古藺州稍有腴土俱係各目分管奢賊責令輪當驛馬蜀人曽未有至者是時餘孽未靖兵革方興臣因其舊習以外四里開屯贍兵以內四里分給降將參據衆議謂有三善藩籬要害人自為守一也兵部題奉明㫖賞格頗侈借土酬功不煩另賚二也效忠者即給土授官俾諸夷各把日後具有榜樣三也各將如羅乾象仗義解圍擒斬魯仲賢等甚至賊當陳臠其妻子而不顧羅京周殺逆寅於險箐胡汝高先赴義於成都又畢應台鄢介王心一羅甫宋武張令等聽劉養鯤之招仗義擒凶共出死力皆懸望酬賞以彰大信今准四川撫臣張論移㑹疏藁深籌熟算欲建長官司俾令世守業有確論其經理創始臣實首事不得不述其概至於近日時異勢殊道鎮持議或有異同又當隨時斟酌務求長便臣已在局外合應專聽四川撫臣與按臣酌量處分不必以臣議為據也以上各款統祈敕下兵部酌議覆奉明㫖行臣併四川撫按二臣遵奉施行謹題疏入帝從之蠲錢糧疏崇禎四年畢自嚴臣竊惟百姓之所苦者在催徵而州縣之所苦者在彈射在有司顧此失彼勢必挖新以補舊在百姓暮四朝三何如蠲舊而除新試查照舊册未完之數直截盡蠲布告海內曰户部天啓六七兩年舊餉未完俱照恩詔概置勿問使百姓曉然於金石之令有司亦不致前後瞻顧為猾胥所愚以困百姓則蚤蠲一日蚤得一日之休息矣抑臣因是而並有請於六七兩年新餉之雜項也夫臣與同官右侍郎周士朴題定帶徵載入考成催督矣疏墨尚鮮臣豈忘此惟是天啓六七兩年省直雜項臣部徒虛執其籍至崇禎二年各地方始認有定額今欲以新定之額懸索未認之項於三四年前無論有司實應且憎而催者自催逋者自逋其何以信功令且雜項最多者惟抽扣一項而抽扣實在舊餉之中今舊餉既蠲則不得不併蠲雜項也否則我欲帶完六七年之二分而彼將割三四年之二分以應那東補西名完實缺况乎完者之寥寥也臣竊憶年來搜括之煩沃土亦鮮遺力參罰之頻循吏幾無完膚凡可為督逋計者臣部不憚儘力行之矣乃時將夏季初限大半愆期豈有司之愚甘以其官為射的而狃緩征之小仁忘巖疆之大恤耶大抵民間止有此物力寅支邜糧則邜年之逋勢也郡縣止有此敲撲趲新償舊則新額之逋亦勢也臣愚謂欲急現額正當示寬舊額欲了近缺正當盡蠲久缺則從此現額之相續捷如流水或可計日以俟也比者秦晉災荒業已數年頃復旱魃為虐即齊豫江北之區俱見告矣若必待其籲請而後蠲何如恩自上出者之足為感動也謹將天啓六七兩年未完舊餉并天啓六七兩年未完雜項共銀五十二萬一千五百有竒開列於後恭候聖裁其已徵收在官或起解在途者地方必有文案若故為隱匿剋留者臣部得於訪聞定執白簡從事即省直撫按亦自當據實簡查以聞也伏乞敕下臣部將天啓六七兩年恩詔內應赦舊餉照數豁免併六七兩年新餉內懸坐未認雜項照數停徵庶省直得一意完新而亦用以蘇息災黎矣疏入得㫖這天啓六七兩年各省直未完舊餉并雜項銀兩依議照數蠲免以示朝廷軫恤窮黎至意其有巳徵及起解的仍著查明報部敢有乘機隱剋者定行重治御選明臣奏議卷三十九
