  text: 欽定四庫全書御選明臣奏議卷二十四
  hash: sha256:514321be9c03ec5aac8ec9b0dbed814cc3295411b42e836a265845b601747d97
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_027-1a, image: WYG0445/WYG0445-0375a.png}
body:
  text: 劾李如圭張瓚疏嘉靖二十一年周怡臣竊惟連年敵人侵逼更番迭入人皆知籌邊失䇿由總撫之臣失職不知邊臣失職實由根本之地大臣不職所致不于根本圖之而惟枝葉是務未見其善也夫禦戎之要莫急于兵食兵食之根本莫重于戶兵二部兵食不足邊臣無所用其智勇戶兵不得其人而欲足食足兵亦必不可得也臣觀戶部尚書李如圭之理錢糧也當邊圉多事官兵所急需者惟在芻糧各鎮撫臣每有題請如圭漫不經心司官以職掌呈議方且悻目視之言邊鎮之事自有邊臣司之何預戶部動為題覆夫尋常無事之時當當悉心竭力變通調度以求生財裕國之道今乃于急要之日蔑視國事罔修職業不忠如此將焉用之今山西屢遭兵革上厪聖心軫念生靈蠲免稅糧又發內帑命大臣賑濟憂深慮切真痌瘝乃身之心也如圭曽亦思所以仰承德意下恤邊方而有變通調度之方否耶臣又聞河南周府往嵗奏增祿米價銀如圭貪受賄賂不行勘查徑自覆題每石加銀一錢共加銀二萬四千餘兩原價每石三錢五分尚且嵗有逋欠無能追納河南撫臣因地方時勢之難奏請戶部宜圖經久之計今如圭竟不為調處臣見舊逋愈加積欠新增徒有虛數而已臣聞周府知撫臣有奏令人齎送銀萬餘如圭等乃為覆題及周府分派祿米每米扣銀五分計銀一萬二千餘兩以補前費遂致宗室閧然不平訐呈巡撫至今追銀問罪未結夫王府乃天潢一派帝室懿親祿米自有定數增減自有法例屈伸盈縮與時消息是以該部之責也如其當增則亦當考前此何為而不增及今時可增與否明白議奏請自上裁豈可貪受賄賂以私賣耶如不當增則枉法受賂尤大不可于王室至親尚敢姧貪不法而况于其他耶且今日大功之建邊防之費日新月盛帑藏已虛民力已困凡宗室賢王亦知上體國憂獻金銀以助萬一寧得于祿米定價更欲求加重困朝廷耶如圭職掌司農罔思國計乃反徇私貪賂賣朝廷之恩壞國家之政王府不沾實惠百姓日見流亡尚何望其調度以給邊防之需乎如圭不罷欲求國計之充足決不可得也兵部尚書張瓚屢經論劾荷皇上姑留罔思報效凡遇都督總兵副參遊備之升補無非平時賄賂之私人其賄賂者豈皆取諸私囊大都借貸于巨室一得升補即刻剝軍士以償債肥家如此用人安望其有奮不顧生舍命敵愾者乎瓚今雖不受一賂遴用智勇之將而為所用者亦確信平日之心術而深疑今日之舉用以為危急之日雖舉用不次而饋賂之乏終任用不堅後之繼今者亦猶今之繼昔也今日尚何賴于瓚而任用之哉往者陜西奏徼幸之功本兵先蒙重賞廕子錦衣今日山西屢至失事巡撫總兵置之重罪則本兵亦當先受顯戮豈有成則先論其賞敗獨不可分受其罰即今日山西被兵二十七州縣孳畜一空子女盡去殺傷之慘尤不忍聞兵部近議用夜不收三十名往來探聼以為緩急之備山西撫臣乃厚賞兵部部復厚勞之令其勿言山西之慘止言敵人已困殺馬而食以懈衆心以罔朝廷瓚等職掌本兵乃互為欺蔽上負聖眷而不顧下犯人言而不恤尚何望其折衝萬里哉張瓚不罷欲留智勇忠義之將決不可得也其提督十二團營兵部尚書劉天和年垂衰暮步履艱難氣血衰憊昨觀各城門揚兵之議有同兒戲夫團營之兵挑選精鋭內為王室干城之重衛外備四方不虞之救援必須精敏奮勵之臣以提督之則可以作六軍之生氣備萬里之長城今用此衰憊以當重任必誤大事但天和壯嵗自立素負重望及今衰年精神䇿勵自不如前合令致仕以全晚節别簡才智勵精之臣以充其位則于國體軍務兩得之矣夫籌邊經國必期兵食之足將帥之良使以匪人充之何以信天下之耳目鼓中外之勇志伏望皇上早賜罷黜速易賢才實宗社無疆之福邊方再造之願也疏入如圭還籍待勘瓚留如故天和致仕去請敕責大臣不和疏嘉靖二十二年周怡臣惟人臣事君無分崇卑無分內外皆以盡心體國為忠協力濟事為和自古及今未有卿輔大臣爭于朝文武大臣爭于邊而能修內治禦外侮者也近者內閣大學士翟鑾嚴嵩與吏部尚書許讚互相詆訐而大同總兵張鳳周尚文又與總制侍郎翟鵬及督餉侍郎趙廷瑞不和人持已見各自為心此事誤國實甚臣請近驗之一身夫耳目手足必從心所欲而各效其職茍或目視而耳不聼手持而足不行則于心志所欲曷由克副人君猶心志也內外羣臣猶耳目手足也人臣茍知尊奉心志寧肯耳目自相違手足自相賊耶故曰同寅協恭和𠂻哉風教之大禮議為先禮讓之行朝廷大臣為首朝廷者萬方之所宗仰大臣者羣臣之所楷模觀而效焉必有甚者朝廷有違言之隙則才譖之釁長于外大臣有動色之爭則攻鬭之禍流于下由今溯昔未之或易也皇上臨御以來三十三年于兹矣初年求治之鋭今日憂民之切宜乎天地位而萬物育矣今陛下日事齋醮而四方之災荒未能消也日求富國之計而府庫未能充也日下寬大之詔而百姓未能蘇也日下選將練士之命而邊境未能寧也此其故何也良由陛下勞心焦慮于上而下未有肯將命之臣也今何時也今內則財貨匱甚而百役繁興以外則敵人驕甚而九邊虛耗為輔臣者宜如丙魏同心輔政房杜謀斷相資夙夜匪懈凡可以利國家惠小民安邊徼者無不精思詳畫上以答君心下以勵羣僚可也夫何大學士翟鑾嚴嵩慿籍寵靈徇已營私播弄威福市恩修怨是二臣已不和矣何望其同寅協恭以事上而風下也哉夫輔臣真知人之賢不肖宜明告吏部進之退之則人心攸服不宜挾勢徇私以不可服人者屬之進退吏部亦宜有真心直節使人望之知畏雖權貴不敢以非義相干不宜依阿奉承一啓順端而後不可逆也今嚴嵩招權攬勢陵逼百司使凡有陳乞疑畏者罔不奔走其門先得其意而後敢聞于陛下中外之臣不畏陛下而惟知畏嵩也翟鑾則依阿委靡不能主張尚書許讚雖曰小心謹畏而不能以直氣正色豫銷權位要求之心弱亦甚矣詩曰有來雍雍至止肅肅相維辟公天子穆穆此盛世之氣象也今卿輔大臣隂擠陽排互相詆訐不思培植元氣愛護人材共圖折衝禦侮之計而務修私怨果何心哉臣恐大臣不和則憸邪細人乘間扺隙互相黨比媒糵啓釁非國之福也往時論劾輔臣御史如謝瑜童漢臣相繼假公事而罪謫之夫直言敢諫之臣于權貴雖不利于朝廷則大有力也今皆罪之謫之臣恐自是之後雖有如檮杌歡夔無復言之者矣入秋以來宣大已報聲息而文武總制大臣各立門戶各持意見平時既不相和協則必無長駕逺馭之䇿臨敵調兵按伏對壘必將甲可乙否彼是此非其不誤事敗謀也幾希矣朝廷設總制總督大臣欲其權力足以制三軍之命使無不如意也今乃各自為大而恥相下各自為是而恥相從是假之權位以相角而豈為衛國禦侮計哉伏乞陛下明垂離照無惑近論無忽逺圖戒輔臣無務修怨以竊威福戒吏部無務依違以輕黜陟戒邊廷文武大臣無懷小忿以誤大事更望虛心聼納先務和德于上則大臣公忠為國各務和讓于下區區外侮有不足攘者矣疏入帝大怒責其謗訕令對狀怡惶恐請罪帝怒不解杖之闕下復錮于詔獄尋釋之劾嚴嵩疏嘉靖二十二年周怡臣伏見嘉靖二十一年八月陛下敕令禮部尚書嚴嵩入閣辦事維時臣等即論重位不宜任以匪人既而言論紛集未蒙採納而于嵩也任之益篤遇之益隆夫豈真以嵩為賢而任之勿二耶抑豈以臣等之言真為未是而不用耶蓋嵩之奔走于陛下左右有年矣其心術之姧回行檢之汚穢人品之鄙劣識見之淺陋亦已照之悉矣第以目前奔走承順頗可驅役一時未有當意者姑令承乏亦因以試之庶幾感深圖報飭躬勵行嵩未必無人心耳嵩因人言自陳之疏云臣之負寃真若沈入苦海又云人泥往事臣以為嵩宜蚤夜以思上感殊遇下恥人言痛省往愆翻圖新美庶可以仰答聖明之萬一少息人言之責望不宜積迷不悟就下不返長負國恩反讎公是卒自同于盧杞裴延齡之歸也陛下近又賜嵩以忠勤敏達銀記豈謂嵩果能稱此耶夫亦金錢愧心之意將使嵩思果忠矣勤矣敏矣達矣抑未能如聖諭之責望耶反觀內省夙興夜寐勉求四字以增聖明用人之光以稱輔臣弼君之任聖意淵深或在于此乃嵩自翟鑾卧病未出之後幸可以専柄攬權于票擬諭旨從違可否不乘聖裁竊為威福遂使待罪承恩者車馬軿集于私門少不順附則播弄隨之近如王堯封其為人不齒于士論人皆知之嵩乃力為援引誑言陛下意欲用之親約吏部尚書許讚至東閣傳示聖意讚以未見的實尚遲推舉及奉明旨再推然後以堯封推上果蒙欽點一時羣臣驚愕以聖嚮方切姑忍而未言以需後效兹南京科道官張汝棟等各具疏論劾即封明旨王堯封照前旨不許推用綸音煥赫衆意豁然不意聖明之世嵩乃敢欺罔至此也夫陛下即有欲用王堯封之意嵩等猶當力論以為不敢曲從致皇上有後悔也矧非出聖意者乎嵩又嘗對人言即今翟鑾病久不出嘗以是面奏陛下房杜謀斷相資臣以一身兼之為難陛下稱以古昔周公亦祗一人此言有無不可知誠如聖諭則嵩當愧悚不暇佩服聖訓永言師法可也尚可揚揚誇詡以自侈大耶輔相之識莫大于進賢退不肖勸善懲惡以為朝廷樹風教貽典則今多事之時正以求賢擇才為急海內英豪不為乏人現任去任寧無數人可用者嵩可諉于不知耶知則宜時聞于上出格推用為時解紓今未聞其退一賢舉一能是蔽賢也不知則宜急為訪求不當泄泄沓沓美食安坐行呼唱于內廷外懼而巳也又如樊繼祖附勢媚竈惡迹穢狀罄竹難書築城之役與前任霸州兵備副使王鳳靈上下通同燒無數磚冒破得銀巨萬不數月而冒破無存喪師僨軍仍以為利此誠盛世之賊臣使老死牖下猶為逸罰乃今以傳奉起為工部尚書督採湖廣大木此雖今日急務在廷在外未有無人奚必用罪人樊繼祖耶嵩宜力為陛下陳之何未聞其出一言乎朝廷于大臣贈官贈諡為勸懲大典雖身後不少假也其歷任雖久曽經論劾者不許濫請已故兵部尚書張瓚在任無一善狀屢被疏劾上負國恩下遺邊患明刑幸逸于生前顯裭宜行于殁後顧乃典禮加隆贈諡兼備又已故南京兵部侍郎吕柟未究厥施宜隆恩典乃奉明旨吕柟罷諡夫禠張瓚之官可以懲惡增吕柟之秩可以勸善嵩皆無一言則又將焉用此相臣為哉易曰履霜堅氷至言辨之不早辨也今聖明在上嵩豈敢有他志哉顧聖眷益隆而怙終益甚人言雖劇而遂非殊熾伏願陛下簡重綸扉甄别淑慝則內外臣僚無不欽帝天之神察矣疏入帝不納旱災陳言疏嘉靖二十三年張永明臣竊惟古昔盛治之世未嘗無水旱而卒不為災者人事修而防患豫也待民飢莩流離而後議之則既晚矣臣等謹集衆思講求所以弭災防患之道列為五事伏乞敕下該衙門詳議可否上請施行萬一小補地方幸甚一曰申飭官針傳説有言先王建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民故官者為民而立者也兹天降旱災民庶艱食孟子曰受人之牛羊為之牧而立視其死臣等何所逃罪哉照得南京國家鴻業肇基陵寢攸在是以並設府部院寺科道等衙門兩京並峙同符周之鎬京雒邑第留都既與各省不同各衙門俱于撫按無屬事權不一力敵勢分又有府厰內臣公侯勳貴均受有地方之寄者故或倚法以朘削小民或越分以勞役丁卒行戶有和買之擾十不償五坊廂有供具之費月無虛旬晏席太豐儀文太侈是皆官針之不飭而民怨所由生也乞敕都察院轉行南京都察院修行各該衙門申飭修省查議修禁務在清約成風四方為則至于在外郡縣與民尤親利害尤切不得其人其貽患播惡殆不止于臣等前所云者仍乞備行各該撫按詳加察訪其有貪污酷虐罷軟無能不勝任者即不時論劾議擬降黜再乞申敕吏部加意受災地方遇有正官員缺即選才賢比照近年山東山西赴任事例嚴限供職庶幾官必得人而救荒之政有攸賴矣二曰節省民力竊照江南財賦甲于天下而江南民困甚于昔時丁田糧差嵗有定額而餘羡之徴無名之斂又再倍之其尤病者均徭里甲征銀在官謂有書册事例而營辦支應重復擾民經過使客之供億士夫人情之餽贈驛遞關文之冒濫船陸夫馬之繹騷無非取諸民者而又備水陸珍竒之奉謂之天字下程增稱耗紙贖之科謂之徴輸常制推剝多端繭絲殆盡是以豪􅠕則投匿欺隱貧弱則獨纍攤賠遂至拖欠正供重廑部使催督愈嚴逋逃愈甚再照上江二縣差額尤繁除係籍軍匠正役外有內府各監局并工部匠役有內府各庫藏并外關司鋪戶人夫曰夫差有輪年里甲徴銀上匱支應曰匱銀一民備此三役而又暴取出于多門經用苦于無制是二縣之民窮尤甚焉臣等涉歷未廣咨詢未詳前項所陳十不一二至于事情之僻逺弊蠧之隱微其所未知多矣若不及今急為疏滌興革竊恐江南之民無安日矣乞敕戶部備行巡撫衙門及南京戶工二部通將江南地方民情利病詳議查處易之損曰二簋可用享今民急無食生不自聊非用損之時乎臣等愚昧以為諸在得已之科者皆宜暫行停罷當事之臣所宜悉心體國毋泥繁文毋避嫌怨要在修舉舊制剗革苛法急紓民力以弭災患臣也臣等不勝惓惓三曰博舉荒政嘗聞救荒無善政宋臣司馬光曰察守宰不勝任者易之使各帳濟本州縣之民則飢民有可生之路蘇軾曰熙寧之救荒費多而無益者以救之遲故也然則得人而備之豫其猶庶幾乎臣等考得宋臣趙抃之賑越也先期詳詢屬縣民之被荒者幾鄉其能自食者有幾當廩于官者幾人溝防構築可僦民使治之者幾所庫錢倉粟可發者幾何富民可募出粟者幾家咨詢周詳先事為備抃之所以為善也乞敕戶部詳博議擬轉行各該巡撫衙門備行各屬依倣前法審計豫備其有事勢迫切民命急在旦夕者許所司便宜賑恤毋得拘泥文移申覆輾轉以致稽緩誤事庶有及時之益然今災旱地方闊逺兼以江南屢嵗未豐舊儲匱乏非仰賴皇上浩蕩異恩厚加賑恤斯民不易存活除各該有司地方聽該巡撫衙門查勘議擬題請外照得南京城坊之民尤為四方根本乞敕戶部轉行南京戶部查將堪動倉糧量行官糶一二萬石使貧難下戶各止糴買五斗以上一石以下少濟目前庶米價不致騰貴其糶本即歸本部候熟買補似亦兩便秋冬以後舊穀且盡民歉愈急再議開放常平倉米以加賑惠其所不足則在該部議擬上請施行至于煮粥救急古人雖嘗行之然粥食久頓則難用民聚蒸鬱則病生似非良法乞敕所司詳擇酌議施行四曰責任撫臣竊照江南應天蘇松徽寧十一府州兼帶嘉湖二府物衆地大蘗芽易生而直𨽻地方無布按二司之統轄無分巡分守之専寄所賴以撫治者巡撫都御史也查得景泰年間巡撫侍郎李敏以撫內多事建請添設大臣一員分巡督理其後兼為一員事繁勢重官尊秩崇每多不肯盡心民務况遷轉既速則雖雅志有為乍到地方咨詢未悉逮其諳習則除書已下矣且南畿近因先任巡撫都御史歐陽鐸志欲裕民改為新法然事不法故條領煩多民不安習後任撫臣屢嘗通便宜民而皆不久升任未砥畫一前後文移不同吏愈得緣為姧今照巡撫都御史丁汝夔新任未久民情土俗日漸諳練當兹旱災似宜久于委任以責成功臣等查得先年南畿輔臣熊槩則以大理寺卿在任周忱則以侍郎繼升尚書在任李敏則以侍郎在任乞敕吏部查照近年題準事例各處撫臣必須久任其有年勞積久相應掄擢者疏請加升職銜照舊管事必使地方寧謐功績有成然後遷任此尤圖治之要弭患之先務也五曰防遏盜賊易曰履霜堅氷至故事勢有積習之漸而聖人貴未然之防今亢旱已極飢饉必至飢饉至而無以紓之則攘奪作攘奪作而無以禁之則賊盜行矣是不可以不早計也乞敕都察院轉行撫按衙門備行各屬軍衛有司務在誠切撫諭使民感恩安業不思他變而又慎守關隘以詰姧慝善撫流民以防潰散嚴禁搶攘以銷邪謀庶幾民得安堵再照南京江防事體尤為重大而承平日久法禁弛怠容臣等再加詳訪另具奏奪外仍乞先行操江巡江衙門慎重江防倍加隄備庶幾姧竊不萌而地方以寧謐矣疏入帝從之請復河套疏嘉靖二十五年曽銑臣惟皇上聰明聖智法古憲天禮樂文章一新昭代之制文事武備殆嚝世所莫及者是宜舞干羽于兩階內治修而逺人服顧邊隅告警敵犯山西宣大二三年來入逼榆林內地傷殘逺邇驚懼夫敵人雖衆不過漢一大縣而猖獗乃爾豈國家之兵力不能支而制禁之者或未得其要歟臣竊計之蓋我失其險敵得所據巢穴既固驅除遂難顧忌因循日甚一日故制馭上䇿莫如復套不是之圖而徒周章于防禦之末譬猶揚湯止沸而不知抽薪外患不能已也臣謹按河套古朔地方三代以來悉隸中國詩曰天子命我城彼朔方赫赫南仲玁狁于襄漢武帝遣衛青出塞取河南地為朔方郡築城繕塞因河為固後世稱之曰雄才大略唐初朔方軍以河為境嗣是張仁願取漠南地于河北築三受降城自是突厥不敢踰山牧馬朔方益無警嵗省費億計至宋李繼遷叛走斤澤進陷靈肅河套復為敵有卒不能制我太祖高皇帝順天應人創建太業成祖文皇帝威加海內逐北追亡敵衆救死不暇而又敢望河套乎後以東勝孤逺撤之內守復改榆林為鎮城方初徙時套內寧謐土地沃膏草木繁茂禽獸生息當事之臣不以此時據河而守乃區區于榆林之築此時敵勢未大猶有諉也失此不為𢎞治八年敵編筏渡河剽掠官軍牧馬十二年擁衆大入自後常牧套內侵擾中原孝廟有欲復之志而未及逮至武廟嘗欲征之而未能使敵人濟農得以據為巢穴禍根既種竊發無時出套則逼宣大三關入套則擾延寧甘固生民荼毒全陜困敝已極此撥亂之功天將有意于皇上也夫河套自三代以迄于今世所固守以界中外又我聖祖之所留也一統故疆三邊沃壤其理宜復頃自不守遂使深山大川勢顧在彼俾得出沒自由東西侵掠徒勞守禦無不緩急蓋強敵不除則中國之害日熾浸淫虛耗將來之禍有臣子所不忍言者我皇上德邁三皇功光列聖選將練兵宵旰日切嵗發帑銀以濟邊圉凡所以攘郤外患以保安兆民者天心實鑒祐之而當時封疆之臣曽無有為國家深長之思以收復祖宗舊業為生民立命者蓋軍旅之興國之重務圖近利則壞逺謀小有挫失媒糵其短者繼踵而至鼎鑊刀鋸面背森然其不改心易慮者幾希況復所見不同甲可乙否若曰姑待來年便已遷延不振臣雖愚昧豈不知兵凶戰危未易舉動但近年以來得之見聞常懷憤激今復親履其地身任其責目擊地方危殆切齒痛心實有寢不安席食不下咽焉者昔葛伯仇餉成湯往征淮蔡一隅之寇耳裴度尚以為不與此賊共戴天陛下德過成湯而在位之臣文武足備又非但裴度之比可使強敵猖肆蒼生阽危一至此哉夫豶豕之牙為力尚易猛虎負嵎則有莫之敢攖者其勢則然也故敢冒昧輒以短見上塵睿覽伏乞敕部會集廷臣詳議可否如蒙采納速賜施行蓋選將材除戎器備芻糧練兵馬非朝夕可辦所貴及時修舉則臨期無誤武功砥成或曰榆林邊牆方議修築今臣輒有復套之議會極歸要顧當何如臣曰築邊之議為數十年之謀也敵在套中生長日盛病根尚在為患無期不防則為無備防之則兵力坐困有餘在敵不足在我警之作隄壅水一朝潰決則泛濫不支矣若夫復套振揚武威驅除外患臨河作障天險為池皇靈既昭敵膽應裂狼顧脅息雖數百年不敢輕肆侵軼譬之大禹治水以海為壑而水歸其所不至橫流此社稷之計聖子神孫之永圖也今神聖在上英俊在旁時所當乘機不可昧謹陳復套數事伏惟皇上裁擇則天下幸甚萬世幸甚一曰定廟謨陛下德配天地明並日月駕三代而撫四夷非漢唐所能倣佛者此正大有為之時也而閫外之臣乃不能奮揚威武迅掃強梁以嚴中外之限繼春秋之志者臣竊耻之夫河套者敵之巢穴生民之禍本也禍本不除則延袤二千餘里卒無寧居守禦單弱芻糧莫繼嵗掠之民往往為其先驅畏敵之害所向無前將來生聚日繁貪噬日恣南侵之禍深有可慮趙充國屯湟中漢宣帝主之于始而魏相卒成其終淮蔡之平唐憲宗之獨見而贊襄者裴度也故曰凡此蔡功惟斷乃成伏願聖明先㝎此志命廷臣詳議以為長治久安之計恭行天討以除暴亂以清朔漠不以同異之説而疑不以浩民之費而止不以重難之事而憚博選謀猷忠勇之臣付以閫外専征之任惟求砥㝎不急近功則國是㝎而神人協從殆見救民于水火之中傳祚于磐石之固則我皇上文教既崇武功亦競商之高宗周之成康豈足以比倫也耶二曰立綱紀綱者大綱也規模之謂也紀者條理也節目之謂也規模欲其大節目欲其詳綱紀既立則戎事可興矣復套之舉國之重務人之謀曰須得兵三十餘萬馬步水陸齊驅並進裹糧二百萬石兼折銀三百萬兩一舉破敵驅之出境即緣河修築城垣界守此一説也臣以為此謀雖善其勢實難今三邊之兵可用者不滿六萬如調他鎮顧此失彼三十萬衆徒爾煩勞其難一也倉庫空乏上下交困銀穀纍五百萬一朝畢集勢不易能其難二也一戰勝敵敵未膽落輒興版築師徒易撓其難三也臣則以為憫生民之陷溺而與之除暴爰整雄師張皇義旅春搜于套秋守于邊如是三年敵勢必折俟其逺遁然後拒河為城分番哨守則人力不困財用不竭而河套可復既而移撫鎮以致之立行都司并衛所州郡以屬之又設守巡兵備道以理之凡江淮之北各省有犯設邊衛及煙瘴充軍者皆定發于衛所凡該口外為民者皆定發于州郡將套中之地預為踏撥多立魚鱗籍册以防後弊每軍民一戶給田二頃俾之嵗耕一頃間一頃是為間田以養地方其沿邊軍民亦出示召募有願守邊者皆給以田引黃河之水為大小之渠渠以灌田可備旱潦高黍下稻任土所宜數年之後套地可盡墾而又倣井田之意廣溝洫之制吾民易于稼穡敵騎難以馳驅夫既臨河設險夏秋決難侵犯我得耕稼矣比及河凍農事既竣乃于講武之時為禦敵之計民不告勞農不苦廢行之既久則河湟之地不異中州此規模節目之大略也乞敕部豫為經理三年之後以時而行有未盡者容臣次第敷奏雖然屢年邊時廢弛將士怯懦整頓實難須及時飭治來年四月先將近患𠞰除以倡我軍之氣俟其膽力漸雄然後昭聖明無外之度闡皇上救民之仁檄示套中以開來降之路以歸被虜之民興問罪之師舉三年之役則順以動預在師中吉矣三曰審機宜天下之事有機時與勢為之也孟子曰雖有智慧不如乘勢雖有鎡基不如待時知機論也得其機而乘之勝算在我何往不濟敵之據有河套也逐水草以駐牧獵禽獸以馳騁秋髙馬肥弓矢徑利糾合黨類動十數萬長驅深入彼聚而攻我分而守此敵之時勢我軍不得而預之也及其入套深冬沍寒水草枯凍又皆各就駐牧其勢自分且馬五宿稿漸至羸瘠比及春深敵因以弱我則訓練強兵攢槽牧馬營伍整肅火器精利此我之時勢敵不得而預之也今之禦邊者敵弱不勝因仍怠怯敵強莫禦茍且支吾坐失軍機所以有敗而無勝臣願練兵六萬再調山東槍手二千多備矢石每于春夏之間水陸並進直抵敵巢乘其無備我聚而攻彼分而守材官騶發矢道同的炮火擊烈電掣雷轟敵縱有援句月斯集目前震蕩勢必難支此窺敵觀變潛深參伍之術臣亦計之審矣仍乞命下宣大山西總督鎮撫諸臣調度各鎮兵馬嚴加隄備耀武揚威以防河東駐牧之強敵敵倘敗亡必將逾河逃遁厲兵牧馬又可以收斬獲之攻所謂犄角之勢以全取勝之道也然後班師而歸守我分地秋髙之時敵如復讐而來我軍據險以守況得勝之兵勇氣自倍不待臨牆可使撻伐如是三年敵勢自衰將逺遁之不暇而又敢據我河套也耶至是則祖宗故地已復因河為險修築墩隍一如榆林守邊之議且講求屯政建置衛所處分戍卒填實邊民牆塹既固耕穫可饒全陜之轉輸漸省而寧夏之河防亦寬而內地可保萬萬年安固矣不然敵之強也來不能禦敵之弱也去不能征機事大失公私俱困臣不知其所終也四曰選將材夫將者三軍之司命能否勇怯所繫匪輕如馬永之于遼左梁震之守雲中至今稱勇以其能善戰料敵不負専閫也今三邊之將謀猷徑悍未可謂無其人而因循懦怯習于不振一遇警發遂觀望退縮逺為自守曽未有出一死力為士卒先者先到地方親臨戰陳與之共事已得其概矣蓋總副參遊等官爵位漸高志欲漸滿保身之念重故報國之意輕有生之樂無死之心此所以有敗而無勝也夫十室之邑不有忠信三邊之廣豈謂無人但往日以資格待士上品無寒門下品無貴族故英雄豪傑之徒往往雜于卒伍雖有才美不獲自見夫爵賞等級所以待庸品而非常之才要不可以常調拘之韓信拔于行伍陳平起于亡命感遇思奮遂建竒功欲為恢復之圖必須大破常格各鎮將領除中材堪以䇿勵者照舊任事外凡有庸流别議任用乃自指揮千百戶以至總小旗夜不收等人員及屢年各處廢棄謫戍將領中間果有智勇超羣謀猷出衆者許中外臣工不限地方各舉所知疏名上請俱發陜西軍門聼用立功其材可將千人者即以為千人之長可將萬人者即以為萬人之長或假以署銜使得統馭軍士展布四體將兵出塞果能摧鋒破敵聼臣等核實奏請即與實授或不次超擢以旌異材彼沈抑之久幸而獲伸感恩之念重則保身之計輕向上之志堅則克敵之心勝掃清朔漠以恢大業可坐而待矣然此特就復套而言不為常例如循常守舊無所樹立者令各復還職役其有畏怯逼遛玩愒失事者黜罰自有明典夫復何言如此厚賞以酬有功明罰以懲不恪為將者亦將爭自洗濯嫌于見棄而武功日競矣五曰任賢能夫行非常之事必得非常之材而後可與建非常之業兵馬錢糧百需靡易況興師于數百里之逺以驅數十年盤據之敵以拯數百萬生靈之禍非得練達忠勇好謀善繼之臣授以専征之寄曷克有濟易曰師貞丈人吉剛中而應行險而順以此毒天下而民從之懷萬邦也臣實庸愚不知戰陳誤蒙聖明委任以蚊負山恐辱寵命晝夜憂思期少補報而不可得然非敢自謂臣之材能足以辦此蓋強敵憑陵據我門戶征之則速而利在于上不征則遲而禍及于逺深根固本之圖不可不豫為之所也伏乞特敕廷臣議擬公舉文武兼資大臣一人前來専統其事脫不以臣為卑鄙亦使備役行陳參協其議雖竭膏骨所不敢辭但慮非所長也仍乞戶部堂上官一員専理芻餉兵部司官二員稽查軍馬又乞簡差科道官各一員前來于邊將練兵厲器牧馬等項有所督責比臨期紀驗功次而各鎮撫按實相成之凡本省鄰省布按司府等方面官員公忠而有才識者亦聼委用如此則集衆美立成器而敵不足滅矣六曰足芻餉夫千里饋糧士有飢色樵蘇後爨師不宿飽蕭何給饋餉漢髙帝所以破強楚李牧日擊牛饗士而強敵大破逺遁今擬搜套之兵摘選馬軍六萬人馬六萬匹山東槍手二千名及將領等官廩給諸費共約銀二十七萬六千二百餘兩然此經常之費語其大略也師行千里風雨罷勞敵愾禦侮存亡攸繫不有厚賞以結之于先安望得其死力于鋒鏑之下故必豐其衣食以壯其力多積金帛示有厚賞牛酒以恱之律法以威之兵有鬭志將以增氣雖數萬衆合為一心有守必堅有戰必強平敵之期斯可卜也賞犒之類約需銀十餘萬兩總計銀三十七萬六千二百餘兩可給一征之費比宣大山西每嵗客兵之需京運銀一百四十五萬兩今陜西于年例防秋之外亦捐此客兵之數以充復套三年之費非甚難集不然準折每嵗餘鹽銀兩不下七八十萬以此供億尤屬相應其發帑銀四十萬兩付總理糧儲大臣督同延綏陜西寧夏三巡撫處豫為會計召買聽候行軍之費其中十萬兩作為犒賞之需外更多備買馬價銀不許别項移借仍令預備輕重待時而行則食足兵強三軍之士不戰而氣自倍矣七曰明賞罰兵法曰用賞者貴信用罰者貴必又曰賞不逾時罰不遷列故勛勞宜賞則不吝千金無功妄施雖分毫不與昔孫武斬宫嬪而吳兵可用穰苴誅莊賈而軍士股栗爵不可以無功取刑不可以貴勢免此賢愚之所以僉忘其身也我皇上明罰敕法令甲昭然有邊功者特加升賞而失事將領即械繫誅譴可謂勸懲之公矣然臣思之邊方失事豈獨將帥之罪哉蓋以承平日久戎務漸隳紈袴之子罔知兵革已失統馭之術三軍之士習于驕怯夫驕則不知有將怯則惟知畏敬故聞鼓不進聞金不退積習之弊非一日矣臨陳退縮逗遛失事無怪乎其然也至于爭奪首級尤方今之極弊夫以一首級而羣數十人爭之在已既不免于傷殘且縱敵不退而投間抵隙反為敵所擠者往往皆是也請申明禁令凡有衝鋒破敵者雖無首級定為首功而爭搶首級者與凡退縮觀望買賣冒奪之徒繩以重法罪至于死必戮之以循衆務俾畏我而不畏敵雖赴湯蹈火莫敢違法書曰威克厥愛允濟此之謂也然欲得人之死力非厚賞無以結其心况玩竭之餘衆心涣散迫之以威則離循而拊之三軍之士溫如挾纊臣請給發帑銀之外詳著條欵示以賞罰必信之意庶使人心知所趨避夫有賞以誘之于前有刑以驅之于後則士卒感恩而畏威有勇而爭奮矣八曰備長技漢書曰胸奴之長技三中國之長技五兩軍相為表裏斯為萬全之術今敵之長技不異于昔時而在我之長技復有如漢時之五者乎臣不得而知也欲求相為表裏殆又難矣抑求其次莫先于火氣蓋天之所以保國家而衛生民者也但有之而不能用用之而不能盡其利無技等耳安望其有摧擊之功乎臣昔提督山西三關常造盞口炮毒火飛炮具式奏請伏蒙皇上發銀數千兩以資成造比年禦敵賴焉今秋于寧塞定邊亦嘗藉此兩挫強敵故來降人口云敵人甚畏此器言每年響子不似今年響子利害此其明驗也今欲復套須備熟鐵盞口炮六千位長管鐵銃一萬五千把手把鐵銃一萬五千把手把小鐵槍二萬根長槍二千根生鐵炸炮十萬個焰硝十五萬斤硫黃三萬斤包鐵鉛子大小二十五萬斤弓矢盾架相為表裏庶可摧折強敵恢復故壤然此特一年之具爾三四年間如飛炮硝黃鉛子之類又須陸續補其缺壞今京造火器種種具備防邊可矣但或宜于此而不宜于彼或可以守而不可以攻大者質重而難于致逺生者日久而多所燬裂留以别用各有所長若曰神機不可外造盔甲神槍等器原為私藏者例也而盞口炮長短鐵銃律條既無該載而實為籌邊破敵之公器伏乞敕部不以為例速發帑銀二三萬兩給各撫鎮官于山陜等處置造以為復套之資蓋成造而後教演服習而後運用語云工欲善其事必先利其器此之謂也不然敵技精強我軍莫恃萬全之功未可必也疏入得旨敵據河套久為內患昨連嵗深入全陜生靈被其荼毒深軫朕懷前此邊臣無有以逐敵復套為念者曽銑所奏具見狀猷爾部裏許久方才題覆迄無定見還著銑督同各邊撫鎮等官協心圖議務求長策嗣上方略這邊牆千里沙漠與宣大地勢不同只著就要害處修築且將兵部銀暫發二十萬兩作速運赴總督衙門聽其修邊餉兵造器等項便宜調度支用專備明年防禦不許浪費復河套議嘉靖二十五年翁萬達臣惟河套本中國故壤成祖三征漠北殘其部落舍黃河衛東勝後又撤東勝以就延綏套地已至淪失然正統𢎞治間我未守彼亦未取也因循畫地守捐天險失沃野之利𢎞治前我猶嵗嵗搜套後乃任彼出入蟠據其中遊牧生養譬之為家者成業久矣欲一舉復之毋乃不易乎夫提軍深入山川之險易途徑之迂直水草之有無皆未熟知我軍出塞三日已疲彼騎一呼而可集也我軍數萬衆緩行持重則彼備益固疾行趨利則輜重在後即得小利歸師尚艱倘失嚮導全軍殆矣彼遷徙逺近靡常一戰之後彼或保聚或佯遁笳角時動壁壘相持乍合乍離終不渡河我軍于此時戰耶退耶兩相守耶數萬衆出塞亦必數萬衆援之又以饒將通糧道是皆至難而不可任者也夫馳擊者彼所長守險者我所便弓矢利于馳擊火器利于守險舍火器守險而與之馳擊于黃沙白草間大非計也議者欲整六萬衆為三嵗期春夏馬瘦彼弱我利于征秋冬馬肥彼強我利于守春搜套秋守邊三舉彼必逺遁我乃拒河而守夫馬之肥瘦我與敵共之者也即彼弱矣然坐以待之懼其擾擊我也及彼強矣又懼其報復我也其六萬之衆千里襲人一舉失利議論蜂起烏能待三乎即三舉三勝彼敗而守終不渡河版築亦無日也議者見近時出征恆獲首功昔年城大同五堡寇不深競遂以套為易復然出征因其近塞可以乘其不備勝則速歸否則舉足南向即家門復套則深入其地後援不繼事勢異也往城諸邊近我土彼原不以為利套則其四時駐牧地彼肯晏然而已乎事體異也曰伺彼出套據河以守時先亟築渡口垣牆以次移置邊堡彼控弦十餘萬豈肯空套而出乎築垣二千餘里豈不日可成者乎堡非百數十不相聫絡堡兵非千人不可居而遊徼瞭望者不預焉當三十萬衆不止也況循邊距河動輒千里一嵗食糜億萬自內輸邊自邊輸河飛挽之艱尤不可不深慮也若使彼有間隙我乘其敝從而圖之未嘗不可今塞下喘息未定邊卒瘡痍未起橫挑強敵以事非常臣愚所不解也議奏帝不納御選明臣奏議卷二十四
