  text: 欽定四庫全書御選明臣奏議巻二十六
  hash: sha256:bae0496a3152b3e0a9bb6ab4d66d7196f1b8350e8dba24c160dc6c76d5971386
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_029-1a, image: WYG0445/WYG0445-0412a.png}
body:
  text: 議撥種馬應用疏嘉靖三十七年李遂臣照得倭夷連年入寇長江南北横被殘破臣身在草野竊懷隠憂不意罪廢之餘謬蒙録用感遇酬知是臣盡節効命之日也敢不夙夜以圖報稱除臣召募兵勇分據要害區畫錢糧設處戰船繕葺城垣精利器械申嚴防禁慎遣哨探一切可以權宜遵奉欽依徑自區處不敢陳瀆外伏照江北原隰曠野本為騎射之地倭夷兇狡善於衝突我兵新集置陣不堅必須借以馬力用為前驅主客之形既殊馬步之力且倍以逸待勞理無不克往年參將王介收功亦以馳騎之力節據選募新兵雖勇敢善鬭苦稱無馬難以待敵臣查得前任廵撫都御史蔡克亷先於嘉靖三十六年題該兵部覆議題奉欽依許於種馬内暫借應用已經欽遵施行外縁今錢糧缺乏收買無資春氣已深措處不及臣愚欲得於各屬種馬内選撥一二千匹暫時借用分給各兵騎坐以備馳突期以二月初旬領出至六月終交還官為餧養不致瘐損無虧於孶息而有益於戰守揆之事理似亦相應如䝉皇上軫念重地敇下該部容臣於種馬内挑選給軍騎坐依期交還庶兵威益振士氣自倍倭夷知警而海防有賴矣疏入帝從之議設狼山副總兵疏嘉靖三十七年李遂臣謹議得淮揚地方濱臨江海陸通鳳泗水達瓜儀而狼山一帶上控下接尤為適中要害之地添設副總兵控制形勝揆之事體委屬相應但隔離江南水靣曠逺地既分屬人自為謀江不可以畫分而責容易於他諉萬一賊乘風迅揚帆中流伺間突入流毒内地既乖共濟之憂安望協助之力況節經移咨㑹議事體異同終難歸一合無查照部議比照金山事例添設副總兵專制江北水路自瓜儀周家橋掘港直抵廟灣雲梯關其陸路自通泰淮揚天長直抵鳳泗各參將守備把總備倭等官及地方衛所悉聴節制其狼福二山及周家橋圌山江陰等處跨江南北不分彼此各多設廵船分載遊兵出洋㑹哨遇有警報兩地兵船并力堵截若互相推諉備禦不周不問南北一體坐以失事之罪是權寄雖分而責任則一利害相關心力不容於不協矣再照大江南北地形對峙然江南自金山以東境連乍浦便入浙江而江北由掘港以北逺達雲梯俱為屬地比之江南尤為濶逺就使添設副總兵若非偏裨得人地廣兵分亦難遥制且查大河口徐稍營廖角觜等處懸接大洋屢經倭患祖宗朝設立備倭營寨連絡雖武備盡弛而規制猶存又鹽城縣治瞰臨海澳尤為淮安扼塞此地不守則淮揚高寳皆可長驅先年議設把總一員近復調取邳徐淮泰軍民兵勇暫委閒住將官往來防禦意亦有見於此查得江南既有副總兵又設參將二員及把總八九員各領兵船分屯要害今江北地勢較廣而關繋尤重據其事體似應比照但屬郡既少而財力且竭兵船費重供億務繁計亦非四郡之力所能辦也合無將通州參將移住鹽城其鄰近各場及興化淮安雲梯關廟灣羊寨東西二海州所皆為迅地乞將四衛官軍責付本參分番操守自鹽城以北一帶守備把總等官水陸兵船俱屬調度而以鹽城把總移駐大河口將徐稍等營官軍補完原額并召募現操民兵及吕四餘東餘中餘西金沙西亭各場竈勇悉聴約束在大河口則地近狼山兵力不患於單弱在鹽城則兼制羊寨東西自便於應援大抵千里江海之防有揚州參將以當其南有鹽城參將以當其北而又得狼山副總兵居中調度掎角之勢既成首尾之形相應官無宂設而事便責成似亦計之得者也如䝉皇上軫念陵寢漕運重地乞敇該部再加詳議如果相應即於狼山添設副總兵一員前來通州駐劄操練兵馬有警移駐狼山與金山副總兵彼此㑹哨出洋夾攻前項水陸汛地遇有警急一體相機調度剿殺其鹽城參將大河口把總均乞各赴改擬地方就便行事庶江海之防愈嚴而重地之守益固矣地方幸甚臣愚不勝幸甚疏入帝從之論嚴嵩欺君誤國疏嘉靖三十七年董傳策臣謹奏為奸貪輔臣主持邊塞欺君誤國大負聖恩懇乞宸斷早除兇惡以圖安攘實效事臣近見北敵冦邊財用詘乏屢廑皇上宵旰之憂至發帑藏濟急聖意所向遂令言官糾劾邊臣屢下明㫖究治感發人心之一機也然邊臣之敢於欺君皆由輔臣嚴嵩之主持而言官所論未有極陳元惡之誤國者臣側耳數日寂無所聞蓋皆畏彼之中傷愛身惜死故寧負陛下而不敢忤奸臣耳臣知陛下之神明英武非不洞燭其奸特以輔臣尚爾優容令自悛改而嵩恬不知警負恩日深不思主憂臣辱之義益肆誣上行私之奸居位一日則天下受一日之害今言官既不敢言諸司又不能言國家養士二百年一旦披靡不忠至此臣竊私心痛之念有君如此寧忍負之臣敢披瀝肝膽條列嵩之大罪伏惟陛下少垂聴焉夫邊彊之守者責在督撫諸將將官所以鎮安邊陲者徒以財用得人之死力也今户部所發嵗不下百萬至為一切茍且之謀日不暇給而諸將邊臣尚深結嵩心以求掩已之敗所請財賦大半入嵩之家或以數萬希圖内轉或以盈箱冀掩䘮師輾轉饋送殆無虚日遂令軍士嗷嗷待哺救死不贍敵至閉城任其得利而去嵩為元輔匿不以聞甚至邊臣已罹法者嵩猶受其賄遺曲為掩䕶所謂豺狼當道安問狐狸此其壞邊防之罪一也吏兵二部文武人才所推用恒必由之而嵩擅撓部事賄賂公行選司銓官至持簿入嵩之門任其填發將官求推善地動輒掊尅軍士以充饋獻如近來萬寀為文選方祥為職方皆嵩之至親擇其心腹頤指氣使不異奴隸至有文管家武管家之謡此其鬻官爵之罪二也大工鼎建財用不貲識者蓋以民力為憂而嵩猶乘機侵剋縱欲無厭採木侍郎劉伯躍與嵩同鄉行郡動支贓罰銀兩或坐派民錢致之嵩家前後累至數萬他如築堡脩城之費嵩皆假公濟私而獻諂者又甘為浸潤或因而攘入私囊遂至冒破日甚請求無措夫天地生財止有此數不在官則在民今天下財賦既不在公帑又不在民間其在嵩家可知也陛下試令人查檢嵩家恐當富於帑藏者此其蠧國用之罪三也趙文華罪惡滔天賴陛下英斷斥之使去猶恃乾兒之愛所得囊蠧鉅萬盡寄嵩家蓋造大房居皇城之西頗壓上㳺而嵩收之入已略無顧忌遣令數人䕶送文華南還北至徐州即駕座船恐嚇州縣私役民夫及支供給之費嵩之敢䕶私人𩔖如此此其䕶黨與之罪四也天下諸藩臬有司嵗時問安嵩家動以千數不得不掊尅民財民財日困則嵩家日富絡繹遣人解回江西動起關文騷擾驛遞此其害地方之罪五也自嵩貪饕不顧一時嗜利無恥之士漸出其門昏夜乞哀或以五六千求改要地或以七八百與選美官士風大壞官箴日䘮緩急不得賢才而嵩猶洋洋坐政府自謂得計回視要地皆彼腹心莫敢出一語即有能自振㧞者又懼禍不測不得不隨風而靡此其壞人才之罪六也夫此六者罪大惡極釀成禍階徒以嵩之奸邪善能變炫名實擠人死地而世蕃以市井無賴之徒入市攫金逢迎父惡恬不為怪一時臣子非受嵩父子之舉則畏嵩父子之奸誰肯為陛下言之臣待罪刑曹宜詰奸慝平生讀忠孝書蓋熟聞致身之義矣臣豈不知此疏一入縱陛下知臣忠直而違忤奸臣之意一有譴責立可關節致死況臣羸弱多病尤易傾危加之以親老無子孤立異鄉寧不自愛但有感於聖明在上奸佞不忠而諸臣患得患失動以及身之禍自委有君無臣實可憤惋臣故不論一身利害冒昧上陳為天下蒼生懇祈聖主速賜乾斷以求安攘實效臣之微軀何足惜哉倘䝉俯垂採納乞敇九卿科道從公㑹議數嵩罪狀取自上裁庶陛下勞心焦思不為無益將見人心聳然思奮三軍之氣倍増而邊防漸可修舉官爵漸可愛惜國用漸可充積黨惡漸可消除地方漸可寧謐賢才漸可效用矣臣不揣疎賤發自忠憤伏惟聖明鑒察臣不勝激切惶懼之至疏入下詔獄謫戍南寧條上定策備邊疏嘉靖四十年楊博臣竊惟敵騎入犯多在涼爽之時防禦機宜貴審緩急之勢今之九邊以薊鎮為第一蓋腹心既安四肢自無可慮以故廣調各鎮之兵為之戍守多發度支之糧為之餽給精選驍健之將為之捍禦仰荷聖皇深思逺慮靡所不至臣等何容别議今據宣大總督李文進所奏止是永什卜烏紳巴雅爾三部之兵其酋首諳達黄台吉巴圖爾併土蠻俱各未見蹤跡鷙鳥將飛必戢其翼甚為薊鎮之慮臣等謹將大同薊鎮應行事宜條列上請伏乞聖明俯賜採覽一大同所犯之敵數本不多本鎮兵馬已經總督李文進先期分布似為有備臣等近又移文廵撫陳其學總兵官劉漢令其堅壁清野以固其守設伏出奇以挫其鋒分精兵以搗其巢簡惡少以邀其馬隨機應變計日下必當逺遁據李文進所請宣府遊擊孫輔大同遊擊周資文入衛遊兵二枝另本酌量議處一敵犯薊鎮必由白草川三間房一帶哨探一節全在宣府獨石參將蓋薊鎮止得其情獨石則得其勢知之既早務於古北黄花鎮等處加謹防禦所謂先則制人自保無虞合無容臣等仍行宣大總督李文進巡撫遲鳳翔總兵官李賢督率參將劉國多差人役逺為哨探但有東行蹤跡即便飛報本部以憑調度一薊鎮各區臣博先任總督之時毎區定擬兵備副使僉事一員為之監督連嵗督臣行臣之計日益詳密但防秋之後未曽定擬賞罰誠恐人心懈弛關繫不輕合無容臣等備行總督楊選廵撫張玭嚴行副使温景葵紀公巡栗永禄李尚智張邦彦伊介夫各照地方用心督理一切兵糧事宜悉聴徑自區處督撫官不得遥制一昌平鎮居庸鎮邊黄花鎮三鎮與宣府懷來延慶永寧四邊界相為脣齒宣大總督每當秋近移住懷來正為南山之備但事在兩鎮未免互分彼此必須聲勢聨合事方有濟合無容臣等備行宣大總督李文進仍駐懷來如果賊犯薊鎮古北口一帶宣府别無聲息即便多發精兵星馳援應若止犯延永逼近南山就將各枝兵馬分屯薊鎮牆上協力固守但使匹馬不得入關即為首功一薊鎮總督廵撫揭報本部毎以主客兵馬錢糧十分缺乏為詞事在户部臣等不知其詳審據公差人役皆稱現差科道查勘户部侯查明之日方議處發但今事在燃眉師行糧從時不可缺合無容臣等備行該部將昌平薊州二鎮不拘銀兩漕糧作速運發以備目前之用俟科道查勘畢日一併計算一薊鎮燕河冷口一帶逼近遼東敵若自東入犯薊鎮督撫官相去隔逺調度自不能及即使有兵可發千里赴援不惟無以濟事亦非兵家常算合無容臣等備行遼東都御史吉澄㑹行總兵官雲冒即將本處兵馬整搠停當如果敵犯燕河等處不必侯調徑自領兵前來策應疏入依議行黜貪臣以消民怨疏嘉靖四十年林潤臣按都察院左副都御史鄢懋卿總理淮浙等處鹽法蓋因内帑空虚邊儲匱乏朝廷特敇其經理財用以濟時艱亦出於不得已之計也為懋卿者潔已奉公使上不失國課下不失民情斯為大臣謀國之忠也顧乃自蔑憲典所過屬縣掊尅無遺府則定以千數州縣各有遞等其鹽運司則無算焉兩淮尤為鹽商輳集之所懋卿明對運使欲取銀十萬兩應用運司遂令商人黄球等照引科派以兩淮一運司而推之則兩淮長蘆等處可知矣夫懋卿查理鹽課不知有増於内帑幾何而攫入於私囊者如此黷貨無厭背公營私其為罪一也平民李守謙告王𨫼等侵匿寄頓財物懋卿將𨫼等親提靣審定罪發府𨫼等懼罪送禮銀三千兩夫懋卿職司風紀正當嚴加律已以振肅百僚而乃暴露贓私玷辱風紀其為罪二也懋卿在楊州明知廵撫劉景韶貪殘過甚則以為奇貨而挾之乃對官府作冷語曰吾將劾之使景韶聞風曲意阿承餽贐之禮聞亦萬餘然後得其懽顔又往鳳陽謁陵糜費無紀此奢侈縱肆反道悖禮其為罪三也且陵鑠有司暴虐百姓在揚州駐劄纔三月耳而平民斃於杖下者二十餘人如場官姚佩送冊稽遲厨下蔡經置酒欠整皆小事也俱杖三十而身故此殘忍酷毒不恤怨言其為罪四也北直隸山東連嵗荒歉餓殍盈野懋卿目擊其形略不加動念仍責於有司勢必取之於民是朘垂斃之民膏血以自封也揚州重地自有倭患以來兵費浩重益以去嵗之水災重以撫臣之剥削富者蕩産貧者流竄鹽商亦相挈而逃懋卿查覈過嚴人已不堪而又加無名之派去嵗鹽徒幾欲相聚為亂此動摇邦本斷傷元氣其為罪五也夫懋卿之罪朝野共知逺近側目伏乞敇下部院再加體訪如果臣言不謬將鄢懋卿速賜罷黜庶民怨消而士論快矣疏入帝不納議分布西北防秋兵馬疏嘉靖四十一年楊博臣等竊料今秋敵情第一則垂涎薊鎮其次則側目山西蓋縁宣大二鎮蕭條之甚無可劫掠保定三關阨隘之險難以突入以故薊鎮山西雖春夏之交猶當戒嚴況兹秋高月朗萬一不慎未免墮其計中臣等蚤夜籌畫節次申飭各該總督鎮廵官在薊鎮則畫地分區步兵拒牆擺守騎兵按伏援應以守為戰在宣府則山南山北添布兵馬在大同則逺哨廣備清野堅壁在山西則嚴拒陽方等口在保定則分防紫荆等關以戰為守又慮獨石三間房白草川一帶實敵騎入薊必由之路責成參將劉國多方哨探不時馳報又恐畿輔地方倘有緊急各處之兵不能猝至備行宣大總督江東移駐懷來以備南山一帶宣府鎮廵官馬芳趙孔昭移駐隆慶以便星馳抵關大同鎮廵官姜應熊陳其學候報移駐懷來以便馳入居庸山西鎮廵官吳徴楊宗氣候報移駐廣昌一以馳入紫荆一以聴援宣鎮保定廵撫李遷移駐易州總兵官祝福移駐浮圖峪以便馳入涿州京營選定兵馬三枝如果有警處給盔甲一靣啓行一靣奏聞至於一切戰守機宜臣等逐一參酌徑自舉行不敢一一煩瀆天聴疏入依議行條上經略薊鎮善後疏嘉靖四十二年楊博臣竊惟薊昌密邇京陵自庚戌敵變以來議守之計獨詳議戰之計稍略即如昨者三河平谷之警仰仗聖皇在上天威震疊風雨助順兵將爭先以致孤山之連戰古北之一擊誠自來未有之事但各兵一時雖稱雲集多係宣大遼保山西之人無警常使候援則勢有不能臨警方行徵調則緩不及事其在今日必須别為規畫方克有濟臣不揣媕淺僭陳十事伏望皇上俯賜採覽敇下遵行一議處督總標下親兵臣等議得近日胡鎮孤山之戰多得標兵之力但軍門舊設標兵止有一枝其總兵廵撫原無標兵以臣愚見此等勁兵必須新舊總設五枝計該一萬五千名操演精熟方得實用合無將總督劉燾下再添標兵一枝總兵胡鎮何淮廵撫温景葵下各設標兵一枝毎枝務足三千名或於各區現兵内挑其精鋭或於各處家丁壯漢内多方招募合用銀兩就於山東河南民兵銀兩動支不敷之數作速具奏聴本部與户部㑹同計處臣等又惟經始之初全在得人除參將王孟夏現管總督標兵外查得參將黄演堪管總督下新添標兵守備董一元堪管總兵胡鎮下新添標兵原任參將李康民堪管巡撫温景葵下新添標兵遊擊王世英堪管總兵何淮下新添標兵一切應行事宜就聴演等以次經理此後遇有警報總兵官胡鎮即將五枝合為一營相機剿殺一議處各鎮入衛邊兵臣等議得延綏寧夏固原宣府大同遼東保定七鎮入衛兵馬初調之時人强馬壯甚於薊鎮有濟即如嘉靖三十三年臣博在古北口等處與賊相持大率多得邊兵之力乃今因循既久人心玩愒徒有三千兵馬之名殊無三千兵馬之實或以老弱參預其間兵為疲兵或以尫羸茍充其數馬為弱馬往返奔馳徒勞無益合無備行各該總督鎮巡兵備等官今後入衛之兵務要揀選好軍好馬方許調遣起行到薊之日本部選差風力司員一員前去㸃閲如敢仍蹈夙弊臣等指名參奏重加究治一議處鄰鎮添調援兵臣等議得薊鎮與宣府遼東保定相去最近其次則大同山西即如近日三河平谷之警雖因臣等豫先徴調實以地里稍近故不及旬日士馬雲集但中間精强者固有疲弱亦居其半相應通行整敇合無備行各該總督鎮廵兵備等官各將正兵遊兵逐一揀閲軍與馬務足三千之數如軍不足應該招募其銀兩於何項内動支馬不足或本色折色應於何項内處辦文書到日限半月以内各另回奏聴本部與户部㑹同計處若果士馬精强在本鎮可以壯邊圉之威聲在薊鎮自當收應援之實效一議處薊鎮總兵駐劄地方臣等議得薊鎮總兵官先年駐劄三屯營專為朶顔三衛撫賞即今古北口石塘嶺等處既稱敵衝在總兵職任於撫夷為緩於勦敵為急縁三屯營相去軍門數百餘里遇有警報自是無濟緩急查得石匣營實當宻雲古北石塘牆子嶺四處適中之地合無於防春防秋之日總兵移於石匣營駐劄帶領正兵并新募總兵下標兵相機戰守夏冬無事仍回三屯營操備庶與軍門聲勢聨絡氣脈貫通一議處牆内險隘設伏臣等議得古北口區牆内如潮河川等處多有險隘可據即如近日參將郭琥伏礮一擊狂敵落膽若使各區但有險隘去處諸將盡能如此敵之入也可以扼其吭敵之出也可以攻其心比之角力血戰者難易自别合無備行總督劉燾總兵胡鎮廵撫温景葵嚴督各區副參等官各將本區險隘去處或暗設地坑或多置伏礮或以水攻或以火攻各畫一水墨小圖送部查攷一靣刻期舉行一議處入衛邊兵糧賞臣等議得各邊入衛之兵逺離鄉井辛勤萬狀必須優其糧賞方能鼔其敵愾之氣往年糧料充足賞賚隆渥以故士嬉馬騰足堪戰守乃今應得糧料既給不以時散兵賞賜又嵗加減削以致諸軍往往私賣戰馬以充食用殊非事體合無備行總督劉燾㑹同廵撫温景葵督同薊鎮昌密管糧郎中并各該兵備等官從長計議糧料應否加増或通給本色賞賜應否復舊或量為從厚作速回奏一議處宣遼境外哨探臣等議得諳達巴圖爾黄台吉之巢在宣大邊外土蠻黑石炭之巢在遼東邊列一則山川隔逺難於豫得其形一則屬夷勾煽多致反覆其説先年建議之臣謂大同得其情宣府得其形薊鎮不過因魔問病誠為確論即如頃者之患半月之前宣府獨石境外先以瞭見以故臣等得以豫調邊兵足為明騐除遼東原係軍門節制外合無將獨石參將兼聴薊遼總督節制如遇白草川三間房等處哨見賊形即便飛報薊遼總督軍門薊鎮有功則與之同賞如或誤事一體治罪一議處州縣軍民屯堡臣等議得收保之法大者為城其次為堡再次為墩雖大小不同必須高堅深厚方能賴其保障臣博往年廵撫甘肅嘗創為墩院之法大率毎村一二十家共築墩院一座或有力者能家築一座亦從其便嘉靖二十九年賊犯涼州毫末未嘗有失以逸待勞以飽待飢其計莫善於此合無容臣等將墩院之式畫成紙圖咨送巡撫温景葵處令其督率兵備府州縣等官責令居民於土脈融和之日以次舉行務使愚民各知墩院之設全為生我非為勞我庶幾人心歡動工效可稽其原設堡寨亦要通行查明但有不堪去處一體修理完固一議處薊鎮獲功賞格臣等議得薊鎮昌平密邇陵京北之各邊緩急不同敵騎侵軼勢必聚衆方敢深入亦與各邊零散頓異以故先年本部題准敵入内地與邊方陞賞不同拒敵不得入邊雖無斬獲然准一體世襲意誠有見於此合無今後除村荘壮夫零斬敵級仍照舊例陞賞外其官兵與敵大衆血戰臨陣斬獲如胡鎮等近日之功者願陞者超陞二級不願陞者賞銀五十兩所獲馬匹器械等項盡數給與本人充賞各邊不得援以為例一議處諾延三衛臣等議得諾延三衛夷人邇來陽順陰逆專為北敵嚮道雖即掃蕩巢穴不為過舉但中間情狀不一有畏敵勢而曲從者有得敵情而傳報者玉石不分又非國家懷柔之意合無聴總督鎮廵官榜諭諾延三衛都督等官汝等父祖皆知敬奉天道䕶衛朝廷故與汝土地賜汝敇印每來朝貢則厚加賞賚恩德如天夫何汝等後人翻向北敵甚至勾引入境今後爾等各宜照汝父祖効忠守法如遇諳達黄台吉等到汝營内果能設計擒斬函首來獻定行奏聞朝廷給與萬金如仍前悖逆彼時勦汝不要後悔總督鎮廵官一靣將曉諭過縁由咨部查攷一靣將應撫應勦事宜明白具奏定奪疏入依議行倭冦暫寧條陳善後事宜疏嘉靖四十二年譚綸臣㑹同總督廣閩都御史張臬廵按福建監察御史李邦珍議照修政貴於及時有備所以無患福建地方邇自乙卯以來倭冦紛紜廣賊並出因之民窮盜起内外騷然馴至興化之事而顛危極矣茲者仰仗聖皇神武赫然一怒次第蕩平八閩之間遂獲寧宇十年之内僅見一時若不乘此戰勝之暇亟為善後之圖誠恐冦情叵測事變靡常必待患至而始為之備則後之視今亦猶今之視昔掣肘多艱噬臍無及臣等用是大懼莫敢寧處謹稽諸舊典酌之時宜質諸輿論之公參以一得之見條列十有二事上塵聖覽實思患豫防之愚忠為久安長治之至計伏乞敇下該部再加查議請自宸斷速賜允行則地方幸甚臣愚幸甚一曰議復寨以扼外洋照得八閩之地西北阻山東南濱海海中諸國獨日本最為狡獪藉我奸民乘間内侵不但此時為然蓋自洪武迄今皆嘗受其患查自福寧南下以達漳泉置衛凡十一置所凡十四置廵司凡四十有五以控之於陸又置水寨以防之於海初惟烽火門南日山浯嶼三寨耳景泰年間増而為五時則戰艦如雲旌旗相望且哨守皆衛所之軍有司無供億之費外威内固有自來矣法久人玩武備漸弛倭患突發舊制盡失為今之計亟宜查復五水寨之舊毎寨設兵船四十隻兵萬三千名五寨通計用船二百隻用兵六萬五千名以五把總領之定為五大䑸内以舊設烽火門南日山浯嶼三䑸為正兵増設銅山小埕二䑸為遊兵而又為之分信地明斥堠嚴㑹哨賊寡則各自為戰賊衆則合力併攻以扼外洋擊來賊為功第一擊去賊次之失賊弗擊與致賊登岸者查照信地論罪五寨兵船俱屬總兵官統督監軍道監督未汛之先總㑹南臺聴總督整搠訓練汛期將及分發哨守汛畢復總㑹南臺殿最功罪而賞罰之仍整搠訓練以備來汛如此則總覈有經聲勢亦重虚偽盡革實效可臻但立法雖詳振舉在將閩中武弁得人甚艱現今各寨把總僅惟原任守備秦經國尚堪鞭䇿外他皆用之倉猝之餘率乏勇敢之氣臣等查得現奉欽依陞二級泉州納級副千户傅應嘉泉州衛指揮魏宗瀚百户鄧銓浙江松門衛千户羅繼祖皆熟諳海務屢立戰功及照浙江定海等關把總皆奉欽依以都指揮體統行事閩浙海防責任惟均合無比照浙江事體請乞敇下該部查將傅應嘉魏宗瀚等銓補前職但五寨之中又有緩急而五臣才力亦有大小臣等劑量相宜小埕為省㑹門户宜用傅應嘉蓋本官奇才傑抱將略尤優一時武弁無出其右次則烽火門宜用魏宗瀚次則銅山宜用鄧銓次則浯嶼宜用秦國經次則南日宜用羅繼祖斯則因地用人乃無不勝之患二曰議處兵將以責實效臣等查得前福建廵撫都御史劉燾分為南北中三路請設三參將領之軍門標下另設遊撃一員各陳陸兵三千名其經畫亦云備矣但參遊既難於得人而尾大毎至於不掉數年之間未覩成效職此故也臣惟知兵之將世不多有治標之事難執一方亦惟隨時措置有益成事而已今照分守温處福興副總兵官戚繼光忠誠懋著文武兼資貌雖不踰中人才則可將十萬南北將官號為節制之師而收堂堂正正之效者誠未見其比也第其秩雖都督官纔副總殊未足以展其千里之才而慰八閩之望臣等謂宜請乞以戚繼光充總兵官鎮守福興漳泉延津邵武福寧金温九郡一州其三路參將悉改為守備所轄信地俱仍舊章且宜即以戚繼光部下偏裨曉暢兵事屢立戰功者充補其任則在平時既兵知將意將識士情而於臨事如身之使臂臂之使指無不如意誠為計之得者今該臣等查得戚繼光營内現充軍門標下把總納級指揮胡守仁其才則堪中路守備現在領兵納級指揮王如龍其才則堪北路守備但南路守備尚難得人臣等又查得福建都司署都指揮僉事耿宗元精敏向進合無請乞敇下兵部查將胡守仁王如龍推中北二路耿宗元以原職帶管南路各守備職任行令查照原分信地各帶所部兵夫住劄防禦三路五寨水陸兵將俱屬總兵官統督監軍道監督容臣等查處堪動官銀於閩縣南臺地方開設鎮守教場及監督公署在彼聴其公同調集合營訓練風汛之月乃分布四出聴各住劄該道分投監督水陸防守蓋無事而合營團操則號令出於一人而兵有實用臨汛而畫地分守則水陸備於多算而事有成功誠又計之得者但本鎮以一人之身轄全閩之廣馭二三萬之衆若非分任得人焉能巨細畢舉仍應照例添設坐營都司一員專司調度中軍把總二員職掌旗鼔統領標兵其人則查有現任北路守備羅章堪備坐營之任戚繼光部下納級指揮陳濠金科堪備把總之任就而用之庶幾上下相信任使有人而軍務為可舉矣再照原議遊擊領兵一枝專任軍門標下以備往來策應現在遊擊員缺查有江西南湖守備李超堪以銓補伏乞聖裁三曰議處客兵以備常戍照得金台之兵臣與戚繼光居浙頗久勞心訓練故長於陸戰漳泉福清之間人以下海為業故長於水戰今浙江不能不用閩兵以備之於水亦猶福建一時不能不用浙兵以防之於陸蓋其長技有如南舟北馬既不可以强而同而其應募亦如遊藝行商實不可以禁而止是固無容别議外但越省從征勢難久駐而萬衆聚食坐費餉金臣等因行副總兵官戚繼光監軍副使汪道昆將前客兵從公詢審願去願留分為上下二班毎班務足九千名上班自今七月初一日為始分布教訓以防小汛至十月無警放班下班亦自七月初一日為始差官押送回籍至十月初旬聴各把總統領上班以防春汛汛畢仍於六月終放還又以前班兵夫限七月初旬上班以防秋汛年年如此嵗嵗更番務以三年為率不許别有變更但出應募毎不為本處有司所喜值其放班因肆陵虐情亦有之故兵將往往以此為慮伏乞天語丁寧浙江廵撫右侍郎趙炳然通行該管道分及府縣官員務要一體存恤毋得自分彼此因其應募輒事誅求致開他釁内有把總等官變亂行伍違誤戍期及赴他處投用者聴臣等從重參究拏治如此則陸戰有人閩事自定而浙之列郡與閩境土相接者亦無脣亡齒寒之患矣四曰團練主兵以固根本臣惟先年編簽民壯大縣多至五六百名中縣三四百名小縣亦不下百五十二百名每名嵗定工食銀七兩二錢近年東南皆給帖聴募人自取蓋有倍收至十一二兩者兵有定數糧有定額所以捄官軍之敝得寓兵于農之意比者屢經言官建議詔下有司團練鄉兵法莫有便于民壯者乃沿習日久本意寖失以有用之錢糧養無籍之棍徒無益實用臣等謂宜將各縣額設民壯責之駐劄守巡兵備該道督責知府知縣巡捕等官通行查出汰其老弱與市井棍徒補以精悍丁壯給以堅甲利兵編成隊伍分為班次一班屬之知縣就便訓練在縣防守一班屬之巡捕官領赴本府團操毎季更番稍均勞逸每府聴臣坐委知兵武職一員假以把總名色為之統督知府為之監督公同訓練駐劄該道以時閱視别其勤怠精否而賞罰之務使人人善戰縣縣皆精該道該府該縣等官乃為稱職否則他事雖賢亦以曠官論罪八府一州計可得兵萬二千人小警則各自為戰大警則互相應援如此則糧餉不増戰守有備行之三年即八閩之内可轉弱為强而議罷客兵矣五曰議處憲臣以重監督凡用兵既有大將為之統督又必用憲臣為之監督蓋訓練士馬臨陣決戰身先士卒則統督之事也稽察弊課殿功罪處置錢糧則監督之事也除水陸守備把總分駐信地料敵出戰則聴臣行駐劄該道分投監督外至于合營團操與大兵進𠞰大將臨戎必同心文官一員與之終始其事臣等查得兵備副使汪道昆忠存許國才足投艱素與副總兵官戚繼光雅志匡時恊誠任事故去春今夏屢建竒勲武略文謨並輝窮海今戚繼光既欲其總鎮八閩而汪道昆則伏䝉欽陞二級萬一推遷别省不免有拂羣情伏望聖明軫念遐方剛生神氣敕下該部將汪道昆遵照成命陞授福建按察司按察使恊堂請給闗防敕書監督全省水陸軍事務與戚繼光同心一徳共濟時艱俟其年勞茂著績用有成超格擢用伏乞聖裁六日薦舉賢能以備任使伏惟為政在于得人而見賢乃可授任方今聖皇夀考久道化成多士濟濟隨試輒效固不必為官而擇人也但人之才器各有不同而時屬艱危亦宜歴試照得福建海道之官最為重任人所畏為而延建二府素稱善地比以山海之宼屢次傷殘鄉無完宇民樂從盜撫摩安輯尤貴得人知府周賢宣年踰一攷海道副使邵梗則任滿六年誠恐一旦轉遷别行推補即係賢能克堪重任而于海防事體境内民情豈能一旦熟悉今該臣等查得分守建寜參議金淛分巡興泉參議萬民英鹽運司同知劉汝順漳州府同知劉宗寅皆夙抱忠猷才誠茂著索嫻軍旅人望共推且居閩既久民情地利無不周知伏乞敕下該部再加查訪如果臣言不謬遇有前項員缺即將金淛等推補則任使得人而于殘破地方真有頼矣七曰議處有司以圖治理臣惟安内攘外必先有司蓋其于民最親而民之繫望最切如使拊循無術防御失宜民禍滋矣近該言官建議吏部題奉欽依通行撫按衙門將各該地方凡才力不及并貪汚不職官員體訪既真不時参論蓋誠有見乎此閩中戎事日棘吏治日非徒以紏察未遑懲創弗及方今外患始息内治當修有司官員亟宜議處除循良著聞俟其成績地方簡僻許其自新不致濫及外該臣等查訪得某官刋政教之録以沽名假餽遺之儀以射利才足濟貪政多播惡某官性資庸劣志氣卑汚當民窮財盡之際惟峻法而取盈適力詘舉贏之秋獨興工以求悦政聲湮沒物議沸騰此二臣者貪汚不識所當亟為罷斥者也某年力龍鍾才猷駑鈍充耳無聞面命猶煩介紹措身無地跬步必假人扶精力消亡職業曠廢此一臣者年老有疾所當准令休致者也某官外若可觀中無所取買辨軍需百求而百不給講求民瘼十問而十不知政已下移志非尚往此一臣者才力不及所當改調閒散者也以上地方或為省㑹門户而當倭賊之衝或在山谷隩區而為宼盜之藪安民弭盜必得其人乞敕該部再加查訪如果臣言不謬將某等罷斥某官改調别選進士有才力者以補其任庶幾因地擇材因才授事官守得職而民生有依矣八曰申明職守以振頑惰臣惟以民養軍以軍衞民三代以來未之或改國初沿海地方衞所相望行伍充盈一切軍需莫非民力故出海有軍烽堠有望隘塞有扼城池有備凡以下捍民患上酬國恩由彼視之因皆分内事也比來法令廢弛行伍空虚各該衛所官軍大都桀驚不馴頑鈍無恥驅之戎行則恍然自失責之城守則恬若罔聞於是乃復以供賦之民受登陴之役事之倒置未有甚於此者夫彼以積弱自名難於不教而戰水陸之防固無望矣至若嬰城自守力猶可為顧又所養非所用所用非所養則又焉用養彼為哉查得現行條例凡沿海及腹裏府州縣與衛所同住一城及衛所自住一城若遇大敵攻圍不能固守衛所掌印官與專一捕盜官俱比照守邊將帥失陷城寨者律斬其府州縣掌印官及捕盜官與衛所同住一城者不能竭力恊守俱起送吏部降一級别用是則典守之責既有等差而失陷之罰亦分輕重臣請申明前例分别職守如鎮海等衛安海等所官軍自住一城並無居民相錯者責之掌印捕盜官編定精壯食糧官軍署名防守如或老弱即為汰革另選餘丁精壯者補之其不食糧軍餘舍餘既有身家亦要一體編派協助其餘與府州縣同住一城亦照此例編定如或城垣寛袤戍守不敷先儘官軍而後以機兵及居民補其不足假令失事悉照前例分别論罪設若賊勢重大攻圍緊急許赴附近守備官處請發援兵援兵聞報必須整搠器械關支行糧沿途探哨相機嚮往大約離程三日者即限以十日為期如過期而援兵不至因而失陷者領兵官照律擬罪若倭賊始登攻圍未久援兵已發程期未滿及為賊所襲原非攻破者俱止罪坐本衛所官員如此則有事責成人無規避敵愾之勇可作偷惰之弊可袪而無復覆轍之足虞矣九曰請乞錢糧以救危急臣自受任以來歴稽往牒福建用兵之始嵗費六十餘萬其後廵撫劉燾當詘乏之時為撙節之議盡罷兵食秪増軍糧大約一嵗計之猶至二十八萬然而武備俱廢寇患益深而閩遂不支矣及廵撫游震得繼任之後更議調募稍為調停雖費出有經亦不下四十二萬顧牘中奏留僅存虚數而民間窮困無救供需其後失事日殷調兵日至使非聖明大破常格特發帑銀與取回浙直原借去銀兩閩事去矣臣始入境則各部調募官兵已近三萬而各營斬獲功級不啻三千五百有竒解到帑銀近俱用盡即有未到之數内又除去三萬兩准作興化脩賑等用外以臣等計之僅存一十萬兩以供來嵗之需近該臣等部署水陸分布官兵共計用兵二萬三千嵗用工食銀二十八萬加以脩船給械懸賞衝鋒通計一嵗非三十二萬不可視前廵撫劉燾所議之數止加四萬亦期以實心行之或可濟事即今汛期相仍嵗事孔棘萬一兵食不繼士氣不振不惟盡棄前功抑恐仍蹈故轍即臣以身殉國固所甘心國事謂何伏乞皇上留神於廟算垂成之功終惠於海隅更生之㑹敇下該部查照浙直江西先年用兵事例就近請發兩淮鹽課銀十二萬兩兩浙鹽課銀四萬兩兩廣椒木銀四萬兩責限解發前來聴臣撙節用度散訖繳報庶足以濟部中待哺之急免日後噬臍之憂十曰請緩征科以恤凋殘臣惟貢賦惟正之供催科有司之職市恩曠職謂之不臣孰謂不臣而可為也近因各省拖欠内庫折銀節經户部題請通行撫按督催按季開報臣雖駑下固知内庫為不可缺上用為不可稽欽限為不可違部議為不可格也近該臣督兵𠞰賊親歴福興延建汀邵之間聚落成墟汙萊蔽日民間危急愁苦之状殆周人所不能喻鄭俠所不能圖矣以此而責有司招徠之撫字之猶懼不既将復使之集流亡督逋負誠不忍出諸口也邇䝉皇上恩覃溝壑化被海濵大施曠蕩之仁屢下蠲免之令民間父老猶幸得及於寛政庶幾可保其餘年使臣不能宣布徳意而一切督責有司彼必以應文逃責之心而為逺禍全身之計有司讎民民讎有司或以箠楚離心或以耰鋤起釁縱能頭㑹箕歛而得不償失將焉用之查得先任詔安縣知縣龔有成龍巖縣知縣湯相俱各勞心撫字政拙催科部議以完糧不及分數照例移官一時有司翻然改慮後該廵撫陸稳奏調龔有成廵撫遊震得奏保湯相於是始知朝廷不輕絶之仁無求備之義莫不感激思奮精白承休是則部議之殿最吏治視之以為隆汚吏治之隆汚民生視之以為休戚者也乞敇該部憫念流離稍從寛假福建一省即七分不完姑免降級四季未報毋論稽程庶遺民得以休息而更生下吏得以紆徐而從事地方幸甚臣愚幸甚十一曰乞蠲租税以復流移臣所謂緩征者謂全省之民也至若興化之莆田平海福寧之寧徳建寧之壽寧政和泉州之晉江永寧漳州之𤣥鍾南靖生理久絶喘息未甦以此而視全省之民又不可以同日語矣先是興化克復該廵按御史李邦珍發銀六千兩訌復水利賑濟流離近報平海蕩平又該御史林潤請銀三萬兩為之修城築堰賙貧助耕凡所以為斯民居養計者至深切也顧自府縣官到任以來日以招集為事近欲清查户口歸併都圖乃拊循之急務而民恐征徭之將至又皆轉而之他即使有地可耕有城可守民多疑畏相率流移紛紛未已及查寧德之民久報賊平不願歸復政和夀寧之民猶懷亂掠不樂寧居大率民困則易離民勞則易動事所必至理固然也竊計地方殘破莆田平海為甚寧德壽寧政和次之晉江永寧𤣥鍾南靖又次之使非廣布之以寛貸之恩明示之以招徠之信即使龔黄為治民弗能依伏乞免其征科與之更始甚者三年而後納税次則二年又次則一年使之甦息有期歸復可待庶幾漸遂有生之樂益彰無外之仁但照邇年部議蠲免猶征起運僅免存留是可以少紓乎災傷之民而不可以概施於殘破之地何則水旱之災不常有而豐凶之嵗恒相乗即使年榖不登而舊積可資豐年可望於是持其緩急為之調停即寛一分民己受賜一分矣乃今故貲蕩廢已往既無所憑生業淪亡將來又無所賴故雖用其一而緩其二彼惟知有怨而不知有恩誠能寛之嵗月悉為蠲免庶一方可無後憂而三年或有成效十二曰修復額糧以修軍政臣惟三代以下兵農始分兵制不同用之惟一國初衆建衛所部署官軍出則從征居則戍守法至善矣其後承平日久尺籍徒存軍兵不足賴而後有民兵民兵不足賴而後有募兵制益分而軍費益廣矣查得國初舊設福建馬步官軍四萬八千二百員名夫有軍則有糧有糧則有額要之以境内之賦養境内之民非自外至者也邇來衛所消耗行伍空虚計其所存曽不能以半較之額數不知其所餘者凡幾何矣當事者綜覈盈虛裒益多寡或那移别用或轉運地方理固然也乃今欲以轉弱為術而為久安長治之謀則必查復額糧振飭武備計莫出於此矣何者醫之治疾也急則治標緩則治本治標者烏附之類客兵是也治本者參术之類籍兵是也誠能申明舊章查復定額那移者照舊補足轉輸者照舊取回是四萬八千之軍需可不外索而自足由是而汰其老弱選其丁壮定其部曲時其訓練藉客兵既張之威以作其氣舉客兵已試之法以定其趨俟三年有成由是而罷客兵調募之費減民兵供億之需因地制賦因賦制兵真救時之長慮修武之善經也以上所陳訓練主兵查復額糧與前廵撫都御史劉燾先年建議因兵以求兵因糧以求糧大意相似自非需之以嵗月不免同入於虚文故臣等徴兵請餉之議恒拳拳焉必期以三年之久庶幾為萬全之策不然往事具在顛覆相尋臣等雖竭犬馬之愚亦無救地方之患伏乞聖裁疏入帝從之御選明臣奏議巻二十六
