  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_039-1a, image: WYG0445/WYG0445-0602a.png}
body:
  text: 金吾逺逮廢辨疏天啓元年畢自嚴臣竊照從來欽拏官犯俱須泰有明㫖齎有駕帖而後從事所到地方恭設香案羅拜宣讀所以祗畏君命而對揚天威也原任山西北樓口副將今廢閒陳天爵所犯罪狀臣誠不知其何如惟是緹騎逮人於數百里之外既無明㫖又無駕帖止憑金吾一紙之批真僞莫辨臣竊訝之若其非真則錦衣為天子之禁衛何容擅有勾攝若其果真揆之纍朝之令甲刑章之舊例將無稍稍剌謬矣乎竊念人主一舉一動一賞一罰必期可垂青史為萬世法誠不可不慎者也現今天津道劉䇿巳將陳天爵羈候惟謹然臣待罪巡撫叨有地方之責未奉明㫖駕帖遽難輕發官犯即差官劉僑亦似有逡巡不便拘執者伏祈皇上鑒别真僞特頒明㫖以便遵奉解京究問庶雷霆有赫而日月光昭矣疏入得㫖知道了請移宫疏天啓元年左光斗臣謹奏竊惟內廷之有乾清宮猶外廷之有皇極殿也祖宗以來惟皇上御天居之惟皇后配天得共居之其餘妃嬪雖以次進御遇有大故即當移置别殿非但避嫌亦以尊制厯代相𫝊未之或改今選侍李氏既非殿下嫡母又非殿下生母儼然居正宫而殿下乃居慈慶不得守几筵行大禮典制乖舛名分倒置臣竊惑之且聞李氏侍先皇無脫簪雞鳴之德侍殿下又無撫摩育養之恩此其人豈可託以聖躬者且殿下春秋十六齡長矣內輔以忠實老成外輔以公孤卿二何慮乏人尚須乳哺而襁負之哉又况睿智方開正宜不見可欲而何必託于婦人女子之手為乎故在先皇祖時屢請名封而不許即先皇貴妃之請亦在彌留之際其意可知且行於先皇則伉儷之名猶可行於殿下則尊卑之稱亦斷斷有不便者倘及今不早决斷將借撫養之名行專制之實武后之禍立見於今臣誠有不忍言者伏乞殿下收回遺命令仍守選侍之職或念先帝遺愛姑與以名稱速令移置别殿殿下仍回乾清宫中守喪次而成大禮庶幾宫禁清而名位正宗社之靈實式憑之矣疏入得㫖移宫巳有㫖了仁義兼盡疏天啓元年左光斗臣謹奏先是本月初一日諸臣聞變倉猝趨朝人情洶洶朝不待夕維時大臣從乾清宮中叩頭執奏扶皇上出居慈慶宫臣等相顧戰栗此時不守几筵而避居别殿踉蹌張皇宫中必有甚不相安之情間不容緩之勢驚問其故喧傳李選侍左右前後盡是賄買腰玉姧璫布滿隂為腹心皇上大有戒心不克寧處君父驚魂未定臣子敢爾即安臣於初二日隨公疏後有慎守典禮肅清宫禁一疏語甚微婉此時但知定宗廟安社稷為大不知其他初三日宫中震怒禍幾不測賴皇上保全將臣疏發閣票擬隨奉聖㫖移宫已有㫖了名封事既云尊卑異稱禮部再酌議具奏欽此初五日閣臣具揭再催奉㫖移宫至初六日皇上登極駕還乾清宫宫禁肅然內外寧謐臣等舉手加額共幸廟社有靈矣皇上既當還宫則選侍之當移宫其理自明白易曉矣惟是自移宫以後自當存其大體捐其小過皇上如天之大度宜無所不包涵先帝在天之遺愛宜無所不體恤此其特恩在聖𠂻調護在輔臣非小臣之所能意度若株連蔓引使宫闈不安非但與國體不便亦大非臣等建言初心昔魯襄公不能制其母宋儒朱熹以為母不可制當制其侍御之人後彭龜年經筵講此假公案相與歎服因取朱熹入直此等處置自有至當不易之則聞錦衣勘問諸璫時語連宫禁槩置不問深為得體伏乞皇上宣召閣部九卿科道面論以當日避宫何故及今日調護何方一一曉然明白不得憑中使口𫝊聖旨仍乞將劉遜姚進忠等正法暴其盜寶罪狀與天下共見勿使播弄脫罪其餘株連槩從寬政令反側子自安庶幾燒梁獄之詞者政所以寢淮南之謀而仁之至義之盡胥在此矣臣區區之心始終知有定宗廟安社稷而已矣疏入帝乃備述李選侍凌虐聖母與節次無禮狀宣諭百官敬剖和同之旨以銷結習疏天啓元年侯震𤾉竊惟朋黨禍國人皆知之而漢唐宋末季皆不免何也人默運於風氣中有不自覺者即覺有不自持者臣行能謭劣初入班行輒不自量欲大小臣工自任為挽回風氣之人昔孔子生當周季兢兢致戒於矜爭羣黨而晰其疑似之界曰和曰同和别於同在心術間不求同所以和也皇祖初年察相以權賈禍繼之者欲去權之名居權之實遂聞天下以疑竇偶皇祖寵有所移實無搖國本之心而有其迹弼士因起而爭皇祖疑批鱗者有市心焉彌爭彌格竄逐繼之三十年來爭者非一正直與忠厚爭新進與老成爭廊廟與山林爭大要借此為造妖書楚獄不忍言矣因而有東南西北之號矣然東南西北以意同未必以地同又未必東南者終於東南西北者終於西北也惟不和故不得不分類以求同惟求同故不得不峻防以樹黨而和愈傷矣臣每從草莽中平心剖質後事參觀大約主西北者詆東南為側媚為柔邪甚者為别有肺腸不利孺子主東南者詆西北為假氣節假理學甚者為挑激君父排擠善良互黨互摧母論道德究竟功名不成為功名富貴不成為富貴可痛也竊念三代而下惟恐不好名則與其隨也寧規與其懦也寧亢西北似已但使影響攀附便希竹帛恐龍逄比干之席不勝割也容可無忠厚老成者收塵靜波恬之福彼立論必依於寬以惜人才以培國脉東南似已然迹類於全軀保妻子倘國家危疑震撼之時呼吸不可待將盡人巽軟孰回天轉日殺身以成仁此兩者倘令鹽梅相濟琴瑟互調不謀身而謀國則渾然道德真儒自足千古何至禍人禍已以禍邦家哉逺不具論且如張差一案與其風癲母寧不軌綱常所係掩覆何庸但當日宫闈震動聖意昭明處分自應婉轉移宫一案晨雞乍驚亟翦其萌龍御已安微防其過此又天理人情之至兩念合為一念無異可伐何功可居而無奈其漸激漸離也去國者一身似葉慰留者三錫非榮議者恨之乃若鄒元標王德完所稱社稷臣非耶偶涉異同尤不可解德完兩請之誤紏者良是然何至盡沒生平形容刻畫且汙衊同氣語出無倫使還而相詬者幾成於野之戰也元標無必兩字臣亦不能矯其為是以百折不回之身提衡於姧雄進退之際而猥云無必可乎然意有公虛原無偏執今兩臣不難剖腹以相明旁觀豈尚執形而不化元標疏云無異兩村農攜手入城邑人唆之訟至對簿無以應也亦可原矣臣故願南北諸臣悉捐已往之葛藤適還本來之平蕩其所祈于二老臣者譬如丘山塊然不動行者自期譬如鼎吕寂然無聲叩者自響高凝肅穆確然自任為挽回氣化而母徒以憂世熱腸急急開旁借之門可也至楊李定獄他不具問即律以喪師失地棄之市朝決不至以妄殺干天和何故百千疏不應借德完一語朝上夕下顯示線索為衆射標若不速破此疑人言終不可了近日同異斯亦大關鍵矣凡此俱經諸臣指摘臣雖有積念似無可言屬者南疏屢及元標復具疏自明而山陵事竣德完與黃克纘又相繼乞休恐種種追尋猶是從前枝蔓故不揣謬為剖晰祈化異歸同不同迹而同理則雖偶異不妨太和幾微之際未可口舌爭也且諸臣不憶三四月間事乎遼陽一潰狼顧不暇遑惜異同則平日之矢口而爭者為身起見為國起見亦當于平旦之時隱隱自問了了分明矣人以用兵為催官星又以破遼續朋黨論雖云謔語亦儘可思臣因是而又不得不豫盟于相臣也沖君御極衆正匡扶雖海宇拭目明良之會亦羣情占望風影之時無論搢紳臣見山人墨客下邑窮鄉亦心各有主喙各爭鳴喜為左右袒此真風氣所流有不知其然者是必樞軸之地先幾覷破定力主持相與默融默濟母調獨味之羮各戒與瓢之智庶幾不為流毒所中乎此雖不必然之防而不得不上鳴宸聽以懇祈於救時哲相者如此臣草疏畢見府丞邵輔忠主恩難報一疏語頗紏纒臣所扼腕而嗟冀未銷結習者政此類耳統惟聖明裁察施行臣不勝激切籲禱之至疏入得旨近來議論紛淆輒以異同起見這本剖晰和同有禆世風國體知道了諫令客氏再入疏天啓元年侯震暘臣伏見內閣𫝊奉聖諭奉聖夫人客氏勤侍朕躬未離左右自出宫去訖午膳至晚還未進用暮夜至曉憶泣痛心不止安歇弗寧還著時常進內奉侍寬慰朕懷外廷不得煩激竊臣自入都門無論搢紳士庶皆頌皇上臨御精勤問學敏練內防釁孽外愓邊疆無一言一動不愜人心稱中興令主獨謂有奉聖夫人客氏者挾阿保功朝夕在側恐熒惑聖德為肘腋憂臣謂掖廷嚴邃口語易訛明聖當陽幽邪立照况山陵竣事出宫奉有明旨不必鰓鰓過計為也旋有臺臣王心一以義裁思一疏䝉聖㫖寬容不加督責臣益欽戴今月草六日果𫝊客氏午時出宫臣于是舉手加額私幸所期不謬而搢紳士庶亦無不途歌巷舞頌聖明者不兩日間突奉今諭臣且驚且駭謂此有所矯托未必出于皇上耶青天白日之下斷斷無此謂有皇上迫于義不容遲情不忍割旋出之而旋悔之耶臣又不敢信皇上固聰明英睿不世出之主也乃不忍一保姆至忘寢食明告中外有是理乎使皇上未離襁褓則可今年已非幼外之則有疑丞輔相內之則中宫叶琴瑟之逑兩宫禀小星之義起居飲食調護維持以節嗇精神以漸摩令德其何有于保姆而為此戀戀耶且皇上一身天地神明所呵護之身也二祖十宗所付託之身也詎一保姆得私其功即位之日怵以遼警告以災傷兵動九邉餉窮四海岌岌乎有衰宋之懼此又天地祖宗仁愛之甚借外憂以動我皇上者也皇上念及此即宵衣旰食夙興夜寐飭文武諸臣矢心竭力以奠山河猶恐不給乃緣兒女子涕泣何為者且皇上不念三喪並舉兩宫繼棄皇上于誦詩舞勺之年先帝草載青宫三旬紫極倐忽崩殂頃雖辨祔禮成寶城未築竊意皇上九重之內必有寤寐興哀杯棬飲痛者而反以憶泣保姆之論使臣工見使衆庶聞使羣情宛轉揣摩而莫得其故甚矣為聖德纍也禮曰內有慈母君命所使教子也魯昭公慈母死欲為之練冠有同執奏乃止古之慈母職兼訓教猶恩以義絶若是則今之乳母可知也今夫諸王公主至親貴矣朱邸既開叩閽不易奈何獨使么麼里婦狎近至尊哉昨臣等匍匐送喪之日萬姓角崩千官雲擁獨一乘軒在後巍然衆中道路指目咸曰奉聖夫人客氏靡不舌嬌眼張者喪回禮臣周道登語臣云神主進德勝門一老嫗長跪路旁望塵號慟驚問之有錦衣臣駱思恭曰此先皇保姆恩寵未逮是以悲耳臣喟然興嘆同此掖庭阿乳之功適當後先繼述之際何厚與薄猶天與淵薄者使行路猶憐厚者能不滿盈招忌女德無極髙明不祥皇上即為客氏一身富貴計亦宜蚤加裁抑曲示保全不宜格外隆恩以寵而益之毒且皇上始而徘徊眷注稍遲其出猶可言也出而再入不可時出時入尤萬萬不可何也宫闈禁近之地詎宜習熟往來閭巷穢䙝之身何得輒混視聽況姧璫羣小內外鉤連借叢煬竈有不忍言者往牒昭然足埀炯戒昔王聖寵而煽江京李閏之姧趙嬈寵而搆曹節王甫之變毒流搢紳禍貽宗社良可寒心我祖宗家法森嚴皇上茂齡天縱萬萬無此忠臣愛君必防其漸又況風聽臚𫝊種種疑議業已見端寧止萬一之慮而已哉不然皇上青年睿體得一姆氏淑慎周旋無損聖德且安聖躬嘵嘵拂聽胡為者也竊體皇上此心特出于小不忍不知人各有情獨皇上不得自有其情者也試觀客氏之未出也舉國何以皇皇然望其既出也何以躍躍然喜其出而復入也何以凛凛然憂其故可思也或未有以此情告之皇上者茍知之將又以私愛不抑而自調矣載誦諭詞禁外廷不得煩激是皇上先有不自安者知諸臣必且叩閽力爭臣喜此心即可以為堯舜臣若承旨緘默是順皇上小不忍之心而不能充皇上為堯舜之心亦烏用諌官為矣伏乞皇上欣然轉圜立收成諭其客氏或優以金帛或嵗時問勞示無忘簪履斷不令出入大內瀆近宸嚴至於內侍人員亦須詳辨彼老成正直者大抵不善為逢迎者也願皇上勿喜諛而惡規勿倐任而倐錮勿旋罪而旋賞使輾轉猜疑愈開旁隙則情法自肅城社自清孔子曰惟女子小人為難養也敢因是而並及之臣無任悚息祈懇之至疏入得旨云屢有㫖諭如何不體朕心又來瀆擾侯震暘借事沽名姑念言官且不深究門軍法紀全弛疏天啓元年侯震暘臣于前月二十六日接差皇城巡視甫入公署有燕山伍長閻科呈告內監吞賄坐占多軍事當批該總查解去後隨據山東把總劉光溥回稱拘集各犯審據李堂供係府軍左衛直軍答應本門內官錢夀等三十員內除病故一員現在二十九員每一員內官占軍八名名曰小伴當每名每班折錢八十文各內官共占二百三十二名又有大伴當各內相下占軍一百一十四名每名折銀三錢一向交納不缺因本月初一日該伍長閻科上直拖缺伴當棍錢未與內官朦朧開送三十名于中府拘拏以致具告審據周四供係內官王受下家人趙鬍子供係內官趙升下家人各稱本月初一日伍長閻科缺伴當棍錢因各內官聳揑拘拏以致告狀前情是實等因到臣及巡視部臣張國紳曽面質諸姧一一索詐常例俯首無辭則贓證有據矣臣准擬十四日赴署公審將姧徒責宄昨進科門監趙升等來見手出一揭明開官錢原係太祖舊制為條帚網巾之費閻科每月包認官錢三分執棍錢一百三十五文今九月侵尅肥巳懼罪刁誣等情因稱已具疏入告下錦衣矣臣始駭內豎之無法無君明索軍儲暗要俞㫖玩禁廷為兒戲欺巡視為贅疣一至此乎彼見該總拘其凶僕不容保領度臣審實後必將具奏故乘間先發皇上未及覺輒下所司打問豈知軍門之刁頑賣放相沿已久必該監未嘗利其有而後可以行其法升等今日折官錢明日索棍錢彼日餼幾何能堪此乎惟借此為名臣等巡視所到多雇覓乞丐充數臣初受事極意振刷輒取腰牌查對盡露前情咸訴為內監剝膚計不得不出于此臣猶謂積弊相沿當漸漸釐革而升等惕于法不可逃乘于機不及待豫混天聽先取各犯以去若至臣公審必將曰此欽犯也誰敢加刑如此則皇上設立巡視衙門何用以一門計之每月占軍二百三十二名折錢一萬八千五百六十文作銀三十三兩四錢八分又占軍一百十四名折收大伴當銀三十四兩二錢以上二項共計一月銀錢六十七兩六錢八分以一年計之當得七百一十二兩一錢六分一門如此各門可知四衛如此各衛可知皇上試問升等是否祖制是否為應得之貨宿衛安得而不寡防守安得而不弛近來外患愈殷內備愈懈且閹官作橫所在而然門監尤稱無賴如捽憲臣辱輔臣不一而足皇上俱不嚴宄以此驕恣無忌即臣叨巡視僅數日金海河死尸一軀䝉皇上敕內外緝事衙門嚴查具奏褎如充耳而東華倒死男子又見告矣似此疏玩將嚴究軍伍而奪其糈難責其勤將少從體恤而法漸弛姦宄漸不可問且業䝉告發未經剖質而先弄機關尤難輕貸伏乞皇上敕下法司宄擬若侵剋果虛則坐閻科以刁誣之罪並罪衛官若侵剋果真則坐門監及李堂周四趙鬍子等以科斂之罪而該監情虛誣奏亂法欺君尤宜嚴加宄處庶法紀明而姧宄息臣亦得明其職掌矣臣草疏畢見兵部題差張國紳督催宣大兵馬此固慎擇而使但臣等科道部三人共事所藉稽核守衛官軍總數及三日一換每班細數皆部臣司之國紳拮据有日綽有擔當臣與臺臣周邦基任事伊始實藉國紳同心整頓詳處一畨務求妥當不作畫餅而國紳忽委别差該部疏議經略出關詞甚侃侃臣又何敢借留彼屬但所催後徑兵馬原係各地方官選發各有専管業巳戒行今第沿途迎督巳耳國紳現有職掌皇城一差亦非細故惟向來看作套數所以積弊相仍牢不可拔四五月間添差科道専守長安等門是何警備今未可緩視也臣故不揣謂宜留國紳現核該監與該衛等互侵細數上聞以終此局聽該部另委别員督催兵馬不知可否統侯聖裁臣無任悚息祈懇之至疏入得㫖巳有㫖了張國紳題差催兵不得議留該部知道禁廷人命疏天啓元年侯震暘臣叨皇城巡視匝月間屢報人命其沿鋪僵死查無主名者不具奏外其干係內相者一見於金海河一見於十庫一見於夀皇殿夀皇殿死尸劉大為十一月初三日事臣著把總查驗知係戊字庫官于忠名下家人有伊父認稱煤氣燻死此或劫之以威或誘之以利總不可知業有親父領埋不必深宄若十庫死尸劉三則前月三十日晚懸梁于庫南廂房者也臣批該總立刻查報據稱係內相毛奎名下家人素不守分蕩廢本官衣服因而自縊現奉㫖著司禮監拏問竊念縊則縊矣非萬不得巳孰肯輕生以理度之定從迫脅猶恐承問者不免任意出入草菅其民凛凛是懼而兩事在月內初一陽節與萬夀節輻輳嵩呼臣不敢上聞然事關職掌終難默默至金海河事則係臣題請在前奉㫖敕內外緝事衙門嚴查具奏乃褎如充耳若罔聞知臣令懸死者衣服于通衢俟所親來認及有丁氏具告到臣稱氏男楊守禮來住官房九月二十六日梁小坡多人呌男出外口稱梁公要他不知何故身死禁河氏姪丁國臣見衣報知伏乞嚴宄超冤等情臣止見幼孩扶掖丁氏眼枯口咽哀楚萬狀問伊姪何在則云以報知之故冤禁衛獄矣旋著該總查問稱係司禮監奏聞特下錦衣衛嚴行究問本內事情無由抄看臣念錦衣衛正所稱緝事衙門介內外之間者必當關白臣疏取致死緣由直窮到底乃越日𫝊抄聖㫖這事情你每如何回護還著究問來說臣益不解所稱回護者何指為護內相則國臣尚有得白之時為護尸親則國臣永無可生之路夫投河男子不知姓名懸衣搆認法也國臣見而報其姑丁氏丁氏痛其子死于非命而哀鳴情也死者死矣生者求伸得抑令㷀㷀老媪勢將與其姪俱盡不連殺三命乎代為鳴控者非臣之責而誰責也亦在大慶前未便瀆奏亟移揭叩之司禮監據該監回文查得已故牌子楊科官房一所原係科名下內官趙進忠將房恭進仍與科姪楊守禮看守進納房租後有內官王尚用貼進忠守禮頂頭銀一百兩將房三人同住至今九月內王尚用聞知各處官房俱有欽賜之語何進忠守禮索要前項貼頭銀兩其楊守禮不知因甚情節于九月二十七日投河身死至十月十八日有神棍丁宦即丁國臣孔六孔五王輔登等唆使丁氏指尸詐賴不遂夥告夥證于刑部山東司審理丁氏曽供守禮素有風症時嘗舉發離家日久不意投河等語況此房欽賜梁太監于二十五日投河于二十七日止隔一日梁小坡與守禮素不識面且無仇隙實為誣害不待辨而明也因誣不甘于十月十二日將情具奏奉聖㫖本內有名人犯著錦衣衛嚴行究問欽此該衛即將梁小披拘集聽審本衛于十月三十日具題覆奉聖㫖這事情你每如何回護還著究問來說欽此至今該衛尚未覆審等情到臣臣乃知明㫖所稱回護者蓋指國臣輩言也嗟乎守禮丁氏親男也子死母告何待人唆國臣丁氏親姪也弟死報姑何得稱唆且明有趙進忠王尚用與守禮爭房致死謂不知因甚情節其誰欺乎孔六等不知何人要未有有告而無證者由後言之所連殺又將不止三命矣其謂丁氏口供風症等有無不可知即有之或錢神買和尚忍言哉夫司禮監必其人老成而明于國體者任之固皇上所託為親臣也似此多命曲狥情面不仰承聖明好生之德可乎因念前月門禁一事監官賣軍骫法臣特疏糾參願為皇上一釐宿弊乃趙升等取㫖如寄而臣疏第云知道了含糊未明臣故將李堂等三人關送法司虛實定有著落聽該部具覆若人命重情亦盡黑白倒坐其于悖國憲而干天和不小除劉大一案免究外祈皇上將劉三楊守禮二獄併敕法司從實從公嚴行鞫問俾人人知禁近之地三尺不私庶冤抑得伸臣叨巡視者亦得施眉目于掖垣侍從之班臣愚幸甚且臣非謂中官盡匪人也祖宗法制原不令干預政事今以臣職掌所關參者自參問者自問反不令臣預聞倒置甚矣故不覺嘵嘵及此併此後凡重大事情皆付外廷究擬廷臣自能仰承德意宣暢輿情其有偏私矯枉者臣等亦得以白簡從事當此國家多故勿更開煬竈之端使羣情憂不在絶徼而在蕭牆也臣無任激切祈懇之至疏入得旨丁宦等已有旨了劉三併法司問擬請發帑金疏天啓二年朱夑元臣謹題為天討方張公私俱匱懇乞聖明垂念危疆亟賜發帑以濟然眉事臣惟率土貢賦臣子職分自非萬分急迫何敢呼天妄籲乃蜀中不幸遘此異變有不得不懇乞於皇上之前者先是天啓元年五月內奉旨調川兵三萬援遼部文注定每兵一名給銀一十七兩通算該銀五十一萬而監軍總鎮督餉等官與吏承廪糧戰馬船隻俱不在內是時臣待罪藩政日接部檄急如星火查庫貯僅四十八年未解加派銀四萬兩餘將京料缺官貢扇價銀各邊軍糧盡行那借共解到重慶聽支者二十二萬兩沿江經過州縣如叙馬瀘重䕫等處共兑支過大糧邊餉銀七萬兩餘俟內帑找補猶慮不足復兑解巴縣大糧銀三萬兩重慶庫貯清出屯銀三萬兩該府徑行大足酆都等縣取解五萬兩有奇貯府聽支於時西土茍安東圉孔棘秖期速發以濟阽危且謂時傍冬初會計期近那新補舊猶可撑持乃不意異常之禍頓生肘腋之間其在重慶貯庫者支發未半盡為盜資川之西東則賦州縣悉被殘破雖保有川北下東上南三處而援兵經過坐派行坐二糧募夫搬運民不堪命逃竄亦空臣在圍城之中與賊相持一百日先後集衆五六萬每懼經費不支與布政使臣周著毫釐必較已措過銀十萬餘兩數又不足共立劵書多方括借藩府郡王搢紳士民通共助銀六萬兩其力巳竭今不惟各漢土兵嗷嗷需餉裹足不前即松建各邊經歲無糧近日諸苗乘釁生事在保縣屢以生番圍城告在建昌則以蘭目蠢動告遵義兩次被占建武為賊門户正當戮力之秋孰肯枵服從事臣閲邸報䝉皇上軫念成都重地特遣督臣張我續總理四省之兵兩次發帑金三十六萬兩仰荷聖恩不勝感泣但查先年征播寇在巢穴全蜀無恙號令遍行尚動九省官兵費金銀二百七十萬兩今賊不軌禍在通省其難十倍于播雖戰敗奔逃而渝城未復元惡在逋萬一賄通鄰司結連黨類豕突鴟張更難收復今若乘破竹之勢為犂庭之舉必得數十萬餉先安各邊之心然後一意勦討四路會攻懸賞以鼓將士納降以散黨羽諒此么麼不難撲滅但兵多費廣不能尅日內苦資用之不敷外懼各邊之生釁臣愚不肖若不蚤疏控籲為罪滋大懇求皇上愍念西南重地塗炭已極且蜀安而鄰省皆保蜀存而常賦自充安危得失所繫匪細伏乞俯允再發帑金五十萬差官陸續解發川中容臣與督臣會同三省大兵尅期翦除擒獻首惡用張天討奠安地方藺賊既平則諸邊又易撫戢西南半壁可復覩太平景象矣疏入帝從之上復讎疏天啓二年王之宷臣謹奏禮君父之讎不共戴天齊襄公復九世之讎春秋大之曩李選侍氣毆聖母陛下再三播告中外停其貴妃之封聖母在天之靈必有心安而目瞑者此復讎一大義也乃先帝一生遭逢多難彌留之際飲恨以崩試問李可灼之誤用藥引進者誰崔文升之故用藥主使者誰恐方從哲之罪不在可灼文升下此先帝大讎未復者一也張差持梃犯宫安危止在呼吸此乾坤何等時乃劉廷元曲蓋姧謀以瘋癲具獄矣胡士相等改注口語以賣薪成招矣其後復讞差供同謀舉事內外設伏多人守才三道亦供結黨連謀而士相輩悉抹去之當時有內應有外援一夫作難九廟震驚何物凶徒敢肆行不道乃爾緣外戚鄭國泰私結劉廷元劉光復姚宗文輩珠玉金錢充滿其室言官結舌莫敢誰何遂無復顧憚睥睨神器耳國泰雖死罪不容誅法當開棺戮尸夷其族赭其宫而至今猶未議及此先大讎之未復者二也總之用藥之術即梃擊之謀擊不中而促之藥是文升之藥慘于張差之梃也張差之前從無張差劉成之後豈乏劉成臣見陛下之孤立于上矣又郎中胡士相等主瘋癲者也堂官張問逹調停癲瘋者也寺臣王士昌疏忠而心侫評無隻字訟多溢詞堂官張問逹語轉而意圓先允瘋癲後寬姧宄勞永嘉嶽駿聲等同惡相濟張差招有三十六頭兒則胡士相閣筆招有東邊一起幹事則嶽駿聲言波及無辜招有紅封票髙真人則勞永嘉言不及究紅封教今髙一奎見監薊州係鎮朔衛人蓋髙一奎主持紅封教者也馬三道管紅票者也龐保劉成供給紅封教多人撒棍者也諸姧亦有人心者以堂官對衆手單而改之以十八人會審公單而增減之皆當治以大逆不道之罪非止大不敬也疏入帝不問至五年魏忠賢黨楊維垣首翻梃擊之案之宷坐除名俄入之汪文言獄中下詔獄瘐死新餉苦纍難支疏天啓二年高推臣聞國之所賴以為本者民也國失其本無以為國矣民之所賴以為天者食也民失其天無以為民矣臣自奉命西巡由中州扺秦境時方四月麥已登場矣從此而再布秋禾八月以後其利猶可獲也逮踰隴而西萬山叢集窮日馳驅無半里平夷之路亦無半里可易之疇百姓苦無糊口之資不得已而墾百仞之嶺以為阡闢陡阻之壁以為陌欹壟既不堪注薄土又不能滋一過霪雨為災漂蕩衝決則土去石出地盡糧亡矣其視他處膏腴肥饒安土樂業者不啻天壤之隔也且西北地寒窮荒之時序愆陽二麥至八月方熟天末之隂陽弗正諸禾入秋末始收一降嚴霜百榖盡稿稔嵗不獲腹裏之半頻年復有旱潦之憂其視他處一嵗二熟十月滌場者又不啻天淵之隔也至秦中事竣攬轡西征其山愈叢其地愈瘠時已六月將終麥方吐華諸禾奄忽臣呼左右而問之西之山何如乎對曰不減此處之山也西之地何如乎對曰瘠于此處之地也臣不覺伏軾而歎曰有是哉民何不幸而生于此域耶一遭荒歉又何以為聊生之計耶越數里擁擁簇簇紅塵赤日之中披裘祼體之輩咸伏地遮輿而告曰遼餉苦遼餉苦不減則民當餓死矣臣進而詰之奚為而至餓死也民答曰山地荒薄三分不敵他處之一即大有之年所得不過五斗未有遼餉一半徴納一半聊生既有遼餉一半納糧一半充餉民皆枵腹待斃矣臣因而窮之爾既糊口之無資至今何以為食耶民皆泣涕以道曰夏秋之間樹頭之産溪澗之菁猶可充腹時至冬春水冷草枯即山薇野蕨稍有存積然而茹毛茹草終非長物民盡輾轉溝壑矣言罷號泣之聲徹滿山谷臣亦含淚以慰之爾各安業即當為爾請命也越二日抵鞏昌而以民事詢郡守知府郭之祜細陳閭里之窮備言遼餉之苦其燭照民隱者至詳至悉謂民因遼餉而摧折者十之二三矣此鞏昌民窮之大概也既按部來臨路傍廢店近郭窮鄉家塞其門人泥其牖臣呼左右而問之此何以故對曰此窮民之逃竄而亡其家者也臣因而詰之逃往何地答曰東則散而之四方西則趁食於外地臣不覺拊膺而歎曰有是哉散之四方猶可言也趁食外地是驅百姓而為敵也是何光景成何世界乎甫入署中狄道金縣之民擁門而告遼餉之苦者視鞏民無二也臣進而問之爾何若是其急乎答曰遼餉之困甚若倒懸不減則民無孑遺矣臣因而詰之奚為而無孑遺也民答曰山僻要荒地不堪種歷來正額不完加以四十四五六年三載亢旱顆粒不收民猶戀戀故土不肯輕去其鄉并逮遼餉一加重困難繼正供之催吏方去加派之呼吏復來完之則白骨無肉之可剜不完則官司催逼之難受百姓日窮日蹙兹皆空壁而去矣死亡流離不知其數矣疾首蹙頞蓋不勝其呼籲之悲也臣乃撫慰以安之爾各就里即當為爾請命也已而知府冀懋中進署相謁手持一册以示臣開而閲之乃五州縣窮民之狀也極言新餉之難完備悉逃亡之景象蓋謂昊天不弔頻嵗不登自泰昌元年僅熟其半次年又以冰雹為祟半菽不獲兼以遼餉催逼墐户流亡者十室而九百里之內人烟斷絶有司迫于催檄逼于守提萬不得巳乃呼一二現在之民千方督責剜肉醫瘡以完前件窮者逃矣即今富者亦以賠纍而窮矣滿目堪憐視百姓之自吐自陳倍詳倍悉即鄭俠之流民圖不作兩觀賈誼之長太息實無軒輊巳此臨洮窮民之情狀也按部踰河千里黃沙百榖難樹草木斷絶禽鳥亦稀其淒涼之狀視河東更苦一時執戈持㦸之輩有三五成羣有十百為聚含淚而告遼餉之苦者視平民更急也臣進而問之爾何若是其迫乎答曰遼餉之苦甚于荼毒不減則軍為餓莩必且空伍而逃矣臣因正色以詰之向何為而固吾圉今何為而出此言也僉曰遐荒絶塞沙磧不毛窮軍卧薪嘗瞻以守邊疆全賴京民二運以為活計未有遼餉之時京運呼天不應猶借民運支吾自有遼餉百姓皆以遼餉為亟而邊餉全不完納也有司皆以遼餉為先而軍需通不照管也守戍窮軍有一年乏糧者有二年乏糧者甚有三年乏糧者向猶典衣以自計今則無衣可典矣向猶賣妻以茍活今亦無妻可賣矣臣于風埃露處之中惟見淒慘哀憐目不忍視痛哭流涕耳不忍聞臣即溫言以撫之廟堂之上不知爾輩之苦楚爾宜念朝廷平日之恩養各守寧宇即當為爾請命也臣乃立檄各道以查邊餉之完缺據洮岷兵備道右參政秦士文報稱洮岷之餉除京運缺五萬餘兩民運猶缺二十五萬九千八百餘兩也臨鞏兵備道右參政徐鏌報稱除京運缺一十七萬二千八百餘兩民運猶缺二十二萬六千四百餘兩也帶管靖邊兵糧道徐鏌報稱除京運缺一十二萬五千三百餘兩民運猶缺一十萬四千四百餘兩也分守西寧道副使楊俊臣報稱除京運缺二十萬有奇民運猶缺三十一萬五千六百有奇也分巡西寧道右參政郭之琮報稱除京運缺二十三萬有奇民運猶缺三十五萬一千二百有奇也西寧兵備道按察使王佐才報稱除京運缺一十二萬六千八百有奇民運猶缺一十萬九千五百有奇也帶管肅州兵備道郭之琮報稱除京運缺六萬六千有奇民運猶缺一十七萬四百四千有奇也莊浪兵備道副使馮任報稱除京運缺六萬九千九百有竒民運猶缺一十一萬三千九百有奇也以上京運共缺一百四萬八百餘兩而民運缺至一百六十六萬五千二百有奇也嗟嗟邊疆何地守邊何事而忍令此輩之枵腹耶此又兩河窮軍之大概萬分不可緩者耳臣輾轉顧慮再四思維當邊庭告急之後神京左臂盡為敵有皇上方且蒿目宵旰舉朝臣工畢智竭悃恨不能罄天地之藏括山海之積為國家宏物利而襄至計臣即有胸無心寧忍自外敢不仰體皇上之殷憂竭力公家而顧為臨鞏之計哉獨計臨鞏天末也其地非膏壤肥澤之地民非家給人足之民也臨鞏小府也其減之不過九牛之一毛其加之亦不過大海之一滴也且甘固重鎮也由河湟松山紅井以至酒泉玉門數千里之長邊實全陜之門户其關繫匪輕猶不減於遼左之重也諦觀自有遼事以來四川之變不知費各省多少物力矣黔中之禍不知費大內多少金錢矣即山東河南畿內白蓮之亂又不知厪皇上多少憂思矣區區兩河伏祖宗之默佑皇上之威靈及道府之綢繆其不至如川貴之續者幸也至火酋物故諸子生心虎視耽耽窺我內地即今九月二十後海外擁衆萬騎過我河南以示狂逞一時羽檄旁午日無寧晷即臣與撫臣日飭各道將嚴加隄備然猶彼衆我寡彼强我弱彼有糧而我無餉岌岌乎有纍卵之危幸而天佑皇家敵之腳根未定二十三大雪二十四大雪海外駐宿之地雪深三尺朔風透骨冷氣逼人敵不能存縮頸而去河西一塊土不至蹂躪而莫可收拾者尤幸之幸也然敵可保其不來乎天可保其常雪乎萬一明春和暖捲土重來則滿目鋒銷不知何以支持已即不然而窮軍內訌揭竿鼓譟又不知何以翦滅巳計此時而方且動大內之餘藏以為固圉之完計欲民之再出遼餉也得乎不得乎即欲少緩須臾而不為之速賜蠲免也能乎不能乎臣想皇上超然逺慮則新餉之罷當不俟臣言之畢矣臣草疏之餘時閲邸報見諸臣之請蠲新餉者舌敝脣頺十之八九皇上之注意危遼如俞所請者十無一二臣不憚三草三毁躊蹰再計然而地與地不同民與民不一臨鞏之民所供皆係邊儲臨鞏之糧計數不及他省之一大縣然蠲之在上不過毫釐存之在下不啻巨萬民之困窮倍苦民之望恩倍切臣之遍歷兩河目擊民艱日夜嘔心為國為民一念朴忠告于皇上者如此昔帝堯在上一民之飢猶已之飢況今之啼飢有不止于一民乎文王在宥民未有傷視之如傷況今之窮民有不止于如傷乎伏乞皇上軫念窮邊亟停加派俾民得稍遺餘力以自養即遺餘力以實邊並敕户部速發京運以救涸轍之枯魚庶軍民其有療乎兩河幸甚宗社幸甚臣不勝激切屏營待命之至疏入得旨户部知道防緝都門劫盜疏天啓三年宋禎漢臣惟論治者莫不以弭盜綏民為先圖課吏者亦莫不以盜息民安為稱職蓋小盜大盜之積也而劫盜尤煽亂之階也嘗見斬木揭竿弄兵潢池之事率皆繇於胠篋探囊禦人剽貨之徒故在清平之時而防禦捕緝法已不容匆矧今搶攘際乎凡在郡國之間而劫掠相聞漸已不可長矧近在輦轂下乎詎意邇時法度廢弛盜賊縱橫鼠竊狗偷猶不足問鴟張豕突實繁有徒臣前月初入班行聞順天府庫被劫心甚駭之未幾北城復有劫殺一家六命之報益駭聽聞然皆幸而獲不踰時網不甚漏也今月臣奉堂劄接管南城之次日即有正東坊住人王廷勳告于十二月初三日二更時被盜二十餘人劫財傷命又次日據正東坊住人程惟勤告于十一月二十四日夜被强賊二十餘人劫財傷命又據正西坊住人李嘉賓告于十一月初九日夜被劫臣巳批行各該總把勒限嚴緝外因查卷簿則冬季之被劫行緝而未獲者不獨此也在十月二十五日則有崇北坊陸道被劫矣二十六日則有宣北坊陳大被劫矣閏十月二十六日則有宣北坊尹代卿被劫矣是皆劫在黑夜責在捕營各經批行該總把臣陳邦政等嚴緝去後而查無一獲者也王廷勳等三起之未獲尚在一月之內陸道等三起之未獲直踰兩月有餘捕總之職掌何事兵番之分布何為既不能勤巡邏謹鈴柝防之于未失事之先復不能嚴期限密查訪緝之于既失事之後攻剽每月疊見捉獲纍月尚淹則將焉用巡捕員役為哉乃若總把臣尤有可異者在王廷勳之被劫也正其該管地方廷勳當盜至之時潛出奔告于把臣乞其救命把臣直應之曰誰人不有命廷勳因泣訴再三懇即發兵追捉而把臣竟恬然不理夫有地方之責者一聞有急便當不介馬而馳矣豈有求救者號呼于前劫財者狂逞于側而忍于袖手敢于坐視若此此寧獨不知有官守亦豈復有人心者哉隨查夜巡番役每牌鋪額設二十人不為少矣惟是捕官往往剋取常例受賄買放遂令嚴更夜柝寂不聞聲救捍躡追茫不見影而各番役輩捕緝無能乃唆盜扳良指賊行詐種種作姧逞惡平民之被其害間且有甚于盜者法紀敗壞殆盡盜賊安得不橫行也至於督捕郭欽者有提督之任無督率之才既不能弭盜以靖郊圻更何辭癏曠而溺職守臣草疏已畢適見兵部覆疏謂欽精神用之以彌世情不暇用之以詰不軌是該部既知之稔矣兹時何時提督何官彌世情與詰不軌何者為職分所當為豈有明知其不稱而尚可一日容之於其位哉伏乞聖明垂照如果臣言不謬即飭該部將把臣等分别究處用警玩曠仍速推賢能以任提督俾率各捕員役洗心滌慮設法防緝未獲者務緝盡獲無事時恆防有事庶法紀振而盜賊屏跡京畿靖而四方咸安矣疏入得旨這劫盜防緝等事屢旨申飭本內捕官賣放夜巡及番役唆盜扳害尤切近弊著嚴加禁治把臣等分别究處該部知道御選明臣奏議卷三十六
