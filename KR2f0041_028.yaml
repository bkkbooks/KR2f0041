  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_028-1a, image: WYG0445/WYG0445-0393a.png}
body:
  text: 重論復河套疏嘉靖二十六年曾銑臣按鎮撫諸臣勘議復套事宜所見略同然展轉因循之懷間亦不能無也臣奉欽依有參酌之責敢不悉心吐露以為聖明告乎夫河套之復預有天下之大機惟在審天下之大勢以起天下之積痿庶幾文武全功帝王大業可運諸掌矣何謂大勢夫河套者西北之樞全陜之喉吭也三代秦漢並列中原逮我皇明盡入版圖顧承平日久武備寖疏敵因竊據漸致繁衍蓋人畜之孳息者既蕃而虜掠中國男婦又衆以此穹廬四望勢益盛強遂為門庭勍敵貽中國之患出套而東則宣大三關受其害畿甸為之震恐西則甘肅蘭靖䝉其毒洮岷為之戒嚴入套而南則全陜延慶等處無不遭其侵掠舉耳目之所覩記如嘉靖十九等年以迄于今山陜遼薊之間殺掠人畜無慮百數十萬蓋敵處其便中國失其險不有以制之則益啓敵人輕侮之心將來禍患不可勝道周子曰天下勢而已矣極重不可反此憂國者之所當勝也何謂大機夫有非常之材而後能建非常之業敵時剽掠經略未遑不惟狃于治安之可恃抑亦贊襄者之無其人是以敵人猖獗至此今皇上文德武功丕昭無外敬天恤民憂勤不息故嘉納復套之奏即下之臣等具上方略頃者三邊風動我師氣倍而強敵且畏遁矣誠使忠計之臣不懈於內謀勇之將忘身于外復此舊壤以除禍階郡縣其地而守之有方豈止百年無事耶是河套一復非惟廣地實鞏皇圖逺邁百王近配二祖惟聖明有可致之資爾故曰天下之大機夫知其機審其勢亦為之而已矣禦戎之臣猶懷觀望甲可乙否鮮能振勵使臣愚建白之意孤危莫遂遷延不決者夫豈無其故哉良由畏愞之徒嬰痿痺之疾恣智巧之說膠結人心已非一朝一夕雖忠臣義士亦不能不為其所惑此不可以不辨也凡邊方撫輯之事付之于文職戰陳之事付之于武職而又擇大臣以總督之朝廷制敵亦慎重矣奈何將官每出于豢養罔知夫忠義遇賊不戰擁兵自保虛張聲勢欺罔上下惟兾身家之無恙不念宗社之安危父祖子孫由兄傳弟凡在邊官襲此虛套遂使敵勢猖狂無所忌憚而文職諸臣坐守城堡莫辨真僞一唱百和逺邇同聲始則邊徼之飾辭終成朝野之通患遂信以為強敵真不可抗彼此戒懼惟謹備之為尚而猶不能免焉是使中國武勇邈焉無聞士卒見敵不匿則潰此其病痿之原也或曰套地險要固當復也但我兵少又素脆弱終難與敵也夫兵貴精不貴多也中國不患無兵而患不練兵誠使各處巡撫兵備等官于糧餉器甲之具與鼓舞綏緝之方各修其職總副參遊等官于科尅冒占之弊與愛恤操習之規知所戒勉則所在兵可使勇且知向義何敵之不可破哉昔周瑜以三萬之衆破曹瞞百萬之師李靖定襄之捷以三千而破突厥十萬衆寡強弱豈有常形耶惟在善將者馭之而已或曰九邊之守嵗費已極若加復套尤為不資財力殫竭將奈之何夫成大事者不計小費不一勞者不永逸此定理也即以宣大三關言之客兵嵗費百五十萬今事併守然亦嵗常百二十萬直以百年為凖須錢榖萬萬猶未已也若復套之費不過宣大一年之費其屯守修築不過再倍三倍事已集矣套地既復則郡縣其地將來賦稅足供三邊之用地闢民聚有裨中興之大業所謂大事者在此而小費豈足恤哉今臣習夫火攻之法助以槍箭之長攻察地利攻以車陳馬步相兼水陸並進欲進敵莫能禦欲止敵莫能撼內有聨束之堅外無衝突之患加以斥堠嚴明賞罰必信雖三千之士可當敵萬騎兵志善戰者立于不敗之地致人而不致于人庶其近之或曰套誠復矣全陜之地可免敵患敵既無巢侵掠不免獨不多宣大之憂乎此不知中原一體之勢而秦越視天下者之說也夫敵之所以侵軼無忌者為其視中原之無人也若果奮其武勇逐之河外挫衄之餘兌喙自逺其敢以一河之隔而復肆猖獗耶蓋虎豹在山藜藿不採其勢則然況宣大諸邊自有防禦之兵初非掣彼以守此也凡此皆方今之痿漸成大瘇賈誼所謂一脛之大幾如腰一指之大幾如股者正此之類臣恐羣痿弗瘳有誤大計故不敢隱默若此漢有謀臣曰朝錯者議削諸侯地蘇洵曰朝為一身謀則愚而為天下謀則智人君又安可捨天下之謀而用一身之謀哉今曰敵人之強不減于七國而天下之大又用當時之議因循維持直以茍免于身之為幸鮮有不以臣為愚者惟賴聖明辨之于早斷之于獨審其勢運其機以起夫天下之沈痼而已疏入得㫖兵部定了來說議曽銑復河套疏嘉靖二十六年楊守謙臣嘗揣測形勢較量彼已復套之役有六可焉請言其實夫河套延袤二千餘里延寧邊垣已一千五百餘里若因河為固較其長短多五百里比之守墻其易十倍三時務農不煩戍守止須氷合然後防河鑿氷為壕壘氷為垣比之守牆易猶三倍此蘭靖寧夏河曲保德現有恆規一可也敵人曠居野處一帳之外便為敵國我則宵烽晝燧以為守城郭溝池以為固敵馬地凍草枯臕騰以減春時氷解尤甚虺隤我則間廄而居芻豆而牧此天時地利彼短我長若選驍騰之騎簡鋒鋭之卒冬春之際因其近塞遄往速歸襲其營帳掠其牲畜敵必逺徙但數百里內不復敢牧則河套之半已非敵有此近時名將王效梁震屢有成績二可也寧夏一鎮勢據上游利于舟師若採雪山之木下蘭靖之筏大造戰舸嫺習水戰繞出敵後軼其不意破其營帳時走單舠重募死士風雨昏夜炮擊其壘敵益驚擾三可也寧夏地饒利擅渠堰榖粟可儲饋餉之需方船而下沿河而守順流而運不煩車牛其易百倍四可也全陜屯地多極膏腴以屯田之法治之不煩益費卒乘可增花馬定邊地多閒曠以營田之法推之比諸瘠鹵利當以倍平日則併營田之粟儲之寧夏以助軍餉套復則移營田之人耕墾沃壤以實邊堡五可也濟農諸子盤據套內勢雖盛強然敵人之情利在剽掠東馳西擾北攘南侵勢非株守如辛丑壬寅與夫甲辰套內殆空俟其既出縱遺營帳不過一二萬人我以十萬之師水陸並進勢必遁徙但師及河岸分布舟兵截據渡口敵縱糾集部落求逞報復然鞍馬之技難用于洪濤渾脫以浮難當夫戰艋比及河凍諸堡已完如前而守焚爇草萊千里赤地敵望必絶六可也疏入得㫖敵據河套為國家患朕軫懷宵旰有年矣念無任事之臣今曽銑前後所上方略卿等既已看詳便㑹同多官協忠定計來說陳邊務疏嘉靖三十年胡松臣竊惟去秋諳逹掠興嵐即傳箭徴兵尅期深入守臣皆稔聞之而巡撫史道總兵官王陛等備禦無素待其壓境始以求貢上聞又隂致賄遺令勿侵巳分地冀嫁禍他境今山西之禍實大同貽之宜亟置重典以厲諸鎮大同自兵變以來壯士多逃漠北為敵用今宜招使歸有擕畜産器械來者聽其自有更給牛種費優復數年則我捐金十萬可得壯士二萬拊而用之皆徑旅也熟與棄之以資強敵哉大同最敵衝為鎮巡者較諸邊獨難今宜不拘資格精擇其人豐紿祿廩使得收召猛士豢養健丁又分其期非十年不得代彼知不可驟遷必不為茍且旦夕計而邊圉自固又必稍寬文網非大干憲典言官毋得輕效以壞其成功至用間之道兵家所貴今寇諜獲于山西者已數十人他鎮類是故我之虛實彼無不知今宜厚養死士潛縱遣之得間則斬其名王部長及諸用事貴人否亦可覘強弱虛實而隂為備又寇貪而好利我誠不愛金帛東賂黃毛三衛以牽其左西收額布勒遺種豫善地以綴其右使首尾掣曳自相狼顧則我可起承其弊坐收全勝矣疏入帝嘉其忠懇進秩左參政請罷馬市疏嘉靖三十年楊繼盛臣謹奏為乞賜聖斷罷開馬市以全國威以絶邊患事臣以南京吏部驗封清吏司主事考滿到京升臣今職荷䝉皇上養育簡用之恩雖粉骨碎身何以克報況臣官居兵曹職專馬政覩此開馬市之誤豈敢茍避禍患隨衆隱默不言竊惟去年套衆不遵天道大肆猖獗犯我城闕殺我人民虜我妻女焚我廬舍驚我陵寢其辱我中國極矣臣在南都𫝊聞此報冠髮上指肝腸寸裂恨不能身生兩翼飛至都下以勦逆賊以報國讎兹者恭遇皇上赫然震怒選將練兵尅日興師聲罪致討以報百萬赤子之讎以雪城下陵辱之恥不惟天下臣民共相慶幸我列祖在天之靈亦相慶幸多矣及臣至都下見諳逹求開馬市之書大放肆無狀竊意上觸聖怒其征討之志已決其問罪之師斷不可已及廷臣㑹議題奉欽依准暫開行臣不覺仰天大呼喟然長歎曰國事乃至此哉國事乃至此哉夫以漢之武帝唐之太宗不過二霸主耳猶能威震北敵氣壓突厥以皇上之英武國家之全盛英雄豪傑勇夫壯士之伏于草茅下位又不可勝數其蠢兹套衆反不能生擒酋長以勦絶苖裔而乃為此不得巳下䇿之事哉臣請以開馬市之十不可為者為皇上陳之夫開馬市者和議之别名也敵素賓服尚不可言及此去年入犯殺虜如此之慘則神人所共憤不共戴天之深讎矣今不惟不能聲罪復讐而反與之為此和議之事何以上解列祖之怒下舒百姓之恨乎此忘天下之大讎一不可也信者人君之大寶雖匹夫匹婦尚不可少失信義况于天子之尊哉皇上北伐之命屢下臣民所共知四方所共喻者也方今各處兵馬集矣糧草器械備矣天下日夜引領仰望王師之興真若大旱之望雲雨也乃翻然而有開馬市之議則平日之所以選將練兵者為何備糧草精器械者為何不有以孤百姓仰望之心乎此失天下之信義二不可也人君居中制外統馭四夷以其有國威之重以屈服之也今以堂堂天朝之尊而下與諳逹為此交易之事是天壤混淆冠履同器將不取笑于天下後世乎此損國家之威重三不可也天下豪傑聞達衆殺戮人民之慘姦虜婦女之辱其憤恨不平之氣皆欲與逆賊決一死戰雖深山窮谷之隱逸亦願出以復天下之讐今馬市一開則舉相謂曰朝廷忘赤子之讐厭兵甲之用矣將焉用我哉將見在林下者不肯出仕在冊籍者謀去矣異日欲復號召誰肯興起此隳豪傑效用之志四不可也自去嵗大變之後天下頗講武事雖童子儒生亦知習兵此機既動兵將日強今馬市一開則舉相謂曰中國外夷已和天下已無事矣將焉用武哉有邊鎮之責者日弛其封守之防無兵戎之寄者益惰其偷安之氣矣廢弛既久一旦有急何以整頓此懈天下修武之心五不可也宣大人民懷攜二之心久矣一旦雖有外交之事猶畏王法之嚴而不敢自肆也今馬市一開則彼之交通者乃王法所不禁將來勾引之禍可勝言乎此開邊方私通之門六不可也天下人民憚于水旱征役之苦人人有思亂之心特畏國家之兵威而不敢變動也今馬市一開則彼皆以為天下兵弱蠢兹小醜尚不能服羣起為盜又焉能制則將來腹心之變可勝言乎此起百姓不靖之漸七不可也去嵗逹衆深入雖未見一兵交戰然猶以為我軍倉猝未備其疑畏之心尚在也今皇上聲罪致討調兵半年及至于今止為馬市之開則彼得以窺我之虛實矣目中又奚有乎我哉此長北敵輕中國之心八不可也諳逹之性詐變無常謀深計巧反出我之上我將欲以此羈縻乎彼殊不知彼實以此愚弄乎我或遣重臣載金帛至邊等候同市彼違約不來交易未可知也或因交易而即行猖獗撞關而入未可知也或今日交易而明日入冦未可知也或遣衆入境而駕言别部落入犯未可知也或以疲馬而過索重價或因市馬而過討重賞或市馬之後而别有分外不堪之求又未可知也是我不能以羈縻乎彼彼反得以愚弄乎我矣此墮賊人狡詐之計九不可也彼地之産馬有窮中國之生財有限大同之馬市一開宣府延綏等處定不可罷以馬與銀數計之每年市馬約數十萬匹四五年間須得馬數百萬匹每年約用銀數百萬兩四五年間須費銀數千萬兩一旦彼地之馬已盡中國之財告乏將安取乎永久之計將安在乎此中國之財彼地之馬兩難相繼十不可也彼倡為開馬市之議以欺誑皇上者其謬說不過有五有曰外開馬市暫以為羈縻之術內修武備實以為戰守之計耳殊不知馬市之開乃所以羈縻乎我非所以羈縻乎彼也夷性無饜請開馬市之後或别有所請許之再有所請又許之請之不已漸至于甚不堪者一不如意彼即違約則彼之入犯為有名我之不應其所求為失信矣孰謂諳逹無饜之欲可以市馬之小利羈縻之乎如曰欲修武備以圖戰守雖不用此羈縻之術亦可矣此其說之謬一也有曰方今急缺馬用正欲買馬一開馬市則我馬漸多彼馬漸少豈不兩便然市馬非以之耕田駕車也不過為征討計耳如交易果可以無事則市馬又將安用乎不益重其寄養之擾况彼以馬為生又安肯以自乘之良馬而市于我乎不過瘦弱不堪之物不服水草將不日俱斃而已此其說之謬二也有曰初許市馬暫繫乎諳逹之心將來許貢則可為永久之計夫謂之進貢者豈古之所謂咸賓來王者哉不過我賄彼以重利茍免目前之不來彼貪我之重利暫許目前之不入耳况市馬我猶得以少償其費許貢則彼白手來取重利矣是市馬則獲小利而無名開貢則雖有名而費大市馬固不可許貢亦豈可哉此其說之謬三也有曰諳逹最不失信觀其聲言某時搶某處再不愆期可驗彼既許其市後不來則斷保其再不入犯殊不知彼之種類日繁加之以虜掠人口日增其日用之服食器用俱仰給于中國市馬之利焉足以盡供其所費彼非盡皆義士孰肯守小信而甘于凍餒以至于死乎縱使少有羈縻不過暫保一二年無事耳不知二三年之後將何如處哉此其說之謬四也又有曰佳兵不祥不可輕用與其勞師動衆征討于千里之外而勝負難必孰若暫開馬市休兵息民而急修內治之為上乎噫為此說者是損國家之兵威養敵人于日盛壞天下之大事必自此言始矣若曰佳兵不祥則舜之征苖文之遏莒湯之伐葛伯髙宗之伐鬼方豈盡皆不祥者哉蓋春生秋殺之迭行上天生物之道也恩賞兵刑之並用王者御世之權也譬如人身四肢俱皆癰疽毒日內攻乃猶專食膏梁而憚用藥石將不至于傷其元氣乎此其說之謬五也夫此十不可五謬之說明白易知則馬市之開不利于我中國明矣而于敵人則甚利焉蓋數十年來敵以中國之百姓為佃户秋後則入而收其租雖已得計猶有往來奔走之苦日夜殺人之勞也去年入犯莫敢與敵虛實既已覘矣故今請開馬市則可以坐收中國之重利况賊多虜自中國者春時草枯則市之秋後馬肥則入而再虜之及至來春又再市之以輪回之馬獲青蚨之利是昔日彼猶為出門討租之人今日我則為上門納租之户臣言及此其憤恨可勝言哉夫此事利于敵人而不利于中國滿朝臣工皆知其不可然有人敢議而行之無一人敢非而止之者何哉彼議而行之者其意以為征討之事已難收拾敵再入境皇上剛明必追究夫謀國者之不忠專征者之不勇誤事之禍何以能免况前日交通巳有成效莫若委曲姑開馬市猶可二三年茍延日後時事未知如何且暫免目前之禍暫固目前之寵敵縱背約再為脫避之計未晚也然不思皇上所以寵任之專禮遇之厚爵位之重錫豫之隆者蓋欲其主張國是征討敵人也豈徒欲開馬市而已哉其所以不敢非而止之者其意以為事權既不在我時勢已至鶻突有欲謝重擔于人而無由者吾何以冒禍擔當使有所言而馬市罷開弛其防守而敵再深入則必歸咎于止開馬市之人加之以誤國事之罪矣孰若隱默不言大家因循之為上乎然敵人之入與不入不係于馬市之開與不開前此未嘗有議開馬市而止之者去年何以深入此時罷開馬市敵或入境亦與去年同耳止開馬市之人夫豈誤天下之事者哉臣以孤寒進士初入仕途父母早喪妻子無依非不知隱默足以自保言事足以取禍也竊惟皇上初時震怒奮武其氣若此之壯命將征討其志若此之勇則知今日馬市之開乃議者之奸計斷非皇上之本心也以皇上之英武而臣下庸軟避事不足以副之心欲持行而手足痿痺良可深恨此事係國家盛衰之機臣敢豫憂後禍忍心隱默乎伏乞皇上俯察愚臣之罪言回思欲討之初志念敵人之志欲難饜非馬市小利足以繫屬其心祖宗之社稷無疆非二三年茍安無事可以永保其緒收回成命罷開馬市鋭意戎兵決志征討務欲擒諳逹于闕前驅戎馬于海外使彼之畏乎我亦猶我之防乎彼則上而祖宗幸甚下而臣民幸甚謹奏疏入得㫖這事邊臣奏來既久又㑹官集議楊繼盛既有所見何不早言今差官巳行郤乃肆意瀆奏好生阻撓邊機搖惑人心又本內脫一字著錦衣衛拏送鎮撫司打著問了來說災變請黜奸臣疏嘉靖三十二年趙錦臣惟春秋日食三十有六未有無其應者故聖人書之以示災臣謹以天意驗之人事頃者夏言以貪暴之資厠跡禁扉大學士嚴嵩復以奸佞之雄繼登台鼎怙恩寵以張其威權假刑賞以行其愛憎百官懾息諸司望風今夏言雖莫逃于天誅而嵩猶得以播其惡者蓋言剛暴而疏淺其惡為易見嵩柔佞而奸深其惡為難知請舉一二而陛下自察之蓋嵩窺伺逢迎之巧似于忠勤諂諛側媚之態似于恭順引植私人布列要地以探諸臣之動靜則先發以制之故少敗露善以厚賂結交陛下左右親信之人凡陛下起居意向無不先得故多稱㫖陛下見其小有所諍以為非盡從者而不知嵩于不經意之事稍為執論以絶陛下之疑陛下見其外若無與以為非招權者而不知嵩意所欲則脅制諸司題請而莫敢不從或俟聖意所發因而行之以成其私或因事機所㑹從而執之以肆其毒使陛下思之則其端本發于朝廷使天下指之則其事不由于內閣幸而洞察于上聞則諸司代嵩受其罰不幸而遂傳于後世則陛下代嵩任其咎怙寵作威招權納賄嵩與言等而立心之深為術之巧則嵩非言之所能髣佛也嵩粗有文學性亦警敏陛下久加寵任而不疑屢抑人言而不信必以為嵩有可用之賢而關于國家之安危耳然自嵩輔政以來惟恩怨是酬惟貨賄是好政權悉歸于堂握而府部諸司皆不得其職故銓司之黜陟不當而文臣多奔競貪冒之流本兵之用舍失宜而武臣無克敵死綏之志邊臣之功罪不明而戰士解體將士之掊克日衆而卒伍耗弱封襲非賂不行而大典日壞贈諡非賂不得而國是日淆羣臣憚隂中之禍而忠言不敢以上聞四方習貪墨之風而閭閻日見其愁急十數年以來使陛下欲致太平則羣臣不足以承德于左右欲靖外敵則將士不足以禦侮于邊陲財用巳竭而外患未見其稍寧民困已極而內患日虞其將作蓋古者雖中材之主而輔佐得人皆足以致治今憂下憂勤萬幾三十有二年矣而天下之勢其危如此非嵩之奸邪何由以致之臣願陛下念操柄之不可使移思紀綱之不可使亂將嵩早賜罷黜以應天變則天下幸甚疏入帝怒下錦詔獄拷訊斥為民請誅賊臣疏嘉靖三十二年楊繼盛臣謹奏為感激天恩捨身圖報乞賜聖斷早誅奸險巧佞專權賊臣以清朝政以絶邊患事臣前任兵部車駕司員外郎諌阻馬市言不及時本內脫字罪應下獄被逆鸞威屬問官將臣手指拶折脛骨夾出必欲置之于死荷䝉皇上聖恩薄罰降謫不二年間復升今職夫以孤直罪臣不死逆鸞之手已為萬幸而又遷轉如此之速則自今已往之年皆皇上再生之身自今已往之官皆皇上欽賜之職也臣䝉此莫大之恩則凡事有益于國家可以仰報萬一者雖死有所不顧而日夜祗懼思所以捨身圖報之道又未有急于請誅賊臣者也况臣官居兵曹以討賊為職然賊不專于戎敵凡有害于社稷人民者均謂之賊臣觀大學士嚴嵩盜權竊柄誤國殃民其天下之第一大賊乎方今在外之患惟諳逹為急在內之賊惟嚴嵩為最諳逹者邊圉之盜瘡疥之疾也賊嵩者門庭之寇心腹之害也賊有內外攻宜有先後未有內賊不去而可以除外賊者故臣請誅賊嵩當在勦絶諳逹之先且嵩之罪惡貫盈神人共憤徐學詩沈錬王宗茂等嘗劾之矣然止皆言嵩貪汙之小而未嘗發嵩僭竊之罪嵩之奸佞又善為托飾之巧而足以反誣言者之罪皇上之仁恕又兾嵩感容留之恩而圖為改邪歸正之道故嵩猶得竊位至今嵩于此時日夜感恩改過可也豈意懼言者之多而益密其彌縫之計因皇上之留而愈恣其無忌憚之為衆惡俱備四端已絶雖離經畔道取天下後世之唾罵亦有所不顧矣幸賴皇上敬天之誠格于皇天上天恐奸臣害皇上之治而屢示災變以警告去年春雷久不聲占云大臣專政然臣莫大于嵩而專政亦未有過于嵩者去年冬日下有赤色占云下有叛臣夫曰叛者非謀反之謂也凡心不在君而背之者皆謂之叛然則背君之臣又孰有過于嵩乎如各處地震與夫日月交食之變其災皆當應于賊嵩之身者乃日侍于側而不覺上天仁愛警告之心亦恐怠且孤矣不意皇上聰明剛斷乃甘受嵩欺人言既不見信雖上天示警亦不省悟以至于此也臣敢以嵩之專政叛君之十大罪為皇上陳之我太祖高皇帝親見宰相專權之禍遂詔天下罷中書丞相而立五府九卿分理庶政殿閣之臣惟備顧問視制草不得平章國事故載諸祖訓有曰以後子孫作皇帝時臣下有建言設立丞相者本人凌遲全家處死此其為聖子神孫計至深逺也及嵩為輔臣儼然以丞相自居挾皇上之權侵百司之事凡府部每事之題覆其初惟先呈稿而後敢行及今則先靣禀而後敢起稿嵩之直房百官奔走如市府部堂司嵩差人絡繹不絶事無大小惟嵩主張一或少違顯禍立見及至失事又謝罪于人雖以前丞相之專恣未有如斯之甚者是嵩雖無丞相之名而有丞相之權有丞相之權又無丞相之干係以故各官之升遷未及謝恩先拜謝嵩蓋惟知事權出于嵩惟知畏懼奉承于嵩而已此壞祖宗之成法一大罪也權者人君所以統馭天下之具不可一日下移臣下亦不可毫髮僣踰皇上令嵩票本蓋任人圖政之盛心也豈意嵩一有票本之任遂竊威福之權且如皇上用一人嵩即差人先報曰我票本薦之也及皇上黜一人嵩又揚言于衆曰此人不親附于我故票本罷之皇上宥一人嵩即差人先報曰我票本救之也及皇上罰一人嵩又揚言于衆曰此人得罪于我故票本報之凡少有得罪于嵩者雖小心躲避嵩亦尋别本帶出㫖意報復陷害是嵩竊皇上之恩以市已之惠假皇上之罰以彰巳之威所以羣臣感嵩之惠甚于感皇上之恩畏嵩之威甚于畏皇上之罰也用舍賞罰之權既歸于嵩大小臣工又盡附于嵩嵩之心膽將不日大且肆乎臣不意皇上之明斷乃假權于賊手如此也此竊皇上之大權二大罪也善則稱君過則歸已人臣事君之忠也書曰爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德蓋人臣以已之善而歸之于君使天下皆稱頌君之德不敢彰已之能以與君爭功也嵩于皇上行政之善每事必令子世蕃傳于人曰皇上初無此意此事是我議而成之蓋惟恐天下之人不知事權之出于已也及今則將聖諭及嵩所進揭帖刻刋板行為書十冊名曰嘉靖疏議使天下後世皆謂皇上以前所行之善盡出彼之撥置主張皇上若一無所能者大臣善則稱君之忠果若此乎此掩皇上之治功三大罪也皇上令嵩票本蓋君逸臣勞之意嵩乃令子世蕃代票恣父逸子勞之為世蕃郤又約諸乾兒子趙文華等羣㑹票擬結成奸黨亂政滋弊一票屢更數手機密豈不漏泄所以㫖意未上滿朝紛然已先知之及聖㫖既下則與前所講若合符契臣初見嵩時適原任職方司郎中江冕禀事于嵩曰昨御史蔡朴劾守備許實等失事本部覆本已具揭帖與東樓聞東樓巳票送入未知如何東樓者世蕃之别號也嵩云小兒已票罰俸內分兩等甚有分曉皇上定是依擬臣初甚疑及後㫖下果如嵩言即臣所親見一事則其餘可知矣又前經厯沈鍊劾嵩皇上將本下大學士李本票擬本又熟軟庸鄙奔走嵩門下為嵩心腹感嵩之恩又畏嵩之威倉惶落魄莫知所措差人問世蕃如何票世蕃乃同趙文華擬票停當趙文華袖入遞與李本李本抄票封進此人所共知也即劾嵩之本世蕃猶得票擬則其餘又可知矣是嵩既以臣而竊君之權又以子而並巳之權百官孰敢不服天下孰敢不畏故今京師有大丞相小丞相之謡又曰此時父子兩閣老他日一家盡獄囚蓋深恨嵩父子並專權柄故耳此縱奸子之僭竊四大罪也邊事之廢壞皆原于功罪賞罰之不明嵩為輔臣宜明功罪以勵人心可也乃為壟斷之計先自貪冒軍功將令其孫冒功于兩廣故先布置伊表姪歐陽必進為兩廣總督親家平江伯陳圭為兩廣總兵鄉親御史黃如桂為廣東巡按朋奸比黨朦朧凑合先將長孫嚴效忠冒兩廣奏捷功升所鎮撫又冒瓊州一人自斬七首級功造冊繳部效忠告病乃令次孫嚴鵠襲替鵠又告併前效忠七首級功加升錦衣衛千户今任職管事有武選司昃字十九號堂稿可查夫效忠與鵠皆世蕃子也隨任豢養未聞一日離家至軍門乳臭孫童亦豈能一人自斬七首級而假報軍功冒濫錦衣衛官爵以故歐陽必進得升工部尚書陳圭告病回京得掌後府印信黃如桂得驟升太僕寺少卿是嵩既竊皇上爵賞之權以官其子孫又以子孫之故升遷其私黨此俑既作倣效成風蔣應奎等令子冒功打死發遣皆嵩有以倡之也夫均一冒功也在蔣奎奎等貪冒科道則劾之在嵩貪冒人所共知科道乃不敢劾嵩積威足以箝天下之口可知矣此冒朝廷之軍功五大罪也逆賊仇鸞總兵甘肅為事革任嘉靖二十九年張逹等陳亡正諳逹竊伺之時使嵩少有為國家之心選一賢將諳逹聞知豈敢輕犯京師世蕃乃受鸞銀三千兩威逼兵部薦為大將及鸞冒哈丹爾軍功世蕃亦得以此升官廕子嵩父子彼時嘗自誇以為有薦鸞之功矣及鸞權日盛出嵩之上反欺侮于嵩故嵩嘗自嘆以為引虎遺患後又知皇上有疑鸞之心恐其敗露連纍始不相合互相誹謗以泯初黨之迹以眩皇上之明然不知始而逆鸞之所以敢肆者恃有嵩在終而嵩與逆鸞之所以相反者知皇上有疑鸞之心故耳是勾賊背逆者鸞也而受賄引用鸞者則嵩與世蕃也使非嵩與世蕃則鸞安得起用雖有逆謀亦安得施乎進賢受上賞進不肖受顯戮嵩之罪惡又出鸞之上矣此引背逆之奸臣六大罪也嘉靖二十九年敵人犯京深入失律歸路巳絶我軍奮勇正好與之血戰一大機㑹也兵部尚書丁汝䕫問計于嵩嵩宜力主勦戰以伸中國之威以紓皇上之憂可也乃曰京師與邊上不同邊上戰敗猶可掩飾此處戰敗皇上必知莫若按兵不動任賊搶足便自退回以故汝䕫傳令不戰及皇上拏問汝䕫求救于嵩嵩又曰是雖拏問我具揭帖維持可保無事蓋恐汝䕫招出真情故將此言啜哄以安其心汝䕫亦恃嵩平日有回天手段故安心不辨及汝䕫臨刑始知為嵩所誤乃大呼曰嚴嵩誤我矣此人所共知也是汝夔不出戰之故天下皆知為嵩主張特皇上不知之耳此誤國家之軍機七大罪也黜陟者人君之大權非臣下可得專且私也刑部郎中徐學詩以論劾嵩與世蕃革職為民矣嵩乃于嘉靖三十年考察京官之時恐嚇吏部將學詩兄中書舍人徐應豐罷黜荷䝉聖明洞察其奸將應豐留用夫應豐乃皇上供事內廷之臣嵩猶敢肆其報復之私則在內之臣遭其毒手者又何可勝數耶户科都給事中厲汝進以論劾嵩與世蕃降為典史矣嵩于嘉靖二十九年考察外官之時逼嚇吏部將汝進罷黜夫汝進言官也縱言不當皇上既降其官矣其為典史則無過可指也嵩乃以私怨罷黜之則在外之臣被其中傷陷害者又何可勝數耶夫嵩為小人故善人君子多與之相反嵩不惟罷其官又且加之罪不惟罰及一身又且延及子弟以故善類為之一空此時計數正人君子能幾何哉是黜陟之權皇上持之以激厲天下之人心賊嵩竊之以中傷天下之善類此專黜陟之大柄八大罪也嵩既專權則府部之權皆撓于嵩而吏兵二部大利所在尤其所專主者于文武官之遷升不論人之賢否惟論銀之多寡各官之任亦通不以報效皇上為心惟日以納賄賊嵩為事將官既納賄于嵩不得不剝削乎軍士所以軍士多至失所而邊方為甚有司既納賄于嵩不得不濫取于百姓所以百姓多至流離而北方之民為甚一人專權天下受害怨恨滿道含寃無伸人人思亂皆欲食嵩之肉皇上雖屢加撫恤之恩豈足以當嵩殘虐之害若非皇上德澤之深祖宗立法之善天下之激變也久矣軍民之心既怨恨思亂如是臣恐天下之患不在徼外而在域中此失天下之人心九大罪也風俗之隆替係天下之治亂我朝風俗淳厚近古自逆瑾用事始為少變皇上即位以來躬行古道故風俗還古及嵩為輔臣諂諛以欺乎上貪汙以率其下通賄殷勤者雖貪如盜跖而亦薦用奔競疏拙者雖廉如夷齊而亦罷黜一人貪戾天下成風守法度者以為固滯巧彌縫者以為有才勵廉介者以為矯激善奔走者以為練事卑汚成套牢不可破雖英雄豪傑亦入套中從古風俗之壞未有甚于此時者究其本源嵩先好利此天下所以皆尚乎貪嵩先好諛此天下所以皆尚乎諂源之不潔流何以清風俗不正而欲望天下之治得乎此壞天下之風俗十大罪也嵩有十大罪昭人耳目以皇上之聰明固若不知者何哉蓋因皇上待臣下之心出于至誠賊嵩事皇上之奸入于至神以至神之奸而欺至誠之心無怪其墮于術中而不覺也臣再以嵩之五奸言之知皇上之意向者莫過于左右侍從之臣嵩欲託之以伺察聖意故先用寶賄結交情熟于皇上宫中一言一動一起一居雖嬉笑欷噓之聲遊觀宴樂之為無不報嵩知之每報必酬以重賞凡聖意所愛憎舉措嵩皆預知故得以遂逢迎之巧以恱皇上之心皇上見嵩之所言所為盡合聖意蓋先有人以通之也是皇上之左右皆賊嵩之間諜此其奸一也通政司納言之官嵩欲阻塞天下之言路故令乾兒子趙文華為通政使凡奏章到文華必將副本送嵩與世蕃先看三四日後方才進呈本內情節嵩皆預知事少有干于嵩者即先有術以為之彌縫聞御史王宗茂劾嵩之本文華停留五日方上故嵩得以輾轉托飾其惡是皇上之納言乃賊嵩之攔路犬此其奸二也嵩既內外彌縫周密所畏者厰衛衙門緝訪之也嵩則令子世蕃將厰衛官籠絡強迫結為兒女親家夫既與之親雖有忠直之士孰無親戚之情于賊嵩之奸惡又豈忍緝訪發露不然嵩籍江西去京四千餘里乃結親于此勢屬不便欲何為哉不過假婚姻之好以遂其掩飾之計耳皇上試問嵩之諸孫所娶者誰氏之女便可見矣是皇上之爪牙乃賊嵩之瓜葛此其奸三也厰衛既為之親所畏者科道言之也嵩恐其奏劾故于科道之初選非出自門下者不得預中書行人之選知縣推官非通賄門下者不得預行取之列考選之時又擇熟軟圓通出自門下者方補科道茍少有忠鯁節義之氣者必置之部屬南京使知其罪而不得言言之而亦不真既選之後或入拜則留其飲酒或出差則為之餞贐或心有所愛憎則唆之舉劾為嵩使令至五六年無所建白便升京堂方面夫既受嵩之恩又附嵩且有效驗孰肯言彼之過乎其雖有一二感皇上之恩而欲言者又畏同類泄露孤立而不敢言而嵩門下之人每張大嵩之聲勢隂阻其敢諌之氣以故科道諸臣寧忍于負皇上而不敢于忤權臣是皇上之耳目皆賊嵩之奴僕此其奸四也科道雖籠絡停當而部官有如徐學詩之類者亦可懼也嵩又令子世蕃將各部官之有才望者俱網羅門下或援之鄉里或託之親戚或結為兄弟或招為門客凡部中有事欲行者先報世蕃知故嵩得豫為之擺布各官少有怨望者亦先報世蕃知故嵩得豫為之斥逐連絡蟠結深根固蒂合為一黨互相倚附各部堂司太半皆嵩心腹之人皇上自思左右心腹之人果為誰乎此真可為流涕者也是皇上之臣工多賊嵩之心腹此其奸五也夫嵩之十罪賴此五奸以彌縫之識被嵩之五奸則其十罪立見噫嵩握重權諸臣順從固不足怪而大學士徐階負天下之重望荷皇上之知遇宜深抵力排為天下除賊可也乃畏嵩之巧足以肆其謗懼嵩之毒足以害其身寧鬱極終日凡事惟聽命于嵩不敢持正少抗是雖為嵩積威所劫然于皇上亦不可謂之不負也階為次輔畏嵩之威亦不足怪以皇上聰明剛斷雖逆鸞隱惡無不悉知乃一向含容于嵩之顯惡固若不能知亦若不能去蓋不過欲全大臣之體靣姑優容之以待彼之自壞耳然不知國之有嵩猶苖之有莠城之有虎一日在位則為一日之害皇上何不忍割愛一賊臣顧忍百萬蒼生之塗炭乎况邇來疑皇上之見猜已有異離之心志如再賜優容姑待之恩恐致已前丞相之禍天下臣民皆知其萬萬不可也臣前諫阻馬市謫官邊方往返一萬五千餘里道途艱苦妻子流離宗族賤惡家業零落幸復今職方才一月臣雖至愚豈不知與時浮沈可圖報于他日而危危冒險攻難去之臣徒言取禍難成僥幸萬一之功哉顧皇上既以再生之恩賜臣臣安忍不捨再生之身以報皇上况臣狂直之性生于天而不可變忠義之心癢于中而不可忍每恨壞天下之事者惟逆鸞與嵩鸞已殛死獨嵩尚在嵩之奸惡又倍于鸞將來為禍更甚使舍此不言再無可以報皇上者臣如不言又再有誰人敢言乎伏望皇上聽臣之言察嵩之奸羣臣于嵩畏威懷恩固不必問也皇上或問二王令其靣陳嵩惡或詢諸閣臣諭以勿畏嵩威如果的實重則置以專權重罪以正國法輕則諭以致仕歸家以全國體則內賊既去朝政可清矣將見諳逹前既聞逆鸞之死今又聞賊嵩之誅必畏皇上之聖斷知中國之有人將不戰而奪其氣聞風而喪其膽况賊臣既去豪傑必出功賞既明軍威自振如或再冦用間設法決一死戰雖繫諳逹之頸梟濟農之頭臣敢許其特易易耳外賊何憂其不除邊患其憂其不絶乎內賊既去外賊既除其致天下之太平何有故臣欲捨死圖報而必以討賊臣為急也然除外賊者臣等之責而去內賊者則皇上之事臣感皇上知遇之厚不忍負荷皇上再生之恩不能忘感激無地故不避萬死為此具本親齎謹奏疏入得㫖這厮因謫官懷怨托拾浮言恣肆瀆奏本內引二王為詞是何主意著錦衣衛拏送鎮撫司好生打著究問明白來說御選明臣奏議卷二十五
