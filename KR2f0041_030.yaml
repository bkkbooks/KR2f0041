  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_030-1a, image: WYG0445/WYG0445-0432a.png}
body:
  text: 刻縱盜各官議川省善後疏嘉靖四十四年譚綸臣謹奏據成都府申查得仁夀縣堂上櫃内原貯白銀被盜劫去等因臣将該縣知縣周大繡廵捕主簿李萃責令戴罪拏賊所據失事官員通合查參以懲弗恪參照仁夀縣知縣周大繡忝居官長不顧司存銀已在庫而慢蔵典守之心何怠賊得梯城而行刧防禦之術誠疎在平日雖有爱民之心于臨事殊無弭盗之略人贓稍獲遺逸尚多廵捕主簿李萃才本闒茸政亦怠弛伴食縣堂任兵疲而弗練髙卧私室致寇至而罔聞雖在履任之初難逭曠官之咎此二者臣所當提問以為奉職不恪者之戒也布按二司守廵川西二道左參政李尚智僉事呂廕均有地方之責難免疎虞之愆但李尚智則兼攝下川南道廵厯敘瀘未回相應免究呂䕃則承委監督操務彼此顧慮難周相應量行罰治再照四川一省逺在西陲山川險阻甲於天下法網疎闊自昔而然邇年以来在外則諸番跳梁雖屡行撫𠞰而桀驁之態尚轉相效尤而恬不之改在内則武偹廢弛即嚴行督責而文武之屬率視為故事而莫覩其成如臣自入境以来即首視各郡縣城垣要皆單薄無益防禦甚如雲陽等縣之城則倒塌殆盡僅存遺址推之通省大略類是繼之簡閲軍伍尺籍徒存逃亡過半此則天下衛所皆然而四川為甚矣至于民壮則論糧編丁最為近古其在今日可以循名責實轉弱為强惟此而巳奈初意寖失于承平之乆良法盡壊于不才之官有司視役占為當然以選練為長物而先年又以採辦之故工費浩大稍議折徴以濟一時燃眉之急後以民力告困暫行停減因循至今額数皆失而所存無幾又皆白徒市棍遊手逰食責之披堅執銳以待暴客其将能乎故自富順失事之後僅反年餘而越城刧庫已經四起有由然哉又照全蜀四塞之地皆有盗區而永寧播州二司尤為淵藪蓋二司利羣盜之重賂羣盜恃二司為三窟出沒無常緝捕難及非一朝一夕之故故先年議設分守參將一員于永寜宣撫司駐劄兼制播州一帶葢欲其宣布威信鈐轄土夷誠為有見乃今反使羣盜得憑藉諸司以為逋逃之主而莫之誰何則又将焉用彼分守兼制為哉其故蓋起于各官謀身之念太重任事之志弗専徒欲上下雷同遷延歳月僥倖無事以保全其富貴而未知顧名思義原始要終為地方謀為朝廷計耳則亦無惑彼之桀驁愈甚轉相效尤而莫之改也至于參将周表則又有難以偹責而當為之處者蓋制馭土夷之道在我當守其舊章在彼宜責以定分則我既有執詞而彼亦自心服查得本路參将原係分守銅仁後改為思石兼制川湖播州等處向駐貴州石阡府今復改駐播州兼制思石遂使該司上下同辭紛然申擾以為不便臣初嘗切責之比查前此當事諸臣亦累行議處至乆而未決蓋土夷每以激變上囤為言周表亦以孤危難處為慮臣因為之熟計宣慰楊氏之有播州巳数十世所轄八司土夷自常賦之外朝廷未嘗令其妄出一錢而一旦以其素未嘗有之官隨帶三省之兵改駐于其治内供應夫馬不免偏累誠于情有弗堪故其心未帖服而周素此時且不免委曲遷就以計定人心為事不然恐生他故愈益難處而又何暇問其藏汙納垢之事而畢得行吾志哉故臣謂難以一概責偹而又當為之處者此也伏乞敕下該部冄加查議将知縣周大繡等行廵按御史提問僉事呂廕量行罰治左參政李尚智免究仍聽臣嚴督守廵兵偹道等府衛所州縣等官将通省大小城池並行修濬務髙深如法保障有資合用工料從宜措處其原設民壮盡行查復舊額分投訓練務成精兵以偹不虞及通行永寜等處參将安大朝并叙瀘重䕫各兵偹道嚴督播州宣慰楊烈永寧土舍屠效忠等将竄入該司地方有名强盗盡拏獲解臣正法仍禁戢所屬不許再行窝藏其參将周表仍聴該部轉行臣與貴州廵撫都御史從長計議改駐適中地方免使獨累播州一司致生疑畏而文武庻官中之有怠緩不職與土司中之有桀驁弗恭者皆從臣遵照敕諭參拏處治甚則加之以兵如此則守無不固令無不行而區區小冦不足慮矣疏入帝從之選練州縣民壮疏嘉靖四十五年楊博臣竊惟天下州縣選立民壮照依里社以為額数相沿日乆名在實亡毎遇地方有警動稱無兵必須仍復舊制以壮兵威以嚴内治蓋今之郡縣即古之諸侯昔人謂與之土地人民而不與兵是以匹夫而守一州誠為至論尚書馬文升有見于此選設民壮量里社多寡為編次逺慮深謀真得古人寓兵于農之意若使州縣官果能收選得人訓練有法無事可以弹壓姧宄之心有事可以坐收擒𠞰之效邇年以来寖失原意或以之調防邉塞或以之抽補軍役徒有民壮之名未見兵勇之實即如近日四川南直𨽻妖宼之變守土官員束手無策誠為後車之鑒應即行南北直隸并十三省廵撫都御史轉行兵偹守廵該道着各府州縣掌印官照依曩年事例即查本州縣原額守城民壮若干現在若干逃亡未補若干中間守邉抽軍各若干即今應該作何處置或将本處現有快手機兵等項改補止要查復原額之数不必多増一人以致勞民傷財編列隊伍毎五十人為一隊設隊長一名一百五十人為一總設總管一名更查空閒官地一區立為民壮校場春夏秋三季月操六至冬操三歇三務使武藝精熟噐械修整如遇草冦生發即便督率勦捕有兵偹官處聴兵偹官無兵偹官處聴守廵該道官不時教閲撫按官廵閲同衛所官軍一體操練如果人强藝精卓有成效許其特為奏薦重加奨賞怠玩廢弛者指名參究一整飭間既無増餉之勞立見足兵之利矣疏入帝從之諫修齋建醮疏嘉靖四十五年海瑞臣聞君者天下臣民萬物之主也其任至重欲稱其任亦惟以責寄臣工使盡言而巳臣請披瀝肝胆為陛下陳之昔漢文帝賢主也賈誼猶痛哭流涕而言非苛責也以文帝性仁而近柔雖有及民之美将不免于怠廢此誼所大慮也陛下天資英斷過漢文逺甚然文帝能充其仁恕之性節用愛人使天下貫朽粟陳幾致刑措陛下則鋭精未乆妄念牽之反剛明之質而誤用之至謂遐舉可得一意修真竭民脂膏濫興土木二十餘年不視朝法紀弛矣数年以来推廣事例名噐濫矣二王不相見人以為薄于父子以猜疑誹謗戮辱臣下人以為薄于君臣樂西苑而不返人以為薄于夫婦吏貪官横民不聊生水旱無時盜賊滋熾陛下試思今日天下為何如乎邇者嚴嵩罷相世蕃極刑一時差快人意然嵩罷之後猶嵩未相之前而巳世非甚清明也臣竊謂陛下不及漢文帝逺甚古者人君有過頼臣工匡弼今乃修齋建醮相率進香仙桃天藥同辭表賀建宫築室則将作力竭經營購香市寳則度支差求四出陛下誤舉之而諸臣誤順之無一人肯為陛下正言者䛕之甚也然媿心餒氣退有後言欺君之罪何如夫天下者陛下之家人未有不顧其家者内外臣工皆所以奠陛下之家而磐石之者也一意修真是陛下之心惑過于苛斷是陛下之情偏而謂陛下不顧其家人情乎諸臣徇私廢公得一官多以欺敗多以不事事敗實有不足當陛下意者其不然者君心臣心偶不相值也而遂謂陛下厭薄臣工是以拒諫執一二之不當疑千百之皆然陷陛下于過舉而恬不知怪諸臣之罪大矣記曰上人疑則百姓惑下難知則君長勞此之謂也且陛下之誤其大端在于齋醮齋醮所以求長生也自古聖賢垂訓修身立命曰順受其正矣未聞有所謂長生之術堯舜禹湯文武聖之盛也未能乆世下之亦未見方外士自漢唐宋至今存者陛下受術于陶仲文以師稱之仲文則既死矣彼不長生而陛下何獨求之至于仙桃天藥怪妄尤甚昔宋真宗得天書于乾祐山孫奭曰天何言哉豈有書也桃必採而後得藥必製而後成今無故獲此二物是有足而行耶曰天賜者有手執而付之耶此左右姧人造為妄誕以欺陛下而陛下誤信之以為實然過矣陛下又将謂懸刑賞以督責臣下則分理有人天下無不可治而修真為無害乎太甲曰有言逆于汝心必求諸道有言遜于汝志必求諸非道用人而必欲其惟言莫違此陛下之計左也即觀嚴嵩有一不順陛下者乎昔為同心今為戮首矣梁材守道守官陛下以為逆者也厯任有聲官戸部者至今首稱之然諸臣寧為嵩之順不為材之逆得非有以窺陛下之微而潜為趨避乎即陛下亦何利于是陛下誠知齋醮無益一旦翻然悔悟日御正朝與宰相侍從言官講求天下利害洗数十年之積誤置身于堯舜禹湯文武之間使諸臣亦得自洗数十年阿君之恥置其身于臯䕫伊傅之列天下何憂不治萬事何憂不理此在陛下一振作間而已釋此不為而切切于輕舉度世敝精勞神以求之于繫風捕影茫然不可知之域臣見勞苦終身而終于無所成也今大臣持禄而好䛕小臣畏罪而結舌臣不勝憤恨是以冐死願盡區區惟陛下垂聴焉疏入逮下詔獄條陳薊鎮未盡事宜疏隆慶元年譚綸臣謹奏臣㑹同廵撫順天都御史劉應節議照薊昌為九邉苐一重鎮自有邉患以来前後督臣之所經畫大小羣工之所建明與本兵二次集議其防守事宜可謂至精至宻無遺䇿矣當事諸臣信如兵科給事中張鹵議悉能以實心行之又何兵有弗精守有弗固而邉患有足虞乎而臣等復不能無言者蓋涓埃之細亦愚者千慮之一得耳謹冐昧列欵以聞伏望敕下該部再加看詳如果言不渉迂擬議上請俯賜施行其于秋防火計亦庻乎有小補矣計開一曰議應援臣等竊惟薊鎮之邉天險足恃㨿險以守本無足虞而前此往往為敵所乗如入無人之境蓋徒知以守為守之當事而不知以戰為守之得䇿耳臣前議練兵三萬列為三營分任責戰庻幾以戰為守一大應援之兵矣然以臣所總督薊遼二千餘里之邉専三萬應援之衆合之雖若有餘分之則秪見不足且我方明于所往彼巳決于聚攻自非就近設有援兵一枝與之相持相戰則擺守之兵未有不敗事者為今之計合于十路主客官兵之中各選精鋭三千人毎五百人定把總一員領之謂之一司毎二司定千總一員領之謂之一部毎三部定參遊一員領之謂之一哨無事則免其做工常行訓練遇警則視其所攻往来截殺無論大舉深入務與主兵併力拒守以待大援之至如大援已至而失守則失守之罪當以大援為首而本路援守官軍應從次論若大援奉調計其時日地里逗遛不進以至失守則本路與大援各任逗遛失守之罪若大援奉調計其時日地里尚未能至而先失守則本路獨任失守之罪如敵犯别路本路確然無警則此援兵三千亦聴臣隨宜調撥如此則随處有援人心知警而戰守為有頼矣伏乞聖裁二曰明節制臣等聞之有制之兵無能之将不可敗也無制之兵有能之将不可勝也夫将為三軍司命而勝敗之機乃係于兵之有制無制何也蓋有制則上下之利害皆切于身而其心不得不與之共死無制則秦越之肥瘠無預于已各計謀生故臣嘗謂節制之節即竹節之節節節而制之則将如身之使臂臂之使指無不如意否則在上者既無所責成因得以遂其推諉之姧在下者漫無所闗繫往往視棄其主将如弁髦而莫之顧焉此不特士卒之于偏裨偏裨之于主帥為然即于督撫亦莫不然者矣故領兵裨将居常毎對人言曰何必自苦遇有事来我尚隔著幾輩拚一充軍無不了者是在偏裨且爾又况其下者乎此皆莭制之法未講耳臣等謂宜請從鎮守總兵官而下豫為部署如總兵則謂之一鎮總兵之下有參遊其所領則為之一路一哨參遊而下有千總其所領則謂之一部千總而下有把總其所領則謂之一司把總而下有百總其所領則謂之一局百總而下有旗總其所領則謂之一宗旗總而下有隊總其所領則謂之一隊凡臨陣戰守之事在一鎮則責成總兵一路一哨則責成參遊一部則責成千總一司則責成把總一局則責成百總一宗則責成旗總一隊則責成隊長但有觀望退縮皆得以軍法論罪至于蹶一總兵則以所部下參遊蹶一參遊則以所部下千總蹶一千總則以所部下把總蹶一把總則以所部下百總蹶一百總則以所部下旗總蹶一旗總則以所部下隊長蹶一隊長則以所部下兵士皆斬弗宥是語責成則自大而小凡為之主将者不得不致其忠論失事則自小而大凡為之偏禆士卒者不得不䕶其将合千萬人之心以為一人之心此則所謂節制之法故雖主之以無能之将亦不可敗昔臣在東南治兵大率用此故能轉弱為强今邉塞之軍令不行已乆臣等竊謂偹邉之䇿盖莫有急于此者所謂先自治而後治人者也今不講自法之法而惟紛紜以偹邉為言真空言無補耳伏乞聖裁三曰議功賞凡論功行賞視首級之多寡以為殿最此若可以為據矣然臣以為諭小敵則可若遇大敵則當先破敵者勢難取功奪首級者未必殺賊此不惟功賞不明人心解體往往又因爭首級馴至誤事故臣等謂宜于臨事之際以宻雲等三大營之兵豫分為三大枝専偹衝鋒破敵而于各路調到之兵分配于三大枝之後以為應援或遼東或宣府入援之兵則張布兩翼或資之夾擊或聴其出奇仍各将其兵編為三人一伍三伍一隊三隊一宗三宗一局三局一司三司一部三部一哨毎伍以二人殺敵一人取首一首止許同伍三人共之越三人者不許作功其先為某枝銃箭所傷者則以歸之本銃枝箭之兵用槍棒者不預焉至于各枝齊發致敵隊崖塹死者則聴主将于事定之後總取其首合而分之大率以十分為率衝鋒破敵夾攻出奇者各得其三應援之兵共分其四臨陣斬獲之功願紀録者以親斬論隊崖之功主将許論部功士卒給賞而巳如此則軍無爭功朝無僣賞其得之不以為倖而賞之足以勸矣夫賞當其功固為公平之道而賞不踰時又為激勸之機今之功賞往往踰年而不決至使獲功之人有不以功為功而反以為累之歎豈所以致人盡死力哉葢縁随軍無紀功之人日乆成腐爛之物以致真偽難明因而持疑莫決也謂宜于秋防之時聴各廵按廵闗御史㑹委老成練逹推官二員與之随營經察凡遇各枝官軍所獲功次當即得赴紀功委官處登時紀騐准與作功者即給與闗防小票為照其首級仍與標紀明白别與差人轉解紀功御史覆驗無異仍給印信小票為照其各委官先給之票追回不用仍即具奏陞賞則衆皆競勸人樂捐生而膚功為有待矣伏乞聖裁四曰議修守查得防邉集議明戰守一欵内云将諸鎮人衛客兵専責之戰守本鎮主兵専責之修邉是徒知主将之弱而不知主兵之中亦有強者也徒知客兵之强而不知客兵今日之弱非盡可恃也為今之計謂宜于十路主客之中選其強而可以戰者三千人就中慎擇一參将領之如臣等前議免其做工貴之常行訓練以為就近應援之兵其餘不論主客仍盡責之以修守之事庻幾無藉其戰猶資其守不然二事俱廢則又焉用彼入衛為哉伏乞聖裁五曰革冒濫夫三軍之士賈勇直前凡以為功也有功而賞之後期人心且解體矣况奪之功乎臣等竊聞塞上夙弊凡軍士之功将官家下輙得攘之矣将官輙又攘之矣總督鎮廵中軍旗牌聴用等官輙又攘之矣四方鑚刺報工之人輙又攘之矣是戰士出百死一生而得之而輙見攘于将官與将官加丁之手巳甚不堪而未操寸刄罔發一矢者亦得以奪其血戰之功以為功則誰復肯致死而用命哉臣等謂冒濫之弊所當嚴為禁之也伏乞聖裁六曰禁虚詐竊惟春秋両防大小文武功罪必從臣等與之叙論上之朝廷下之本兵復下之廵按御史以覈實之然後殿最請行誅賞可謂至公至明至精至宻且無倖功茍免之弊乃各大小将官不修實事専尚虚詐厚養刀筆之徒置之帷幄之中廣為辯舌之士布之輦轂之下毎當有事之秋即豫為活套揑冩虚文如見敵輙奔則云如何而拒敵未見風塵則云如何而轉戰觀望不前者輙敢以陷陣自名摧鋒破敵者反或以退縮見訾敵未退而先報出境本有罪而肆言有功中外交搆遐邇播揚能使聞者聳聴見者色喜因而顛倒是非變亂墨白甚至冒犯交結之條甘蹈欺罔之罪徒取便于身圖不顧觸乎法網比比皆然此而不禁相率為偽尚安望其盡忠耶臣謂宜請下該部毎于邉塞有事之時行令五城兵馬差人于東西長安門外與兵部都察院門首往来廵察但有在彼髙談浪議邉将功次即係前項辯舌棍徒許便拿赴所司嚴加考訊坐以潜住京師窺探為姧之條其逓送各衙門報功報事掲帖亦宜連人送赴廵按廵闗御史與之從公查覈如所報是實情尚可原若事涉虚誣即從重參究并根治秉筆之人如此則詐偽息而聞見不淆公論定而人心自奮矣伏乞聖裁七曰廣利噐竊惟中國之長技莫踰于火噐而火噐之利又莫踰于佛郎機但其制必用銅其次用鐡銅之巨者毎具計費二十金次亦不下十五金鐡之巨者毎具計費八九金次亦不下五六金㸃放不得其宜易破破必傷人更制則其費又半之以故不能多具具亦不敢輕用臣在南方見木佛郎機之法因教武生有舒明臣造而試之其利與銅佛郎機同連發七八銃又不破壊破壊亦不傷人法用堅木為體長七尺圍一尺四寸中空一寸外来以鐡篐六道計其工費共用銀三錢三分壊則止易其木而鐡箍則長存費省而用巨莫有善于此者臣謂宜請乞敕下工部支銀一萬一千両前來分發薊昌二鎮十一路參将分投照式制造三萬三千架分布各緊要闗口以備戰守之用且㸃放則人皆可能輕便而運動復易壊則責令該路取木易之再壊再易不必再給之費以現在之兵各兼守一銃計一路増銃三千架猶如増兵三千名由是推之郡縣推之營堡制而用之為利甚博是亦禦敵之一䇿也伏乞聖裁疏入帝從之應詔陳言疏隆慶二年王世貞臣伏覩隆慶二年三月詔書内開朝政得失許諸人直言無隠竊惟皇上秉聖睿之姿當鼎革之際委用良佐詢召耆碩挽國是于将非收人心于既渙大法小亷朝野寧謐而又霈然下德音求讜論此誠古帝王之盛典臣向隅餘生猥伏草野過䝉湔拔復領事寄而夙遘疾厲委頓不前長負生成銜恩邱壑苟有一得敢爱其愚伏惟明主不遺芻蕘之微小臣遂忘尸祝之戒謹列為八事上請倘以為可採俯賜納用臣愚雖死之日猶生之年不勝懇切願望之至一法祖宗以宏聖徳臣竊惟我祖宗功莫盛于太祖髙皇帝徳莫盛于孝宗敬皇帝髙皇帝業由開創政多更始臣愚不敢妄瀆至于孝宗皇帝承列聖之貽範而丕顯之深仁厚澤淪浹民志迨于今過一甲子而謳謡之不衰臣不侫請舉其一二以告孝宗皇帝簡素恬穆後宫無偏私聲豔之寵節儉敦謹後乘無狗馬趫肥之嗜御極十八年貢獻裁損殆盡行幸稀簡昧爽視朝退御經筵咨詢治道暇則召大學士劉健李東陽謝遷尚書劉大夏都御史戴珊等相與講析政要較求畫一以故聖聰日啟萬幾益練少詹事王鏊嘗講文王不敢盤于逰田章有所指摘退朝即召中人李廣戒朂之曰今日講臣言殆為汝等宜自省勿貽後悔學士張元禎上太極圖説亟讀之且讀且嘆曰天生斯人以開朕也中人為皇后治袍請開廣東珠池特命内庫擇蔵珠為之而以責中人曰若不過欲自得珠不思困吾赤子耶員外郎李夢陽上疏忤㫖左右請加杖責不許曰若輩欲快吾一時不過成吾殺諫臣名耳凡九卿大臣不輕更易其年至致仕者晋階賜金續以輿廪偶遇糾弹即為温慰聴自陳乞休以故當時大臣寅㳟循法無自私求避之意言官精白靖獻戒憸訐刻覈之風宮府一體朝野敉寧即詩書所稱曷以加焉臣願我皇上深維而憲述之或命輔臣紬繹金匱之秘于孝宗皇帝聖政録成一編朝夕呈覽以為聖徳之助天下幸甚一正殿名以尊治體臣竊惟太祖髙皇帝登極之後名其大朝門曰奉天門殿曰奉天殿以至詔赦誥敕俱以奉天冠之明人主不敢以一人肆于民上無所往而非奉天也革除年中悉更諸門殿名成祖靖難之初明舉其罪布告天下永復太祖之舊先帝偶創鬱攸暫新耳目未幾晏駕御史往有所陳皇上不忍遽易臣竊惟圖治在乎法祖大孝貴乎成親皇上為上帝元子可一日而不奉繼太祖大業可一日而遽忘伏望霈發明詔于大朝門殿仍奉天故號以照象魏之重或以華葢謹身二殿左右各門存皇極殿等名以慰羔牆之思實為便當一酌恩義以處宗室臣于嘉靖二十九年遇故修玉牒臣云自親王而下至庻人巳書名者幾三萬位又二十年矣可得五萬位周府巳近四千位韓府亦千餘位雖竭天下之財力恐不足以供其源源之産往者聞禮部㑹議裁省經制臣愚越在草莽不能盡識竊以為國家待宗室之意徃往傷于用恩其待宗室之法往往傷于用義夫族屬至于奉國将軍亦可巳矣又復推而三其中尉以至世世不絶所謂傷于用恩者也雖其疎者皆髙帝及列聖後也無罪而困之于一城而絶其仕進之路所謂傷于用義者也伏望皇上下禮部及府部大臣㑹議于奉國将軍諸子俱聴免其禄秩分居附近州縣廢箸之日仍照㑹典事例給與房價量復徭役終身使得畢力農賈其有志科目者照常肄學應試聴為南京及司府州縣等官一應宗室年至五十量與本等服色冠帶其周韓二府郡王至奉國将軍改封雲南廣西四川福建地方量給路費行糧庻幾少甦中土之民且獲安天族之養再照各宗居命名俱限金木水火土字様以至重複互犯創造生澀自今而後係中尉以下止從上字定名其下不拘何字非惟可免重複創造之苦抑亦少寓親疎之别或謂事體重大或謂闗繋典章臣竊以為及今不處十年之後将有不勝其弊者矣易窮則變變則通通則乆伏惟皇上鋭然行之一寛禁例以求才哲竊惟王府親戚不得為京朝官原非祖宗甲令只是宣徳年中秦府永興王欲以女妻通政使李錫子詔謂鍚現居喉舌之地不許𢎞治中吏部尚書屠滽與大理少卿王輔有隙以輔係王親創為此例出輔參政鬰邑以歿夫屠滽修區區之小忿而使國家負猜疑宗室之咎狹賢才進用之途臣以為滽非純臣也大學士楊一清先後建言頗有次第而新貴人張桂等謂一清有所援引用浮言沮之迄今未復天潢流派繩繩無已屬在國親其麗不億即有奇謀碩畫不得預廟廊之議干城腹心不得膺保障之託以皇上之側席思治求士草野而顧乃畫才于聖世甚無謂也且今宗藩之最鉅者不過以財自娱如江南一富室而巳豈有鈎結黨與為國家憂如梁孝燕剌者乎伏乞下臣所言于吏部今後凡係王國親屬一體照常陞用京職毋得壅閼庻幾國家宏蕩蕩平平之政宗室無戚戚具爾之歎矣一修典章以昭國紀臣竊惟大明㑹典一書實我祖宗經世大法百司庻僚奉而行之可以𫝊示永永而時涉變通事多損益先該嘉靖二十九年間修完進呈不知何縁廢閣然自三十年以後隆慶二年以前中間典儀之更革兵制之裁定財武之出納又有不容于不修者臣愚欲命内閣輔臣作速更定進御頒行至于法司上慴天威下媚政府以意為師顛倒三尺或疏辭引二王而比以詐𫝊令㫖或出題渉風諌而比以子罵父或奉㫖延遲而比以棄毁詔書或奏事欠實而比以衝突儀仗舞文弄法不可枚舉亦宜明㫖禁革著之㑹典中永以為戒臣又惟太祖實録洪武三十一年止中間至永樂元年尚有闕漏未載夫漢不以吕氏而廢本紀唐不以武氏而廢實録何者明天下不可一日無史也臣愚欲下内閣諸耆碩臣攷究革除年間事跡别為一書附之國史之末其侍講方孝孺尚書鐡鉉殞身滅族以衛社禝宜鑒其吠堯之忠賜以易名之典他若尚書齊㤗等亦要明著功罪以示勸懲其于國家治體闗係非細一推徳意以昭大勸前奉隆慶元年詔書旌録言事及查舉先朝大臣䘏典海内士大夫欣然加額思奮其忠方以為國家風厲一世之典無或過于此或有事渉遐逺或扵格小有未合者臣請罄其一得以偹裁擇髙皇帝時開國諸公侯自中山開平岐陽諸王外功莫大于韓國公李善長潁國公傅友徳宋國公馮勝徳慶候廖永忠善長籌帳轉餉之功不下干鄼留中間以嫌疑獲罪王國用辨之甚詳友徳等戡定蕩闢之績逺過于綘灌卒老牖下而時屬劻勸未䝉易名之典文皇帝北伐時失律者主帥邱福耳而同安候火眞等罵賊力戰以死其忠節皦皦著實録中臣以為此諸臣者宜優加贈諡者也徴士吴與弼刻行追古力辭宮秩其髙風足以亷頑而起懦翰林檢討陳獻章潜心聖𫝊化行里閈其緒言足以繼往而開来副使李夢陽何景明再上讜言力持權豎氣莭足以彰明國是文章足以潤色皇猷臣以為数臣者宜特襃以諡者也故給事中陸粲吏部郎中薛蕙一則上言典禮一則糾論權姧相繼調罷中間粲嘗量移邑令蕙則引疾乞休以故于例小有不合然其直莭媺行何可遺也臣以為此二臣者宜量予以贈者也夫旌及于逺則潜徳者思奮旌逮于下則位卑者勉修一舉而勵世之善備焉矣一昭爵賞以徠異勲臣見先帝時復開國六王之後俱為列侯所以張大國恩率厲士氣至隆厚也今宼無嵗不犯邉國家之財用少絀謂宜提空名以鼓舞之而上不為異格以待下下不為異勲以報上斤斤守刓印之故規而欲責人以撻代之奇烈臣以為萬無是理且王守仁在武廟時提烏合一旅生縳逆濠致之闕下而區區伯爵始見格于悍宰今復沮于多言夫書生不諳故典謂伯爵為至重不知今世世稱伯者不下数十人曷不取其祖宗時鐡劵校之其功不過下一城破一軍而止有能如王守仁者乎皇上幸下臣言吏兵二部㑹議若守仁者予之世封其髙皇帝功臣如前所舉宋國公馮勝潁國公傅友徳徳慶候廖永忠亦宜幷下所司講求所以中廢之故取其嫡系量復封爵明告天下有能犁庭掃穴大者公小者伯世世勿奪数年之間能無長平冠軍出而應召者乎一練兵實以重根本臣見節年防秋延綏固原将士萬里入衛日漸减耗為之痛心而太倉嵗漕四百萬石以養疲癃無用之士為之扼腕且京師與薊邉呼吸相應臂指互使其勢與他鎮不同臣愚欲望皇上敕下兵部分委御史等官于陜西各邉不分軍丁舍餘精選五千餘名宣大遼東精選三千餘名以為騎士山東河南山西北直𨽻等處精選三千餘名浙江義烏等處精選二千餘名両廣楚蜀土兵精選二千餘名以為歩兵仍于團練錦衣衛各軍官旗校精選一萬五千餘名合三萬人分為二營另委名将如戚繼光馬芳者統之明詔内所舉廢棄大小將官曽經戰陣者各任偏禆分領各哨日逐演練嚴其賞罸一遇聲息令其恊助冀遼總督戰守其陜西毎嵗入衛官兵俱從停免仍委嚴明給事御史将京營京衛大小官軍悉心清查其老弱者黜退現缺者停補至于錦衣一衛宂食尤多尤宜酌量裁革嵗可得漕米三四十萬石以養此一萬五千之精兵不惟薊鎮緩急有賴而國家隠然得居重馭輕之意昔周世宗宋藝祖嘗行此法兵以寖强戰無不勝者也臣愚不勝惓惓之至疏入帝不納御選明臣奏議巻二十七
