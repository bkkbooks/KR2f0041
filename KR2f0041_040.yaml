  text: 欽定四庫全書御選明臣奏議卷三十七
  hash: sha256:fd2cd2704ebe98e4195503f02f5ab91889cf8eed8bac636deb4a2ee77fa21e5b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_040-1a, image: WYG0445/WYG0445-0621a.png}
body:
  text: 藺地善後機宜疏天啓四年朱燮元臣謹題為恭報藺地情形與善後機宜仰祈聖裁以期安攘事先是臣切責五路將吏逼進龍場擒酋掃穴又慮酋黨懼死負固多方曉諭令其遵㫖擒酋建功贖罪去後隨據各路道將塘報官兵大至龍場齊入得功有差降將胡世孝王繼宗等奉諭擒獲僞都督李逺達蔡金貴及奢崇明妻安氏等臣恐元凶未得老師匱財於是親抵戎行申嚴賞罰道經大洲江門永安永寧與詢問古藺落紅大壩新寨太平瀘衛一帶皆膏腴地也衛雖隸黔土實在蜀今二酋造逆奉㫖征討臣與按臣并道將文武不惜軀命聚五路之師費三年之力以有今日雖二逆逃奔境外尚未獻俘而藺州疆土業已廓清矣蜀自遵義郡縣以來不以得土為利翻以養兵為纍故談及改流輒多蹙額但二酋造逆滔天連年血戰僅而得之即欲仍置宣撫將與之誰人乎况永寧一塊土西自建武東至遵義三面而環之賊欲動則無處不可䦨出而我設防則二千里之遙最難照應譬如人腹心肘腋之間去一虎可復進一狼乎當聖祖時天造草昧西南苗無不畏法故特就中設建衛所以通血脉徒用牙錯之義殊少彈壓之威侵尋至於二逆肆惡橫行已無天日在蜀以為土司而寬其文網在黔以為鄰苗而置之不較隂謀既久一旦驟發殺官戮民不啻刈草此亘古未有之變也尚可因循茍且不為長久計哉以臣之愚參之衆論咸謂當以赤水河為界自河以東龍場一帶悉以與黔自河以西由赤水至永寧悉以還蜀就永寧城中設立道府與遵義建武互相掎角則呼吸相應聲勢聨絡用以彈壓諸苗保護內地計無善於此者若黔省以為祖制不肯更張則照黎平鎮逺之例蜀自郡縣黔仍衛所雖曰駢枝亦無不可臣不敢侈開疆之名以滋多事但審地勢參人情似不得不出於此惟聽廟堂之公議皇上之酌裁耳至於二酋業已無黨無家入險逺遁或旦暮擒縛或遲以歲月通未可知惟黔蜀脣齒利害相依屢據該省撫臣移㑹應援臣巳發參將林兆鼎提兵一萬殺衝羿子猓玀等關直入大方該撫臣即留合營兵又行令總鎮李維新搜箐事畢再發重兵應援外獨是蜀連年用兵公私俱匱庫藏括而又括錢糧借而又借小民之仳􅍣未復膏血盡罄不戢自焚最為可慮臣憂心如惔不能朝夕疆土既清蚤宜確議一面設法將各兵漸撤以省民力臣謹㑹同巡按四川監察御史溫臯謨合詞上請伏乞皇上俯賜裁定敕部院㑹集九卿科道從長確議覆請轉行臣等次第料理奏報庶西南苗羿之地奠安於萬萬年矣為此具本謹題請㫖疏入帝從之地震陳言疏天啓四年畢自嚴臣惟春秋地震必書誠重其事也微臣觸目隂陽之舛戾因縱觀時事之艱危豈容無說以處此東則製械造車􅍀然思逞西則陽順隂逆狡焉難慿則可虞在邉境遼餉加派在官雖徵其所不得不徵在民實應其所必不能應則可虞在窮民左藏空匱而沿邉之兵餉不能時給即最急如榆關亦以海運暫停轉輸靡繼每懼裸體脫巾之呼或出風餐露宿之旅則可虞在卒伍軍興方殷飛芻挽粟固不容已然瀚海風濤而長年三老每葬身魚腹之中即竭蹶芻牧而重趼繭足多困踣輪蹄之下誰非赤子而茹苦至此極也則可虞又在運務凡此皆足兆異皆足鬱和臣自嚴濫竽督餉承乏撫方值災異之洊臻思奉職之無狀所當痛自修省不遑寧處者也夫災異之來天所以震懾人君而亦所以仁愛人君也人君應之以實則震懾實為休祥酬之以文則仁愛終為譴責故天之鑒下也洞見於幾微而君之回天也轉移於呼吸即今似有不容不亟為修省者如煌煌綸綍間由中㫖之傳宣致令輔弼不得關其事萬舉萬當而一誤則救藥靡施將無啓煬竈而滋猜嫌乎是內批當慎也如瑣瑣婦寺渥承延世之寵光致令樞管不能守其法作威作福而一輕則勞臣解體將無嗟濫觴而叢指摘乎是恩澤宜節也乾坤之生才有限乃以骨鯁之大僚而一言擯斥以道學之名儒而投老巖穴以批鱗之直臣而長伏草莽棄騏驥於伏櫪舍楩梓於斷溝將無失算乎是人才宜惜也金吾之鞬櫜總屬朝家之扈蹕羽林之貔虎孰非王國之爪牙顧寄兵柄於貂璫幾同伏戎於肘腋既糜大內之金錢且胎他日之隱禍將無非計乎是內操宜罷也以上四者均足為聖德之虧損也伏望皇上亟圖修省次弟舉行庶幾人心悅而天意得隂陽和而災變消矣疏入帝不納地震頻仍疏天啓四年畢自嚴臣竊惟有災異則有感召有感召則有事應今瀛津數百里及沿海一帶皆臣統轄轉輸之地則皆臣罪戾之所感召也請詳言之津海國也蛟宫蜃窟人所為望洋卻步者也今樓櫓涵天艅艎銜尾日驅一方民命以擲於驚濤怒颶之中此其地利安乎否也津餉皆新餉也海內所為竭澤而漁者也左輸關右輸鮮梯航無已耗敝中原此其民情安乎否也津兵皆新兵也所為備神京山海後徑之用者也年來調東兖調薊門調關門足不停而席不暖弱者踣於路强者竄於途今日壁壘幾空猝有緩急將何以應此其兵力安乎否也津海地利兵民無一得安其常而謂坤輿職載獨能循其寧靜之體乎邇者風霾屢作雨澤愆期皇上方下明詔與大小臣工共圖挽回而地震又見告矣以宅中定鼎之區而􅊒􅊒搖動是豈可以修省之空言而回既怒之天心乎則臣願以修德之說進兢業常存而佚遊宜戒也儉德維圖而賞賚宜節也啓沃當遜而召對宜舉也以至深宫燕處培養無疆之祉尤不可不慎也凡此皆修德之屬也臣又願以修政之說進東事方熾而邉防無使弛也蓮妖已平而蚩愚無使擾也遼民久困而反側無使驚也以至採納忠諫慰答寰宇之望尤不可不早也凡此皆修政之屬也誠使德政交修法成湯之自責則天不能為災地不能為異而皇圖愈為鞏固矣疏入帝不納劾魏忠賢二十四大罪疏天啓四年楊漣臣竊惟高皇帝定令內官不許干預外事祇供掖廷灑掃違者法無赦聖明在御乃有肆無忌憚濁亂朝常如東厰太監魏忠賢者敢列其罪狀為陛下言之忠賢本市井無賴中年淨身夤入內地初猶謬為小忠小信以幸恩繼乃敢為大奸大惡以亂政祖制以擬㫖專責閣臣自忠賢擅權多出傳奉或徑自內批壞祖宗二百餘年之政體大罪一劉一燝周嘉謨顧命大臣也忠賢令孫杰論去急於翦已之忌不容陛下不改父之臣大罪二先帝賔天實有隱恨孫慎行鄒元褾以公義發憤忠賢悉排去之顧於黨護選侍之沈㴶曲意綢繆終加蟒玉親亂賊而讐忠義大罪三王紀鍾羽正先年功在國本及紀為司寇執法如山羽正為司空清修如鶴忠賢搆黨斥逐必不容盛時有正色立朝之直臣大罪四國家最重無如枚卜忠賢一手握定力阻首推之孫慎行盛以宏更為他辭以錮其出豈真欲門生宰相乎大罪五爵人於朝莫重廷推去歲南太宰北少宰皆用陪推致一時名賢不安其位顛倒銓政掉弄機權大罪六聖政初新正資忠直乃滿朝薦文震孟熊德陽江秉謙徐大相毛士龍侯震暘等抗論稍忤立行貶黜屢經恩典竟阻賜環長安謂天子之怒易解忠賢之怒難調大罪七然猶曰外廷臣子也去歲南郊之日傳聞宫中有一貴人德性貞靜因荷上寵注忠賢恐其露已驕橫託言疾病置之死地是陛下不能保其貴幸矣大罪八猶曰無名封也裕妃以有妊傳封中外方為慶幸忠賢惡其不附已矯㫖勒令自盡是陛下不能保其妃嬪矣大罪九猶曰在妃嬪也中宫有慶已經成男乃忽焉告殞傳聞忠賢與奉聖夫人實有謀焉是陛下且不能保其子矣大罪十先帝青宫四十年所與護持孤危者惟王安耳即陛下倉卒受命擁衛防維安亦不可謂無勞忠賢以私忿矯㫖殺於南苑是不但仇王安而實敢仇先帝之老奴况其他內臣無罪而擅殺擅逐者又不知幾千百也大罪十一今日奬賞明日祠額要挾無窮王言屢䙝近又於河間毁人居屋起建牌坊鏤鳯雕龍干雲插漢又不止塋地僣擬陵寢而已大罪十二今日廕中書明日廕錦衣衛金吾之堂口皆乳臭誥敕之館目不識丁如魏良弼魏良材魏希孔及其甥傅應星等濫襲恩廕䙝越朝常大罪十三用立枷之法戚畹家人駢首畢命意欲誣陷國戚動搖中宫若非閣臣力持言官糾正椒房之戚又興大獄矣大罪十四良鄉生員章士魁坐爭煤窑託言開礦而致之死假令盜長陵一抔土何以處之趙高鹿可為馬忠賢煤可為礦大罪十五王思敬等牧地細事責在有司忠賢乃幽置檻阱恣意搒掠視人命如草菅大罪十六給事中周士朴執糾織監忠賢竟停其升遷使吏部不得專銓除言官不敢司封駁大罪十七北鎮撫劉僑不肯殺人媚人忠賢以不善鍛鍊遂致削籍示大明之律令可以不守而忠賢之律令不敢不遵大罪十八給事中魏大中遵㫖涖任忽傳㫖詰責及大中回奏臺省交章又再䙝王言毋論玩言官於股掌而煌煌天語朝夕紛更大罪十九東厰之設原以緝奸自忠賢任事日以快私仇行傾陷為事縱野子傅應星陳居恭傅繼教輩投匭設阱片語稍違駕帖立下勢必興同文館獄而後已大罪二十邉境未息內外戒嚴東厰訪緝何事前奸細韓宗功潜入長安實主忠賢司房之邸事露始去假令天不悔禍宗功事成未知九廟生靈安頓何地大罪二十一祖制不蓄內兵原有深意忠賢與奸相沈㴶創立內操藪匿奸宄安知無大盜刺客為敵國窺伺者潜入其中一旦變生肘腋可為深慮大罪二十二忠賢進香涿州警蹕傳呼清塵墊道人以為大駕出幸及其歸也改駕四馬羽幢青蓋夾護環遮儼然乘輿矣其間入幕效謀叩馬獻䇿者實繁有徒忠賢此時自視為何如人哉大罪二十三夫寵極則驕恩多成怨聞今春忠賢走馬御前陛下射殺其馬貸以不死忠賢不自伏罪進有傲色退有怨言朝夕隄防介介不釋從來亂臣賊子只爭一念放肆遂至不可收拾奈何養虎兕於肘腋間乎此又寸臠忠賢不足盡其辜者大罪二十四凡此逆跡昭然在人耳目乃內廷畏禍而不敢言外廷結舌而莫敢奏間或奸狀敗露則又有奉聖夫人為之彌縫甚至無恥之徒攀附枝葉依託門墻更相表裏迭為呼應積威所劫致掖廷之中但知有忠賢而不知有陛下都城之內亦但知有忠賢而不知有陛下即如前日忠賢已往涿州一切政務必星夜馳請待其既旋詔㫖始下天顔咫尺忽慢至此陛下之威靈尚尊於忠賢否耶陛下春秋鼎盛生殺豫奪豈不可以自主何為受制么䯢小醜令中外大小惴惴莫必其命伏乞大奮雷霆集文武勳戚敕刑部嚴訊以正國法並出奉聖夫人於外用消隱憂臣死且不朽疏入忠賢黨魏廣微調㫖切責自此忠賢日謀殺漣次年再興汪文言獄羅織下詔獄許顯純酷法考訊遂於中夜斃之請除奸璫疏天啓四年蔡毅中臣思學校者天下公議所從出也臣正與諸生講為君難一書忽接楊漣劾忠賢疏合監師生千有餘人無不鼓掌稱慶乃皇上不下其奏於九卿而謂一切朝政皆親裁以奸璫為忠代之受過合監師生無不捫心愁歎不已也臣惟三代以後漢隋唐宋諸君其受權璫之害與處權璫之法載在通監我朝列聖受權璫之害與處權黨之法載在實録臣皆不必多言但取至近至親如武宗之處劉瑾神宗之處馮保二事願皇上遵之瑾在武宗左右言聽計從一聞諸臣劾奏夜半自起禽而殺之神宗臨御方十齡保左右扶持盡心竭力既而少作威福臺省劾奏未聞舉朝公疏神宗遂不動聲色而戍保於南京今忠賢無保之功而極瑾之惡二十四罪無一不當悉究舉朝羣臣欲於朝罷跪以候㫖忠賢遂要皇上入宫不禮羣臣今又欲於視學之日羣臣及太學諸生面叩陳請矣而皇上漫不經意數日以來但有及忠賢者留中不發如此䝉蔽其中寧可測哉乞將漣疏發九卿科道從公究問即不如劉瑾之誅而以處馮保之法懲之則恩威並著與神祖嫓美矣疏入帝不納糾傅櫆疏天啓四年左光斗臣惟君子之别於小人者清與濁而巳矣君子之不能容小人猶小人之不能容君子也其清濁異則其好惡不得不異也然而鵲終不可以為烏鳬終不可以為鶴其好惡殊其面目終不能易也臣於本月十九日接邸報見刑科給事中傅櫆為邪臣比匿匪人把持朝政衆皆側目人有危心懇乞立賜處分以消隱憂以葆太和事內論臣及科臣魏大中除大中自疏外其云血性男子聰明丈夫粉飾虛名未敢顯然與清塗相背依附有道未敢公然與善類為仇似乎科臣猶知有有道有清塗有善類者也而一篇之中終不得其指歸著落何在倒戈於君子君子何人呈身於小人小人何人汪文言之昭雪者前司寇前總憲也其題授中書者今閣臣也臣不聞也臣於山人墨客絶迹無往還臣官階已崇不藉延譽何事引為腹心臣有以知櫆之意矣櫆之意不利於考功有鄒維璉不利於銓司有程國祥又不利於吏垣有魏大中一則逐之去一則不欲其留一則不欲其到任而懼臣之稍稍持清議也則併欲羅於一網維璉十八年砥礪臣雖未薦之為銓司亦嘗亟稱其才品國祥二十年清冷臣隨同鄉諸臣後一繳訪單雖未嘗明其必用而不敢自昧其良心大中為人不可親疏臣與之落落而已凡此皆負海內之清望者也科臣何事必欲與之為仇也豈其性與人殊耶抑亦有神奸播弄揑造黑白簧鼓其間不覺目倒而心危遂手忙而足亂也人言科臣曽論清端大司農汪應蛟公論不許因求多於新安之人果爾是科臣一生與清人為難矣願科臣之慎思之也臣待罪風紀揚清激濁自臣執掌人材進退例得預聞何事攬泊如其納賄招權引用非類指有的實當明白糾參若其未也科臣失言矣以科臣之權力能使朝廷不能用人銓司不敢就列首垣不許到任把持朝政者莫科臣若科臣又嘗冒認東厰理刑傅繼教為兄弟脉絡機鋒長安冷覷久矣窟穴深藏布置已定將用邵輔忠陷毛士龍故事比昵匪人者莫科臣若名義至重鬼神難欺欲人勿知莫若勿為願科臣之慎持之也臣忝竊非據久思避賢且見人心日下清正難容義憤填胸生趣都盡何有一官伏乞皇上敕下九卿科道從公議處要見鄒維璉程國祥等是否清品科臣身在言路不能奬恬拔滯為何掃除清流顛倒國是仍乞將臣罷斥以謝科臣另選賢才代兹重地疏入帝有㫖左光斗以清望協持風紀這所奏心跡自明著照舊供職該部知道再劾監織中涓李實疏天啓四年周起元臣以蘇松兩郡料額有定無㸃金之術以遂織監溪壑之求李實因此肆螫於同知楊姜臣願一罷以白此丞之無他而皇上不加臣以譴逐更令安心供職又念臣力請免楊同知之逮治而革職為民此不惟臣荷優容之仁即楊姜亦深感寬處之德然而姜原無擅減之事以此坐錮臣雖靦顔就列誠有大不安於心者頃又見李實托拾逞辨鋒深情遁措詞倨侮垂涎無厭皆由宵小指㸃提弄臣不明白參透定貽不了釁端夫袍段以四十萬分為十八運按運支銀原編額止有此數即實之疏亦不敢謂蘇松料額有濫此數之外事理甚明不煩喋喋楊姜奉法急公並未擅減昔漢文帝以皂綈革履致海內之殷富宋仁宗因陜西用兵行三司議節省官壼服御假令姜果能為皇上減省冒費是以中興之主望皇上則固敬君之至者豈不卓然賢吏然而原非有減也皇上聽實之言而以擅減不敬坐姜此天下所共憐臣之所大不安而皇上所當轉圜而昭其覆盆者也實來蘇抗一味營利兼饒辣手講屬吏之禮罰官府之俸開密訪之門捉民機為匠人甚苦之乃又有背違成憲决裂舊章兩事則歲改袍船是已夫李實初時之營領袍差也曽具疏欲踵孫隆行事而孫隆於蘇松袍服之外未嘗侵管鎮徽寧廣各府州歲改此數處向無貂璫之跡今一旦添一中涓騷動其間不但參隨絡繹驛遞怨咨萬一奸民搆出事端誠恐禍生叵測臣之所慮不徒在為有司存纍年之規而深為地方防意外之隱憂近來數郡中攫取已收去銀巨萬並未聞一縷解京濟用則無益公家而有害於地方不再計而明矣此其必不可紛更者一也又袍船每歲八隻神宗巳裁定著為例劉吕兩監行之久矣今忽增造二隻歲歲要加派修造之費驛驛要設處夫廪之費李實不過得奸猾船頭等些小微利而有司加派之擾不顧也萬里挽曳之苦不恤也漏關閘萬千之稅不念也此其必不可紛更者二也大凡管織造之官多勸皇上奢侈少勸皇上節儉臣何敢以盛德事望實但望其照舊例循行不至格外作耗足矣仇士良言固寵之術必使人主廣侈其耳目而後我輩可以得志吕彊每事直諫力求先裁一切之虛冒實自視於此兩人者何居則所謂不敬莫大乎是伏乞皇上嚴諭李實於歲改袍船一事但令照舊勿聽宵人撥置恣意更張此江南之大幸皇上之至明至斷也楊姜雖已飄然逺引甘為聖世逸民更當諒其無擅減之罪曲賜輕處則臣言見采地方䝉休雖加三褫臣官有餘榮矣疏入得㫖楊姜稽誤袍段把提運船已從輕處巡撫官表率一方職專察吏豈得漫無甄别一味護庇如再瀆陳楊姜定行拏問請興江南水利疏天啓四年周起元臣謹奏江南蘇松常鎮四郡幅員不過五百里歲輸租粒二百餘萬最急莫如水利而水利之最大者莫如吳淞白茅劉河三江蓋環蘇松常與嘉湖數郡之湖澤咸歸翕於此為宣泄入海之道近劉河一線僅通吐納而吳淞與白茅二水則淤為平陸前代屢濬具有史志可考國朝永樂二年尚書夏原吉來濬之正統六年工部侍郎周忱濬之隆慶四年都御史海瑞濬之至今而五十餘年並未施工以致吳淞江自澳塘以至新涇口及東西蘆浦三壩等處六七十里淤澱不通白茅則海林塘墩鎮涇等處俱久填塞先後建議之臣皆以為請本屬鄉紳亦每每叩閽求濬而輒以費浩中寢三吳百千萬生靈之命脉引領此舉而皇上未有治水之命地方不敢擅興大役邇年小有水災低田輒淹沒直浙數郡皆受其患如常州吳江常熟崑山嘉定上海青浦無錫宜興等邑之間荒田數萬頃每遇漕白兑運之時有司但得派高鄉攤補而高鄉賦役原重又不甘心為低區白賠以此有司常考成降罰而小民受敲撲追呼亦終不能完額今年巨浸暴漲瀰千里者水之為害也雨後停蓄經旬不消者水利不修之為害也若今日又因循不治則東南水患日甚一日而國賦與民生兩受其纍矣臣查都御史海瑞開吳淞用銀七萬有竒前按臣薛貞曽委官估計數目亦不相逺白茅則知縣宋賢力請疏濬大約工力可五萬而足通計兩江工費以十二萬計查三十六年除應天六府賑濟不計外蘇松等府實䝉發賑銀五萬度今時詘皇上不能多發帑金而賑災不可少或可就以賑數再添一二萬發開河工臣檄各鄉飢民盡赴工作計丈定工計人授餼計日給值所全活必無量而水利亦興後雖有霖潦不至傷稼昔宋臣范仲淹守臨安遇歲凶轉乃大興工作募飢民赴役就食賴以全活者不可勝計今臣所言實尚缺五萬兩容臣於所屬再搜括積缺導河銀並贓贖再查照往牘或量行徵派以奏其績若夫濬之之法惟在尋其故道淺者深之窄者廣之應閘者閘應堰者堰應石者石豪民有於淤地之傍墾成業者如不大妨河心寧稍縮其河面以存之期於水通而止但不許一二奸猾占淤塞為私業昔成祖命尚書夏原吉出治水遣官齎水利集以賜原吉其注意如此是以奉行者皆殫其心力克有成功今皇上若肯留神此舉乞於工部司屬中簡任練達官一員來董其事以明聖意之决方不為道傍之築至於分任府佐等官則就所屬可揀用也疏入得㫖工部知道請修省以弭災疏天啓四年周起元臣謹奏看得臣屬松江去春已有地震之異今次且震亘數百里搖動數郡矣抑且有一二時而兩三震矣震而瓦木有聲至有圮城頺屋者矣稽之史曰陽為隂所填而不得升則震姑勿論占驗之說豈有隂壓陽而二氣不干五行不愆災沴不生人物不戾者乎伏見報京師地震奉聖㫖今歲各處災異及京師地震朕深懷警惕封疆多事著內外臣工盡心職業務修安攘實政毋事虛文臣等躬值此異皆奉職無狀所致除痛加修省及申飭文武將吏矢心慎毖共圖消弭外竊照江南祖宗陵寢之地財賦數百萬所出之區此地安危天下治亂之候也而今日天時人事有大可憂者江左素尚風流重儒雅近乃好談兵語亂伏覩皇上鋭意求治臣等方以為是中興之象而左道妖言狂妄不逞之徒見邉事尚急派徵無藝且曰是季世之象偏袒而奮白梃之秋也轉相愚惑遂漸搆逆萌雖各各就捕而餘黨豈盡消滅臣即條教與刀鋸並行未便回心嚮道不可不謂人心之變也又去歲七八月忽旱垂黃之穎轉為半實之穗棉花則半顆不結而歲徵布縷皆謀轉鬻於中州各河道處處乾涸即孟河太湖之間素汪洋澎湃且枯澀不可行舟貨物柴薪一時湧貴父老皆以為百年未見之異臣於歲災未敢輕報以啓小民觀望負稅於水涸亦不敢輕報以不祥災異傳播中外然而不可不謂天時之變也有此二變而地震隨之臣等又虞其召災於將來也震後不十日而浙之長興遭大盜慘變此亦其徵應而臣等又慮其未盡消融於已事也昔漢宣帝聞地震下詔求直言舉賢良方正又假貸貧民而災變亦遂消弭伏乞皇上求極言敢諫之臣舉巖穴忠讜之士亟講所謂盡人事以回災變之䇿又望俯念江南虛耗巳極百姓殫其地之出竭其廬之入以奉敲吸長此不已必馴至不可救藥目前笳塞未靖庚癸時呼即不能下蠲租貸貧之令亦宜速沛德音一切煩苛盡行報罷行郡縣吏務於催科中求撫字之仁臣等凡民間疾苦具疏請命者祈一一允之施行則閭巷無怨讟之聲而奸徒亦不敢有越軼之志根本安而民氣和則天地變異自消矣疏入得㫖禮部知道水災請蠲賑疏天啓四年周起元臣於五月間以稽天巨浸漫連數郡菽麥蔬菜連莖葉以俱沈棉花禾秧浥洪濤而盡腐桑田化為滄海號泣遍於郊原業具疏報聞諒聖心惻隱覽疏必愀然動念臣猶謂三吳雖地不堪於兩種而六月尚可播烏苗通行災重地方有司官親往各鄉勞來督令堰築者捧土畚築溝塞者决淤濬通富户令其捐資借貸貧佃令其竭力戽車私計稍高之區或可補插薄穫不謂自臣拜疏以後又經一月今且三秋入序而晴霽之後水且益漲兼以吳淞白茅二江五十餘年不開入海故道湮塞而浙省苕霅諸派與江海翻波逆湧蘇松常等數郡地形如坐釜底不能宣泄今舟楫往來不循河道每見飛帆鼓枻於田畝之間以取捷徑臣令人往驗地淺者可沒頂深者則沒數竿其地勢最高者亦當褰裳而涉補插晚稻嗟已絶望且村落屋廬盡如水中亭榭久為魚蝦之宅叩之則閴寂無人而散之四方者亦不知其所之甚至有枕藉死亡於水崖而不知其姓氏者矣大都無郡不災無邑不災或川騰谷沸人畜蔽溪而下或城圮屋漂男婦巢樹而居或㕔署泛汪洋之浸或墟堰瀉澎湃之波或舟筏撈人於城郭或杖鉢呻飢於道傍此等景象見者垂涕聞者酸鼻父老皆言此災比萬歷三十六年其數有倍蓋三十六年高鄉未甚浸而今則高低並淹三十六年一漲便消而今則兼旬不退三十六年菜麥已收而今則饑饉薦至三十六年積貯尚饒而今則十室九空三十六年地方寧戢而今則人心思亂臣而言及於人心思亂則固有不敢言又有不得不言者皇上方以江南為治安顧決禍患於旦夕似欲以危詞徼浩蕩臣是以不敢言然而蛇豕之徒無日不包藏禍心雖倡亂者不必飢而以無居無食之民誘為斬木揭竿之舉其號召甚易是以臣又不得不言嗟夫罄土之毛不足供食指之衆矣而鄰境又無可乞糴鉏犁既賖牛犢亦賣始於搶奪究而弄兵夫豈盡不必然之慮哉周禮荒政十二究之以除盜賊明荒之必亂也荒則必亂故弭亂莫如救荒而救荒莫先足食足食莫先於賑濟與捐折今東西跋扈師老數年餉耗無算皇上與閣部諸臣舉軍國最急最乏之需以待濟於江南而臣欲以江南最危最苦望澤於皇上似乎見一隅而遺全局臣惟計全局是以益重一隅今日所望皇上亦不過大施一年之惠蠲折賑濟以救此襏襫耰鋤小民俾歲歲為急公好義之百姓萬一荒而致亂變出叵測如前所逆料者即大費軍需未必便可收拾一年之不割而數年蠲之乎臣所謂顧全局而益重此一隅者也又有言者曰折米利在有田之家不在貧民不知粟出於富人之藏而入於貧者之腹江南豐歲且資客米儉歲益不可支若不先下折令則富室有所積必曰此自留以糊口者也富商有所囤必曰此徐鬻以上供者也如是而米日乏價日貴民即持錢無可買處近見松江十二錢買米一升視京師等貴而奸徒洶洶所屬至有强開粟舍之厫强搶販夫之米非不懸重典以創之正恐徒法不足以止亂七八月後景象當不止此誠於災重縣分速允蠲耗折米則民間稍有蓋藏及商賈之囤聚者皆出鬻以倡貧民雖價高不能禁抑而有貴米可鬻就中所全活亦不知其幾千百萬生靈此所寬在殷實而所活實在貧窮者也蓋列祖皆深知江南賦稅其輸將獨多江南安危其關係極重是以凡遇災沴之歲特沛浩蕩之恩誠以所豁者小而所保者大也今歲撫屬漕白正耗米二百五十餘萬石俱挽輸以達太倉如查儲積通算可濟若干時即於全災縣分允漕白蠲耗議折至於賑濟乞照往例特遣官員齎賑更望留滸墅關稅一年及稅契事例贓贖魚課行賑誠災重民飢事勢急迫不得不為不達時務之請今皇上仁慈天縱眷念定鼎之區在事諸臣軫恤時艱特先本根之計必有大沛德音以慰雲霓矣疏入得㫖江南水災已有㫖了作速勘奏蠲賑其目前要緊事宜不及奏的便宜行御選明臣奏議卷三十七
