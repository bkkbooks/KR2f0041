  - {type: page-break, offset: 0, content: '', id: KR2f0041_WYG_031-1a, image: WYG0445/WYG0445-0446c.png}
body:
  text: 重乞聖明覽本顧問疏隆慶三年溫純臣讀易至泰而曰坤上乾下至否而曰乾上坤下乃知君臣與天地等天地交而後化工可成君臣交而後萬幾可理自昔聖帝明王以及我朝或憲老或乞言或顧問或章奏今憲老乞言不可復矣顧問章奏即漢唐宋未有不胥此以為治者皇上御極以來朝講勤矣言路開矣獨覽本顧問二事雖言官往往言之而該部未暇為皇上請者豈非以即位之初服制未闋往古有三年不言之禮乎又豈非以政務旁午奏牘雜陳欲皇上一一而覽之一一而問之將涉于勞而無其要乎今先帝三年之喪已畢中外臣工莫不以髙宗邁訓成王訪落故事望我皇上皇上思有以答臣工之望則莫如覽本顧問而已往嵗臣在山東聞皇上於經筵之暇以石州殘破問輔臣臣不勝欣躍以為聖天子留意邊方如此不惟臣欣躍而海隅蒼生莫不傳頌九邊將領莫不警惕是皇上一言即可以興邦一怒即可以安天下倘由此日與大臣商榷時政則其所激發又不知當何如也皇上何惜一言而不為天下計哉方今天下災異頻仍寇盜弗寧閭閻多枵腹待哺之狀邊鎮有脫巾求糧之苦皇上試於此時勤顧問覽章奏而諸臣中必有以修攘大計為皇上言者諸臣言之皇上採而行之一留意而天下太平之期可坐致無難也且覽本不必於諸司之章奏而盡閲之也蓋諸司章奏有關於聖躬者有切于民瘼邉疆者有招擬提覆為各衙門之所當徑行者於此辨之不移晷而章奏可覽也顧問非必於天下事理而泛問之也厯代何由而興衰君德何由而進退中國何由而久安四夷何由而賔服於此審之不終日而問對可悉也伏乞皇上乘此諒隂之餘俯順臣民之望敇下禮部會同內閣九卿諸臣再加詳議如果臣言可採合無行令閣臣俟日講之暇將票擬過諸司章奏分為二等凡招擬題覆為各衙門之所當徑行者不必煩瀆其關於聖躬切於民瘼邊疆者另開節要進呈御覽即時面請應否採納施行皇上一有疑難更望或召閣臣或召部院諸臣特霽天顔俯賜清問必使厯代興衰之迹君德進退之由與夫安內攘外之要昭然如在目前始若勢分懸隔久之而上下情孚將見都俞吁咈如家人父子藹然于一堂矣國家億萬年無疆之運不其永孚于庥哉臣不勝願望悚息之至疏入帝從之乞慎重贈典奏隆慶三年溫純臣伏見該禮部題覆司禮監太監陳洪乞恩疏蒙聖旨是陳洪侍朕恭慎效有勤勞伊父準贈都督同知母一品夫人後不為例欽此臣等不勝駭異以為祖宗二百年贈官之制至今始變隨查大明會典凡武職有功封贈父母各照現授職事對品封贈無有贈內官父母為一品者先帝時太監溫祥得贈其母為一品夫人然越禮踰分已當議革而溫祥之父不得預封者以子為太監父無封太監例耳詎意太監陳洪即因溫祥贈母而求并贈其父已自無例可比也而該部則曰贈官原比武職事例豈以所引滕祥廕弟姪為贈官例乎且都督同知與一品夫人皆極品爵也洪不過一五品內侍耳視對品封贈之例既不相協而內臣之於武職又何相干涉今天下武職多怠玩而不振者以爵賞不足為天下勸耳使都督同知既可以無軍功而得則人何必蹈湯火赴白刃視死如歸耶即有蹈湯火赴白刃視死如歸者陛下其何贈以加之耶夫贈軍功與無軍功者同則人且不勸况有軍功者尚為品級拘未盡可得都督同知耶陛下即以洪為恭慎為有勤勞然蟒衣玉帶陛下之所以寵之者亦極矣洪果知恭慎其何忍以私親故而壞國家二百年之制陛下又何忍以宦官故而施此二百年未有之恩耶且此典果出陛下意乎抑因洪曲請而後與乎又因閣臣票擬而後與乎果出洪曲請陛下直以祖宗之制問之彼自當無詞以對若出陛下意則閣臣當救正部臣當執奏今在廷諸臣皆知出閣臣擬則其意不過以上下之情未通遂不得已為調和中外計耳夫陛下為天下臣民主不使閣臣直行其道而使不得已市恩中貴雖廢祖制壞名器而不顧臣等竊以為不可伏惟聖明裁察奏入帝不納察變謹微疏隆慶三年鄭履淳臣惟頃年以來萬民失業四方多故天鳴地震災害洊臻正陛下宵旰憂勤時也夫飢寒迫身易為衣食嗷嗷赤子聖主之所以為資不及今定周家桑土之虞切虞廷困窮之懼則上天所以警動海內者適足以資他人矣今最急莫如用賢陛下御極三祀矣曽召問一大臣靣質一講官賞納一諌士以共畫思患豫防之䇿乎髙亢暌孤乾坤否隔忠言重折檻之罰儒臣虛納牖之功宫闈違克儉之規朝陛拂同舟之義回奏蒙譴補牘奚從內批徑出封還何自紀綱因循風俗玩愒功罪罔核文案徒繁閽寺潛為厲階善類漸以短氣言涉宫府肆撓多端梗在私門堅持不破萬衆惶惶皆謂羣小侮常明良疏隔自開闢以來未有若是而永安者伏願奮英斷以決大計勿為小故之所淆宏濬哲以任君子勿為嬖昵之所惑移美色竒珍之玩而保瘡痍分昭陽細務之勤而和庶政以蠻裔為關門徑敵以錢榖為黎庶脂膏拔用陸樹聲石星之流嘉納殷士儋翁大立諸經疏史講筵日親無倦臣民章奏與所司面相可否萬幾之裁理漸熟人才之邪正自知察變謹微回天開泰計無踰於此矣疏入帝大怒杖之百繫刑部獄請靣奏事宜疏隆慶三年駱問禮臣謹上靣奏事宜十條一曰陛下躬攬萬幾宜酌用羣言不執已見使可否豫奪皆合天道則有獨斷之美無自用之失二曰陛下宜日居便殿使侍從官常在左右非嚮晦不入宫闈則涵養薰陶自多裨益三曰內閣政事根本宜參用諸司無拘翰林則講明義理通逹政事皆得其人四曰詔旨必由六科諸司始得奉行脫有未當許封還執奏如六科不封駁諸司失檢察者許御史糾彈五曰頃詔書兩下皆許諸人直言然所採納者除言官與一二大臣外盡付所司而已宜益廣言路凡諸臣章奏不惟其人惟其言令其皆得自效六曰陛下臨朝決事凡給事左右如傳旨接奏章之類宜用文武侍從毋使中官參預則窺竊之漸無自而生七曰士習傾危稍或異同輒加排陷自今凡議國事惟論是非不徇好惡衆人言未必得一人言未必非則公論日明士氣可振八曰政令之由宜在必行今所司題覆已報可者未見修舉因循玩愒習為故常陛下當明作於上敕諸臣奮勵於下以挽頽惰之風九曰面奏之儀宜略去繁文務求實用俾諸臣入而敷奏退而治事無或兩妨斯上下之交可久十曰修撰編檢諸臣宜令更番入直密邇乘輿一切言動執簡侍書其耳目所不及者諸司或以月報或以季報令得隨事纂緝以垂勸戒焉疏入帝不恱宦寺復從中搆之謫問禮楚雄知府議處安攘大計疏髙拱臣惟兵部尚書即古大司馬之職所以統六師平邦國安危所繫任至重也况二三十年來邊關多事調度為難則其任尤重所宜多儲其才用之不竭然後可以濟事而乃遇有員缺皇皇求索不得其人豈果世之乏才歟良由養之不豫是以不能猝得於臨時也臣觀兵部侍郎止如别部額設二員蓋邊關無事之時則然也近年既稱邊關多事而官則如舊或間添一員協理戎政然又時用憲臣侍郎亦非定員則所謂定員者止二人而已而二人者皆協理部事不得隨時出入或欲巡閲邊務未免假借于他官或遇邊方總督員缺未免那移于他處假借他官則非其本職不便行事那移他處則補于東又缺于西且彼此候代道途遙逺動經嵗時不得履任門庭緊急之事無人為禦臣不意國家如此大事而乃茍且以處至此也臣愚誠中夜以思謂宜于兵部添設侍郎二員同額設侍郎協理部事平日則練習本兵政務或欲巡閲邊務即以一人往既便行事又不煩于假借或遇邊方總督員缺即以一人往既可朝發夕至又不費于那移逮其出入中外閲厯既深凡本兵政務與夫邊關險隘敵情緩急將領賢否士馬強弱皆已曉暢諳熟方略素定遇有尚書員缺即以其尤深者補之如此而猶稱乏用必不然也然兵乃專門之學非人人皆可能者若用非其才固不能濟若養之不素雖有其才猶無濟也臣愚謂儲養本兵大臣即當自兵部司屬始蓋兵部司屬皆預聞軍旅之事而乃不擇其人泛然以用又往往遷為他官不得其人既未必可用而又遷為他官則人無固志視為傳舍不肯專心于所職如此者非惟無以備他日之用而目下承行亦有不當者矣今宜特高其選而以有智謀才力者充之使其專官于此練習事務不復他遷而又議其升格如邊方兵備缺即以兵部司屬補邊方巡撫缺即以邊方兵備補邊方總督缺即以邊方巡撫補而總督與在部侍郎時出時入以候尚書之缺譬之通政鴻臚然待次於下魚貫而進其他官中有特出之才能知兵事者又間取一二以補不足如此而猶稱乏用必不然也然臣又思之養才雖足以備用然勸懲不明何以盡人力體恤不周何以盡人心臣見邊方之臣涉厯沙漠是何等苦寒出入鋒鏑是何等艱險百責萃於前是何等擔當顯罰繩于後是何等危懼其為情苦視腹裏之官奚啻十倍而乃與之同論俸資同議升擢甚者且或後焉此功臣所以灰心烈士為之太息者也誠宜特示優厚有功則加以不測之恩有缺則進以不次之擢使其功名常在人先他官不得與之同論俸資脫或作姦誤事則律以法脫或任職不稱則左其官使其功名常在人後而不得與他官同論俸資夫稱職者常先則人必欣于進取不稱職者常後則人必懼于蹭蹬如是而猶不盡力必不然也至于人力有限窮則不支臣又見邊關總督之臣用之不效者既蒙顯罰而用之效者乃不蒙顧惜事一入手更無援助更無代替使其頻年纍嵗常受苦辛非惟不得息肩抑且不遑喘息直至肝腦塗地而後已斯其情不尤苦乎若使儲養有素用不乏人自可行通融休假之法如其在邊日久著有成績則特取回部以休假之休假之後不妨再出使其精神得息而不疲知慧長裕而不竭以勤王事為濟必多且臣子馳驅之苦既在上者所深體而君父體念之意亦在下者所周知君臣之義即同父子之恩如是而人不盡心必不然也臣受皇上眷任誓圖報稱見得邊事廢弛必須得人乃可振起而用人不得其道乃如此若及今不為之所恐因循愈久愈難收拾可終任其廢弛而已乎故願為我皇上早為設處以濟目前之急豫為儲養以備他日之用安攘之計或莫先于此也伏望聖明裁斷敇下該部施行不勝幸甚疏入得旨兵事至重人才難得必博求豫蓄乃可濟用覽卿奏處畫周悉具見為國忠猷都依議行議處邊方激勸疏隆慶四年髙拱臣惟廣東舊稱富饒之地乃頻年以來盜賊充斥師旅繁興民物凋殘狼狽已甚以求其故皆是有司不良所致而有司之不良其説有四用人者以廣東為瘴海之鄉劣視其地有司由科甲者十之一二而雜流者十之八九銓除者十之四五而遷謫者十之五六彼其才既不堪而又自知其前路之短多甘心於自棄此其一也嶺南絶徼僻在一隅聲聞既不通於四方動靜尤難逹於朝寧為有司者茍可欺其撫按即無復有誰何之者此其一也廣乃財貝所出之地而又通番者衆竒貨為多本有可漁之利易以豔人此其一也貪風既成其勢轉盛間有一二自立者撫按既薦之矣而所劾者亦不過聊取一二茍且塞責固不可以勝劾也彼其見撫按亦莫我何則益以為得計而無所忌憚居者既長惡不悛來者亦淪胥以溺是以貪風牢不可破此其一也以甘于自棄之人處僻逺之地豔可漁之利而其囿于無所忌憚之風此所以善政無聞民之憔悴日甚而皆驅之于盜賊也若不亟處弊將安極查得往嵗奉旨多取進士議者謂當於此等處用之乃竟不肯選去殊為可憾合無今後廣東州縣正官必以進士舉人相兼選除雜流遷謫姑不必用果有治績撫按從實奏薦行取推升如其奉職無狀必須盡數察劾處治不得仍前聊取一二茍且塞責如尚茍且塞責容臣等劾奏治罪庶人心知警而不敢公然縱肆也然不肖者罰固可以示懲若使賢者不賞又何以示勸臣等訪得潮州府知府侯必登公亷有為威惠並著能使地方鮮盜百姓得以耕稼為生此等賢官他處猶少而况于廣東乎若使人皆如此又何有地方不靖之憂合無將本官先加以從三品服色俸級令其照舊管事待政成之日另議超升其他尚有能靖地方者容臣等訪得續行題請加恩庶人心知勸而皆有以興起也然臣又思逺方之困敝不止廣東而廣東特其甚者如廣西雲貴皆稱絶徼近年皆有兵革之事民亦皆不堪命議處有司亦當以廣東例行蓋天下雖大實則如人一身必是血脈流通頂踵皆至然後可以為人若使逺方功罪之實為在上者所明照而君上綜核之意為在逺者所周知則誰敢不畏服誰敢不修職萬里之外如在目前治理之機可運掌上聖人所以能使中國為一人用此道也伏望聖明特賜施行不勝幸甚疏入得旨近來逺方有司不得其人以致民不聊生盜賊滋蔓這所議甚得弭盜安民之要都準行議處邊方有司疏隆慶四年髙拱臣惟薊遼山陜沿邊有司雖是牧民之官實有疆場之責敵騎蹂踐既難支持百姓凋殘又難綏撫即以有才力者為之猶懼不堪即優厚而作興之猶恐不振乃官其地者非雜流則遷謫非遷謫則多才力不堪之人謂以劣處之也彼其用之腹裏尚然罔效又何有于邊方待之既薄志意隳沮又何望于展布是以善政無聞而郡邑之狼狽為甚皆是用人不當所致蓋徒以地苦其人而曽不顧人之苦其地也蓋徒以邊方為逺地而曽不思逺地安然後內地得以安也及今若不亟處恐日後狼狽愈極而不可收拾所關非細臣惟國家用人不當為官擇地祗當為地擇官今邊方既係要緊之地又皆狼狽則尤宜以賢者處之合無今後各邊有司必擇年力精強才氣超邁者除補或查治有成績兼通武事者調用而又議其賞罰有能保惠困窮俾皆樂業者以三年為率比內地之官加等升遷有能捍患禦敵特著竒績者以軍功論不次擢用如其才略恢宏可當大任即由此為兵備為巡撫為總督無不可者惟以治效為凖不必論其出身資格若乃用之不效無益地方者降三級别用若乃觀望推諉以致誤事者輕則罷黜重則軍法治罪夫既開功名之路以歆之于前則不肯不盡其心又有嚴罰以繩之于後則不敢不盡其力庶乎修職者多而邊方有賴也然臣又思功名之路既開則又有本是腹裏而借邊方省分之名以圖幸進者亦不可不豫為一定之説臣等查得薊遼則昌平順義密雲懷柔薊州玉田豐潤遵化平谷遷安撫寧昌黎樂亭延慶水寧保安自在安樂等州縣山西則河曲臨縣欣州崞縣代州五臺繁畤定襄永寧寧鄉苛嵐嵐縣興縣靜樂保德大同懷仁渾源應州山隂朔州馬邑蔚州廣靈廣昌靈邱等州縣陜西則固原靜寧隆德安定會寧蘭州環縣安塞安定保安清澗綏德米脂葭州吳堡神木府谷等州縣此六十一處乃是邊方前項事宜惟當行之于此其他雖是薊遼山陜所屬不得概以邊稱徒資幸路其各府佐二在邊任事者賞罰亦同前議則事體有定不復得有假借者矣臣因見得沿邊郡邑敝壞必當為處日夜念此至熟故敢特效其愚伏望聖明裁斷施行邊方幸甚疏入得旨邊方有司防守攸賴委宜加意這所議都準行辨大寃以正法疏隆慶四年高拱臣謹奏近該審録重囚該刑部循例會同吏部都察院大理寺先于朝房內將各犯招由詳加檢閲內看得一起王金係陜西鄠縣民陶世恩陶倣俱係湖廣黃岡縣人申世文係陜西三原縣人劉文彬係湖廣黃岡縣人髙守中係河南太康縣人該王金招稱在官陶世恩由父陶仲文進用恩升尚寶司少卿自幼傳習陶仲文偽書世恩在官姪陶倣見世恩係近侍官員不合互相交結有在官申世文與金鄉里在官劉文彬武當山道士在官髙守中俱與陶世恩鄉里金等各不合陸續來京互相援引與陶世恩陶倣結交窺探內情金等因結黨深固遂不合妄造藥物希求幸用陶倣妄造丸白等藥及兜肚香袍陶世恩妄造小涵等丹內用麝香附子等熱藥金妄造百花等酒令人喫飲即刻丹田發熱申世文妄造天水生元丹劉文彬妄造經驗仙丹髙守中妄造三元等丹各陸續奏進因前項丹藥俱係熱燥傷人之物致蒙大行皇帝誤服聖躬違和金與陶世恩陶倣申世文劉文彬髙守中各慮罪重仍各不合朋謀合製金裏水敷臍丸及太乙寶丹從鼻孔吸進扶同奏入又蒙誤服內傷彌重至嘉靖四十五年十月內金等又不合妄進湯藥一服內有大黃芒硝等物遂損聖體當蒙遺詔方士人等各正刑章本年十二月二十六日荷蒙恩詔遵奉遺詔內開王金陶倣申世文劉文彬髙守中陶世恩妄進藥物致損聖躬著錦衣衛拏送法司從重究問欽此蒙錦衣衛將金等拏獲開送刑部陜西司嚴究各情明白將王金陶世恩陶倣申世文劉文彬髙守中俱問擬比依子弒父者律各凌遲處死決不待時等因臣等閲此招由不勝隱慟流涕曰先帝之受誣一至此哉至訊日何可對衆出言審問故今亦不敢議而特為皇上辨明其説古之人君有殞于非命不得正其終者其名至為不美蓋實有其事而不容掩故有以流傳而取譏于後也若我先帝果是不得正終實有其事否乎先帝聰明睿智允文允武事無大小悉洞燭其隱微至于寶愛聖體尤極詳慎即用太醫院官一劑亦必有御札與輔臣商榷安肯不問可否輕服方士之藥又安有既服受傷不以為言又復服之之理此自陛下所明知也今乃曰熱藥傷人之物致蒙誤服聖躬違和又曰丹藥從鼻孔吸進又蒙誤服內傷彌重皇天后土在上然耶否耶先帝聖主也何乃不自愛重至是耶果聞自何人何所證據而云然耶先帝臨御四十五年享年六十夀考令終蓋自古所罕有者末年抱病經嵗從容上賓曽無暴遽此亦天下所共聞也今乃曰金等又妄進湯藥內有大黃芒硝等物遂損聖體乃擬王金等比依子弒父之律謂先帝是王金等所害皇天后土在上然耶否耶先帝聖主也何乃致于非命至是耶又果聞自何人何所證據而云然耶議事者不知意何所為乃假先帝為辭誣以不得正終其將謂先帝為何如且陛下以父子之間而明于陛下前誣先帝以不得正終其將謂陛下為何如今罪囚招中明開先帝為人所害是何事體每嵗審録大庭之上明説先帝為人所害是何語言凡在臣民皆不忍聞久懷痛憤九重髙逺此等形狀何由得知臣如不言其誰為陛下言者若不亟明其事恐天下後世信以為真卒使先帝抱不白之冤于天上留不美之各于人間則天地古今之變無有大于此者而陛下亦何以為情也伏望敇下法司會同多官將王金等從公再間務見的確然後渙發綸音明其事于天下宣付史館明其事于後世使皆知先帝以正而終更無他説則不惟可以仰慰先帝在天之靈而陛下為親昭雪亦可以明父子之恩臣等為君昭雪亦可以盡君臣之義萬民瞻仰在此舉也至于王金等臣等非欲為開釋直以先帝受誣臣等一念赤忠萬分不能自已特為先帝辨耳彼王金等者惡孽滔天自有當誅之罪今只宜以本等罪名誅之萬死何足惜哉疏入得旨這事情重大著法司會同多官從實究問明白來説議處本兵司屬疏隆慶四年髙拱臣拱具奏儲養本兵大臣自司屬始已蒙聖明準允容臣等仔細體訪于本兵司屬中分别其可留者留可處者處其别衙門官有可調為本兵司屬者調區計停當陸續題請外臣等又思得方今邊徼用兵之處惟是薊遼宣大延綏寧夏甘肅而南則閩廣是數處者風土不一事體各異每遇有事本兵處分止憑奏報之詞别無據證以故常不得其的確臣愚謂宜于是數處之人擇其有才力知兵事者每處多則二人少則一人使為本兵司屬彼生于其地身家之慮既無不周至如山川之險易將領之賢否士馬之強弱與夫奏報之虛實功罪之真偽皆其所知便可一問而得以是為參伍之資處分或無不當且是數處者既有其人然亦不過司屬二分之一餘員尚多天下之人皆在固非偏用邊人伏望聖明裁定敕下臣等施行仍乞著為令甲永逺遵守俾是數處之人在兵部者後先繼續不至間斷其于邊務所禆必多疏入得旨這兵部司屬依擬選用並著為令請豫調保邊入援兵馬疏隆慶四年談綸臣謹奏本月二十二日酉時據分石守塘領參將陳勛揭稟白海子迤北瞭見敵兵約長七八十里于八月十三日起身往東北行走又據薊鎮總兵官戚繼光揭稱西路敵兵十分重多已到境外地名商都等因各報到臣該臣督同鎮巡等官查照節年事規將主客官軍酌量地勢衝緩題請分布乘牆列守而又議以黃花居庸鎮邊三路有警該昌鎮總兵官楊四畏統領本標官兵首先應援迎敵古北牆子嶺曹家寨石塘嶺有警該西路副總兵官李超統領本營并臣標將李如檟等標兵首先應援迎敵馬蘭松棚太平三路有警該總理都督戚繼光首先應援迎敵燕河臺頭石門山海關四路有警該東路副總兵官胡守仁統領巡撫標下及本營標兵首先應援迎敵而臣與巡撫都御史各往來督理遇警隨營調度各該總協等官本路無警他路有警即便相機䇿應夫分路列戍布置雖詳但邊長人稀全仗軍門鎮巡協守標兵近者則首先迎敵逺者則相繼應援設使直入一路或分伺兩路又地方相去不逺即有二三十萬之衆臣等以四標全力合併拒阻即不資外助可保萬全但今據所報西路且有二十萬衆東路懲創往年挫衄之事糾合各部計亦不下十萬屢報西路謀入黃花鎮而東路又謀入古北口東西又犯入馬蘭峪是分為三路矣東路則謀犯義院口為石門寨所屬又謀犯界嶺口為臺頭營所屬又謀犯冷口為燕河營所屬又謀犯潘家口為松棚谷所屬即未能四路並犯但今四路內屬諸番各自逃去亦必有分犯二路之意且一路遇敵左右二路俱當戒嚴是薊昌一十四路東西相去二千餘里處處受敵臣等各標之兵可以應援截殺者才有四營東二營合車騎步兵計三萬有竒昌平一營不滿六千又抽諸長陵等八衛之人最為脆弱難恃所堪恃者僅東之三營耳以三營三萬之兵而當三十萬五路入犯之衆已為力不能支而況黃花鎮為陵寢重地臣必自將密雲一營合昌平標兵誓死以當黃花一路則所謂古北石塘曹家寨牆子嶺首先迎敵已無其兵而東路既欲分犯二處則副總兵胡守仁即合巡撫標下之兵其力亦難兼顧總兵戚繼光協總胡守仁即如初議遇警首先迎敵亦再無别兵可以調發相繼應援臣等用是苦心籌畫無所措手為今之計合無請乞敕下該部豫將保定鎮撫應援兵馬行令整搠三枝星馳前赴密雲聽臣分撥標兵三千相兼前去駐劄石匣營適中地方專備古北墻子曹家寨石塘嶺有警分投赴邊併力拒阻又行遼東鎮巡官豫將入援人馬星馳進關至石門寨臺頭營屯劄專備東路土蠻如果分犯二處總兵王治道與副總胡守仁督兵分投拒遏巡撫都御史劉應節往來調度俾臣得以專當黃花鎮一面保護陵寢戚繼光專當馬松太平三路如或黃花鎮無警臣仍率協總李超標將李如檟等專待牆古曹石首先迎敵而以保定援兵分發西自牆古曹石東至馬松太平遇急策應又或墻古曹石無警而敵悉衆分犯馬蘭以東臣則親率標兵以東而以保定應援兵馬留在平谷以西一則防備西路突瞰我虛一以豫備內地又或馬松無警而牆古以西或得潰入則繼繼光躬率全營標兵星馳而西與臣連營奮戰如此則勝算粗定不致顧此失彼若謂二鎮援兵必待敵已潰牆而後入關䇿應則有焦頭爛額之功不如曲突徙薪之萬全也伏望聖明軫念敵衆兵寡俯賜俞允畿輔地方幸甚臣愚不勝幸甚疏入帝從之言邊事疏隆慶四年王崇古臣竊惟諳逹橫行塞外幾五十年威制諸部侵擾邊隅今神厭凶德骨肉離叛巴噶奈濟千里來降宜給宅舍授官職豐餼廪服用以恱其心嚴禁出入以虞其詐若諳逹臨邊索取則責令縛送拜甡諸逆還被掠人口然後以禮遣歸䇿之上也若遂桀驁稱兵不可理諭則明示欲殺以撓其志彼望生還必懼我制其死命不敢大逞然後徐行吾計䇿之中也若彼遂棄而不求則當厚加資養結以恩信其部衆繼降者處之塞下即令巴噶奈濟統領之如漢置屬國居烏桓之制他日諳達死子錫稜阿必有其衆因加巴噶奈濟名號令收集餘衆自為一部錫稜阿必忿爭兩族若互相讎殺則按兵稱助彼無暇侵陵我遂得休息又一䇿也若循舊例安置海濵使諳逹日夜南望侵擾不已又或使之隨營立功彼素驕貴不受驅䇿駕馭茍乖必滋怨望頓生揚去之心終貽反噬之禍均為無䇿矣伏乞陛下採擇施行疏入帝從之言宜許諳逹貢市疏隆慶四年王崇古臣謹奏昔先帝既誅仇鸞制復言開市者斬邊臣何敢故違禁旨自陷重辟但敵勢既異昔強我兵亦非昔怯不當援以為例夫先帝禁開馬市未禁北敵之納疑今敵求貢市不過如遼東開原廣寧之例商人自以有無貿易非請復開馬市也諳逹父子兄弟橫行四五十年震驚宸嚴流毒畿輔莫收遏劉功者誠緣議論太多文網牽制使邊臣無所措手足耳昨秋諳逹東行京師戒嚴至倡運甎塞聚灰門乘城之計今納欵求貢又必責以久要欲保百年無事否則治首事之罪豈惟臣等不能逆料他時雖諳逹亦恐能保其身不能制諸部于身後也夫拒敵甚易執先帝禁旨一言可決但敵既不得請懷憤而去縱以巴噶奈濟之故不擾宣大而土蠻三衛嵗窺薊遼濟農賓都侵擾西鄙息警無時財力殫屈雖智者無以善其後矣昔額森以尅減馬價而稱兵忠順王以元裔而封哈密小王子由大同二年三貢此皆前代封貢故事也夫揆之時勢既當俯從考之典故非今創始堂堂天朝容荒服之來王昭聖圖之廣大以示東西諸部傳之天下萬世諸臣何疑憚而不為耶疏入帝從之御選明臣奏議卷二十八
